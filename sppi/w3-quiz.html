<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}

  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}

    <h1>W3 모의문제 — Governance / Strategy / Risk &#9733;</h1>
    <div class="sub">Unit 3 · TARIF · ISO 31000 · 5&#215;5 Matrix · Risk Treatment · Risk Limit 3계층 · POJK 48/42 · 3 Lines · Risk Culture · 100문항 풀 · K6/K7 신규판(2026) 기반</div>

<script>
const BANK = [
{id:"001",tp:"개요",d:"Medium",q:"The new K6/K7 governance & risk unit references which international risk-management standard?",o:["COSO ERM 2004 only","SNI ISO 31000:2018","ISO 9001:2015","Basel III only"],a:1,e:"The unit grounds risk management in SNI ISO 31000:2018 (alongside COSO internal control)."},
{id:"002",tp:"ISO31000",d:"Hard",q:"Under ISO 31000:2018, risk management is best defined as a set of procedures and methodologies to:",o:["Maximize leverage","Avoid all regulation","Identify, measure, monitor and control risk arising from business activities","Eliminate all risk completely"],a:2,e:"Risk management identifies, measures, monitors and controls risk; it manages — not eliminates — risk."},
{id:"003",tp:"ISO31000",d:"Hard",q:"Per the framework, 'Risk' is defined as:",o:["The potential for an event that could cause harm to the institution","An audit finding","Any profitable opportunity","A guaranteed loss"],a:0,e:"Risk is the potential for an event that could cause harm; it is uncertainty, not certain loss."},
{id:"004",tp:"ISO31000",d:"Medium",q:"The application of risk management by a finance company must be ADJUSTED to:",o:["Only the CEO's preference","A fixed national template","Objectives, business policies, size and complexity of the NBFI","Only the share price"],a:2,e:"Risk-management implementation is proportionate to the NBFI's objectives, policies, size and complexity."},
{id:"005",tp:"4층구조",d:"Hard",q:"The Risk Management Framework (PADK 48/2025) rests on which four pillars?",o:["Vision; mission; values; ethics","Active supervision; policies/procedures/limits; identification-measurement-monitoring-control & MIS; internal control/audit","Capital; liquidity; FX; tax","Marketing; sales; pricing; collections"],a:1,e:"The four-pillar framework: active supervision, adequacy of policies/procedures/limits, the risk process & MIS, and comprehensive internal control."},
{id:"006",tp:"4층구조",d:"Medium",q:"The first pillar of the risk-management framework is:",o:["IT procurement","Dividend policy","Marketing strategy","Active supervision of the Board of Commissioners and Directors"],a:3,e:"Pillar 1 is active supervision by the Board of Commissioners and Directors."},
{id:"007",tp:"ISO31000",d:"Hard",q:"Risk Assessment under the framework includes the assessment of inherent risk and:",o:["The quality of risk-management implementation (risk control system)","The audit fee","The marketing budget","The dividend payout"],a:0,e:"Risk assessment combines inherent risk and the quality of risk-management implementation (control system)."},
{id:"008",tp:"TARIF",d:"Medium",q:"The five GCG principles under POJK 48/2024 are summarized by the acronym:",o:["TARGET","PDCA","TARIF (Transparency, Accountability, Responsibility, Independency, Fairness)","SMART"],a:2,e:"GCG principles: Transparency, Accountability, Responsibility, Independency, Fairness (TARIF)."},
{id:"009",tp:"TARIF",d:"Hard",q:"Which GCG principle means 'managed professionally and free from conflict of interest and outside pressure'?",o:["Fairness","Responsibility","Transparency","Independency"],a:3,e:"Independency = professional management free from conflicts of interest and external pressure."},
{id:"010",tp:"TARIF",d:"Hard",q:"Which GCG principle requires 'compatibility of management with the laws and execution of healthy business practices'?",o:["Transparency","Accountability","Fairness","Responsibility"],a:3,e:"Responsibility = compliance with laws and sound multifinance business practices."},
{id:"011",tp:"TARIF",d:"Medium",q:"Under GCG 'Accountability', the key idea is:",o:["Maximizing leverage","Hiding poor results","Clearness on function so performance is transparent, fair, effective and efficient","Avoiding regulators"],a:2,e:"Accountability means clarity of function enabling transparent, fair, effective and efficient performance."},
{id:"012",tp:"GCG",d:"Hard",q:"Per POJK 48/2024, 'Company's organ' refers to:",o:["Only the regulator","Only the auditor","GMS (shareholders), Directors, and Board of Commissioners","Only the Directors"],a:2,e:"Company's organ = the general meeting of shareholders, the Directors and the Board of Commissioners."},
{id:"013",tp:"GCG",d:"Hard",q:"A finance company with assets above Rp 250 billion must have at least how many Directors?",o:["5 Directors","1 Director","3 Directors, min 50% Indonesian","2 Directors"],a:2,e:"Assets > Rp 250B requires ≥3 Directors with at least 50% Indonesian citizens."},
{id:"014",tp:"GCG",d:"Hard",q:"A finance company with assets above Rp 250 billion must have at least how many Commissioners?",o:["2 Commissioners, including an Independent Commissioner","No minimum","1 Commissioner","4 Commissioners"],a:0,e:"Assets > Rp 250B requires ≥2 Commissioners including an Independent Commissioner."},
{id:"015",tp:"GCG",d:"Medium",q:"Directors meetings should be held at minimum:",o:["Once per month (min 50% attendance)","Weekly","Once per year","Quarterly"],a:0,e:"Directors meet ≥1x/month (≥50% attendance); BOC ≥4x/year (≥75%); GMS ≥1x/year."},
{id:"016",tp:"GCG",d:"Medium",q:"Board of Commissioners meetings should be held at minimum:",o:["Monthly","Daily","Once per year","4 times per year (min 75% attendance)"],a:3,e:"BOC meets ≥4x/year with ≥75% attendance."},
{id:"017",tp:"GCG",d:"Hard",q:"Minutes of Meeting (MoM) for board meetings should:",o:["Omit any disagreement","Be kept secret from members","Be distributed to all relevant parties and include dissenting opinions","Only record attendance"],a:2,e:"MoM must be distributed to relevant parties and must record dissenting opinions."},
{id:"018",tp:"GCG",d:"Hard",q:"The Director in charge of the compliance function may NOT concurrently hold which functions (except President Director)?",o:["Only HR","Financing/credit, marketing and financial functions","Only IT","Only legal"],a:1,e:"The compliance Director cannot also lead financing/credit, marketing or finance functions — except the President Director."},
{id:"019",tp:"GCG",d:"Hard",q:"An Independent Commissioner of a finance company must be:",o:["A controlling shareholder","A foreign expert","A current Director","An Indonesian citizen domiciled in Indonesia"],a:3,e:"Independent Commissioners must be Indonesian citizens residing in Indonesia, with no affiliate relations."},
{id:"020",tp:"GCG",d:"Medium",q:"Directors are prohibited from holding double positions as a member of the BOC in more than:",o:["5 institutions","10 institutions","2 institutions","unlimited institutions"],a:2,e:"A Director may not be a BOC member in more than 2 institutions, among other double-position limits."},
{id:"021",tp:"GCG",d:"Hard",q:"The GCG self-assessment report must be reported to OJK no later than:",o:["1 July","31 December","30 April","15 February of the next year"],a:3,e:"GCG self-assessment (part of institutional soundness) is due to OJK by 15 February of the next year (POJK 28/2020)."},
{id:"022",tp:"전략",d:"Hard",q:"Strategy risk under PADK 48/2025 arises mainly from:",o:["Inaccuracy in making/implementing strategic decisions and failure to anticipate environmental change","Excess capital","Low NPF","Strong internal controls"],a:0,e:"Strategy risk stems from inaccurate strategic decisions and failure to anticipate business-environment changes."},
{id:"023",tp:"전략",d:"Medium",q:"Which is an inherent-risk parameter for STRATEGY risk?",o:["FX exposure volume","Cash transaction count","Alignment of business strategy with business-environment conditions","NPF gross ratio"],a:2,e:"Strategy-risk parameters include strategy-environment alignment, strategic choices, industry position and realization of targets."},
{id:"024",tp:"전략",d:"Hard",q:"The eight risk types in NBFI health assessment are grouped into business, financial and:",o:["Tax risk group","Governance risk group","Marketing risk group","Pricing risk group"],a:1,e:"Groups: business (strategic), financial (credit, market, operational, liquidity), governance (compliance, legal, reputation)."},
{id:"025",tp:"전략",d:"Hard",q:"Which risk type is the SOLE member of the 'business risk group' in NBFI health assessment?",o:["Compliance Risk","Credit Risk","Strategic Risk","Reputation Risk"],a:2,e:"Business risk group = Strategic Risk only; financial = credit/market/operational/liquidity; governance = compliance/legal/reputation."},
{id:"026",tp:"전략",d:"Hard",q:"Operational risk inherent-risk parameters include all EXCEPT:",o:["Dividend payout ratio","Technology and information systems","Human resources","Organizational complexity and business activities"],a:0,e:"Operational-risk parameters: org/business complexity, HR, IT systems, fraud risk, business disruption, interaction/interdependence."},
{id:"027",tp:"전략",d:"Medium",q:"Which risk arises from the company's inability to meet maturing liabilities from cash-flow funding sources?",o:["Credit Risk","Liquidity Risk","Legal Risk","Reputation Risk"],a:1,e:"Liquidity (funding liquidity) risk is the inability to meet maturing liabilities from cash-flow/liquid-asset sources."},
{id:"028",tp:"전략",d:"Medium",q:"Reputation-risk inherent parameters include all EXCEPT:",o:["Frequency/materiality of debtor complaints","Gearing ratio level","Violations of business ethics","Impact on owner/group reputation"],a:1,e:"Reputation-risk parameters: owner/group reputation impact, business-ethics violations, product complexity, negative-news exposure, complaint frequency."},
{id:"029",tp:"전략",d:"Hard",q:"Compliance risk inherent parameters include the type/significance of violations and:",o:["Branch count","FX position","Frequency of violations and compliance track record","Cash ratio"],a:2,e:"Compliance-risk parameters: violation type/significance, frequency/track record, breaches of accepted standards, and follow-up actions."},
{id:"030",tp:"Treatment",d:"Hard",q:"Per the risk-management strategy, which treatment matches 'Cancel expansion to high-risk areas'?",o:["Avoid (Terminate)","Exploit","Transfer","Accept"],a:0,e:"Avoid/Terminate = cancel or cease the risky activity (e.g., abandon high-risk expansion)."},
{id:"031",tp:"Treatment",d:"Hard",q:"Which risk treatment matches 'transfer risk through insurance or guarantee'?",o:["Terminate","Accept","Transfer","Avoid"],a:2,e:"Transfer shifts risk to a third party, e.g., via insurance or guarantee mechanisms."},
{id:"032",tp:"Treatment",d:"Hard",q:"Which treatment matches 'No action — accept minor operational risk below a threshold'?",o:["Terminate","Avoid","Accept","Transfer"],a:2,e:"Accept means taking no action and bearing minor risk below a defined threshold."},
{id:"033",tp:"Treatment",d:"Medium",q:"Risk treatment that reduces likelihood/impact via controls is called:",o:["Mitigate (reduce)","Accept","Avoid","Ignore"],a:0,e:"Mitigate/reduce applies controls to lower likelihood or impact; the four core options are avoid, transfer, mitigate, accept."},
{id:"034",tp:"Treatment",d:"Hard",q:"For credit risk mitigation under POJK 46/2024, which is NOT a listed mechanism?",o:["Insurance on collateral","Issuing promissory notes to the public","Loan/credit insurance","Fiduciary/mortgage on collateral"],a:1,e:"Mitigation: loan insurance, collateral insurance, fiduciary/mortgage and other risk-reduction efforts; issuing public promissory notes is prohibited."},
{id:"035",tp:"Treatment",d:"Hard",q:"A finance company is prohibited from insuring or guaranteeing:",o:["New financing","Performing receivables","Problematic (non-performing) financing receivables","Collateral generally"],a:2,e:"Companies cannot insure/guarantee already-problematic receivables, nor use mechanisms capping claims to a % of premium."},
{id:"036",tp:"Treatment",d:"Medium",q:"Risk that is left after controls are applied is termed:",o:["Strategic risk","Inherent risk","Gross risk","Residual risk"],a:3,e:"Residual (net) risk is inherent risk reduced by the quality of risk-management/control implementation."},
{id:"037",tp:"Treatment",d:"Hard",q:"In the risk-profile rating, the combination producing residual risk is:",o:["Inherent Risk adjusted by Quality of Risk-Management Implementation (KPMR)","Inherent Risk plus dividend","FAR times gearing","Capital minus liabilities"],a:0,e:"Risk Profile Rating = Inherent Risk rating combined with the Quality of Risk-Management Implementation (KPMR), giving net/residual risk."},
{id:"038",tp:"RiskLimit",d:"Hard",q:"Per the new module, RISK CAPACITY is best described as:",o:["The single-debtor limit","The dividend cap","The maximum NPF allowed","The company's ability to absorb risk based on capital, liquidity and operations"],a:3,e:"Risk capacity is the ability to absorb risk from resources (capital, liquidity, operations); it is the primary constraint on appetite/tolerance."},
{id:"039",tp:"RiskLimit",d:"Hard",q:"RISK APPETITE in the new module is defined as:",o:["The level of risk a company is WILLING to accept to achieve strategic objectives","The absolute maximum the firm can survive","The auditor's opinion","Zero risk"],a:0,e:"Risk appetite is the level of risk the company is willing to take to meet strategic objectives; it must align with vision/mission/strategy."},
{id:"040",tp:"RiskLimit",d:"Hard",q:"RISK TOLERANCE is defined as:",o:["The marketing budget","The MAXIMUM risk a company can accept in its operations","The dividend ratio","The minimum return target"],a:1,e:"Risk tolerance is the maximum acceptable operational risk, measured quantitatively and qualitatively and monitored regularly."},
{id:"041",tp:"RiskLimit",d:"Hard",q:"The new module's example sets NPF tolerance at a maximum of:",o:["5%","10%","25%","2%"],a:0,e:"Example: the company stipulates that the NPF rate must not exceed 5% (a risk-tolerance statement)."},
{id:"042",tp:"RiskLimit",d:"Hard",q:"In the module example, the single-debtor financing limit is set as a risk tolerance of:",o:["20% of total capital","50% of equity","17.5% of income","10% of total capital"],a:3,e:"Example tolerance: maximum single-debtor financing of 10% of total capital."},
{id:"043",tp:"RiskLimit",d:"Hard",q:"The hierarchy from widest to narrowest in setting risk limits is:",o:["Tolerance → Capacity → Appetite","Risk Limit → Appetite → Capacity","Appetite → Capacity → Limit","Risk Capacity → Risk Appetite → Risk Tolerance → Risk Limit"],a:3,e:"Risk Bearing Capacity/Capacity is broadest; appetite sits within it; tolerance bounds operations; risk limits are the operational caps."},
{id:"044",tp:"RiskLimit",d:"Hard",q:"Per the credit-risk example, the appetite vs tolerance for overdue >30 (F5PD) is:",o:["Appetite 2 hours, Tolerance 12 hours","Appetite 5%, Tolerance 4%","Appetite 10%, Tolerance 12.5%","Appetite <4%, Tolerance max 5%"],a:3,e:"Credit risk example: overdue>30 appetite <4%, tolerance max 5%; Fund Facility portfolio appetite max 10B, tolerance 12.5B."},
{id:"045",tp:"RiskLimit",d:"Hard",q:"Per the operational-risk example, analyst-level turnover appetite vs tolerance is:",o:["Appetite max 10%, Tolerance max 12.5%","Appetite 2h, Tolerance 12h","Appetite 30 days, Tolerance 20 days","Appetite 5%, Tolerance 10%"],a:0,e:"Operational risk example: analyst turnover appetite max 10%, tolerance max 12.5%; RTO variance appetite max 2h, tolerance max 12h."},
{id:"046",tp:"RiskLimit",d:"Medium",q:"Risk limits must be set for how many risk types?",o:["3 types","12 types","5 types","8 types of risk"],a:3,e:"Risk limits are established across the 8 risk types, derived from appetite and tolerance."},
{id:"047",tp:"RiskLimit",d:"Hard",q:"Per the new module, a Risk Appetite Statement (RAS) consists of:",o:["Assets, Liabilities, Equity","Risk Bearing Capacity/Risk Capacity, Risk Appetite, and Risk Tolerance","ROA, NPF, Gearing","Vision, Mission, Values"],a:1,e:"The RAS comprises Risk Bearing Capacity/Risk Capacity, Risk Appetite, and Risk Tolerance."},
{id:"048",tp:"RiskLimit",d:"Hard",q:"Who must establish risk appetite based on comprehensive risk analysis and financial capacity?",o:["The marketing team","External customers","The regulator alone","The Directors"],a:3,e:"Directors set risk appetite from comprehensive risk analysis, considering financial capacity, aligned to vision/mission/strategy."},
{id:"049",tp:"RiskLimit",d:"Medium",q:"Risk tolerance, per the module, must be:",o:["Set once and never reviewed","Equal to risk capacity","Measured quantitatively and qualitatively and monitored regularly","Hidden from the board"],a:2,e:"Risk tolerance must be measured quantitatively/qualitatively and regularly monitored and adjusted to market/regulatory conditions."},
{id:"050",tp:"RiskLimit",d:"Hard",q:"Periodic review of risk procedures and limit determination must occur at minimum:",o:["Once every five years","Once a year","Monthly","Never"],a:1,e:"Procedures and limits must be reviewed at least annually, with adequate documentation and clear delegation of authority."},
{id:"051",tp:"RiskLimit",d:"Hard",q:"Minimum contents of the Risk Management Policy include all EXCEPT:",o:["The company's marketing slogan","Risk appetite, tolerance and limits","Internal control systems in RM implementation","Contingency plans under worst-case scenarios"],a:0,e:"Policy must cover risk determination, methods/MIS, appetite/tolerance/limits, rating, contingency plans and internal control — not slogans."},
{id:"052",tp:"RiskLimit",d:"Hard",q:"Per the module, the Risk Management Policy should include how many core components (e.g., scope, principles, governance, strategy, RAS, fraud control, risk types, process, training/culture, reporting)?",o:["Exactly 5","Exactly 3","Around 11 components","Exactly 20"],a:2,e:"The policy lists ~11 components: title/objective, scope, principles, governance, strategy, RAS, fraud control, risk types & strategies, process, training/culture, reporting."},
{id:"053",tp:"Matrix",d:"Hard",q:"A Risk Heat Map plots risk using which two axes?",o:["Assets and liabilities","Likelihood (probability) and Impact (consequence)","Revenue and cost","Appetite and dividend"],a:1,e:"Heat maps plot likelihood against impact to prioritize risks."},
{id:"054",tp:"Matrix",d:"Hard",q:"Risk-profile measurement in the module considers:",o:["Impact and likelihood of occurrence","Only capital","Only impact","Only the audit fee"],a:0,e:"Risk-profile measurement uses impact and likelihood of occurrence."},
{id:"055",tp:"Matrix",d:"Medium",q:"Inherent risk rating combined with the quality of risk management produces the:",o:["Dividend yield","FAR","Risk Profile Rating (net/residual)","Gearing ratio"],a:2,e:"Inherent rating + KPMR quality → Risk Profile (net) Rating."},
{id:"056",tp:"Matrix",d:"Hard",q:"A high-inherent-risk credit portfolio with strong controls would map to a residual risk that is:",o:["Irrelevant to controls","Equal to inherent always","Higher than inherent","Lower than inherent due to effective controls"],a:3,e:"Effective risk-management implementation reduces inherent risk to a lower residual/net level."},
{id:"057",tp:"Matrix",d:"Medium",q:"In a 5x5 risk matrix, the highest-priority cell is:",o:["Low likelihood and high impact only","High likelihood and low impact only","High likelihood and high impact","Low likelihood and low impact"],a:2,e:"Top-right (high likelihood × high impact) is the highest priority requiring immediate treatment."},
{id:"058",tp:"3Lines",d:"Hard",q:"In the Three Lines Model, the FIRST line is most directly:",o:["An independent assurance provider","Involved in providing products/services and responsible for managing risk","The external regulator","The shareholders"],a:1,e:"The first line directly provides products/services and owns/manages the risk in operations."},
{id:"059",tp:"3Lines",d:"Hard",q:"Second-line roles in the Three Lines Model typically include:",o:["Only the GMS","Only marketing","Only internal audit","Compliance, internal controls, IT security, sustainability, quality assurance, ERM"],a:3,e:"Second line supports risk management — compliance, internal control, IT security, sustainability, QA, and broader ERM."},
{id:"060",tp:"3Lines",d:"Hard",q:"Third-line (internal audit) independence requires all EXCEPT:",o:["Access to people, resources and data","Accountability to the governing body","Freedom from bias/interference in planning and delivery","Reporting operationally to the marketing department"],a:3,e:"Third-line independence needs governing-body accountability, full access, and freedom from interference — not operational subordination to a business unit."},
{id:"061",tp:"3Lines",d:"Medium",q:"Per the model, the governing body's role includes ensuring:",o:["The independence of internal audit","Customer pricing","Branch decoration","Daily sales targets"],a:0,e:"The governing body provides effective governance, segregation of duties, resources, compliance, and internal-audit independence."},
{id:"062",tp:"3Lines",d:"Hard",q:"The principle 'creating and protecting value' in the Three Lines Model is achieved by:",o:["The first line acting alone","Outsourcing all risk","All lines working together through communication, cooperation and collaboration","Eliminating internal audit"],a:2,e:"Value is created/protected when all lines collaborate, ensuring reliable, coherent, transparent information for decisions."},
{id:"063",tp:"3Lines",d:"Medium",q:"Per the model, first- and second-line roles:",o:["Must be done by internal audit","Must always be fully separate","Must always be merged","May be combined or separated depending on the organization"],a:3,e:"First- and second-line roles may be combined or separated based on organizational design."},

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W3";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp;
    cur=0;answers=[];render();return;
  }
  if(mode==='all') quiz=shuffle(BANK);
  else quiz=shuffle(BANK).slice(0,30);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Unit 3 거버넌스·전략·리스크관리 전 범위 완주</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W3-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W3-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W3-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
