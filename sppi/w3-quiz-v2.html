<head>

<title>SPPI Level 7 — W3 Quiz V2 (Governance / Strategy / Risk)</title>
<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.topic{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>

    <h1>W3 모의문제 V2 — Governance / Strategy / Risk &#9733;</h1>
    <div class="sub">Unit 3 · TARIF · ISO 31000 · 5&#215;5 Matrix · Risk Treatment · Risk Limit 3계층 · POJK 48/42 · 3 Lines · Risk Culture · 100문항 풀 · K6/K7 신규판(2026) 기반</div>

<script>
const BANK = [
{id:"001",tp:"전략",d:"Hard",q:"A risk management strategy is best defined as:",o:["A daily checklist of routine office tasks","The plan to identify, assess, treat risk","A product marketing growth plan","An external statutory audit report"],a:1,e:"위험관리 전략 = 식별·평가·대응·모니터링의 방향성. 함정: 일상업무·마케팅·감사와 혼동."},
{id:"002",tp:"전략",d:"Hard",q:"The risk management process typically BEGINS with:",o:["Risk treatment selection","Risk identification","Final risk reporting","Capital allocation"],a:1,e:"RM 프로세스 시작 = 위험 식별(이후 측정·대응·모니터링). 함정: 후행 단계를 시작으로 오인."},
{id:"003",tp:"전략",d:"Hard",q:"Risk APPETITE is determined primarily based on:",o:["Matching competitor risk levels","Strategy and capacity to bear risk","The annual marketing budget size","The total staff headcount figure"],a:1,e:"위험선호 = 전략·자본·위험감내 역량 기반. 함정: 경쟁사·예산·인원은 결정요인 아님."},
{id:"004",tp:"전략",d:"Hard",q:"Risk LIMITS are established mainly to:",o:["Maximize total exposure","Operationalize the risk appetite","Replace the audit function","Eliminate every business risk"],a:1,e:"위험한도 = 위험선호의 운영 구체화. 함정: 노출극대화·위험제거는 정반대."},
{id:"005",tp:"전략",d:"Hard",q:"Risk appetite differs from risk tolerance in that appetite is:",o:["A narrow per-transaction cap","The broad level willingly accepted","A daily operational risk metric","An external audit materiality line"],a:1,e:"위험선호=수용의향의 광범위 수준, 위험감내=허용 변동폭. 함정: 두 개념 혼동."},
{id:"006",tp:"전략",d:"Medium",q:"A risk register is primarily used to:",o:["Record daily staff attendance","Document and track identified risks","List the company product range","Schedule the board meeting dates"],a:1,e:"위험등록부 = 식별위험·평가·대응 기록·추적. 함정: 무관 항목으로 오도."},
{id:"007",tp:"전략",d:"Hard",q:"Inherent risk refers to risk:",o:["After controls are applied","Before any controls are applied","That can never be measured","Only relevant to auditors"],a:1,e:"고유위험 = 통제 적용 전. 잔여위험 = 통제 후. 함정: inherent/residual swap."},
{id:"008",tp:"전략",d:"Hard",q:"Residual risk is the risk that remains:",o:["Before any treatment is applied","After controls and treatment","Only in a theoretical model","Entirely outside the company"],a:1,e:"잔여위험 = 통제·대응 후 남은 위험. 함정: 고유위험과 혼동."},
{id:"009",tp:"전략",d:"Medium",q:"Key Risk Indicators (KRIs) are designed to:",o:["Measure only past realized profit","Give early warning of rising risk","Replace the financial audit work","Set the overall marketing strategy"],a:1,e:"KRI = 위험 증가 조기경보 지표. 함정: 이익측정·감사대체와 혼동."},
{id:"010",tp:"전략",d:"Hard",q:"Aligning risk strategy with the business plan ensures:",o:["Maximum unchecked rapid growth","Risk-taking within set capacity","Removal of all internal controls","No ongoing monitoring needed"],a:1,e:"위험전략-BP 정렬 = 감내력 내 위험감수. 함정: 무제한·통제제거는 오답."},
{id:"011",tp:"Treatment",d:"Hard",q:"The four standard risk treatment options are:",o:["Buy, sell, hold, and trade","Avoid, transfer, mitigate, accept","Audit, report, fine, and close","Plan, do, check, and act"],a:1,e:"위험대응 4 = 회피·전가·완화·수용. 함정: PDCA·재무용어와 혼동."},
{id:"012",tp:"Treatment",d:"Hard",q:"Buying insurance against a risk is an example of risk:",o:["Avoidance","Transfer","Mitigation","Acceptance"],a:1,e:"보험 = 위험 전가(transfer). 함정: mitigation(완화)과 혼동."},
{id:"013",tp:"Treatment",d:"Hard",q:"Exiting a business line entirely to remove its risk is risk:",o:["Acceptance","Avoidance","Transfer","Mitigation"],a:1,e:"사업철수 = 위험 회피(avoid). 함정: transfer·mitigate와 혼동."},
{id:"014",tp:"Treatment",d:"Hard",q:"Strengthening internal controls to reduce risk is risk:",o:["Transfer","Mitigation","Avoidance","Acceptance"],a:1,e:"통제강화 = 위험 완화(mitigate). 함정: transfer(전가)와 혼동."},
{id:"015",tp:"Treatment",d:"Hard",q:"A minor risk below IDR 100 million is typically treated by:",o:["Avoidance","Acceptance","Transfer","Full mitigation"],a:1,e:"경미위험(<IDR100m) = 수용(accept). 함정: 과잉대응으로 회피·전가 선택."},
{id:"016",tp:"Treatment",d:"Medium",q:"The choice of treatment option depends mainly on:",o:["The CEO's mood that day","Cost-benefit and risk level","The office location","Competitor decisions"],a:1,e:"대응선택 = 위험수준·비용편익. 함정: 무관 요인으로 오도."},
{id:"017",tp:"Treatment",d:"Hard",q:"Accepting a risk WITHOUT any controls is appropriate when:",o:["When the risk is catastrophic","The risk is minor and tolerable","When controls would be cheap","When the risk is fully unknown"],a:1,e:"무통제 수용 = 경미·감내가능 위험만. 함정: 치명적 위험 수용은 부적절."},
{id:"018",tp:"Treatment",d:"Hard",q:"After treatment, the next process step is to:",o:["Forget the risk entirely","Monitor and review residual risk","Cancel the entire risk register","Stop all further risk reporting"],a:1,e:"대응 후 = 잔여위험 모니터링·검토. 함정: 종료·무시는 프로세스 위배."},
{id:"019",tp:"Treatment",d:"Medium",q:"A risk treatment plan should specify:",o:["Only the name of the risk","Actions, owners, and timelines","Just a single risk score number","The competitors' own strategies"],a:1,e:"대응계획 = 조치·책임자·일정·자원. 함정: 단편 정보만은 불완전."},
{id:"020",tp:"Treatment",d:"Hard",q:"Hedging foreign-exchange exposure is a form of risk:",o:["Avoidance","Transfer/mitigation","Acceptance","Identification"],a:1,e:"환헤지 = 전가·완화 성격. 함정: 수용·식별 단계와 혼동."},
{id:"021",tp:"Treatment",d:"Hard",q:"Diversifying the financing portfolio primarily achieves risk:",o:["Transfer fully to the insurers","Mitigation of concentration","Total avoidance of all lending","Pure acceptance with no action"],a:1,e:"포트폴리오 분산 = 집중위험 완화. 함정: transfer·avoid와 혼동."},
{id:"022",tp:"RiskLimit",d:"Hard",q:"BMPP limits are an example of which control type?",o:["A detective control type","Preventive limit control","A corrective control type","A marketing control measure"],a:1,e:"BMPP = 사전 예방적 한도통제. 함정: 탐지·시정통제와 혼동."},
{id:"023",tp:"RiskLimit",d:"Hard",q:"The single-obligor BMPP limit is set at:",o:["10% of equity","20% of equity","50% of equity","17.5% of equity"],a:1,e:"단일차주 20% of equity. 함정: group 50%·acquisition 17.5% 혼입."},
{id:"024",tp:"RiskLimit",d:"Hard",q:"The group-obligor BMPP limit is set at:",o:["20% of equity","50% of equity","17.5% of equity","100% of equity"],a:1,e:"Group 50% of equity. 함정: single 20%와 swap."},
{id:"025",tp:"RiskLimit",d:"Hard",q:"Breaching a risk limit should trigger:",o:["Immediate quiet concealment","Escalation and corrective action","Automatic staff dismissal","No response or action at all"],a:1,e:"한도위반 = 에스컬레이션·시정. 함정: 은폐·무대응은 위배."},
{id:"026",tp:"RiskLimit",d:"Medium",q:"The maximum gearing ratio acts as a limit on:",o:["The annual marketing spend","Leverage relative to equity","The total staff headcount","The office floor space used"],a:1,e:"Gearing 한도 = 자기자본 대비 레버리지(최대 10배). 함정: 무관 항목."},
{id:"027",tp:"RiskLimit",d:"Hard",q:"Risk limits should be reviewed:",o:["Never once they are initially set","Periodically and on material change","Only by the external competitors","Only after a major crisis has hit"],a:1,e:"한도 검토 = 정기·중대변화 시. 함정: 고정·사후만은 부적절."},
{id:"028",tp:"RiskLimit",d:"Hard",q:"The acquisition cost cap of 17.5% is measured against:",o:["The total company equity","Each contract's total income","The total paid-in capital","The total consolidated assets"],a:1,e:"취득원가 17.5% = 계약별 총수입 기준. 함정: equity 기준 BMPP와 혼동."},
{id:"029",tp:"RiskLimit",d:"Medium",q:"Setting limits per product line helps to:",o:["Increase total concentration","Control segment-level exposure","Avoid all reporting","Remove diversification"],a:1,e:"상품별 한도 = 세그먼트 노출 통제. 함정: 집중증가·분산제거는 정반대."},
{id:"030",tp:"RiskLimit",d:"Hard",q:"A 'hard limit' differs from a 'soft limit' in that a hard limit:",o:["Can be freely exceeded","Must not be breached","Is only advisory","Applies to marketing"],a:1,e:"Hard limit = 위반 불가, soft limit = 경고선. 함정: 둘 혼동."},
{id:"031",tp:"Culture",d:"Hard",q:"A strong risk culture is best evidenced by:",o:["Hiding risks from managers","Open escalation of risk concerns","Punishing all risk reporters","Ignoring near-miss events"],a:1,e:"건전 위험문화 = 위험 공개·자발적 에스컬레이션. 함정: 은폐·보복·무시는 취약 신호."},
{id:"032",tp:"Culture",d:"Hard",q:"The Risk Culture Diagnostic typically assesses how many pillars?",o:["Three pillars","Five pillars","Seven pillars","Ten pillars"],a:1,e:"Risk Culture Diagnostic = 5 Pillars. 함정: 인접 숫자 혼동."},
{id:"033",tp:"Culture",d:"Hard",q:"'Tone from the top' in risk culture means leaders:",o:["Avoid all the risk topics entirely","Set the example for risk behavior","Delegate the risk entirely away","Focus only on the quarterly profit"],a:1,e:"Tone from the top = 경영진이 위험행동 모범. 함정: 회피·전면위임은 정반대."},
{id:"034",tp:"Culture",d:"Medium",q:"A 'no-blame' reporting environment encourages staff to:",o:["Conceal their mistakes","Report risks and errors early","Avoid all responsibility","Stop using controls"],a:1,e:"무비난 환경 = 조기 위험·오류 보고 촉진. 함정: 은폐·책임회피는 반대 효과."},
{id:"035",tp:"Culture",d:"Hard",q:"Incentive structures affect risk culture because they:",o:["Have no behavioral effect","Can reward excessive risk-taking","Only concern the marketing","Simply replace the risk limits"],a:1,e:"인센티브 = 위험행동 유인(과도위험 보상 위험). 함정: 무영향·무관은 오해."},
{id:"036",tp:"Culture",d:"Hard",q:"A weak risk culture is indicated when:",o:["Risks are openly debated","Bad news is suppressed upward","Controls are respected","Limits are monitored"],a:1,e:"취약 문화 = 악재 상향 억제. 함정: 나머지는 건전 신호."},
{id:"037",tp:"Culture",d:"Medium",q:"Risk awareness training across staff supports culture by:",o:["Confuse the employees more","Building shared risk understanding","Reduce overall accountability","Replace the entire risk team"],a:1,e:"위험인식 교육 = 공통 이해 형성. 함정: 혼란·책임감소는 오답."},
{id:"038",tp:"Culture",d:"Hard",q:"The Risk Strategy Score Card is primarily used to:",o:["Pay out the staff bonuses","Translate strategy into measures","Replace the Board of Directors","Set the marketing campaign goals"],a:1,e:"Risk Strategy Score Card = 전략을 측정지표로 전환·추적. 함정: 보상·마케팅과 혼동."},
{id:"039",tp:"Culture",d:"Hard",q:"Embedding risk into performance appraisal helps to:",o:["Ignore poor risk behavior","Reinforce accountable conduct","Remove all risk ownership","Hide poor past decisions"],a:1,e:"성과평가에 위험 반영 = 책임 있는 행동 강화. 함정: 무시·책임제거는 반대."},
{id:"040",tp:"Culture",d:"Medium",q:"Psychological safety in a team enables members to:",o:["Stay silent about risks","Speak up about concerns","Avoid all decisions","Bypass the controls"],a:1,e:"심리적 안전 = 우려 발언 가능. 함정: 침묵·우회는 반대."},
{id:"041",tp:"GCG",d:"Hard",q:"The BOD's role in risk management is to:",o:["Audit and review its own work directly","Set and oversee the risk framework","Sell the financial products directly","Replace the OJK as the regulator"],a:1,e:"BOD = 위험 프레임워크 수립·실행 감독. 함정: 자기감사·영업·규제대체는 오답."},
{id:"042",tp:"GCG",d:"Hard",q:"The BOC's role regarding risk is primarily to:",o:["Run the daily risk operations itself","Supervise the BOD's risk management","Approve each and every transaction","Conduct the audit fieldwork directly"],a:1,e:"BOC = BOD 위험관리 감독. 함정: 일상운영·거래승인·실무감사는 타 역할."},
{id:"043",tp:"GCG",d:"Hard",q:"The Risk Management Committee primarily:",o:["Markets and sells the new products","Advises on risk policy and appetite","Audits the financial statements","Sets all the staff salary grades"],a:1,e:"위험관리위원회 = 위험정책·선호 자문·검토. 함정: 마케팅·감사·급여와 혼동."},
{id:"044",tp:"GCG",d:"Medium",q:"Risk governance documentation should be:",o:["Kept verbal and informal","Formal, approved, and reviewed","Hidden away from the BOC","Optional for the full BOD"],a:1,e:"위험 거버넌스 문서 = 명문화·승인·정기검토. 함정: 구두·비공개·임의는 부실."},
{id:"045",tp:"GCG",d:"Hard",q:"Segregation of duties in risk management prevents:",o:["Efficient daily operations","Conflicts of interest and fraud","Any form of risk reporting","All staff team collaboration"],a:1,e:"직무분리 = 이해상충·부정 방지. 함정: 효율저해·협업금지로 오인."},
{id:"046",tp:"GCG",d:"Hard",q:"Internal control under POJK 42/2024 uses how many checkpoints?",o:["Five points","Eight points","Ten points","Twelve points"],a:1,e:"내부통제 = 8-point checklist(POJK 42/2024). 함정: 인접 숫자 혼동."},
{id:"047",tp:"GCG",d:"Medium",q:"The risk management function should report to:",o:["The sales department head","The BOD with BOC oversight","External competitors","The marketing team"],a:1,e:"위험관리 보고선 = BOD·BOC(독립성). 함정: 영업·마케팅 보고는 독립성 훼손."},
{id:"048",tp:"GCG",d:"Hard",q:"Good risk governance requires the BOD and BOC to be:",o:["Identical in membership","Independent with clear roles","Free of any responsibility","Subordinate to sales"],a:1,e:"건전 거버넌스 = 독립성·명확한 역할분담. 함정: 동일구성·무책임은 오답."},
{id:"049",tp:"위원회",d:"Hard",q:"An Audit Committee differs from a Risk Committee in that it focuses on:",o:["Setting the risk appetite","Oversight of audit and controls","Daily risk treatment work","Marketing campaign approval"],a:1,e:"감사위원회 = 감사·내부통제·재무보고 감독. 위험위원회 = 위험정책. 함정: 두 위원회 혼동."},
{id:"050",tp:"위원회",d:"Medium",q:"Committee effectiveness depends MOST on:",o:["The total number of members","Competence and independence","The meeting room dimensions","The length of the minutes"],a:1,e:"위원회 실효성 = 역량·독립성·정보접근. 함정: 형식 요소로 오도."},
{id:"051",tp:"위원회",d:"Hard",q:"A committee charter should define:",o:["The daily lunch schedule","Mandate, authority, composition","The marketing slogans used","The list of competitor names"],a:1,e:"위원회 헌장 = 권한·구성·책임·보고선. 함정: 무관 항목."},
{id:"052",tp:"위원회",d:"Hard",q:"Committee meeting minutes serve primarily to:",o:["Advertise decisions publicly","Evidence decisions and follow-up","Replace the audit report","Set the share price"],a:1,e:"회의록 = 의사결정·후속조치 증빙. 함정: 광고·감사대체와 혼동."},
{id:"053",tp:"위원회",d:"Medium",q:"Independent members on a committee help to:",o:["Increase internal bias","Provide objective challenge","Slow every decision","Avoid all oversight"],a:1,e:"독립위원 = 객관적 견제·도전. 함정: 편향증가·감독회피는 반대."},
{id:"054",tp:"위원회",d:"Hard",q:"The frequency of risk committee meetings should be:",o:["Once a decade only","Regular and as-needed","Never scheduled","Random and untracked"],a:1,e:"위험위 회의 = 정기+필요시. 함정: 극단적 빈도는 부적절."},
{id:"055",tp:"3Lines",d:"Hard",q:"In the Three Lines Model, the risk management function is the:",o:["First line","Second line","Third line","Outside the model"],a:1,e:"위험관리 = 2선. 함정: 1선(영업)·3선(감사)으로 오배치."},
{id:"056",tp:"3Lines",d:"Hard",q:"The first line of defense consists of:",o:["The internal auditors","Operational risk owners","The external regulator","The audit committee"],a:1,e:"1선 = 위험소유 영업·운영. 함정: 감사·규제와 혼동."},
{id:"057",tp:"3Lines",d:"Hard",q:"Independent assurance in the Three Lines Model is provided by the:",o:["First line operations","Second line risk function","Third line internal audit","External marketing firm"],a:2,e:"독립보증 = 3선 내부감사. 함정: 1·2선과 혼동."},
{id:"058",tp:"3Lines",d:"Medium",q:"A common Three Lines error is placing risk management in the:",o:["Second line (correct)","First line as owner","Governing body","Regulator role"],a:1,e:"흔한 오류 = 위험관리를 1선 배치. 정답은 오배치 식별. 함정: 정위치(2선) 혼동."},
{id:"059",tp:"3Lines",d:"Hard",q:"The governing body in the Three Lines Model is responsible for:",o:["The daily transactions","Oversight and accountability","The audit fieldwork itself","The direct product sales"],a:1,e:"지배기구 = 감독·방향·답책. 함정: 실무 역할과 혼동."},
{id:"060",tp:"3Lines",d:"Hard",q:"Coordination among the three lines should:",o:["Be strictly forbidden","Strengthen overall governance","Merge them all into one","Eliminate their independence"],a:1,e:"선 간 조정 = 거버넌스 강화(독립성 유지). 함정: 단절·통합은 오답."},
{id:"061",tp:"3Lines",d:"Medium",q:"The second line's independence from the first ensures:",o:["Free risk-taking","Objective risk oversight","Removal of controls","Merged reporting lines"],a:1,e:"2선 독립 = 객관적 위험감독. 함정: 위험감수·통제제거는 반대."},
{id:"062",tp:"Matrix",d:"Hard",q:"A risk matrix typically plots likelihood against:",o:["Staff seniority","Impact/consequence","Office location","Marketing spend"],a:1,e:"위험 매트릭스 = 발생가능성 × 영향. 함정: 무관 축으로 오도."},
{id:"063",tp:"Matrix",d:"Hard",q:"A risk scored 'high likelihood, high impact' should be:",o:["Accepted with no action","Prioritized for treatment","Ignored entirely","Marketed externally"],a:1,e:"고가능성·고영향 = 최우선 대응. 함정: 수용·무시는 부적절."},
{id:"064",tp:"Matrix",d:"Medium",q:"A 'low likelihood, low impact' risk is usually:",o:["The top priority","Accepted or monitored","Always avoided","Always transferred"],a:1,e:"저가능성·저영향 = 수용·모니터링. 함정: 과잉대응으로 회피·전가."},
{id:"065",tp:"Matrix",d:"Hard",q:"A heat map uses color coding to:",o:["Decorate the final report","Show relative risk severity","Hide the actual key risks","List the staff member names"],a:1,e:"히트맵 = 색상으로 위험 심각도 가시화. 함정: 장식·은폐로 오인."},
{id:"066",tp:"Matrix",d:"Hard",q:"Quantitative risk assessment differs from qualitative by using:",o:["Only subjective opinions","Numerical data and probability","No supporting data at all","Color labels and nothing more"],a:1,e:"정량평가 = 수치·확률, 정성평가 = 서술등급. 함정: 두 방식 혼동."},
{id:"067",tp:"Matrix",d:"Medium",q:"A risk matrix helps management to:",o:["Avoid any prioritization","Prioritize limited resources","Ignore all the risks found","Increase the total exposure"],a:1,e:"매트릭스 = 우선순위·자원배분. 함정: 무시·노출증가는 반대."},
{id:"068",tp:"Matrix",d:"Hard",q:"Mapping inherent vs residual risk on a matrix shows:",o:["The marketing reach","Control effectiveness","The staff count","The share price"],a:1,e:"고유 vs 잔여 매핑 = 통제 효과 가시화. 함정: 무관 항목."},
{id:"069",tp:"평가",d:"Hard",q:"Evaluating the risk management framework is a Q6 ('Evaluating') activity that examines:",o:["How to build new rules","Whether RM works effectively","The marketing results","Daily transaction volume"],a:1,e:"Q6 = RM 작동·효과 평가. Q7 = 구축. 함정: Q6/Q7 혼동."},
{id:"070",tp:"평가",d:"Hard",q:"The RM Process evaluation typically covers how many stages?",o:["Two stages","Four stages","Six stages","Eight stages"],a:1,e:"RM Process 평가 = 4단계(식별·측정·대응·모니터링 검토). 함정: 인접 숫자."},
{id:"071",tp:"평가",d:"Hard",q:"Internal control evaluation under POJK 42/2024 checks:",o:["A 3-point list","An 8-point checklist","A 12-point list","A 20-point list"],a:1,e:"내부통제 평가 = 8-point checklist. 함정: 인접 숫자 혼동."},
{id:"072",tp:"평가",d:"Medium",q:"A key output of RM framework evaluation is:",o:["A new marketing plan","Improvement recommendations","A redesigned company logo","Staff performance bonuses only"],a:1,e:"RM 평가 산출 = 개선 권고. 함정: 무관 항목."},
{id:"073",tp:"평가",d:"Hard",q:"Evaluating risk culture maturity assesses whether risk thinking is:",o:["Limited to the risk team","Embedded across the organization","Only on the paper documents","Reviewed once every decade"],a:1,e:"위험문화 성숙도 = 전사 내재화 여부. 함정: 팀한정·서류상·희소검토는 미성숙."},
{id:"074",tp:"평가",d:"Hard",q:"If risk limits are routinely breached without action, the evaluation should find:",o:["A strong control system","Weak limit enforcement","Excellent governance","No issue at all"],a:1,e:"한도 상시위반·무대응 = 한도집행 취약. 함정: '강함'·'무이슈'는 오답."},
{id:"075",tp:"평가",d:"Medium",q:"The purpose of evaluating the RM framework is to:",o:["Assign blame to the staff","Drive continuous improvement","Cut the overall headcount","Increase regulatory fines"],a:1,e:"RM 평가 목적 = 지속 개선. 함정: 비난·감원·벌금은 목적 아님."},
{id:"076",tp:"전략",d:"Hard",q:"Operational risk arises mainly from:",o:["Interest rate movements","Failed processes, people, systems","Currency exchange fluctuations","Stock market price changes"],a:1,e:"운영위험 = 프로세스·인력·시스템·외부사건 실패. 함정: 시장·환위험과 혼동."},
{id:"077",tp:"전략",d:"Hard",q:"Credit risk in a finance company is the risk that:",o:["FX exchange rates will move","A borrower fails to repay","Internal systems will crash","Key staff members will resign"],a:1,e:"신용위험 = 차주 채무불이행. 함정: 시장·운영위험과 혼동."},
{id:"078",tp:"전략",d:"Hard",q:"Liquidity risk for a finance company is the risk of:",o:["A borrower defaulting on debt","Inability to meet obligations due","A serious data breach occurring","A reputational scandal arising"],a:1,e:"유동성위험 = 만기 채무 이행 자금부족. 함정: 신용·운영위험과 혼동."},
{id:"079",tp:"전략",d:"Medium",q:"Market risk relates to losses from:",o:["A borrower's loan default","Movements in market prices/rates","Internal process failures","Legal non-compliance events"],a:1,e:"시장위험 = 금리·환·가격 변동 손실. 함정: 신용·운영위험과 혼동."},
{id:"080",tp:"전략",d:"Hard",q:"Strategic risk arises from:",o:["A single system outage","Poor business decisions/changes","A minor data entry error","Routine staff turnover events"],a:1,e:"전략위험 = 잘못된 의사결정·환경변화 미대응. 함정: 운영적 사건과 혼동."},
{id:"081",tp:"전략",d:"Hard",q:"Reputational risk can be triggered by:",o:["A favorable audit result","Misconduct or service failures","Strong annual profit growth","A successful product launch"],a:1,e:"평판위험 = 부정행위·서비스 실패·규제위반. 함정: 긍정 사건은 트리거 아님."},
{id:"082",tp:"전략",d:"Medium",q:"Concentration risk increases when financing is:",o:["Spread across many sectors","Heavily focused on few obligors","Fully hedged","Backed by collateral"],a:1,e:"집중위험 = 소수 차주·섹터 편중. 함정: 분산·헤지는 반대."},
{id:"083",tp:"Treatment",d:"Hard",q:"Setting up a loan-loss provision is a response to:",o:["Market risk only","Expected credit losses","Operational outages","Reputational damage"],a:1,e:"대손충당 = 예상 신용손실 대응. 함정: 시장·운영위험과 혼동."},
{id:"084",tp:"Treatment",d:"Hard",q:"Requiring collateral on financing primarily mitigates:",o:["Liquidity risk","Credit/default risk","Currency risk","Operational risk"],a:1,e:"담보 = 신용·부도위험 완화. 함정: 유동성·환위험과 혼동."},
{id:"085",tp:"Treatment",d:"Medium",q:"A business continuity plan mainly addresses:",o:["Credit default risk events","Operational disruption risk","Market price movement risk","Tax compliance breach risk"],a:1,e:"BCP = 운영 중단 위험 대응. 함정: 신용·시장위험과 혼동."},
{id:"086",tp:"RiskLimit",d:"Hard",q:"A stop-loss limit is designed to:",o:["Maximize the exposure","Cap potential losses","Remove all controls","Increase leverage"],a:1,e:"Stop-loss = 잠재손실 상한. 함정: 노출극대화·레버리지증가는 반대."},
{id:"087",tp:"RiskLimit",d:"Medium",q:"Concentration limits per sector are intended to:",o:["Increase sector focus","Cap single-sector exposure","Remove diversification","Avoid all lending"],a:1,e:"섹터 한도 = 단일섹터 노출 상한. 함정: 집중강화·분산제거는 반대."},
{id:"088",tp:"Culture",d:"Hard",q:"The 'five pillars' Risk Culture Diagnostic assesses dimensions such as:",o:["Only the profit metrics","Leadership, accountability, communication","Only the audit findings","Only the company share price"],a:1,e:"5 Pillars = 리더십·책임·소통·인식·강화 등 문화 차원. 함정: 재무지표 한정은 오해."},
{id:"089",tp:"GCG",d:"Hard",q:"The risk appetite statement should be approved by:",o:["The marketing team","The BOD and BOC","An external vendor","Individual staff"],a:1,e:"위험선호 선언 = BOD·BOC 승인. 함정: 실무·외부 승인은 거버넌스 위배."},
{id:"090",tp:"평가",d:"Hard",q:"A mature RM framework evaluation should be:",o:["One-off and informal","Systematic and periodic","Based on rumor","Hidden from the BOC"],a:1,e:"RM 평가 = 체계적·정기·문서화. 함정: 일회·비공식·비공개는 부실."},
{id:"091",tp:"전략",d:"Hard",q:"The risk management process AFTER measurement proceeds to:",o:["Identification again","Treatment/response","Final closure","Marketing review"],a:1,e:"측정 후 = 대응(treatment). 식별→측정→대응→모니터링. 함정: 순서 혼동."},
{id:"092",tp:"Treatment",d:"Hard",q:"When treatment cost exceeds the potential loss, the rational choice is to:",o:["Over-mitigate anyway","Accept the residual risk","Always transfer it","Always avoid it"],a:1,e:"대응비용 > 손실 = 합리적 수용. 함정: 과잉대응은 비효율."},
{id:"093",tp:"RiskLimit",d:"Hard",q:"Exceeding the gearing limit of 10x indicates:",o:["Strong efficiency","A prudential breach","An upgrade trigger","A BMPP exemption"],a:1,e:"Gearing 10배 초과 = 건전성 위반. 함정: 효율·면제로 오인."},
{id:"094",tp:"3Lines",d:"Hard",q:"The internal audit function should NOT:",o:["Provide independent assurance","Design the controls it audits","Report to the audit committee","Assess control effectiveness"],a:1,e:"내부감사(3선)는 자신이 감사할 통제를 설계하면 독립성 훼손. 함정: 나머지는 정상 역할."},
{id:"095",tp:"Culture",d:"Hard",q:"Linking risk outcomes to remuneration aims to:",o:["Reward reckless risk-taking behavior","Align incentives with prudent risk","Ignore the risk outcomes entirely","Remove individual accountability"],a:1,e:"위험-보상 연계 = 신중한 위험행동 유도. 함정: 무모함 보상은 반대 설계."},
{id:"096",tp:"GCG",d:"Hard",q:"An effective risk reporting line provides the BOD/BOC with:",o:["Only the favorable positive news","Timely, accurate risk information","Only the latest marketing updates","Competitor market rumor and gossip"],a:1,e:"위험보고 = 적시·정확 정보. 함정: 호재만·무관정보는 부실 보고."},
{id:"097",tp:"평가",d:"Hard",q:"Evaluating control effectiveness compares controls against:",o:["The competitor company brand logos","The risks they are meant to mitigate","The total annual marketing budget","The individual staff birthdays"],a:1,e:"통제 효과 평가 = 대상 위험 대비 적정성. 함정: 무관 기준으로 오도."},
{id:"098",tp:"Treatment",d:"Hard",q:"The MOST appropriate treatment for a catastrophic, high-likelihood risk is usually:",o:["Simple unconditional acceptance","Avoidance or strong mitigation","No action taken at all","Marketing the risk away"],a:1,e:"치명적·고가능성 = 회피 또는 강력 완화. 함정: 단순수용·무대응은 부적절."},
{id:"099",tp:"전략",d:"Hard",q:"Enterprise Risk Management (ERM) differs from siloed risk handling by:",o:["Ignoring most of the known risks","Taking an integrated portfolio view","Removing the risk function entirely","Focusing on just one risk type"],a:1,e:"ERM = 전사 통합 포트폴리오 관점. 함정: 사일로·단일위험과 대조."},
{id:"100",tp:"평가",d:"Hard",q:"Which statement is CORRECT (treatment and Three Lines)?",o:["Insurance is risk avoidance","Insurance is transfer; RM is 2nd line","Mitigation means exiting the business","Internal audit is the first line"],a:1,e:"정답: 보험=전가, 위험관리=2선. 함정: 보험을 회피로, 완화를 철수로, 감사를 1선으로 오인."},
];

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W3_v2";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp;
    cur=0;answers=[];render();return;
  }
  if(mode==='all') quiz=shuffle(BANK);
  else quiz=shuffle(BANK).slice(0,30);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Unit 3 거버넌스·전략·리스크관리 전 범위 완주</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W3-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W3-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W3-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
