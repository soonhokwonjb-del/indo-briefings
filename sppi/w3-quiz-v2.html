<head>

<title>SPPI Level 7 — W3 Quiz V2 (Governance / Strategy / Risk)</title>
<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.topic{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>

<div class="wrap">
  <header>
    <div class="eyebrow">SPPI Level 7 · Financing Management</div>
    <h1>W3 모의문제 V2 — Governance / Strategy / Risk &#9733;</h1>
    <div class="sub">Unit 3 · TARIF · ISO 31000 · 5&#215;5 Matrix · Risk Treatment · Risk Limit 3계층 · POJK 48/42 · 3 Lines · Risk Culture · 100문항 풀 · K6/K7 신규판(2026) 기반</div>

  <div class="panel" id="app"></div>

<script>
const BANK = [
{id:"001",tp:"전략",d:"Hard",q:"A risk management strategy is best defined as:",o:["A marketing plan","A systematic approach to identify, manage, and mitigate potential risks","A profit-maximization scheme","An HR policy"],a:1,e:"위험관리 전략 = 잠재위험 식별·관리·완화의 체계적 접근. 함정: 마케팅·이익·HR과 혼동."},
{id:"002",tp:"전략",d:"Hard",q:"The risk management process typically begins with:",o:["Risk treatment","Risk identification","Risk reporting","Risk acceptance"],a:1,e:"위험관리 시작 = 위험 식별(identification). 이후 평가·처리·모니터링. 함정: treatment·reporting을 시작으로 오인."},
{id:"003",tp:"전략",d:"Hard",q:"Risk APPETITE is determined based on:",o:["The CEO's mood","The company's business strategy","Competitor behavior","Random selection"],a:1,e:"Risk appetite = 회사 사업전략 기반 결정. 함정: 감정·경쟁사·무작위는 오답."},
{id:"004",tp:"전략",d:"Hard",q:"Risk LIMITS are established based on:",o:["Risk appetite and risk tolerance","Marketing budget","Number of employees","Office size"],a:1,e:"Risk limit = risk appetite + risk tolerance 기반. 함정: 예산·인원·규모와 무관."},
{id:"005",tp:"전략",d:"Medium",q:"The distinction between risk appetite and risk tolerance is that:",o:["They are identical","Appetite is the amount of risk willing to pursue; tolerance is the acceptable deviation/boundary","Tolerance is always larger by law","Appetite is set by OJK"],a:1,e:"Appetite = 추구할 위험량, tolerance = 수용가능 편차·경계. 함정: 동일시·법정수치 오인."},
{id:"006",tp:"전략",d:"Hard",q:"Risk culture is developed in accordance with:",o:["The marketing calendar","Applicable procedures and the company's values","Competitor practices only","No procedures"],a:1,e:"위험문화 = 적용 절차·회사 가치에 따라 개발. 함정: 마케팅·경쟁사만은 오답."},
{id:"007",tp:"전략",d:"Hard",q:"Establishing risk appetite is a responsibility primarily of:",o:["Junior staff","The Board (BOD/BOC) and senior management","External vendors","The marketing team"],a:1,e:"Risk appetite 설정 = 이사회·고위경영진 책임. 함정: 하급직·외부·마케팅은 오답."},
{id:"008",tp:"전략",d:"Medium",q:"A risk strategy that is misaligned with the business strategy would likely cause:",o:["Improved performance","Either excessive risk-taking or missed opportunities","Automatic compliance","Lower costs always"],a:1,e:"위험전략-사업전략 불일치 = 과도위험 또는 기회상실. 함정: '개선'·'자동준수'는 오답."},
{id:"009",tp:"전략",d:"Hard",q:"The Risk Strategy Score Card is used to:",o:["Score employees' attendance","Translate risk strategy into measurable indicators for monitoring","Calculate dividends","Rank competitors"],a:1,e:"Risk Strategy Score Card = 위험전략을 측정가능 지표로 전환·모니터링. 함정: 출석·배당·경쟁사는 무관."},
{id:"010",tp:"전략",d:"Hard",q:"Which is the CORRECT sequence of the risk management process?",o:["Treat → Identify → Monitor → Assess","Identify → Assess/Measure → Treat → Monitor & Review","Monitor → Treat → Identify","Report → Identify → Accept"],a:1,e:"위험관리 순서: 식별→평가/측정→처리→모니터링·검토. 함정: 순서 뒤섞기."},
{id:"011",tp:"Treatment",d:"Hard",q:"In risk treatment, 'Avoid' means:",o:["Accepting the risk fully","Eliminating the activity that generates the risk","Buying insurance","Doing nothing"],a:1,e:"Avoid = 위험 발생 활동 자체 제거·중단. 함정: accept(수용)·transfer(이전)와 혼동."},
{id:"012",tp:"Treatment",d:"Hard",q:"Risk 'Transfer' is typically achieved by:",o:["Ignoring the risk","Shifting the financial consequence to a third party (e.g., insurance)","Stopping the business","Accepting it internally"],a:1,e:"Transfer = 재무결과를 제3자로 이전(예: 보험). 함정: avoid·accept와 혼동."},
{id:"013",tp:"Treatment",d:"Hard",q:"For a minor operational risk below IDR 100 million, the textbook example treatment is:",o:["Avoid the activity","Transfer to insurer","Accept (no action) given immateriality","Escalate to OJK"],a:2,e:"경미 운영위험(<IDR 100백만) = Accept(무조치). 함정: 사소한 위험에 avoid·transfer는 비용비효율 — textbook 사례."},
{id:"014",tp:"Treatment",d:"Hard",q:"The four primary risk treatment options are:",o:["Avoid, Transfer, Mitigate/Reduce, Accept","Buy, Sell, Hold, Trade","Plan, Do, Check, Act","Hire, Fire, Train, Promote"],a:0,e:"위험처리 4선택: Avoid·Transfer·Mitigate(Reduce)·Accept. 함정: PDCA·매매용어와 혼동."},
{id:"015",tp:"Treatment",d:"Medium",q:"'Mitigate/Reduce' as a treatment means:",o:["Eliminating the activity","Implementing controls to lower the likelihood or impact of the risk","Transferring to insurer","Accepting with no action"],a:1,e:"Mitigate = 통제로 발생가능성·영향 축소. 함정: avoid(제거)·transfer(이전)·accept(무조치)와 구분."},
{id:"016",tp:"Treatment",d:"Hard",q:"Choosing a risk treatment should be based on:",o:["The cheapest option always","A cost-benefit analysis weighing the treatment cost against risk reduction","The CEO's preference","Random choice"],a:1,e:"처리 선택 = 처리비용 vs 위험감소의 비용편익 분석. 함정: 최저가·선호·무작위는 부적절."},
{id:"017",tp:"Treatment",d:"Hard",q:"After applying a treatment, the remaining risk is called:",o:["Inherent risk","Residual risk","Transferred risk","Avoided risk"],a:1,e:"처리 후 잔여 = residual risk. 처리 전 = inherent risk. 함정: inherent/residual 혼동."},
{id:"018",tp:"Treatment",d:"Medium",q:"Inherent risk differs from residual risk in that inherent risk is:",o:["The risk after controls","The risk BEFORE any controls/treatment is applied","Always zero","Only operational"],a:1,e:"Inherent = 통제 적용 전 위험. residual = 후. 함정: 정의 역전."},
{id:"019",tp:"Treatment",d:"Hard",q:"If residual risk still exceeds the risk appetite after treatment, the company should:",o:["Ignore it","Apply additional treatment or escalate for a risk acceptance decision by appropriate authority","Hide it","Increase the appetite arbitrarily"],a:1,e:"잔여위험 > appetite = 추가처리 또는 적정권한자 수용결정 에스컬레이션. 함정: 무시·은폐·자의적 상향은 부적절."},
{id:"020",tp:"RiskLimit",d:"Hard",q:"Risk limits serve primarily to:",o:["Maximize risk-taking","Operationalize risk appetite by setting concrete boundaries (e.g., exposure caps)","Eliminate all risk","Replace the BOD"],a:1,e:"Risk limit = appetite를 구체 경계(노출한도 등)로 운영화. 함정: 위험극대화·완전제거는 양극단."},
{id:"021",tp:"RiskLimit",d:"Hard",q:"The BMPP (single 20% / group 50% of equity) is an example of a:",o:["Marketing target","Regulatory concentration risk limit","Gearing ratio","Dividend cap"],a:1,e:"BMPP = 규제상 집중위험 한도. 함정: gearing·배당과 혼동."},
{id:"022",tp:"RiskLimit",d:"Hard",q:"The maximum gearing ratio of 10x functions as a:",o:["Profit target","Leverage/solvency risk limit","Liquidity ratio","Marketing KPI"],a:1,e:"Gearing 10배 = 레버리지·지급여력 위험 한도. 함정: 이익목표·유동성비율과 혼동."},
{id:"023",tp:"RiskLimit",d:"Medium",q:"A breach of an established risk limit should trigger:",o:["No action","Escalation, review, and corrective action per the risk framework","A celebration","Immediate dividend payment"],a:1,e:"한도 위반 = 에스컬레이션·검토·시정. 함정: 무조치·무관행동은 부적절."},
{id:"024",tp:"RiskLimit",d:"Hard",q:"Risk limits should be reviewed:",o:["Never once set","Periodically and when business strategy or conditions materially change","Only when OJK forces it","Daily without exception"],a:1,e:"한도 검토 = 정기 + 전략·상황 중대변화 시. 함정: 불변·강제시한정·매일은 비현실."},
{id:"025",tp:"RiskLimit",d:"Hard",q:"Setting risk limits too HIGH relative to capacity risks:",o:["Better compliance","Excessive exposure and potential breaches of prudential requirements","Lower returns guaranteed","No effect"],a:1,e:"역량 대비 과도한 한도 = 과잉노출·건전성요건 위반 위험. 함정: '준법개선'은 오답."},
{id:"026",tp:"RiskLimit",d:"Hard",q:"The relationship between risk appetite, tolerance, and limits is BEST expressed as:",o:["They are unrelated","Appetite (strategic willingness) → Tolerance (acceptable variation) → Limits (operational caps)","Limits set appetite","Tolerance overrides limits"],a:1,e:"Appetite(전략적 의향)→Tolerance(허용편차)→Limit(운영 한도) 위계. 함정: 인과 역전."},
{id:"027",tp:"RiskLimit",d:"Medium",q:"Exposure limits to a single counterparty primarily control:",o:["Market risk","Concentration/credit risk","Operational risk","Liquidity risk"],a:1,e:"단일 거래상대 노출한도 = 집중·신용위험 통제. 함정: 시장·운영·유동성과 혼동."},
{id:"028",tp:"RiskLimit",d:"Hard",q:"Which limit type would address the risk of funding long-term assets with short-term liabilities?",o:["Credit concentration limit","Liquidity/maturity-mismatch limit","Foreign director limit","Dividend limit"],a:1,e:"장단기 불일치 = 유동성·만기불일치 한도. 함정: 신용·인사·배당 한도와 혼동."},
{id:"029",tp:"RiskLimit",d:"Hard",q:"A company sets a risk limit but never monitors compliance with it. This represents:",o:["Effective risk management","A control gap — limits without monitoring are ineffective","Best practice","Regulatory excellence"],a:1,e:"한도 설정 후 미모니터링 = 통제공백(한도만으로는 무의미). 함정: '효과적'으로 오인."},
{id:"030",tp:"RiskLimit",d:"Hard",q:"The 17.5% financing acquisition cost cap (per contract income) functions as a:",o:["Concentration limit","Cost/efficiency-related prudential limit","Gearing limit","Capital limit"],a:1,e:"17.5% acquisition cap = 비용·효율 관련 건전성 한도(계약수입 기준). 함정: BMPP(집중)·gearing과 혼동 — 기준·목적 다름."},
{id:"031",tp:"Culture",d:"Hard",q:"The Risk Culture Diagnostic uses how many pillars in the framework referenced?",o:["3 pillars","5 pillars","7 pillars","10 pillars"],a:1,e:"Risk Culture Diagnostic = 5 Pillars. 함정: 인접 숫자 혼동."},
{id:"032",tp:"Culture",d:"Hard",q:"Risk culture is best described as:",o:["A written policy only","The shared values, attitudes, and behaviors regarding risk throughout the organization","The risk department's headcount","A software system"],a:1,e:"위험문화 = 조직 전반의 위험 관련 공유 가치·태도·행동. 함정: 정책·인원·시스템으로 환원 오류."},
{id:"033",tp:"Culture",d:"Medium",q:"A strong risk culture is indicated by:",o:["Concealing risk information","Open escalation of risks and accountability at all levels","Punishing those who report risks","Ignoring near-misses"],a:1,e:"강한 위험문화 = 위험 공개 에스컬레이션·전 계층 답책. 함정: 은폐·보복·무시는 약한 문화."},
{id:"034",tp:"Culture",d:"Hard",q:"The 'tone from the top' in risk culture means leadership:",o:["Delegates all risk decisions downward","Visibly champions risk management and sets the example","Ignores risk for growth","Hides risk appetite"],a:1,e:"Tone from the top = 경영진이 위험관리를 가시적으로 옹호·모범. 함정: 위임·무시·은폐는 약화."},
{id:"035",tp:"Culture",d:"Hard",q:"Which is a pillar/dimension assessed in a risk culture diagnostic?",o:["Office aesthetics","Leadership & tone, accountability, communication, incentives, and risk awareness","Competitor logos","Lunch quality"],a:1,e:"위험문화 진단 차원: 리더십·답책·소통·인센티브·위험인식 등. 함정: 무관항목으로 오도."},
{id:"036",tp:"Culture",d:"Medium",q:"Misaligned incentives (e.g., rewarding volume regardless of risk) typically:",o:["Strengthen risk culture","Encourage excessive risk-taking and undermine risk culture","Have no effect","Improve compliance"],a:1,e:"위험 무시한 물량보상 = 과도위험 조장, 위험문화 훼손. 함정: '강화'·'무효과'는 오답."},
{id:"037",tp:"Culture",d:"Hard",q:"A risk-aware employee who identifies a potential risk should:",o:["Stay silent to avoid trouble","Escalate it through proper channels","Hide it from management","Wait for the annual review"],a:1,e:"위험인식 직원 = 정상채널 에스컬레이션. 함정: 침묵·은폐·지연은 약한 문화 징후."},
{id:"038",tp:"Culture",d:"Hard",q:"Embedding risk culture across the organization requires:",o:["Only a one-time memo","Consistent leadership messaging, training, aligned incentives, and accountability","Outsourcing culture","Ignoring middle management"],a:1,e:"위험문화 내재 = 일관 리더십·교육·정렬 인센티브·답책. 함정: 일회·외주·중간관리 배제는 실패."},
{id:"039",tp:"Culture",d:"Medium",q:"The risk culture diagnostic's purpose is to:",o:["Set salaries","Assess strengths and weaknesses of the risk culture to guide improvement","Approve loans","Replace internal audit"],a:1,e:"위험문화 진단 목적 = 강·약점 평가 → 개선 지침. 함정: 급여·여신·감사대체는 무관."},
{id:"040",tp:"GCG",d:"Hard",q:"Good Corporate Governance for risk oversight requires the BOC to:",o:["Manage daily risk operations","Provide independent supervision of the risk management framework and BOD's risk decisions","Take maximum risk","Avoid all risk discussions"],a:1,e:"GCG 위험감독 = BOC의 위험관리 체계·BOD 위험결정 독립감독. 함정: 일상운영·위험극대화·회피는 오답."},
{id:"041",tp:"GCG",d:"Hard",q:"The Risk Management Committee typically:",o:["Executes trades","Assists the BOC/BOD in overseeing the risk management framework and policies","Does the marketing","Handles payroll"],a:1,e:"위험관리위원회 = BOC/BOD의 위험체계·정책 감독 보조. 함정: 매매·마케팅·급여는 무관."},
{id:"042",tp:"GCG",d:"Hard",q:"GCG's five principles (TARIF) applied to risk management mean, for 'Transparency':",o:["Hiding risk exposures","Clear, timely disclosure of material risks to stakeholders","Secret risk policies","Verbal-only risk reports"],a:1,e:"Transparency = 중대위험의 명확·적시 공시. 함정: 은폐·비밀·구두는 위배."},
{id:"043",tp:"GCG",d:"Medium",q:"Segregation of duties is a governance control that:",o:["Concentrates all power in one person","Separates incompatible functions to prevent fraud and error","Slows everything unnecessarily","Eliminates the need for audit"],a:1,e:"직무분리 = 양립불가 기능 분리 → 부정·오류 방지. 함정: 권한집중·감사불요는 오답."},
{id:"044",tp:"GCG",d:"Hard",q:"The independence of the Risk Management function from risk-taking units is important because:",o:["It allows the function to take risks","It enables objective risk assessment free from business-line bias","It removes accountability","It is merely formal"],a:1,e:"위험관리 독립성 = 영업라인 편향 없는 객관적 위험평가. 함정: 위험감수·책임제거는 오답."},
{id:"045",tp:"GCG",d:"Hard",q:"Which governance organ has ULTIMATE responsibility for the company's risk management?",o:["The marketing team","The Board of Directors (with BOC oversight)","External auditors","Individual customers"],a:1,e:"위험관리 최종책임 = 이사회(BOD), BOC 감독. 함정: 마케팅·외부감사·고객은 오답."},
{id:"046",tp:"GCG",d:"Hard",q:"A conflict of interest in risk decisions should be:",o:["Encouraged for efficiency","Disclosed and managed (e.g., recusal) to preserve objectivity","Hidden","Rewarded"],a:1,e:"이해상충 = 공개·관리(회피 등)로 객관성 유지. 함정: 장려·은폐·보상은 위배."},
{id:"047",tp:"GCG",d:"Medium",q:"Effective risk governance requires reporting lines that:",o:["Keep risk info from the board","Ensure risk information flows to the BOD/BOC for informed oversight","Stop at middle management","Bypass governance"],a:1,e:"위험 거버넌스 = 위험정보가 BOD/BOC로 흐르도록. 함정: 차단·중간정지·우회는 오답."},
{id:"048",tp:"위원회",d:"Hard",q:"The Audit Committee primarily assists the BOC in overseeing:",o:["Marketing campaigns","Financial reporting integrity, internal control, and the internal/external audit function","Product pricing","Office leases"],a:1,e:"감사위원회 = 재무보고 무결성·내부통제·감사기능 감독 보조. 함정: 마케팅·가격·임차는 무관."},
{id:"049",tp:"위원회",d:"Hard",q:"The Risk Monitoring Committee differs from the Risk Management function in that the committee:",o:["Executes day-to-day risk controls","Provides board-level oversight, while the function performs operational risk management","Is part of the first line","Does the marketing"],a:1,e:"위험감시위원회 = 이사회급 감독, 위험관리기능 = 운영적 위험관리. 함정: 위원회를 1선·실무로 오인."},
{id:"050",tp:"위원회",d:"Medium",q:"Committees under the BOC strengthen governance by:",o:["Duplicating the BOD","Providing focused, expert oversight of specific areas (audit, risk, nomination/remuneration)","Replacing the OJK","Taking over operations"],a:1,e:"BOC 산하 위원회 = 특정 영역(감사·위험·지명보수) 전문 감독. 함정: BOD 중복·OJK 대체는 오답."},
{id:"051",tp:"위원회",d:"Hard",q:"The Nomination and Remuneration Committee's role in risk governance includes:",o:["Setting interest rates","Ensuring remuneration structures do not incentivize excessive risk-taking","Approving loans","Conducting audits"],a:1,e:"지명보수위원회 = 보상구조가 과도위험을 조장하지 않도록 보장. 함정: 금리·여신·감사는 타 기능."},
{id:"052",tp:"위원회",d:"Hard",q:"Members of the Audit Committee should ideally be:",o:["All from the marketing team","Independent and possessing relevant financial/accounting expertise","Chosen randomly","The CEO's relatives"],a:1,e:"감사위원 = 독립적 + 재무·회계 전문성. 함정: 마케팅·무작위·연고는 독립성·전문성 훼손."},
{id:"053",tp:"위원회",d:"Medium",q:"Committee meeting minutes serve to:",o:["Hide decisions","Document discussions, decisions, and follow-up for accountability and audit trail","Replace the BOD","Market the company"],a:1,e:"위원회 회의록 = 논의·결정·후속 문서화(답책·감사추적). 함정: 은폐·대체·마케팅은 오답."},
{id:"054",tp:"위원회",d:"Hard",q:"If the Risk Committee identifies a control weakness, the appropriate response is to:",o:["Conceal it","Report to the BOC/BOD and ensure remediation is tracked to completion","Reward the responsible unit","Ignore until next year"],a:1,e:"통제약점 발견 = BOC/BOD 보고 + 시정 완료까지 추적. 함정: 은폐·보상·지연은 부적절."},
{id:"055",tp:"3Lines",d:"Hard",q:"In the Three Lines Model applied to risk, the SECOND line (risk management & compliance) primarily:",o:["Owns and takes the risk","Provides frameworks, oversight, and challenge to the first line","Performs independent audit","Sets the dividend"],a:1,e:"2선 = 체계·감독·1선에 대한 challenge 제공. 함정: 위험소유(1선)·감사(3선)와 혼동."},
{id:"056",tp:"3Lines",d:"Hard",q:"The internal audit (3rd line) provides assurance on:",o:["Only the marketing budget","The effectiveness of governance, risk management, and internal controls","Only profits","Competitor strategy"],a:1,e:"3선 내부감사 = 거버넌스·위험관리·내부통제 효과성 보증. 함정: 단일항목 한정은 협소."},
{id:"057",tp:"3Lines",d:"Medium",q:"A common failure is when the second line:",o:["Maintains challenge and independence","Becomes a 'rubber stamp' that approves first-line decisions without real challenge","Reports to the BOC","Provides oversight"],a:1,e:"2선 실패 = 실질 challenge 없이 1선 결정을 '고무도장' 승인. 함정: 나머지는 정상."},
{id:"058",tp:"3Lines",d:"Hard",q:"Internal audit's independence is compromised if it:",o:["Reports functionally to the audit committee","Audits a process it designed or operated","Is objective","Follows a risk-based audit plan"],a:1,e:"내부감사 독립성 훼손 = 자신이 설계·운영한 프로세스를 감사(self-review). 함정: 나머지는 독립성 보장 요소."},
{id:"059",tp:"3Lines",d:"Hard",q:"The governing body (BOD/BOC) in the Three Lines Model is responsible for:",o:["Executing controls daily","Overall accountability, setting objectives, and ensuring the framework's adequacy","Doing fieldwork audits","Selling products"],a:1,e:"지배기구 = 전체 답책·목표설정·체계 적정성 보장. 함정: 일상통제·감사실무·영업은 타 역할."},
{id:"060",tp:"Matrix",d:"Hard",q:"A risk matrix (heat map) plots risks by:",o:["Color preference","Likelihood (probability) against Impact (severity)","Employee names","Alphabetical order"],a:1,e:"위험 매트릭스 = 발생가능성 × 영향(심각도). 함정: 무관 기준으로 오도."},
{id:"061",tp:"Matrix",d:"Hard",q:"A risk in the HIGH likelihood / HIGH impact quadrant should be:",o:["Accepted with no action","Prioritized for immediate treatment/mitigation","Ignored","Rewarded"],a:1,e:"고가능성·고영향 = 즉시 처리·완화 최우선. 함정: 수용·무시는 위험."},
{id:"062",tp:"Matrix",d:"Medium",q:"A risk with LOW likelihood and LOW impact is typically:",o:["Escalated to the BOD urgently","Accepted or monitored with minimal resources","Treated as the top priority","Transferred at high cost"],a:1,e:"저가능성·저영향 = 수용·최소 모니터링. 함정: 긴급에스컬레이션·최우선은 자원낭비."},
{id:"063",tp:"Matrix",d:"Hard",q:"The risk matrix supports decision-making by:",o:["Replacing judgment entirely","Providing a structured, visual prioritization of risks for resource allocation","Hiding risks","Eliminating the need for treatment"],a:1,e:"위험 매트릭스 = 구조화·시각적 우선순위화 → 자원배분. 함정: 판단대체·은폐·처리불요는 오답."},
{id:"064",tp:"Matrix",d:"Hard",q:"A residual risk plotted on the matrix that remains in the HIGH/HIGH zone after treatment indicates:",o:["Treatment was fully effective","Treatment was insufficient; further action or acceptance decision is needed","No further attention required","The matrix is wrong"],a:1,e:"처리 후에도 고/고 잔존 = 처리 불충분, 추가조치·수용결정 필요. 함정: '효과적'·'무관심'은 오답."},
{id:"065",tp:"평가",d:"Hard",q:"Evaluating the risk management framework (Q6 perspective) involves assessing whether:",o:["Profits increased only","The framework is adequately designed AND operating effectively","Marketing improved","The logo is modern"],a:1,e:"위험체계 평가(Q6) = 설계 적정성 + 운영 효과성. 함정: 이익·마케팅·외형은 무관."},
{id:"066",tp:"평가",d:"Hard",q:"The internal control evaluation per POJK 42/2024 uses how many key checkpoints in the referenced checklist?",o:["3-point","8-point","12-point","20-point"],a:1,e:"POJK 42/2024 내부통제 점검 = 8-point checklist. 함정: 인접 숫자 혼동."},
{id:"067",tp:"평가",d:"Hard",q:"The RM (Risk Management) Process evaluation referenced uses how many stages?",o:["2-stage","4-stage","6-stage","8-stage"],a:1,e:"RM Process 평가 = 4-stage. 함정: 6 evaluation steps(별개)와 혼동."},
{id:"068",tp:"평가",d:"Hard",q:"The risk/compliance evaluation framework referenced uses how many evaluation steps?",o:["Three steps","Six steps","Ten steps","Two steps"],a:1,e:"평가 = six evaluation steps. 함정: 4-stage RM Process와 숫자 혼동 유도."},
{id:"069",tp:"평가",d:"Medium",q:"An effective evaluation of risk management should be:",o:["Subjective and undocumented","Objective, evidence-based, and documented","Based on hearsay","Hidden from governance"],a:1,e:"위험관리 평가 = 객관·증거기반·문서화. 함정: 주관·소문·비공개는 부실."},
{id:"070",tp:"평가",d:"Hard",q:"If the evaluation finds that risk limits exist but are routinely breached without consequence, this indicates:",o:["Strong risk governance","Weak enforcement and accountability gaps","Optimal flexibility","Excellent culture"],a:1,e:"한도 존재하나 무처벌 상시위반 = 집행 취약·답책 공백. 함정: '유연성'·'우수'는 오답."},
{id:"071",tp:"전략",d:"Hard",q:"Risk appetite should be expressed in a way that is:",o:["Vague and qualitative only","Both qualitative (statements) and quantitative (measurable metrics/limits) where possible","Secret from staff","Changed daily"],a:1,e:"Risk appetite = 정성(서술) + 정량(측정지표·한도) 병행. 함정: 모호·비밀·일변동은 부적절."},
{id:"072",tp:"전략",d:"Hard",q:"Stress testing within risk management is used to:",o:["Test employee fitness","Assess the company's resilience under severe but plausible adverse scenarios","Market products","Calculate dividends"],a:1,e:"스트레스 테스트 = 심각하나 개연적 역경 시나리오 하 회복력 평가. 함정: 직원·마케팅·배당은 무관."},
{id:"073",tp:"Culture",d:"Hard",q:"The five pillars of the risk culture diagnostic collectively aim to assess:",o:["Only leadership","The holistic state of risk culture across leadership, accountability, communication, awareness, and behavior dimensions","Only IT systems","Profit margins"],a:1,e:"5 Pillars = 리더십·답책·소통·인식·행동 전반의 위험문화 총체 평가. 함정: 단일 차원·재무로 환원 오류."},
{id:"074",tp:"GCG",d:"Hard",q:"The 'four eyes principle' in risk governance means:",o:["Hiring people with good eyesight","Requiring at least two persons to approve significant decisions/transactions","Doubling the audit fee","Monitoring CCTV"],a:1,e:"Four-eyes = 중요 결정·거래에 최소 2인 승인 요구. 함정: 동음이의·CCTV 함정."},
{id:"075",tp:"Treatment",d:"Hard",q:"A company facing a high regulatory-compliance risk on a non-core activity might best choose to:",o:["Accept the risk and continue","Avoid (exit the activity) if the risk outweighs the benefit","Transfer it to customers","Ignore it"],a:1,e:"비핵심 활동의 고규제위험 = 편익 대비 위험 크면 Avoid(철수). 함정: accept·전가·무시는 부적절 — 처리선택 적용 판단."},
{id:"076",tp:"RiskLimit",d:"Hard",q:"Which sequence correctly links the concepts from broad to specific?",o:["Risk limit → Risk tolerance → Risk appetite","Risk appetite → Risk tolerance → Risk limit","Risk tolerance → Risk limit → Risk appetite","All are the same level"],a:1,e:"Appetite(넓음)→Tolerance→Limit(구체). 함정: 순서 역전 — 위계 식별 핵심."},
{id:"077",tp:"전략",d:"Hard",q:"A finance company's risk strategy should be APPROVED by:",o:["The marketing manager","The Board (BOD) with BOC oversight","An external vendor","Individual loan officers"],a:1,e:"위험전략 승인 = BOD(BOC 감독). 함정: 실무·외부·개인은 권한 밖."},
{id:"078",tp:"평가",d:"Hard",q:"When evaluating internal control per the 8-point checklist, a key dimension is:",o:["Office decoration","Control environment, risk assessment, control activities, information & communication, and monitoring",  "Marketing reach","Number of branches only"],a:1,e:"내부통제 평가 = 통제환경·위험평가·통제활동·정보소통·모니터링(COSO형). 함정: 외형·마케팅·지점수는 무관."},
{id:"079",tp:"평가",d:"Hard",q:"The four stages of the RM Process evaluation would logically cover:",o:["Only identification","Identification, assessment, treatment, and monitoring & review stages","Only reporting","Only marketing"],a:1,e:"RM Process 4단계 = 식별·평가·처리·모니터링·검토. 함정: 단일단계 한정은 불완전."},
{id:"080",tp:"Matrix",d:"Hard",q:"In a 5x5 risk matrix, a risk rated likelihood 4 / impact 5 would be classified as:",o:["Low risk","High/extreme risk requiring priority treatment","Negligible","Already resolved"],a:1,e:"가능성4·영향5 = 고/극단 위험, 우선처리. 함정: 'low'·'negligible'은 명백 오답."},
{id:"081",tp:"GCG",d:"Hard",q:"The principle of 'Fairness' (TARIF) in risk governance requires:",o:["Favoring controlling shareholders","Equitable treatment of all stakeholders including minority shareholders","Ignoring minority interests","Secret related-party deals"],a:1,e:"Fairness = 소수주주 포함 모든 이해관계자 공정대우. 함정: 지배주주 편향·비밀거래는 위배."},
{id:"082",tp:"위원회",d:"Hard",q:"The frequency of risk/audit committee meetings should be:",o:["Once every five years","Regular and sufficient to discharge oversight duties (e.g., periodically per charter)","Never","Only when a crisis occurs"],a:1,e:"위원회 회의 빈도 = 감독의무 수행에 충분한 정기성(헌장 기준). 함정: 5년주기·위기시만은 감독 공백."},
{id:"083",tp:"Culture",d:"Hard",q:"Which scenario best demonstrates a WEAK risk culture?",o:["Staff escalate concerns and are heard","A near-miss is concealed to avoid blame, and no lessons are captured","Incentives align with prudent risk-taking","Leadership models risk awareness"],a:1,e:"약한 위험문화 = 비난회피 위해 near-miss 은폐, 교훈 미포착. 함정: 나머지는 강한 문화."},
{id:"084",tp:"Treatment",d:"Hard",q:"Why is 'Accept' an appropriate treatment for some risks?",o:["All risks must be eliminated","When the cost of treatment exceeds the benefit and the risk is within appetite","Acceptance is never appropriate","Only the OJK can accept risk"],a:1,e:"Accept 적절 = 처리비용>편익 + 위험이 appetite 내일 때. 함정: 전부제거·수용불가는 비현실."},
{id:"085",tp:"3Lines",d:"Hard",q:"Coordination among the three lines should aim to:",o:["Blur all responsibilities","Avoid gaps and unnecessary duplication while preserving independence","Merge all into one line","Eliminate the second line"],a:1,e:"3선 조정 = 공백·중복 회피(독립성 유지). 함정: 책임모호·병합·제거는 모델 훼손."},
{id:"086",tp:"평가",d:"Hard",q:"An evaluation concluding that the risk framework is 'well-designed but poorly operated' means:",o:["No action needed","Design is adequate but implementation/effectiveness is deficient — operational remediation required","The design must be scrapped","Everything is fine"],a:1,e:"설계 양호·운영 부실 = 이행·효과성 결함, 운영 시정 필요. 함정: '무조치'·'폐기'는 양극단 오답."},
{id:"087",tp:"전략",d:"Hard",q:"Risk appetite statements should be reviewed and reaffirmed:",o:["Never","Periodically (e.g., annually) and upon significant strategic/environmental change","Only by the OJK","Daily"],a:1,e:"Risk appetite = 정기(연간 등) + 중대 전략·환경 변화 시 재확인. 함정: 불변·OJK한정·매일은 부적절."},
{id:"088",tp:"GCG",d:"Hard",q:"The CISO/risk function reporting directly to the BOC (not just the CEO) strengthens:",o:["Marketing","Independence and the ability to escalate without operational interference","Sales","Cost-cutting"],a:1,e:"위험기능의 BOC 직접보고 = 독립성·운영간섭 없는 에스컬레이션 강화. 함정: 마케팅·영업·비용은 무관."},
{id:"089",tp:"위원회",d:"Medium",q:"An effective committee charter should define:",o:["The lunch menu","Purpose, authority, composition, responsibilities, and reporting","Only the chairperson's name","Marketing slogans"],a:1,e:"위원회 헌장 = 목적·권한·구성·책임·보고. 함정: 무관·단편 정보."},
{id:"090",tp:"Matrix",d:"Hard",q:"Mapping inherent risk vs residual risk on the matrix helps visualize:",o:["Nothing useful","The effectiveness of controls/treatment (the reduction from inherent to residual)","Employee satisfaction","Market share"],a:1,e:"inherent vs residual 매핑 = 통제·처리 효과성(감소폭) 시각화. 함정: 무관·만족도·점유율은 오답."},
{id:"091",tp:"전략",d:"Hard",q:"A key indicator that risk appetite is too AGGRESSIVE relative to capacity is:",o:["Comfortable capital buffers","Frequent breaches of prudential limits and capital strain","Stable NPF","Low gearing"],a:1,e:"과도한 risk appetite 징후 = 건전성한도 빈번 위반·자본 압박. 함정: 나머지는 건전 징후."},
{id:"092",tp:"Culture",d:"Hard",q:"Linking risk culture to incentive structures means:",o:["Rewarding only short-term volume","Designing incentives that reward prudent, risk-adjusted performance","Ignoring risk in bonuses","Punishing all risk-taking"],a:1,e:"위험문화-인센티브 연계 = 위험조정 성과 보상. 함정: 단기물량·위험무시·전면처벌은 부적절."},

{id:"094",tp:"평가",d:"Hard",q:"The six evaluation steps and the four-stage RM process differ in that:",o:["They are identical","The six steps describe the evaluation methodology; the four stages describe the RM process being evaluated",  "Both have ten steps","Neither exists"],a:1,e:"6 evaluation steps = 평가 방법론, 4-stage = 평가 대상인 RM 프로세스. 함정: 두 숫자·개념 혼동 — 구분 핵심."},

];

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W3_v2";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp;
    cur=0;answers=[];render();return;
  }
  if(mode==='all') quiz=shuffle(BANK);
  else quiz=shuffle(BANK).slice(0,30);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Unit 3 거버넌스·전략·리스크관리 전 범위 완주</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W3-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W3-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W3-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
