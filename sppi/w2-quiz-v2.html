<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPPI Level 7 — W2 Quiz V2 (Unit 1 Business Plan + Unit 2 Compliance)</title>
<style>
  :root{
    --ink:#1a2238; --paper:#f7f5ef; --line:#d8d3c4;
    --gold:#b8893a; --gold-soft:#e8dcc0;
    --green:#2f6b4f; --red:#a33a2e; --blue:#2f5170;
    --shadow:0 1px 0 rgba(26,34,56,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--paper); color:var(--ink);
    line-height:1.6; padding:24px 16px 80px;
  }
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.unit{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>
</head>

<div class="wrap">
  <header>
    <div class="eyebrow">SPPI Level 7 · Financing Management</div>
    <h1>W2 모의문제 V2 — Business Plan & Compliance</h1>
    <div class="sub">Unit 1 Business Plan · Unit 2 Compliance & Compliance Culture · 100문항 풀 · K6/K7 신규판(2026) + Day1 신규판 기반</div>
  </header>
  <div class="panel" id="app"></div>
  <footer>출처: A to Z in Finance Company Business (Day 1) / Training Module Qualification Level 6·7 (Day 2)</footer>
</div>

<script>
const BANK = [
{id:"001",tp:"BP구성",d:"Hard",q:"The Business Plan (RBB) of a finance company is prepared in accordance with:",o:["POJK 46/2024 and SEOJK 20/2025","POJK 24/2019 and SEOJK 23/2019","POJK 12/2017 and SEOJK 8/2023","POJK 43/2024 and SEOJK 19/2025"],a:1,e:"BP = POJK 24/2019 + SEOJK 23/2019. 함정: 46(사업운영)·12(AML)·43(HR)은 별개."},
{id:"002",tp:"BP구성",d:"Hard",q:"Which Circular Letter supplements the Business Plan regulation?",o:["SEOJK 23/SEOJK.05/2019","SEOJK 20/SEOJK.07/2025","SEOJK 1/SEOJK.07/2014","SEOJK 13/SEOJK.07/2014"],a:0,e:"SEOJK 23/2019 = BP 보완. 함정: 소비자보호 계열 SEOJK와 혼동."},
{id:"003",tp:"BP구성",d:"Medium",q:"The primary purpose of the Business Plan is to:",o:["Replace the annual financial statements","Harmonize business needs with compliance","Eliminate the risk management function","Satisfy only the tax authorities"],a:1,e:"BP = 사업수요-규제준수 조화·장기가치. 함정: 재무제표 대체·세무목적은 오해."},
{id:"004",tp:"BP구성",d:"Hard",q:"'Developing a Business Plan' (K.64PBY91.001.1) reflects which perspective?",o:["Q6 Evaluating","Q7 Developing","Q5 Reporting","Neither Q6 nor Q7"],a:1,e:"Developing = Q7. Evaluating = Q6. 함정: Q6/Q7 swap 빈출."},
{id:"005",tp:"BP구성",d:"Hard",q:"'Evaluating a Business Plan' (K.64PBY91.003.1) reflects which perspective?",o:["Q7 Developing","Q6 Evaluating","Q5 Reporting","Both equally"],a:1,e:"Evaluating = Q6. 함정: 동일 BP 주제라도 develop(Q7)/evaluate(Q6) 분기."},
{id:"006",tp:"BP구성",d:"Medium",q:"In a competency unit, 'KSA' stands for:",o:["Knowledge, skills, attitudes","Key strategic assets","Knowledge, scale, audit","Key safety actions"],a:0,e:"KSA = 지식·기술·업무태도. 함정: 유사 약어로 오인."},
{id:"007",tp:"BP구성",d:"Hard",q:"'Transfer Skills' in the competency framework means:",o:["Transferring funds between accounts","Solving problems in new contexts","Transferring employees between units","Transferring risk to insurers"],a:1,e:"Transfer Skills = 새 맥락 문제해결. 함정: 자금이체·리스크 transfer 동음이의."},
{id:"008",tp:"BP보고",d:"Hard",q:"A recognized BENEFIT of evaluating a Business Plan is:",o:["Guaranteeing zero future losses","Early detection of deviations","Avoiding all OJK reporting","Eliminating market competition"],a:1,e:"BP 평가 편익 = 편차 조기식별·시정. 함정: 무손실 보장·보고회피는 비현실."},
{id:"009",tp:"BP보고",d:"Medium",q:"The Business Plan is subject to which OJK interaction?",o:["No interaction is required","Submission and supervisory review","Approval by industry competitors","Publication in newspapers"],a:1,e:"BP = OJK 제출·감독검토. 함정: 무제출·경쟁사 승인은 오답."},
{id:"010",tp:"BP보고",d:"Hard",q:"When actual performance deviates materially from the plan, the company should first:",o:["Ignore it entirely until year-end","Analyze and prepare corrective action","Cancel and discard the whole plan","Replace the entire senior management"],a:1,e:"중대 편차 = 원인분석·시정. 함정: 무시·전면취소는 부적절."},
{id:"011",tp:"BP보고",d:"Medium",q:"A realistic Business Plan should be grounded in:",o:["Purely optimistic best-case assumptions","Reasonable, market-consistent assumptions","Confidential leaked competitor secrets","Randomly chosen arbitrary projections"],a:1,e:"현실적 BP = 시장부합 합리적 가정. 함정: 낙관일변도는 신뢰성 훼손."},
{id:"012",tp:"전략분석",d:"Hard",q:"A SWOT analysis examines:",o:["Only external market factors","Internal S/W and external O/T","Only internal financial ratios","Only direct competitors"],a:1,e:"SWOT = 내부(S/W)+외부(O/T). 함정: 한쪽만으로 한정 오인."},
{id:"013",tp:"전략분석",d:"Hard",q:"Aligning risk appetite with the Business Plan ensures that:",o:["The company takes maximum risk","Targets stay within risk capacity","Risk is entirely eliminated","The plan needs no review"],a:1,e:"위험선호-BP 정렬 = 목표가 위험감내력 내. 함정: 최대위험·위험제거는 양극단."},
{id:"014",tp:"전략분석",d:"Medium",q:"A key EXTERNAL factor when preparing a Business Plan is:",o:["The CEO's own personal preferences","Macroeconomic and regulatory conditions","The daily employee lunch menu options","Office interior decoration choices"],a:1,e:"외부요인 = 거시경제·규제·경쟁. 함정: 개인선호 등 무관항목."},
{id:"015",tp:"전략분석",d:"Hard",q:"Stakeholder collaboration in plan execution is emphasized because it:",o:["It deliberately slows down decisions","Improves feasibility and shared ownership","It removes all management accountability","It is strictly prohibited by law"],a:1,e:"이해관계자 협업 = 실행가능성·공동책임. 함정: 책임제거·금지는 오답."},
{id:"016",tp:"Compliance",d:"Hard",q:"'Ensuring Compliance' is a Q7 unit; the complementary Q6 unit is:",o:["Developing a business plan","Evaluating compliance culture","Issuing consumer loans","Marketing financial products"],a:1,e:"Ensure compliance(Q7) ↔ Evaluate compliance culture(Q6). 함정: Q6/Q7 짝."},
{id:"017",tp:"Compliance",d:"Hard",q:"Compliance culture is best described as:",o:["A single one-time training event","Embedded values in daily decisions","Solely the compliance officer's job","Optional for senior management"],a:1,e:"준법문화 = 일상 의사결정 내재 가치·행동. 함정: 일회·담당자한정·임원면제는 오해."},
{id:"018",tp:"Compliance",d:"Hard",q:"Which is NOT a factor in building a compliance culture?",o:["Tone at the top and leadership","Clear policies and procedures","Maximizing fines as the main tool","Training, communication, monitoring"],a:2,e:"준법문화 요인 = 경영진 의지·정책·교육·소통·감시. 함정: '벌금극대화'는 처벌일변도 오류."},
{id:"019",tp:"Compliance",d:"Medium",q:"The 'tone at the top' principle means:",o:["Only junior staff must comply","Leaders set the compliance example","Compliance binds only the finance team","Tone refers to audio quality"],a:1,e:"Tone at the top = 최고경영진이 준법 모범. 함정: 하급직 한정·동음이의."},
{id:"020",tp:"Compliance",d:"Hard",q:"The compliance function operates across which scope?",o:["The board governance level only","Strategic, managerial, operational layers","The marketing and sales function only","The external statutory auditors only"],a:1,e:"준법 3계층 = 전략·관리·운영. 함정: 단일 계층 한정 오답."},
{id:"021",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the compliance function sits in the:",o:["First Line (operations)","Second Line (oversight)","Third Line (internal audit)","Outside the model"],a:1,e:"준법 = 2선. 1선=영업, 3선=감사. 함정: 준법을 1·3선으로 오배치."},
{id:"022",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the FIRST line consists of:",o:["The internal audit assurance team","Operational management owning the risk","The central compliance department","The external financial regulator"],a:1,e:"1선 = 위험 소유 영업·운영 관리. 함정: 준법(2선)·감사(3선)와 혼동."},
{id:"023",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the THIRD line provides:",o:["Day-to-day risk taking","Independent assurance via audit","Marketing strategy direction","Operational funding support"],a:1,e:"3선 = 내부감사 독립 보증. 함정: 1선(위험감수)·2선(감독)과 혼동."},
{id:"024",tp:"Compliance",d:"Medium",q:"The independence of the Second Line from the First Line enables:",o:["Taking operational risks freely","Objective oversight without pressure","Removal of all responsibility","A purely legal formality"],a:1,e:"2선 독립성 = 운영압력 배제 객관 감독. 함정: 위험감수·책임제거는 오답."},
{id:"025",tp:"Compliance",d:"Hard",q:"Which document set is used to evaluate compliance culture?",o:["Only the published annual report","Compliance reports and audit results","Customer-facing marketing brochures","Annual corporate tax filings only"],a:1,e:"준법문화 평가 자료 = 준법보고·분석·감사결과·위원회 자료. 함정: 마케팅·세무는 무관."},
{id:"026",tp:"Compliance",d:"Hard",q:"A compliance audit may be conducted by:",o:["Only the OJK regulator","Internal Audit and/or the OJK","Only external marketing firms","Only the company's CEO"],a:1,e:"준법감사 주체 = 내부감사 및/또는 OJK. 함정: OJK 단독·CEO 단독은 오답."},
{id:"027",tp:"Compliance",d:"Medium",q:"Cross-functional discussion forums are used to:",o:["Avoid making any decisions","Agree on implementation steps","Replace the Board of Directors","Exclude the risk function"],a:1,e:"교차기능 포럼 = 부서 간 이행단계 합의. 함정: 의사결정 회피·기관 배제는 오답."},
{id:"028",tp:"Compliance",d:"Hard",q:"The KSA attitude required of a compliance evaluator emphasizes:",o:["Indifference to violations","Integrity and objectivity","Maximizing personal gain","Avoiding documentation"],a:1,e:"준법평가자 태도 = 청렴·객관성·윤리. 함정: 무관심·사익은 정반대."},
{id:"029",tp:"Compliance",d:"Hard",q:"Treating compliance solely as 'the compliance officer's problem' demonstrates:",o:["A mature compliance culture","A weak, immature culture","Optimal operating efficiency","Regulatory excellence"],a:1,e:"준법을 담당자 문제로 한정 = 미성숙 문화. 함정: '효율'로 미화."},
{id:"030",tp:"Compliance",d:"Medium",q:"The primary objective of the compliance function is to:",o:["Generate company revenue","Ensure adherence and manage risk","Replace the internal audit","Approve all loan applications"],a:1,e:"준법기능 = 법규·내규 준수·준법위험 관리. 함정: 수익·감사대체·여신은 타 기능."},
{id:"031",tp:"Compliance",d:"Hard",q:"Compliance risk is the risk arising from:",o:["Currency exchange fluctuations","Failure to comply with rules","Stock market price movements","Physical equipment breakdown"],a:1,e:"준법위험 = 법규·기준 미준수로 인한 제재·손실·평판. 함정: 환·시장·운영위험과 구분."},
{id:"032",tp:"Compliance",d:"Medium",q:"Compliance policies should be:",o:["Kept secret from operating staff","Documented and disseminated widely","Communicated only to the BOD","Conveyed verbally without records"],a:1,e:"준법정책 = 명문화·전파. 함정: 비밀·BOD한정·구두만은 실패."},
{id:"033",tp:"Compliance",d:"Hard",q:"A compliance monitoring system should:",o:["Operate once every five years","Continuously track and flag breaches","Run only after an OJK request","Focus only on company profitability"],a:1,e:"준법 모니터링 = 지속 추적·잠재위반 경보. 함정: 5년주기·사후·이익한정은 부적절."},
{id:"034",tp:"Compliance",d:"Hard",q:"How do the compliance function and internal audit relate?",o:["They are entirely identical","Compliance manages, audit assures","Internal audit reports to compliance","Compliance replaces internal audit"],a:1,e:"준법(2선) 관리 / 내부감사(3선) 독립 보증. 함정: 동일시·상하관계 오인."},
{id:"035",tp:"Compliance",d:"Medium",q:"A high rate of unresolved audit findings indicates:",o:["A strong compliance culture","Weak follow-up and accountability","Excellent governance practice","No issue whatsoever"],a:1,e:"미해결 감사지적 다수 = 후속·답책 취약. 함정: '강한 문화'로 오인."},
{id:"036",tp:"Compliance",d:"Hard",q:"The compliance function's reporting line should provide:",o:["Reporting only to sales head","Direct access to BOD and BOC","No reporting line at all","Reporting to competitors"],a:1,e:"준법 보고선 = BOD·BOC 직접 접근(독립성). 함정: 영업총괄 보고는 독립성 훼손."},
{id:"037",tp:"Compliance",d:"Hard",q:"'Ensuring compliance' (Q7) primarily requires the practitioner to:",o:["Memorize every single law verbatim","Embed rules in processes and verify","Avoid creating any documentation","Delegate everything entirely to OJK"],a:1,e:"준법 보장(Q7) = 법규 식별·프로세스 내재화·준수 검증. 함정: 암기·위임·문서회피는 핵심 아님."},
{id:"038",tp:"Compliance",d:"Medium",q:"A compliance report to the Directors should include:",o:["Only positive good news","Status, breaches, and follow-up","Marketing campaign results","Competitor financial data"],a:1,e:"준법보고 = 현황·위반·분석·후속. 함정: 호재만·마케팅은 본질 아님."},
{id:"039",tp:"Compliance",d:"Hard",q:"Which factor MOST undermines a compliance culture?",o:["A strong tone at the top","Leadership bypassing controls","Regular ongoing training","Clear escalation channels"],a:1,e:"최대 저해 = 경영진의 통제 우회. 함정: 나머지는 강화요인."},
{id:"040",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the governing body (BOD/BOC) primarily:",o:["Executes the daily operations itself","Provides oversight and sets direction","Conducts the audit fieldwork directly","Sells the financial products directly"],a:1,e:"지배기구 = 감독·방향설정·답책. 함정: 실행·감사실무·영업은 타 역할."},
{id:"041",tp:"Q6평가",d:"Hard",q:"The FIRST step in evaluating business plan implementation is to:",o:["Approve next year's plan","Set criteria and gather data","Dismiss underperforming staff","Increase the overall budget"],a:1,e:"평가 1단계 = 기준·목표 설정·실적 수집. 함정: 승인·인사·예산은 후속."},
{id:"042",tp:"Q6평가",d:"Hard",q:"Comparing actual vs planned figures is used to:",o:["Punish individual staff","Identify variances and causes","Hide the deviations found","Satisfy mere curiosity"],a:1,e:"실적 vs 계획 = 편차·원인 식별·시정. 함정: 처벌·은폐는 목적 아님."},
{id:"043",tp:"Q6평가",d:"Medium",q:"A key OUTPUT of business plan evaluation is:",o:["A new marketing campaign","Corrective recommendations","A redesigned company logo","Staff bonuses only"],a:1,e:"평가 산출 = 권고·시정조치. 함정: 마케팅·인사보상은 부산물."},
{id:"044",tp:"Q6평가",d:"Hard",q:"Evaluating compliance culture (Q6) focuses on:",o:["Building the rules entirely from scratch","Measuring how compliance functions","Marketing the existing internal rules","Replacing all the rules every year"],a:1,e:"Q6 = 준법 내재화·작동 효과 측정. Q7 = 구축. 함정: Q6/Q7 역할 혼동."},
{id:"045",tp:"Q6평가",d:"Hard",q:"Monitoring follow-up on audit results uses data such as:",o:["Only company press releases","Audit findings and follow-up status","Competitor financial statements","Customer birthday records"],a:1,e:"감사 후속 모니터링 = 감사지적·후속현황·OJK 권고. 함정: 보도자료·경쟁사는 무관."},
{id:"046",tp:"Q6컴플",d:"Hard",q:"Evaluation of compliance culture should assess whether compliance is:",o:["An isolated separate silo","Integrated into all decisions","Only on paper documents","Limited to year-end review"],a:1,e:"준법문화 평가 = 전 계층 의사결정 통합 여부. 함정: 사일로·서류상·연말한정은 미성숙."},
{id:"047",tp:"Q6컴플",d:"Medium",q:"A maturity indicator of compliance culture is:",o:["Employees concealing violations","Staff proactively raising concerns","Whistleblowers being ignored","No compliance training given"],a:1,e:"성숙 지표 = 자발적 우려 제기(무보복). 함정: 은폐·무시·무교육은 미성숙."},
{id:"048",tp:"Q6컴플",d:"Hard",q:"A valid METRIC for compliance culture effectiveness is:",o:["The number of office plants","Timely resolution and repeat rate","The color of the company logo","The CEO's golf handicap"],a:1,e:"지표 = 적시 해결률·반복위반 빈도. 함정: 무관항목으로 오도."},
{id:"049",tp:"Q6컴플",d:"Hard",q:"If the same violations keep recurring, the evaluation should conclude:",o:["The culture is genuinely excellent","Systemic root-cause weakness exists","No further corrective action needed","The recurring violations are acceptable"],a:1,e:"동종 위반 반복 = 근본원인 시정 실패. 함정: '우수'·'무조치'는 오답."},
{id:"050",tp:"Q6컴플",d:"Medium",q:"The ultimate goal of evaluating compliance culture is to:",o:["Assign blame to staff","Drive continuous improvement","Reduce the headcount","Increase regulatory fines"],a:1,e:"평가 목표 = 지속개선·준법 내재화. 함정: 비난·감원·벌금은 목적 아님."},
{id:"051",tp:"BP구성",d:"Hard",q:"A complete Business Plan should contain:",o:["Only a single headline profit target","Strategy, projections, risk, actions","A single product marketing slide","Only a list of competitor logos"],a:1,e:"BP 구성 = 요약·전략·재무전망·위험평가·실행계획. 함정: 단일 항목 한정은 불완전."},
{id:"052",tp:"BP구성",d:"Medium",q:"Financial projections in a Business Plan should cover:",o:["Only the current calendar month","Multi-period forward projections","Only the past actual reported figures","No quantitative numbers at all"],a:1,e:"재무전망 = 다기간 전향적 추정. 함정: 과거만·당월만은 계획 아님."},
{id:"053",tp:"BP구성",d:"Hard",q:"The Business Plan must remain consistent with:",o:["A competitor's strategic plan","The company's vision and strategy","An individual employee resume","A company press release"],a:1,e:"BP = 비전·미션·승인전략과 정합. 함정: 경쟁사·무관문서는 오답."},
{id:"054",tp:"BP구성",d:"Hard",q:"Why must the Business Plan incorporate regulatory requirements?",o:["Merely to impress the competitors","It is a precondition for approval","To pad out the document page count","It is entirely optional in practice"],a:1,e:"규제요건 명시 = 지속경영·OJK 승인 전제. 함정: 임의·분량용은 오답."},
{id:"055",tp:"BP보고",d:"Hard",q:"Periodic plan-realization reports to OJK serve to:",o:["Advertise the company to the public","Show progress and explain deviations","Replace the audited statements","List all current employee names"],a:1,e:"BP 실현보고 = 진척 입증·편차 설명. 함정: 광고·재무제표 대체는 오답."},
{id:"056",tp:"BP보고",d:"Medium",q:"A material adverse deviation should be reported:",o:["Never reported under any condition","Promptly, with corrective measures","Only after five full years pass","Only when reported profits increase"],a:1,e:"중대 부정적 편차 = 적시 보고·시정. 함정: 미보고·지연은 위반."},
{id:"057",tp:"BP보고",d:"Hard",q:"Mid-year revision of a Business Plan is:",o:["Strictly forbidden always","Permitted under defined conditions","Done weekly without any limit","Decided by the competitors"],a:1,e:"BP 중간 수정 = OJK 규정상 요건·시한 내 허용. 함정: 절대금지·무제한은 양극단."},
{id:"058",tp:"전략분석",d:"Hard",q:"A PESTEL analysis examines:",o:["Only the company's internal profit","Political-economic-social-tech factors","Only internal staffing arrangements","Routine office supply inventory"],a:1,e:"PESTEL = 정치·경제·사회·기술·환경·법률 외부요인. 함정: 내부·이익 한정은 오답."},
{id:"059",tp:"전략분석",d:"Hard",q:"Business Plan targets should ideally be:",o:["Vague and effectively unmeasurable","Specific and measurable (SMART)","Practically impossible to track","Deliberately kept secret from all"],a:1,e:"목표 = SMART(구체·측정·달성·관련·기한). 함정: 모호·비추적은 평가불가."},
{id:"060",tp:"전략분석",d:"Medium",q:"Competitive analysis in a Business Plan helps the company to:",o:["Copy competitors' products illegally","Identify differentiation and gaps","Ignore the surrounding market","Fix prices jointly with rivals"],a:1,e:"경쟁분석 = 포지셔닝·차별화·기회 식별. 함정: 불법모방·담합은 위법."},
{id:"061",tp:"전략분석",d:"Hard",q:"Linking the Business Plan to KPIs enables:",o:["Avoiding measurement altogether","Objective tracking of execution","Hiding the actual reported results","Random ad-hoc reactive management"],a:1,e:"BP-KPI 연계 = 객관 추적·답책성. 함정: 측정회피·은폐는 정반대."},
{id:"062",tp:"ThreeLines",d:"Hard",q:"The Three Lines Model's main purpose is to:",o:["Increase internal bureaucracy layers","Clarify risk roles and responsibilities","Eliminate the governing board entirely","Centralize all risk inside the audit"],a:1,e:"3선 목적 = 위험관리·통제 역할 명확화. 함정: 관료화·기관제거는 오답."},
{id:"063",tp:"ThreeLines",d:"Hard",q:"A common error is to place risk management in the:",o:["Second line (correct place)","First line as a risk owner","Governing body level","External regulator role"],a:1,e:"위험관리 = 2선. 1선(위험소유)로 두는 것이 흔한 오류. 함정: 정답은 '오배치' 식별."},
{id:"064",tp:"ThreeLines",d:"Medium",q:"Internal audit's independence means it should report to:",o:["Operational line management","The audit committee / board","Daily operational managers","The company's strategy team"],a:1,e:"내부감사 독립성 = 감사위원회·기구 보고. 함정: 운영보고·전략수립은 독립성 훼손."},
{id:"065",tp:"ThreeLines",d:"Hard",q:"Which statement about coordination between lines is correct?",o:["Lines must never communicate","Sharing strengthens governance","One line should do everything","Audit approves all transactions"],a:1,e:"선 간 조정·정보공유 = 거버넌스 강화(독립성 유지). 함정: 단절·통합·승인은 오답."},
{id:"066",tp:"감독기관",d:"Hard",q:"Which body issues and supervises POJK 24/2019 (Business Plan)?",o:["Bank Indonesia (BI)","Otoritas Jasa Keuangan","The Ministry of Trade","The industry association"],a:1,e:"BP 규정·감독 = OJK. 함정: BI·무역부·협회는 주체 아님."},
{id:"067",tp:"감독기관",d:"Medium",q:"APPI/LSPPI's relevance to the framework is that it:",o:["Issues the POJK rules","Provides industry certification","Supervises commercial banks","Sets national monetary policy"],a:1,e:"APPI/LSPPI = 역량 인증(SPPI). 함정: POJK 발행·은행감독·통화정책은 무관."},
{id:"068",tp:"감독기관",d:"Hard",q:"In the legal hierarchy, a POJK sits:",o:["Above the governing law (UU)","Below the law but binding","As non-binding guidance only","Equal to internal company policy"],a:1,e:"POJK = 상위법(UU) 하위, 구속력 있는 시행규정. 함정: 상위·비구속·내규동급은 오답."},
{id:"069",tp:"Compliance",d:"Hard",q:"A 'compliance charter' establishes the function's:",o:["Annual marketing budget","Mandate, authority, scope","Employee salary grades","Dividend distribution policy"],a:1,e:"준법헌장 = 권한·범위·보고선. 함정: 예산·급여·배당은 타 문서."},
{id:"070",tp:"Compliance",d:"Hard",q:"When OJK issues a new regulation, the compliance function should first:",o:["Ignore it until audited","Conduct a gap analysis","Immediately halt operations","Wait for competitors to act"],a:1,e:"신규 POJK = 영향·필요변경 gap analysis 우선. 함정: 무시·중단·관망은 부적절."},
{id:"071",tp:"Compliance",d:"Medium",q:"Embedding compliance into product approval is an example of:",o:["After-the-fact compliance","Compliance by design","Active compliance avoidance","Mere compliance theater"],a:1,e:"상품승인 내재 = 예방적 compliance by design. 함정: 사후·회피·형식주의와 대조."},
{id:"072",tp:"Compliance",d:"Hard",q:"The compliance function's effectiveness depends MOST on:",o:["The size of imposed fines","Genuine senior leadership support","The number of written policies","The physical office location"],a:1,e:"준법 실효성 = 경영진 지원·문화 통합. 함정: 벌금·문서량·위치는 본질 아님."},
{id:"073",tp:"Compliance",d:"Hard",q:"Which illustrates a FAILURE of compliance culture despite good policies?",o:["Policies are followed daily","Detailed rules routinely bypassed","Staff escalate their concerns","Audits resolved promptly"],a:1,e:"정책 있으나 상시 우회 = 문화 실패. 함정: 나머지는 건전 징후."},
{id:"074",tp:"BP구성",d:"Hard",q:"The Business Plan must be approved by:",o:["The compliance officer alone","The BOD and BOC","An external service vendor","The marketing department"],a:1,e:"BP 승인 = BOD·BOC. 함정: 담당자·외부·마케팅 단독은 오답."},
{id:"075",tp:"Q6평가",d:"Hard",q:"A robust Business Plan evaluation framework should be:",o:["One-off and entirely informal","Systematic, periodic, documented","Based purely on rumor and hearsay","Kept fully hidden from the Board"],a:1,e:"BP 평가 = 체계적·정기·기준기반·문서화. 함정: 일회·비공식·비공개는 부실."},
{id:"076",tp:"Q6컴플",d:"Hard",q:"The '3-layer + steps + KSA' framework for compliance culture defines:",o:["Deliberately confusing the staff","Where, how, and with what capability","How to avoid responsibility entirely","How to reduce all required training"],a:1,e:"3계층+이행단계+KSA = 어디서·어떻게·어떤 역량으로 구현하는지. 함정: 혼란·회피는 오답."},
{id:"077",tp:"Compliance",d:"Hard",q:"The correct escalation order for a detected breach is:",o:["Conceal then quietly forget","Identify, report, analyze, remediate","Report to the media first","Punish first, never investigate"],a:1,e:"위반 처리 = 식별→보고→분석→시정→BOD/BOC. 함정: 은폐·언론·선처벌은 오답."},
{id:"078",tp:"Compliance",d:"Medium",q:"A whistleblowing channel supports compliance culture by:",o:["Punishing those who report issues","Enabling safe confidential reporting","Publicizing every report openly","Replacing the internal audit function"],a:1,e:"내부고발 = 안전·기밀 신고로 조기탐지. 함정: 보복·공개·감사대체는 오답."},
{id:"079",tp:"Compliance",d:"Hard",q:"The second line FAILS its purpose if it:",o:["Stays fully independent of the first","Becomes involved in revenue decisions","Reports properly to the BOC","Performs proper risk oversight"],a:1,e:"2선 실패 = 감독대상 수익결정 개입(독립성 상실). 함정: 나머지는 정상."},
{id:"080",tp:"Compliance",d:"Hard",q:"Regulatory change management requires the compliance function to:",o:["Ignore all the SEOJK circulars","Track, assess, update, and train","Act only when actually penalized","Outsource every decision externally"],a:1,e:"규제변경 관리 = 추적·영향평가·정책갱신·교육. 함정: 무시·사후·전면위임은 부실."},
{id:"081",tp:"전략분석",d:"Hard",q:"Scenario analysis in planning is valuable because it:",o:["Guarantees one single outcome","Tests resilience under varied cases","Eliminates all future uncertainty","Replaces the Board's own judgment"],a:1,e:"시나리오 분석 = 기본·낙관·비관 하 강건성 시험. 함정: 단일보장·불확실성 제거는 과장."},
{id:"082",tp:"전략분석",d:"Medium",q:"Setting unrealistically high growth targets risks:",o:["Practically guaranteed success","Excessive risk and prudential breaches","A genuinely lower compliance burden","Automatic and assured OJK approval"],a:1,e:"비현실적 고성장 = 과도위험·건전성 위반·신뢰상실. 함정: 보장성공·승인은 오답."},
{id:"083",tp:"BP보고",d:"Hard",q:"If targets were met through EXCESSIVE risk-taking, the result should be:",o:["Praised without any conditions","Flagged for risk-adjusted review","Completely ignored by management","Rewarded with no further review"],a:1,e:"목표달성이나 과도위험 = 위험감안 성과질 평가 필요. 함정: 무조건 칭찬·무시는 부적절."},
{id:"084",tp:"ThreeLines",d:"Hard",q:"Compliance and risk management (both 2nd line) differ in that:",o:["They are wholly identical roles","Compliance covers legal; risk all risks","Compliance performs the field audits","Risk management approves the loans"],a:1,e:"준법(법규준수) vs 위험관리(전 위험). 둘 다 2선이나 초점 다름. 함정: 동일시·역할혼동."},
{id:"085",tp:"Compliance",d:"Hard",q:"A compliance training program should be:",o:["One-time only at hiring","Ongoing and role-specific","Optional for all managers","Limited to compliance staff"],a:1,e:"준법교육 = 지속·직무특화·규제변경 시 갱신. 함정: 일회·임원면제·팀한정은 부실."},
{id:"086",tp:"Compliance",d:"Medium",q:"Documentation of compliance activities is important for:",o:["Increasing the paperwork","Evidencing compliance to OJK","Hiding internal decisions","Marketing the company"],a:1,e:"준법 문서화 = 준수 입증·감사가능·답책성. 함정: 단순 서류·은폐는 오답."},
{id:"087",tp:"Q6평가",d:"Hard",q:"Monitoring follow-up on audit results assesses whether:",o:["Audits are simply never performed","Corrective actions are implemented","The product marketing has improved","The company logo has been changed"],a:1,e:"감사 후속 모니터링 = 시정조치 적시 이행 여부. 함정: 무관항목으로 오도."},
{id:"088",tp:"Q6평가",d:"Hard",q:"If follow-up on audit findings is only 65% (target 100%), the rating is:",o:["Fully Comply","Less Comply","Excellent rating","Not applicable"],a:1,e:"감사후속 65%(목표100%) = Less Comply. 함정: 'Fully'·'Excellent'은 오답 — textbook 사례."},
{id:"089",tp:"Compliance",d:"Hard",q:"Compliance reports relate to the BOC's role in that they:",o:["Are ignored by the BOC","Inform the BOC's oversight","Are seen only by the BOD","Stay hidden from governance"],a:1,e:"준법보고 = BOC 감독 정보 → BOD 답책. 함정: BOC 배제·BOD 한정은 거버넌스 훼손."},
{id:"090",tp:"BP구성",d:"Hard",q:"Integrating risk assessment into the Business Plan ensures that:",o:["Risks are simply ignored","Strategies are stress-tested first","Only profits are ever planned","The plan becomes shorter"],a:1,e:"BP에 위험평가 통합 = 약속 전 stress-test. 함정: 위험무시·이익만은 부실계획."},
{id:"091",tp:"Compliance",d:"Hard",q:"Compliance with POJK obligations is BEST evidenced by:",o:["Verbal assurances only","Documented records and reports","A single annual meeting","Competitor benchmark data"],a:1,e:"준법 입증 = 문서·모니터링·보고·시정추적. 함정: 구두·단발·경쟁사는 불충분."},
{id:"092",tp:"전략분석",d:"Medium",q:"Aligning the plan with the Roadmap (2024-2028) signals the company:",o:["It ignores the industry direction","Positions with strategic priorities","It operates entirely illegally","It avoids all forms of regulation"],a:1,e:"BP-Roadmap 정렬 = 산업 우선순위 정합. 함정: 무시·위법은 오답."},
{id:"093",tp:"Compliance",d:"Hard",q:"A 'mature' compliance culture across 3 layers shows:",o:["Compliance at operations only","Values embedded at all layers","Compliance at board only","No layered structure at all"],a:1,e:"성숙 준법문화 = 전략·관리·운영 전 계층 일관 내재. 함정: 단일 계층 한정은 미성숙."},
{id:"094",tp:"ThreeLines",d:"Hard",q:"The PRIMARY accountability for daily risk/compliance rests with:",o:["The internal audit assurance team","First-line operational management","The external statutory auditors","The OJK financial regulator"],a:1,e:"일상 1차 책임 = 1선(위험소유 영업·운영). 함정: 감사·OJK 전가는 오해."},
{id:"095",tp:"Q6컴플",d:"Medium",q:"An employee compliance culture survey is a tool to:",o:["Replace the internal audit function","Gauge awareness and lived values","Set the employee salary grades","Approve incoming loan applications"],a:1,e:"준법문화 설문 = 인식·실제 가치 측정. 함정: 감사대체·급여·여신은 무관."},
{id:"096",tp:"BP보고",d:"Hard",q:"The frequency of plan-realization reporting to OJK is set by:",o:["The company at random","The applicable OJK provisions","The industry competitors","The marketing calendar"],a:1,e:"BP 실현보고 주기 = OJK 규정(정기). 함정: 임의·경쟁사·마케팅은 오답."},
{id:"097",tp:"Compliance",d:"Hard",q:"A compliance officer pressured to conceal a breach should:",o:["Conceal it for revenue","Escalate to BOD/BOC properly","Resign without reporting","Inform the competitors"],a:1,e:"위반+은폐압력 = 정상채널 BOD/BOC 에스컬레이션. 함정: 은폐·무보고 사퇴는 부적절."},
{id:"098",tp:"전략분석",d:"Hard",q:"Business Plan funding assumptions must be consistent with:",o:["Public deposit-taking plans","Permitted sources and gearing cap","Unlimited financial leverage","Only government grants"],a:1,e:"BP 자금가정 = 허용자금원(채권·차입·sukuk)+gearing 한도. 함정: 예금수취 불가·무제한은 위반."},
{id:"099",tp:"Q6평가",d:"Hard",q:"The PDCA cycle relates to plan management by:",o:["Skipping the Check phase","Providing a continuous loop","Doing only the Plan phase","Eliminating all evaluation"],a:1,e:"PDCA = 계획·실행·평가·조치 지속루프(Q6=Check-Act). 함정: 평가 생략은 PDCA 위배."},
{id:"100",tp:"Compliance",d:"Hard",q:"Which statement is CORRECT (Q6/Q7 and Three Lines)?",o:["Ensuring compliance is a Q6 unit","Develop BP=Q7, compliance=2nd line","Compliance is the 1st line","All units are Q6, only two lines"],a:1,e:"정답: BP개발=Q7, BP평가=Q6, 준법=2선, 내부감사=3선. 함정: Q6/Q7 swap, 선 오배치 집약."},
];

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W2_v2";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
const UNIT_LABEL={U1:"Unit 1 · Business Plan",U2:"Unit 2 · Compliance"};
let quiz=[], cur=0, answers=[], picked=false;

const app=document.getElementById('app');

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp;
    cur=0;answers=[];render();return;
  }
  if(mode==='all') quiz=shuffle(BANK);
  else if(mode==='u1') quiz=shuffle(BANK.filter(q=>q.u==='U1'));
  else if(mode==='u2') quiz=shuffle(BANK.filter(q=>q.u==='U2'));
  else if(mode==='supp') quiz=shuffle(BANK.filter(q=>parseInt(q.id)>=51));
  else quiz=shuffle(BANK).slice(0,30);
  cur=0; answers=[]; render();
}

function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Unit 1 + Unit 2 완주</span></button>
        <button onclick="start('u1')">Unit 1만 (Business Plan) <span class="desc">32문항</span></button>
        <button onclick="start('u2')">Unit 2만 (Compliance) <span class="desc">31문항</span></button>
        <button onclick="start('supp')">보강 13문항만 <span class="desc">Q6 평가관점·역량군·Three Lines</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W2-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}

function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta">
      <span>문항 ${cur+1} / ${quiz.length}</span>
      <span>QID W2-${q.id}</span>
    </div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags">
      <span class="tag unit">${UNIT_LABEL[q.u]}</span>
      <span class="tag ${dcls}">${q.d}</span>
    </div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}

function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  const opts=document.querySelectorAll('#opts .opt');
  opts.forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}

function next(){
  if(cur<quiz.length-1){cur++;render()}
  else result();
}

function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const u1=answers.filter((a,i)=>quiz[i].u==='U1');
  const u2=answers.filter((a,i)=>quiz[i].u==='U2');
  const u1r=u1.filter(a=>a.correct).length, u2r=u2.filter(a=>a.correct).length;
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${u1.length?`<div class="row"><span>Unit 1 · Business Plan</span><b>${u1r} / ${u1.length}</b></div>`:''}
        ${u2.length?`<div class="row"><span>Unit 2 · Compliance</span><b>${u2r} / ${u2.length}</b></div>`:''}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W2-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}

// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
</html>
