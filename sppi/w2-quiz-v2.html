<style>
  :root{
    --ink:#1a2238; --paper:#f7f5ef; --line:#d8d3c4;
    --gold:#b8893a; --gold-soft:#e8dcc0;
    --green:#2f6b4f; --red:#a33a2e; --blue:#2f5170;
    --shadow:0 1px 0 rgba(26,34,56,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--paper); color:var(--ink);
    line-height:1.6; padding:24px 16px 80px;
  }
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.unit{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>

    <div class="sub">Unit 1 Business Plan · Unit 2 Compliance & Compliance Culture · 100문항 풀 · K6/K7 신규판(2026) + Day1 신규판 기반</div>

<script>
const BANK = [
{id:"001",tp:"BP구성",d:"Hard",q:"The Business Plan (RBB) of a finance company must be prepared in accordance with which primary regulation?",o:["POJK 46/2024","POJK 24/POJK.05/2019 (Business Plans for NBFIs)","POJK 12/2017","POJK 43/2024"],a:1,e:"BP(RBB) = POJK 24/2019(NBFI 사업계획) + SEOJK 23/2019. 함정: 46/2024(사업운영)·12/2017(AML)·43/2024(HR)는 별개."},
{id:"002",tp:"BP구성",d:"Hard",q:"Which Circular Letter supplements the Business Plan regulation for finance companies and sharia finance companies?",o:["SEOJK 23/SEOJK.05/2019","SEOJK 20/2025","SEOJK 1/2014","SEOJK 13/2014"],a:0,e:"SEOJK 23/2019 = BP 보완 회람. 함정: 소비자보호 계열 SEOJK들과 혼동."},
{id:"003",tp:"BP구성",d:"Medium",q:"The Business Plan primarily serves to:",o:["Replace the annual financial statements","Harmonize business needs with regulatory compliance and create long-term value","Eliminate the need for risk management","Satisfy tax authorities only"],a:1,e:"BP 목적 = 사업수요와 규제준수 조화 + 장기가치 창출. 함정: 재무제표 대체·세무목적은 오해."},
{id:"004",tp:"BP구성",d:"Hard",q:"A competency unit code such as 'K.64PBY91.001.1 — Developing a Business Plan' corresponds to which qualification perspective?",o:["Q6 (Evaluating/Monitoring)","Q7 (Developing/Implementing)","Neither","Both equally"],a:1,e:"Developing(개발·실행) = Q7. Evaluating/Monitoring(평가·감시) = Q6. 함정: Q6/Q7 perspective swap — 빈출."},
{id:"005",tp:"BP구성",d:"Hard",q:"'Evaluating a Finance Company's Business Plan' (K.64PBY91.003.1) belongs to which perspective?",o:["Q7 Developing","Q6 Evaluating","Q5","Implementation only"],a:1,e:"Evaluating = Q6 관점. develop(Q7)과 짝. 함정: 동일 BP 주제라도 develop/evaluate로 Q7/Q6 분기."},
{id:"006",tp:"BP구성",d:"Medium",q:"Knowledge, Skills & Work Attitudes (KSA) in a competency unit refers to:",o:["Only academic degrees","The required knowledge, practical skills, and professional attitudes for the task","Salary grades","Company assets"],a:1,e:"KSA = 지식·기술·업무태도. 함정: 학위·급여로 오인."},
{id:"007",tp:"BP구성",d:"Hard",q:"'Transfer Skills' as listed in the competency framework specifically means:",o:["Transferring money between accounts","Skills in solving problems in NEW contexts","Transferring employees","Risk transfer to insurers"],a:1,e:"Transfer Skills = 새로운 맥락에서 문제해결 능력. 함정: 자금이체·리스크 transfer와 동음이의 함정."},
{id:"008",tp:"BP보고",d:"Hard",q:"Which of the following is a recognized BENEFIT of evaluating a Business Plan?",o:["Guaranteeing zero losses","Early identification of deviations and corrective action; better resource alignment","Avoiding OJK reporting","Eliminating competition"],a:1,e:"BP 평가 편익: 편차 조기식별·시정, 자원정렬 개선 등. 함정: 무손실 보장·보고회피는 비현실."},
{id:"009",tp:"BP보고",d:"Medium",q:"The Business Plan is typically subject to which OJK interaction?",o:["No interaction required","Submission to and supervisory review by OJK","Approval by competitors","Publication in newspapers"],a:1,e:"BP = OJK 제출·감독검토 대상. 함정: 무제출·경쟁사 승인은 오답."},
{id:"010",tp:"BP보고",d:"Hard",q:"When actual performance deviates materially from the Business Plan, the company should FIRST:",o:["Ignore it until year-end","Analyze the deviation and prepare corrective/follow-up actions","Cancel the plan entirely","Replace all management"],a:1,e:"중대 편차 = 원인분석 + 시정·후속조치. 함정: 무시·전면취소는 부적절 대응."},
{id:"011",tp:"BP보고",d:"Medium",q:"A realistic Business Plan should be grounded in:",o:["Optimistic assumptions only","Reasonable assumptions consistent with market conditions and company capacity","Competitor secrets","Random projections"],a:1,e:"현실적 BP = 시장상황·회사역량에 부합하는 합리적 가정. 함정: 낙관일변도는 신뢰성 훼손."},
{id:"012",tp:"전략분석",d:"Hard",q:"In strategic analysis for the Business Plan, a SWOT analysis examines:",o:["Only external factors","Strengths, Weaknesses (internal) and Opportunities, Threats (external)","Only financial ratios","Only competitors"],a:1,e:"SWOT = 내부(S/W) + 외부(O/T). 함정: 외부만·내부만으로 한정 오인."},
{id:"013",tp:"전략분석",d:"Hard",q:"Aligning the company's risk appetite with its Business Plan ensures that:",o:["The company takes maximum possible risk","Growth targets remain within the company's risk-bearing capacity","Risk is entirely eliminated","The plan needs no review"],a:1,e:"위험선호-BP 정렬 = 성장목표가 위험감내력 내 유지. 함정: 최대위험·위험제거는 양극단 오답."},
{id:"014",tp:"전략분석",d:"Medium",q:"A key external factor to analyze when preparing a Business Plan is:",o:["The CEO's personal preferences","Macroeconomic conditions, regulation, and competition","Employee lunch menus","Office decor"],a:1,e:"외부요인 = 거시경제·규제·경쟁. 함정: 개인선호 등 무관항목."},
{id:"015",tp:"전략분석",d:"Hard",q:"Stakeholder collaboration in business plan execution is emphasized because:",o:["It slows decisions","Cross-functional input improves feasibility and shared ownership of targets","It removes accountability","It is legally banned"],a:1,e:"이해관계자 협업 = 실행가능성·목표 공동책임 제고. 함정: 책임제거·금지는 오답."},
{id:"016",tp:"Compliance",d:"Hard",q:"'Ensuring Compliance With Regulations Related to Finance Companies' (K.64PBY91.014.1) is a Q7 unit. The COMPLEMENTARY Q6 unit involves:",o:["Developing a business plan","Evaluating/Monitoring the implementation of compliance culture","Issuing loans","Marketing products"],a:1,e:"Ensure compliance(Q7) ↔ Evaluate compliance culture(Q6). 함정: Q6/Q7 짝 식별."},
{id:"017",tp:"Compliance",d:"Hard",q:"Compliance culture in a finance company is best described as:",o:["A one-time training event","An embedded set of values and behaviors where compliance is part of everyday decision-making","Solely the compliance officer's job","Optional for senior management"],a:1,e:"준법문화 = 일상 의사결정에 내재된 가치·행동. 함정: 일회성·담당자 단독·임원 면제는 모두 오해."},
{id:"018",tp:"Compliance",d:"Hard",q:"Which is NOT one of the implementation factors for building a compliance culture?",o:["Tone at the top / leadership commitment","Clear policies and procedures","Maximizing fines on staff as the primary tool","Training, communication, and monitoring"],a:2,e:"준법문화 구현요인: 최고경영진 의지·정책·교육·소통·감시 등. 함정: '벌금극대화'는 구현요인이 아닌 처벌일변도 오류."},
{id:"019",tp:"Compliance",d:"Medium",q:"The 'tone at the top' principle in compliance means:",o:["Only junior staff must comply","Senior leadership sets the ethical/compliance example for the whole organization","Compliance applies only to the finance team","Tone refers to audio quality"],a:1,e:"Tone at the top = 최고경영진이 윤리·준법 모범 설정. 함정: 하급직 한정·동음이의 함정."},
{id:"020",tp:"Compliance",d:"Hard",q:"The compliance function operates across a 3-layer scope. Which describes it best?",o:["Board only","Strategic (board/policy), managerial (implementation), and operational (day-to-day) layers","Marketing only","External auditors only"],a:1,e:"준법 3계층: 전략(이사회·정책)·관리(이행)·운영(일상). 함정: 단일 계층 한정 오답."},
{id:"021",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the COMPLIANCE function typically operates as part of:",o:["The First Line (operational management)","The Second Line (risk & compliance oversight)","The Third Line (internal audit)","Outside the model"],a:1,e:"준법 = 2선(위험·준법 감독). 1선=영업·운영, 3선=내부감사. 함정: 준법을 1선·3선으로 오배치."},
{id:"022",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, who constitutes the FIRST line?",o:["Internal audit","Operational management that owns and manages risk directly","The compliance department","The external regulator"],a:1,e:"1선 = 위험을 직접 소유·관리하는 영업·운영 관리. 함정: 준법(2선)·감사(3선)와 혼동."},
{id:"023",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the THIRD line provides:",o:["Day-to-day risk taking","Independent assurance through internal audit","Marketing strategy","Funding"],a:1,e:"3선 = 내부감사의 독립적 보증(assurance). 함정: 1선(위험감수)·2선(감독)과 혼동."},
{id:"024",tp:"Compliance",d:"Medium",q:"The independence of the Second Line (compliance/risk) from the First Line is important because:",o:["It allows them to take operational risks","It enables objective oversight free from operational pressure","It removes their responsibility","It is a legal formality only"],a:1,e:"2선 독립성 = 운영압력 배제한 객관적 감독. 함정: 위험감수·책임제거는 오답."},
{id:"025",tp:"Compliance",d:"Hard",q:"Which document set is used to EVALUATE the implementation of compliance culture?",o:["Only the annual report","Compliance reports & analysis to BOD/BOC, compliance audit results, and related committee materials","Marketing brochures","Tax filings only"],a:1,e:"준법문화 평가 자료: BOD/BOC 준법보고·분석, 준법감사 결과, 위원회 자료 등. 함정: 마케팅·세무는 무관."},
{id:"026",tp:"Compliance",d:"Hard",q:"A compliance audit can be conducted by:",o:["Only the OJK","Internal Audit and/or relevant regulators (OJK)","Only external marketing firms","Only the CEO"],a:1,e:"준법감사 주체 = 내부감사 및/또는 규제기관(OJK). 함정: OJK 단독·CEO 단독은 오답."},
{id:"027",tp:"Compliance",d:"Medium",q:"Cross-functional discussion forums in compliance culture implementation are used to:",o:["Avoid all decisions","Agree on implementation steps across departments","Replace the BOD","Exclude the risk function"],a:1,e:"교차기능 포럼 = 부서 간 이행단계 합의. 함정: 의사결정 회피·기관 배제는 오답."},
{id:"028",tp:"Compliance",d:"Hard",q:"The Knowledge-Skills-Attitude (KSA) requirement for the compliance culture evaluator emphasizes the attitude of:",o:["Indifference to violations","Integrity, objectivity, and commitment to ethical standards","Maximizing personal gain","Avoiding documentation"],a:1,e:"준법평가자 태도 = 청렴·객관성·윤리기준 헌신. 함정: 무관심·사익은 정반대."},
{id:"029",tp:"Compliance",d:"Hard",q:"A finance company that treats compliance solely as 'the compliance officer's problem' demonstrates:",o:["Mature compliance culture","A weak/immature compliance culture lacking shared ownership","Optimal efficiency","Regulatory excellence"],a:1,e:"준법을 담당자 문제로 한정 = 공동책임 결여, 미성숙 문화. 함정: '효율'로 미화하는 오답."},
{id:"030",tp:"Compliance",d:"Medium",q:"The PRIMARY objective of the compliance function is to:",o:["Generate revenue","Ensure the company adheres to laws, regulations, and internal policies, managing compliance risk","Replace internal audit","Approve all loans"],a:1,e:"준법기능 목적 = 법규·내규 준수 + 준법위험 관리. 함정: 수익창출·감사대체·여신승인은 타 기능."},
{id:"031",tp:"Compliance",d:"Hard",q:"Compliance risk is best defined as the risk arising from:",o:["Currency fluctuations","Failure to comply with laws, regulations, and standards, leading to sanctions, losses, or reputational damage","Stock market movements","Equipment breakdown"],a:1,e:"준법위험 = 법규·기준 미준수로 인한 제재·손실·평판훼손. 함정: 환·시장·운영위험과 구분."},
{id:"032",tp:"Compliance",d:"Medium",q:"Effective communication of compliance policies requires that they be:",o:["Kept secret from staff","Clearly documented and disseminated to all relevant employees","Communicated only to the BOD","Verbal only"],a:1,e:"준법정책 = 명문화 + 전 관련직원 전파. 함정: 비밀·BOD한정·구두만은 실패요인."},
{id:"033",tp:"Compliance",d:"Hard",q:"A compliance MONITORING system within a finance company should:",o:["Operate once every five years","Continuously track adherence and flag potential breaches for timely action","Monitor only after OJK requests","Focus only on profits"],a:1,e:"준법 모니터링 = 지속 추적 + 잠재위반 적시 경보. 함정: 5년 주기·사후·이익 한정은 부적절."},
{id:"034",tp:"Compliance",d:"Hard",q:"Which is a CORRECT statement about the relationship between the compliance function and internal audit?",o:["They are identical","Compliance (2nd line) manages compliance risk; internal audit (3rd line) independently assures it","Internal audit reports to compliance","Compliance replaces internal audit"],a:1,e:"준법(2선)=준법위험 관리, 내부감사(3선)=독립 보증. 함정: 동일시·상하관계로 오인."},
{id:"035",tp:"Compliance",d:"Medium",q:"When evaluating compliance culture, a high rate of UNRESOLVED audit findings indicates:",o:["Strong compliance culture","Weakness in follow-up and accountability","Excellent governance","No issue at all"],a:1,e:"미해결 감사지적 다수 = 후속조치·답책성 취약. 함정: '강한 문화'로 오인."},
{id:"036",tp:"Compliance",d:"Hard",q:"The compliance function's reporting line should ideally provide:",o:["Reporting only to the sales head","Direct access/reporting to the BOD and BOC to preserve independence","No reporting at all","Reporting to external competitors"],a:1,e:"준법 보고선 = BOD·BOC 직접 접근으로 독립성 확보. 함정: 영업총괄 보고는 독립성 훼손."},
{id:"037",tp:"Compliance",d:"Hard",q:"'Ensuring compliance with regulations' under the Q7 unit requires the practitioner to:",o:["Memorize all laws verbatim","Identify applicable regulations, embed them in processes, and verify adherence","Avoid documentation","Delegate entirely to OJK"],a:1,e:"준법 보장(Q7) = 적용법규 식별·프로세스 내재화·준수 검증. 함정: 암기·위임·문서회피는 핵심 아님."},
{id:"038",tp:"Compliance",d:"Medium",q:"A 'compliance report' submitted to the Directors should include:",o:["Only good news","Compliance status, identified breaches, analysis, and follow-up actions","Marketing results only","Competitor data"],a:1,e:"준법보고 = 준법현황·위반·분석·후속조치. 함정: 호재만·마케팅은 보고 본질 아님."},
{id:"039",tp:"Compliance",d:"Hard",q:"Which factor MOST undermines a compliance culture?",o:["Strong tone at the top","Leadership that bypasses controls for short-term gains","Regular training","Clear escalation channels"],a:1,e:"준법문화 최대 저해 = 경영진이 단기이익 위해 통제 우회. 함정: 나머지는 강화요인."},
{id:"040",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the GOVERNING BODY (BOD/BOC) primarily:",o:["Executes daily operations","Provides oversight, sets direction, and holds management accountable","Conducts the internal audit fieldwork","Sells products"],a:1,e:"지배기구(BOD/BOC) = 감독·방향설정·경영진 답책. 함정: 일상실행·감사실무·영업은 타 역할."},
{id:"041",tp:"Q6평가",d:"Hard",q:"From the Q6 (Evaluating) perspective, the FIRST step in evaluating business plan implementation is typically to:",o:["Approve next year's plan","Establish evaluation criteria/objectives and gather actual performance data","Fire underperformers","Increase the budget"],a:1,e:"Q6 평가 1단계 = 평가기준·목표 설정 + 실적자료 수집. 함정: 승인·인사·예산은 후속·무관."},
{id:"042",tp:"Q6평가",d:"Hard",q:"When evaluating, comparing ACTUAL vs PLANNED figures is used primarily to:",o:["Punish staff","Identify variances and their root causes for corrective action","Hide deviations","Satisfy curiosity"],a:1,e:"실적 vs 계획 = 편차·근본원인 식별 → 시정. 함정: 처벌·은폐는 평가 목적 아님."},
{id:"043",tp:"Q6평가",d:"Medium",q:"A key OUTPUT of the business plan evaluation process is:",o:["A marketing campaign","Recommendations and corrective actions to improve future performance","A new logo","Staff bonuses only"],a:1,e:"BP 평가 산출 = 권고·시정조치 → 향후 개선. 함정: 마케팅·인사보상은 부산물."},
{id:"044",tp:"Q6평가",d:"Hard",q:"Evaluating compliance culture (Q6) differs from ensuring compliance (Q7) in that Q6 focuses on:",o:["Building the rules from scratch","Measuring and assessing how effectively compliance is embedded and functioning","Marketing the rules","Replacing the rules annually"],a:1,e:"Q6 = 준법 내재화·작동 효과 측정·평가. Q7 = 준법 구축·보장. 함정: Q6/Q7 역할 혼동 반복."},
{id:"045",tp:"Q6평가",d:"Hard",q:"In monitoring compliance of follow-up actions on internal audit results (a Q6 unit), the key data sources include:",o:["Only press releases","Internal audit findings, follow-up status, and OJK monitoring recommendations","Competitor financials","Customer birthdays"],a:1,e:"감사 후속조치 모니터링 자료: 감사지적·후속현황·OJK 권고. 함정: 보도자료·경쟁사는 무관."},
{id:"046",tp:"Q6컴플",d:"Hard",q:"The evaluation of compliance culture should assess whether compliance is:",o:["A separate silo isolated from the business","Integrated into business processes and decision-making at all levels","Only on paper","Limited to year-end"],a:1,e:"준법문화 평가 = 전 계층 업무·의사결정 통합 여부. 함정: 사일로·서류상·연말한정은 미성숙 징후."},
{id:"047",tp:"Q6컴플",d:"Medium",q:"A maturity indicator of compliance culture is:",o:["Employees concealing violations","Employees proactively raising compliance concerns without fear of retaliation","Ignoring whistleblowers","No compliance training"],a:1,e:"성숙 지표 = 보복 두려움 없이 자발적 준법 우려 제기. 함정: 은폐·무시·무교육은 미성숙."},
{id:"048",tp:"Q6컴플",d:"Hard",q:"Which is a valid METRIC for evaluating compliance culture effectiveness?",o:["Number of office plants","Rate of timely resolution of compliance/audit findings and incidence of repeat violations","Color of the logo","CEO's golf handicap"],a:1,e:"준법문화 지표 = 적시 해결률·반복위반 빈도. 함정: 무관항목으로 오도."},
{id:"049",tp:"Q6컴플",d:"Hard",q:"If repeat violations of the same type keep occurring, the compliance culture evaluation should conclude:",o:["The culture is excellent","Root-cause remediation is failing; systemic weakness exists","No action needed","The violations are acceptable"],a:1,e:"동종 위반 반복 = 근본원인 시정 실패, 시스템적 취약. 함정: '우수'·'무조치'는 오답."},
{id:"050",tp:"Q6컴플",d:"Medium",q:"The ultimate goal of evaluating compliance culture is to:",o:["Assign blame","Drive continuous improvement and strengthen the embedding of compliance","Reduce staff","Increase fines"],a:1,e:"준법문화 평가 목표 = 지속개선 + 준법 내재화 강화. 함정: 비난·감원·벌금은 목적 아님."},
{id:"051",tp:"BP구성",d:"Hard",q:"A complete Business Plan for a finance company should typically contain which combination?",o:["Only a profit target","Executive summary, strategy, financial projections, risk assessment, and action plans","A single marketing slide","Only competitor logos"],a:1,e:"BP 구성 = 요약·전략·재무전망·위험평가·실행계획. 함정: 단일 항목 한정은 불완전."},
{id:"052",tp:"BP구성",d:"Medium",q:"Financial projections in a Business Plan should cover:",o:["Only the current month","Multi-period forward-looking projections (e.g., income, balance sheet, key ratios)","Only past actuals","No numbers at all"],a:1,e:"재무전망 = 다기간 전향적 추정(손익·BS·핵심비율). 함정: 과거만·당월만은 계획 아님."},
{id:"053",tp:"BP구성",d:"Hard",q:"The Business Plan must remain consistent with which higher-level document?",o:["A competitor's plan","The company's vision, mission, and approved strategy","An employee's resume","A press release"],a:1,e:"BP = 회사 비전·미션·승인전략과 정합. 함정: 경쟁사·무관문서는 오답."},
{id:"054",tp:"BP구성",d:"Hard",q:"Why must the Business Plan incorporate regulatory requirements explicitly?",o:["To impress competitors","Because regulatory compliance is a precondition for sustainable operation and OJK approval","To increase page count","It is optional"],a:1,e:"BP에 규제요건 명시 = 지속경영·OJK 승인의 전제. 함정: 임의·분량용은 오답."},
{id:"055",tp:"BP보고",d:"Hard",q:"Periodic Business Plan realization reports to OJK serve to:",o:["Advertise the company","Demonstrate progress against the plan and explain material deviations","Replace audited statements","List employee names"],a:1,e:"BP 실현 보고 = 계획 대비 진척 입증 + 중대 편차 설명. 함정: 광고·재무제표 대체는 오답."},
{id:"056",tp:"BP보고",d:"Medium",q:"A material adverse deviation from the plan should be reported:",o:["Never","Promptly, with analysis and corrective measures","Only after five years","Only if profits rise"],a:1,e:"중대 부정적 편차 = 적시 보고 + 분석·시정. 함정: 미보고·지연은 위반."},
{id:"057",tp:"BP보고",d:"Hard",q:"The revision of a Business Plan during the year is generally:",o:["Strictly forbidden","Permitted under defined conditions/timelines per OJK provisions when circumstances materially change","Done weekly without limit","Decided by competitors"],a:1,e:"BP 중간 수정 = OJK 규정상 일정 요건·시한 내 허용(중대 변화 시). 함정: 절대금지·무제한은 양극단 오답."},
{id:"058",tp:"전략분석",d:"Hard",q:"A PESTEL-type analysis in strategic planning examines:",o:["Only the company's profit","Political, Economic, Social, Technological, Environmental, Legal external factors","Only internal staff","Office supplies"],a:1,e:"PESTEL = 정치·경제·사회·기술·환경·법률 외부요인. 함정: 내부·이익 한정은 오답."},
{id:"059",tp:"전략분석",d:"Hard",q:"In setting Business Plan targets, the targets should ideally be:",o:["Vague and unmeasurable","Specific, Measurable, Achievable, Relevant, Time-bound (SMART)","Impossible to track","Secret"],a:1,e:"목표 = SMART(구체·측정가능·달성가능·관련·기한). 함정: 모호·비추적은 평가 불가."},
{id:"060",tp:"전략분석",d:"Medium",q:"Competitive analysis in a Business Plan helps the company to:",o:["Copy competitors illegally","Position itself and identify differentiation and market opportunities","Ignore the market","Fix prices with rivals"],a:1,e:"경쟁분석 = 포지셔닝·차별화·기회 식별. 함정: 불법모방·담합은 위법."},
{id:"061",tp:"전략분석",d:"Hard",q:"Linking the Business Plan to Key Performance Indicators (KPIs) enables:",o:["Avoiding measurement","Objective tracking of plan execution and accountability","Hiding results","Random management"],a:1,e:"BP-KPI 연계 = 실행 객관 추적·답책성. 함정: 측정회피·은폐는 정반대."},
{id:"062",tp:"ThreeLines",d:"Hard",q:"The Three Lines Model's MAIN purpose is to:",o:["Increase bureaucracy","Clarify roles and responsibilities for risk management and control across the organization","Eliminate the BOD","Centralize all risk in audit"],a:1,e:"3선 모델 목적 = 위험관리·통제 역할·책임 명확화. 함정: 관료화·기관제거는 오답."},
{id:"063",tp:"ThreeLines",d:"Hard",q:"A common ERROR is to place the risk management function in the:",o:["Second line (correct placement)","First line as a risk-owner (incorrect — it is a 2nd line oversight function)","Governing body","External regulator"],a:1,e:"위험관리 = 2선(감독). 1선(위험소유)로 두는 것이 흔한 오류. 함정: 정답은 '오배치' 식별."},
{id:"064",tp:"ThreeLines",d:"Medium",q:"Internal audit's independence in the Three Lines Model means it should:",o:["Report to operational management","Report functionally to the governing body/audit committee, separate from line management","Conduct daily operations","Set the company's strategy"],a:1,e:"내부감사 독립성 = 기능상 지배기구·감사위원회 보고, 라인경영과 분리. 함정: 운영보고·전략수립은 독립성 훼손."},
{id:"065",tp:"ThreeLines",d:"Hard",q:"Which statement about overlap between lines is CORRECT?",o:["Lines must never communicate","Coordination and information-sharing across lines strengthen overall governance while preserving independence","One line should do everything","Audit should approve all transactions"],a:1,e:"선 간 조정·정보공유 = 거버넌스 강화(독립성 유지하며). 함정: 단절·통합·승인은 오답."},
{id:"066",tp:"감독기관",d:"Hard",q:"Which body issues the Business Plan regulation (POJK 24/2019) and supervises its implementation?",o:["Bank Indonesia","OJK","Ministry of Trade","APPI"],a:1,e:"BP 규정·감독 = OJK. 함정: BI·무역부·협회는 발행·감독 주체 아님."},
{id:"067",tp:"감독기관",d:"Medium",q:"APPI/LSPPI's relevance to the compliance/competency framework is that it:",o:["Issues POJK","Provides industry certification (e.g., SPPI levels) for competency standards","Supervises banks","Sets monetary policy"],a:1,e:"APPI/LSPPI = 역량표준 산업인증(SPPI) 제공. 함정: POJK 발행·은행감독·통화정책은 무관."},
{id:"068",tp:"감독기관",d:"Hard",q:"The legal basis hierarchy for compliance obligations places POJK:",o:["Above the governing law (UU)","Below the law (UU) but as binding implementing regulation","As non-binding guidance","Equal to internal company policy"],a:1,e:"POJK = 상위법(UU) 하위지만 구속력 있는 시행규정. 함정: 상위·비구속·내규동급은 오답."},
{id:"069",tp:"Compliance",d:"Hard",q:"A 'compliance charter' typically establishes:",o:["The marketing budget","The mandate, authority, scope, and reporting lines of the compliance function","Employee salaries","The dividend policy"],a:1,e:"준법헌장 = 준법기능 권한·범위·보고선 규정. 함정: 예산·급여·배당은 타 문서."},
{id:"070",tp:"Compliance",d:"Hard",q:"When OJK issues a new regulation, the compliance function should FIRST:",o:["Ignore it until audited","Conduct a gap analysis to assess impact and required changes","Immediately terminate operations","Wait for competitors to act"],a:1,e:"신규 POJK 대응 = 영향·필요변경 gap analysis 우선. 함정: 무시·중단·관망은 부적절."},
{id:"071",tp:"Compliance",d:"Medium",q:"Embedding compliance into product approval processes is an example of:",o:["After-the-fact compliance","Proactive/preventive compliance ('compliance by design')","Avoiding compliance","Compliance theater"],a:1,e:"상품승인에 준법 내재 = 예방적 'compliance by design'. 함정: 사후·회피·형식주의와 대조."},
{id:"072",tp:"Compliance",d:"Hard",q:"The compliance function's effectiveness ultimately depends MOST on:",o:["The size of the fines it imposes","Genuine support from senior leadership and integration into culture","The number of policies written","Its physical office location"],a:1,e:"준법 실효성 = 경영진 진정한 지원 + 문화 통합. 함정: 벌금·문서량·위치는 본질 아님."},
{id:"073",tp:"Compliance",d:"Hard",q:"Which scenario best illustrates a FAILURE of compliance culture despite good policies?",o:["Policies are followed consistently","Detailed policies exist but are routinely bypassed under business pressure","Staff escalate concerns","Audits are resolved promptly"],a:1,e:"정책은 있으나 사업압력에 상시 우회 = 문화 실패. 함정: 나머지는 건전 징후."},
{id:"074",tp:"BP구성",d:"Hard",q:"The Business Plan should be APPROVED by:",o:["The compliance officer alone","The Board of Directors and Board of Commissioners (per governance requirements)","An external vendor","The marketing team"],a:1,e:"BP 승인 = BOD·BOC(거버넌스 요건). 함정: 담당자·외부·마케팅 단독은 오답."},
{id:"075",tp:"Q6평가",d:"Hard",q:"A robust evaluation framework for the Business Plan should be:",o:["One-off and informal","Systematic, periodic, criteria-based, and documented","Based on rumor","Hidden from the BOD"],a:1,e:"BP 평가 = 체계적·정기적·기준기반·문서화. 함정: 일회·비공식·비공개는 부실."},
{id:"076",tp:"Q6컴플",d:"Hard",q:"A '3-layer + implementation steps + KSA' framework for compliance culture scope is used to:",o:["Confuse staff","Comprehensively define WHERE, HOW, and WITH WHAT CAPABILITY compliance culture is implemented","Avoid responsibility","Reduce training"],a:1,e:"3계층+이행단계+KSA = 어디서·어떻게·어떤 역량으로 준법문화 구현하는지 포괄 정의. 함정: 혼란·회피는 오답."},
{id:"077",tp:"Compliance",d:"Hard",q:"Which is the CORRECT order of escalation for a detected compliance breach?",o:["Conceal → forget","Identify → report internally → analyze → remediate → report to BOD/BOC (and OJK if required)","Report to media first","Punish first, investigate never"],a:1,e:"준법위반 처리 = 식별→내부보고→분석→시정→BOD/BOC(필요시 OJK) 보고. 함정: 은폐·언론·선처벌은 오답."},
{id:"078",tp:"Compliance",d:"Medium",q:"A whistleblowing channel supports compliance culture by:",o:["Punishing reporters","Allowing safe, confidential reporting of misconduct to enable early detection","Publicizing all reports","Replacing internal audit"],a:1,e:"내부고발 채널 = 안전·기밀 신고 → 조기탐지. 함정: 보복·공개·감사대체는 오답."},
{id:"079",tp:"Compliance",d:"Hard",q:"The 'second line of defense' would FAIL in its purpose if it:",o:["Maintains independence from the first line","Becomes operationally involved in revenue-generating decisions it is meant to oversee","Reports to the BOC","Performs risk oversight"],a:1,e:"2선 실패 = 감독대상인 수익결정에 운영적으로 개입(독립성 상실). 함정: 나머지는 정상 기능."},
{id:"080",tp:"Compliance",d:"Hard",q:"Regulatory change management as a compliance sub-process requires:",o:["Ignoring SEOJK circulars","Tracking new POJK/SEOJK, assessing impact, updating policies/processes, and training staff","Acting only on penalties","Outsourcing all decisions"],a:1,e:"규제변경 관리 = 신규 POJK/SEOJK 추적·영향평가·정책갱신·교육. 함정: 무시·사후·전면위임은 부실."},
{id:"081",tp:"전략분석",d:"Hard",q:"Scenario analysis in business planning is valuable because it:",o:["Guarantees one outcome","Tests plan resilience under different (base/optimistic/pessimistic) assumptions","Eliminates uncertainty","Replaces the BOD's judgment"],a:1,e:"시나리오 분석 = 기본·낙관·비관 가정 하 계획 강건성 시험. 함정: 단일보장·불확실성 제거는 과장."},
{id:"082",tp:"전략분석",d:"Medium",q:"A Business Plan that sets unrealistically high growth targets risks:",o:["Guaranteed success","Excessive risk-taking, breaches of prudential limits, and credibility loss","Lower compliance burden","Automatic OJK approval"],a:1,e:"비현실적 고성장 목표 = 과도위험·건전성한도 위반·신뢰상실. 함정: 보장성공·승인은 오답."},
{id:"083",tp:"BP보고",d:"Hard",q:"In evaluating BP implementation, a finding that targets were met but through EXCESSIVE risk-taking should be:",o:["Praised unconditionally","Flagged — outcome quality must consider the risk taken to achieve it","Ignored","Rewarded with no review"],a:1,e:"목표달성이나 과도위험 동반 = 위험감안한 성과질 평가 필요(경고). 함정: 무조건 칭찬·무시는 부적절."},
{id:"084",tp:"ThreeLines",d:"Hard",q:"The compliance function and risk management function, both in the 2nd line, differ in that:",o:["They are identical","Compliance focuses on legal/regulatory adherence; risk management on the full spectrum of risks","Compliance does fieldwork audits","Risk management approves loans"],a:1,e:"준법(법규준수 초점) vs 위험관리(전 위험 스펙트럼). 둘 다 2선이나 초점 다름. 함정: 동일시·역할혼동."},
{id:"085",tp:"Compliance",d:"Hard",q:"A compliance program's training component should be:",o:["One-time at hiring only","Ongoing, role-specific, and refreshed as regulations change","Optional for managers","Limited to the compliance team"],a:1,e:"준법교육 = 지속·직무특화·규제변경 시 갱신. 함정: 일회·임원면제·팀한정은 부실."},
{id:"086",tp:"Compliance",d:"Medium",q:"Documentation of compliance activities is important primarily for:",o:["Increasing paperwork","Evidencing compliance, enabling audit/review, and demonstrating accountability to OJK","Hiding decisions","Marketing"],a:1,e:"준법 문서화 = 준수 입증·감사가능·OJK 답책성. 함정: 단순 서류·은폐는 오답."},
{id:"087",tp:"Q6평가",d:"Hard",q:"Monitoring the compliance of follow-up actions on internal audit results assesses whether:",o:["Audits are never done","Agreed corrective actions from audit findings are actually implemented on time","Marketing improved","The logo changed"],a:1,e:"감사 후속 준수 모니터링 = 합의된 시정조치 적시 이행 여부. 함정: 무관항목으로 오도."},
{id:"088",tp:"Q6평가",d:"Hard",q:"If follow-up on internal audit findings is only 65% complete (vs 100% target), the evaluation rating would be:",o:["Fully Comply","Less Comply / partially compliant — a shortfall requiring attention","Excellent","Not applicable"],a:1,e:"감사후속 65%(목표 100%) = Less Comply(부분준수), 시정필요. 함정: 'Fully'·'Excellent'은 오답 — textbook 사례 수치."},
{id:"089",tp:"Compliance",d:"Hard",q:"The relationship between compliance reports and the BOC's supervisory role is that:",o:["The BOC ignores them","Compliance reports inform the BOC's oversight and enable it to hold the BOD accountable","Only the BOD sees them","They are confidential from governance"],a:1,e:"준법보고 = BOC 감독 정보 제공 → BOD 답책. 함정: BOC 배제·BOD 한정은 거버넌스 훼손."},
{id:"090",tp:"BP구성",d:"Hard",q:"Integrating risk assessment into the Business Plan ensures that:",o:["Risks are ignored","Growth strategies are stress-tested against identifiable risks before commitment","Only profits are planned","The plan is shorter"],a:1,e:"BP에 위험평가 통합 = 약속 전 성장전략 stress-test. 함정: 위험무시·이익만은 부실계획."},
{id:"091",tp:"Compliance",d:"Hard",q:"A finance company's compliance with POJK obligations is BEST evidenced by:",o:["Verbal assurances","Documented policies, monitoring records, reports, and remediation tracking","A single annual meeting","Competitor benchmarks"],a:1,e:"준법 입증 = 문서화 정책·모니터링 기록·보고·시정추적. 함정: 구두·단발·경쟁사는 불충분."},
{id:"092",tp:"전략분석",d:"Medium",q:"Aligning the Business Plan with the Industry Roadmap (2024-2028) signals that the company:",o:["Ignores industry direction","Positions itself consistently with national/industry strategic priorities","Operates illegally","Avoids all regulation"],a:1,e:"BP-Roadmap 정렬 = 산업 전략우선순위와 정합 포지셔닝. 함정: 무시·위법은 오답."},
{id:"093",tp:"Compliance",d:"Hard",q:"Which best characterizes a 'mature' compliance culture across the 3 layers?",o:["Compliance only at operational layer","Consistent compliance values and behaviors embedded at strategic, managerial, AND operational layers","Compliance only at board level","No layered structure"],a:1,e:"성숙 준법문화 = 전략·관리·운영 전 계층 일관 내재. 함정: 단일 계층 한정은 미성숙."},
{id:"094",tp:"ThreeLines",d:"Hard",q:"The PRIMARY accountability for managing risk and compliance in daily operations rests with:",o:["Internal audit","The first line (operational management that owns the risk)","External auditors","The OJK"],a:1,e:"일상 위험·준법 1차 책임 = 1선(위험소유 영업·운영). 함정: 감사·OJK에 1차책임 전가는 오해."},
{id:"095",tp:"Q6컴플",d:"Medium",q:"A compliance culture survey of employees is a tool to:",o:["Replace audits","Gauge perceptions, awareness, and the lived reality of compliance values","Set salaries","Approve loans"],a:1,e:"준법문화 설문 = 인식·인지·실제 준법가치 측정. 함정: 감사대체·급여·여신은 무관."},
{id:"096",tp:"BP보고",d:"Hard",q:"The frequency of Business Plan realization reporting to OJK is determined by:",o:["The company at random","The applicable OJK provisions (periodic, e.g., per defined schedule)","Competitors","The marketing calendar"],a:1,e:"BP 실현보고 주기 = OJK 규정(정기 일정). 함정: 임의·경쟁사·마케팅은 오답."},

{id:"098",tp:"전략분석",d:"Hard",q:"A Business Plan's assumptions about funding sources must be consistent with:",o:["Deposit-taking (not permitted)","Permitted funding sources (bonds, bank loans, sukuk) and the gearing ratio limit","Unlimited leverage","Government grants only"],a:1,e:"BP 자금가정 = 허용자금원(채권·차입·sukuk) + gearing 10배 한도 정합. 함정: 예금수취 불가·무제한 레버리지는 위반."},
{id:"099",tp:"Q6평가",d:"Hard",q:"The 'Plan-Do-Check-Act' (PDCA) cycle relates to business plan management by:",o:["Skipping the Check phase","Providing a continuous improvement loop: plan, execute, evaluate, and act on findings","Doing only the Plan phase","Eliminating evaluation"],a:1,e:"PDCA = 계획·실행·평가·조치의 지속개선 루프(Q6 평가는 Check-Act). 함정: 평가 생략은 PDCA 위배."},
{id:"100",tp:"Compliance",d:"Hard",q:"A candidate must distinguish Q6 vs Q7 and the Three Lines. Which statement is CORRECT?",o:["Ensuring compliance is Q6; evaluating compliance culture is Q7","Developing a BP is Q7; evaluating a BP is Q6; compliance is the 2nd line; internal audit is the 3rd line","Compliance is the 1st line; audit is the 2nd line","All units are Q6 and there are only two lines"],a:1,e:"정답: BP개발=Q7, BP평가=Q6, 준법=2선, 내부감사=3선. 함정: Q6/Q7 swap, 1선/2선/3선 오배치를 한 문항에 집약 — 빈출 종합."},
];

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W2_v2";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
const UNIT_LABEL={U1:"Unit 1 · Business Plan",U2:"Unit 2 · Compliance"};
let quiz=[], cur=0, answers=[], picked=false;

const app=document.getElementById('app');

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp;
    cur=0;answers=[];render();return;
  }
  if(mode==='all') quiz=shuffle(BANK);
  else if(mode==='u1') quiz=shuffle(BANK.filter(q=>q.u==='U1'));
  else if(mode==='u2') quiz=shuffle(BANK.filter(q=>q.u==='U2'));
  else if(mode==='supp') quiz=shuffle(BANK.filter(q=>parseInt(q.id)>=51));
  else quiz=shuffle(BANK).slice(0,30);
  cur=0; answers=[]; render();
}

function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Unit 1 + Unit 2 완주</span></button>
        <button onclick="start('u1')">Unit 1만 (Business Plan) <span class="desc">32문항</span></button>
        <button onclick="start('u2')">Unit 2만 (Compliance) <span class="desc">31문항</span></button>
        <button onclick="start('supp')">보강 13문항만 <span class="desc">Q6 평가관점·역량군·Three Lines</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W2-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}

function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta">
      <span>문항 ${cur+1} / ${quiz.length}</span>
      <span>QID W2-${q.id}</span>
    </div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags">
      <span class="tag unit">${UNIT_LABEL[q.u]}</span>
      <span class="tag ${dcls}">${q.d}</span>
    </div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}

function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  const opts=document.querySelectorAll('#opts .opt');
  opts.forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}

function next(){
  if(cur<quiz.length-1){cur++;render()}
  else result();
}

function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const u1=answers.filter((a,i)=>quiz[i].u==='U1');
  const u2=answers.filter((a,i)=>quiz[i].u==='U2');
  const u1r=u1.filter(a=>a.correct).length, u2r=u2.filter(a=>a.correct).length;
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${u1.length?`<div class="row"><span>Unit 1 · Business Plan</span><b>${u1r} / ${u1.length}</b></div>`:''}
        ${u2.length?`<div class="row"><span>Unit 2 · Compliance</span><b>${u2r} / ${u2.length}</b></div>`:''}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W2-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}

// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
