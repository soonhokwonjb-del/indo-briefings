<style>
  :root{
    --ink:#1a2238; --paper:#f7f5ef; --line:#d8d3c4;
    --gold:#b8893a; --gold-soft:#e8dcc0;
    --green:#2f6b4f; --red:#a33a2e; --blue:#2f5170;
    --shadow:0 1px 0 rgba(26,34,56,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--paper); color:var(--ink);
    line-height:1.6; padding:24px 16px 80px;
  }
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.unit{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>
</head>

<div class="wrap">
  <header>
    <div class="eyebrow">SPPI Level 7 · Financing Management</div>
    <h1>W2 모의문제 — Business Plan & Compliance</h1>
    <div class="sub">Unit 1 Business Plan · Unit 2 Compliance & Compliance Culture · 100문항 풀 · K6/K7 신규판(2026) + Day1 신규판 기반</div>

  <div class="panel" id="app"></div>
  <footer>출처: A to Z in Finance Company Business (Day 1) / Training Module Qualification Level 6·7 (Day 2)</footer>

<script>
const BANK = [
{id:"001",tp:"BP구성",d:"Medium",q:"A finance company's Business Plan under the K6/K7 framework must contain which three time horizons?",o:["Short, medium, and long-term plans","Daily, weekly, and monthly plans","Only annual and five-year plans","Quarterly and semi-annual plans only"],a:0,e:"The Business Plan covers short, medium, and long-term plans, supported by macro assumptions and operational targets."},
{id:"002",tp:"BP구성",d:"Medium",q:"Which set of items are classified as MACRO assumptions in a finance company Business Plan?",o:["Economic growth, GDP per capita, inflation, BI rate, exchange rates, oil prices","Marketing STP and competitor pricing","Branch headcount and IT upgrade schedule","Booking targets, number of HR, service networks"],a:0,e:"Macro assumptions include economic growth, GDP per capita, inflation, BI rate, exchange rates and oil prices; demand/booking/HR are operational assumptions."},
{id:"003",tp:"BP구성",d:"Medium",q:"In the Business Plan, booking targets, funding sources, HR numbers, service networks and IT improvements belong to which category?",o:["Audit findings","Macro assumptions","Regulatory disclosures","Operational (micro) assumptions"],a:3,e:"These are operational assumptions derived from the macro assumptions, expressing how the company will execute its plan."},
{id:"004",tp:"BP목표",d:"Medium",q:"When formulating Vision, Mission and Values, which statement correctly pairs each with its orientation?",o:["Vision = 'How to Do', Mission = 'To Be', Values = 'To Do'","Vision = 'When', Mission = 'Where', Values = 'Why'","Vision = 'To Do', Mission = 'To Be', Values = 'When to Do'","Vision = 'To Be', Mission = 'To Do', Values = 'How to Do'"],a:3,e:"Vision answers 'To Be', Mission answers 'To Do', and Values answer 'How to Do'."},
{id:"005",tp:"Vision",d:"Easy",q:"The Company's Values in the strategic framework primarily answer which question?",o:["To be (the future state)","How to do (the way of working)","To do (the mission)","Where to compete"],a:1,e:"Values define 'how to do' — the conduct and way of working that supports vision and mission."},
{id:"006",tp:"BP구성",d:"Hard",q:"Which document describes the macro and operational assumptions plus short/medium/long-term targets and must be submitted to OJK?",o:["Anti-Fraud Strategy report","GCG self-assessment report","Business Plan (RBB)","Sustainability Report"],a:2,e:"The Business Plan (Rencana Bisnis) consolidates assumptions and multi-horizon targets and is reported to OJK."},
{id:"007",tp:"전략분석",d:"Hard",q:"In evaluating a finance company's Business Plan (Q6), which analysis tool maps the company's segmentation, targeting and positioning in the market?",o:["BMPP calculation","Gearing ratio test","FAR computation","STP analysis (Segmentation–Targeting–Positioning)"],a:3,e:"Market competition assessment uses STP — the company's segmentation, targeting and positioning."},
{id:"008",tp:"전략분석",d:"Hard",q:"When evaluating the realism of a Business Plan, an evaluator should FIRST verify which of the following?",o:["The number of pages in the plan","Whether the CEO signed in blue ink","The color scheme of the slide deck","Consistency of macro assumptions with current economic conditions"],a:3,e:"Evaluation starts by checking that macro assumptions (growth, inflation, rates) are consistent with the real business environment."},
{id:"009",tp:"전략분석",d:"Hard",q:"A Business Plan projects 40% receivables growth while the macro section assumes flat GDP and tightening BI rate. The evaluator should conclude:",o:["Higher growth always proves a stronger plan","The growth target appears inconsistent with stated macro assumptions and needs justification","Macro assumptions are irrelevant to targets","The plan is automatically compliant"],a:1,e:"Targets must be internally consistent with macro assumptions; an unjustified gap is a key evaluation red flag."},
{id:"010",tp:"전략분석",d:"Medium",q:"Which financial-health items are reviewed under 'Company Conditions' when evaluating a Business Plan?",o:["Only the office lease cost","Main funding sources, latest financial position, key ratios (ROA, NPF, Gearing, A/R-to-Assets)","Only the marketing budget","Only the audit fee"],a:1,e:"Company Conditions review covers funding sources, financial position and key ratios such as ROA, NPF, gearing and A/R-to-assets."},
{id:"011",tp:"BP보고",d:"Medium",q:"Under 'Organization & Financial Reports', what does the 'Job Duties' element primarily express?",o:["Tax filings","Shareholder history","Dividend policy","Key Performance Indicators (KPIs) and Key Success Factors (KSFs)"],a:3,e:"Job Duties are expressed through KPIs and KSFs that link roles to measurable outcomes."},
{id:"012",tp:"BP보고",d:"Medium",q:"'Company Background' in the Business Plan evaluation typically includes:",o:["Only the gearing ratio","Only the IT roadmap","Only next year's booking target","Shareholders, company history, and business focus"],a:3,e:"Company Background covers shareholders, history and business focus."},
{id:"013",tp:"BP보고",d:"Hard",q:"Which element is assessed under 'Health Level' when reviewing a finance company's condition?",o:["The CEO's tenure only","The number of board meetings only","The font used in reports","How healthy and compliant the company is with regulations, including any sanctions"],a:3,e:"Health Level assesses regulatory compliance, soundness and any sanctions imposed."},
{id:"014",tp:"BP구성",d:"Hard",q:"The Roadmap for Development and Strengthening of Finance Companies 2024–2028 sets which Phase 2 (2026–2027) label?",o:["Adjustment and Growth","Digital Transition","Strengthening the Foundation","Consolidation and Creating Momentum"],a:3,e:"Phase 1 (2024-25)=Strengthening the Foundation; Phase 2 (2026-27)=Consolidation and Creating Momentum; Phase 3 (2028)=Adjustment and Growth."},
{id:"015",tp:"BP구성",d:"Hard",q:"Per the 2024–2028 Roadmap, the aggregate FAR end-state target for Phase 3 (2028) is:",o:["89%–90%","85%–86%","80%–82%","87%–88%"],a:0,e:"Roadmap aggregate FAR targets: Phase1 85-86%, Phase2 87-88%, Phase3 89-90%."},
{id:"016",tp:"BP구성",d:"Medium",q:"Per the 2024–2028 Roadmap, Phase 1 (2024–2025) carries which label?",o:["Ecosystem Expansion","Adjustment and Growth","Consolidation and Creating Momentum","Strengthening the Foundation"],a:3,e:"Phase 1 is 'Strengthening the Foundation' (2024-2025)."},
{id:"017",tp:"BP구성",d:"Hard",q:"Which is one of the six strategy axes in the 2024–2028 Finance Company Roadmap?",o:["Branch closure quota","Mandatory dividend payout","Fixed interest rate cap","Strengthening Capital, Governance, Risk Management, and Human Resources"],a:3,e:"Roadmap strategy 1 is Strengthening Capital, Governance, Risk Management and Human Resources."},
{id:"018",tp:"BP구성",d:"Medium",q:"The 2024-2028 Roadmap aggregate productive-sector financing share target for Phase 3 (2028) is:",o:["49%–51%","46%–48%","55%–60%","44%–45%"],a:0,e:"Productive-sector share targets: Phase1 44-45%, Phase2 46-48%, Phase3 49-51%."},
{id:"019",tp:"BP보고",d:"Medium",q:"A Business Plan should state assumptions about demand levels and booking targets because they:",o:["Translate macro assumptions into achievable operational targets","Are set by OJK, not the company","Are required only for Sharia units","Replace the need for macro assumptions"],a:0,e:"Operational assumptions convert the macro outlook into concrete demand and booking targets."},
{id:"020",tp:"전략분석",d:"Hard",q:"In Business Plan evaluation, which finding most directly signals strategic risk?",o:["Business strategy is misaligned with current business-environment conditions","The plan is 30 pages long","The plan has a table of contents","Macro assumptions cite BI rate"],a:0,e:"Strategy risk arises chiefly from misalignment of strategy with the business environment and weak strategy formulation."},
{id:"021",tp:"전략분석",d:"Medium",q:"Sources of strategic risk in a Business Plan include all EXCEPT:",o:["Strong internal control over financial reporting","Insufficient management information system","Weak strategy-formulation process","Too-aggressive goal setting"],a:0,e:"Strategic risk sources: weak formulation, insufficient MIS, improper environment analysis, over-aggressive goals; strong ICFR is a mitigant, not a source."},
{id:"022",tp:"BP구성",d:"Medium",q:"Which is NOT typically part of a finance company Business Plan?",o:["Funding source plan","Macro assumptions","HR and service-network plan","A consumer's individual credit score"],a:3,e:"A Business Plan contains macro/operational assumptions and targets; individual debtor scores are operational data, not plan content."},
{id:"023",tp:"BP보고",d:"Hard",q:"Within 'Company Conditions', 'Market Competition' is documented through:",o:["The company's STP plus current and mid-term marketing plans","Only the org chart","Only the gearing ratio","Only the audit opinion"],a:0,e:"Market Competition is captured via STP and the current/mid-term marketing plans."},
{id:"024",tp:"전략분석",d:"Hard",q:"An evaluator notes a Business Plan omits any contingency under adverse macro scenarios. The most appropriate conclusion is:",o:["The plan is automatically approved","Only Sharia units need contingencies","Risk-management adequacy of the plan is deficient and should be flagged","The omission is irrelevant"],a:2,e:"A sound plan should embed risk management and contingency thinking; absence is a deficiency to flag."},
{id:"025",tp:"BP목표",d:"Medium",q:"Mission statements ('To Do') in the strategic framework are best described as:",o:["A numeric five-year revenue figure","The risk appetite statement","The company's core purpose and what it does for stakeholders","The dividend schedule"],a:2,e:"Mission expresses the organization's purpose — what it does — distinct from vision (to be) and values (how)."},
{id:"026",tp:"BP구성",d:"Hard",q:"Which Roadmap pillar focuses on 'Strengthening Resilience and Competitiveness'?",o:["Pillar 1","Pillar 3","Pillar 4","Pillar 2"],a:0,e:"Roadmap Pillar 1 = Strengthening Resilience and Competitiveness."},
{id:"027",tp:"BP보고",d:"Medium",q:"Organizational Structure & Functions in a Business Plan documents:",o:["Only the dividend ratio","Only the marketing slogan","Number of Directors, GMs and Managers and how they are divided","Only the audit committee charter"],a:2,e:"This element sets out the management headcount (Directors/GMs/Managers) and division of functions."},
{id:"028",tp:"전략분석",d:"Hard",q:"Best practice when an evaluator finds an over-optimistic booking target is to:",o:["Reject the entire plan without analysis","Request the underlying assumptions and stress-test them against macro data","Approve it because optimism shows ambition","Ignore it if the CEO approved"],a:1,e:"The evaluator should trace targets to assumptions and stress-test them, not simply accept or reject."},
{id:"029",tp:"Compliance",d:"Medium",q:"Per the new K7 unit 'Ensuring Compliance', which is the FIRST competency step in the compliance cycle?",o:["Impose sanctions on violators","Distribute the compliance report to the public","Terminate non-compliant contracts","Collect data and information on finance company compliance"],a:3,e:"The unit sequence: collect compliance data → assess impact of new/amended rules → analyze compliance level → report."},
{id:"030",tp:"Compliance",d:"Hard",q:"Under the compliance unit, when a NEW regulation is issued, the required analytical output is:",o:["Automatic dividend suspension","Analysis of the impact on the finance company and recommended follow-up actions","Immediate license surrender","A press release"],a:1,e:"New/amended regulations must be analyzed for company impact, with follow-up concepts recommended to relevant work units."},
{id:"031",tp:"Compliance",d:"Hard",q:"Which is the correct order of follow-up on a new regulation per the compliance unit?",o:["Report → identify → ignore → archive","Identify impact → design follow-up concept → recommend to work unit → implement → monitor & evaluate","Implement → identify → monitor → recommend","Monitor → recommend → identify → implement"],a:1,e:"Steps: identify regulatory impact, design follow-up, recommend to the relevant unit, implement, then monitor and evaluate."},
{id:"032",tp:"Compliance",d:"Medium",q:"Quarterly Compliance Reports to OJK are part of which data category in the compliance unit?",o:["Compliance Reports to OJK","AML/CFT data","Consumer protection data","Tax data"],a:0,e:"Compliance Reports to OJK include quarterly reports, annual reports (if requested) and incidental reports for serious violations."},
{id:"033",tp:"Compliance",d:"Hard",q:"Which report is filed only 'if requested' by OJK under the compliance unit?",o:["Monthly financial report","Quarterly Compliance Report","Incidental violation report","Annual Compliance Report"],a:3,e:"Quarterly compliance reports are routine; annual compliance reports are submitted if requested; incidental reports cover serious violations."},
{id:"034",tp:"Compliance",d:"Hard",q:"An 'Incidental Report' in the compliance framework is triggered by:",o:["A serious violation or extraordinary event","Routine staff training","The end of each quarter","Every board meeting"],a:0,e:"Incidental reports are event-driven — filed upon a serious violation or extraordinary event."},
{id:"035",tp:"Compliance",d:"Medium",q:"Which items belong to the AML/CFT/PPPSPM compliance data set?",o:["Marketing slogans","Dividend records","STR, CTR, KYC/CDD and KYE evidence","ROA and FAR ratios"],a:2,e:"AML/CFT/PPPSPM data includes Suspicious Transaction Reports, Cash Transaction Reports, KYC/CDD and Know-Your-Employee evidence."},
{id:"036",tp:"감독기관",d:"Medium",q:"KYE (Know Your Employee) is a compliance control aimed primarily at:",o:["Setting interest rates","Mitigating internal fraud and integrity risk among staff","Choosing the auditor","Pricing insurance"],a:1,e:"KYE strengthens internal integrity controls, complementing KYC/CDD for customers."},
{id:"037",tp:"Compliance",d:"Hard",q:"Compliance Risk Indicators in the compliance unit include all EXCEPT:",o:["Number/type of regulator sanctions","The company's share price","Number of internal violations detected","Trends in potential compliance risks"],a:1,e:"Indicators: internal violations detected, sanctions received, and compliance-risk trends; share price is not a stated indicator."},
{id:"038",tp:"Compliance",d:"Hard",q:"Before a compliance level report is distributed, the KEY control variable is:",o:["Approval by external customers","Approval/validation by the Compliance Director (or committee) and the internal audit/monitoring unit","No approval is needed","Approval by the marketing team"],a:1,e:"Consent before distribution requires approval from the Compliance Director/committee and content validation by internal audit or the compliance monitoring unit."},
{id:"039",tp:"Compliance",d:"Medium",q:"A regular compliance report distribution cadence to OJK typically follows which pattern?",o:["Every five years","Only once at IPO","Monthly, quarterly and annual reports","Only when sued"],a:2,e:"Regular compliance reporting follows monthly/quarterly/annual cadence, with ad-hoc reports as needed."},
{id:"040",tp:"Compliance",d:"Hard",q:"For the GCG report specifically, the compliance unit notes it must include:",o:["Only the dividend ratio","A self-assessment and corrective action plan","Only a cover letter","Only marketing data"],a:1,e:"The GCG report must contain a self-assessment plus a corrective action plan for any shortcomings."},
{id:"041",tp:"감독기관",d:"Medium",q:"Who licenses and supervises finance companies (multifinance) in Indonesia?",o:["Ministry of Trade","PPATK","OJK","Bank Indonesia"],a:2,e:"OJK licenses and supervises NBFIs including finance companies; PPATK receives STR/CTR for AML purposes."},
{id:"042",tp:"감독기관",d:"Hard",q:"Suspicious Transaction Reports and Cash Transaction Reports under AML rules are reported to:",o:["OJK Consumer Protection","GAIKINDO","PPATK","KSEI"],a:2,e:"STR/CTR are reported to PPATK (the financial intelligence unit); OJK supervises but PPATK receives the AML reports."},
{id:"043",tp:"Compliance",d:"Hard",q:"Per POJK 8/2023 (APU-PPT), the program is implemented using which approach?",o:["Volume-based approach","Rule-only approach","Risk-Based Approach (RBA)","Random sampling only"],a:2,e:"POJK 8/2023 mandates a Risk-Based Approach: high-risk → enhanced measures, low-risk → simplified measures (unless ML/TF suspicion exists)."},
{id:"044",tp:"Compliance",d:"Hard",q:"Under the RBA in POJK 8/2023, 'simplified measures' may be applied to low-risk customers EXCEPT when:",o:["The customer is local","The amount is small","The customer is a repeat client","There is suspicion of money laundering or terrorism financing"],a:3,e:"Simplified measures are not permitted where ML/TF is suspected, regardless of apparent low risk."},
{id:"045",tp:"Compliance",d:"Medium",q:"Which four risk dimensions must a finance company assess under POJK 8/2023 RBA risk assessment?",o:["Only customer and amount","Only country and currency","Only product and price","Customer; country/geographic area; products/services/transactions; delivery channels"],a:3,e:"RBA risk assessment covers customer, country/geography, products/services/transactions and delivery channels."},
{id:"046",tp:"Compliance",d:"Hard",q:"Under POJK 8/2023, AML/CFT policies and procedures must be approved by:",o:["The Board of Commissioners","The external auditor","The customer","The marketing manager"],a:0,e:"Risk management & mitigation requires policies/procedures approved by the Board of Commissioners with supervision of the program."},
{id:"047",tp:"Compliance",d:"Medium",q:"EDD (Enhanced Due Diligence) under AML supervision is applied to:",o:["Only low-risk customers","All customers equally","Higher-risk customers/relationships","Only employees"],a:2,e:"EDD is the enhanced measure for higher-risk profiles; standard CDD applies generally."},
{id:"048",tp:"Compliance",d:"Hard",q:"Which POJK governs Human Resources Development and certification obligations for finance companies?",o:["POJK 48/2024","POJK 43/2025","POJK 43/2024","POJK 34/2018"],a:2,e:"POJK 43/2024 governs HR development; note 43/2025 does not exist in this context."},
{id:"049",tp:"Compliance",d:"Hard",q:"Under POJK 43/2024, finance companies must budget and realize HR education/training of at least:",o:["2.5% of personnel/employee expenses","10% of equity","5% of total assets","2.5% of net income"],a:0,e:"The HR training budget base is 2.5% of personnel (employee) expenses — not net income."},
{id:"050",tp:"Compliance",d:"Hard",q:"Per POJK 43/2024 certification obligations, which staff must hold collection-field professional certificates?",o:["Only marketing interns","Employees and/or outsourced personnel handling collection and collateral execution","Only IT staff","Only the CEO"],a:1,e:"Collection/collateral-execution staff (including outsourced) need collection-field certification; directors/commissioners need financing-sector expertise certificates."},
{id:"051",tp:"Compliance",d:"Hard",q:"Under POJK 43/2024, the Director overseeing the HR quality function must be:",o:["An external consultant","A foreign expert","A board commissioner","An Indonesian citizen"],a:3,e:"The director overseeing HR quality management/development must be an Indonesian citizen."},
{id:"052",tp:"Compliance",d:"Medium",q:"Which POJK governs Anti-Fraud Strategy for financial services institutions including finance companies?",o:["POJK 8/2023","POJK 12/2024","POJK 43/2024","POJK 28/2024"],a:1,e:"POJK 12/2024 governs the Anti-Fraud Strategy; POJK 28/2024 governs SIPELAKU."},
{id:"053",tp:"Compliance",d:"Hard",q:"POJK 12/2024 (Anti-Fraud Strategy) began applying to finance companies starting:",o:["January 1, 2025","October 23, 2024","June 26, 2026","July 1, 2024"],a:1,e:"POJK 12/2024 applies to finance companies from October 23, 2024; first AFS report due 31 January 2025."},
{id:"054",tp:"Compliance",d:"Hard",q:"Which POJK governs the SIPELAKU track-record system for fraud actors?",o:["POJK 49/2024","POJK 34/2018","POJK 28/2024","POJK 12/2024"],a:2,e:"POJK 28/2024 establishes SIPELAKU; POJK 12/2024 is the Anti-Fraud Strategy."},

{id:"056",tp:"Compliance",d:"Hard",q:"Under POJK 34/2018, reassessment of primary parties is triggered by indications of:",o:["Marketing under-performance","Low dividend payout","Slow IT systems","Integrity, financial feasibility, financial reputation, and/or competence issues"],a:3,e:"Reassessment addresses integrity, financial feasibility/reputation and competence concerns of primary parties."},

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W2";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
const UNIT_LABEL={U1:"Unit 1 · Business Plan",U2:"Unit 2 · Compliance"};
let quiz=[], cur=0, answers=[], picked=false;

const app=document.getElementById('app');

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp;
    cur=0;answers=[];render();return;
  }
  if(mode==='all') quiz=shuffle(BANK);
  else if(mode==='u1') quiz=shuffle(BANK.filter(q=>q.u==='U1'));
  else if(mode==='u2') quiz=shuffle(BANK.filter(q=>q.u==='U2'));
  else if(mode==='supp') quiz=shuffle(BANK.filter(q=>parseInt(q.id)>=51));
  else quiz=shuffle(BANK).slice(0,30);
  cur=0; answers=[]; render();
}

function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Unit 1 + Unit 2 완주</span></button>
        <button onclick="start('u1')">Unit 1만 (Business Plan) <span class="desc">32문항</span></button>
        <button onclick="start('u2')">Unit 2만 (Compliance) <span class="desc">31문항</span></button>
        <button onclick="start('supp')">보강 13문항만 <span class="desc">Q6 평가관점·역량군·Three Lines</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W2-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}

function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta">
      <span>문항 ${cur+1} / ${quiz.length}</span>
      <span>QID W2-${q.id}</span>
    </div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags">
      <span class="tag unit">${UNIT_LABEL[q.u]}</span>
      <span class="tag ${dcls}">${q.d}</span>
    </div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}

function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  const opts=document.querySelectorAll('#opts .opt');
  opts.forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}

function next(){
  if(cur<quiz.length-1){cur++;render()}
  else result();
}

function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const u1=answers.filter((a,i)=>quiz[i].u==='U1');
  const u2=answers.filter((a,i)=>quiz[i].u==='U2');
  const u1r=u1.filter(a=>a.correct).length, u2r=u2.filter(a=>a.correct).length;
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${u1.length?`<div class="row"><span>Unit 1 · Business Plan</span><b>${u1r} / ${u1.length}</b></div>`:''}
        ${u2.length?`<div class="row"><span>Unit 2 · Compliance</span><b>${u2r} / ${u2.length}</b></div>`:''}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W2-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}

// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
