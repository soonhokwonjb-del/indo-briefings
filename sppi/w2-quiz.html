<style>

  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}

<script>
const BANK = [
{id:"001",u:"U1",d:"Hard",q:"According to POJK 24/POJK.05/2019, which of the following BEST describes a Business Plan for a Finance Company?",o:["A written document describing development plans and business activities over a specific period, along with strategies to achieve those plans","A monthly operational report submitted to OJK for compliance purposes","An internal audit report assessing the effectiveness of risk management processes","A regulatory filing that replaces the Health Level assessment for NBFIs"],a:0,e:"SEOJK 23/2019 및 POJK 24/2019 정의. (A) operational report, (C) audit report, (D) 전혀 다른 문서."},
{id:"002",u:"U1",d:"Hard",q:"Which of the following is CORRECTLY listed as a required component under POJK 24/2019?",o:["Executive Summary, and Annual Audit Report","Vision, Mission, Business Strategy, and Management Policies and Plans","Fraud Investigation Report and Employee Performance Metrics","Liquidity Stress Test and Derivative Instrument Portfolio"],a:1,e:"7대 구성요소 — (a)Executive Summary, (c)Vision/Mission/Strategy, (d)Management Policies and Plans 등."},
{id:"003",u:"U1",d:"Hard",q:"Under the Management Policies and Plans section of a Business Plan, which of the following is included?",o:["Financial literacy and inclusion activity plans","Results of the previous year's internal audit","Significant fraud incident reports","AML/CFT compliance assessment"],a:0,e:"(d)항 7번째 항목 = financial literacy and inclusion 활동 계획."},
{id:"004",u:"U1",d:"Medium",q:"A plan for conversion to a Sharia Finance Company should be placed in which Business Plan section?",o:["Under Management Policies and Plans (section d)","Under Financial Statement Projections (section e)","Under Other Information (section g)","Under the Executive Summary (section a)"],a:2,e:"(g) Other Information includes conversion plans to a Sharia Finance Company."},
{id:"005",u:"U1",d:"Hard",q:"According to POJK 24/2019 Article 15, how frequently must NBFIs submit a Business Plan Supervision Report to OJK?",o:["Monthly","Quarterly","Semi-annually","Annually"],a:2,e:"Article 15 — semi-annual Business Plan Supervision Report."},
{id:"006",u:"U1",d:"Hard",q:"The Business Plan Supervision Report under POJK 24/2019 is prepared by which body?",o:["The Board of Directors","The Board of Commissioners","The External Auditor","OJK's Supervision Team"],a:1,e:"BOC가 제출. BOD는 Realization Report 작성."},
{id:"007",u:"U1",d:"Medium",q:"Which of the following best describes a company's VISION according to SEOJK 23/2019?",o:["The short-term approach used to achieve the company's goals","The long-term goal the company aims to achieve","A written plan describing annual business activities","A set of operational procedures for daily business conduct"],a:1,e:"Vision = long-term goal. Mission = short/medium-term approach."},
{id:"008",u:"U1",d:"Medium",q:"A well-formulated Vision statement for a Finance Company should be:",o:["Detailed, comprehensive, and filled with operational specifics","Focused solely on financial targets and quarterly profitability","Based exclusively on regulatory requirements from OJK","Future-oriented, clear, inspirational, concise, and aligned with company values"],a:3,e:"Vision 4대 요건: Aligned with Values / Future-Oriented / Clear & Inspirational / Concise & Compact."},
{id:"009",u:"U1",d:"Hard",q:"Which analytical tool focuses on Political, Economic, Social, Technological, Environmental, and Legal factors?",o:["SWOT Analysis","PESTEL Analysis","Porter's Five Forces","Risk Heat Map"],a:1,e:"PESTEL. SWOT는 내외부 종합, Porter's는 산업구조."},
{id:"010",u:"U1",d:"Hard",q:"In Porter's Five Forces applied to Finance Companies, 'Bargaining Power of Suppliers' primarily refers to:",o:["Funding sources such as banks, investors, and capital markets","Raw material suppliers providing manufacturing inputs","Technology vendors supplying digital banking platforms","Government agencies providing business licenses"],a:0,e:"Finance Company에서 Suppliers = 자금원(은행·투자자·자본시장)."},
{id:"011",u:"U1",d:"Hard",q:"Which best represents the 'Threat of Substitutes' for a Finance Company?",o:["A new Finance Company entering the market with OJK licensing","Increased bargaining power from institutional investors","OJK issuing new compliance regulations","Bank loans, fintech lending, Pay Later services, and credit cooperatives"],a:3,e:"Substitutes = 대안 금융상품. 은행대출·핀테크·Pay Later·신협."},
{id:"012",u:"U1",d:"Medium",q:"The correct sequence for developing a company's Work Plan under POJK 24/2019 is:",o:["KPI → Budget → Strategy → Target → Initiative","Strategy → Goals → KPI → Target → Initiative → Budget","Budget → Strategy → Target → KPI → Initiative → Goals","Vision → Mission → Budget → KPI → Strategy"],a:1,e:"6단계: Strategy → Strategic Goals → KPIs → KPI Targets → Initiatives → Budget."},
{id:"013",u:"U1",d:"Medium",q:"Which Business Plan objective type focuses on 'optimizing digital technology to improve service quality and customer experience'?",o:["Value Proposition","Product Leadership","Customer Intimacy","Operational Excellence"],a:2,e:"Customer Intimacy = 디지털 기술로 서비스 품질·고객 경험 개선·맞춤형."},
{id:"014",u:"U1",d:"Medium",q:"A digital onboarding strategy targeting 30% cost reduction and 15-minute processing falls under which type?",o:["Short-term Work Plan (Execution)","Value Proposition","Customer Intimacy","Long-term Sustainable Finance Hub"],a:0,e:"Digital Onboarding = 단기 실행 계획(short-term concrete plan)."},
{id:"015",u:"U1",d:"Hard",q:"The MOST direct reason the Business Plan Supervision Report must contain a Board of Commissioners assessment is:",o:["OJK requires internal audit involvement in all governance reports","POJK 24/2019 Article 6 obligates the BOC to supervise Business Plan implementation","Directors are prohibited from submitting reports to OJK directly","External auditors are not authorized to assess business strategy"],a:1,e:"Article 6 — BOC는 Business Plan 이행을 감독할 의무."},
{id:"016",u:"U1",d:"Medium",q:"Fintech offering faster, cheaper approvals than Finance Companies MOST directly addresses which Force?",o:["Threat of Substitutes","Bargaining Power of Suppliers","Threat of New Entrants","Bargaining Power of Buyers"],a:0,e:"더 빠르고 저렴한 핀테크 = Substitutes 위협."},
{id:"017",u:"U1",d:"Hard",q:"Format 18 in SEOJK 23/2019 refers to which document?",o:["Standard template for monthly compliance reports","Health Level self-assessment form","Anti-fraud incident reporting template","Business Plan Monitoring Report (Business Plan Supervision Report)"],a:3,e:"Format 18 = Business Plan Monitoring Report (BOC semi-annual)."},
{id:"018",u:"U1",d:"Medium",q:"A Mission statement should focus on which according to SEOJK 23/2019?",o:["Long-term aspirations and future-oriented direction","Short or medium-term steps, customer/stakeholder focus, and differentiation","Annual KPI targets and budget allocation","Regulatory compliance procedures and operational controls"],a:1,e:"Mission = 단·중기 접근. 요건: Specific & Relevant + Customer/Stakeholder Focused."},
{id:"019",u:"U1",d:"Medium",q:"Which is listed under 'Other Information' (g) of the Business Plan?",o:["Funding plans","Organizational and HR development plans","Capital plans","Direct participation (equity) plans"],a:3,e:"(g) = direct participation / sustainable finance / merger·spin-off / Sharia conversion. (A)(B)(D)는 (d)항."},
{id:"020",u:"U1",d:"Medium",q:"'Sustainability-Linked Loans' with lower rates for ESG targets aligns with which long-term strategy?",o:["Digital Onboarding Strategy","Strengthening Collectability","Expansion into the Underbanked Segment","Green & Sustainable Finance Hub"],a:3,e:"Green & Sustainable Finance Hub = ESG 파이낸싱·Green bonds."},
{id:"021",u:"U1",d:"Hard",q:"The Business Plan Realization Report must include which of the following?",o:["A forecast for the next 3-year business cycle","A complete audit trail of all employee transactions","An explanation of deviations from the Business Plan and follow-up efforts taken","Proposals for new regulatory changes to OJK"],a:2,e:"핵심: (a)달성 설명 (b)이탈 설명 (c)후속 조치."},
{id:"022",u:"U1",d:"Medium",q:"Which is NOT one of the four Business Plan principles (Balance, Sustainability, Collaboration, Accountability)?",o:["Balance: Harmonizing business needs with regulatory compliance","Transparency: Full disclosure of all financial transactions to OJK","Sustainability: Creating long-term value for all stakeholders","Accountability: Transparency and responsibility to all relevant parties"],a:1,e:"4대 원칙 = Balance/Sustainability/Collaboration/Accountability. Transparency는 GCG TARIF 소속, BP 4원칙 아님."},
{id:"023",u:"U1",d:"Medium",q:"Which factor MOST supports the conclusion 'Threat of New Entrants is Moderate to Low'?",o:["High consumer price sensitivity","Increasing availability of substitute financing products","Strong bargaining power of institutional investors","OJK licensing requirements, large capital needs, and digital infrastructure barriers"],a:3,e:"진입 장벽: OJK 라이선스 + 대규모 자본 + 디지털 인프라."},
{id:"024",u:"U1",d:"Hard",q:"Which BEST describes the relationship between POJK 24/2019 and SEOJK 23/2019?",o:["POJK is operational guidance while SEOJK is the binding regulation","POJK is the binding regulation while SEOJK provides practical implementation guidance","Both are equally binding regulations issued simultaneously","SEOJK replaces POJK for Sharia Finance Companies only"],a:1,e:"POJK = binding, SEOJK = 실무 지침."},
{id:"025",u:"U1",d:"Medium",q:"Which section should contain plans for improving financial literacy and inclusion?",o:["Executive Summary (section a)","Management Policies and Plans (section d)","Vision, Mission, Business Strategy (section c)","Other Information (section g)"],a:1,e:"(d)항 7번째 항목."},
{id:"026",u:"U2",d:"Hard",q:"Which BEST describes the primary role of OJK in Finance Company compliance?",o:["Monitoring AML transactions and suspicious activity reports","Enforcing tax compliance and managing VAT reporting","Regulating electronic signatures and PSE","Supervising and regulating all Finance Company activities, granting licenses, issuing POJK/SEOJK, and enforcement"],a:3,e:"OJK = 주 감독기관. (A)=PPATK, (C)=DJP, (D)=Kominfo."},
{id:"027",u:"U2",d:"Hard",q:"Which regulator receives and analyzes a Suspicious Transaction Report (STR)?",o:["OJK","Bank of Indonesia (BI)","Directorate General of Taxes (DJP)","PPATK"],a:3,e:"PPATK = STR·CTR 수령 + AML/CFT 전담."},
{id:"028",u:"U2",d:"Hard",q:"POJK 46/2024 PSE registration is supervised by which body?",o:["OJK","PPATK","Ministry of Communication and Digital Affairs (Kominfo)","Bank of Indonesia"],a:2,e:"Kominfo = PSE·전자서명 규제."},
{id:"029",u:"U2",d:"Medium",q:"Which BEST distinguishes 'Validity' from 'Relevance' of compliance data?",o:["Validity measures usefulness; Relevance measures accuracy","Both terms are interchangeable","Validity measures accuracy; Relevance measures practical usefulness and directness to the objective","Validity applies only to quantitative; Relevance only to qualitative"],a:2,e:"Validity = accuracy, Relevance = practical usefulness. 양쪽 모두 필요."},
{id:"030",u:"U2",d:"Hard",q:"To whom must regular Compliance Reports be submitted?",o:["Bank of Indonesia","OJK","PPATK","Ministry of Finance"],a:1,e:"정기 Compliance Reports = OJK 제출."},
{id:"031",u:"U2",d:"Hard",q:"What is the deadline for submitting the annual GCG Report?",o:["April 30","January 31","February 15","March 31"],a:0,e:"GCG Report = April 30. (Health Level = Feb 15)."},
{id:"032",u:"U2",d:"Hard",q:"The CORRECT four-step process for CE4 (Reporting Compliance) is:",o:["Collection → Analysis → Investigation → Sanction","Planning → Execution → Reporting → Audit","Draft → Approval → Distribution → Monitoring commitment","Identification → Assessment → Mitigation → Documentation"],a:2,e:"CE4: Draft → Approval → Distribution → Monitoring."},
{id:"033",u:"U2",d:"Medium",q:"Why is compliance described as more than just a legal matter?",o:["It is primarily about maximizing shareholder returns","Non-compliance only results in internal disciplinary actions","It is only relevant for Sharia Finance Companies","Compliance risks include sanctions, loss of trust, and material losses, making it a matter of business integrity and sustainability"],a:3,e:"Compliance Risk = 제재 + 신뢰 하락 + 손실. Integrity·Sustainability 직결."},
{id:"034",u:"U2",d:"Hard",q:"POJK 43/2024 directly impacts Finance Company compliance by requiring:",o:["Annual Business Plan Supervision Reports","Registration as Electronic System Providers (PSE)","Quarterly AML/CFT reports to PPATK","Regular training and competency certification for key officials"],a:3,e:"POJK 43/2024 = HR 역량 인증 의무화. SPPI Level 7이 이 이행."},
{id:"035",u:"U2",d:"Medium",q:"Delayed VAT reporting means which regulator's requirements are NOT met?",o:["OJK","PPATK","Directorate General of Taxes (DJP)","Kominfo"],a:2,e:"VAT = DJP 소관."},
{id:"036",u:"U2",d:"Hard",q:"Which impact area is MOST directly affected by POJK 46/2024?",o:["Business Models: requiring digital integration and PSE registration","Capital adequacy: requiring minimum equity of Rp 200 billion","Tax compliance: changing VAT rates for digital transactions","Audit frequency: reducing cycles from quarterly to annually"],a:0,e:"POJK 46/2024 = Business Models에서 PSE·디지털 채널·비대면 financing."},
{id:"037",u:"U2",d:"Hard",q:"What is the CORRECT first step when a Finance Company receives a new POJK?",o:["Identify regulatory impacts — type, scope (HR/IT/product/governance), initial mapping","Immediately update all IT systems","Submit a report to OJK confirming receipt","Conduct company-wide training before any analysis"],a:0,e:"Step 1 = Regulatory Impact Identification. 시스템 업데이트(Step 4)로 점프는 오류."},
{id:"038",u:"U2",d:"Medium",q:"A cross-functional FGD with Legal, Risk, IT, HRD, Internal Audit corresponds to which step?",o:["Regulatory Impact Identification (Step 1)","System and Infrastructure Implementation (Step 4)","Internal Discussion with Relevant Work Units (Step 2)","Monitoring and Evaluation (Step 5)"],a:2,e:"FGD = Step 2 (Internal Discussions with Relevant Work Units)."},
{id:"039",u:"U2",d:"Medium",q:"Which statement CORRECTLY applies both Validity and Relevance?",o:["Valid data measures ratios; relevant data must come only from external sources","Valid data is collected annually; relevant data monthly","Both refer to the same standard of data quality","Valid data accurately measures what it intends; relevant data is directly useful and connected to the objective"],a:3,e:"Validity = 정확성, Relevance = 실용적 관련성. 독립적 기준."},
{id:"040",u:"U2",d:"Medium",q:"Which compliance evaluation result is classified as 'Less Comply'?",o:["All OJK quarterly reports submitted on time","STR and CTR submitted to PPATK via the designated app","No periodic evaluation report exists for the internal compliance work program","95% of consumer complaints resolved within SLA"],a:2,e:"정기 평가 보고서 미존재 = Less Comply."},
{id:"041",u:"U2",d:"Hard",q:"Which body monitors foreign exchange transactions and macro-level financial stability?",o:["OJK","PPATK","Bank of Indonesia (BI)","Kominfo"],a:2,e:"BI = 거시 감독 + 외환·파생상품."},
{id:"042",u:"U2",d:"Medium",q:"A compliance report submitted to OJK must be signed by:",o:["Chief Risk Officer and External Auditor jointly","The Board of Commissioners only","The Directors, addressed to the Chief Executive Supervisor at OJK","Internal Audit Head and Compliance Director jointly"],a:2,e:"이사회(Directors) 서명, OJK Chief Executive Supervisor 앞."},

{id:"048",u:"U2",d:"Medium",q:"A key official lacks the POJK 43/2024 certification. Immediate action?",o:["Develop a corrective action plan including enrolling the official in certification and submitting to OJK if required","Report to PPATK as a potential fraud incident","Temporarily suspend all business activities","Request an exemption from OJK based on experience"],a:0,e:"Action Plan 수립 + 인증 등록 + 필요 시 OJK 보고."},

{id:"050",u:"U2",d:"Hard",q:"A report with self-assessment matrix and corrective action plan, due April 30, is which type?",o:["Semi-annual Business Plan Supervision Report","Quarterly Compliance Report","Annual GCG Report","Anti-fraud Strategy Report"],a:2,e:"GCG Report = 연간, April 30, self-assessment + corrective action plan."},
{id:"051",u:"U1",d:"Hard",q:"Under Unit Q6 (Evaluating a Business Plan), what is the FIRST step in CE1 (Measuring the Success of a Business Plan)?",o:["Recommend corrective actions to the Board of Directors","Conduct a Root Cause Analysis of all deviations","Prepare and document the evaluation report","Identify Business Plan realization data by requesting the Realization Report and management explanations"],a:3,e:"PC 1.1 = realization data 식별. Realization Report·경영진 설명 요청 → 데이터 확보 → validation. Developing(Q7) vs Evaluating(Q6) 출발점 혼동 주의."},
{id:"052",u:"U1",d:"Hard",q:"Which of the following are the SIX Business Plan Evaluation Objects?",o:["Liquidity, Solvency, Profitability, Efficiency, Growth, Stability","Planning, Organizing, Leading, Controlling, Reporting, Budgeting","Conformance, Strategy, Leadership, Coherence, Execution, Adequacy","Identification, Measurement, Monitoring, Control, Reporting, Audit"],a:2,e:"BP Evaluation Objects 6종: Conformance·Strategy·Leadership·Coherence·Execution·Adequacy."},
{id:"053",u:"U1",d:"Medium",q:"In CE2 (Determining Corrective Actions), which technique identifies root problems before adjusting plans?",o:["Benchmarking against industry peers","Root Cause Analysis","Time Series Analysis","SWOT Analysis"],a:1,e:"PC 2.1 = Root Cause Analysis. Benchmarking·Time Series·SWOT는 CE1 성공도 추정 도구."},
{id:"054",u:"U1",d:"Medium",q:"Which is a SUPPORTING factor (not inhibiting) to Business Plan success?",o:["Accurate market analysis using SWOT, Porter's Five Forces, and PESTLE","Unstable market conditions and intense competition","Regulatory changes and economic crises","Natural disasters, pandemics, and geopolitical conflicts"],a:0,e:"PC 1.4 Supporting = 정확한 시장분석·전략적 의사결정·자원 가용성·변화 적응. (A)(B)(D)는 PC 1.3 Inhibiting."},
{id:"055",u:"U2",d:"Hard",q:"'Evaluating the Implementation of Compliance Culture' (K.64KPT00.021.1) is based on which Competency Standard?",o:["SKKNI No. 275/2024","POJK 43/2024","SKKNI No. 143/2022","SEOJK 23/2019"],a:2,e:"SKKNI No. 143/2022. Q6는 KPT(공통역량) 코드 — Day1 산업개요 SKKNI 275/2024와 혼동 주의."},
{id:"056",u:"U2",d:"Hard",q:"Compliance culture parameters (CE1) are classified into which three levels?",o:["National Level, Corporate Level, Departmental Level","Board Level, Management Level, Staff Level","Policy Level, Process Level, Outcome Level","Strategic Level, Operational Level, Individual Level"],a:3,e:"3계층: Strategic(경영진 솔선)·Operational(SOP·KYC/Dual Control/4-Eye)·Individual(개인 윤리)."},
{id:"057",u:"U2",d:"Medium",q:"At the Operational Level of compliance culture, which control principle in the financing process is cited?",o:["KYC, Dual Control, Checks and Balances, and the 4-Eye Principle","Three Lines of Defense","Risk-Based Internal Audit","COSO Internal Control Framework"],a:0,e:"Operational Level = KYC + Dual Control + Checks and Balances + 4-Eye Principle."},
{id:"058",u:"U2",d:"Hard",q:"Which philosophy emphasizes that leaders must model rule-abiding behavior themselves?",o:["The Role of Leadership in Leading by Example","Compliance as an Internal Value","Continuous Improvement Through Evaluation","Compliance as a Driver of Organizational Performance"],a:0,e:"Leading by Example (Tone at the Top). 보고서 제출율 100% ≠ Compliance Culture 우수."},
{id:"059",u:"U1",d:"Medium",q:"Which is NOT one of the five Competency Dimensions?",o:["Task Skill","Task Management Skill","Financial Analysis Skill","Transfer Skill"],a:2,e:"5종 = Task / Task Management / Contingency Management / Job-Role Environment / Transfer Skill. Financial Analysis Skill은 없음."},
{id:"060",u:"U1",d:"Medium",q:"Which Competency Dimension is 'skills in solving problems in new contexts'?",o:["Contingency Management Skill","Transfer Skill","Task Management Skill","Job/Role Environment Skill"],a:1,e:"Transfer Skill = 신규 맥락 전이. Contingency = 돌발 해결, Task Management = 연관 과업 관리."},
{id:"061",u:"U1",d:"Medium",q:"Which is one of the eight Employability Skills cited in the Day 2 module?",o:["Initiative and Entrepreneurship","Risk Quantification","Regulatory Drafting","Capital Adequacy Assessment"],a:0,e:"8종 = Communication/Teamwork/Problem Solving/Planning & Organizing/Initiative & Entrepreneurship/Self-Management/Technology/Learning."},
{id:"062",u:"U2",d:"Hard",q:"In the Three Lines of Defense model, the Compliance Function belongs to which line?",o:["1st Line — Business Units","3rd Line — Internal Audit","It sits outside all three lines as an independent body","2nd Line — Risk Management and Compliance Function"],a:3,e:"Compliance Function = 2nd Line. 1st = Business Units, 3rd = Internal Audit."},
{id:"063",u:"U2",d:"Hard",q:"Which statement about the Three Lines of Defense is CORRECT?",o:["The Compliance Function (2nd Line) directs and controls Internal Audit (3rd Line)","Internal Audit (3rd Line) independently verifies the Compliance Function (2nd Line)","Business Units (1st Line) supervise the Compliance Function (2nd Line)","Internal Audit reports to the Compliance Director for daily operations"],a:1,e:"3rd Line(Internal Audit)이 2nd Line을 독립 검증. 함정 13-12 — Compliance가 Internal Audit 통제는 오답."}
,
{id:"064",tp:"BP구성",d:"Hard",q:"KBBF's new BOD drafts a Business Plan but omits any assumptions about GDP growth and interest rates. Under POJK 24/2019, what is the deficiency?",o:["The plan lacks the required economic assumptions underpinning projections","Assumptions belong only in the Realization Report","Assumptions are the BOC's responsibility, not the plan's","None; macroeconomic assumptions are optional"],a:0,e:"POJK 24/2019: Business Plan은 거시경제 가정(GDP·금리 등)에 기반한 projection 포함 필수. 누락은 결함."},
{id:"065",tp:"BP구성",d:"Medium",q:"A plan to open 10 new branches and hire 200 staff over 3 years belongs in which Business Plan section?",o:["Vision & Mission","Risk Management only","Management Policies and Plans / organizational and network development","Other Information"],a:2,e:"지점·인력 확장 = 경영정책·계획(조직·네트워크 개발) 섹션. Vision은 방향성, 여기는 실행계획."},
{id:"066",tp:"BP보고",d:"Hard",q:"A Finance Company submits its Business Plan Supervision Report annually instead of semi-annually. Under POJK 24/2019 Art.15, is this compliant?",o:["No, the Supervision Report is semi-annual","Yes, only if OJK waives the requirement","No, it must be quarterly","Yes, annual is the standard"],a:0,e:"POJK 24/2019 Art.15: Business Plan Supervision Report = 반기(semi-annual). 연간 제출은 위반. BOC 작성."},
{id:"067",tp:"BP보고",d:"Medium",q:"Who prepares the Business Plan Supervision Report?",o:["Internal Audit","OJK","Board of Commissioners (BOC)","Board of Directors"],a:2,e:"Supervision Report = BOC 작성(감독 역할). Realization Report는 BOD. 작성주체 함정."},
{id:"068",tp:"전략분석",d:"Hard",q:"A Finance Company analyzes that BI's benchmark rate hike will raise its funding cost. Which framework element captures this?",o:["Porter — Threat of New Entrants","SWOT — internal Strength","PESTEL — Economic factor","Porter — Threat of Substitutes"],a:2,e:"금리(거시 외부요인) = PESTEL의 Economic. Porter는 산업구조 5요인, 금리는 PESTEL."},
{id:"069",tp:"전략분석",d:"Hard",q:"In Porter's Five Forces for a Finance Company, banks offering cheaper direct loans to the same customers represent:",o:["Threat of Substitutes","Bargaining Power of Suppliers","Threat of New Entrants","Bargaining Power of Buyers"],a:0,e:"은행 직접대출 = 대체재(Substitutes) 위협. Suppliers는 자금원, New Entrants는 신규 진입자."},
{id:"070",tp:"전략분석",d:"Medium",q:"'Bargaining Power of Suppliers' for a Finance Company primarily refers to:",o:["New fintech entrants","Funding providers (banks, bondholders) and their cost of funds","Government regulators","Customers negotiating lower rates"],a:1,e:"Finance Company의 Supplier = 자금 공급원(은행·채권투자자). 자금조달 비용 협상력. 핵심 변별."},
{id:"071",tp:"전략분석",d:"Medium",q:"Heavy capital requirements and OJK licensing make it hard for new players to enter. This MOST supports:",o:["Buyer power is high","Threat of New Entrants is high","Threat of New Entrants is moderate-to-low","Supplier power is low"],a:2,e:"높은 자본·라이선스 장벽 → 신규 진입 위협 낮음(moderate-to-low). 진입장벽↔위협 역관계."},
{id:"072",tp:"Vision",d:"Medium",q:"Which is the BETTER-formulated Vision statement under SEOJK 23/2019 criteria?",o:["'To be Indonesia's most trusted multifinance partner for SME growth'","'To process 100 loans next quarter'","'To comply with all POJK by December'","'To reduce VAT filing delays'"],a:0,e:"Vision = 장기 지향점·열망(미래상). 분기 처리건수·컴플라이언스 기한은 운영목표. B가 비전."},
{id:"073",tp:"BP목표",d:"Hard",q:"A digital onboarding initiative targeting 30% cost cut and 15-minute approval is BEST classified as which objective type?",o:["Financial objective","Compliance objective","Governance objective","Operational/technology efficiency objective"],a:3,e:"디지털 효율화(비용·처리시간) = 운영·기술 효율 목표. 재무목표(수익·자본)와 구별."},
{id:"074",tp:"BP보고",d:"Hard",q:"The Business Plan Realization Report shows 60% achievement of the lending target. What MUST it also contain?",o:["Only the achievement percentage","Realization data, deviation analysis, and explanations/corrective measures","Just the next year's plan","BOC signatures only"],a:1,e:"Realization Report = 실현 데이터 + 편차분석 + 사유·시정조치. 달성률만으로는 불충분."},
{id:"075",tp:"BP구성",d:"Medium",q:"A plan to convert into a Sharia Finance Company should be disclosed in which section?",o:["Vision & Mission","Management Policies/Plans (or Other Information, as a corporate plan)","Risk Profile","Compliance Report"],a:1,e:"Sharia 전환 계획 = 경영정책·계획(또는 기타정보)의 corporate plan. 구조 변경 계획 위치."},
{id:"076",tp:"Compliance",d:"Hard",q:"KBBF's compliance unit detects that a key Director lacks the certification required under POJK 43/2025. The immediate action is:",o:["Initiate certification / remediation and report; the role requires certified competence","Ignore until the next audit cycle","Report to PPATK","Terminate the Director immediately"],a:0,e:"POJK 43/2025 인증 미충족 핵심직 → 즉시 인증·시정 착수 및 보고. F&P·역량요건 직결. (참조: 레퍼런스상 HR인증 근거는 43/2025)"},
{id:"077",tp:"Compliance",d:"Hard",q:"A Finance Company files its VAT return late. Whose requirements are breached, and is this a 'compliance' matter?",o:["OJK only","No one; VAT is voluntary","Only the tax office; not a compliance issue","The tax authority (DJP); yes — compliance covers all applicable laws, not only OJK"],a:3,e:"VAT 지연 = 국세청(DJP) 요건 위반. 컴플라이언스는 OJK뿐 아니라 모든 적용 법규 포함. 범위 함정."},
{id:"078",tp:"Compliance",d:"Medium",q:"A Suspicious Transaction Report (STR) is received and analyzed by which body?",o:["PPATK","OJK","Bappebti","Bank Indonesia"],a:0,e:"STR 접수·분석 = PPATK(FIU). OJK 아님. W1 081과 동일 논점 — 반복 노출 의도."},
{id:"079",tp:"Compliance",d:"Hard",q:"When a Finance Company receives a brand-new POJK, what is the CORRECT first step?",o:["Wait for OJK inspection","Immediately change all SOPs","File a compliance report to OJK","Identify and analyze applicability/gap to the company before drafting changes"],a:3,e:"신규 POJK 수령 → 1단계: 적용가능성·gap 분석(식별). 이후 SOP 개정·FGD. 순서 함정."},
{id:"080",tp:"Compliance",d:"Medium",q:"A cross-functional FGD with Legal, Risk, IT, HRD, and Internal Audit corresponds to which compliance step?",o:["Analyzing impact and coordinating implementation across units","Initial identification of the regulation","Final reporting to OJK","Archiving the regulation"],a:0,e:"부서 합동 FGD = 영향분석·부서간 이행 조율 단계. 식별 다음, 보고 이전."},
{id:"081",tp:"Compliance",d:"Medium",q:"The annual GCG Report deadline is:",o:["January 31","June 30","December 31","April 30"],a:3,e:"연간 GCG Report 기한 = 4월 30일. (검증항목: POJK 48/2024 기준 변동 여부 원문 확인 권고 — 교재 기준 4/30)"},
{id:"082",tp:"Compliance",d:"Hard",q:"A compliance evaluation finds most obligations met but several material gaps uncovered. This is classified as:",o:["Comply","Largely Comply","Less Comply","Non-Comply"],a:2,e:"중대 gap 다수·대부분 충족 = 'Less Comply' 등급. 4단계 평가(Comply/Largely/Less/Non) 매핑."},
{id:"083",tp:"Compliance",d:"Medium",q:"A compliance report to OJK must be signed by:",o:["An external auditor","The PPATK officer","The Director in charge of compliance (and as regulated)","Any staff member"],a:2,e:"OJK 제출 컴플라이언스 보고서 = 컴플라이언스 담당 Director 서명. 권한·책임 소재."},
{id:"084",tp:"Compliance",d:"Hard",q:"'Validity' vs 'Relevance' of compliance data: a report that is accurate but uses last year's outdated regulation fails on:",o:["Validity","Relevance","Both equally","Neither"],a:1,e:"정확하지만 구버전 규정 사용 = Relevance(적시·해당성) 결여. Validity는 정확성. 두 개념 분리."},
{id:"085",tp:"감독기관",d:"Medium",q:"Which body monitors foreign exchange transactions and macro-level financial stability?",o:["Bank Indonesia","PPATK","DJP (Tax)","OJK"],a:0,e:"외환·거시 금융안정 = Bank Indonesia. OJK는 미시 건전성·시장행위 감독. 6대 감독기관 매핑."},
{id:"086",tp:"감독기관",d:"Medium",q:"POJK 46/2024 PSE (electronic system) registration is supervised in coordination with:",o:["Bappebti","PPATK","Kominfo / electronic-system authority","SIAC"],a:2,e:"PSE(전자시스템) 등록 = Kominfo 등 전자시스템 당국 연계. 비대면 financing 인프라 감독."},
{id:"087",tp:"Q6평가",d:"Hard",q:"Under Q6 'Evaluating a Business Plan', the FIRST step in measuring plan success is to:",o:["Terminate underperforming staff","Draft next year's plan","Submit to OJK","Gather realization data and compare against targets"],a:3,e:"Q6 CE1 1단계 = 실현 데이터 수집·목표 대비 비교(측정). Q7 개발 관점과 짝 — 평가 우선 측정."},
{id:"088",tp:"Q6평가",d:"Hard",q:"Which set correctly lists Business Plan Evaluation Objects under Q6?",o:["Vision and Mission only","Only financial targets","The six evaluation objects incl. realization vs plan, deviation causes, supporting/inhibiting factors, corrective actions","Staff headcount only"],a:2,e:"Q6 BP 평가대상 6종: 실현 대 계획, 편차원인, 지원·저해 요인, 시정조치 등. 단일 재무지표가 아님."},
{id:"089",tp:"Q6평가",d:"Medium",q:"In Q6 CE2 (Determining Corrective Actions), which technique identifies root problems before adjusting the plan?",o:["PESTEL","SWOT","Porter's Five Forces","Root Cause Analysis (e.g., 5 Whys)"],a:3,e:"시정조치 결정 전 근본원인 = RCA(5 Whys 등). 전략분석 도구(SWOT·Porter)와 구별."},
{id:"090",tp:"Q6평가",d:"Medium",q:"Which is a SUPPORTING (not inhibiting) factor for Business Plan success?",o:["High staff turnover","Strong digital infrastructure and skilled workforce","Adverse macroeconomic shock","Regulatory non-compliance"],a:1,e:"지원요인 = 강한 디지털 인프라·숙련 인력. 이직·악재·위반은 저해요인. 지원↔저해 분류."},
{id:"091",tp:"Q6컴플",d:"Hard",q:"Compliance culture parameters (Q6 CE1) are classified into which three levels?",o:["Strategic, Operational, Technical","Past, Present, Future","Federal, State, Local","Board/Strategic, Managerial, Operational"],a:3,e:"컴플라이언스 문화 3계층 = 이사회·전략 / 관리 / 운영 레벨. 각 계층별 통제 책임."},
{id:"092",tp:"Q6컴플",d:"Hard",q:"At the Managerial Level of compliance culture, the key responsibility is to:",o:["Personally approve every transaction","Translate board policy into procedures and supervise unit-level compliance","Only attend annual training","Report directly to PPATK"],a:1,e:"관리 레벨 = 이사회 정책을 절차로 전환하고 부서 준법을 감독. 운영레벨(4-Eyes 실행)·전략레벨(tone)과 구별."},
{id:"093",tp:"Q6컴플",d:"Medium",q:"An annual compliance-culture assessment scores the firm as weak at the operational level. The proper Q6 response is to:",o:["Ignore it; culture is intangible","Use the result to target corrective actions at that level","Replace the entire board","Stop all financing"],a:1,e:"Q6 평가 결과 = 약한 계층에 시정조치 타겟팅. 측정→개선 연결. 무형이라 방치는 오답."},
{id:"094",tp:"역량",d:"Medium",q:"Which is NOT one of the five Competency Dimensions in the Day 2 module?",o:["Skills","Profitability","Knowledge","Attitude/Responsibility"],a:1,e:"역량 5차원에 'Profitability'는 없음. Knowledge·Skills·Attitude 등 역량 구성요소와 무관. NOT 유형."},
{id:"095",tp:"역량",d:"Hard",q:"'Skill in solving problems in new, unfamiliar contexts' corresponds to which Competency Dimension?",o:["Physical endurance","Routine task execution","Transfer skill (applying competence to new situations)","Seniority"],a:2,e:"새 맥락 문제해결 = Transfer Skill(역량 전이). 정형 업무수행과 구별. SKKNI 역량 정의."},
{id:"096",tp:"역량",d:"Medium",q:"Which is one of the eight Employability Skills cited in the module?",o:["Stock ownership","Communication / teamwork / problem-solving","Foreign citizenship","Personal car ownership"],a:1,e:"Employability Skill 8종 = 의사소통·팀워크·문제해결 등 직무 일반역량. 자산·국적과 무관."},
{id:"097",tp:"ThreeLines",d:"Hard",q:"In the Three Lines of Defense, the Compliance Function belongs to which line, and why?",o:["Third line — it audits independently","First line — it owns the risk","Outside the model","Second line — it provides oversight/monitoring independent of the business"],a:3,e:"Compliance = 2nd Line(독립 감독·모니터링). 1st = 사업부(위험보유), 3rd = Internal Audit. 계층 함정."},
{id:"098",tp:"ThreeLines",d:"Medium",q:"Which statement about the Three Lines of Defense is CORRECT?",o:["Compliance is the first line","All three lines report to the same manager","The first line is Internal Audit","The third line (Internal Audit) provides independent assurance to the board"],a:3,e:"3rd Line(Internal Audit)는 이사회에 독립적 assurance 제공. 독립성이 핵심. 보고라인 분리."},
{id:"099",tp:"BP보고",d:"Hard",q:"A Finance Company fails to submit its Business Plan by the POJK 24/2019 deadline. The likely consequence is:",o:["No consequence","Administrative sanction / supervisory action by OJK","Automatic license upgrade","A dividend bonus"],a:1,e:"Business Plan 기한 미제출 = OJK 행정제재·감독조치 대상. 보고의무 위반 결과."},
{id:"100",tp:"BP보고",d:"Hard",q:"A self-assessment matrix with a corrective action plan, due April 30, is which report?",o:["Business Plan Realization Report (monthly/quarterly)","Annual GCG Report","Business Plan Supervision Report","Suspicious Transaction Report"],a:1,e:"자가평가 매트릭스+시정계획, 4/30 기한 = 연간 GCG Report. 기한·구성으로 식별. Realization과 구별."}

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W2";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
const UNIT_LABEL={U1:"Unit 1 · Business Plan",U2:"Unit 2 · Compliance"};
let quiz=[], cur=0, answers=[], picked=false;

const app=document.getElementById('app');

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp;
    cur=0;answers=[];render();return;
  }
  if(mode==='all') quiz=shuffle(BANK);
  else if(mode==='u1') quiz=shuffle(BANK.filter(q=>q.u==='U1'));
  else if(mode==='u2') quiz=shuffle(BANK.filter(q=>q.u==='U2'));
  else if(mode==='supp') quiz=shuffle(BANK.filter(q=>parseInt(q.id)>=51));
  else quiz=shuffle(BANK).slice(0,30);
  cur=0; answers=[]; render();
}

function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Unit 1 + Unit 2 완주</span></button>
        <button onclick="start('u1')">Unit 1만 (Business Plan) <span class="desc">32문항</span></button>
        <button onclick="start('u2')">Unit 2만 (Compliance) <span class="desc">31문항</span></button>
        <button onclick="start('supp')">보강 13문항만 <span class="desc">Q6 평가관점·역량군·Three Lines</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W2-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}

function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta">
      <span>문항 ${cur+1} / ${quiz.length}</span>
      <span>QID W2-${q.id}</span>
    </div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags">
      <span class="tag unit">${UNIT_LABEL[q.u]}</span>
      <span class="tag ${dcls}">${q.d}</span>
    </div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}

function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  const opts=document.querySelectorAll('#opts .opt');
  opts.forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}

function next(){
  if(cur<quiz.length-1){cur++;render()}
  else result();
}

function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const u1=answers.filter((a,i)=>quiz[i].u==='U1');
  const u2=answers.filter((a,i)=>quiz[i].u==='U2');
  const u1r=u1.filter(a=>a.correct).length, u2r=u2.filter(a=>a.correct).length;
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${u1.length?`<div class="row"><span>Unit 1 · Business Plan</span><b>${u1r} / ${u1.length}</b></div>`:''}
        ${u2.length?`<div class="row"><span>Unit 2 · Compliance</span><b>${u2r} / ${u2.length}</b></div>`:''}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W2-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}

// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
</html>
