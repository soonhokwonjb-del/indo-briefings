{uid:"W1-041",set:"W1",tp:"POJK",d:"Hard",q:"Which is the CORRECT list of the 8 Finance Company risk types?",o:["Credit, Market, Operational, Interest, Currency, Country, Settlement, Model","Strategic, Financial, Hazard, Compliance, Cyber, ESG, Legal, Conduct","Strategic, Credit, Operational, Market, Liquidity, Compliance, Legal, Reputation","Capital, Liquidity, Earnings, Sensitivity, Market, Credit, Legal, Strategic"],a:2,e:"8대: Strategic·Credit·Operational·Market·Liquidity·Compliance·Legal·Reputation."},
{uid:"W1-042",set:"W1",tp:"POJK",d:"Hard",q:"\"Risk arising from the failure of other parties to fulfill their obligations\" describes which risk?",o:["Market Risk","Operational Risk","Liquidity Risk","Credit Risk"],a:3,e:"Credit Risk = 거래상대방 의무 이행 실패. Market = 시장변동, Operational = 내부프로세스·인적오류·IT."},
{uid:"W1-043",set:"W1",tp:"POJK",d:"Hard",q:"Fraud risk is treated as a parameter under which of the 8 risk types?",o:["Operational Risk","Compliance Risk","Reputation Risk","Legal Risk"],a:0,e:"Fraud risk = Operational Risk 하위 파라미터. (Anti-Fraud 전략은 W4 Unit 4로 별도)."},
{uid:"W1-044",set:"W1",tp:"POJK",d:"Hard",q:"Which statement about POJK 12/POJK.01/2017 is CORRECT?",o:["It governs the Fit & Proper Test for directors and commissioners","It governs AML/CFT (APU-PPT); fit-and-proper reassessment is instead POJK 34/2018","It sets the minimum paid-in capital for new Finance Companies","It defines the 8 risk types and KPMR components"],a:1,e:"POJK 12/2017 = APU-PPT(AML/CFT), F&P가 아님. 12/2017은 23/2019 개정 후 8/2023으로 대체. F&P 재평가 = POJK 34/2018, NBFI 최초 F&P = NBFI 전용 규정. (12/2017을 F&P로 고르면 오답 함정)"},
{uid:"W1-045",set:"W1",tp:"POJK",d:"Medium",q:"Regarding regulatory hierarchy, which statement is CORRECT?",o:["SEOJK is higher than POJK","Both have identical legal force","POJK is a binding regulation; SEOJK is operational guidance (circular)","SEOJK overrides POJK for Sharia entities"],a:2,e:"POJK = 시행령급(binding, 상위). SEOJK = 회람(operational guidance, 하위)."},
{uid:"W1-046",set:"W1",tp:"거버넌스",d:"Medium",q:"In Indonesia's Dual Board system, the Board of Commissioners (BOC):",o:["Runs day-to-day operations and represents the company externally","Replaces the BOD in financing decisions","Supervises and advises the BOD but does not directly intervene in operations","Reports to the Compliance Director"],a:2,e:"BOC(Dewan Komisaris) = BOD 감독·자문, 운영 직접 개입 X. BOD(Direksi) = 일상 운영·전략 실행."},
{uid:"W1-047",set:"W1",tp:"거버넌스",d:"Medium",q:"Risk Appetite differs from Risk Tolerance in that:",o:["They are identical","Risk Tolerance is always higher than Risk Appetite","Risk Appetite applies only to credit risk","Risk Appetite = the level of risk the company accepts (strategic); Risk Tolerance = the allowed variation band around it (operational)"],a:3,e:"Risk Appetite = 수용 리스크 수준(전략적). Risk Tolerance = appetite 주변 허용 변동폭(실무·일일)."},
{uid:"W1-048",set:"W1",tp:"Roadmap",d:"Medium",q:"The KBBF acquisition (2026) coincides with which Roadmap phase?",o:["Phase 1 (2024-25) Strengthening Foundation","Phase 3 (2028) Adjustment & Growth","Phase 2 (2026-27) Consolidation & Momentum","Outside the Roadmap horizon"],a:2,e:"2026 = Phase 2 (Consolidation & Momentum). Phase 1 강화기, Phase 3 성장기."},
{uid:"W1-049",set:"W1",tp:"Roadmap",d:"Medium",q:"The Roadmap 2024-2028 has four Pillars. Which is Pilar 1?",o:["Business Development","Regulation, Supervision, and Licensing","Strengthening Resilience and Competitiveness (Capital, GCG, Risk, HR)","Consumer Protection"],a:2,e:"Pilar 1 = 회복력·경쟁력 강화(Capital·GCG·Risk·HR). 본인 SPPI 시험이 Pilar 1 HR 강화에 해당."},
{uid:"W1-050",set:"W1",tp:"산업현황",d:"Medium",q:"Which financing type categories grew double-digit YoY in 2025?",o:["Investment Financing and Multipurpose","Multipurpose and Foreign Loans","Working Capital (+10.06%) and Sharia (+12.43%)","Domestic Loans and Investment"],a:2,e:"Working Capital +10.06%, Sharia +12.43% 두 자릿수 성장. Net Profit은 -18.07% 감소."},
{uid:"W1-051",set:"W1",tp:"사업영역",d:"Hard",q:"Under BMPP (Maximum Financing Limit, POJK 46/2024), what is the limit for a single obligor with no controlling relationship?",o:["10% of capital","20% of capital","50% of capital","25% of capital"],a:1,e:"BMPP: 단일차주 20% / 단일그룹 50% / 지배관계 당사자 50% of equity. '단일차주 50%'는 오답(그룹·지배관계가 50%)."},
{uid:"W1-052",set:"W1",tp:"사업영역",d:"Medium",q:"If a Finance Company breaches the BMPP ceiling due to a capital decrease or M&A, within what period must it adjust and submit an action plan?",o:["3 months","6 months","1 month","15 business days"],a:2,e:"BMPP 초과(자본감소·환율·공정가치변동·M&A·법규변경) 시 1개월 이내 조정+action plan. Health Level Action Plan과 혼동 금지."},
{uid:"W1-053",set:"W1",tp:"사업영역",d:"Hard",q:"Financing acquisition cost (third-party incentives) is capped at what percentage of each contract's total income (POJK 46/2024)?",o:["15%","17.5%","20%","10%"],a:1,e:"한도 17.5%. income = Cost of Fund 차감 전 이자수익 + 보험할인 + 행정수익 + provision수익. 이 incentive fee는 Motor Vehicle DP 계산에 산입 불가."},
{uid:"W1-054",set:"W1",tp:"POJK",d:"Medium",q:"Which of the following is PROHIBITED under POJK 46/2024 financing risk mitigation (Chapter VII)?",o:["Registering fiduciary collateral","Insuring already-problematic (impaired) financing receivables","Using credit guarantee mechanisms","Insuring the financed collateral"],a:1,e:"금지 2조항: ① 이미 부실화된(problematic) 채권 보험·보증 금지 ② 보험금 청구액을 보험료의 일정%로 제한하는 메커니즘 금지. 나머지 3개는 허용된 4종 risk mitigation."},
{uid:"W1-055",set:"W1",tp:"사업영역",d:"Hard",q:"In Channeling versus Joint Financing, which statement is CORRECT?",o:["In Channeling, the Finance Company bears all the risk","In Joint Financing, the fund owner bears all the risk","In Channeling the fund owner bears the risk; in Joint Financing each party shares risk proportionally","Both always require with-recourse structures"],a:2,e:"Channeling = 리스크 fund owner 부담(FC는 fund manager). Joint = 출자액 비례 분담. with recourse(구상권포함) 구조는 둘 다 금지."},
{uid:"W1-056",set:"W1",tp:"POJK",d:"Medium",q:"Under POJK 43/2025, which certification is required for a Director overseeing risk and the layer directly below the Board?",o:["Financing-sector certification only","Collection-sector certification","Risk-management certification","No certification is required"],a:2,e:"POJK 43/2025 인증의무: BOD·BOC=financing 자격, risk 담당 Director+1계층 하단=risk management 자격, collection 담당=collection 자격. (본인 SPPI L7 = #1 Director financing)."},
{uid:"W1-057",set:"W1",tp:"POJK",d:"Medium",q:"Per POJK 43/2025, the minimum annual budget for HR education and training is:",o:["1.0% of employee expenses","2.5% of employee expenses","5.0% of employee expenses","10% of net income"],a:1,e:"POJK 43/2025: 교육·훈련 예산 최소 연 employee expenses의 2.5%. (POJK 47/2000은 net income 2.5% 기준 — 기준 모수 차이 주의)."},
{uid:"W1-058",set:"W1",tp:"POJK",d:"Hard",q:"Under POJK 47/2000 (re-regulated by POJK 46/2024), the foreign ownership cap of a Finance Company is:",o:["49% of paid-in capital","85% of paid-in capital","100% of paid-in capital","25% of paid-in capital"],a:1,e:"외국인 직·간접 합산 최대 85% of paid-in capital. 외국인 고용은 지분 25% 이상 시 가능, 외국인 Director·Commissioner 각 최대 50%."},
{uid:"W1-059",set:"W1",tp:"POJK",d:"Medium",q:"What is the maximum proportion of foreign Directors on a Finance Company's board?",o:["25%","50%","85%","100%"],a:1,e:"외국인 Director 최대 50% / 외국인 Commissioner 최대 50%. 외국인은 Directors·BOC·experts·consultants 외 고용 금지, 고용 3+1년."},
{uid:"W1-060",set:"W1",tp:"POJK",d:"Hard",q:"Which pair of capital figures is CORRECT?",o:["Establishment paid-in capital Rp 100bn; operating core capital Rp 250bn","Establishment paid-in capital Rp 250bn; operating core capital Rp 100bn","Both are Rp 200bn","Establishment Rp 200bn; Other-activity core capital Rp 100bn"],a:1,e:"설립시 Paid-in Capital 최소 Rp 250bn(POJK 47/2000) vs 운영 중 최저 자기자본 Rp 100bn(Roadmap Pilar 1). Other 사업 진입 Core Capital Rp 200bn은 또 다른 수치 — 셋 혼동 금지."},
{uid:"W1-061",set:"W1",tp:"POJK",d:"Medium",q:"The APU-PPT Risk-Based Approach (RBA) assesses risk across which four factors?",o:["Strategic, Credit, Operational, Market","Customer, Products/services, Country/geographic area, Distribution channels","Capital, Profitability, GCG, Risk Profile","Integrity, Competence, Reputation, Feasibility"],a:1,e:"RBA 4 factor = Customer / Products·services·transactions / Country·geographic / Distribution channels. (8대 Risk·Health Level 4 Factor·F&P 4요소와 혼동 금지)."},
{uid:"W1-062",set:"W1",tp:"POJK",d:"Medium",q:"To which body must a Finance Company report suspicious financial transactions under APU-PPT?",o:["OJK directly","PPATK","KSEI","DSN-MUI"],a:1,e:"의심거래(Suspicious Financial Transaction)·Cash Transaction Report는 PPATK(인니 FIU)에 보고. AML 정책·절차는 BOC 승인. CDD=기본확인, EDD=고위험 강화확인."},
{uid:"W1-063",set:"W1",tp:"POJK",d:"Hard",q:"When OJK files a lawsuit for consumer protection (POJK 38/2025), the action is best described as:",o:["A class action on behalf of consumers","OJK acting in its institutional legal standing (not a class action)","A criminal prosecution replacing the public prosecutor","Mandatory arbitration at SIAC"],a:1,e:"OJK Lawsuit = institutional legal standing(기관 명의)이지 class action 아님(함정). 금융사 liquidation 중에도 소송권한 소멸 안 함. 소비자는 판결 이행 시점까지 비용 부담 없음."},
{uid:"W2-001",set:"W2",tp:"U1",d:"Hard",q:"According to POJK 24/POJK.05/2019, which of the following BEST describes a Business Plan for a Finance Company?",o:["A written document describing development plans and business activities over a specific period, along with strategies to achieve those plans","A monthly operational report submitted to OJK for compliance purposes","An internal audit report assessing the effectiveness of risk management processes","A regulatory filing that replaces the Health Level assessment for NBFIs"],a:0,e:"SEOJK 23/2019 및 POJK 24/2019 정의. (A) operational report, (C) audit report, (D) 전혀 다른 문서."},
{uid:"W2-002",set:"W2",tp:"U1",d:"Hard",q:"Which of the following is CORRECTLY listed as a required component under POJK 24/2019?",o:["Executive Summary, and Annual Audit Report","Vision, Mission, Business Strategy, and Management Policies and Plans","Fraud Investigation Report and Employee Performance Metrics","Liquidity Stress Test and Derivative Instrument Portfolio"],a:1,e:"7대 구성요소 — (a)Executive Summary, (c)Vision/Mission/Strategy, (d)Management Policies and Plans 등."},
{uid:"W2-003",set:"W2",tp:"U1",d:"Hard",q:"Under the Management Policies and Plans section of a Business Plan, which of the following is included?",o:["Financial literacy and inclusion activity plans","Results of the previous year's internal audit","Significant fraud incident reports","AML/CFT compliance assessment"],a:0,e:"(d)항 7번째 항목 = financial literacy and inclusion 활동 계획."},
{uid:"W2-004",set:"W2",tp:"U1",d:"Medium",q:"A plan for conversion to a Sharia Finance Company should be placed in which Business Plan section?",o:["Under Management Policies and Plans (section d)","Under Financial Statement Projections (section e)","Under Other Information (section g)","Under the Executive Summary (section a)"],a:2,e:"(g) Other Information includes conversion plans to a Sharia Finance Company."},
{uid:"W2-005",set:"W2",tp:"U1",d:"Hard",q:"According to POJK 24/2019 Article 15, how frequently must NBFIs submit a Business Plan Supervision Report to OJK?",o:["Monthly","Quarterly","Semi-annually","Annually"],a:2,e:"Article 15 — semi-annual Business Plan Supervision Report."},
{uid:"W2-006",set:"W2",tp:"U1",d:"Hard",q:"The Business Plan Supervision Report under POJK 24/2019 is prepared by which body?",o:["The Board of Directors","The Board of Commissioners","The External Auditor","OJK's Supervision Team"],a:1,e:"BOC가 제출. BOD는 Realization Report 작성."},
{uid:"W2-007",set:"W2",tp:"U1",d:"Medium",q:"Which of the following best describes a company's VISION according to SEOJK 23/2019?",o:["The short-term approach used to achieve the company's goals","The long-term goal the company aims to achieve","A written plan describing annual business activities","A set of operational procedures for daily business conduct"],a:1,e:"Vision = long-term goal. Mission = short/medium-term approach."},
{uid:"W2-008",set:"W2",tp:"U1",d:"Medium",q:"A well-formulated Vision statement for a Finance Company should be:",o:["Detailed, comprehensive, and filled with operational specifics","Focused solely on financial targets and quarterly profitability","Based exclusively on regulatory requirements from OJK","Future-oriented, clear, inspirational, concise, and aligned with company values"],a:3,e:"Vision 4대 요건: Aligned with Values / Future-Oriented / Clear & Inspirational / Concise & Compact."},
{uid:"W2-009",set:"W2",tp:"U1",d:"Hard",q:"Which analytical tool focuses on Political, Economic, Social, Technological, Environmental, and Legal factors?",o:["SWOT Analysis","PESTEL Analysis","Porter's Five Forces","Risk Heat Map"],a:1,e:"PESTEL. SWOT는 내외부 종합, Porter's는 산업구조."},
{uid:"W2-010",set:"W2",tp:"U1",d:"Hard",q:"In Porter's Five Forces applied to Finance Companies, 'Bargaining Power of Suppliers' primarily refers to:",o:["Funding sources such as banks, investors, and capital markets","Raw material suppliers providing manufacturing inputs","Technology vendors supplying digital banking platforms","Government agencies providing business licenses"],a:0,e:"Finance Company에서 Suppliers = 자금원(은행·투자자·자본시장)."},
{uid:"W2-011",set:"W2",tp:"U1",d:"Hard",q:"Which best represents the 'Threat of Substitutes' for a Finance Company?",o:["A new Finance Company entering the market with OJK licensing","Increased bargaining power from institutional investors","OJK issuing new compliance regulations","Bank loans, fintech lending, Pay Later services, and credit cooperatives"],a:3,e:"Substitutes = 대안 금융상품. 은행대출·핀테크·Pay Later·신협."},
{uid:"W2-012",set:"W2",tp:"U1",d:"Medium",q:"The correct sequence for developing a company's Work Plan under POJK 24/2019 is:",o:["KPI → Budget → Strategy → Target → Initiative","Strategy → Goals → KPI → Target → Initiative → Budget","Budget → Strategy → Target → KPI → Initiative → Goals","Vision → Mission → Budget → KPI → Strategy"],a:1,e:"6단계: Strategy → Strategic Goals → KPIs → KPI Targets → Initiatives → Budget."},
{uid:"W2-013",set:"W2",tp:"U1",d:"Medium",q:"Which Business Plan objective type focuses on 'optimizing digital technology to improve service quality and customer experience'?",o:["Value Proposition","Product Leadership","Customer Intimacy","Operational Excellence"],a:2,e:"Customer Intimacy = 디지털 기술로 서비스 품질·고객 경험 개선·맞춤형."},
{uid:"W2-014",set:"W2",tp:"U1",d:"Medium",q:"A digital onboarding strategy targeting 30% cost reduction and 15-minute processing falls under which type?",o:["Short-term Work Plan (Execution)","Value Proposition","Customer Intimacy","Long-term Sustainable Finance Hub"],a:0,e:"Digital Onboarding = 단기 실행 계획(short-term concrete plan)."},
{uid:"W2-015",set:"W2",tp:"U1",d:"Hard",q:"The MOST direct reason the Business Plan Supervision Report must contain a Board of Commissioners assessment is:",o:["OJK requires internal audit involvement in all governance reports","POJK 24/2019 Article 6 obligates the BOC to supervise Business Plan implementation","Directors are prohibited from submitting reports to OJK directly","External auditors are not authorized to assess business strategy"],a:1,e:"Article 6 — BOC는 Business Plan 이행을 감독할 의무."},
{uid:"W2-016",set:"W2",tp:"U1",d:"Medium",q:"Fintech offering faster, cheaper approvals than Finance Companies MOST directly addresses which Force?",o:["Threat of Substitutes","Bargaining Power of Suppliers","Threat of New Entrants","Bargaining Power of Buyers"],a:0,e:"더 빠르고 저렴한 핀테크 = Substitutes 위협."},
{uid:"W2-017",set:"W2",tp:"U1",d:"Hard",q:"Format 18 in SEOJK 23/2019 refers to which document?",o:["Standard template for monthly compliance reports","Health Level self-assessment form","Anti-fraud incident reporting template","Business Plan Monitoring Report (Business Plan Supervision Report)"],a:3,e:"Format 18 = Business Plan Monitoring Report (BOC semi-annual)."},
{uid:"W2-018",set:"W2",tp:"U1",d:"Medium",q:"A Mission statement should focus on which according to SEOJK 23/2019?",o:["Long-term aspirations and future-oriented direction","Short or medium-term steps, customer/stakeholder focus, and differentiation","Annual KPI targets and budget allocation","Regulatory compliance procedures and operational controls"],a:1,e:"Mission = 단·중기 접근. 요건: Specific & Relevant + Customer/Stakeholder Focused."},
{uid:"W2-019",set:"W2",tp:"U1",d:"Medium",q:"Which is listed under 'Other Information' (g) of the Business Plan?",o:["Funding plans","Organizational and HR development plans","Capital plans","Direct participation (equity) plans"],a:3,e:"(g) = direct participation / sustainable finance / merger·spin-off / Sharia conversion. (A)(B)(D)는 (d)항."},
{uid:"W2-020",set:"W2",tp:"U1",d:"Medium",q:"'Sustainability-Linked Loans' with lower rates for ESG targets aligns with which long-term strategy?",o:["Digital Onboarding Strategy","Strengthening Collectability","Expansion into the Underbanked Segment","Green & Sustainable Finance Hub"],a:3,e:"Green & Sustainable Finance Hub = ESG 파이낸싱·Green bonds."},
{uid:"W2-021",set:"W2",tp:"U1",d:"Hard",q:"The Business Plan Realization Report must include which of the following?",o:["A forecast for the next 3-year business cycle","A complete audit trail of all employee transactions","An explanation of deviations from the Business Plan and follow-up efforts taken","Proposals for new regulatory changes to OJK"],a:2,e:"핵심: (a)달성 설명 (b)이탈 설명 (c)후속 조치."},
{uid:"W2-022",set:"W2",tp:"U1",d:"Medium",q:"Which is NOT one of the four Business Plan principles (Balance, Sustainability, Collaboration, Accountability)?",o:["Balance: Harmonizing business needs with regulatory compliance","Transparency: Full disclosure of all financial transactions to OJK","Sustainability: Creating long-term value for all stakeholders","Accountability: Transparency and responsibility to all relevant parties"],a:1,e:"4대 원칙 = Balance/Sustainability/Collaboration/Accountability. Transparency는 GCG TARIF 소속, BP 4원칙 아님."},
{uid:"W2-023",set:"W2",tp:"U1",d:"Medium",q:"Which factor MOST supports the conclusion 'Threat of New Entrants is Moderate to Low'?",o:["High consumer price sensitivity","Increasing availability of substitute financing products","Strong bargaining power of institutional investors","OJK licensing requirements, large capital needs, and digital infrastructure barriers"],a:3,e:"진입 장벽: OJK 라이선스 + 대규모 자본 + 디지털 인프라."},
{uid:"W2-024",set:"W2",tp:"U1",d:"Hard",q:"Which BEST describes the relationship between POJK 24/2019 and SEOJK 23/2019?",o:["POJK is operational guidance while SEOJK is the binding regulation","POJK is the binding regulation while SEOJK provides practical implementation guidance","Both are equally binding regulations issued simultaneously","SEOJK replaces POJK for Sharia Finance Companies only"],a:1,e:"POJK = binding, SEOJK = 실무 지침."},
{uid:"W2-025",set:"W2",tp:"U1",d:"Medium",q:"Which section should contain plans for improving financial literacy and inclusion?",o:["Executive Summary (section a)","Management Policies and Plans (section d)","Vision, Mission, Business Strategy (section c)","Other Information (section g)"],a:1,e:"(d)항 7번째 항목."},
{uid:"W2-026",set:"W2",tp:"U2",d:"Hard",q:"Which BEST describes the primary role of OJK in Finance Company compliance?",o:["Monitoring AML transactions and suspicious activity reports","Enforcing tax compliance and managing VAT reporting","Regulating electronic signatures and PSE","Supervising and regulating all Finance Company activities, granting licenses, issuing POJK/SEOJK, and enforcement"],a:3,e:"OJK = 주 감독기관. (A)=PPATK, (C)=DJP, (D)=Kominfo."},
{uid:"W2-027",set:"W2",tp:"U2",d:"Hard",q:"Which regulator receives and analyzes a Suspicious Transaction Report (STR)?",o:["OJK","Bank of Indonesia (BI)","Directorate General of Taxes (DJP)","PPATK"],a:3,e:"PPATK = STR·CTR 수령 + AML/CFT 전담."},
{uid:"W2-028",set:"W2",tp:"U2",d:"Hard",q:"POJK 46/2024 PSE registration is supervised by which body?",o:["OJK","PPATK","Ministry of Communication and Digital Affairs (Kominfo)","Bank of Indonesia"],a:2,e:"Kominfo = PSE·전자서명 규제."},
{uid:"W2-029",set:"W2",tp:"U2",d:"Medium",q:"Which BEST distinguishes 'Validity' from 'Relevance' of compliance data?",o:["Validity measures usefulness; Relevance measures accuracy","Both terms are interchangeable","Validity measures accuracy; Relevance measures practical usefulness and directness to the objective","Validity applies only to quantitative; Relevance only to qualitative"],a:2,e:"Validity = accuracy, Relevance = practical usefulness. 양쪽 모두 필요."},
{uid:"W2-030",set:"W2",tp:"U2",d:"Hard",q:"To whom must regular Compliance Reports be submitted?",o:["Bank of Indonesia","OJK","PPATK","Ministry of Finance"],a:1,e:"정기 Compliance Reports = OJK 제출."},
{uid:"W2-031",set:"W2",tp:"U2",d:"Hard",q:"What is the deadline for submitting the annual GCG Report?",o:["April 30","January 31","February 15","March 31"],a:0,e:"GCG Report = April 30. (Health Level = Feb 15)."},
{uid:"W2-032",set:"W2",tp:"U2",d:"Hard",q:"The CORRECT four-step process for CE4 (Reporting Compliance) is:",o:["Collection → Analysis → Investigation → Sanction","Planning → Execution → Reporting → Audit","Draft → Approval → Distribution → Monitoring commitment","Identification → Assessment → Mitigation → Documentation"],a:2,e:"CE4: Draft → Approval → Distribution → Monitoring."},
{uid:"W2-033",set:"W2",tp:"U2",d:"Medium",q:"Why is compliance described as more than just a legal matter?",o:["It is primarily about maximizing shareholder returns","Non-compliance only results in internal disciplinary actions","It is only relevant for Sharia Finance Companies","Compliance risks include sanctions, loss of trust, and material losses, making it a matter of business integrity and sustainability"],a:3,e:"Compliance Risk = 제재 + 신뢰 하락 + 손실. Integrity·Sustainability 직결."},
{uid:"W2-034",set:"W2",tp:"U2",d:"Hard",q:"POJK 43/2024 directly impacts Finance Company compliance by requiring:",o:["Annual Business Plan Supervision Reports","Registration as Electronic System Providers (PSE)","Quarterly AML/CFT reports to PPATK","Regular training and competency certification for key officials"],a:3,e:"POJK 43/2024 = HR 역량 인증 의무화. SPPI Level 7이 이 이행."},
{uid:"W2-035",set:"W2",tp:"U2",d:"Medium",q:"Delayed VAT reporting means which regulator's requirements are NOT met?",o:["OJK","PPATK","Directorate General of Taxes (DJP)","Kominfo"],a:2,e:"VAT = DJP 소관."},
{uid:"W2-036",set:"W2",tp:"U2",d:"Hard",q:"Which impact area is MOST directly affected by POJK 46/2024?",o:["Business Models: requiring digital integration and PSE registration","Capital adequacy: requiring minimum equity of Rp 200 billion","Tax compliance: changing VAT rates for digital transactions","Audit frequency: reducing cycles from quarterly to annually"],a:0,e:"POJK 46/2024 = Business Models에서 PSE·디지털 채널·비대면 financing."},
{uid:"W2-037",set:"W2",tp:"U2",d:"Hard",q:"What is the CORRECT first step when a Finance Company receives a new POJK?",o:["Identify regulatory impacts — type, scope (HR/IT/product/governance), initial mapping","Immediately update all IT systems","Submit a report to OJK confirming receipt","Conduct company-wide training before any analysis"],a:0,e:"Step 1 = Regulatory Impact Identification. 시스템 업데이트(Step 4)로 점프는 오류."},
{uid:"W2-038",set:"W2",tp:"U2",d:"Medium",q:"A cross-functional FGD with Legal, Risk, IT, HRD, Internal Audit corresponds to which step?",o:["Regulatory Impact Identification (Step 1)","System and Infrastructure Implementation (Step 4)","Internal Discussion with Relevant Work Units (Step 2)","Monitoring and Evaluation (Step 5)"],a:2,e:"FGD = Step 2 (Internal Discussions with Relevant Work Units)."},
{uid:"W2-039",set:"W2",tp:"U2",d:"Medium",q:"Which statement CORRECTLY applies both Validity and Relevance?",o:["Valid data measures ratios; relevant data must come only from external sources","Valid data is collected annually; relevant data monthly","Both refer to the same standard of data quality","Valid data accurately measures what it intends; relevant data is directly useful and connected to the objective"],a:3,e:"Validity = 정확성, Relevance = 실용적 관련성. 독립적 기준."},
{uid:"W2-040",set:"W2",tp:"U2",d:"Medium",q:"Which compliance evaluation result is classified as 'Less Comply'?",o:["All OJK quarterly reports submitted on time","STR and CTR submitted to PPATK via the designated app","No periodic evaluation report exists for the internal compliance work program","95% of consumer complaints resolved within SLA"],a:2,e:"정기 평가 보고서 미존재 = Less Comply."},
{uid:"W2-041",set:"W2",tp:"U2",d:"Hard",q:"Which body monitors foreign exchange transactions and macro-level financial stability?",o:["OJK","PPATK","Bank of Indonesia (BI)","Kominfo"],a:2,e:"BI = 거시 감독 + 외환·파생상품."},
{uid:"W2-042",set:"W2",tp:"U2",d:"Medium",q:"A compliance report submitted to OJK must be signed by:",o:["Chief Risk Officer and External Auditor jointly","The Board of Commissioners only","The Directors, addressed to the Chief Executive Supervisor at OJK","Internal Audit Head and Compliance Director jointly"],a:2,e:"이사회(Directors) 서명, OJK Chief Executive Supervisor 앞."},
{uid:"W2-043",set:"W2",tp:"U2",d:"Hard",q:"Which method compares compliance performance against industry standards and OJK regulations?",o:["Benchmarking","Qualitative Descriptive","Quantitative Statistics","Risk-Based Analysis"],a:0,e:"Benchmarking = 산업 표준·OJK 규정 대비 비교."},
{uid:"W2-044",set:"W2",tp:"U2",d:"Medium",q:"In monitoring work unit compliance commitments (PC 4.4), an effective method is:",o:["A one-time annual review without interim follow-up","Relying solely on verbal commitments","Outsourcing monitoring entirely to external consultants","Compliance dashboard + periodic progress reports + internal audits"],a:3,e:"PC 4.4: dashboard + 정기 progress reports + internal audits + 조율 forum."},
{uid:"W2-045",set:"W2",tp:"U2",d:"Hard",q:"POJK 42/2024 and POJK 48/2024 requiring dedicated work units impacts which area?",o:["Tax reporting systems","Organizational Structure and Human Resources","Funding diversification strategies","Foreign exchange transaction monitoring"],a:1,e:"전담 부서 의무화 → Organizational Structure & HR."},
{uid:"W2-046",set:"W2",tp:"U2",d:"Medium",q:"Which compliance area involves monitoring CTR and STR?",o:["Consumer Protection Compliance","AML, CFT, and PPPSPM Compliance","Tax Compliance","Sustainable Finance Compliance"],a:1,e:"CTR·STR = AML/CFT/PPPSPM. PPATK 보고."},
{uid:"W2-047",set:"W2",tp:"U2",d:"Hard",q:"Which is NOT typically included in the Compliance Report structure?",o:["Historical financial performance over the past 10 years","Implementation of the Compliance Function","Implementation of GCG","AML, CFT, PPPSPM compliance"],a:0,e:"과거 10년 재무 실적은 미포함."},
{uid:"W2-048",set:"W2",tp:"U2",d:"Medium",q:"A key official lacks the POJK 43/2024 certification. Immediate action?",o:["Develop a corrective action plan including enrolling the official in certification and submitting to OJK if required","Report to PPATK as a potential fraud incident","Temporarily suspend all business activities","Request an exemption from OJK based on experience"],a:0,e:"Action Plan 수립 + 인증 등록 + 필요 시 OJK 보고."},
{uid:"W2-049",set:"W2",tp:"U2",d:"Hard",q:"Confirming whether compliance data meets both accuracy and usefulness is called:",o:["Verification of Validity and Relevance","Compliance Risk Assessment","Benchmarking and Gap Analysis","Root Cause Analysis"],a:0,e:"PC 1.2 = Validity + Relevance 확인."},
{uid:"W2-050",set:"W2",tp:"U2",d:"Hard",q:"A report with self-assessment matrix and corrective action plan, due April 30, is which type?",o:["Semi-annual Business Plan Supervision Report","Quarterly Compliance Report","Annual GCG Report","Anti-fraud Strategy Report"],a:2,e:"GCG Report = 연간, April 30, self-assessment + corrective action plan."},
{uid:"W2-051",set:"W2",tp:"U1",d:"Hard",q:"Under Unit Q6 (Evaluating a Business Plan), what is the FIRST step in CE1 (Measuring the Success of a Business Plan)?",o:["Recommend corrective actions to the Board of Directors","Conduct a Root Cause Analysis of all deviations","Prepare and document the evaluation report","Identify Business Plan realization data by requesting the Realization Report and management explanations"],a:3,e:"PC 1.1 = realization data 식별. Realization Report·경영진 설명 요청 → 데이터 확보 → validation. Developing(Q7) vs Evaluating(Q6) 출발점 혼동 주의."},
{uid:"W2-052",set:"W2",tp:"U1",d:"Hard",q:"Which of the following are the SIX Business Plan Evaluation Objects?",o:["Liquidity, Solvency, Profitability, Efficiency, Growth, Stability","Planning, Organizing, Leading, Controlling, Reporting, Budgeting","Conformance, Strategy, Leadership, Coherence, Execution, Adequacy","Identification, Measurement, Monitoring, Control, Reporting, Audit"],a:2,e:"BP Evaluation Objects 6종: Conformance·Strategy·Leadership·Coherence·Execution·Adequacy."},
{uid:"W2-053",set:"W2",tp:"U1",d:"Medium",q:"In CE2 (Determining Corrective Actions), which technique identifies root problems before adjusting plans?",o:["Benchmarking against industry peers","Root Cause Analysis","Time Series Analysis","SWOT Analysis"],a:1,e:"PC 2.1 = Root Cause Analysis. Benchmarking·Time Series·SWOT는 CE1 성공도 추정 도구."},
{uid:"W2-054",set:"W2",tp:"U1",d:"Medium",q:"Which is a SUPPORTING factor (not inhibiting) to Business Plan success?",o:["Accurate market analysis using SWOT, Porter's Five Forces, and PESTLE","Unstable market conditions and intense competition","Regulatory changes and economic crises","Natural disasters, pandemics, and geopolitical conflicts"],a:0,e:"PC 1.4 Supporting = 정확한 시장분석·전략적 의사결정·자원 가용성·변화 적응. (A)(B)(D)는 PC 1.3 Inhibiting."},
{uid:"W2-055",set:"W2",tp:"U2",d:"Hard",q:"'Evaluating the Implementation of Compliance Culture' (K.64KPT00.021.1) is based on which Competency Standard?",o:["SKKNI No. 275/2024","POJK 43/2024","SKKNI No. 143/2022","SEOJK 23/2019"],a:2,e:"SKKNI No. 143/2022. Q6는 KPT(공통역량) 코드 — Day1 산업개요 SKKNI 275/2024와 혼동 주의."},
{uid:"W2-056",set:"W2",tp:"U2",d:"Hard",q:"Compliance culture parameters (CE1) are classified into which three levels?",o:["National Level, Corporate Level, Departmental Level","Board Level, Management Level, Staff Level","Policy Level, Process Level, Outcome Level","Strategic Level, Operational Level, Individual Level"],a:3,e:"3계층: Strategic(경영진 솔선)·Operational(SOP·KYC/Dual Control/4-Eye)·Individual(개인 윤리)."},
{uid:"W2-057",set:"W2",tp:"U2",d:"Medium",q:"At the Operational Level of compliance culture, which control principle in the financing process is cited?",o:["KYC, Dual Control, Checks and Balances, and the 4-Eye Principle","Three Lines of Defense","Risk-Based Internal Audit","COSO Internal Control Framework"],a:0,e:"Operational Level = KYC + Dual Control + Checks and Balances + 4-Eye Principle."},
{uid:"W2-058",set:"W2",tp:"U2",d:"Hard",q:"Which philosophy emphasizes that leaders must model rule-abiding behavior themselves?",o:["The Role of Leadership in Leading by Example","Compliance as an Internal Value","Continuous Improvement Through Evaluation","Compliance as a Driver of Organizational Performance"],a:0,e:"Leading by Example (Tone at the Top). 보고서 제출율 100% ≠ Compliance Culture 우수."},
{uid:"W2-059",set:"W2",tp:"U1",d:"Medium",q:"Which is NOT one of the five Competency Dimensions?",o:["Task Skill","Task Management Skill","Financial Analysis Skill","Transfer Skill"],a:2,e:"5종 = Task / Task Management / Contingency Management / Job-Role Environment / Transfer Skill. Financial Analysis Skill은 없음."},
{uid:"W2-060",set:"W2",tp:"U1",d:"Medium",q:"Which Competency Dimension is 'skills in solving problems in new contexts'?",o:["Contingency Management Skill","Transfer Skill","Task Management Skill","Job/Role Environment Skill"],a:1,e:"Transfer Skill = 신규 맥락 전이. Contingency = 돌발 해결, Task Management = 연관 과업 관리."},
{uid:"W2-061",set:"W2",tp:"U1",d:"Medium",q:"Which is one of the eight Employability Skills cited in the Day 2 module?",o:["Initiative and Entrepreneurship","Risk Quantification","Regulatory Drafting","Capital Adequacy Assessment"],a:0,e:"8종 = Communication/Teamwork/Problem Solving/Planning & Organizing/Initiative & Entrepreneurship/Self-Management/Technology/Learning."},
{uid:"W2-062",set:"W2",tp:"U2",d:"Hard",q:"In the Three Lines of Defense model, the Compliance Function belongs to which line?",o:["1st Line — Business Units","3rd Line — Internal Audit","It sits outside all three lines as an independent body","2nd Line — Risk Management and Compliance Function"],a:3,e:"Compliance Function = 2nd Line. 1st = Business Units, 3rd = Internal Audit."},
{uid:"W2-063",set:"W2",tp:"U2",d:"Hard",q:"Which statement about the Three Lines of Defense is CORRECT?",o:["The Compliance Function (2nd Line) directs and controls Internal Audit (3rd Line)","Internal Audit (3rd Line) independently verifies the Compliance Function (2nd Line)","Business Units (1st Line) supervise the Compliance Function (2nd Line)","Internal Audit reports to the Compliance Director for daily operations"],a:1,e:"3rd Line(Internal Audit)이 2nd Line을 독립 검증. 함정 13-12 — Compliance가 Internal Audit 통제는 오답."},
{uid:"W3-001",set:"W3",tp:"개요",d:"Medium",q:"Under Unit 3 (K.64PBY91.019.1), risk management governance, strategies, and policies are based on which set of principles?",o:["The COSO internal control framework exclusively","The three lines of defense reporting hierarchy only","The five GCG principles: transparency, accountability, responsibility, independence, and fairness","The four Basel Accord pillars of capital adequacy"],a:2,e:"교재 Philosophy: risk governance·strategy·policy는 GCG 5원칙(TARIF)에 기반."},
{uid:"W3-002",set:"W3",tp:"TARIF",d:"Easy",q:"The acronym TARIF for governance principles stands for:",o:["Transparency, Accountability, Risk-control, Independence, Finance","Trust, Accountability, Reliability, Integrity, Fairness","Transparency, Authority, Risk, Integrity, Fairness","Transparency, Accountability, Responsibility, Independence, Fairness"],a:3,e:"TARIF = Transparency·Accountability·Responsibility·Independence·Fairness. POJK 48/2024 GCG 5원칙."},
{uid:"W3-003",set:"W3",tp:"TARIF",d:"Hard",q:"Which statement BEST distinguishes 'Accountability' from 'Responsibility' under the governance principles?",o:["Accountability means management responsibilities consistent with each party's duties and functions; Responsibility means compliance with applicable laws and regulations","Accountability applies only to the BOC; Responsibility applies only to the BOD","They are identical concepts used interchangeably in POJK 48/2024","Accountability means compliance with laws; Responsibility means disclosing information"],a:0,e:"Accountability = 역할·기능에 맞는 관리 책임(내부 역할 명확). Responsibility = 법규 준수(외부 규범)."},
{uid:"W3-004",set:"W3",tp:"ISO31000",d:"Medium",q:"The risk management principles referenced in Unit 3 are derived from which standard?",o:["Basel III","POJK 28/2020","COSO ERM 2017","SNI ISO 31000:2018"],a:3,e:"교재 명시: Risk Management Principles는 SNI ISO 31000:2018 기반 (10개 원칙)."},
{uid:"W3-005",set:"W3",tp:"ISO31000",d:"Medium",q:"According to ISO 31000:2018, what is the ultimate purpose of risk management?",o:["Eliminating all risks the company faces","Ensuring zero regulatory violations","Maximizing short-term profit","Creation and protection of value"],a:3,e:"ISO 31000:2018 핵심 목적 = Creation and Protection of Value."},
{uid:"W3-006",set:"W3",tp:"ISO31000",d:"Hard",q:"Which of the following is NOT one of the ISO 31000:2018 risk management principles?",o:["Integrated","Profit-maximizing","Customized","Dynamic"],a:1,e:"ISO 31000 10원칙에 Profit-maximizing은 포함 안 됨."},
{uid:"W3-007",set:"W3",tp:"4층구조",d:"Easy",q:"In the Governance–Risk Management–Internal Control–Internal Audit structure, which layer provides independent assurance?",o:["Risk Management & Compliance","Internal Audit","Governance","Internal Control"],a:1,e:"Internal Audit = 독립 검증(assurance) 층위."},
{uid:"W3-008",set:"W3",tp:"4층구조",d:"Medium",q:"Corporate Governance is BEST defined in Unit 3 as:",o:["The internal audit charter approved by the BOC","A set of risk scoring models used to measure inherent risk","The structure and processes used by company organs to improve business results and optimize company value for stakeholders in an accountable manner, based on laws and ethical values","A quarterly compliance report submitted to OJK"],a:2,e:"회사 기관(organs)이 사업 결과 개선·기업가치 최적화에 사용하는 구조·프로세스. 법규·윤리 기반."},
{uid:"W3-009",set:"W3",tp:"개요",d:"Hard",q:"Which is the CORRECT logical sequence of the three Competency Elements in Unit 3?",o:["Governance/Infrastructure → Policies → Strategy","Policies → Strategy → Governance/Infrastructure","Strategy → Governance/Infrastructure → Policies","Strategy → Policies → Governance/Infrastructure"],a:3,e:"CE1 Strategy → CE2 Policies → CE3 Governance & Infrastructure."},
{uid:"W3-010",set:"W3",tp:"전략",d:"Medium",q:"A corporate strategy must satisfy three alignment requirements. Which of the following is one of them?",o:["It must guarantee a fixed dividend payout ratio","It must exclude any digital transformation initiatives","It must be approved by PPATK before implementation","It must comply with OJK regulations, relevant laws, and internal company policies"],a:3,e:"PC 1.1: OJK 규정·관련 법률·내부 정책 준수 + governance/risk management 정합 + Vision/Mission 달성 지원."},
{uid:"W3-011",set:"W3",tp:"전략",d:"Medium",q:"In developing a corporate strategy, 'Company Diagnosis' includes which of the following?",o:["The execution roadmap and resource allocation","SWOT Analysis and critical performance metrics such as ROE, Loss Ratio, Minimum Capital Ratio, and Gearing Ratio","The vision and mission statement only","PESTEL analysis of the macro environment"],a:1,e:"Company Diagnosis = SWOT + Critical Performance(ROE·Loss Ratio·Minimum Capital Ratio·Gearing Ratio)."},
{uid:"W3-012",set:"W3",tp:"전략",d:"Hard",q:"The four stages of developing a corporate strategy in Unit 3 are, in order:",o:["Strategic Context → Company Diagnosis → Strategic Options → Execution Roadmap","Company Diagnosis → Strategic Context → Execution Roadmap → Strategic Options","Strategic Options → Strategic Context → Company Diagnosis → Execution Roadmap","Execution Roadmap → Strategic Options → Company Diagnosis → Strategic Context"],a:0,e:"Strategic Context → Company Diagnosis → Strategic Options → Execution Roadmap."},
{uid:"W3-013",set:"W3",tp:"전략",d:"Medium",q:"What is the FIRST component of the risk management process when analyzing risk coverage based on company strategy?",o:["Measuring risk profiles","Establishing/identifying the risk scope","Purchasing risk insurance","Submitting the risk report to OJK"],a:1,e:"PC 1.2: 첫 구성요소 = establishing the scope(범위 설정)."},
{uid:"W3-014",set:"W3",tp:"전략",d:"Medium",q:"For a 'Digital Onboarding' strategy, which pair of risks is identified as the key risk scope in the training module example?",o:["Reputation Risk and Legal Risk only","Liquidity Risk and Market Risk","Technology Risk (failed API integration, data breach) and Regulatory Risk (changes to OJK e-KYC rules)","Credit Risk and Concentration Risk"],a:2,e:"Digital Onboarding → Technology Risk + Regulatory Risk(OJK e-KYC 변경)."},
{uid:"W3-015",set:"W3",tp:"Matrix",d:"Hard",q:"In the 5x5 risk measurement matrix, an event with a financial loss of more than IDR 1 billion is rated:",o:["Score 4 - Significant","Score 5 - Major to Catastrophic","Score 3 - Moderate","Score 2 - Minor"],a:1,e:"Impact Score 5 = Major to Catastrophic = > IDR 1 billion."},
{uid:"W3-016",set:"W3",tp:"Matrix",d:"Hard",q:"In the risk measurement framework, a likelihood rating of Score 1 ('Very Rare') corresponds to a probability of:",o:["≤ 2% of total operations","> 20% of total operations","> 2% and ≤ 5%","> 10% and ≤ 20%"],a:0,e:"Likelihood Score 1 Very Rare = ≤ 2%, >1년. Score 5 = >20%, ≤1개월."},
{uid:"W3-017",set:"W3",tp:"Matrix",d:"Medium",q:"A risk profile in the training module is measured as a function of:",o:["Inherent risk minus residual risk","ROE and ROA","Impact and Likelihood of occurrence","Capital and liquidity only"],a:2,e:"Risk Profile = f(Impact, Likelihood)."},
{uid:"W3-018",set:"W3",tp:"Matrix",d:"Medium",q:"An Impact Score of 2 ('Minor') in the risk matrix corresponds to a financial loss of:",o:["> IDR 1 billion","> IDR 100 million – ≤ IDR 500 million","≤ IDR 25 million","> IDR 25 million – ≤ IDR 100 million"],a:3,e:"Score 1=≤25M, 2(Minor)=>25M–≤100M, 3=>100M–≤500M, 4=>500M–≤1bn, 5=>1bn."},
{uid:"W3-019",set:"W3",tp:"Treatment",d:"Easy",q:"Which risk treatment type corresponds to 'cancelling expansion to high-risk countries'?",o:["Transfer","Avoid","Reduce","Accept"],a:1,e:"활동 종료(terminate activity) = Avoid(회피)."},
{uid:"W3-020",set:"W3",tp:"Treatment",d:"Medium",q:"Purchasing cyber insurance and outsourcing services is an example of which risk treatment?",o:["Avoid","Reduce","Transfer","Accept"],a:2,e:"보험 가입·아웃소싱 = Transfer(제3자 이전)."},
{uid:"W3-021",set:"W3",tp:"Treatment",d:"Medium",q:"Implementing end-to-end encryption as a proactive control is which risk treatment type?",o:["Reduce","Avoid","Transfer","Accept"],a:0,e:"선제적 통제(proactive control)인 end-to-end 암호화 = Reduce(감소). 함정: Avoid 아님."},
{uid:"W3-022",set:"W3",tp:"Treatment",d:"Easy",q:"Accepting a minor operational risk below IDR 100 million with no action taken is which treatment?",o:["Avoid","Accept","Transfer","Reduce"],a:1,e:"경미한 운영리스크(<IDR 100M) 수용, no action = Accept."},
{uid:"W3-023",set:"W3",tp:"Treatment",d:"Hard",q:"In the People-Policy-Process-Performance (4P) framework for risk management, 'establishing risk owners and clarity of duties' falls under:",o:["Process","Policy","Performance","People"],a:3,e:"4P: People = HR 적정성·Risk Owner 지정·직무 명확. Policy=Appetite/Tolerance/Limit, Process=RCSA·escalation, Performance=통제 효과성·KRI."},
{uid:"W3-024",set:"W3",tp:"Treatment",d:"Hard",q:"Under the dual-KPI integration approach, if the strategic KPI is 'ROE 3%', the corresponding risk management KPI example is:",o:["Complaint ratio increase > 2%","CSI = 8","Time To Approve < 8 hours","VaR = Rp 5 Bio"],a:3,e:"Dual KPI 표: Financial 관점 Strategic KPI(ROE 3%) ↔ Risk Mgmt KPI(VaR = Rp 5 Bio)."},
{uid:"W3-025",set:"W3",tp:"Treatment",d:"Medium",q:"Which of the following is an example of a 'Key Risk Indicator (KRI)' function in the risk management strategy?",o:["A marketing metric for new product launches","A dividend distribution schedule","An early warning system for control/mitigation effectiveness","An external audit opinion"],a:2,e:"4P-Performance: KRI = Early Warning System. 통제·완화 효과성 조기 경보."},
{uid:"W3-026",set:"W3",tp:"RiskLimit",d:"Hard",q:"In the risk limit hierarchy, which concept is the PRIMARY constraint in determining risk appetite and risk tolerance?",o:["Risk Capacity (Risk Bearing Capacity)","Risk Tolerance","Risk Appetite","Risk Limit"],a:0,e:"PC 2.1: Risk Capacity가 1차 제약(primary constraint). Appetite·Tolerance는 Capacity 안에서 결정."},
{uid:"W3-027",set:"W3",tp:"RiskLimit",d:"Medium",q:"Risk appetite is BEST defined as:",o:["The level of risk a company is willing to accept to achieve its strategic objectives","The company's total capital available to absorb losses","The maximum risk a company can accept in its operations","The numerical limit set for each of the eight risk types"],a:0,e:"Risk Appetite = 전략 목표 달성 위해 '기꺼이 수용'하는 리스크. (C)=Tolerance, (B)=Capacity, (D)=Limit."},
{uid:"W3-028",set:"W3",tp:"RiskLimit",d:"Medium",q:"A company stipulating that the NPF rate must not exceed 5% is an example of:",o:["Risk Capacity","Risk Tolerance","Risk Appetite","Risk Limit per risk type"],a:1,e:"NPF 5% 초과 금지 = Risk Tolerance(최대 수용 가능). 단일채무자 총자본 10% 한도도 Tolerance."},
{uid:"W3-029",set:"W3",tp:"RiskLimit",d:"Hard",q:"The relationship producing risk limits for the 8 risk types is expressed as:",o:["Risk Capacity − Risk Tolerance","Risk Appetite ÷ Risk Tolerance","Risk Appetite × Risk Capacity × Risk Tolerance","Risk Appetite + Risk Capacity + Risk Tolerance"],a:2,e:"도식: Risk Appetite × Risk Bearing Capacity × Risk Tolerance → 8개 리스크 유형별 Risk Limit 도출."},
{uid:"W3-030",set:"W3",tp:"RiskLimit",d:"Medium",q:"Which method of determining risk limits relies on mathematical models based on empirical data?",o:["Quantitative","Benchmarking only","Qualitative","Mixed"],a:0,e:"Quantitative = 실증 데이터 기반 수학 모델. Qualitative = 인터뷰·벤치마킹·규정. Mixed = 2차 데이터·규정."},
{uid:"W3-031",set:"W3",tp:"RiskLimit",d:"Hard",q:"In the Appetite vs Tolerance example for Credit Risk (F5PD overdue > 30 days), the appetite and tolerance are:",o:["Appetite Max 10 Billion, Tolerance Max 12.5 Billion","Appetite Max 5%, Tolerance < 4%","Appetite < 4%, Tolerance Max 5%","Appetite 100%-125%, Tolerance 85%-150%"],a:2,e:"Credit Risk F5PD overdue >30일 → Appetite < 4%, Tolerance Max 5%. Appetite가 Tolerance보다 보수적(작음)."},
{uid:"W3-032",set:"W3",tp:"RiskLimit",d:"Medium",q:"According to PC 2.3, the scope of a Risk Management Policy includes all of the following EXCEPT:",o:["Risk Management Principles and Governance Structure","Types of Risk and Their Management Strategies","The company's quarterly dividend distribution plan","Risk Appetite and Risk Tolerance"],a:2,e:"PC 2.3 범위 9개: Introduction·Objectives·Scope·Principles·Governance Structure·Process·Appetite/Tolerance·Types of Risk & Strategies·Training & Culture. 배당계획 없음."},
{uid:"W3-033",set:"W3",tp:"GCG",d:"Easy",q:"POJK No. 48 of 2024 concerns:",o:["Good Governance for Financing Institutions, Venture Capital Companies, Microfinance Institutions, and Other FSIs (PVML)","HR competency certification","Risk Management for Financing Institutions","Non-face-to-face financing"],a:0,e:"POJK 48/2024 = Good Governance for PVML. 42/2024=Risk Management, 43/2024=HR 인증, 46/2024=비대면 financing."},
{uid:"W3-034",set:"W3",tp:"GCG",d:"Medium",q:"In POJK 48/2024, the term 'PVML' refers to:",o:["Prudential Valuation of Mortgage Loans","Financing Institutions, Venture Capital Companies, Microfinance Institutions, and Other Financial Services Institutions","Public Venture Markets Ltd","Personal Verification and Money Laundering control"],a:1,e:"PVML = Perusahaan Pembiayaan, Modal Ventura, Lembaga Keuangan Mikro 등 금융서비스기관 통칭."},
{uid:"W3-035",set:"W3",tp:"GCG",d:"Hard",q:"Which of the following is included in the GCG implementation scope under POJK 48/2024?",o:["Setting the central bank base interest rate","Determining foreign exchange reserves","Approval of consumer loan applications","Implementation of risk management, anti-fraud strategies, compliance function, and internal/external audit functions"],a:3,e:"GCG 적용범위 16개 중: Risk management·Anti-fraud strategy·Compliance function·Internal/External audit. 중앙은행 금리·외환보유고는 BI 소관."},
{uid:"W3-036",set:"W3",tp:"GCG",d:"Medium",q:"Which of the following is NOT among the stated purposes of implementing GCG under POJK 48/2024?",o:["Improve PVML management in a professional, effective, efficient manner","Optimize PVML's value for stakeholders","Create a healthier, more reliable PVML adhering to consumer protection principles","Guarantee a minimum 15% annual return to shareholders"],a:3,e:"GCG 목적: 가치 최적화·경쟁력·전문경영·컴플라이언스·투자환경·건전성·국가경제 기여. 특정 수익률 보장은 없음."},
{uid:"W3-037",set:"W3",tp:"GCG",d:"Hard",q:"POJK 48/2024 is BEST described in relation to earlier GCG regulations as:",o:["A temporary COVID-19 relaxation measure","The new consolidated governance regulation absorbing/replacing POJK 30/2014 and 29/2020","A sharia-only governance code","A subordinate circular under POJK 30/2014"],a:1,e:"POJK 48/2024 = 신규 통합 GCG. POJK 30/2014(원본)·29/2020(개정) 흡수·대체."},
{uid:"W3-038",set:"W3",tp:"3Lines",d:"Medium",q:"The Three Lines model in Unit 3 is sourced from which institution?",o:["OJK","IIA (Institute of Internal Auditors)","Basel Committee","PPATK"],a:1,e:"교재 출처 명시: Source: IIA (Institute of Internal Auditors)."},
{uid:"W3-039",set:"W3",tp:"3Lines",d:"Easy",q:"In the Three Lines model, which line provides products/services to clients and manages risk directly?",o:["External assurance providers","Second line","Third line","First line"],a:3,e:"1st line = 고객 제품·서비스 제공 + 리스크 직접 관리(risk-taking)."},
{uid:"W3-040",set:"W3",tp:"3Lines",d:"Medium",q:"In the Three Lines model, the Risk Management and Compliance functions belong to:",o:["Third line roles","First line roles","Second line roles","The governing body"],a:2,e:"2nd line = Risk Management + Compliance(법규준수·내부통제·IT보안·ERM). Internal Audit = 3rd line."},
{uid:"W3-041",set:"W3",tp:"3Lines",d:"Hard",q:"According to the Three Lines model, which is a requirement for third-line (Internal Audit) independence?",o:["Combining its functions with the second-line risk function","Reporting directly to the first-line business units","Accountability to the Governing Body, access to people/resources/data, and freedom from bias or interference","Obtaining prior approval from management for every audit"],a:2,e:"3rd Line Independence: ① Governing Body에 책임(보고) ② people·resources·data 접근 ③ 편향·간섭 배제."},
{uid:"W3-042",set:"W3",tp:"3Lines",d:"Hard",q:"Which statement about combining lines in the Three Lines model is CORRECT?",o:["First and second line roles may be combined or separated, but the third line must remain independent","All three lines must always be merged into one unit","The second and third lines are required to be combined","The third line and first line are always combined"],a:0,e:"1st·2nd line은 결합/분리 가능. 3rd line(Internal Audit)은 반드시 독립 유지."},
{uid:"W3-043",set:"W3",tp:"위원회",d:"Medium",q:"NBFIs are required to establish which two risk management bodies/functions under the training module?",o:["A Sharia Board and a Remuneration Committee","An Audit Committee and an External Auditor","A Compliance Department and a Marketing Unit","A Risk Management Committee and a Risk Management Function"],a:3,e:"NBFI는 Risk Management Committee + Risk Management Function 설치 의무."},
{uid:"W3-044",set:"W3",tp:"위원회",d:"Hard",q:"What is the KEY difference between the Risk Management Committee and the Risk Monitoring Committee?",o:["The Risk Management Committee serves the BOC; the Risk Monitoring Committee serves the BOD","They are the same committee with different names","The Risk Monitoring Committee implements risk while the Risk Management Committee only audits","The Risk Management Committee is a tool for the Directors in implementing risk management; the Risk Monitoring Committee is a tool for the BOC in monitoring risk management implementation"],a:3,e:"Risk Management Committee = Directors(BOD)의 리스크 관리 실행 도구. Risk Monitoring Committee = BOC의 감독 도구. 최빈출 함정."},
{uid:"W3-045",set:"W3",tp:"위원회",d:"Hard",q:"The minimum composition of the Risk Management Committee includes:",o:["The entire workforce of the business units","At least half of the Directors, one of whom is the director responsible for compliance/Risk Management functions, plus relevant executive officers","All members of the Board of Commissioners","Only the external auditor and one independent commissioner"],a:1,e:"Risk Management Committee 최소 구성 = Directors 절반 이상(그 중 1인은 compliance/Risk Management 담당) + 관련 executive officer."},
{uid:"W3-046",set:"W3",tp:"위원회",d:"Medium",q:"The Risk Management Function must be independent of which functions?",o:["The external audit and tax functions","The marketing and HR functions only","The business/operational (risk-taking) functions and the internal control functions","It need not be independent of any function"],a:2,e:"Risk Management Function은 risk-taking(영업·운영) 및 내부통제 기능과 독립. President Director/RM 담당 Director에 직보."},
{uid:"W3-047",set:"W3",tp:"위원회",d:"Medium",q:"The Risk Management Function reports directly to:",o:["The President Director or the Director in charge of the Risk Management function","The external auditor","The marketing department head","OJK's Chief Executive Supervisor"],a:0,e:"Risk Management Function은 President Director 또는 RM 담당 Director에 직접 보고. 영업라인 산하 배치는 오답."},
{uid:"W3-048",set:"W3",tp:"위원회",d:"Hard",q:"The Corporate/Risk Governance Policy must include at least all of the following EXCEPT:",o:["Completeness of internal control committees (Risk Management, Audit, Risk Monitoring, Remuneration & Nomination)","The personal investment portfolio of each director","Procedures for BOC and Directors' duties and responsibilities","Anti-Fraud Strategy and AML/CFT/CPF programs"],a:1,e:"Risk Governance Policy 포함: BOC/BOD 의무 절차·내부통제위원회·compliance/audit 정책·RM 정책·Anti-Fraud·AML/CFT/CPF·장기/연간 계획. 이사 개인 포트폴리오는 없음."},
{uid:"W3-049",set:"W3",tp:"Culture",d:"Medium",q:"Risk culture is BEST defined as:",o:["The mathematical model used to calculate VaR","The values, beliefs, and attitudes held by individuals and the organization in identifying, understanding, and managing risk","The external audit's assessment of internal controls","The numerical risk limits set for each risk type"],a:1,e:"PC 3.2: Risk culture = 개인·조직이 리스크를 식별·이해·관리하는 가치·신념·태도."},
{uid:"W3-050",set:"W3",tp:"Culture",d:"Medium",q:"Which is the FIRST step in implementing a risk culture according to the training module?",o:["Monitoring and Evaluation","Rewards and Sanctions","Risk Awareness Campaign","Commitment from Leadership"],a:3,e:"Risk Culture 6단계 1번 = Commitment from Leadership(tone at the top)."},
{uid:"W3-051",set:"W3",tp:"Culture",d:"Hard",q:"A Director who directly chairs Risk Management Committee meetings to demonstrate commitment is an example of which risk culture step?",o:["Rewards and Sanctions","Risk Awareness Campaign","Commitment from Leadership (tone at the top)","Risk Training and Education"],a:2,e:"Directors가 RM Committee 직접 주재 = Commitment from Leadership(tone at the top)."},
{uid:"W3-052",set:"W3",tp:"Culture",d:"Medium",q:"Establishing a 'no-blame risk culture' and integrating risk awareness into HR performance assessment falls under which risk culture implementation step?",o:["Establishing Policies and Procedures that Support a Risk Culture","Risk Awareness Campaign","Monitoring and Evaluation","Commitment from Leadership"],a:0,e:"3단계: Policies & Procedures = no-blame 문화, 간편 보고 절차, HR 평가지표에 risk awareness 포함."},
{uid:"W3-053",set:"W3",tp:"Culture",d:"Medium",q:"Conducting an annual risk culture survey to measure employee awareness corresponds to which step?",o:["Monitoring and Evaluation of Risk Culture","Risk Awareness Campaign","Rewards and Sanctions","Risk Training and Education"],a:0,e:"6단계: Monitoring and Evaluation = 연간 risk culture survey + 정기 효과성 보고."},
{uid:"W3-054",set:"W3",tp:"Culture",d:"Easy",q:"Which of the following is a characteristic of a constructive risk culture?",o:["Avoiding all risk-based decision-making","Active involvement of the Directors and BOC in managing risk, and open communication","Concealing risk information from leadership","Fault-finding and blaming individuals for every loss"],a:1,e:"Constructive Risk Culture: Risk-Based Leadership, BOD·BOC 적극 참여, 학습·혁신 의지, 책임 지향(no fault-finding), 개방적 소통."},
{uid:"W3-055",set:"W3",tp:"Infra",d:"Hard",q:"Which of the following is one of the six components of risk management infrastructure (PC 3.3)?",o:["The external auditor's engagement letter","A fixed dividend policy","A marketing campaign budget","Risk Management Policy and Framework; organizational structure with clear duties; supporting technology; processes/guidelines; training/education; measurement/evaluation systems"],a:3,e:"PC 3.3 Infrastructure 6요소: Policy/Framework·명확한 R&R 조직구조·지원 기술/시스템·프로세스/가이드라인·Risk Awareness 교육·측정/평가 시스템."},
{uid:"W3-056",set:"W3",tp:"Infra",d:"Hard",q:"Compared with the PC 2.3 nine-element Risk Management Policy, the Risk Management Policy under infrastructure (PC 3.3) ADDITIONALLY includes:",o:["Fraud Control & Anti-fraud Strategy, and Risk Management Reporting","The marketing department's KPIs","The company's tax filing schedule","Foreign exchange hedging contracts"],a:0,e:"Infrastructure 관점 11개 구성에는 Fraud Control & Anti-fraud Strategy, Risk Management Reporting이 추가됨(PC 2.3의 9개 대비)."},
{uid:"W3-057",set:"W3",tp:"위원회",d:"Medium",q:"In the risk governance structure example, the 'Risk Management & Credit Policy Committee' covers which risks?",o:["Only intragroup transaction policy","Liquidity, Interest Rate, and Forex risks","Only insurance risk","Credit, Market, Operational, Legal, Reputation, Strategic, and Compliance risks plus Capital management"],a:3,e:"Risk Management & Credit Policy Committee = Credit·Market·Operational·Legal·Reputation·Strategic·Compliance Risk + Capital. ALCO는 Liquidity·Interest Rate·Forex 담당."},
{uid:"W3-058",set:"W3",tp:"위원회",d:"Hard",q:"Which committee in the risk governance structure example is responsible for Liquidity Risk, Interest Rate Risk, and Forex Risk?",o:["Asset & Liability Committee (ALCO)","Risk Management & Credit Policy Committee","Capital & Subsidiaries Committee","Audit Committee"],a:0,e:"ALCO = Liquidity·Interest Rate·Forex Risk + Pricing Management + Recovery Plan."},
{uid:"W3-059",set:"W3",tp:"GCG",d:"Hard",q:"Which set of POJK regulations forms the policy basis for evaluating governance and risk management implementation (per the related Q6 unit references)?",o:["POJK 42/2024, 46/2024, 29/2020, SEOJK 11/2020, and 48/2024","POJK 22/2023 and POJK 28/2020 only","POJK 24/2019 and SEOJK 23/2019 only","POJK 12/2017 and POJK 43/2024 only"],a:0,e:"교재 Policy Basis: POJK 42/2024(Risk Mgmt)·46/2024(Development)·29/2020(GCG 개정)·SEOJK 11/2020(Health Level)·48/2024(Good Governance)."},
{uid:"W3-060",set:"W3",tp:"RiskLimit",d:"Medium",q:"A finance company sets that 'all operational risks must be at a low to moderate level (Level 2 Risk)'. This statement is an example of:",o:["An ISO 31000 principle","A risk treatment of type 'Transfer'","Risk Appetite","Risk Capacity"],a:2,e:"Risk Appetite 예시: '모든 운영리스크는 Level 2(low-moderate) 이내' = Risk Appetite(기꺼이 수용하는 리스크 수준)."},
{uid:"W3-061",set:"W3",tp:"Matrix",d:"Hard",q:"In the 5x5 risk impact matrix, an event involving license revocation, a data confidentiality breach, or an AML violation is rated at which impact score, even if the direct financial loss is small?",o:["Score 2 - Minor","Score 3 - Moderate","Score 4 - Significant","Score 5 - Major to Catastrophic"],a:3,e:"Impact는 재무손실뿐 아니라 비재무 축(Reputation·Policy Compliance·Customer Service)으로도 평가. license revocation·data breach·AML 위반 = Score 5(Major to Catastrophic), 재무손실 규모와 무관."},
{uid:"W3-062",set:"W3",tp:"Matrix",d:"Medium",q:"Under the non-financial impact criteria, 'substantial non-compliance with internal policies and external regulations causing serious negative impact, with repeated major media coverage exceeding one day' corresponds to which impact score?",o:["Score 1 - Insignificant","Score 4 - Significant","Score 2 - Minor","Score 3 - Moderate"],a:1,e:"Score 4(Significant) = 내부정책+외부규정 중대 위반, 주요 미디어 반복보도 >1일, Working Group/Board 논의, 목표달성 10~20%↓."},
{uid:"W3-063",set:"W3",tp:"Treatment",d:"Medium",q:"In the training module's risk-type examples, an 'asset–liability gap caused by a high cost of funds (Liquidity Ratio < 1)' is the root cause for which risk type?",o:["Credit Risk","Operational Risk","Liquidity Risk","Strategic Risk"],a:2,e:"Liquidity Risk: Liquidity Ratio<1의 root cause = 고금리 자금조달로 인한 asset–liability gap. High Cash Ratio는 판매목표 미달의 idle cash."},
{uid:"W3-064",set:"W3",tp:"위원회",d:"Hard",q:"In the example risk governance structure, which committee is responsible for Credit, Market, Operational, Legal, Reputation, Strategic, and Compliance risks plus Capital?",o:["Asset & Liability Committee (ALCO)","Risk Management & Credit Policy Committee","Capital & Subsidiaries Committee","Integrated Risk Committee"],a:1,e:"Risk Management & Credit Policy Committee = Credit·Market·Operational·Legal·Reputation·Strategic·Compliance Risk + Capital. ALCO = Liquidity·Interest Rate·Forex."},
{uid:"W3-065",set:"W3",tp:"RiskLimit",d:"Medium",q:"In the Appetite vs Tolerance examples, 'Day Alternate Funding' for Liquidity Risk has an appetite of Min 30 days and a tolerance of Min 20 days. What does this ordering illustrate?",o:["Appetite is always numerically smaller than tolerance","For funding-days metrics, appetite (more conservative) is a longer minimum than tolerance, the reverse of ratio-based limits like NPF","Tolerance and appetite are identical for liquidity risk","Day Alternate Funding is a credit risk metric"],a:1,e:"Day Alternate Funding은 일수가 길수록 보수적 → Appetite(Min 30일) > Tolerance(Min 20일). NPF·Current Ratio처럼 'Appetite가 항상 작다'는 통념과 방향 반대."},
{uid:"W4-001",set:"W4",tp:"개요",d:"Easy",q:"What is the underlying philosophy of an anti-fraud strategy under POJK 12/2024?",o:["Punish all employees to create deterrence","Outsource all fraud detection to external auditors","Prevention is better than cure, building a culture of integrity, transparency, and accountability","Maximize short-term recovery of fraud losses"],a:2,e:"교재 Philosophy: 'Prevention is better than cure' — integrity·transparency·accountability 문화 구축이 핵심."},
{uid:"W4-002",set:"W4",tp:"POJK",d:"Easy",q:"Which OJK regulation is the primary legal basis for implementing anti-fraud strategies for financial services institutions?",o:["POJK 35 of 2018","POJK 48 of 2024","POJK 12 of 2024","POJK 42 of 2024"],a:2,e:"POJK 12/2024 = Implementation of Anti-Fraud Strategies for LJK. Finance Company 포함 1차 법적 근거."},
{uid:"W4-003",set:"W4",tp:"Triangle",d:"Medium",q:"According to the training module, the Fraud Triangle consists of which three elements?",o:["Pressure, Rationalization, Opportunity","Motivation, Rationalization, Capability","Pressure, Greed, Opportunity","Pressure, Capability, Opportunity"],a:0,e:"교재 Basic Principles: Pressure·Rationalization·Opportunity 3요소. Capability 추가 4요소(Fraud Diamond)는 교재 범위 아님."},
{uid:"W4-004",set:"W4",tp:"Triangle",d:"Hard",q:"Within the Fraud Triangle, which element can the organization MOST directly control through stronger internal controls?",o:["Opportunity","Pressure","Rationalization","All three equally"],a:0,e:"Opportunity는 내부통제 약화로 발생 — 통제 강화로 직접 차단 가능. Pressure·Rationalization은 개인 심리 영역."},
{uid:"W4-005",set:"W4",tp:"Fraud유형",d:"Medium",q:"Which of the following is classified as 'Corruption' type fraud in the training module?",o:["Overstatement of net income","Cash misappropriation","Bribery and extortion","Inventory misappropriation"],a:2,e:"교재 Corruption = 이해상충·뇌물(bribery)·불법수수·강요(extortion). Cash/inventory misappropriation은 Asset Misappropriation."},
{uid:"W4-006",set:"W4",tp:"Fraud유형",d:"Hard",q:"Which statement about Financial Reporting Fraud is CORRECT per the training module?",o:["Only overstatement of net worth/income qualifies","It is not considered fraud under POJK 12/2024","Only understatement of net worth/income qualifies","Both overstatement and understatement of net worth/income qualify"],a:3,e:"교재: Financial Reporting Fraud = overstatement 또는 understatement 둘 다. 과대계상만 fraud는 오답."},
{uid:"W4-007",set:"W4",tp:"4Aspects",d:"Medium",q:"How many aspects make up 'Fraud Control' according to the training module?",o:["Four aspects","Five aspects","Three aspects","Six aspects"],a:0,e:"교재 Fraud Control Aspects 4개: Active Supervision / Policies and Procedures / Organizational Structure / Control and Monitoring."},
{uid:"W4-008",set:"W4",tp:"4Aspects",d:"Hard",q:"The 'four eyes principle' is an example of which fraud control aspect?",o:["Control and Monitoring","Organizational Structure and Accountability","Policies and Procedures","Active Supervision of Directors & BOC"],a:0,e:"교재: four eyes principle(기능 분리)은 Control and Monitoring 측면 예시."},
{uid:"W4-009",set:"W4",tp:"4Pillars",d:"Medium",q:"How many pillars make up the Anti-Fraud Strategy under POJK 12/2024?",o:["Four pillars","Two pillars","Three pillars","Five pillars"],a:0,e:"4 Pillars: Prevention / Detection / Investigation, Reporting and Sanctions / Monitoring, Evaluation and Follow-up."},
{uid:"W4-010",set:"W4",tp:"4Pillars",d:"Medium",q:"The objective of the 'Prevention' pillar is:",o:["Monitoring and evaluating fraud incidents","Identifying and discovering fraud incidents","Reducing the potential occurrence of fraud","Gathering information and imposing sanctions"],a:2,e:"교재: Prevention 목적 = fraud 발생 가능성 감소."},
{uid:"W4-011",set:"W4",tp:"4Pillars",d:"Hard",q:"Whistleblowing and surprise inspections belong to which anti-fraud pillar?",o:["Detection","Prevention","Investigation, Reporting and Sanctions","Monitoring, Evaluation and Follow-up"],a:0,e:"교재: Whistleblowing·Surprise Inspections·Monitoring System = Detection pillar. 예방처럼 보이나 적발."},
{uid:"W4-012",set:"W4",tp:"4Pillars",d:"Medium",q:"The 'Know Your Employee Policy' belongs to which anti-fraud pillar?",o:["Investigation","Detection","Monitoring","Prevention"],a:3,e:"교재: Know Your Employee Policy = Prevention pillar."},
{uid:"W4-013",set:"W4",tp:"4Pillars",d:"Hard",q:"A company's sanctions policy must at minimum include which three elements?",o:["Whistleblower identity, perpetrator name, and loss amount","Fine amount, prison term, and public announcement","Pressure, rationalization, and opportunity","Type of sanction, mechanism for imposing it, and party authorized to impose it"],a:3,e:"교재: Sanctions policy 최소 3요소 = 제재 종류·부과 메커니즘·권한자."},
{uid:"W4-014",set:"W4",tp:"POJK",d:"Hard",q:"Under POJK 12/2024, the anti-fraud strategy must be submitted to OJK no later than:",o:["12 months from the enactment of POJK 12/2024","6 months from the enactment of POJK 12/2024","1 month from the enactment of POJK 12/2024","3 months from the enactment of POJK 12/2024"],a:1,e:"교재: 전략 최초 제출 = 시행일로부터 6개월 이내."},
{uid:"W4-015",set:"W4",tp:"POJK",d:"Hard",q:"Any change to the anti-fraud strategy must be submitted to OJK no later than:",o:["7 working days after the change is made","The end of the following month","6 months after the change","30 calendar days after the change"],a:0,e:"교재: 전략 변경 = 변경 후 7영업일 이내."},
{uid:"W4-016",set:"W4",tp:"POJK",d:"Hard",q:"A report of significant fraud incidents must be submitted to OJK no later than:",o:["7 working days after identification","6 working days after the significant fraud is identified","3 months after the incident","31 January of the following year"],a:1,e:"교재: significant fraud 보고 = 식별 후 6영업일 이내."},
{uid:"W4-017",set:"W4",tp:"POJK",d:"Medium",q:"The annual anti-fraud strategy implementation report (December position) must be submitted by:",o:["30 June of the following year","6 working days after year-end","7 working days after year-end","31 January of the following year"],a:3,e:"교재: 연간 이행보고(12월말 기준) = 익년 1월 31일까지."},
{uid:"W4-018",set:"W4",tp:"POJK",d:"Medium",q:"Under POJK 12/2024, anti-fraud education and socialization must be conducted at minimum:",o:["Once per month","Once per year","Once per quarter","Once every two years"],a:1,e:"교재: 교육·socialization = 최소 연 1회."},
{uid:"W4-019",set:"W4",tp:"POJK",d:"Medium",q:"Which of the following is one of the three criteria for a 'significant impact' fraud incident?",o:["Any fraud above IDR 1 million","Any fraud committed by a junior employee","Fraud incidents that could jeopardize the company's business continuity","Fraud detected by external auditors only"],a:2,e:"교재 3기준: 중대 법규위반 / 사업 연속성 위협 / 공중 주목·평판 손상 가능성."},
{uid:"W4-020",set:"W4",tp:"POJK",d:"Medium",q:"POJK 28/2024 concerns:",o:["Fit and proper testing","Good governance for finance companies","Risk management for finance companies","Management of Perpetrator Trace Information through the information system (SIPELAKU)"],a:3,e:"POJK 28/2024 = SIPELAKU 관리. integrity 제고·fraud 예방 목적."},
{uid:"W4-021",set:"W4",tp:"POJK",d:"Medium",q:"Under POJK 28/2024, the maximum administrative fine for SIPELAKU-related violations is:",o:["IDR 1 billion","IDR 3 billion","IDR 6 billion","IDR 10 billion"],a:2,e:"교재: SIPELAKU 행정제재 벌금 상한 = 최대 IDR 6 billion."},
{uid:"W4-022",set:"W4",tp:"POJK",d:"Medium",q:"What is the primary purpose of the SIPELAKU system under POJK 28/2024?",o:["To calculate finance company capital adequacy","To store fraud perpetrator trace records and prevent fraud across the financial services sector","To register board of directors candidates with OJK","To monitor consumer complaints"],a:1,e:"교재: SIPELAKU = fraud 가해자 trace record 저장 시스템."},

const KEY="A B C D".split(" ");
// 실전 비중 가중: W3(거버넌스·리스크) 최대, W4·W1·W2 순
const WEIGHTS={W1:8, W2:8, W3:14, W4:10}; // 합 40
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function buildExam(){
  let picked=[];
  for(const set of ["W1","W2","W3","W4"]){
    const pool=BANK.filter(q=>q.set===set);
    picked=picked.concat(shuffle(pool).slice(0, WEIGHTS[set]));
  }
  // 전체 순서도 섞고 보기도 셔플
  return shuffle(picked).map(shuffleOpts);
}
function start(){
  quiz=buildExam();
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">종합 모의고사</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:4px">전 범위 251문항 풀에서 <b>40문항</b> 랜덤 출제</p>
      <div class="mix">
        <span class="setbadge setW1">W1 · 8</span>
        <span class="setbadge setW2">W2 · 8</span>
        <span class="setbadge setW3">W3 · 14</span>
        <span class="setbadge setW4">W4 · 10</span>
      </div>
      <p style="font-size:12px;color:#9a9788;margin:8px 0 16px">실전 비중 가중(거버넌스·리스크 최대) · 매회 새 문항 · 보기 셔플</p>
      <div class="start-opts">
        <button onclick="start()">모의고사 시작 (40문항) <span class="desc">실전과 동일하게 한 회차 응시 → 종료 후 주차별 점수 분석</span></button>
      </div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span><span class="setbadge set${q.set}">${q.set}</span> &nbsp;${q.uid}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  answers[cur]={uid:q.uid,set:q.set,correct:i===q.a,picked:i};
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const bySet={};
  answers.forEach(a=>{bySet[a.set]=bySet[a.set]||{r:0,n:0};bySet[a.set].n++;if(a.correct)bySet[a.set].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  const order=["W1","W2","W3","W4"];
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${order.filter(s=>bySet[s]).map(s=>`<div class="row"><span><span class="setbadge set${s}">${s}</span></span><b>${bySet[s].r} / ${bySet[s].n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">${x.q.uid} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,68)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px"><button class="act" onclick="start()">새 회차 응시</button></div>
    </div>`;
}
home();
</script>
