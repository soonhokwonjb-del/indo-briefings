<!DOCTYPE html>
<html lang="ko">
<head>

<title>SPPI Level 7 — 종합 모의고사 (W1~W4)</title>
<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--purple:#5b4a7a;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .setbadge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:99px;letter-spacing:.04em}
  .setW1{background:#eef2f6;color:var(--blue)}.setW2{background:#e7f1ea;color:var(--green)}.setW3{background:#f0ecf5;color:var(--purple)}.setW4{background:#f6e9e6;color:var(--red)}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.topic{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  .mix{display:flex;gap:6px;justify-content:center;margin:10px 0 4px;flex-wrap:wrap}
  .mix span{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>
</head>

    <div class="eyebrow">SPPI Level 7 · Financing Management</div>

<script>
const BANK = [
{uid:"W1-001",set:"W1",tp:"산업사",d:"Hard",q:"Which event directly triggered the strengthening of the SLIK system and debtor/asset data verification infrastructure (Dukcapil, Pefindo, Rapindo) in Indonesia's finance company industry?",o:["The 1997-98 Asian Financial Crisis","The Double Pledge Cases","The 2008-09 Global Financial Crisis","The COVID-19 Pandemic"],a:1,e:"Double Pledge Cases(동일 자산 중복 담보 사기)가 차주·자산 정보 인프라(SLIK·Pefindo·Dukcapil·Rapindo) 강화의 직접 trigger."},
{uid:"W1-002",set:"W1",tp:"산업사",d:"Medium",q:"In which year did KMK 448/2000 first allow finance companies to carry out leasing, factoring, credit card, AND consumer financing activities together?",o:["1974","1991","2000","2018"],a:2,e:"2000년 KMK 448/2000으로 leasing·factoring·credit card·consumer financing 4종 허용. 1974=SKB 3장관(leasing), 1991=KMK 1169."},
{uid:"W1-003",set:"W1",tp:"산업사",d:"Medium",q:"Under which regulation can a finance company carry out financing activities WITHOUT face-to-face interaction?",o:["POJK 35/2018","POJK 46/2024","KMK 448/2000","POJK 10/2019"],a:1,e:"2024년 POJK 46/2024로 비대면(without face-to-face) financing 허용. POJK 35/2018=working capital·investment facility 도입."},
{uid:"W1-004",set:"W1",tp:"산업사",d:"Easy",q:"Per the 6/26 material, which body provides licenses and supervises banking, capital markets, insurance, financing institutions, and crypto assets in Indonesia?",o:["Bank Indonesia (BI)","Otoritas Jasa Keuangan (OJK)","Ministry of Finance","PPATK"],a:1,e:"OJK가 금융 전 부문(은행·자본시장·보험·금융기관·핀테크·디지털자산·크립토)의 licensing·supervision 담당."},
{uid:"W1-005",set:"W1",tp:"통계",d:"Hard",q:"As of April 2026, what is the number of finance companies based on business activity focus shown in the material?",o:["154","147","145","144"],a:3,e:"Apr-2026 기준 144개사. 2013년 202개에서 지속 감소(consolidation). 직전판 대비 갱신된 수치."},
{uid:"W1-006",set:"W1",tp:"통계",d:"Hard",q:"In the April 2026 industry ratio table, what is the FAR (Financing to Asset Ratio)?",o:["85.48%","85.74%","86.01%","86.70%"],a:3,e:"Apr-26 FAR=86.70% (YoY +0.96%). Roadmap 목표 FAR 85~90% 구간 내. 직전판(85.48%)에서 상향."},
{uid:"W1-007",set:"W1",tp:"통계",d:"Hard",q:"In the April 2026 industry ratio table, what is the MSMD (Modal Sendiri/Modal Disetor, Core Capital to Paid-up Capital) ratio?",o:["319.77%","320.23%","328.37%","332.39%"],a:2,e:"Apr-26 MSMD=328.37% (YoY -4.03%). MSMD=Core Capital/Paid-up Capital이며 최소 ≥50% 규정. (320·332는 다른 기간치)"},
{uid:"W1-008",set:"W1",tp:"통계",d:"Medium",q:"In the April 2026 ratios, what is the industry NPF Gross?",o:["2.43%","2.51%","2.70%","2.89%"],a:3,e:"Apr-26 NPF Gross=2.89% (YoY +0.46%), NPF Netto=0.78%. 직전판 대비 소폭 상승."},
{uid:"W1-009",set:"W1",tp:"통계",d:"Medium",q:"In the composition of financing as of the 6/26 material, what share is Consumer Goods financing?",o:["25%","69%","42.1%","3.85%"],a:1,e:"Consumer Goods 69%, Productive Goods 25%, Services 3.85%, Accounts Receivable 2.43%, Infrastructure 0.30%."},
{uid:"W1-010",set:"W1",tp:"통계",d:"Medium",q:"Within PRODUCTIVE goods financing composition, which two categories are the largest?",o:["Machinery and Buildings","Transportation Vehicles and Heavy Equipment","Ships & Aircraft and Medical Equipment","Houses & Apartments and Office Equipment"],a:1,e:"Productive: Transportation Vehicles 42.1% + Heavy Equipment 34.8%가 압도적. (Consumer 측은 New 4-Wheels 39.3% 최대)"},
{uid:"W1-011",set:"W1",tp:"통계",d:"Easy",q:"According to GAIKINDO in the 6/26 material, car sales in 2026 are predicted to reach approximately how many units?",o:["650 thousand","850 thousand","1.05 million","6.4 million"],a:1,e:"GAIKINDO 2026 자동차 예측 850천 대. (6.4~6.7백만은 AISI 오토바이 예측치) May-26 실적 359,015대."},
{uid:"W1-012",set:"W1",tp:"통계",d:"Medium",q:"Per AISI in the 6/26 material, national motorcycle sales in 2026 are predicted to reach what range?",o:["2.8 – 3.0 million","4.3 – 5.0 million","6.4 – 6.7 million","7.8 – 8.0 million"],a:2,e:"AISI 2026 오토바이 예측 6.4~6.7백만 대. May-26 실적 2,881,203대."},
{uid:"W1-013",set:"W1",tp:"규제프레임",d:"Hard",q:"In the Finance Company Regulation Framework, which regulation governs Fit & Proper (Reassessment)?",o:["POJK 12/2017","POJK 8/2023","POJK 34/2018","POJK 43/2024"],a:2,e:"F&P Reassessment=POJK 34/2018. (POJK 12/2017=과거 자료에서 RBA/AML 맥락, 8/2023=AML 신규, 43/2024=HR)"},
{uid:"W1-014",set:"W1",tp:"규제프레임",d:"Hard",q:"Which regulation is the basis for AML/CFT (APU-PPT) in the current framework?",o:["POJK 12/2017","POJK 8/2023","POJK 23/2019","POJK 28/2024"],a:1,e:"현행 AML/CFT=POJK 8/2023 (12/2017→23/2019 개정→8/2023 대체). 8/2023이 RBA 기반 APU-PPT 규정."},
{uid:"W1-015",set:"W1",tp:"규제프레임",d:"Medium",q:"Which umbrella law (UU) sits at the center of the Finance Company Regulation Framework (P2SK Law)?",o:["UU No.4/2023","UU No.21/2011","UU No.40/2007","UU No.8/1995"],a:0,e:"UU No.4/2023 (P2SK, 금융부문 개발·강화법)이 finance company 규제 프레임의 중심 우산법."},
{uid:"W1-016",set:"W1",tp:"규제프레임",d:"Medium",q:"Per the Other Regulations slide, which POJK now governs Human Resources Development?",o:["POJK 43/2024","POJK 43/2025","POJK 47/2020","POJK 35/2018"],a:0,e:"HR Development=POJK 43/2024 (2024년 제정). 신규교재 전 슬라이드가 43/2024로 명시 — 43/2025는 오류."},
{uid:"W1-017",set:"W1",tp:"사업영역",d:"Hard",q:"Which financing type is MANDATORY face-to-face physically and cannot be done without it (except limited micro/ultra-micro cases)?",o:["Working Capital Financing","Multipurpose Financing","Investment Financing","Other Activities"],a:2,e:"Investment Financing은 mandatory face-to-face. 예외: Micro/Ultra Micro & max 10B & 비대면 receivable ≤5%. (Working/Multipurpose는 비대면 가능)"},
{uid:"W1-018",set:"W1",tp:"사업영역",d:"Hard",q:"Investment financing may be conducted WITHOUT face-to-face physically only if the debtor is Micro/Ultra Micro, financing is max Rp10 billion, AND the non-face-to-face receivables meet what cap?",o:["max 5% of total","max 10% of total","max 25% of total","max 50% of total"],a:0,e:"비대면 Investment financing 조건: Micro/Ultra Micro + max 10B + 비대면 receivable ≤ 5% of total."},
{uid:"W1-019",set:"W1",tp:"사업영역",d:"Hard",q:"To carry out OTHER Financing Business Activities, a finance company must have Core Capital of at least:",o:["Rp100 billion","Rp200 billion","Rp250 billion","Rp1 trillion"],a:1,e:"Other Financing Business: Core Capital ≥ Rp200B + Composite Rating ≥2 + gearing ratio 충족 + OJK 제재 없음 + 사업계획 포함. (Infrastructure는 1조)"},
{uid:"W1-020",set:"W1",tp:"사업영역",d:"Hard",q:"For the Business Capital Facility (FMU), what is the maximum financing value per debtor?",o:["Rp100 million","Rp500 million","Rp10 billion","Rp200 billion"],a:2,e:"FMU(Business Capital Facility) per debtor max Rp10B. Fund Facility(FD) per debtor max Rp500M. 무담보 예외 FMU max Rp100M."},
{uid:"W1-021",set:"W1",tp:"사업영역",d:"Hard",q:"For the Fund Facility (FD), what is the maximum financing value per debtor?",o:["Rp100 million","Rp500 million","Rp10 billion","Rp1 trillion"],a:1,e:"FD per debtor max Rp500M. 다목적 financing receivables through FD는 총 financing receivables의 max 25%."},
{uid:"W1-022",set:"W1",tp:"사업영역",d:"Medium",q:"For FMU/FD activities, the maximum NPF Net allowed is:",o:["1%","2.5%","5%","10%"],a:2,e:"FMU/FD 요건: Composite Rating 2 + 자본비율 충족 + gearing 충족 + NPF Net max 5% + Core/Paid-up ≥50%."},
{uid:"W1-023",set:"W1",tp:"사업영역",d:"Hard",q:"Under the collateral exemption for FMU/FD (UMKM debtors), it applies for a finance company whose Core Capital to Paid-up Capital ratio is:",o:["more than 50%","more than 100%","more than 150%","at least 25%"],a:1,e:"담보면제: Core/Paid-up > 100%인 회사가 UMKM 차주에 누적 max Rp100M/차주, 보험 위험전가, 담보사용 receivable ≤10% 조건."},
{uid:"W1-024",set:"W1",tp:"사업영역",d:"Medium",q:"Multipurpose financing receivables provided through Fund Facilities are capped at what share of total financing receivables?",o:["10%","25%","50%","5%"],a:1,e:"Fund Facility 통한 multipurpose financing receivables는 총 financing receivables의 max 25%."},
{uid:"W1-025",set:"W1",tp:"사업영역",d:"Medium",q:"For Digital Financing, the IT-function employees referred to must have experience and expertise of at least how many years in the IT field?",o:["1 year","2 years","3 years","5 years"],a:2,e:"Digital financing: IT 시스템 담당 직원은 IT 분야 경력·전문성 ≥3년. 또 IT 담당 1 Director + 1단계 하위 officer는 IT 역량인증 보유."},
{uid:"W1-026",set:"W1",tp:"사업영역",d:"Medium",q:"To conduct Digital Financing activities, a finance company must obtain what before starting, and have an information security management certificate within how long after?",o:["OJK approval; within 6 months","Bank Indonesia license; within 3 months","No approval; within 1 year","Ministry approval; within 12 months"],a:0,e:"디지털 financing은 OJK 승인 필요, OJK 승인 후 max 6개월 내 정보보안 관리 인증 취득(ps.19D)."},
{uid:"W1-027",set:"W1",tp:"금융기법",d:"Hard",q:"During a Finance Lease agreement, ownership of the leased goods belongs to whom, and the finance company is required to do what?",o:["The lessee; register it with KSEI","The finance company; attach a plate or label to the leased goods","The supplier; insure the goods","The lessee; obtain OJK approval"],a:1,e:"Finance Lease 기간 중 소유권은 Finance Company. 회사는 leased goods에 plate/label 부착 의무. 차주는 재임대 금지."},
{uid:"W1-028",set:"W1",tp:"금융기법",d:"Medium",q:"Sale and Leaseback (SLB) is used in which financing types?",o:["Investment & multipurpose financing","Investment & working capital financing","Working capital & multipurpose financing","Only investment financing"],a:1,e:"SLB=investment & working capital financing. (Finance Lease=investment & multipurpose financing)"},
{uid:"W1-029",set:"W1",tp:"금융기법",d:"Hard",q:"In Factoring WITHOUT recourse, who bears the risk of non-collection of the receivables?",o:["The receivable seller (client)","The customer","The Finance Company","Split proportionally"],a:2,e:"Without recourse=Finance Company가 미회수 위험 부담. With recourse=receivable seller가 위험 부담."},
{uid:"W1-030",set:"W1",tp:"금융기법",d:"Medium",q:"Factoring is used in which financing types?",o:["Investment & working capital financing","Investment & multipurpose financing","Multipurpose financing only","Working capital & multipurpose"],a:0,e:"Factoring=investment financing + working capital financing에 사용."},
{uid:"W1-031",set:"W1",tp:"금융기법",d:"Medium",q:"Purchase with Installment Payments (PPSA) is used in which financing types?",o:["Investment financing only","Investment & working capital","Investment, working capital, and multipurpose financing","Multipurpose only"],a:2,e:"PPSA=investment + working capital + multipurpose 3종 모두 사용. 소유권은 공급자→차주로 이전."},
{uid:"W1-032",set:"W1",tp:"금융기법",d:"Hard",q:"To conduct Infrastructure Financing, a finance company must have core capital of at least:",o:["Rp200 billion","Rp500 billion","Rp1 trillion","Rp250 billion"],a:2,e:"Infrastructure Financing: core capital ≥ IDR 1조 + Composite Rating ≥2 + SOP 보유 + 사업계획 포함 + 제재 없음. (Project/Infra는 investment financing에 사용)"},
{uid:"W1-033",set:"W1",tp:"금융기법",d:"Hard",q:"Under POJK 46/2024 receivable restructuring policy, restructuring is PROHIBITED if it is intended to:",o:["help a debtor in good business prospect","improve the quality of receivables or avoid impairment provisioning","reduce the principal amount","extend the tenor"],a:1,e:"Restructuring 금지 사유: receivable 품질 개선 목적 or 손상충당금(impairment) 증가 회피 목적. 정당 사유=차주 상환난+사업전망 양호."},
{uid:"W1-034",set:"W1",tp:"금융기법",d:"Medium",q:"Per the restructuring policy, the decision to restructure receivables must be made by:",o:["the same party that approved the original financing","a party higher in authority than the one who approved the original financing","the Board of Commissioners only","OJK"],a:1,e:"Restructuring 결정은 원 financing 승인자보다 상위 권한자가. 최고권한자가 원 승인했으면 → 이사회 결의로."},
{uid:"W1-035",set:"W1",tp:"금융기법",d:"Hard",q:"The maximum incentive (financing acquisition cost) to a third party is what percent of the total income of each financing agreement?",o:["10%","15%","17.5%","25%"],a:2,e:"3자 인센티브 max 17.5% of total income/agreement. Income=Interest income before Cost of Fund, Insurance discount, Admin income & Provision income."},
{uid:"W1-036",set:"W1",tp:"금융기법",d:"Hard",q:"Under BMPP (Maximum Financing Limit), the limit for one group of obligors who do NOT have a direct relationship is:",o:["max 20%","max 50%","max 10%","max 25%"],a:1,e:"BMPP: one obligor max 20%, one group of obligor max 50%. 지배관계 보유자 max 50% of equity."},
{uid:"W1-037",set:"W1",tp:"금융기법",d:"Medium",q:"If a BMPP breach occurs (e.g., capital decrease, FX/fair-value change, merger), the finance company must adjust and submit an action plan within:",o:["1 month","3 months","6 months","1 year"],a:0,e:"BMPP 초과 시 max 1개월 내 조정 + action plan 제출. BMPP 자본 기준=직전 월간보고 자본."},
{uid:"W1-038",set:"W1",tp:"금융기법",d:"Medium",q:"Under POJK 46/2024 Chapter VII (Financing Risk Mitigation), finance companies are prohibited from:",o:["using fiduciary mechanisms","insuring or guaranteeing problematic financing receivables","using credit insurance","transferring risk via insurance"],a:1,e:"문제성(problematic) financing receivable의 보험·보증 금지. 또 보험금을 보험료의 일정%로 제한하는 메커니즘도 금지."},
{uid:"W1-039",set:"W1",tp:"기타조항",d:"Hard",q:"Per POJK 35/2018 / 46/2024, the minimum Core Capital required for a finance company is:",o:["Rp100 billion","Rp200 billion","Rp250 billion","Rp1 trillion"],a:0,e:"Core Capital ≥ IDR 100B (Article 87). Tier2 보완자본은 Core Capital의 max 100%. Core/Paid-up ≥50%."},
{uid:"W1-040",set:"W1",tp:"기타조항",d:"Medium",q:"Capital for a finance company consists of Core Capital (Tier 1) and Supplementary Capital (Tier 2), where Tier 2 is calculated at a maximum of:",o:["50% of Core Capital","100% of Core Capital","25% of Core Capital","150% of Core Capital"],a:1,e:"Tier 2 보완자본=Core Capital의 max 100%. Core/Paid-up ratio ≥50% 별도 요건."},
{uid:"W1-041",set:"W1",tp:"기타조항",d:"Hard",q:"For securities issuance THROUGH a public offering, the finance company must report the plan no later than how long before the GMS approving it, and meet what gearing cap?",o:["3 months; gearing max 10x","6 months; gearing max 10x","1 month; gearing max 5x","6 months; gearing max 5x"],a:0,e:"공모 통한 증권발행: GMS 승인 ≥3개월 전 보고, gearing max 10x. (비공모는 발행 ≥6개월 전 보고, equity ≥200B)"},
{uid:"W1-042",set:"W1",tp:"기타조항",d:"Hard",q:"For securities issuance NOT through a public offering, the finance company must have equity of at least:",o:["Rp100 billion","Rp200 billion","Rp250 billion","Rp1 trillion"],a:1,e:"비공모 증권발행: equity ≥ Rp200B + 사업계획 포함 + 건전성 충족 + mid-low risk + gearing max 10x. 발행 ≥6개월 전 보고."},
{uid:"W1-043",set:"W1",tp:"기타조항",d:"Medium",q:"Under Equity Participation (POJK 7/2022), the maximum direct participation is what percent of the finance company's equity, and within one group?",o:["20% total; 10% per group","10% total; 20% per group","50% total; 20% per group","20% total; 5% per group"],a:0,e:"Equity participation: 총 max 20% of equity, 1개 그룹 내 직접 참여 max 10% of equity. 금융서비스/관련 회사에만."},
{uid:"W1-044",set:"W1",tp:"기타조항",d:"Hard",q:"In A/R collectability, the 'Doubtful' category corresponds to which overdue range, and what provision rate?",o:["O/D 91-120; 15%","O/D 121-180; 50%","O/D >180; 100%","O/D 11-90; 5%"],a:1,e:"Doubtful=O/D 121-180일, 충당 50%(of O/S minus collateral). Bad Debt >180=100%, Non-Current 91-120=15%, Special Mention 11-90=5%, Current ≤10=1%."},
{uid:"W1-045",set:"W1",tp:"기타조항",d:"Hard",q:"For debtors with A/R financing above what threshold can A/R quality be evaluated by considering capability to pay, financial performance, and business prospect?",o:["Rp1 billion","Rp5 billion","Rp10 billion","Rp500 million"],a:1,e:"A/R financing > Rp5B 차주는 상환능력·재무성과·사업전망 고려해 A/R 품질 평가 가능."},
{uid:"W1-046",set:"W1",tp:"비율",d:"Hard",q:"In the 'Other Terms' summary, the gearing ratio provision is set at the lowest 0 (zero) times and the highest:",o:["5 times","8 times","10 times","20 times"],a:2,e:"Gearing ratio: 최저 0배 ~ 최고 10배. FAR ≥50%, Core Capital ≥100B, Core/Paid-up ≥50%, Capital Ratio ≥10%."},
{uid:"W1-047",set:"W1",tp:"비율",d:"Medium",q:"The Finance to Asset Ratio (FAR) regulatory minimum and the minimum Capital Ratio are respectively:",o:["50% and 10%","10% and 50%","50% and 5%","25% and 10%"],a:0,e:"FAR 최소 50% (financing receivables net/total assets). Capital Ratio 최소 10% (capital adjusted/assets adjusted)."},
{uid:"W1-048",set:"W1",tp:"비율",d:"Medium",q:"The ratio of Investment + Working Capital financing receivables to total receivables (before allowance) must be at minimum:",o:["5%","10%","25%","50%"],a:1,e:"Investment+Working Capital receivables / 총 receivables(충당 전) ≥ 10%. Fiduciary 등록은 계약일로부터 1개월 내."},
{uid:"W1-049",set:"W1",tp:"기타조항",d:"Hard",q:"Among the listed PROHIBITIONS (POJK 35/2018; 46/2024), which is prohibited for a finance company?",o:["Issuing bonds through public offering","Collecting funds directly from the public (current accounts, savings, deposits)","Conducting finance leases","Charging interest on financing"],a:1,e:"금지: 공중으로부터 직접 자금수취(예금·적금 등), 타인 채무보증, 질권법 기반 담보대출, 불공정 receivable 매각, 불만처리 수수료 부과, promissory note 발행(채권은행 담보 예외) 등."},
{uid:"W1-050",set:"W1",tp:"기타조항",d:"Medium",q:"Per POJK 46/2024 enforcement, the types of administrative sanctions escalate as:",o:["Fine → Warning → License revocation","Warning Letter (3x) → Suspension of business → Revocation of business license","Suspension → Fine → Warning","Revocation → Warning → Suspension"],a:1,e:"제재 단계: 경고장(3회) → 영업정지 → 영업면허 취소. 유형: 서면경고, 활동동결/제한, risk등급 하향, 동의취소, 임원 금지, 과징금 등."},
{uid:"W1-051",set:"W1",tp:"Sharia",d:"Medium",q:"Under Sharia financing, which scheme belongs to 'Buy and Sell Financing'?",o:["Mudharabah","Murabahah","Ijarah","Musyarakah"],a:1,e:"Buy&Sell: Murabahah·Salam·Istishna'. Investment: Mudharabah·Musyarakah 등. Service: Ijarah·Qardh 등."},
{uid:"W1-052",set:"W1",tp:"Sharia",d:"Hard",q:"For a Sharia finance company, when must the company report to OJK after deciding to STOP using a business activities contract instructed by OJK?",o:["within 7 work days","within 15 work days","within 30 days","within 1 month"],a:1,e:"OJK 지시로 계약 사용 중단 시 max 15 work days 내 OJK 보고. 사유 소멸 시 재사용(re-enforcement) 신청 가능."},
{uid:"W1-053",set:"W1",tp:"Sharia",d:"Medium",q:"Which is one of the listed Sharia Principles a company must fulfill?",o:["Maximizing shareholder value","Fairness ('adl), Balance (tawazun), Benefit (maslahah), Universalism","Profit before all","Leverage optimization"],a:1,e:"Sharia 원칙: 'adl(공정)·tawazun(균형)·maslahah(편익)·universalism + gharar·maysir·riba·zhulm·risywah·haram 불포함."},
{uid:"W1-054",set:"W1",tp:"Sharia",d:"Medium",q:"For UUS (Sharia Business Unit) separation (spin-off), the trigger is: UUS capital reaches at least Rp100 billion AND UUS assets reach at least:",o:["25% of total assets","50% of total assets","Rp250 billion","75% of total assets"],a:1,e:"UUS 분리(separation): UUS 자본 ≥Rp100B AND UUS 자산 ≥50% of total assets. UUS 설립 시 운영자본 ≥Rp100B + UUS 담당 director."},
{uid:"W1-055",set:"W1",tp:"Sharia",d:"Medium",q:"The Sharia Supervisory Board (DPS) must consist of at least how many Sharia experts, elected by GMS and recommended by DSN MUI?",o:["1","2","3","at least 50% of board"],a:0,e:"DPS 최소 1인 Sharia 전문가, GMS 선임 + DSN MUI 추천. 인도네시아 거주 필수."},
{uid:"W1-056",set:"W1",tp:"Sharia",d:"Hard",q:"A Sharia Supervisory Board member is prohibited from holding the position of DPS in more than how many institutions (for finance companies other than LKM)?",o:["1","2","3","5"],a:2,e:"DPS는 LKM 외 finance company에서 max 3개 기관까지 DPS 겸직 가능(그 초과 금지). Director 겸직: BoC max 2개 기관."},
{uid:"W1-057",set:"W1",tp:"GCG",d:"Hard",q:"Per POJK 48/2024, the 5 Principles of GCG (T-A-R-I-F) are:",o:["Trust, Accuracy, Reliability, Integrity, Fairness","Transparency, Accountability, Responsibility, Independency, Fairness","Transparency, Audit, Risk, Internal control, Fairness","Truth, Accountability, Responsibility, Independence, Fidelity"],a:1,e:"T-A-R-I-F: Transparency·Accountability·Responsibility·Independency·Fairness (POJK 48/2024)."},
{uid:"W1-058",set:"W1",tp:"GCG",d:"Medium",q:"Per POJK 48/2024, which GCG principle means 'managed in a professional manner and free from conflict of interest and pressure from any party'?",o:["Transparency","Accountability","Independency","Responsibility"],a:2,e:"Independency=전문적 운영 + 이해상충·외부 압력으로부터 자유. Responsibility=법규·윤리 준수 및 건전 영업관행."},
{uid:"W1-059",set:"W1",tp:"GCG",d:"Hard",q:"A finance company with assets above Rp250 billion must have a minimum of how many Directors, with at least 50% being Indonesian?",o:["2 Directors","3 Directors","4 Directors","1 Director"],a:1,e:"자산 >Rp250B: Director 최소 3인 (min 50% 인도네시아 국적). 전원 인도네시아 거주."},
{uid:"W1-060",set:"W1",tp:"GCG",d:"Hard",q:"A finance company with assets above Rp250 billion must have a minimum of how many Commissioners, including an Independent Commissioner?",o:["1","2","3","4"],a:1,e:"자산 >Rp250B: Commissioner 최소 2인(독립 commissioner 포함). 최소 1인 인도네시아 거주, 과거 6개월 내 동사 Director 경력 없을 것."},
{uid:"W1-061",set:"W1",tp:"GCG",d:"Medium",q:"For a finance company above Rp250 billion, which committees must be established, headed by the Independent Commissioner?",o:["Only Audit Committee","Audit, Risk Monitoring, and Remuneration & Nomination Committees","Only Risk Monitoring Committee","Sharia Supervisory and Audit Committees"],a:1,e:"자산 >Rp250B: Audit + Risk Monitoring + Remuneration & Nomination 위원회 설치, 독립 commissioner가 위원장."},
{uid:"W1-062",set:"W1",tp:"GCG",d:"Medium",q:"Per the GCG meeting requirements, the BOC meeting frequency and minimum attendance are:",o:["1x/month, 50%","4x/year, 75%","2x/year, 50%","1x/year, 100%"],a:1,e:"BOC 회의 4회/년(출석 75%). Director 회의 1회/월(출석 50%). GMS 1회/년. MoM은 반대의견(dissenting) 포함 + 전 관계자 배포."},
{uid:"W1-063",set:"W1",tp:"GCG",d:"Hard",q:"Members of the Director are prohibited from holding a concurrent position as a member of the BOC in more than how many institutions?",o:["1","2","3","unlimited"],a:1,e:"Director는 타 기관 BoC를 max 2개 기관까지(초과 금지). 동사 DPS 겸직, 타 기관 director/EO 겸직 등도 금지."},
{uid:"W1-064",set:"W1",tp:"GCG",d:"Medium",q:"The Director in charge of the COMPLIANCE function cannot concurrently be in charge of which functions (except the President Director)?",o:["HR and IT functions","Financing/credit, marketing, and financial functions","Risk and audit functions","Legal and treasury functions"],a:1,e:"Compliance 담당 Director는 financing/credit·marketing·financial 기능 겸직 불가(President Director 예외)."},
{uid:"W1-065",set:"W1",tp:"GCG",d:"Medium",q:"Directors and Commissioners must disclose share ownership reaching what threshold, and financial/family relationships with others?",o:["1% or more","5% or more","10% or more","25% or more"],a:1,e:"임원 투명성: 5% 이상 지분 보유 + 타 Director/DPS/주주·사업그룹과의 재무·가족 관계 공시 의무."},
{uid:"W1-066",set:"W1",tp:"GCG",d:"Hard",q:"Which is a required qualification for an Independent Commissioner?",o:["Owns at least 5% shares","Has no affiliate relations with Directors/BOC/DPS/shareholders, is an Indonesian citizen, and resides in Indonesia","Must have been a Director of the same company","Must be a foreign expert"],a:1,e:"독립 commissioner: 동사 임원·주주와 무관계, 과거 6개월 내 동사/계열 임원 경력 없음, multi-finance 법규 이해, 인도네시아 국적·거주."},
{uid:"W1-067",set:"W1",tp:"GCG",d:"Medium",q:"The Audit Committee must have at least 1 independent member with expertise in which fields, and is headed by:",o:["IT or risk; the President Director","audit, finance or accounting; the Independent Commissioner","legal; the CEO","marketing; the BOC chair"],a:1,e:"Audit Committee: 독립위원장(Independent Commissioner) + 최소 1인 독립위원(audit/finance/accounting 전문성)."},
{uid:"W1-068",set:"W1",tp:"GCG",d:"Medium",q:"The GCG self-assessment report (part of institutional soundness self-assessment, POJK 28/2020) must be reported to OJK no later than:",o:["31 January","15 February of the next year","30 April","31 March"],a:1,e:"GCG 자가평가 보고서는 익년 2월 15일까지 OJK 제출(POJK 28/2020). (Sustainability report=4월 30일, SIPELAKU/AFS=1월 31일)"},
{uid:"W1-069",set:"W1",tp:"GCG",d:"Hard",q:"Per POJK 42/2025 (Integrity of Financial Report), the responsibility commitment of Directors must be stated in:",o:["a verbal declaration at GMS","a statement letter with stamp duty signed by the Directors","an OJK form","the annual report only"],a:1,e:"POJK 42/2025: 재무보고 무결성 책임은 인지세(stamp duty) 첨부 + Director 서명 진술서로 명시."},
{uid:"W1-070",set:"W1",tp:"GCG",d:"Medium",q:"Per POJK 47/2020, a finance company must budget and realize for HR development and training at least what percent of Personnel/Employee Expenses?",o:["1% of net income","2.5% of Personnel Expenses","5% of total assets","2.5% of net income"],a:1,e:"HR 교육·훈련 예산 ≥2.5% of Personnel Expenses(=employee expenses). 'net income' 아님 — 신규교재 확정. (POJK 43/2024도 동일 2.5% employee expenses)"},
{uid:"W1-071",set:"W1",tp:"GCG",d:"Hard",q:"Per POJK 47/2020, the maximum foreign ownership of a finance company (directly or indirectly) is:",o:["49% of paid-in capital","85% of paid-in capital","100% of paid-in capital","51% of paid-in capital"],a:1,e:"외국인 지분 max 85% of paid-in capital. 설립 시 paid-in capital ≥Rp250B, 지배주주 1인 이상 + beneficial owner 지정."},
{uid:"W1-072",set:"W1",tp:"GCG",d:"Medium",q:"A controlling shareholder in the form of a legal entity must have been operating for at least how long before investing in the company?",o:["1 year","2 years","3 years","5 years"],a:1,e:"법인 지배주주는 투자 전 최소 2년 영업 경력. 법인 주주 투자액은 그 주주 자기자본 한도 내."},
{uid:"W1-073",set:"W1",tp:"GCG",d:"Hard",q:"Per POJK 47/2020, a finance company where 25% or more shares are foreign-owned may employ foreign employees ONLY as:",o:["any position","Directors, BOC, experts, or consultants","Branch managers and tellers","Collection agents"],a:1,e:"외국인 직원은 Director·BoC·expert·consultant로만 고용 가능. expert/consultant는 IT·risk management·OJK 승인 기능에 한정. 고용기간 max 3년(1회 1년 연장)."},
{uid:"W1-074",set:"W1",tp:"리스크",d:"Hard",q:"How many risk types are assessed in the NBFI individual health assessment (POJK 28/2020), and in how many groups?",o:["6 risks in 2 groups","8 risks in 3 groups","10 risks in 4 groups","5 risks in 1 group"],a:1,e:"8대 리스크 / 3그룹: Business(Strategic) / Financial(Credit·Market·Operational·Liquidity) / Governance(Compliance·Legal·Reputation)."},
{uid:"W1-075",set:"W1",tp:"리스크",d:"Hard",q:"Per PADK 48/2025, which risk is defined as arising from 'the failure of other parties in fulfilling their obligations to the company'?",o:["Market Risk","Credit Risk","Liquidity Risk","Operational Risk"],a:1,e:"Credit Risk=상대방의 의무 불이행에서 발생(차주 부실, 신용집중, counterparty, settlement risk 포함)."},
{uid:"W1-076",set:"W1",tp:"리스크",d:"Medium",q:"Per PADK 48/2025, Strategy Risk is caused by:",o:["lawsuits and legal weakness","inaccuracy in making/implementing strategic decisions and failure to anticipate business environment changes","disobeying regulations","negative news exposure"],a:1,e:"Strategy Risk=전략적 의사결정 부정확 + 사업환경 변화 예측 실패. Legal Risk=소송·법적 약점, Compliance Risk=규제 미준수, Reputation Risk=부정적 평판."},
{uid:"W1-077",set:"W1",tp:"리스크",d:"Medium",q:"Per the NBFI health assessment, the four assessed factors are GCG, Risk Profile, Profitability, and:",o:["Liquidity","Capital","Marketing","Governance"],a:1,e:"4대 평가요인: GCG · Risk Profile · Profitability · Capital. (Risk Profile = inherent risk + KPMR 품질)"},
{uid:"W1-078",set:"W1",tp:"리스크",d:"Hard",q:"In the NBFI composite rating, which rating means 'HEALTHY — capable of withstanding significant negative impacts'?",o:["Composite Rating-1","Composite Rating-2","Composite Rating-3","Composite Rating-4"],a:1,e:"CR-1 Very Healthy, CR-2 Healthy, CR-3 Fairly Healthy, CR-4 Less Healthy, CR-5 Unhealthy."},
{uid:"W1-079",set:"W1",tp:"리스크",d:"Hard",q:"Per PADK 48/2025, a finance company with assets of more than Rp250 billion must form which risk management structure?",o:["Only a Risk Management Function","A Risk Management Committee AND a Risk Management Work Unit","Only a Risk Management Work Unit","An external risk consultant"],a:1,e:"자산 >Rp250B: Risk Management Committee(비구조적) + Risk Management Work Unit 둘 다. 자산 <Rp250B: Risk Management Function만."},
{uid:"W1-080",set:"W1",tp:"리스크",d:"Medium",q:"Per POJK 4/2021, an NBFI with total assets of more than what amount is required to have an Information Technology Steering Committee?",o:["Rp250 billion","Rp500 billion","Rp1 trillion","Rp5 trillion"],a:2,e:"IT Steering Committee: 총자산 >IDR 1조 NBFI. (MRTI=IT risk management 의무는 전체 NBFI)"},
{uid:"W1-081",set:"W1",tp:"리스크",d:"Hard",q:"Per POJK 4/2021, an NBFI with total assets of more than Rp1 trillion and/or majority IT-based operations must have:",o:["only a data center","a data center AND a disaster recovery center","only periodic data backup","an external cloud provider"],a:1,e:">Rp1조/IT 주력: data center + disaster recovery center 둘 다. 500B~1조: data center + 백업. ≤500B: 정기 백업."},
{uid:"W1-082",set:"W1",tp:"리스크",d:"Medium",q:"In Risk Management Policy, what is the definition of 'Risk Tolerance'?",o:["the level and type of risk that can be undertaken","the potential loss that can be absorbed by the capital of NBFI","the maximum financing per debtor","the inherent risk score"],a:1,e:"Risk Tolerance=NBFI 자본이 흡수 가능한 잠재손실. Risk Appetite=목표 달성 위해 감수 가능한 risk 수준·유형."},
{uid:"W1-083",set:"W1",tp:"리스크",d:"Medium",q:"The Risk Management Work Unit is authorized to monitor risk positions and conduct testing using:",o:["only historical data","scenario assumptions of abnormal conditions AND historical data","only normal conditions","external auditor data only"],a:1,e:"Risk Management Work Unit: 전체/유형별/기능별 risk position 모니터링 + 비정상조건 시나리오 가정 및 historical data 테스트."},
{uid:"W1-084",set:"W1",tp:"리스크",d:"Hard",q:"In the COSO internal control framework's '3 Lines of Defense', the 3rd line is:",o:["Management Controls","Risk Management & Compliance","Internal Audit","Internal Control Measures"],a:2,e:"1선=Management Controls/Internal Control Measures, 2선=Financial Control·Risk Mgmt·Compliance 등, 3선=Internal Audit."},
{uid:"W1-085",set:"W1",tp:"소비자보호",d:"Hard",q:"How many principles of consumer protection are listed under POJK 22/2023?",o:["5","6","7","8"],a:2,e:"7대 소비자보호 원칙(POJK 22/2023): 적절한 교육, 투명성, 공정대우·책임, 데이터 보호·프라이버시, 효과적 불만·분쟁해결, 준법집행, 건전경쟁."},
{uid:"W1-086",set:"W1",tp:"소비자보호",d:"Hard",q:"Per POJK 22/2023 Article 62, collection activities to consumers are allowed during which hours (Monday-Saturday, excluding national holidays)?",o:["07:00 – 19:00","08:00 – 20:00","09:00 – 21:00","06:00 – 18:00"],a:1,e:"추심 가능: 월~토(공휴일 제외) 08:00~20:00 현지시각, 차주 거소·도메사일에서. 시간·장소 외 추심은 사전 동의 필요. 위협·폭력·모욕 금지."},
{uid:"W1-087",set:"W1",tp:"소비자보호",d:"Medium",q:"Per POJK 22/2023 Article 64, repossession of collateral requires the consumer be proven in default, have received a warning letter, AND the finance company have:",o:["OJK approval","a fiduciary guarantee certificate / mortgage certificate","a court order only","a police report"],a:1,e:"담보 repossession 요건: 채무불이행 입증 + 경고장 발송 + fiduciary 보증서/저당권 증서 보유. 채무불이행 입증=서면 자발적 인도 합의/법원·LAPS 결정 등."},
{uid:"W1-088",set:"W1",tp:"소비자보호",d:"Medium",q:"Per POJK 22/2023 Article 51, the pause period (cooling-off) for products/services that are long-term and/or complex is at least:",o:["1 working day","2 working days","7 working days","14 working days"],a:1,e:"Pause period(숙려기간): 장기·복합 상품에 대해 합의 후 최소 2 working days."},
{uid:"W1-089",set:"W1",tp:"소비자보호",d:"Hard",q:"Per POJK 37/2025, RIPLAY (Summary of Product/Service Information) is delivered in which versions, and the Personal version is given when?",o:["Only General; at any time","General and Personal; Personal before the consumer signs the agreement","Only Personal; after signing","Standard and Premium; before marketing"],a:1,e:"RIPLAY: General(공식 매체로 결정 전 제공) + Personal(계약 서명 전 제공). 8개 정보 항목 포함."},
{uid:"W1-090",set:"W1",tp:"소비자보호",d:"Hard",q:"Per POJK 38/2025, OJK lawsuits for consumer protection are filed on what basis?",o:["class action lawsuits","on behalf of the institution (institutional legal standing), not class action","individual consumer petitions","arbitration only"],a:1,e:"POJK 38/2025: OJK는 기관 명의(institutional legal standing)로 제소, class action 아님. 소비자는 비용 부담 없음."},
{uid:"W1-091",set:"W1",tp:"OtherRegs",d:"Hard",q:"Per POJK 43/2024, which is among the CERTIFICATION OBLIGATIONS?",o:["Only the President Director needs a certificate","Directors, Commissioners, risk management officials, branch-head-level managers, and collection/execution personnel need sector certificates","Only collection agents need certificates","No certification is required"],a:1,e:"POJK 43/2024 인증의무: Directors·Commissioners(financing), risk mgmt director+1단계 하위(risk), 지점장~Director 1단계 하위 관리직(financing), 추심·담보집행 인력(collection)."},
{uid:"W1-092",set:"W1",tp:"OtherRegs",d:"Medium",q:"Per POJK 43/2024, the Director who oversees the HR quality management & development function must be:",o:["a foreign expert","an Indonesian citizen","an Independent Commissioner","the compliance director"],a:1,e:"POJK 43/2024: HR 품질관리·개발 기능 담당 Director는 인도네시아 국적 필수. HR 교육예산 ≥2.5% of total employee expenses."},
{uid:"W1-093",set:"W1",tp:"OtherRegs",d:"Hard",q:"Per POJK 8/2023, under the Risk-Based Approach (RBA), 'High Risk' customers require what, and 'Low Risk' may allow what?",o:["Simplified measures; enhanced measures","Enhanced measures to manage/mitigate; simplified measures may be permitted","No action; full review","Account closure; standard review"],a:1,e:"RBA(POJK 8/2023): High Risk→enhanced measures, Low Risk→simplified measures 허용(단 ML/TF 의심 시 미적용). EDD/CDD, PPATK 보고 포함."},
{uid:"W1-094",set:"W1",tp:"OtherRegs",d:"Medium",q:"Per POJK 8/2023, suspicious financial actions and cash transaction reports are reported to which body?",o:["OJK","PPATK","Bank Indonesia","KSEI"],a:1,e:"의심거래·현금거래 보고는 PPATK(금융정보분석원)에. APU-PPT 감독활동: EDD/CDD, risk 기반 고객분류, 데이터 모니터링·갱신, PPATK 보고."},
{uid:"W1-095",set:"W1",tp:"OtherRegs",d:"Medium",q:"Per POJK 51/2017, the Sustainability Report must be submitted to OJK and published on the website no later than:",o:["31 January","15 February","30 April of the following year","31 December"],a:2,e:"Sustainability Report: 익년 4월 30일까지 OJK 제출 + 웹사이트 게시. RAKB(지속가능금융 행동계획)와 함께 준비."},
{uid:"W1-096",set:"W1",tp:"OtherRegs",d:"Hard",q:"Per POJK 49/2024, NBFI supervision is carried out through indirect supervision and direct supervision, where direct supervision is done through:",o:["self-assessment reports","Examination of NBFIs (periodic, occasional, special)","external audit only","public consultation"],a:1,e:"POJK 49/2024: 간접감독(보고·분석) + 직접감독(대면/전자대면 → NBFI 검사: 정기·수시·특별검사)."},
{uid:"W1-097",set:"W1",tp:"OtherRegs",d:"Hard",q:"Per POJK 49/2024, OJK determines SPECIAL SUPERVISION status when the net NPF ratio exceeds:",o:["5%","10%","25%","50%"],a:2,e:"Special Supervision: Composite Rating 5 + core/paid-up <0% + net NPF >25%. Intensive: CR4 + core/paid-up 0~<50% + net NPF >5%~≤25%."},
{uid:"W1-098",set:"W1",tp:"OtherRegs",d:"Medium",q:"Per POJK 19/2025 (Easy Access of Financing to MSME), NBFIs are required to implement an internal HR competency development program at least:",o:["once a year","twice a year","once every 2 years","monthly"],a:0,e:"POJK 19/2025: MSME 금융접근 위한 내부 HR 역량개발 프로그램 연 1회 이상. 또 MSME 전담 unit/function + 비용 평가 정책·절차 의무."},
{uid:"W1-099",set:"W1",tp:"Roadmap",d:"Medium",q:"Per the Finance Company Roadmap 2024-2028, which phase covers 2026-2027 (when the KBBF acquisition occurs)?",o:["Phase 1 Strengthening the Foundation","Phase 2 Consolidation and Creating Momentum","Phase 3 Adjustment and Growth","Phase 4 Digital Transformation"],a:1,e:"Roadmap: Phase 1(2024-25 기반강화) / Phase 2(2026-27 통합·모멘텀) / Phase 3(2028 조정·성장). KBBF 인수(2026)=Phase 2."},
{uid:"W1-100",set:"W1",tp:"Vision",d:"Easy",q:"In formulating Vision/Mission, the Company's Mission represents which concept?",o:["'To Be' (the vision)","'To Do' (the mission)","'How to do' (the values)","'Why' (the purpose)"],a:1,e:"Vision='To Be', Mission='To Do', Values='How to do'. Business Plan은 단·중·장기 + 거시가정(성장·GDP·물가·BI rate·환율·유가) 포함."},
{uid:"W2-001",set:"W2",tp:"BP구성",d:"Medium",q:"A finance company's Business Plan under the K6/K7 framework must contain which three time horizons?",o:["Short, medium, and long-term plans","Daily, weekly, and monthly plans","Only annual and five-year plans","Quarterly and semi-annual plans only"],a:0,e:"The Business Plan covers short, medium, and long-term plans, supported by macro assumptions and operational targets."},
{uid:"W2-002",set:"W2",tp:"BP구성",d:"Medium",q:"Which set of items are classified as MACRO assumptions in a finance company Business Plan?",o:["Economic growth, GDP per capita, inflation, BI rate, exchange rates, oil prices","Marketing STP and competitor pricing","Branch headcount and IT upgrade schedule","Booking targets, number of HR, service networks"],a:0,e:"Macro assumptions include economic growth, GDP per capita, inflation, BI rate, exchange rates and oil prices; demand/booking/HR are operational assumptions."},
{uid:"W2-003",set:"W2",tp:"BP구성",d:"Medium",q:"In the Business Plan, booking targets, funding sources, HR numbers, service networks and IT improvements belong to which category?",o:["Audit findings","Macro assumptions","Regulatory disclosures","Operational (micro) assumptions"],a:3,e:"These are operational assumptions derived from the macro assumptions, expressing how the company will execute its plan."},
{uid:"W2-004",set:"W2",tp:"BP목표",d:"Medium",q:"When formulating Vision, Mission and Values, which statement correctly pairs each with its orientation?",o:["Vision = 'How to Do', Mission = 'To Be', Values = 'To Do'","Vision = 'When', Mission = 'Where', Values = 'Why'","Vision = 'To Do', Mission = 'To Be', Values = 'When to Do'","Vision = 'To Be', Mission = 'To Do', Values = 'How to Do'"],a:3,e:"Vision answers 'To Be', Mission answers 'To Do', and Values answer 'How to Do'."},
{uid:"W2-005",set:"W2",tp:"Vision",d:"Easy",q:"The Company's Values in the strategic framework primarily answer which question?",o:["To be (the future state)","How to do (the way of working)","To do (the mission)","Where to compete"],a:1,e:"Values define 'how to do' — the conduct and way of working that supports vision and mission."},
{uid:"W2-006",set:"W2",tp:"BP구성",d:"Hard",q:"Which document describes the macro and operational assumptions plus short/medium/long-term targets and must be submitted to OJK?",o:["Anti-Fraud Strategy report","GCG self-assessment report","Business Plan (RBB)","Sustainability Report"],a:2,e:"The Business Plan (Rencana Bisnis) consolidates assumptions and multi-horizon targets and is reported to OJK."},
{uid:"W2-007",set:"W2",tp:"전략분석",d:"Hard",q:"In evaluating a finance company's Business Plan (Q6), which analysis tool maps the company's segmentation, targeting and positioning in the market?",o:["BMPP calculation","Gearing ratio test","FAR computation","STP analysis (Segmentation–Targeting–Positioning)"],a:3,e:"Market competition assessment uses STP — the company's segmentation, targeting and positioning."},
{uid:"W2-008",set:"W2",tp:"전략분석",d:"Hard",q:"When evaluating the realism of a Business Plan, an evaluator should FIRST verify which of the following?",o:["The number of pages in the plan","Whether the CEO signed in blue ink","The color scheme of the slide deck","Consistency of macro assumptions with current economic conditions"],a:3,e:"Evaluation starts by checking that macro assumptions (growth, inflation, rates) are consistent with the real business environment."},
{uid:"W2-009",set:"W2",tp:"전략분석",d:"Hard",q:"A Business Plan projects 40% receivables growth while the macro section assumes flat GDP and tightening BI rate. The evaluator should conclude:",o:["Higher growth always proves a stronger plan","The growth target appears inconsistent with stated macro assumptions and needs justification","Macro assumptions are irrelevant to targets","The plan is automatically compliant"],a:1,e:"Targets must be internally consistent with macro assumptions; an unjustified gap is a key evaluation red flag."},
{uid:"W2-010",set:"W2",tp:"전략분석",d:"Medium",q:"Which financial-health items are reviewed under 'Company Conditions' when evaluating a Business Plan?",o:["Only the office lease cost","Main funding sources, latest financial position, key ratios (ROA, NPF, Gearing, A/R-to-Assets)","Only the marketing budget","Only the audit fee"],a:1,e:"Company Conditions review covers funding sources, financial position and key ratios such as ROA, NPF, gearing and A/R-to-assets."},
{uid:"W2-011",set:"W2",tp:"BP보고",d:"Medium",q:"Under 'Organization & Financial Reports', what does the 'Job Duties' element primarily express?",o:["Tax filings","Shareholder history","Dividend policy","Key Performance Indicators (KPIs) and Key Success Factors (KSFs)"],a:3,e:"Job Duties are expressed through KPIs and KSFs that link roles to measurable outcomes."},
{uid:"W2-012",set:"W2",tp:"BP보고",d:"Medium",q:"'Company Background' in the Business Plan evaluation typically includes:",o:["Only the gearing ratio","Only the IT roadmap","Only next year's booking target","Shareholders, company history, and business focus"],a:3,e:"Company Background covers shareholders, history and business focus."},
{uid:"W2-013",set:"W2",tp:"BP보고",d:"Hard",q:"Which element is assessed under 'Health Level' when reviewing a finance company's condition?",o:["The CEO's tenure only","The number of board meetings only","The font used in reports","How healthy and compliant the company is with regulations, including any sanctions"],a:3,e:"Health Level assesses regulatory compliance, soundness and any sanctions imposed."},
{uid:"W2-014",set:"W2",tp:"BP구성",d:"Hard",q:"The Roadmap for Development and Strengthening of Finance Companies 2024–2028 sets which Phase 2 (2026–2027) label?",o:["Adjustment and Growth","Digital Transition","Strengthening the Foundation","Consolidation and Creating Momentum"],a:3,e:"Phase 1 (2024-25)=Strengthening the Foundation; Phase 2 (2026-27)=Consolidation and Creating Momentum; Phase 3 (2028)=Adjustment and Growth."},
{uid:"W2-015",set:"W2",tp:"BP구성",d:"Hard",q:"Per the 2024–2028 Roadmap, the aggregate FAR end-state target for Phase 3 (2028) is:",o:["89%–90%","85%–86%","80%–82%","87%–88%"],a:0,e:"Roadmap aggregate FAR targets: Phase1 85-86%, Phase2 87-88%, Phase3 89-90%."},
{uid:"W2-016",set:"W2",tp:"BP구성",d:"Medium",q:"Per the 2024–2028 Roadmap, Phase 1 (2024–2025) carries which label?",o:["Ecosystem Expansion","Adjustment and Growth","Consolidation and Creating Momentum","Strengthening the Foundation"],a:3,e:"Phase 1 is 'Strengthening the Foundation' (2024-2025)."},
{uid:"W2-017",set:"W2",tp:"BP구성",d:"Hard",q:"Which is one of the six strategy axes in the 2024–2028 Finance Company Roadmap?",o:["Branch closure quota","Mandatory dividend payout","Fixed interest rate cap","Strengthening Capital, Governance, Risk Management, and Human Resources"],a:3,e:"Roadmap strategy 1 is Strengthening Capital, Governance, Risk Management and Human Resources."},
{uid:"W2-018",set:"W2",tp:"BP구성",d:"Medium",q:"The 2024-2028 Roadmap aggregate productive-sector financing share target for Phase 3 (2028) is:",o:["49%–51%","46%–48%","55%–60%","44%–45%"],a:0,e:"Productive-sector share targets: Phase1 44-45%, Phase2 46-48%, Phase3 49-51%."},
{uid:"W2-019",set:"W2",tp:"BP보고",d:"Medium",q:"A Business Plan should state assumptions about demand levels and booking targets because they:",o:["Translate macro assumptions into achievable operational targets","Are set by OJK, not the company","Are required only for Sharia units","Replace the need for macro assumptions"],a:0,e:"Operational assumptions convert the macro outlook into concrete demand and booking targets."},
{uid:"W2-020",set:"W2",tp:"전략분석",d:"Hard",q:"In Business Plan evaluation, which finding most directly signals strategic risk?",o:["Business strategy is misaligned with current business-environment conditions","The plan is 30 pages long","The plan has a table of contents","Macro assumptions cite BI rate"],a:0,e:"Strategy risk arises chiefly from misalignment of strategy with the business environment and weak strategy formulation."},
{uid:"W2-021",set:"W2",tp:"전략분석",d:"Medium",q:"Sources of strategic risk in a Business Plan include all EXCEPT:",o:["Strong internal control over financial reporting","Insufficient management information system","Weak strategy-formulation process","Too-aggressive goal setting"],a:0,e:"Strategic risk sources: weak formulation, insufficient MIS, improper environment analysis, over-aggressive goals; strong ICFR is a mitigant, not a source."},
{uid:"W2-022",set:"W2",tp:"BP구성",d:"Medium",q:"Which is NOT typically part of a finance company Business Plan?",o:["Funding source plan","Macro assumptions","HR and service-network plan","A consumer's individual credit score"],a:3,e:"A Business Plan contains macro/operational assumptions and targets; individual debtor scores are operational data, not plan content."},
{uid:"W2-023",set:"W2",tp:"BP보고",d:"Hard",q:"Within 'Company Conditions', 'Market Competition' is documented through:",o:["The company's STP plus current and mid-term marketing plans","Only the org chart","Only the gearing ratio","Only the audit opinion"],a:0,e:"Market Competition is captured via STP and the current/mid-term marketing plans."},
{uid:"W2-024",set:"W2",tp:"전략분석",d:"Hard",q:"An evaluator notes a Business Plan omits any contingency under adverse macro scenarios. The most appropriate conclusion is:",o:["The plan is automatically approved","Only Sharia units need contingencies","Risk-management adequacy of the plan is deficient and should be flagged","The omission is irrelevant"],a:2,e:"A sound plan should embed risk management and contingency thinking; absence is a deficiency to flag."},
{uid:"W2-025",set:"W2",tp:"BP목표",d:"Medium",q:"Mission statements ('To Do') in the strategic framework are best described as:",o:["A numeric five-year revenue figure","The risk appetite statement","The company's core purpose and what it does for stakeholders","The dividend schedule"],a:2,e:"Mission expresses the organization's purpose — what it does — distinct from vision (to be) and values (how)."},
{uid:"W2-026",set:"W2",tp:"BP구성",d:"Hard",q:"Which Roadmap pillar focuses on 'Strengthening Resilience and Competitiveness'?",o:["Pillar 1","Pillar 3","Pillar 4","Pillar 2"],a:0,e:"Roadmap Pillar 1 = Strengthening Resilience and Competitiveness."},
{uid:"W2-027",set:"W2",tp:"BP보고",d:"Medium",q:"Organizational Structure & Functions in a Business Plan documents:",o:["Only the dividend ratio","Only the marketing slogan","Number of Directors, GMs and Managers and how they are divided","Only the audit committee charter"],a:2,e:"This element sets out the management headcount (Directors/GMs/Managers) and division of functions."},
{uid:"W2-028",set:"W2",tp:"전략분석",d:"Hard",q:"Best practice when an evaluator finds an over-optimistic booking target is to:",o:["Reject the entire plan without analysis","Request the underlying assumptions and stress-test them against macro data","Approve it because optimism shows ambition","Ignore it if the CEO approved"],a:1,e:"The evaluator should trace targets to assumptions and stress-test them, not simply accept or reject."},
{uid:"W2-029",set:"W2",tp:"Compliance",d:"Medium",q:"Per the new K7 unit 'Ensuring Compliance', which is the FIRST competency step in the compliance cycle?",o:["Impose sanctions on violators","Distribute the compliance report to the public","Terminate non-compliant contracts","Collect data and information on finance company compliance"],a:3,e:"The unit sequence: collect compliance data → assess impact of new/amended rules → analyze compliance level → report."},
{uid:"W2-030",set:"W2",tp:"Compliance",d:"Hard",q:"Under the compliance unit, when a NEW regulation is issued, the required analytical output is:",o:["Automatic dividend suspension","Analysis of the impact on the finance company and recommended follow-up actions","Immediate license surrender","A press release"],a:1,e:"New/amended regulations must be analyzed for company impact, with follow-up concepts recommended to relevant work units."},
{uid:"W2-031",set:"W2",tp:"Compliance",d:"Hard",q:"Which is the correct order of follow-up on a new regulation per the compliance unit?",o:["Report → identify → ignore → archive","Identify impact → design follow-up concept → recommend to work unit → implement → monitor & evaluate","Implement → identify → monitor → recommend","Monitor → recommend → identify → implement"],a:1,e:"Steps: identify regulatory impact, design follow-up, recommend to the relevant unit, implement, then monitor and evaluate."},
{uid:"W2-032",set:"W2",tp:"Compliance",d:"Medium",q:"Quarterly Compliance Reports to OJK are part of which data category in the compliance unit?",o:["Compliance Reports to OJK","AML/CFT data","Consumer protection data","Tax data"],a:0,e:"Compliance Reports to OJK include quarterly reports, annual reports (if requested) and incidental reports for serious violations."},
{uid:"W2-033",set:"W2",tp:"Compliance",d:"Hard",q:"Which report is filed only 'if requested' by OJK under the compliance unit?",o:["Monthly financial report","Quarterly Compliance Report","Incidental violation report","Annual Compliance Report"],a:3,e:"Quarterly compliance reports are routine; annual compliance reports are submitted if requested; incidental reports cover serious violations."},
{uid:"W2-034",set:"W2",tp:"Compliance",d:"Hard",q:"An 'Incidental Report' in the compliance framework is triggered by:",o:["A serious violation or extraordinary event","Routine staff training","The end of each quarter","Every board meeting"],a:0,e:"Incidental reports are event-driven — filed upon a serious violation or extraordinary event."},
{uid:"W2-035",set:"W2",tp:"Compliance",d:"Medium",q:"Which items belong to the AML/CFT/PPPSPM compliance data set?",o:["Marketing slogans","Dividend records","STR, CTR, KYC/CDD and KYE evidence","ROA and FAR ratios"],a:2,e:"AML/CFT/PPPSPM data includes Suspicious Transaction Reports, Cash Transaction Reports, KYC/CDD and Know-Your-Employee evidence."},
{uid:"W2-036",set:"W2",tp:"감독기관",d:"Medium",q:"KYE (Know Your Employee) is a compliance control aimed primarily at:",o:["Setting interest rates","Mitigating internal fraud and integrity risk among staff","Choosing the auditor","Pricing insurance"],a:1,e:"KYE strengthens internal integrity controls, complementing KYC/CDD for customers."},
{uid:"W2-037",set:"W2",tp:"Compliance",d:"Hard",q:"Compliance Risk Indicators in the compliance unit include all EXCEPT:",o:["Number/type of regulator sanctions","The company's share price","Number of internal violations detected","Trends in potential compliance risks"],a:1,e:"Indicators: internal violations detected, sanctions received, and compliance-risk trends; share price is not a stated indicator."},
{uid:"W2-038",set:"W2",tp:"Compliance",d:"Hard",q:"Before a compliance level report is distributed, the KEY control variable is:",o:["Approval by external customers","Approval/validation by the Compliance Director (or committee) and the internal audit/monitoring unit","No approval is needed","Approval by the marketing team"],a:1,e:"Consent before distribution requires approval from the Compliance Director/committee and content validation by internal audit or the compliance monitoring unit."},
{uid:"W2-039",set:"W2",tp:"Compliance",d:"Medium",q:"A regular compliance report distribution cadence to OJK typically follows which pattern?",o:["Every five years","Only once at IPO","Monthly, quarterly and annual reports","Only when sued"],a:2,e:"Regular compliance reporting follows monthly/quarterly/annual cadence, with ad-hoc reports as needed."},
{uid:"W2-040",set:"W2",tp:"Compliance",d:"Hard",q:"For the GCG report specifically, the compliance unit notes it must include:",o:["Only the dividend ratio","A self-assessment and corrective action plan","Only a cover letter","Only marketing data"],a:1,e:"The GCG report must contain a self-assessment plus a corrective action plan for any shortcomings."},
{uid:"W2-041",set:"W2",tp:"감독기관",d:"Medium",q:"Who licenses and supervises finance companies (multifinance) in Indonesia?",o:["Ministry of Trade","PPATK","OJK","Bank Indonesia"],a:2,e:"OJK licenses and supervises NBFIs including finance companies; PPATK receives STR/CTR for AML purposes."},
{uid:"W2-042",set:"W2",tp:"감독기관",d:"Hard",q:"Suspicious Transaction Reports and Cash Transaction Reports under AML rules are reported to:",o:["OJK Consumer Protection","GAIKINDO","PPATK","KSEI"],a:2,e:"STR/CTR are reported to PPATK (the financial intelligence unit); OJK supervises but PPATK receives the AML reports."},
{uid:"W2-043",set:"W2",tp:"Compliance",d:"Hard",q:"Per POJK 8/2023 (APU-PPT), the program is implemented using which approach?",o:["Volume-based approach","Rule-only approach","Risk-Based Approach (RBA)","Random sampling only"],a:2,e:"POJK 8/2023 mandates a Risk-Based Approach: high-risk → enhanced measures, low-risk → simplified measures (unless ML/TF suspicion exists)."},
{uid:"W2-044",set:"W2",tp:"Compliance",d:"Hard",q:"Under the RBA in POJK 8/2023, 'simplified measures' may be applied to low-risk customers EXCEPT when:",o:["The customer is local","The amount is small","The customer is a repeat client","There is suspicion of money laundering or terrorism financing"],a:3,e:"Simplified measures are not permitted where ML/TF is suspected, regardless of apparent low risk."},
{uid:"W2-045",set:"W2",tp:"Compliance",d:"Medium",q:"Which four risk dimensions must a finance company assess under POJK 8/2023 RBA risk assessment?",o:["Only customer and amount","Only country and currency","Only product and price","Customer; country/geographic area; products/services/transactions; delivery channels"],a:3,e:"RBA risk assessment covers customer, country/geography, products/services/transactions and delivery channels."},
{uid:"W2-046",set:"W2",tp:"Compliance",d:"Hard",q:"Under POJK 8/2023, AML/CFT policies and procedures must be approved by:",o:["The Board of Commissioners","The external auditor","The customer","The marketing manager"],a:0,e:"Risk management & mitigation requires policies/procedures approved by the Board of Commissioners with supervision of the program."},
{uid:"W2-047",set:"W2",tp:"Compliance",d:"Medium",q:"EDD (Enhanced Due Diligence) under AML supervision is applied to:",o:["Only low-risk customers","All customers equally","Higher-risk customers/relationships","Only employees"],a:2,e:"EDD is the enhanced measure for higher-risk profiles; standard CDD applies generally."},
{uid:"W2-048",set:"W2",tp:"Compliance",d:"Hard",q:"Which POJK governs Human Resources Development and certification obligations for finance companies?",o:["POJK 48/2024","POJK 43/2025","POJK 43/2024","POJK 34/2018"],a:2,e:"POJK 43/2024 governs HR development; note 43/2025 does not exist in this context."},
{uid:"W2-049",set:"W2",tp:"Compliance",d:"Hard",q:"Under POJK 43/2024, finance companies must budget and realize HR education/training of at least:",o:["2.5% of personnel/employee expenses","10% of equity","5% of total assets","2.5% of net income"],a:0,e:"The HR training budget base is 2.5% of personnel (employee) expenses — not net income."},
{uid:"W2-050",set:"W2",tp:"Compliance",d:"Hard",q:"Per POJK 43/2024 certification obligations, which staff must hold collection-field professional certificates?",o:["Only marketing interns","Employees and/or outsourced personnel handling collection and collateral execution","Only IT staff","Only the CEO"],a:1,e:"Collection/collateral-execution staff (including outsourced) need collection-field certification; directors/commissioners need financing-sector expertise certificates."},
{uid:"W2-051",set:"W2",tp:"Compliance",d:"Hard",q:"Under POJK 43/2024, the Director overseeing the HR quality function must be:",o:["An external consultant","A foreign expert","A board commissioner","An Indonesian citizen"],a:3,e:"The director overseeing HR quality management/development must be an Indonesian citizen."},
{uid:"W2-052",set:"W2",tp:"Compliance",d:"Medium",q:"Which POJK governs Anti-Fraud Strategy for financial services institutions including finance companies?",o:["POJK 8/2023","POJK 12/2024","POJK 43/2024","POJK 28/2024"],a:1,e:"POJK 12/2024 governs the Anti-Fraud Strategy; POJK 28/2024 governs SIPELAKU."},
{uid:"W2-053",set:"W2",tp:"Compliance",d:"Hard",q:"POJK 12/2024 (Anti-Fraud Strategy) began applying to finance companies starting:",o:["January 1, 2025","October 23, 2024","June 26, 2026","July 1, 2024"],a:1,e:"POJK 12/2024 applies to finance companies from October 23, 2024; first AFS report due 31 January 2025."},
{uid:"W2-054",set:"W2",tp:"Compliance",d:"Hard",q:"Which POJK governs the SIPELAKU track-record system for fraud actors?",o:["POJK 49/2024","POJK 34/2018","POJK 28/2024","POJK 12/2024"],a:2,e:"POJK 28/2024 establishes SIPELAKU; POJK 12/2024 is the Anti-Fraud Strategy."},
{uid:"W2-055",set:"W2",tp:"Compliance",d:"Hard",q:"POJK 34/2018 governs which OJK process for primary parties?",o:["Initial NBFI fit & proper","Fit & Proper reassessment of primary parties","Sustainable finance reporting","Consumer protection lawsuits"],a:1,e:"POJK 34/2018 governs fit-and-proper reassessment of main/primary parties (controller, managing, official)."},
{uid:"W2-056",set:"W2",tp:"Compliance",d:"Hard",q:"Under POJK 34/2018, reassessment of primary parties is triggered by indications of:",o:["Marketing under-performance","Low dividend payout","Slow IT systems","Integrity, financial feasibility, financial reputation, and/or competence issues"],a:3,e:"Reassessment addresses integrity, financial feasibility/reputation and competence concerns of primary parties."},
{uid:"W2-057",set:"W2",tp:"Compliance",d:"Hard",q:"Which POJK addresses ease of access to financing for MSME?",o:["POJK 34/2018","POJK 19/2025","POJK 49/2024","POJK 43/2024"],a:1,e:"POJK 19/2025 governs ease of MSME financing access (MSME unit/function, evaluation procedures, annual HR competency programs)."},
{uid:"W2-058",set:"W2",tp:"Compliance",d:"Medium",q:"POJK 49/2024 governs which OJK supervisory matter for NBFIs?",o:["Anti-fraud strategy","Sustainable finance","Supervision status (normal/intensive/special) and examination","HR certification"],a:2,e:"POJK 49/2024 covers the supervision-status cycle and examination of NBFIs."},
{uid:"W2-059",set:"W2",tp:"Compliance",d:"Hard",q:"Under POJK 49/2024, INTENSIVE supervision is set when Health Level is Composite Rank 4 and net-NPF ratio is:",o:[">5% and ≤25%","<0%",">25%","exactly 0%"],a:0,e:"Intensive supervision: Composite Rank 4 and net NPF >5% to ≤25% (core capital/paid-in 0%<50%)."},
{uid:"W2-060",set:"W2",tp:"Compliance",d:"Hard",q:"Under POJK 49/2024, SPECIAL supervision parameters include net-NPF ratio:",o:["exactly 10%","between 5% and 25%","≤5%",">25%"],a:3,e:"Special supervision: Composite Rating 5, core capital/paid-in <0%, net NPF >25%."},
{uid:"W2-061",set:"W2",tp:"Compliance",d:"Medium",q:"Which POJK governs sustainable finance implementation for financial services institutions?",o:["POJK 51/2017","POJK 43/2024","POJK 28/2024","POJK 12/2024"],a:0,e:"POJK 51/2017 governs sustainable finance, including the Sustainable Finance Action Plan (RAKB) and sustainability report."},
{uid:"W2-062",set:"W2",tp:"Compliance",d:"Hard",q:"Under POJK 51/2017, the sustainability report must be submitted to OJK and published on the website no later than:",o:["30 April of the following year","15 February","30 June","31 January"],a:0,e:"The sustainability report deadline is 30 April of the following year (submission and website publication)."},
{uid:"W2-063",set:"W2",tp:"Compliance",d:"Hard",q:"The GCG self-assessment (institutional soundness) report under POJK 28/2020 must be reported to OJK no later than:",o:["30 April","1 July","31 December","15 February of the next year"],a:3,e:"The GCG self-assessment, part of institutional-soundness reporting, is due to OJK by 15 February of the next year."},
{uid:"W2-064",set:"W2",tp:"Compliance",d:"Medium",q:"'Conducting studies on new provisions' in the compliance unit primarily aims to:",o:["Set the dividend","Choose the auditor","Assess the impact of new/amended laws on the company before they take effect","Generate marketing leads"],a:2,e:"Studying new provisions lets the company gauge regulatory impact and design timely follow-up."},
{uid:"W2-065",set:"W2",tp:"Q6컴플",d:"Hard",q:"The Q6 unit 'Evaluating the Implementation of Compliance Culture' references which SKKNI standard?",o:["SKKNI number 12/2024","SKKNI number 143/2022","SKKNI number 43/2024","SKKNI number 275/2024"],a:1,e:"The compliance-culture evaluation unit references SKKNI 143/2022; the compliance-regulation unit references SKKNI 275/2024."},
{uid:"W2-066",set:"W2",tp:"Q6컴플",d:"Medium",q:"Per the compliance-culture philosophy, compliance is best understood as:",o:["An internal value ingrained in every member of the organization","Only relevant for Sharia units","Solely the auditor's job","A one-time legal checkbox"],a:0,e:"Compliance is framed as an internal value voluntarily upheld, not merely rule-following."},
{uid:"W2-067",set:"W2",tp:"Q6컴플",d:"Hard",q:"Which philosophy underpins compliance-culture evaluation as a 'never-ending process'?",o:["Continuous Improvement Through Evaluation","Compliance as a one-off audit","Compliance as marketing","Compliance as cost minimization"],a:0,e:"Continuous Improvement views evaluation as ongoing — identifying strengths/weaknesses to enhance effectiveness."},
{uid:"W2-068",set:"W2",tp:"Q6컴플",d:"Hard",q:"'The Role of Leadership in Leading by Example' implies that without good leader modeling:",o:["Compliance is automatically guaranteed","A compliance culture is difficult to implement effectively","Only staff are responsible","Regulators must intervene first"],a:1,e:"Leadership tone-at-the-top is essential; absent leader example, culture cannot be embedded effectively."},
{uid:"W2-069",set:"W2",tp:"Q6평가",d:"Hard",q:"When evaluating a compliance culture, the focus is NOT only on outcomes but also on:",o:["The learning and development journey of that culture","The dividend payout","The share price","The office location"],a:0,e:"Education-and-awareness philosophy means evaluation considers the growth/learning journey, not only final outcomes."},
{uid:"W2-070",set:"W2",tp:"Q6평가",d:"Medium",q:"Which is listed as Quality Evidence for evaluating compliance-culture implementation?",o:["Vehicle registration files","Compliance Culture Implementation Plan, including its scope","The company's tax invoices","Marketing brochures"],a:1,e:"Quality evidence includes vision/mission/values, the Compliance Culture Implementation Plan and its scope, policy/indicators, and program documentation."},
{uid:"W2-071",set:"W2",tp:"Q6평가",d:"Hard",q:"Compliance Culture Program Documentation as quality evidence should include all EXCEPT:",o:["Competitor pricing strategy","Senior leadership involvement","Sanctions for violations","Compliance audits and follow-up"],a:0,e:"Documentation covers leadership involvement, audits/follow-up, outreach/refresher programs and sanctions — not competitor pricing."},
{uid:"W2-072",set:"W2",tp:"Q6컴플",d:"Medium",q:"'Compliance as a Pillar of Trust and Reputation' philosophy warns that a weak culture risks:",o:["Lower marketing costs","Losing trust and reputation, ultimately harming long-term performance","Higher dividends","Faster IT systems"],a:1,e:"Without a strong compliance culture, the organization risks losing stakeholder trust and reputation, hurting performance."},
{uid:"W2-073",set:"W2",tp:"Q6컴플",d:"Hard",q:"Compliance-culture evaluation links compliance to performance because:",o:["Compliance only matters to auditors","Compliance is unrelated to performance","Strong compliance supports efficiency, transparency and lower risk, improving overall performance","Compliance reduces revenue"],a:2,e:"The 'driver of organizational performance' philosophy ties compliance to efficiency, transparency and reduced risk."},
{uid:"W2-074",set:"W2",tp:"역량",d:"Medium",q:"The KSA framework underpinning the competency units stands for:",o:["Knowledge, Standards, Audits","Key Success Areas","Knowledge, Skills, and (Work) Attitudes","Key Strategic Aims"],a:2,e:"Each unit defines required Knowledge, Skills and work Attitudes (KSA)."},
{uid:"W2-075",set:"W2",tp:"역량",d:"Hard",q:"Under the compliance-culture unit's Knowledge area, which topic is explicitly covered?",o:["Vehicle leasing mechanics only","Office HVAC maintenance","Tax filing software","The Role of Governance, Risk, and Compliance (GRC)"],a:3,e:"Knowledge spans GRC roles, GCG, prudential principles, institutional structure, business plans and compliance-culture concepts/parameters/steps."},
{uid:"W2-076",set:"W2",tp:"Q6평가",d:"Hard",q:"To evaluate whether compliance values are 'ingrained', an evaluator assesses:",o:["Only the audit fee","Only the dividend ratio","Only the CEO's statements","The extent compliance values are voluntarily adhered to across all members"],a:3,e:"Evaluation gauges how deeply values are internalized and voluntarily followed organization-wide."},
{uid:"W2-077",set:"W2",tp:"Q6컴플",d:"Medium",q:"Education, training and awareness are described in the philosophy as:",o:["The primary foundation for sustainable compliance","Optional extras","A regulatory burden with no value","Only for new hires"],a:0,e:"Ongoing education/training/awareness is the foundation for sustainable compliance rooted in understanding ethics and responsibility."},
{uid:"W2-078",set:"W2",tp:"Q6평가",d:"Hard",q:"A compliance-culture evaluation recommends improvements based on:",o:["The results of the compliance-culture evaluation analysis","Random guesses","Competitor brochures","Customer star ratings only"],a:0,e:"Recommendations for improvement are grounded in the evaluation analysis of culture implementation."},
{uid:"W2-079",set:"W2",tp:"ThreeLines",d:"Hard",q:"In the COSO/Three-Lines model, the compliance function generally sits in:",o:["The 3rd line of defense","The 2nd line of defense","Outside all lines","The 1st line of defense"],a:1,e:"Compliance is a 2nd-line function (alongside risk management, security, quality); operations are 1st line and internal audit is 3rd line."},
{uid:"W2-080",set:"W2",tp:"ThreeLines",d:"Hard",q:"In the Three-Lines model, the 1st line of defense comprises:",o:["Internal audit","The audit committee","Management controls and internal control measures (business operations)","The external regulator"],a:2,e:"1st line = management controls/operational controls; 2nd line = risk/compliance; 3rd line = internal audit."},
{uid:"W2-081",set:"W2",tp:"ThreeLines",d:"Medium",q:"Internal audit's role in the Three-Lines model is the:",o:["1st line operational role","2nd line risk-owner role","Regulatory supervisor role","3rd line of defense providing independent assurance"],a:3,e:"Internal audit is the 3rd line — independent assurance over the first two lines."},
{uid:"W2-082",set:"W2",tp:"Q6평가",d:"Hard",q:"Which sequence best reflects compliance-culture evaluation per the Q6 unit?",o:["Assess parameters → analyze implementation → evaluate implementation → recommend improvements","Recommend → ignore → archive","Report → resign → close","Sanction → audit → market"],a:0,e:"Specific objectives: assess parameters for creating culture, analyze implementation, evaluate implementation (and recommend improvements)."},
{uid:"W2-083",set:"W2",tp:"Q6컴플",d:"Medium",q:"'Compliance as a Driver of Organizational Performance' suggests compliance evaluation should be:",o:["Replaced by marketing metrics","Linked to performance measurement and achievement of organizational goals","Kept separate from any goals","Done only at liquidation"],a:1,e:"This philosophy ties compliance evaluation to performance measurement and goal achievement."},
{uid:"W2-084",set:"W2",tp:"Q6평가",d:"Hard",q:"Senior leadership involvement is required in compliance-culture documentation because:",o:["It lowers audit fees","It is a tax requirement","Tone-at-the-top demonstrates and reinforces the culture","It sets interest rates"],a:2,e:"Leadership involvement evidences tone-at-the-top, central to embedding a compliance culture."},
{uid:"W2-085",set:"W2",tp:"역량",d:"Hard",q:"Which is a 'work attitude' rather than 'knowledge' in the competency framework?",o:["Reciting the org chart","Listing every SEOJK","Objectivity and integrity in evaluating compliance","Memorizing all POJK numbers"],a:2,e:"Work attitudes capture professional dispositions (objectivity, integrity, diligence); knowledge is the factual base."},
{uid:"W2-086",set:"W2",tp:"Q6평가",d:"Medium",q:"Outreach/refresher programs appear in compliance-culture documentation to evidence:",o:["Tax compliance only","Dividend distribution","Marketing spend","Ongoing education and awareness efforts"],a:3,e:"Refresher/outreach programs show continuous education/awareness supporting the culture."},
{uid:"W2-087",set:"W2",tp:"Q6컴플",d:"Hard",q:"The compliance-culture unit treats 'sanctions for violations' as evidence because they:",o:["Replace training","Demonstrate enforcement and accountability within the culture","Are purely punitive with no cultural value","Are optional"],a:1,e:"Documented sanctions evidence enforcement and accountability, reinforcing the culture's seriousness."},
{uid:"W2-088",set:"W2",tp:"ThreeLines",d:"Hard",q:"Which function pairs the COSO internal-control component 'Monitoring Activities' with the Three-Lines model?",o:["Marketing (1st line)","The regulator only","Internal audit (3rd line) provides ongoing independent monitoring","Shareholders directly"],a:2,e:"Monitoring activities are reinforced by internal audit as the independent 3rd-line monitor."},
{uid:"W2-089",set:"W2",tp:"Q6평가",d:"Hard",q:"If a compliance-culture evaluation finds high policy awareness but low voluntary adherence, the gap indicates:",o:["No action is required","Values are not yet ingrained; deeper internalization is needed","Only the auditor is at fault","The culture is fully mature"],a:1,e:"Awareness without voluntary adherence shows values are not internalized — the culture needs strengthening."},
{uid:"W2-090",set:"W2",tp:"Q6컴플",d:"Medium",q:"Per the philosophy, regular compliance-culture evaluation helps an organization:",o:["Identify strengths and weaknesses and make improvements","Avoid all OJK reporting","Stop training staff","Eliminate the need for any policies"],a:0,e:"Regular evaluation surfaces strengths/weaknesses to drive continuous improvement."},
{uid:"W2-091",set:"W2",tp:"BP보고",d:"Medium",q:"Key financial ratios reviewed in a Business Plan's financial section typically include all EXCEPT:",o:["The CEO's personal credit score","NPF","ROA","Gearing Ratio"],a:0,e:"Financial-report review covers ROA, NPF, gearing and A/R-to-assets; personal credit scores are irrelevant."},
{uid:"W2-092",set:"W2",tp:"BP구성",d:"Hard",q:"Which Roadmap strategy axis targets 'Strengthening Consumer Protection'?",o:["Interest rate ceiling","Strengthening consumer literacy/education and executorial fiduciary rights with consumer protection","Mandatory branch expansion","Fixed dividend ratio"],a:1,e:"Roadmap consumer-protection strategy strengthens literacy/education, fiduciary executorial rights and debtor-rights socialization."},
{uid:"W2-093",set:"W2",tp:"Compliance",d:"Hard",q:"Under POJK 8/2023 RBA, finance companies must do all of the following with risk assessments EXCEPT:",o:["Update assessments periodically","Document the assessments","Keep them secret from all authorities","Consider all relevant risk factors"],a:2,e:"They must document, consider all factors, update periodically, and have mechanisms to provide assessment info to authorized institutions."},
{uid:"W2-094",set:"W2",tp:"Compliance",d:"Medium",q:"Which is NOT among POJK 43/2024 certification obligations?",o:["Risk-function directors hold risk-management certificates","Directors hold financing-sector expertise certificates","Commissioners hold financing-sector certificates","A marketing intern must hold a risk-management certificate"],a:3,e:"Certification targets directors, commissioners, risk-function officials, managerial staff and collection staff — not interns broadly."},
{uid:"W2-095",set:"W2",tp:"감독기관",d:"Hard",q:"Under POJK 49/2024, NORMAL supervision means the NBFI:",o:["Has Composite Rating 5","Has net NPF >25%","Has no potential for or actual difficulties endangering business continuity","Is under special supervision"],a:2,e:"Normal supervision = no potential/actual continuity-endangering difficulties; intensive/special apply when criteria are met."},
{uid:"W2-096",set:"W2",tp:"Q6평가",d:"Hard",q:"An evaluator assessing compliance-culture parameters should reference the company's:",o:["Office lease agreement","Marketing calendar","Vehicle fleet list","Vision, Mission, Values and established norms"],a:3,e:"Parameters for creating a compliance culture trace back to the company's vision, mission, values and norms."},
{uid:"W2-097",set:"W2",tp:"Compliance",d:"Medium",q:"The compliance unit's Quality Evidence includes results of compliance audits conducted by:",o:["Only shareholders","Only external customers","Internal Audit and/or relevant regulators (OJK)","Only marketing"],a:2,e:"Quality evidence covers compliance audit results by Internal Audit and/or regulators such as OJK."},
{uid:"W2-098",set:"W2",tp:"Compliance",d:"Hard",q:"Recommending follow-up actions on a new regulation should be directed to:",o:["The press","The company's customers","The relevant work unit responsible for implementation","A competitor"],a:2,e:"Follow-up concepts/recommendations go to the relevant internal work unit charged with implementation."},
{uid:"W2-099",set:"W2",tp:"ThreeLines",d:"Medium",q:"Which trio correctly lists 2nd-line-of-defense functions in the COSO/Three-Lines depiction?",o:["Board, shareholders, customers","Marketing, sales, collections","Financial control, risk management, compliance","Internal audit, external audit, regulator"],a:2,e:"2nd line includes financial control, security, risk management, quality, inspection and compliance."},
