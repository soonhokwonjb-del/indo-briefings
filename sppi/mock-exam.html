{uid:"W2-100",set:"W2",tp:"Compliance",d:"Hard",q:"A finance company faces a new POJK that shortens a reporting deadline. The compliant first action is to:",o:["Ignore until next audit","Analyze the impact and design/implement follow-up before the effective date","Wait until sanctioned","Publicly contest the rule"],a:1,e:"The compliance cycle requires proactive impact analysis and timely follow-up implementation ahead of the effective date."},
{uid:"W3-001",set:"W3",tp:"개요",d:"Medium",q:"The new K6/K7 governance & risk unit references which international risk-management standard?",o:["COSO ERM 2004 only","SNI ISO 31000:2018","ISO 9001:2015","Basel III only"],a:1,e:"The unit grounds risk management in SNI ISO 31000:2018 (alongside COSO internal control)."},
{uid:"W3-002",set:"W3",tp:"ISO31000",d:"Hard",q:"Under ISO 31000:2018, risk management is best defined as a set of procedures and methodologies to:",o:["Maximize leverage","Avoid all regulation","Identify, measure, monitor and control risk arising from business activities","Eliminate all risk completely"],a:2,e:"Risk management identifies, measures, monitors and controls risk; it manages — not eliminates — risk."},
{uid:"W3-003",set:"W3",tp:"ISO31000",d:"Hard",q:"Per the framework, 'Risk' is defined as:",o:["The potential for an event that could cause harm to the institution","An audit finding","Any profitable opportunity","A guaranteed loss"],a:0,e:"Risk is the potential for an event that could cause harm; it is uncertainty, not certain loss."},
{uid:"W3-004",set:"W3",tp:"ISO31000",d:"Medium",q:"The application of risk management by a finance company must be ADJUSTED to:",o:["Only the CEO's preference","A fixed national template","Objectives, business policies, size and complexity of the NBFI","Only the share price"],a:2,e:"Risk-management implementation is proportionate to the NBFI's objectives, policies, size and complexity."},
{uid:"W3-005",set:"W3",tp:"4층구조",d:"Hard",q:"The Risk Management Framework (PADK 48/2025) rests on which four pillars?",o:["Vision; mission; values; ethics","Active supervision; policies/procedures/limits; identification-measurement-monitoring-control & MIS; internal control/audit","Capital; liquidity; FX; tax","Marketing; sales; pricing; collections"],a:1,e:"The four-pillar framework: active supervision, adequacy of policies/procedures/limits, the risk process & MIS, and comprehensive internal control."},
{uid:"W3-006",set:"W3",tp:"4층구조",d:"Medium",q:"The first pillar of the risk-management framework is:",o:["IT procurement","Dividend policy","Marketing strategy","Active supervision of the Board of Commissioners and Directors"],a:3,e:"Pillar 1 is active supervision by the Board of Commissioners and Directors."},
{uid:"W3-007",set:"W3",tp:"ISO31000",d:"Hard",q:"Risk Assessment under the framework includes the assessment of inherent risk and:",o:["The quality of risk-management implementation (risk control system)","The audit fee","The marketing budget","The dividend payout"],a:0,e:"Risk assessment combines inherent risk and the quality of risk-management implementation (control system)."},
{uid:"W3-008",set:"W3",tp:"TARIF",d:"Medium",q:"The five GCG principles under POJK 48/2024 are summarized by the acronym:",o:["TARGET","PDCA","TARIF (Transparency, Accountability, Responsibility, Independency, Fairness)","SMART"],a:2,e:"GCG principles: Transparency, Accountability, Responsibility, Independency, Fairness (TARIF)."},
{uid:"W3-009",set:"W3",tp:"TARIF",d:"Hard",q:"Which GCG principle means 'managed professionally and free from conflict of interest and outside pressure'?",o:["Fairness","Responsibility","Transparency","Independency"],a:3,e:"Independency = professional management free from conflicts of interest and external pressure."},
{uid:"W3-010",set:"W3",tp:"TARIF",d:"Hard",q:"Which GCG principle requires 'compatibility of management with the laws and execution of healthy business practices'?",o:["Transparency","Accountability","Fairness","Responsibility"],a:3,e:"Responsibility = compliance with laws and sound multifinance business practices."},
{uid:"W3-011",set:"W3",tp:"TARIF",d:"Medium",q:"Under GCG 'Accountability', the key idea is:",o:["Maximizing leverage","Hiding poor results","Clearness on function so performance is transparent, fair, effective and efficient","Avoiding regulators"],a:2,e:"Accountability means clarity of function enabling transparent, fair, effective and efficient performance."},
{uid:"W3-012",set:"W3",tp:"GCG",d:"Hard",q:"Per POJK 48/2024, 'Company's organ' refers to:",o:["Only the regulator","Only the auditor","GMS (shareholders), Directors, and Board of Commissioners","Only the Directors"],a:2,e:"Company's organ = the general meeting of shareholders, the Directors and the Board of Commissioners."},
{uid:"W3-013",set:"W3",tp:"GCG",d:"Hard",q:"A finance company with assets above Rp 250 billion must have at least how many Directors?",o:["5 Directors","1 Director","3 Directors, min 50% Indonesian","2 Directors"],a:2,e:"Assets > Rp 250B requires ≥3 Directors with at least 50% Indonesian citizens."},
{uid:"W3-014",set:"W3",tp:"GCG",d:"Hard",q:"A finance company with assets above Rp 250 billion must have at least how many Commissioners?",o:["2 Commissioners, including an Independent Commissioner","No minimum","1 Commissioner","4 Commissioners"],a:0,e:"Assets > Rp 250B requires ≥2 Commissioners including an Independent Commissioner."},
{uid:"W3-015",set:"W3",tp:"GCG",d:"Medium",q:"Directors meetings should be held at minimum:",o:["Once per month (min 50% attendance)","Weekly","Once per year","Quarterly"],a:0,e:"Directors meet ≥1x/month (≥50% attendance); BOC ≥4x/year (≥75%); GMS ≥1x/year."},
{uid:"W3-016",set:"W3",tp:"GCG",d:"Medium",q:"Board of Commissioners meetings should be held at minimum:",o:["Monthly","Daily","Once per year","4 times per year (min 75% attendance)"],a:3,e:"BOC meets ≥4x/year with ≥75% attendance."},
{uid:"W3-017",set:"W3",tp:"GCG",d:"Hard",q:"Minutes of Meeting (MoM) for board meetings should:",o:["Omit any disagreement","Be kept secret from members","Be distributed to all relevant parties and include dissenting opinions","Only record attendance"],a:2,e:"MoM must be distributed to relevant parties and must record dissenting opinions."},
{uid:"W3-018",set:"W3",tp:"GCG",d:"Hard",q:"The Director in charge of the compliance function may NOT concurrently hold which functions (except President Director)?",o:["Only HR","Financing/credit, marketing and financial functions","Only IT","Only legal"],a:1,e:"The compliance Director cannot also lead financing/credit, marketing or finance functions — except the President Director."},
{uid:"W3-019",set:"W3",tp:"GCG",d:"Hard",q:"An Independent Commissioner of a finance company must be:",o:["A controlling shareholder","A foreign expert","A current Director","An Indonesian citizen domiciled in Indonesia"],a:3,e:"Independent Commissioners must be Indonesian citizens residing in Indonesia, with no affiliate relations."},
{uid:"W3-020",set:"W3",tp:"GCG",d:"Medium",q:"Directors are prohibited from holding double positions as a member of the BOC in more than:",o:["5 institutions","10 institutions","2 institutions","unlimited institutions"],a:2,e:"A Director may not be a BOC member in more than 2 institutions, among other double-position limits."},
{uid:"W3-021",set:"W3",tp:"GCG",d:"Hard",q:"The GCG self-assessment report must be reported to OJK no later than:",o:["1 July","31 December","30 April","15 February of the next year"],a:3,e:"GCG self-assessment (part of institutional soundness) is due to OJK by 15 February of the next year (POJK 28/2020)."},
{uid:"W3-022",set:"W3",tp:"전략",d:"Hard",q:"Strategy risk under PADK 48/2025 arises mainly from:",o:["Inaccuracy in making/implementing strategic decisions and failure to anticipate environmental change","Excess capital","Low NPF","Strong internal controls"],a:0,e:"Strategy risk stems from inaccurate strategic decisions and failure to anticipate business-environment changes."},
{uid:"W3-023",set:"W3",tp:"전략",d:"Medium",q:"Which is an inherent-risk parameter for STRATEGY risk?",o:["FX exposure volume","Cash transaction count","Alignment of business strategy with business-environment conditions","NPF gross ratio"],a:2,e:"Strategy-risk parameters include strategy-environment alignment, strategic choices, industry position and realization of targets."},
{uid:"W3-024",set:"W3",tp:"전략",d:"Hard",q:"The eight risk types in NBFI health assessment are grouped into business, financial and:",o:["Tax risk group","Governance risk group","Marketing risk group","Pricing risk group"],a:1,e:"Groups: business (strategic), financial (credit, market, operational, liquidity), governance (compliance, legal, reputation)."},
{uid:"W3-025",set:"W3",tp:"전략",d:"Hard",q:"Which risk type is the SOLE member of the 'business risk group' in NBFI health assessment?",o:["Compliance Risk","Credit Risk","Strategic Risk","Reputation Risk"],a:2,e:"Business risk group = Strategic Risk only; financial = credit/market/operational/liquidity; governance = compliance/legal/reputation."},
{uid:"W3-026",set:"W3",tp:"전략",d:"Hard",q:"Operational risk inherent-risk parameters include all EXCEPT:",o:["Dividend payout ratio","Technology and information systems","Human resources","Organizational complexity and business activities"],a:0,e:"Operational-risk parameters: org/business complexity, HR, IT systems, fraud risk, business disruption, interaction/interdependence."},
{uid:"W3-027",set:"W3",tp:"전략",d:"Medium",q:"Which risk arises from the company's inability to meet maturing liabilities from cash-flow funding sources?",o:["Credit Risk","Liquidity Risk","Legal Risk","Reputation Risk"],a:1,e:"Liquidity (funding liquidity) risk is the inability to meet maturing liabilities from cash-flow/liquid-asset sources."},
{uid:"W3-028",set:"W3",tp:"전략",d:"Medium",q:"Reputation-risk inherent parameters include all EXCEPT:",o:["Frequency/materiality of debtor complaints","Gearing ratio level","Violations of business ethics","Impact on owner/group reputation"],a:1,e:"Reputation-risk parameters: owner/group reputation impact, business-ethics violations, product complexity, negative-news exposure, complaint frequency."},
{uid:"W3-029",set:"W3",tp:"전략",d:"Hard",q:"Compliance risk inherent parameters include the type/significance of violations and:",o:["Branch count","FX position","Frequency of violations and compliance track record","Cash ratio"],a:2,e:"Compliance-risk parameters: violation type/significance, frequency/track record, breaches of accepted standards, and follow-up actions."},
{uid:"W3-030",set:"W3",tp:"Treatment",d:"Hard",q:"Per the risk-management strategy, which treatment matches 'Cancel expansion to high-risk areas'?",o:["Avoid (Terminate)","Exploit","Transfer","Accept"],a:0,e:"Avoid/Terminate = cancel or cease the risky activity (e.g., abandon high-risk expansion)."},
{uid:"W3-031",set:"W3",tp:"Treatment",d:"Hard",q:"Which risk treatment matches 'transfer risk through insurance or guarantee'?",o:["Terminate","Accept","Transfer","Avoid"],a:2,e:"Transfer shifts risk to a third party, e.g., via insurance or guarantee mechanisms."},
{uid:"W3-032",set:"W3",tp:"Treatment",d:"Hard",q:"Which treatment matches 'No action — accept minor operational risk below a threshold'?",o:["Terminate","Avoid","Accept","Transfer"],a:2,e:"Accept means taking no action and bearing minor risk below a defined threshold."},
{uid:"W3-033",set:"W3",tp:"Treatment",d:"Medium",q:"Risk treatment that reduces likelihood/impact via controls is called:",o:["Mitigate (reduce)","Accept","Avoid","Ignore"],a:0,e:"Mitigate/reduce applies controls to lower likelihood or impact; the four core options are avoid, transfer, mitigate, accept."},
{uid:"W3-034",set:"W3",tp:"Treatment",d:"Hard",q:"For credit risk mitigation under POJK 46/2024, which is NOT a listed mechanism?",o:["Insurance on collateral","Issuing promissory notes to the public","Loan/credit insurance","Fiduciary/mortgage on collateral"],a:1,e:"Mitigation: loan insurance, collateral insurance, fiduciary/mortgage and other risk-reduction efforts; issuing public promissory notes is prohibited."},
{uid:"W3-035",set:"W3",tp:"Treatment",d:"Hard",q:"A finance company is prohibited from insuring or guaranteeing:",o:["New financing","Performing receivables","Problematic (non-performing) financing receivables","Collateral generally"],a:2,e:"Companies cannot insure/guarantee already-problematic receivables, nor use mechanisms capping claims to a % of premium."},
{uid:"W3-036",set:"W3",tp:"Treatment",d:"Medium",q:"Risk that is left after controls are applied is termed:",o:["Strategic risk","Inherent risk","Gross risk","Residual risk"],a:3,e:"Residual (net) risk is inherent risk reduced by the quality of risk-management/control implementation."},
{uid:"W3-037",set:"W3",tp:"Treatment",d:"Hard",q:"In the risk-profile rating, the combination producing residual risk is:",o:["Inherent Risk adjusted by Quality of Risk-Management Implementation (KPMR)","Inherent Risk plus dividend","FAR times gearing","Capital minus liabilities"],a:0,e:"Risk Profile Rating = Inherent Risk rating combined with the Quality of Risk-Management Implementation (KPMR), giving net/residual risk."},
{uid:"W3-038",set:"W3",tp:"RiskLimit",d:"Hard",q:"Per the new module, RISK CAPACITY is best described as:",o:["The single-debtor limit","The dividend cap","The maximum NPF allowed","The company's ability to absorb risk based on capital, liquidity and operations"],a:3,e:"Risk capacity is the ability to absorb risk from resources (capital, liquidity, operations); it is the primary constraint on appetite/tolerance."},
{uid:"W3-039",set:"W3",tp:"RiskLimit",d:"Hard",q:"RISK APPETITE in the new module is defined as:",o:["The level of risk a company is WILLING to accept to achieve strategic objectives","The absolute maximum the firm can survive","The auditor's opinion","Zero risk"],a:0,e:"Risk appetite is the level of risk the company is willing to take to meet strategic objectives; it must align with vision/mission/strategy."},
{uid:"W3-040",set:"W3",tp:"RiskLimit",d:"Hard",q:"RISK TOLERANCE is defined as:",o:["The marketing budget","The MAXIMUM risk a company can accept in its operations","The dividend ratio","The minimum return target"],a:1,e:"Risk tolerance is the maximum acceptable operational risk, measured quantitatively and qualitatively and monitored regularly."},
{uid:"W3-041",set:"W3",tp:"RiskLimit",d:"Hard",q:"The new module's example sets NPF tolerance at a maximum of:",o:["5%","10%","25%","2%"],a:0,e:"Example: the company stipulates that the NPF rate must not exceed 5% (a risk-tolerance statement)."},
{uid:"W3-042",set:"W3",tp:"RiskLimit",d:"Hard",q:"In the module example, the single-debtor financing limit is set as a risk tolerance of:",o:["20% of total capital","50% of equity","17.5% of income","10% of total capital"],a:3,e:"Example tolerance: maximum single-debtor financing of 10% of total capital."},
{uid:"W3-043",set:"W3",tp:"RiskLimit",d:"Hard",q:"The hierarchy from widest to narrowest in setting risk limits is:",o:["Tolerance → Capacity → Appetite","Risk Limit → Appetite → Capacity","Appetite → Capacity → Limit","Risk Capacity → Risk Appetite → Risk Tolerance → Risk Limit"],a:3,e:"Risk Bearing Capacity/Capacity is broadest; appetite sits within it; tolerance bounds operations; risk limits are the operational caps."},
{uid:"W3-044",set:"W3",tp:"RiskLimit",d:"Hard",q:"Per the credit-risk example, the appetite vs tolerance for overdue >30 (F5PD) is:",o:["Appetite 2 hours, Tolerance 12 hours","Appetite 5%, Tolerance 4%","Appetite 10%, Tolerance 12.5%","Appetite <4%, Tolerance max 5%"],a:3,e:"Credit risk example: overdue>30 appetite <4%, tolerance max 5%; Fund Facility portfolio appetite max 10B, tolerance 12.5B."},
{uid:"W3-045",set:"W3",tp:"RiskLimit",d:"Hard",q:"Per the operational-risk example, analyst-level turnover appetite vs tolerance is:",o:["Appetite max 10%, Tolerance max 12.5%","Appetite 2h, Tolerance 12h","Appetite 30 days, Tolerance 20 days","Appetite 5%, Tolerance 10%"],a:0,e:"Operational risk example: analyst turnover appetite max 10%, tolerance max 12.5%; RTO variance appetite max 2h, tolerance max 12h."},
{uid:"W3-046",set:"W3",tp:"RiskLimit",d:"Medium",q:"Risk limits must be set for how many risk types?",o:["3 types","12 types","5 types","8 types of risk"],a:3,e:"Risk limits are established across the 8 risk types, derived from appetite and tolerance."},
{uid:"W3-047",set:"W3",tp:"RiskLimit",d:"Hard",q:"Per the new module, a Risk Appetite Statement (RAS) consists of:",o:["Assets, Liabilities, Equity","Risk Bearing Capacity/Risk Capacity, Risk Appetite, and Risk Tolerance","ROA, NPF, Gearing","Vision, Mission, Values"],a:1,e:"The RAS comprises Risk Bearing Capacity/Risk Capacity, Risk Appetite, and Risk Tolerance."},
{uid:"W3-048",set:"W3",tp:"RiskLimit",d:"Hard",q:"Who must establish risk appetite based on comprehensive risk analysis and financial capacity?",o:["The marketing team","External customers","The regulator alone","The Directors"],a:3,e:"Directors set risk appetite from comprehensive risk analysis, considering financial capacity, aligned to vision/mission/strategy."},
{uid:"W3-049",set:"W3",tp:"RiskLimit",d:"Medium",q:"Risk tolerance, per the module, must be:",o:["Set once and never reviewed","Equal to risk capacity","Measured quantitatively and qualitatively and monitored regularly","Hidden from the board"],a:2,e:"Risk tolerance must be measured quantitatively/qualitatively and regularly monitored and adjusted to market/regulatory conditions."},
{uid:"W3-050",set:"W3",tp:"RiskLimit",d:"Hard",q:"Periodic review of risk procedures and limit determination must occur at minimum:",o:["Once every five years","Once a year","Monthly","Never"],a:1,e:"Procedures and limits must be reviewed at least annually, with adequate documentation and clear delegation of authority."},
{uid:"W3-051",set:"W3",tp:"RiskLimit",d:"Hard",q:"Minimum contents of the Risk Management Policy include all EXCEPT:",o:["The company's marketing slogan","Risk appetite, tolerance and limits","Internal control systems in RM implementation","Contingency plans under worst-case scenarios"],a:0,e:"Policy must cover risk determination, methods/MIS, appetite/tolerance/limits, rating, contingency plans and internal control — not slogans."},
{uid:"W3-052",set:"W3",tp:"RiskLimit",d:"Hard",q:"Per the module, the Risk Management Policy should include how many core components (e.g., scope, principles, governance, strategy, RAS, fraud control, risk types, process, training/culture, reporting)?",o:["Exactly 5","Exactly 3","Around 11 components","Exactly 20"],a:2,e:"The policy lists ~11 components: title/objective, scope, principles, governance, strategy, RAS, fraud control, risk types & strategies, process, training/culture, reporting."},
{uid:"W3-053",set:"W3",tp:"Matrix",d:"Hard",q:"A Risk Heat Map plots risk using which two axes?",o:["Assets and liabilities","Likelihood (probability) and Impact (consequence)","Revenue and cost","Appetite and dividend"],a:1,e:"Heat maps plot likelihood against impact to prioritize risks."},
{uid:"W3-054",set:"W3",tp:"Matrix",d:"Hard",q:"Risk-profile measurement in the module considers:",o:["Impact and likelihood of occurrence","Only capital","Only impact","Only the audit fee"],a:0,e:"Risk-profile measurement uses impact and likelihood of occurrence."},
{uid:"W3-055",set:"W3",tp:"Matrix",d:"Medium",q:"Inherent risk rating combined with the quality of risk management produces the:",o:["Dividend yield","FAR","Risk Profile Rating (net/residual)","Gearing ratio"],a:2,e:"Inherent rating + KPMR quality → Risk Profile (net) Rating."},
{uid:"W3-056",set:"W3",tp:"Matrix",d:"Hard",q:"A high-inherent-risk credit portfolio with strong controls would map to a residual risk that is:",o:["Irrelevant to controls","Equal to inherent always","Higher than inherent","Lower than inherent due to effective controls"],a:3,e:"Effective risk-management implementation reduces inherent risk to a lower residual/net level."},
{uid:"W3-057",set:"W3",tp:"Matrix",d:"Medium",q:"In a 5x5 risk matrix, the highest-priority cell is:",o:["Low likelihood and high impact only","High likelihood and low impact only","High likelihood and high impact","Low likelihood and low impact"],a:2,e:"Top-right (high likelihood × high impact) is the highest priority requiring immediate treatment."},
{uid:"W3-058",set:"W3",tp:"3Lines",d:"Hard",q:"In the Three Lines Model, the FIRST line is most directly:",o:["An independent assurance provider","Involved in providing products/services and responsible for managing risk","The external regulator","The shareholders"],a:1,e:"The first line directly provides products/services and owns/manages the risk in operations."},
{uid:"W3-059",set:"W3",tp:"3Lines",d:"Hard",q:"Second-line roles in the Three Lines Model typically include:",o:["Only the GMS","Only marketing","Only internal audit","Compliance, internal controls, IT security, sustainability, quality assurance, ERM"],a:3,e:"Second line supports risk management — compliance, internal control, IT security, sustainability, QA, and broader ERM."},
{uid:"W3-060",set:"W3",tp:"3Lines",d:"Hard",q:"Third-line (internal audit) independence requires all EXCEPT:",o:["Access to people, resources and data","Accountability to the governing body","Freedom from bias/interference in planning and delivery","Reporting operationally to the marketing department"],a:3,e:"Third-line independence needs governing-body accountability, full access, and freedom from interference — not operational subordination to a business unit."},
{uid:"W3-061",set:"W3",tp:"3Lines",d:"Medium",q:"Per the model, the governing body's role includes ensuring:",o:["The independence of internal audit","Customer pricing","Branch decoration","Daily sales targets"],a:0,e:"The governing body provides effective governance, segregation of duties, resources, compliance, and internal-audit independence."},
{uid:"W3-062",set:"W3",tp:"3Lines",d:"Hard",q:"The principle 'creating and protecting value' in the Three Lines Model is achieved by:",o:["The first line acting alone","Outsourcing all risk","All lines working together through communication, cooperation and collaboration","Eliminating internal audit"],a:2,e:"Value is created/protected when all lines collaborate, ensuring reliable, coherent, transparent information for decisions."},
{uid:"W3-063",set:"W3",tp:"3Lines",d:"Medium",q:"Per the model, first- and second-line roles:",o:["Must be done by internal audit","Must always be fully separate","Must always be merged","May be combined or separated depending on the organization"],a:3,e:"First- and second-line roles may be combined or separated based on organizational design."},
{uid:"W3-064",set:"W3",tp:"위원회",d:"Hard",q:"A finance company with assets above Rp 250 billion must establish which committees headed by the Independent Commissioner?",o:["Only a Marketing Committee","Audit Committee, Risk Monitoring Committee, and Remuneration & Nomination Committee","No committees","Only an Audit Committee"],a:1,e:"Assets > Rp 250B require Audit, Risk Monitoring and Remuneration & Nomination committees, each led by the Independent Commissioner."},
{uid:"W3-065",set:"W3",tp:"위원회",d:"Hard",q:"The Risk Management Committee under PADK 48/2025 is:",o:["Non-structural, with members part of the company structure","The same as internal audit","The GMS","A statutory external body"],a:0,e:"The Risk Management Committee is non-structural; its members come from within the company structure."},
{uid:"W3-066",set:"W3",tp:"위원회",d:"Hard",q:"Which entity must a finance company with assets over Rp 250 billion form to monitor risk positions and run stress tests?",o:["Marketing department","Risk Management Work Unit","Customer service desk","Dividend committee"],a:1,e:"Assets > Rp 250B require a Risk Management Work Unit that monitors positions and tests abnormal-condition scenarios."},
{uid:"W3-067",set:"W3",tp:"위원회",d:"Medium",q:"A finance company with total assets under Rp 250 billion must at minimum form a:",o:["Full Risk Management Committee","Disaster recovery center","Sharia board","Risk Management Function"],a:3,e:"Under Rp 250B, a Risk Management Function (officials/employees specifically assigned) suffices."},
{uid:"W3-068",set:"W3",tp:"위원회",d:"Hard",q:"The Audit Committee's roles include all EXCEPT:",o:["Proposing the external auditor candidate to the BOC","Overseeing internal/external auditor work and PSAK conformity","Setting the company's marketing strategy","Monitoring internal-control effectiveness"],a:2,e:"Audit Committee monitors internal control, auditor work and PSAK conformity, and proposes the external auditor — not marketing strategy."},
{uid:"W3-069",set:"W3",tp:"위원회",d:"Hard",q:"The Audit Committee must include at least:",o:["3 marketing staff","The full board","Only the CEO","1 independent member with expertise in audit, finance or accounting"],a:3,e:"It is headed by the Independent Commissioner with ≥1 independent member expert in audit, finance or accounting."},
{uid:"W3-070",set:"W3",tp:"위원회",d:"Medium",q:"The Risk Monitoring Committee evaluates:",o:["Marketing campaigns","Office leases","Compatibility of risk-management policies with implementation and oversees the RM Committee/Unit","Dividend timing"],a:2,e:"It evaluates policy-implementation compatibility and monitors the Risk Management Committee and Work Unit."},
{uid:"W3-071",set:"W3",tp:"위원회",d:"Medium",q:"The Remuneration & Nomination Committee is headed by the Independent Commissioner and includes:",o:["Only marketing staff","The regulator","1 BOC member and 1 officer one level under the Director managing HR","The external auditor"],a:2,e:"It comprises the Independent Commissioner (head), 1 BOC member, and 1 HR-managing officer one level below Director."},
{uid:"W3-072",set:"W3",tp:"위원회",d:"Hard",q:"An IT steering committee is required for NBFIs (POJK 4/2021) with total assets above:",o:["IDR 250 billion","IDR 1 trillion","IDR 100 billion","IDR 500 billion"],a:1,e:"POJK 4/2021 requires an IT steering committee for NBFIs with total assets > IDR 1 trillion."},
{uid:"W3-073",set:"W3",tp:"위원회",d:"Hard",q:"Per POJK 4/2021, an NBFI with total assets over Rp 1 trillion (or IT-majority operations) must have:",o:["Only periodic data backup","Only a marketing plan","A data center and a disaster recovery center","No IT requirements"],a:2,e:"Assets > Rp1T (or IT-majority): data center plus disaster recovery center; mid-tier needs a data center; small tier needs periodic backup."},
{uid:"W3-074",set:"W3",tp:"위원회",d:"Hard",q:"The Sharia Supervisory Board (DPS) must consist of at least:",o:["2 directors","1 Sharia expert elected by GMS, recommended by DSN-MUI","No members","3 commissioners"],a:1,e:"DPS must have ≥1 Sharia expert elected by the GMS on DSN-MUI recommendation, domiciled in Indonesia."},
{uid:"W3-075",set:"W3",tp:"위원회",d:"Medium",q:"Shareholders are prohibited from:",o:["Interfering in the Directors' operational management of the company","Attending the GMS","Receiving dividends","Voting on directors"],a:0,e:"Shareholders may not interfere in the Directors' day-to-day operational management."},
{uid:"W3-076",set:"W3",tp:"위원회",d:"Hard",q:"NBFIs are required to establish which two risk bodies (size-permitting) per the organization structure?",o:["A tax and a legal committee","A dividend and a pricing committee","A marketing and a sales committee","A Risk Management Committee and a Risk Management Function/Unit"],a:3,e:"NBFIs must establish a Risk Management Committee and a Risk Management Function/Unit, scaled to size and complexity."},
{uid:"W3-077",set:"W3",tp:"Culture",d:"Hard",q:"Risk culture per the new module is defined as:",o:["The dividend policy","The values, beliefs and attitudes in identifying and managing risk","The marketing plan","The audit fee schedule"],a:1,e:"Risk culture = values, beliefs and attitudes held in identifying, understanding and managing risk."},
{uid:"W3-078",set:"W3",tp:"Culture",d:"Hard",q:"Implementing a risk culture starts with which element?",o:["Directors/top management actively communicating its importance (tone at the top)","Eliminating policies","Cutting training budgets","Hiding risk reports"],a:0,e:"Implementation begins with leadership tone-at-the-top — actively communicating the importance of risk culture."},
{uid:"W3-079",set:"W3",tp:"Culture",d:"Medium",q:"Which is a risk-culture EDUCATION measure in the module?",o:["Ban all training","Remove the risk policy","Stop reporting","Provide e-learning modules on risk culture accessible anytime"],a:3,e:"Education measures include accessible e-learning modules on risk culture."},
{uid:"W3-080",set:"W3",tp:"Culture",d:"Hard",q:"Integrating risk awareness into HR policies (e.g., as a performance indicator) is part of:",o:["Dividend setting","Embedding/strengthening risk culture","Marketing","Tax planning"],a:1,e:"Risk culture is reinforced by integrating risk awareness into HR policies and performance indicators."},
{uid:"W3-081",set:"W3",tp:"Culture",d:"Hard",q:"Evaluation of risk culture in the module includes:",o:["An annual risk-culture survey and regular effectiveness reports by the RM Unit","Only the share price","Only the audit fee","Only the dividend"],a:0,e:"Risk-culture evaluation uses an annual survey plus regular effectiveness reports from the Risk Management Unit."},
{uid:"W3-082",set:"W3",tp:"Culture",d:"Medium",q:"A 'no-blame risk culture' policy primarily encourages:",o:["Avoiding all reporting","Transparency and accountability in reporting risk","Hiding mistakes","Punishing every error harshly"],a:1,e:"A no-blame culture (with transparency/accountability) encourages open reporting of risks and errors."},
{uid:"W3-083",set:"W3",tp:"Culture",d:"Hard",q:"Holding internal competitions for 'the best risk-mitigation idea' is an example of:",o:["Reinforcing risk culture through engagement","A dividend mechanism","An audit procedure","A marketing campaign"],a:0,e:"Competitions and recognition reinforce risk culture by encouraging proactive mitigation ideas."},
{uid:"W3-084",set:"W3",tp:"Culture",d:"Medium",q:"Risk-culture implementation metrics may include:",o:["Only the logo design","Only the CEO salary","The number of risk reports and mitigation actions taken","Only the office size"],a:2,e:"Implementation is tracked via metrics such as the number of risk reports filed and mitigation actions taken."},
{uid:"W3-085",set:"W3",tp:"Infra",d:"Hard",q:"Risk capacity is described as the PRIMARY constraint on:",o:["Choosing the auditor","Setting the dividend","Marketing spend","Determining risk appetite and risk tolerance"],a:3,e:"Risk capacity (financial/operational capability) is the primary constraint bounding appetite and tolerance."},
{uid:"W3-086",set:"W3",tp:"Infra",d:"Medium",q:"Risk appetite must align with the company's:",o:["Dividend history","Vision, mission and strategy","Marketing slogan","Office location"],a:1,e:"Risk appetite must align with vision, mission and strategy, set by Directors from comprehensive analysis."},
{uid:"W3-087",set:"W3",tp:"Infra",d:"Hard",q:"Strategy roadmap integration in risk policy means risk types/plans are:",o:["Decided by customers","Integrated with the strategy roadmap and corporate objectives","Kept separate from strategy","Set by the auditor"],a:1,e:"The module integrates risk types and management plans with the strategy roadmap and corporate objectives."},
{uid:"W3-088",set:"W3",tp:"ISO31000",d:"Hard",q:"COSO's internal control framework, as depicted in the module, includes which five components?",o:["Identify, Measure, Monitor, Control, Report","Plan, Do, Check, Act, Review","Control Environment, Risk Assessment, Control Activities, Information & Communication, Monitoring Activities","Vision, Mission, Values, Ethics, Goals"],a:2,e:"COSO components: control environment, risk assessment, control activities, information & communication, and monitoring activities."},
{uid:"W3-089",set:"W3",tp:"전략",d:"Hard",q:"Credit-risk inherent parameters under PADK 48/2025 include all EXCEPT:",o:["Composition/concentration of the receivables portfolio","Financing distribution strategy","Quality of receivables and adequacy of provisioning","The company's marketing slogan"],a:3,e:"Credit-risk parameters: distribution strategy, portfolio composition/concentration, receivable quality/provisioning and external factors."},
{uid:"W3-090",set:"W3",tp:"전략",d:"Medium",q:"Market risk consists of which sub-risks?",o:["Interest-rate risk, FX risk and equity risk","Only credit risk","Only legal risk","Only liquidity risk"],a:0,e:"Market risk comprises interest-rate, FX and equity risk on asset/liability/equity positions including derivatives."},
{uid:"W3-091",set:"W3",tp:"전략",d:"Hard",q:"Legal-risk inherent parameters include all EXCEPT:",o:["Weaknesses in contracts or collaborations","Absence or changes in laws/regulations","Emerging litigation processes","Branch headcount"],a:3,e:"Legal-risk parameters: legal/regulatory gaps or changes, contract/collaboration weaknesses, and emerging litigation."},
{uid:"W3-092",set:"W3",tp:"GCG",d:"Hard",q:"At least how many BOC members must reside in Indonesia?",o:["Minimum 1 BOC member lives in Indonesia","No residency requirement","All BOC members must be foreign","Minimum 3 reside abroad"],a:0,e:"At least 1 BOC member must live in Indonesia; min 50% of the BOC must be Indonesian, domiciled in Indonesia."},
{uid:"W3-093",set:"W3",tp:"GCG",d:"Hard",q:"A BOC member must NOT have been a Director in the same company within the past:",o:["1 month","6 months","2 years","6 years"],a:1,e:"A BOC member must not have served as Director in the same company in the preceding 6 months."},
{uid:"W3-094",set:"W3",tp:"Treatment",d:"Hard",q:"Which is the correct full set of standard risk-treatment options?",o:["Identify, Report, Ignore, Archive","Avoid, Transfer, Mitigate (Reduce), Accept","Plan, Do, Check, Act","Buy, Sell, Hold, Hedge"],a:1,e:"The four core treatments are avoid (terminate), transfer, mitigate/reduce, and accept."},
{uid:"W3-095",set:"W3",tp:"RiskLimit",d:"Hard",q:"Risk limits in the module are categorized as overall limits, limits per type of risk, and:",o:["Limits per functional activity or specific risk-exposed transactions","Limits per office","Limits per dividend","Limits per marketing campaign"],a:0,e:"Risk limits cover overall limits, per-risk-type limits and limits per functional activity/specific risk-exposed transactions."},
{uid:"W3-096",set:"W3",tp:"3Lines",d:"Hard",q:"Governance principles in the Three Lines Model emphasize accountability through:",o:["Integrity, leadership and transparency","Marketing and sales","Cost minimization only","Secrecy and isolation"],a:0,e:"Governance accountability rests on integrity, leadership and transparency, with risk-based decision-making and internal-audit assurance."},
{uid:"W3-097",set:"W3",tp:"위원회",d:"Medium",q:"The Risk Management Committee is authorized to prepare:",o:["Office leases","Policies, strategies and guidelines for RM including appetite and tolerance","Marketing budgets","Dividend schedules"],a:1,e:"The RM Committee prepares RM policies/strategies/guidelines, including risk appetite/tolerance, the framework and contingency plans."},
{uid:"W3-098",set:"W3",tp:"Culture",d:"Hard",q:"Which best illustrates 'tone at the top' for risk culture?",o:["Hiding the risk register from staff","Directors actively and visibly communicating the importance of managing risk","Cutting all risk training","Delegating culture entirely to interns"],a:1,e:"Tone at the top = leadership visibly championing risk management, the starting point of risk-culture implementation."},
{uid:"W3-099",set:"W3",tp:"Infra",d:"Hard",q:"The Risk Management Function (small NBFI) is distinctive because the same staff may:",o:["Only market","Only audit","Only set dividends","Carry out both business/operational (risk-taking) and risk-management functions"],a:3,e:"In small NBFIs the function may be held by staff also performing business/operational (risk-taking) roles, scaled to size."},
{uid:"W3-100",set:"W3",tp:"Matrix",d:"Hard",q:"When inherent risk is high but KPMR (control quality) is strong, the resulting risk profile rating is best described as:",o:["Moderated downward toward a lower net rating","Always the maximum rating","Unaffected by controls","Determined solely by capital"],a:0,e:"Strong KPMR lowers the inherent rating toward a better (lower) net risk-profile rating."},
{uid:"W4-001",set:"W4",tp:"개요",d:"Medium",q:"The new K7 Anti-Fraud unit is based on the philosophy that:",o:["Punishment is the only deterrent","Detection alone is sufficient","Prevention is better than cure","Fraud is unavoidable"],a:2,e:"The anti-fraud strategy rests on the philosophy that prevention is better than cure."},
{uid:"W4-002",set:"W4",tp:"POJK",d:"Medium",q:"Which POJK governs the implementation of Anti-Fraud Strategies for financial services institutions?",o:["POJK 28/2024","POJK 12/2024","POJK 43/2024","POJK 48/2024"],a:1,e:"POJK 12/2024 governs anti-fraud strategy implementation; POJK 28/2024 governs SIPELAKU."},
{uid:"W4-003",set:"W4",tp:"POJK",d:"Hard",q:"POJK 12/2024 applies to finance companies starting:",o:["October 23, 2024","January 31, 2025","June 26, 2026","July 1, 2024"],a:0,e:"POJK 12/2024 applies to finance companies from October 23, 2024."},
{uid:"W4-004",set:"W4",tp:"POJK",d:"Hard",q:"The first Anti-Fraud Strategy implementation report under POJK 12/2024 was due:",o:["30 April 2025","31 January 2025","23 October 2024","15 February 2025"],a:1,e:"First AFS implementation report due 31 January 2025; subsequent annual reports each 31 January."},
{uid:"W4-005",set:"W4",tp:"POJK",d:"Medium",q:"Subsequent annual Anti-Fraud Strategy implementation reports are due each:",o:["31 January","15 February","30 April","31 December"],a:0,e:"After the first report, annual AFS reports are due each 31 January."},
{uid:"W4-006",set:"W4",tp:"POJK",d:"Hard",q:"Under POJK 12/2024, the anti-fraud working unit/function is:",o:["Responsible only to marketing","Outside the organization","Responsible to the Directors with direct reporting to the Board of Commissioners","Reporting only to customers"],a:2,e:"The anti-fraud unit/function reports to the Directors and has a direct communication/reporting line to the Board of Commissioners."},
{uid:"W4-007",set:"W4",tp:"POJK",d:"Hard",q:"The head of the anti-fraud working unit must have all EXCEPT:",o:["Adequate experience in related FSI fields","Experience in anti-fraud","A marketing diploma","A certificate of expertise in anti-fraud"],a:2,e:"The head must have an anti-fraud expertise certificate and/or relevant anti-fraud or FSI experience."},
{uid:"W4-008",set:"W4",tp:"POJK",d:"Hard",q:"Which POJK establishes the SIPELAKU track-record system for fraud actors?",o:["POJK 49/2024","POJK 34/2018","POJK 12/2024","POJK 28/2024"],a:3,e:"POJK 28/2024 establishes SIPELAKU; POJK 12/2024 is the Anti-Fraud Strategy regulation."},
{uid:"W4-009",set:"W4",tp:"POJK",d:"Hard",q:"Under POJK 28/2024 (SIPELAKU), users must conduct an internal audit of SIPELAKU use at least:",o:["Never","Once per month","Once per quarter","Once per year"],a:3,e:"SIPELAKU users must run an internal audit of its use at least once per year and protect track-record confidentiality."},
{uid:"W4-010",set:"W4",tp:"POJK",d:"Hard",q:"SIPELAKU users are PROHIBITED from:",o:["Reporting AFS implementation","Distributing obtained track records to parties outside the defined policies/procedures","Protecting confidentiality","Reporting access-rights changes"],a:1,e:"Users may not access/use track records beyond the consideration criteria, nor distribute them to unauthorized parties."},
{uid:"W4-011",set:"W4",tp:"Triangle",d:"Hard",q:"The three elements of the Fraud Triangle in POJK 12/2024 are:",o:["People, Process, Profit","Pressure, Rationalization, Opportunity","Plan, Do, Check","Risk, Reward, Return"],a:1,e:"The fraud triangle: pressure, rationalization and opportunity."},
{uid:"W4-012",set:"W4",tp:"Triangle",d:"Hard",q:"In the fraud triangle, 'Opportunity' typically arises from:",o:["High employee morale","Effective monitoring","Strong segregation of duties","Weak internal controls within the company"],a:3,e:"Opportunity arises from weak internal controls; pressure motivates and rationalization justifies the act."},
{uid:"W4-013",set:"W4",tp:"Triangle",d:"Medium",q:"'Rationalization' in the fraud triangle refers to:",o:["Seeking justification for one's fraudulent activities","A control weakness","An audit finding","External economic pressure"],a:0,e:"Rationalization is the perpetrator's self-justification for committing fraud."},
{uid:"W4-014",set:"W4",tp:"Triangle",d:"Medium",q:"'Pressure' in the fraud triangle drives a person to:",o:["Report wrongdoing","Seek opportunities to commit fraud","Strengthen controls","Resign immediately"],a:1,e:"Pressure leads a person to seek opportunities to commit fraud."},
{uid:"W4-015",set:"W4",tp:"Fraud유형",d:"Medium",q:"Per POJK 12/2024, 'Corruption' as a fraud type includes all EXCEPT:",o:["Bribery","Conflict of interest","Extortion","Honest financial reporting"],a:3,e:"Corruption includes conflict of interest, bribery, unauthorized receipt and extortion — not honest reporting."},
{uid:"W4-016",set:"W4",tp:"Fraud유형",d:"Medium",q:"Which is a recognized fraud type under POJK 12/2024?",o:["Misuse of assets (cash, supply, other assets)","Standard marketing","Routine audit","Timely tax filing"],a:0,e:"Fraud types: corruption, misuse of assets, financial statement fraud, leaking confidential information, and other equivalent acts."},
{uid:"W4-017",set:"W4",tp:"Fraud유형",d:"Hard",q:"Financial statement fraud under POJK 12/2024 involves:",o:["Filing taxes on time","Whistleblowing","Exaggerating or reducing reported figures","Conducting surprise audits"],a:2,e:"Financial statement fraud involves overstating (exaggerate) or understating (reduce) reported figures."},
{uid:"W4-018",set:"W4",tp:"Fraud유형",d:"Hard",q:"Which is listed among fraud actions in POJK 12/2024?",o:["Paying a dividend","Leaking confidential information","Holding a board meeting","Submitting an annual report"],a:1,e:"Leaking confidential information is an enumerated fraud action, alongside corruption, asset misuse and statement fraud."},
{uid:"W4-019",set:"W4",tp:"4Pillars",d:"Hard",q:"The Anti-Fraud Strategy consists of which four pillars?",o:["Prevention; Detection; Investigation/Reporting/Sanctions; Monitoring/Evaluation/Follow-Up","Identify; Measure; Monitor; Control","Avoid; Transfer; Accept; Mitigate","Plan; Do; Check; Act"],a:0,e:"Four pillars: Prevention; Detection; Investigation, Reporting & Sanctions; Monitoring, Evaluation & Follow-Up."},
{uid:"W4-020",set:"W4",tp:"4Pillars",d:"Hard",q:"The objective of the PREVENTION pillar is:",o:["Reducing the potential occurrence of fraud","Reporting to PPATK","Conducting investigations","Imposing sanctions"],a:0,e:"Prevention aims to reduce the potential occurrence of fraud (awareness, vulnerability ID, KYE policy)."},
{uid:"W4-021",set:"W4",tp:"4Pillars",d:"Hard",q:"The DETECTION pillar primarily aims to:",o:["Follow up on findings","Reduce potential fraud","Impose sanctions","Identify and discover fraud incidents"],a:3,e:"Detection identifies/discovers fraud via whistleblowing, surprise inspections and monitoring systems."},
{uid:"W4-022",set:"W4",tp:"4Pillars",d:"Hard",q:"Which tools belong to the PREVENTION pillar?",o:["Anti-Fraud Awareness, Vulnerability Identification, Employee Due Diligence (KYE) Policy","Whistleblowing, surprise audits, monitoring system","Investigation, reporting, sanctions","Monitoring, evaluation, follow-up"],a:0,e:"Prevention tools: anti-fraud awareness, vulnerability identification and Know-Your-Employee (employee due diligence) policy."},
{uid:"W4-023",set:"W4",tp:"4Pillars",d:"Hard",q:"Which tools belong to the DETECTION pillar?",o:["Whistleblowing, Surprise Inspections, Monitoring System","Anti-fraud awareness, KYE policy","Monitoring, evaluation, follow-up","Investigation, sanctions"],a:0,e:"Detection tools: whistleblowing, surprise inspections and a monitoring system."},
{uid:"W4-024",set:"W4",tp:"4Pillars",d:"Hard",q:"Which three components form the third pillar (Investigation, Reporting & Sanctions)?",o:["Monitoring, evaluation, follow-up","Investigation, Reporting, Imposition of Sanctions","Avoid, transfer, accept","Awareness, vulnerability, KYE"],a:1,e:"Pillar 3: investigation, reporting, and imposition of sanctions for fraud incidents."},
{uid:"W4-025",set:"W4",tp:"4Pillars",d:"Hard",q:"Which three components form the fourth pillar?",o:["Monitoring, Evaluation, Follow-Up","Investigation, reporting, sanctions","Awareness, vulnerability, KYE","Whistleblowing, surprise audit, monitoring"],a:0,e:"Pillar 4: monitoring, evaluation and follow-up of fraud incidents and required actions."},
{uid:"W4-026",set:"W4",tp:"4Pillars",d:"Medium",q:"A 'surprise audit' is an anti-fraud tool under which pillar?",o:["Investigation","Prevention","Monitoring","Detection"],a:3,e:"Surprise audits (secret testing/examination) fall under the Detection pillar to heighten alertness."},
{uid:"W4-027",set:"W4",tp:"4Pillars",d:"Hard",q:"Whistleblower protection under the Detection pillar requires:",o:["Protection for fraud reporters and a reporting system with follow-up mechanism","No follow-up","Punishing reporters","Public disclosure of reporter identity"],a:0,e:"Detection requires whistleblower protection, fraud-report regulations, and a reporting/follow-up mechanism."},
{uid:"W4-028",set:"W4",tp:"4Pillars",d:"Hard",q:"Know Your Employee (KYE) policy under Prevention involves:",o:["Setting interest rates","Marketing products","Choosing the auditor","Recognizing/monitoring employee character, integrity, relationships, behavior and lifestyle"],a:3,e:"KYE recognizes and monitors employee character, integrity, relationships, attitudes/behaviors and lifestyle, with sound recruitment."},
{uid:"W4-029",set:"W4",tp:"4Pillars",d:"Medium",q:"Vulnerability identification under Prevention includes spotting:",o:["Strong controls","Inadequate financial controls and unclear policies/procedures","High dividends","Effective monitoring"],a:1,e:"Vulnerabilities include lack of training, excessive risk-reward culture, unclear policies, inadequate financial controls and weak board direction."},
{uid:"W4-030",set:"W4",tp:"4Pillars",d:"Medium",q:"Anti-Fraud Awareness under Prevention includes:",o:["Running surprise audits","Filing STRs","Imposing sanctions","Preparing/disseminating an anti-fraud declaration and culture programs"],a:3,e:"Awareness includes an anti-fraud declaration, an employee anti-fraud culture program and consumer fraud-awareness programs."},
{uid:"W4-031",set:"W4",tp:"4Aspects",d:"Hard",q:"The Substance of Anti-Fraud Strategy (SAF) reporting under POJK 12/2024 covers which four aspects?",o:["Vision; Mission; Values; Ethics","Prevention; Detection; Investigation/Reporting/Sanctions; Monitoring/Evaluation/Follow-up","Identify; Assess; Treat; Report","Plan; Do; Check; Act"],a:1,e:"SAF reporting substance mirrors the four pillars: prevention; detection; investigation/reporting/sanctions; monitoring/evaluation/follow-up."},
{uid:"W4-032",set:"W4",tp:"4Aspects",d:"Hard",q:"Under SAF 'Prevention', minimum measures include all EXCEPT:",o:["Policy of getting to know the employee","Anti-fraud awareness","Identification of vulnerabilities","Imposition of sanctions"],a:3,e:"Prevention minimum: anti-fraud awareness, vulnerability identification, KYE policy; sanctions belong to the investigation pillar."},
{uid:"W4-033",set:"W4",tp:"4Aspects",d:"Hard",q:"Under SAF 'Detection', minimum measures include:",o:["Investigation and sanctions","Whistleblowing complaint handling, surprise audit, surveillance system","Monitoring and follow-up","Vision and mission"],a:1,e:"Detection minimum: whistleblowing/complaint mechanisms, surprise audit and surveillance system."},
{uid:"W4-034",set:"W4",tp:"4Aspects",d:"Medium",q:"Under SAF 'Investigation, reporting and sanctions', the minimum steps are:",o:["Awareness, vulnerability, KYE","Investigation, reporting, imposition of sanctions","Monitoring, evaluation, follow-up","Plan, do, check"],a:1,e:"This aspect's minimum steps: investigation, reporting and imposition of sanctions."},
{uid:"W4-035",set:"W4",tp:"4Aspects",d:"Medium",q:"Under SAF 'Monitoring, evaluation and follow-up', the minimum steps are:",o:["Investigation, reporting, sanctions","Surprise audit, whistleblowing","Monitoring, evaluation, follow-up","Awareness, vulnerability, KYE"],a:2,e:"This aspect's minimum steps: monitoring, evaluation and follow-up."},
{uid:"W4-036",set:"W4",tp:"4Aspects",d:"Hard",q:"An example of activity the anti-fraud strategy must help prevent (per POJK 12/2024) is:",o:["Filing timely reports","Paying salaries","Use of accounts for online gambling or fictitious online investment","Holding board meetings"],a:2,e:"Prevention covers misuse for criminal acts such as online gambling, online fraud/fictitious investment, online prostitution and other economic crimes."},
{uid:"W4-037",set:"W4",tp:"4Aspects",d:"Hard",q:"The anti-fraud strategy implementation must involve which parties?",o:["Only regulators","Only auditors","Customers, internal FSI parties, and other parties","Only the CEO"],a:2,e:"Implementation must involve customers, internal FSI parties and other related parties."},
{uid:"W4-038",set:"W4",tp:"평가",d:"Hard",q:"The Q6 anti-fraud unit (Monitoring the Implementation) requires the BOC to ensure:",o:["More marketing","Documented follow-up on anti-fraud recommendations","Lower interest rates","Higher dividends"],a:1,e:"Monitoring requires ensuring availability of periodic anti-fraud/internal-audit reports and documented follow-up on recommendations."},
{uid:"W4-039",set:"W4",tp:"평가",d:"Medium",q:"Monitoring the anti-fraud strategy includes ensuring availability of:",o:["Only marketing reports","Only tax returns","Only dividend records","Periodic reports from the anti-fraud unit and internal audit"],a:3,e:"Monitoring ensures periodic reports from the anti-fraud unit and internal audit are available and reviewed."},
{uid:"W4-040",set:"W4",tp:"평가",d:"Hard",q:"Effective monitoring of fraud handling tracks which data?",o:["Only the share price","Only office rent","Only the logo","Statistics on whistleblowing reports and their follow-up"],a:3,e:"Fraud-monitoring data includes whistleblowing-report statistics, follow-up status and loss amounts."},
{uid:"W4-041",set:"W4",tp:"평가",d:"Hard",q:"Operational review of the anti-fraud strategy is performed to:",o:["Reduce headcount","Increase the dividend","Change the logo","Verify the strategy is implemented and effective in practice"],a:3,e:"Operational review evaluates real-world implementation and effectiveness of the anti-fraud strategy."},
{uid:"W4-042",set:"W4",tp:"평가",d:"Medium",q:"Evaluating the anti-fraud PREVENTION strategy is based on:",o:["Dividend figures","Random guesses","Marketing data only","Monitoring results"],a:3,e:"The prevention strategy is evaluated based on periodic monitoring results."},
{uid:"W4-043",set:"W4",tp:"평가",d:"Hard",q:"Site visits in fraud-case monitoring are conducted to:",o:["Sell products","Recruit staff","Set dividends","Follow up on fraud cases when necessary"],a:3,e:"The monitoring mechanism may include site visits, when necessary, to follow up on fraud cases."},
{uid:"W4-044",set:"W4",tp:"평가",d:"Hard",q:"Evaluation of anti-fraud effectiveness should be supported by:",o:["Marketing surveys only","Customer star ratings only","Internal audit's evaluation of strategy effectiveness","Share-price charts"],a:2,e:"Effectiveness evaluation draws on internal audit's assessment and follow-up monitoring of prior fraud recommendations."},
{uid:"W4-045",set:"W4",tp:"InternalAudit",d:"Hard",q:"Internal Audit sits in which line of the Three Lines Model?",o:["3rd line (independent assurance)","2nd line","1st line","Outside all lines"],a:0,e:"Internal audit is the 3rd line, providing independent assurance over governance and risk management."},
{uid:"W4-046",set:"W4",tp:"InternalAudit",d:"Hard",q:"The internal-audit standard referenced in the new module is:",o:["COSO ERM only","Basel III","The International Professional Practices Framework (IPPF) from the IIA","ISO 9001"],a:2,e:"The module cites the IPPF of Internal Auditing from the Institute of Internal Auditors (IIA)."},
{uid:"W4-047",set:"W4",tp:"InternalAudit",d:"Hard",q:"The Q7 unit 'Monitoring the Follow-up Results of Internal Audit Findings' emphasizes that an effective audit:",o:["Ignores recommendations","Is only about sanctions","Does not end at identifying findings — following up ensures quality and added value","Ends once findings are listed"],a:2,e:"An effective internal-audit process does not end with findings; follow-up is a proactive step ensuring quality, efficiency and value."},
{uid:"W4-048",set:"W4",tp:"InternalAudit",d:"Medium",q:"A required internal-audit work attitude per the module is:",o:["Objectivity in evaluating follow-up to audit results","Bias toward management","Avoiding documentation","Prioritizing marketing"],a:0,e:"Work attitudes include integrity, objectivity in evaluating follow-up, and care/thoroughness in processing data."},
{uid:"W4-049",set:"W4",tp:"InternalAudit",d:"Hard",q:"The internal-audit follow-up unit must analyze the implementation of follow-up actions to assess:",o:["The marketing budget","The adequacy of the follow-up plan and its realization","The dividend ratio","The office layout"],a:1,e:"PC 1.1 requires analyzing follow-up implementation to assess adequacy of the follow-up plan."},
{uid:"W4-050",set:"W4",tp:"InternalAudit",d:"Medium",q:"Audit findings, conclusions and recommendations should be prepared to support:",o:["Dividend decisions","Pricing changes","Follow-up plans based on audit results","Marketing campaigns"],a:2,e:"A core skill is preparing findings, conclusions and recommendations for follow-up plans from audit results."},
{uid:"W4-051",set:"W4",tp:"InternalAudit",d:"Hard",q:"Results of follow-up implementation analysis are communicated to the auditee to:",o:["Obtain corrective solutions and adjust the follow-up plan","Avoid corrections","Hide problems","End the relationship"],a:0,e:"Findings are communicated to the auditee to obtain corrective solutions and adjust the follow-up plan."},
{uid:"W4-052",set:"W4",tp:"RBA",d:"Hard",q:"Risk-Based Auditing (RBA) is an approach that focuses on:",o:["Auditing every transaction equally","Identifying, analyzing and mitigating the most significant risks","Marketing the audit function","Avoiding all risk"],a:1,e:"RBA focuses audit effort on the most significant organizational risks."},
{uid:"W4-053",set:"W4",tp:"RBA",d:"Medium",q:"Which is a basic principle of Risk-Based Auditing?",o:["Avoid collaboration","Focus on significant risks and use a data-driven approach","Audit randomly","Ignore risk data"],a:1,e:"RBA principles: focus on significant risks, data-driven approach, collaboration with risk management, continuous improvement."},
{uid:"W4-054",set:"W4",tp:"RBA",d:"Hard",q:"Per the module's RBA success indicators, the target for 'percentage of risk-based audits' is:",o:["≤30% of audits","≥60% of audits","≥90% of all audits","exactly 50%"],a:2,e:"Industry-standard target: ≥90% of all audits are risk-based (example org result 85% → improvement needed)."},
{uid:"W4-055",set:"W4",tp:"RBA",d:"Hard",q:"Per the RBA success indicators, the target for 'findings related to high risk' is:",o:["≤30% of findings","exactly 50%","≥60% of total findings","≥90% of findings"],a:2,e:"Target: ≥60% of findings relate to high risk (example result 50% → greater focus on key risks required)."},
{uid:"W4-056",set:"W4",tp:"RBA",d:"Hard",q:"Per the RBA success indicators, the target completion time for risk-based audits is:",o:["≤90 days","≤180 days","≤30 days","≤7 days"],a:2,e:"Target completion time ≤30 days (example result 35 days → greater efficiency required)."},
{uid:"W4-057",set:"W4",tp:"RBA",d:"Hard",q:"Per the RBA success indicators, the target audit-recommendation implementation rate is:",o:["≥90%","≥50%","≥60%","≥30%"],a:0,e:"Target recommendation implementation rate ≥90% (example result 88% → nearly meeting target)."},
{uid:"W4-058",set:"W4",tp:"RBA",d:"Hard",q:"Which aspects are evaluated when assessing RBA implementation?",o:["Capital; liquidity; FX","Vision; mission; values","Marketing; sales; pricing","Risk-based audit planning; audit execution; reporting and follow-up"],a:3,e:"RBA evaluation assesses planning, execution, and reporting & follow-up of risk-based audits."},
{uid:"W4-059",set:"W4",tp:"RBA",d:"Hard",q:"Evaluation techniques for RBA implementation include all EXCEPT:",o:["Comparison with IPPF-IIA standards/best practices","Simulated audits and observations","Risk data analysis and risk assessment","Setting the marketing budget"],a:3,e:"Techniques: risk-data analysis/assessment, comparison with IPPF-IIA standards, and simulated audits/observations."},
{uid:"W4-060",set:"W4",tp:"RBA",d:"Medium",q:"RBA success must be measured using:",o:["Share-price targets","Measurable key performance indicators (KPIs)","Subjective opinions only","Marketing metrics"],a:1,e:"RBA success indicators must use measurable KPIs benchmarked against industry-standard targets."},
{uid:"W4-061",set:"W4",tp:"RBA",d:"Hard",q:"A recommended RBA improvement is to align the audit plan with:",o:["The dividend schedule","The marketing calendar","The office lease","The organization's risk appetite"],a:3,e:"Integration with business/risk management means aligning the audit plan with the organization's risk appetite and building a risk-based culture."},
{uid:"W4-062",set:"W4",tp:"RCA",d:"Hard",q:"Root Cause Analysis (RCA) in the audit context is used to:",o:["Increase revenue","Market the audit","Identify the underlying cause of findings, not just symptoms","Reduce headcount"],a:2,e:"RCA seeks the underlying cause of audit findings so corrective actions address root causes, not symptoms."},
{uid:"W4-063",set:"W4",tp:"RCA",d:"Medium",q:"Training auditors on RCA is recommended to:",o:["Cut the audit budget","Improve auditor competence in addressing root causes","Increase dividends","Avoid documentation"],a:1,e:"The module recommends training on risk-based auditing and root-cause analysis to improve auditor competence."},
{uid:"W4-064",set:"W4",tp:"RCA",d:"Hard",q:"Why is RCA preferable to fixing only the immediate symptom of a finding?",o:["Symptoms never recur","It avoids reporting","It prevents recurrence by addressing the underlying cause","It is faster to ignore causes"],a:2,e:"Addressing root causes prevents recurrence; treating only symptoms allows the problem to return."},
{uid:"W4-065",set:"W4",tp:"RCA",d:"Medium",q:"RCA results most directly inform:",o:["Office decor","Corrective follow-up actions and recommendations","Dividend amounts","Marketing slogans"],a:1,e:"RCA outputs feed corrective follow-up actions and recommendations to prevent recurrence."},
{uid:"W4-066",set:"W4",tp:"Barrier",d:"Hard",q:"Common barriers to RBA implementation include all EXCEPT:",o:["Management resistance","Limited resources and technology","Abundant accurate risk data","Lack of accurate risk data"],a:2,e:"Barriers: lack of accurate risk data, weak auditor understanding of RBA, management resistance, limited resources/technology."},
{uid:"W4-067",set:"W4",tp:"Barrier",d:"Medium",q:"To overcome the barrier of weak risk identification, the module recommends:",o:["Cutting auditor training","Ignoring risk data","Stopping all audits","Improving collaboration with the risk-management team and using technology"],a:3,e:"Strengthening risk identification: improve collaboration with risk management and use technology in risk identification."},
{uid:"W4-068",set:"W4",tp:"Barrier",d:"Hard",q:"'Management resistance' as an RBA barrier is best mitigated by:",o:["Building a risk-based culture and demonstrating audit value","Concealing findings","Eliminating internal audit","Reducing transparency"],a:0,e:"Mitigation includes building a risk-based culture across the organization and aligning audit with strategy to gain buy-in."},
{uid:"W4-069",set:"W4",tp:"평가",d:"Hard",q:"Which is a Follow-up Action Adequacy Analysis Technique in the module?",o:["Logo redesign","Dividend declaration","Share buyback","Checklist technique"],a:3,e:"Techniques: checklist, interview, field observation, benchmarking and focus group discussion."},
{uid:"W4-070",set:"W4",tp:"평가",d:"Hard",q:"The 'Benchmarking' follow-up technique compares follow-up results with:",o:["The dividend ratio","The marketing budget","The office rent","Best practices in the industry or other organizations"],a:3,e:"Benchmarking compares follow-up realization against industry/other-organization best practices."},
{uid:"W4-071",set:"W4",tp:"평가",d:"Medium",q:"The 'Field Observation' follow-up technique is used to:",o:["Ensure corrective actions are implemented as recommended","Pay dividends","Set interest rates","Market products"],a:0,e:"Field observation verifies that corrective actions are actually implemented as recommended."},
{uid:"W4-072",set:"W4",tp:"평가",d:"Medium",q:"The 'Interview' follow-up technique is used to:",o:["Replace all documentation","Avoid auditees","Set the dividend","Obtain additional information and verify progress from responsible parties"],a:3,e:"Interviews gather additional information and verify progress directly from responsible parties."},
{uid:"W4-073",set:"W4",tp:"평가",d:"Hard",q:"The 'Checklist' follow-up technique primarily checks:",o:["The dividend yield","The adequacy of structured, systematic follow-up implementation","The share price","The marketing reach"],a:1,e:"A checklist verifies adequacy of structured and systematic follow-up implementation."},
{uid:"W4-074",set:"W4",tp:"평가",d:"Hard",q:"'Focus Group Discussion' as a follow-up technique is used to:",o:["Collectively evaluate progress with those responsible for follow-up","Sell products","Set dividends","Recruit staff"],a:0,e:"FGDs bring together follow-up owners to collectively evaluate progress and corrective solutions."},
{uid:"W4-075",set:"W4",tp:"SMART",d:"Hard",q:"SMART criteria for setting audit/training objectives stand for:",o:["Specific, Measurable, Achievable, Relevant, Time-bound","Simple, Modern, Agile, Robust, Tested","Strategic, Material, Audited, Reported, Tracked","Standard, Measured, Approved, Recorded, Timed"],a:0,e:"SMART = Specific, Measurable, Achievable, Relevant, Time-bound."},
{uid:"W4-076",set:"W4",tp:"SMART",d:"Medium",q:"A SMART follow-up target should include a:",o:["Defined deadline (time-bound) and measurable metric","Dividend figure","Vague aspiration","Marketing slogan"],a:0,e:"SMART targets are measurable and time-bound, enabling objective follow-up evaluation."},
{uid:"W4-077",set:"W4",tp:"SMART",d:"Hard",q:"Which objective is NOT SMART?",o:["'Reduce overdue findings to 0 by Q4'","'Achieve ≥90% recommendation implementation within 90 days'","'Complete risk-based audits within 30 days'","'Improve audit quality somehow, someday'"],a:3,e:"A vague, unmeasurable, open-ended objective fails the SMART criteria."},
{uid:"W4-078",set:"W4",tp:"SMART",d:"Medium",q:"Making a follow-up target 'Measurable' allows the auditor to:",o:["Objectively assess whether the action was adequate","Increase the dividend","Skip evaluation","Avoid reporting"],a:0,e:"Measurability lets the auditor objectively judge follow-up adequacy against a defined metric."},
{uid:"W4-079",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"The Kirkpatrick model evaluates training/program effectiveness across which four levels?",o:["Plan, Do, Check, Act","Prevention, Detection, Investigation, Monitoring","Reaction, Learning, Behavior, Results","Specific, Measurable, Achievable, Relevant"],a:2,e:"Kirkpatrick's four levels: Reaction, Learning, Behavior, Results."},
{uid:"W4-080",set:"W4",tp:"Kirkpatrick",d:"Medium",q:"Kirkpatrick Level 1 (Reaction) measures:",o:["Organizational results","Long-term ROI","Participants' immediate response/satisfaction with the program","Behavior change on the job"],a:2,e:"Level 1 (Reaction) captures participants' immediate response and satisfaction."},
{uid:"W4-081",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"Kirkpatrick Level 3 (Behavior) measures:",o:["Whether learning is applied on the job (behavior change)","Final business results","Immediate satisfaction","Knowledge gained in class"],a:0,e:"Level 3 (Behavior) assesses whether trainees apply learning on the job."},
{uid:"W4-082",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"Kirkpatrick Level 4 (Results) measures:",o:["Attendance","Quiz scores","Classroom satisfaction","The ultimate organizational outcomes/impact of the program"],a:3,e:"Level 4 (Results) evaluates the ultimate organizational impact and outcomes."},
{uid:"W4-083",set:"W4",tp:"Kirkpatrick",d:"Medium",q:"Kirkpatrick Level 2 (Learning) measures:",o:["Business results","Job behavior change","Knowledge, skills or attitudes gained","Participant satisfaction"],a:2,e:"Level 2 (Learning) measures the knowledge, skills and attitudes acquired."},
{uid:"W4-084",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"An anti-fraud training that improves satisfaction but does not change on-the-job behavior succeeds at which Kirkpatrick level only?",o:["Level 3 (Behavior)","Level 1 (Reaction)","Level 2 only is impossible","Level 4 (Results)"],a:1,e:"High satisfaction without behavior change indicates success at Level 1 (Reaction) but not Levels 3-4."},
{uid:"W4-085",set:"W4",tp:"QAIP",d:"Hard",q:"QAIP (Quality Assurance and Improvement Program) for internal audit is required by:",o:["POJK 51/2017","The IPPF/IIA standards","The GMS only","The marketing department"],a:1,e:"The IPPF/IIA standards require a Quality Assurance and Improvement Program (QAIP) for the internal-audit function."},
{uid:"W4-086",set:"W4",tp:"QAIP",d:"Hard",q:"A QAIP includes which two types of assessments?",o:["Tax and legal filings","Marketing and sales reviews","Dividend and capital reviews","Internal assessments and external assessments"],a:3,e:"QAIP comprises ongoing/periodic internal assessments and periodic external assessments."},
{uid:"W4-087",set:"W4",tp:"QAIP",d:"Medium",q:"The purpose of a QAIP is to:",o:["Evaluate conformance with standards and drive continuous improvement of internal audit","Market the company","Set interest rates","Increase the dividend"],a:0,e:"QAIP evaluates the internal-audit function's conformance with standards and promotes continuous improvement."},

const KEY="A B C D".split(" ");
function wkey(set){return "sppi_wrong_"+set}
function getW(set){try{return JSON.parse(localStorage.getItem(wkey(set)))||[]}catch(e){return[]}}
function setW(set,a){try{localStorage.setItem(wkey(set),JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrongUid(uid){const [set,id]=uid.split("-");const w=getW(set);if(!w.includes(id)){w.push(id);setW(set,w)}}
function rmWrongUid(uid){const [set,id]=uid.split("-");setW(set,getW(set).filter(x=>x!==id))}
function allWrongUids(){let r=[];for(const set of ["W1","W2","W3","W4"]){r=r.concat(getW(set).map(id=>set+"-"+id))}return r}
function byUid(uid){return BANK.find(q=>q.uid===uid)}
function clearAllWrong(){for(const set of ["W1","W2","W3","W4"])setW(set,[])}
// 실전 비중 가중: W3(거버넌스·리스크) 최대, W4·W1·W2 순
const WEIGHTS={W1:8, W2:8, W3:14, W4:10}; // 합 40
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function buildExam(){
  let picked=[];
  for(const set of ["W1","W2","W3","W4"]){
    const pool=BANK.filter(q=>q.set===set);
    picked=picked.concat(shuffle(pool).slice(0, WEIGHTS[set]));
  }
  // 전체 순서도 섞고 보기도 셔플
  return shuffle(picked).map(shuffleOpts);
}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(allWrongUids().map(byUid).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp.map(shuffleOpts);cur=0;answers=[];render();return;
  }
  quiz=buildExam();
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">종합 모의고사</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:4px">전 범위 400문항 풀에서 <b>40문항</b> 랜덤 출제</p>
      <div class="mix">
        <span class="setbadge setW1">W1 · 8</span>
        <span class="setbadge setW2">W2 · 8</span>
        <span class="setbadge setW3">W3 · 14</span>
        <span class="setbadge setW4">W4 · 10</span>
      </div>
      <p style="font-size:12px;color:#9a9788;margin:8px 0 16px">실전 비중 가중(거버넌스·리스크 최대) · 매회 새 문항 · 보기 셔플</p>
      <div class="start-opts">
        <button onclick="start()">모의고사 시작 (40문항) <span class="desc">실전과 동일하게 한 회차 응시 → 종료 후 주차별 점수 분석</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${allWrongUids().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${allWrongUids().length}</span><span class="desc">W1~W4 전 범위 누적 오답 통합 재시험 — 맞히면 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${allWrongUids().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에 (Set별)</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=allWrongUids().map(byUid).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트 (통합)</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항 · W1~W4 통합</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid"><span class="setbadge set${q.set}">${q.set}</span> &nbsp;${q.uid} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrongUid('${q.uid}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('W1~W4 통합 오답노트를 전부 비웁니다. 계속?')){clearAllWrong();notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span><span class="setbadge set${q.set}">${q.set}</span> &nbsp;${q.uid}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={uid:q.uid,set:q.set,correct:__c,picked:i};
  if(__c) rmWrongUid(q.uid); else addWrongUid(q.uid);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const bySet={};
  answers.forEach(a=>{bySet[a.set]=bySet[a.set]||{r:0,n:0};bySet[a.set].n++;if(a.correct)bySet[a.set].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  const order=["W1","W2","W3","W4"];
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${order.filter(s=>bySet[s]).map(s=>`<div class="row"><span><span class="setbadge set${s}">${s}</span></span><b>${bySet[s].r} / ${bySet[s].n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">${x.q.uid} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,68)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="start()">새 회차 응시</button>
        ${allWrongUids().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${allWrongUids().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
