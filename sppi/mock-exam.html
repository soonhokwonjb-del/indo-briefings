{uid:"W3-065",set:"W3",tp:"RiskLimit",d:"Medium",q:"In the Appetite vs Tolerance examples, 'Day Alternate Funding' for Liquidity Risk has an appetite of Min 30 days and a tolerance of Min 20 days. What does this ordering illustrate?",o:["Appetite is always numerically smaller than tolerance","For funding-days metrics, appetite (more conservative) is a longer minimum than tolerance, the reverse of ratio-based limits like NPF","Tolerance and appetite are identical for liquidity risk","Day Alternate Funding is a credit risk metric"],a:1,e:"Day Alternate Funding은 일수가 길수록 보수적 → Appetite(Min 30일) > Tolerance(Min 20일). NPF·Current Ratio처럼 'Appetite가 항상 작다'는 통념과 방향 반대."},
{uid:"W4-001",set:"W4",tp:"개요",d:"Easy",q:"What is the underlying philosophy of an anti-fraud strategy under POJK 12/2024?",o:["Punish all employees to create deterrence","Outsource all fraud detection to external auditors","Prevention is better than cure, building a culture of integrity, transparency, and accountability","Maximize short-term recovery of fraud losses"],a:2,e:"교재 Philosophy: 'Prevention is better than cure' — integrity·transparency·accountability 문화 구축이 핵심."},
{uid:"W4-002",set:"W4",tp:"POJK",d:"Easy",q:"Which OJK regulation is the primary legal basis for implementing anti-fraud strategies for financial services institutions?",o:["POJK 35 of 2018","POJK 48 of 2024","POJK 12 of 2024","POJK 42 of 2024"],a:2,e:"POJK 12/2024 = Implementation of Anti-Fraud Strategies for LJK. Finance Company 포함 1차 법적 근거."},
{uid:"W4-003",set:"W4",tp:"Triangle",d:"Medium",q:"According to the training module, the Fraud Triangle consists of which three elements?",o:["Pressure, Rationalization, Opportunity","Motivation, Rationalization, Capability","Pressure, Greed, Opportunity","Pressure, Capability, Opportunity"],a:0,e:"교재 Basic Principles: Pressure·Rationalization·Opportunity 3요소. Capability 추가 4요소(Fraud Diamond)는 교재 범위 아님."},
{uid:"W4-004",set:"W4",tp:"Triangle",d:"Hard",q:"Within the Fraud Triangle, which element can the organization MOST directly control through stronger internal controls?",o:["Opportunity","Pressure","Rationalization","All three equally"],a:0,e:"Opportunity는 내부통제 약화로 발생 — 통제 강화로 직접 차단 가능. Pressure·Rationalization은 개인 심리 영역."},
{uid:"W4-005",set:"W4",tp:"Fraud유형",d:"Medium",q:"Which of the following is classified as 'Corruption' type fraud in the training module?",o:["Overstatement of net income","Cash misappropriation","Bribery and extortion","Inventory misappropriation"],a:2,e:"교재 Corruption = 이해상충·뇌물(bribery)·불법수수·강요(extortion). Cash/inventory misappropriation은 Asset Misappropriation."},
{uid:"W4-006",set:"W4",tp:"Fraud유형",d:"Hard",q:"Which statement about Financial Reporting Fraud is CORRECT per the training module?",o:["Only overstatement of net worth/income qualifies","It is not considered fraud under POJK 12/2024","Only understatement of net worth/income qualifies","Both overstatement and understatement of net worth/income qualify"],a:3,e:"교재: Financial Reporting Fraud = overstatement 또는 understatement 둘 다. 과대계상만 fraud는 오답."},
{uid:"W4-007",set:"W4",tp:"4Aspects",d:"Medium",q:"How many aspects make up 'Fraud Control' according to the training module?",o:["Four aspects","Five aspects","Three aspects","Six aspects"],a:0,e:"교재 Fraud Control Aspects 4개: Active Supervision / Policies and Procedures / Organizational Structure / Control and Monitoring."},
{uid:"W4-008",set:"W4",tp:"4Aspects",d:"Hard",q:"The 'four eyes principle' is an example of which fraud control aspect?",o:["Control and Monitoring","Organizational Structure and Accountability","Policies and Procedures","Active Supervision of Directors & BOC"],a:0,e:"교재: four eyes principle(기능 분리)은 Control and Monitoring 측면 예시."},
{uid:"W4-009",set:"W4",tp:"4Pillars",d:"Medium",q:"How many pillars make up the Anti-Fraud Strategy under POJK 12/2024?",o:["Four pillars","Two pillars","Three pillars","Five pillars"],a:0,e:"4 Pillars: Prevention / Detection / Investigation, Reporting and Sanctions / Monitoring, Evaluation and Follow-up."},
{uid:"W4-010",set:"W4",tp:"4Pillars",d:"Medium",q:"The objective of the 'Prevention' pillar is:",o:["Monitoring and evaluating fraud incidents","Identifying and discovering fraud incidents","Reducing the potential occurrence of fraud","Gathering information and imposing sanctions"],a:2,e:"교재: Prevention 목적 = fraud 발생 가능성 감소."},
{uid:"W4-011",set:"W4",tp:"4Pillars",d:"Hard",q:"Whistleblowing and surprise inspections belong to which anti-fraud pillar?",o:["Detection","Prevention","Investigation, Reporting and Sanctions","Monitoring, Evaluation and Follow-up"],a:0,e:"교재: Whistleblowing·Surprise Inspections·Monitoring System = Detection pillar. 예방처럼 보이나 적발."},
{uid:"W4-012",set:"W4",tp:"4Pillars",d:"Medium",q:"The 'Know Your Employee Policy' belongs to which anti-fraud pillar?",o:["Investigation","Detection","Monitoring","Prevention"],a:3,e:"교재: Know Your Employee Policy = Prevention pillar."},
{uid:"W4-013",set:"W4",tp:"4Pillars",d:"Hard",q:"A company's sanctions policy must at minimum include which three elements?",o:["Whistleblower identity, perpetrator name, and loss amount","Fine amount, prison term, and public announcement","Pressure, rationalization, and opportunity","Type of sanction, mechanism for imposing it, and party authorized to impose it"],a:3,e:"교재: Sanctions policy 최소 3요소 = 제재 종류·부과 메커니즘·권한자."},
{uid:"W4-014",set:"W4",tp:"POJK",d:"Hard",q:"Under POJK 12/2024, the anti-fraud strategy must be submitted to OJK no later than:",o:["12 months from the enactment of POJK 12/2024","6 months from the enactment of POJK 12/2024","1 month from the enactment of POJK 12/2024","3 months from the enactment of POJK 12/2024"],a:1,e:"교재: 전략 최초 제출 = 시행일로부터 6개월 이내."},
{uid:"W4-015",set:"W4",tp:"POJK",d:"Hard",q:"Any change to the anti-fraud strategy must be submitted to OJK no later than:",o:["7 working days after the change is made","The end of the following month","6 months after the change","30 calendar days after the change"],a:0,e:"교재: 전략 변경 = 변경 후 7영업일 이내."},
{uid:"W4-016",set:"W4",tp:"POJK",d:"Hard",q:"A report of significant fraud incidents must be submitted to OJK no later than:",o:["7 working days after identification","6 working days after the significant fraud is identified","3 months after the incident","31 January of the following year"],a:1,e:"교재: significant fraud 보고 = 식별 후 6영업일 이내."},
{uid:"W4-017",set:"W4",tp:"POJK",d:"Medium",q:"The annual anti-fraud strategy implementation report (December position) must be submitted by:",o:["30 June of the following year","6 working days after year-end","7 working days after year-end","31 January of the following year"],a:3,e:"교재: 연간 이행보고(12월말 기준) = 익년 1월 31일까지."},
{uid:"W4-018",set:"W4",tp:"POJK",d:"Medium",q:"Under POJK 12/2024, anti-fraud education and socialization must be conducted at minimum:",o:["Once per month","Once per year","Once per quarter","Once every two years"],a:1,e:"교재: 교육·socialization = 최소 연 1회."},
{uid:"W4-019",set:"W4",tp:"POJK",d:"Medium",q:"Which of the following is one of the three criteria for a 'significant impact' fraud incident?",o:["Any fraud above IDR 1 million","Any fraud committed by a junior employee","Fraud incidents that could jeopardize the company's business continuity","Fraud detected by external auditors only"],a:2,e:"교재 3기준: 중대 법규위반 / 사업 연속성 위협 / 공중 주목·평판 손상 가능성."},
{uid:"W4-020",set:"W4",tp:"POJK",d:"Medium",q:"POJK 28/2024 concerns:",o:["Fit and proper testing","Good governance for finance companies","Risk management for finance companies","Management of Perpetrator Trace Information through the information system (SIPELAKU)"],a:3,e:"POJK 28/2024 = SIPELAKU 관리. integrity 제고·fraud 예방 목적."},
{uid:"W4-021",set:"W4",tp:"POJK",d:"Medium",q:"Under POJK 28/2024, the maximum administrative fine for SIPELAKU-related violations is:",o:["IDR 1 billion","IDR 3 billion","IDR 6 billion","IDR 10 billion"],a:2,e:"교재: SIPELAKU 행정제재 벌금 상한 = 최대 IDR 6 billion."},
{uid:"W4-022",set:"W4",tp:"POJK",d:"Medium",q:"What is the primary purpose of the SIPELAKU system under POJK 28/2024?",o:["To calculate finance company capital adequacy","To store fraud perpetrator trace records and prevent fraud across the financial services sector","To register board of directors candidates with OJK","To monitor consumer complaints"],a:1,e:"교재: SIPELAKU = fraud 가해자 trace record 저장 시스템."},
{uid:"W4-023",set:"W4",tp:"평가",d:"Hard",q:"Which evaluation models are explicitly referenced in the module for assessing the effectiveness of anti-fraud controls (CE2)?",o:["Root Cause Analysis (RCA) and the COSO/ERM model","Porter's Five Forces and PESTEL","5x5 Risk Matrix and TARIF","Kirkpatrick Model and SWOT only"],a:0,e:"교재 CE2 Evaluation: RCA + COSO/ERM + employee survey + SWOT/GAP."},
{uid:"W4-024",set:"W4",tp:"평가",d:"Medium",q:"In the CE2 monitoring methods, testing the early-detection and escalation systems corresponds to which method?",o:["Observation","Interview","Document Review","System Verification"],a:3,e:"교재 Monitoring 4방법 중 System Verification(조기탐지·escalation 시스템 테스트)."},
{uid:"W4-025",set:"W4",tp:"평가",d:"Hard",q:"Follow-up findings that remain unimplemented should be escalated and reported to:",o:["The external auditor only","The Risk Monitoring Committee or the Directors","The whistleblowing hotline","The OJK consumer protection unit"],a:1,e:"교재 CE2 Follow-up: 미이행 findings는 Risk Monitoring Committee 또는 Directors에 escalation."},
{uid:"W4-026",set:"W4",tp:"InternalAudit",d:"Medium",q:"Which framework is the international benchmark standard for internal auditing referenced in Unit 5?",o:["COSO ERM Framework","ISO 31000","IPPF of the IIA (Institute of Internal Auditors)","Basel III"],a:2,e:"교재 Unit 5 핵심 표준 = IPPF-IIA. 내부감사 국제 표준."},
{uid:"W4-027",set:"W4",tp:"InternalAudit",d:"Medium",q:"The two Competency Elements of Unit 5 (Monitoring Internal Audit Follow-up) are:",o:["Evaluating follow-up actions based on audit results; Evaluating the audit function's quality improvement program","Developing an audit plan; Executing the audit","Preventing fraud; Detecting fraud","Issuing sanctions; Reporting to OJK"],a:0,e:"교재 Unit 5 2 CE: CE1 follow-up 평가 / CE2 quality improvement program 평가."},
{uid:"W4-028",set:"W4",tp:"RBA",d:"Medium",q:"What is the defining principle of Risk-Based Auditing (RBA)?",o:["Auditing all areas with equal intensity","Identifying, analyzing, and mitigating the most significant risks of the organization","Focusing only on financial statement accuracy","Outsourcing all audits to external firms"],a:1,e:"교재: RBA = 가장 중대한 리스크 식별·분석·완화 집중."},
{uid:"W4-029",set:"W4",tp:"RBA",d:"Hard",q:"Which of the following is NOT one of the four basic principles of Risk-Based Auditing?",o:["Focus on Significant Risks","Data-Driven Approach","Collaboration with Risk Management","Maximizing the number of audits performed"],a:3,e:"교재 RBA 4원칙: Focus on Significant Risks·Data-Driven·Collaboration·Continuous Improvement."},
{uid:"W4-030",set:"W4",tp:"RBA",d:"Hard",q:"According to the module's RBA KPI example, the target completion time for a risk-based audit is:",o:["≤ 15 days","≤ 60 days","≤ 30 days","≤ 90 days"],a:2,e:"교재 KPI 예시: RBA 완료 목표 ≤ 30일(업계 35일)."},
{uid:"W4-031",set:"W4",tp:"RCA",d:"Medium",q:"The two core techniques of Root Cause Analysis (RCA) presented in the module are:",o:["5 Whys and the Ishikawa (Fishbone) Diagram","SWOT and PESTEL","Porter's Five Forces and Benchmarking","Checklist and Interview"],a:0,e:"교재 RCA 2대 기법: 5 Whys + Ishikawa/Fishbone Diagram."},
{uid:"W4-032",set:"W4",tp:"RCA",d:"Hard",q:"In the Ishikawa (Fishbone) Diagram, causal factors are typically grouped into which categories?",o:["Strengths, weaknesses, opportunities, threats","People, methods, materials, environment","Political, economic, social, technological","Prevention, detection, investigation, monitoring"],a:1,e:"교재 Fishbone 4M: people·methods·materials·environment."},
{uid:"W4-033",set:"W4",tp:"RCA",d:"Medium",q:"Which of the following is one of the five techniques for analyzing the adequacy of follow-up realization?",o:["5 Whys","Fishbone Diagram","SWOT Analysis","Focus Group Discussion (FGD)"],a:3,e:"교재 Follow-up 분석 5기법: Checklist·Interview·Field Observation·Benchmarking·FGD."},
{uid:"W4-034",set:"W4",tp:"SMART",d:"Easy",q:"What does the 'A' in the SMART principle for solution recommendations stand for?",o:["Accountable","Accurate","Achievable","Aligned"],a:2,e:"교재 SMART: Specific·Measurable·Achievable·Relevant·Time-Bound."},
{uid:"W4-035",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"What is the correct order of the four levels of the Kirkpatrick Evaluation Model?",o:["Reaction → Learning → Behavior → Results","Learning → Reaction → Results → Behavior","Reaction → Behavior → Learning → Results","Results → Behavior → Learning → Reaction"],a:0,e:"교재 Kirkpatrick: Reaction→Learning→Behavior→Results."},
{uid:"W4-036",set:"W4",tp:"Kirkpatrick",d:"Medium",q:"In the Kirkpatrick Model, the 'Learning' level is typically measured by:",o:["Participant satisfaction survey","Pre-test and post-test","Performance indicators","Observation of behavior change"],a:1,e:"교재: Level 2 Learning = Pre/Post-test."},
{uid:"W4-037",set:"W4",tp:"QAIP",d:"Medium",q:"QAIP, as referenced in the audit quality improvement section, stands for:",o:["Quality Assurance and Improvement Program","Quarterly Audit Inspection Protocol","Quality Audit Implementation Plan","Quantitative Audit Index Program"],a:0,e:"교재: QAIP = Quality Assurance and Improvement Program."},
{uid:"W4-038",set:"W4",tp:"QAIP",d:"Hard",q:"Which statement BEST distinguishes QAIP from IPPF?",o:["QAIP is an OJK regulation; IPPF is a finance company policy","They are identical and interchangeable","QAIP is a quality assurance program; IPPF is the overarching professional practices framework","IPPF is for fraud control; QAIP is for risk management"],a:2,e:"교재: QAIP = 품질 보증·개선 프로그램. IPPF = 전체 프레임워크."},
{uid:"W4-039",set:"W4",tp:"POJK",d:"Medium",q:"Under POJK 28/2024, how frequently must the internal audit of SIPELAKU usage be conducted at minimum?",o:["Once per quarter","At least once per year","Once every two years","Only when a breach occurs"],a:1,e:"교재: SIPELAKU Internal Audit 주기 = 최소 연 1회."},
{uid:"W4-040",set:"W4",tp:"Barrier",d:"Hard",q:"Which of the following barrier categories is correctly matched in the follow-up analysis?",o:["Resource barriers relate to limitations in personnel, budget, and time","Technical barriers relate to regulatory complexity","Compliance barriers relate to management commitment","Managerial barriers relate to system failures"],a:0,e:"교재 장벽 4유형: Technical·Resource(인력·예산·시간)·Managerial·Compliance."},
{uid:"W4-041",set:"W4",tp:"4Pillars",d:"Medium",q:"The 'Surprise Audit' described in the Detection pillar is best defined as:",o:["A scheduled audit announced one month in advance","An inspection conducted confidentially without the auditee's prior knowledge","An audit performed only by external regulators","A self-assessment completed by the audited unit"],a:1,e:"교재: Surprise Audit = 피검자 인지 없이 비밀리 수행. Detection pillar."},
{uid:"W4-042",set:"W4",tp:"4Pillars",d:"Medium",q:"Which item is part of the 'Know Your Employee' policy under the Prevention pillar?",o:["Imposing fines on perpetrators","Reporting fraud to OJK within 6 working days","Recognizing and monitoring employee character, integrity, relationships, and lifestyle","Conducting forensic investigation of completed fraud"],a:2,e:"교재: Know Your Employee = 직원 character·integrity·lifestyle 모니터링. Prevention."},
{uid:"W4-043",set:"W4",tp:"InternalAudit",d:"Hard",q:"Which is one of the four 'Basic Principles (Accountability)' underlying Unit 5?",o:["Risk-Based Continuous Improvement","Prevention is better than cure","Four eyes principle","Segregation of duties"],a:0,e:"교재 Unit 5 Basic Principles: Compliance·Risk-Based Continuous Improvement·Effectiveness & Efficiency·Collaboration."},
{uid:"W4-044",set:"W4",tp:"RBA",d:"Hard",q:"The three aspects evaluated in Risk-Based Auditing follow-up are:",o:["Prevention, Detection, Investigation","Reaction, Learning, Behavior","Pressure, Rationalization, Opportunity","Risk-Based Audit Planning, Audit Execution, Reporting and Follow-up"],a:3,e:"교재 RBA 평가 3 Aspects: Risk-Based Audit Planning / Audit Execution / Reporting and Follow-up."},
{uid:"W4-045",set:"W4",tp:"평가",d:"Medium",q:"An audit finding's follow-up element list includes Findings, Risk, Action Plan, PIC, and which two others?",o:["Sanction and Whistleblower","Deadline and Indicator","Bribery and Extortion","Reaction and Results"],a:1,e:"교재 Follow-up 6요소: Findings / Risk / Action Plan / PIC / Deadline / Indicator."},
{uid:"W4-046",set:"W4",tp:"InternalAudit",d:"Medium",q:"Which communication step for audit findings emphasizes delivering information to those with authority to act?",o:["Identify the appropriate audience (senior management, audit committee, regulators)","Use only verbal communication","Delay reporting until year-end","Restrict findings to the audited unit only"],a:0,e:"교재 Communication 4단계: Identify Appropriate Audience·Clear Delivery·Appropriate Media·Active Communication."},
{uid:"W4-047",set:"W4",tp:"SMART",d:"Medium",q:"The Solution Recommendation Format in an audit report includes Obstacle, Root of the Problem, Recommended Solutions, Responsible Party, and:",o:["Sanction Type","Fraud Triangle element","Target Time","Composite Rating"],a:2,e:"교재 Format: Obstacle / Root of the Problem / Recommended Solutions / Responsible Party / Target Time."},
{uid:"W4-048",set:"W4",tp:"QAIP",d:"Hard",q:"Which evaluation technique is used in the Quality Improvement Program besides Gap Analysis and external audit?",o:["5x5 Risk Matrix","QAIP Self-Assessment / Peer Review","PESTEL Analysis","Porter's Five Forces"],a:1,e:"교재: Gap Analysis·QAIP Self-Assessment·External Audit/Peer Review."},
{uid:"W4-049",set:"W4",tp:"QAIP",d:"Medium",q:"The Auditor Development Plan classifies training needs into which three time horizons?",o:["Daily, Weekly, Monthly","Prevention, Detection, Correction","Reaction, Learning, Results","Short-Term, Medium-Term, Long-Term"],a:3,e:"교재: Short-Term·Medium-Term·Long-Term."},
{uid:"W4-050",set:"W4",tp:"InternalAudit",d:"Easy",q:"Which professional association is a recognized data source for internal audit best practices in the module?",o:["IIA / ACFE / ISACA","OJK / APPI / LSPPI","Basel Committee / IOSCO","IFRS Foundation / IASB"],a:0,e:"교재 Data Sources = 전문협회(IIA·ACFE·ISACA)."},
{uid:"W4-051",set:"W4",tp:"POJK",d:"Hard",q:"A junior employee commits asset misappropriation but it does not threaten business continuity or public reputation. Under POJK 12/2024, this is:",o:["Always a significant-impact fraud requiring 6-working-day reporting","Not automatically a significant-impact fraud, since the three criteria are not met","Exempt from any internal reporting","Reportable only to the whistleblowing committee"],a:1,e:"교재 significant fraud 3기준 미충족 → 6영업일 보고 대상 아님. 단 내부 처리 필요."},
{uid:"W4-052",set:"W4",tp:"4Aspects",d:"Medium",q:"The 'tone at the top' and signing of an integrity pact primarily fall under which Fraud Control aspect?",o:["Control and Monitoring","Policies and Procedures","Active Supervision of Directors & BOC","Organizational Structure and Accountability"],a:2,e:"교재: anti-fraud 문화·integrity pact·code of ethics = Active Supervision of Directors & BOC."},
{uid:"W4-053",set:"W4",tp:"4Pillars",d:"Medium",q:"Which pillar handles the imposition of sanctions on fraud perpetrators?",o:["Prevention","Detection","Monitoring, Evaluation and Follow-up","Investigation, Reporting and Sanctions"],a:3,e:"교재: 제3 Pillar = Investigation, Reporting and Sanctions."},
{uid:"W4-054",set:"W4",tp:"RCA",d:"Medium",q:"Which of the following is the BEST example of a 'Field Observation' technique in follow-up analysis?",o:["Physically verifying on-site that corrective actions are implemented as recommended","Asking 'why' five times to trace the root cause","Comparing results against industry best practices","Holding a group discussion with responsible parties"],a:0,e:"교재: Field Observation = 현장 확인. (B)5 Whys (C)Benchmarking (D)FGD."},
{uid:"W4-055",set:"W4",tp:"InternalAudit",d:"Hard",q:"Which report quality principle set is correct for the audit follow-up monitoring report (PC 2.3)?",o:["Profitable, scalable, marketable, repeatable","Objective, timely, accurate, comprehensive, concise","Specific, measurable, achievable, relevant, time-bound","Prevention, detection, investigation, monitoring"],a:1,e:"교재 Report 원칙: objective·timely·accurate·comprehensive·concise."},
{uid:"W4-056",set:"W4",tp:"InternalAudit",d:"Hard",q:"Which statement about the relationship between Unit 4 and the Three Lines of Defense (W3) is correct?",o:["Internal Audit is the first line of defense","The Anti-Fraud Unit replaces the Risk Management function","Internal Audit is the third line, providing independent assurance over anti-fraud controls","The Board of Commissioners is the second line of defense"],a:2,e:"W3 연결: Internal Audit = 3rd Line. 1st=영업현장, 2nd=Risk Mgmt·Compliance, 3rd=Internal Audit."},
{uid:"W4-057",set:"W4",tp:"4Aspects",d:"Medium",q:"Under POJK 12/2024, the obligation to supervise the implementation of the anti-fraud strategy rests primarily with:",o:["The Board of Directors and the Board of Commissioners","The external auditor","OJK inspectors","The whistleblowing committee"],a:0,e:"교재: 감독 의무 = Directors & BOC(active supervision)."},
{uid:"W4-058",set:"W4",tp:"Barrier",d:"Medium",q:"Which is a common barrier to implementing Risk-Based Auditing identified in the module?",o:["Excessive accuracy of risk data","Too many qualified auditors","Over-collaboration with risk management","Management resistance and lack of accurate risk data"],a:3,e:"교재 RBA 장벽: risk data 부족·이해 부족·Management Resistance·자원 제약."},
{uid:"W4-059",set:"W4",tp:"POJK",d:"Hard",q:"Which is TRUE regarding the legal basis for anti-fraud strategies in finance companies?",o:["POJK 12/POJK.01/2017 is the current anti-fraud basis","POJK 12/2024 is the current basis; POJK 12/POJK.01/2017 is a separate F&P Test regulation","Both regulation numbers refer to the same anti-fraud rule","Anti-fraud strategies are governed by POJK 48/2024 (GCG)"],a:1,e:"함정: POJK 12/2024 = Anti-Fraud. POJK 12/POJK.01/2017 = F&P Test. 번호 겹침이나 별개."},
{uid:"W4-060",set:"W4",tp:"Kirkpatrick",d:"Medium",q:"The Kirkpatrick Model's Level 3 (Behavior) is measured primarily through:",o:["Participant satisfaction surveys","Pre-test and post-test scores","Performance observation and audit reports (application on the job)","Organizational performance indicators"],a:2,e:"교재: Level 3 Behavior = 실무 적용, performance observation·audit reports."}

{uid:"W1-064",set:"W1",tp:"사업영역",d:"Hard",q:"KBBF wants to launch a new 'Other Financing Business Activity' (e.g., a non-core advisory/financing line). Its Core Capital is Rp 90 billion. Which is the immediate obstacle?",o:["The activity requires a separate banking license","Core Capital is below the Rp 100 billion minimum for Other Activities","Foreign-owned companies cannot conduct Other Activities","No obstacle; Other Activities have no capital floor"],a:1,e:"Other Financing Business Activities 최소 Core Capital = Rp 100 billion. Rp 90bn은 미달. 5대 요건 중 자본 floor 함정."},
{uid:"W1-065",set:"W1",tp:"비율",d:"Hard",q:"A Finance Company has equity of Rp 1,000 billion and total funding (debt) of Rp 9,500 billion. Does it comply with the Gearing Ratio limit?",o:["No, GR = 9.5x, exceeding the cap","Yes, but only if MSMD is above 50%","Cannot be determined without NPF data","Yes, GR = 9.5x, within the 10x cap"],a:3,e:"GR = 차입/자기자본 = 9,500/1,000 = 9.5x. 법정 상한 10x 이내이므로 적합. 계산형 함정: 10x를 막 넘는지 여부 판단."},
{uid:"W1-066",set:"W1",tp:"비율",d:"Medium",q:"Company A reports BOPO of 95%; Company B reports BOPO of 78%. What does this indicate?",o:["BOPO cannot compare two companies","Both are identical in profitability","Company B is more operationally efficient","Company A is more operationally efficient"],a:2,e:"BOPO = 영업비용/영업수익, 낮을수록 효율적. B(78%)가 A(95%)보다 효율적. lower-is-better 함정."},
{uid:"W1-067",set:"W1",tp:"HealthLevel",d:"Hard",q:"A Finance Company's Composite Rating moves from 2 to 4 over one year. What is the correct interpretation and consequence?",o:["Condition deteriorated to 'Less Healthy'; likely Action Plan / closer supervision","Rating is neutral; ratings do not affect supervision","Condition improved; no action needed","Rating 4 is the best possible score"],a:0,e:"1=최상, 5=최악. 2→4는 악화(Less Healthy). Action Plan·감독강화 유발. 한국 직관(높을수록 좋음)과 반대 함정."},
{uid:"W1-068",set:"W1",tp:"감독상태",d:"Hard",q:"KBBF post-acquisition shows MSMD of 45% and net NPF of 6%. Under POJK 49/2024, what supervision status is most likely?",o:["Revocation of license","Intensive Supervision","Normal Supervision","Special Supervision"],a:1,e:"Intensive trigger = MSMD 0~50% 또는 net NPF 5~25%. 둘 다 Intensive 구간. Special은 MSMD<0% 또는 NPF>25%. KBBF 컨텍스트 직결."},
{uid:"W1-069",set:"W1",tp:"감독상태",d:"Medium",q:"Which sequence correctly orders OJK supervision intensity from least to most severe?",o:["Normal → Intensive → Special","Special → Intensive → Normal","Intensive → Normal → Special","Normal → Special → Intensive"],a:0,e:"Normal(정상) → Intensive(집중) → Special(특별). 악화될수록 강도 상승."},
{uid:"W1-070",set:"W1",tp:"사업영역",d:"Hard",q:"A debtor receives a Business Capital Facility of Rp 40 million with no collateral pledged. Is this permissible?",o:["No, all financing requires collateral","Only if the debtor is a corporation","Yes, collateral is exempt below the per-debtor threshold","Only with OJK pre-approval"],a:2,e:"Business Capital Facility는 소액 한도 이하 시 담보 면제. 교재 기준 한도 이하 무담보 허용. 수치 임계 함정."},
{uid:"W1-071",set:"W1",tp:"BMPP",d:"Hard",q:"A Finance Company with equity of Rp 2,000 billion extends Rp 450 billion to a single obligor having no controlling relationship. Is the BMPP respected?",o:["Yes, the cap only applies to related parties","Yes, 22.5% is within the single-obligor cap","No, the cap is 10% for all obligors","No, 22.5% exceeds the 20% single-obligor cap"],a:3,e:"BMPP 단일 obligor(비지배관계) 한도 = equity의 20%. 450/2,000 = 22.5% > 20% → 위반. 계산형."},
{uid:"W1-072",set:"W1",tp:"BMPP",d:"Medium",q:"A Finance Company breaches BMPP because an M&A reduced its equity base. What is required?",o:["Submit an action plan and cure within one month","No action, M&A breaches are exempt","Immediate license surrender","Pay a fixed penalty of Rp 6 billion"],a:0,e:"자본감소·M&A로 인한 BMPP 초과 시 1개월 내 시정 action plan 제출. KBBF 인수 시나리오 직결."},
{uid:"W1-073",set:"W1",tp:"사업영역",d:"Hard",q:"A salesperson is paid an incentive equal to 20% of a financing contract's total income. Under POJK 46/2024, is this allowed?",o:["No, third-party acquisition cost is capped at 17.5%","Yes, if the customer consents","No, incentives are entirely prohibited","Yes, incentives are uncapped"],a:0,e:"Financing acquisition cost(3자 인센티브) 상한 = 계약 총수익의 17.5%. 20%는 초과. DP 산입 불가 별도 함정."},
{uid:"W1-074",set:"W1",tp:"POJK",d:"Hard",q:"A Finance Company buys credit insurance and, upon a default, collects both the insurance payout AND the full collateral value. Under POJK 46/2024 risk mitigation, this is:",o:["Required by OJK","Prohibited — collecting insurance on already-written-off bad debt / double recovery is restricted","Permitted, double recovery maximizes protection","Permitted only for Sharia financing"],a:1,e:"POJK 46/2024 Ch.VII 위험완화: 부실채권 보험금 중복수취 등 prohibited. 이중회수 금지."},
{uid:"W1-075",set:"W1",tp:"사업영역",d:"Hard",q:"In a Joint Financing arrangement 'with recourse', the Finance Company bears the risk if the channeling partner's borrower defaults. Is this structure allowed?",o:["Channeling = with recourse prohibited; Joint Financing = company shares risk per its portion","Both channeling and joint financing must be without recourse","Recourse rules do not exist in Indonesia","Yes, with-recourse is the default for joint financing"],a:0,e:"Channeling(단순 자금전달)은 with recourse 금지, Joint Financing은 지분비율만큼 위험 분담. 두 구조 변별 함정."},
{uid:"W1-076",set:"W1",tp:"POJK",d:"Medium",q:"Under POJK 43/2025, who must hold risk-management certification?",o:["Only the President Director","Only the Board of Commissioners","All employees regardless of role","The Director overseeing risk AND the layer directly below"],a:3,e:"POJK 43/2025: 리스크 담당 Director + 바로 아래 계층 인증 의무. SPPI 시험 법적 근거. BOD 후보 직결."},
{uid:"W1-077",set:"W1",tp:"POJK",d:"Medium",q:"Per POJK 43/2025, the minimum annual HR education/training budget is set as a percentage of:",o:["Net profit","Paid-in capital","Total operating cost / HR cost (regulated minimum)","Total assets"],a:2,e:"POJK 43/2025 HR 교육·훈련 최소 예산 의무. 인력개발 5항 중 하나. 비율 기준 암기."},
{uid:"W1-078",set:"W1",tp:"POJK",d:"Hard",q:"Under POJK 47/2000 (re-regulated via POJK 46/2024), a foreign investor wishes to own 90% of a Finance Company. Is this allowed?",o:["No, foreign ownership is capped at 85%","No, foreign ownership is prohibited","Yes, only for ASEAN investors","Yes, up to 100% foreign ownership"],a:0,e:"외국인 지분 상한 85%. 90%는 초과. 설립 Paid-in Rp 250bn·외국인 임원 각 50% 한도 등 동반 암기."},
{uid:"W1-079",set:"W1",tp:"POJK",d:"Medium",q:"A Finance Company's board has 4 Directors, of whom 2 are foreign nationals. Does this comply with POJK 47/2000?",o:["Yes, there is no limit on foreign Directors","Yes, but only with OJK waiver","No, foreign Directors cannot exceed 50% of the board","No, foreign Directors are prohibited entirely"],a:2,e:"외국인 Director는 이사회의 50% 초과 불가. 2/4 = 50%는 한도 경계(허용). 시나리오로 경계값 변별."},
{uid:"W1-080",set:"W1",tp:"POJK",d:"Hard",q:"During onboarding a new corporate client, KBBF's compliance team flags a politically exposed person (PEP) as ultimate beneficial owner. Under APU-PPT RBA, what is the appropriate step?",o:["Standard CDD is sufficient","Reject all PEP clients automatically","Report to OJK before opening any account","Apply Enhanced Due Diligence (EDD)"],a:3,e:"PEP·고위험 = EDD(강화실사) 적용. RBA 4 factor(고객·국가·상품·거래채널) 기반. CDD/EDD 구별."},
{uid:"W1-081",set:"W1",tp:"POJK",d:"Medium",q:"To which body must a Finance Company report a suspicious financial transaction?",o:["Bank Indonesia","OJK directly","PPATK (Indonesian FIU)","The police"],a:2,e:"의심거래보고(STR) → PPATK(인니 금융정보분석원). OJK 아님 — 함정."},
{uid:"W1-082",set:"W1",tp:"POJK",d:"Hard",q:"Which statement correctly distinguishes POJK 12/POJK.01/2017 from POJK 34/2018?",o:["Both govern F&P","12/2017 = AML (APU-PPT); 34/2018 = F&P reassessment","12/2017 = F&P test; 34/2018 = AML","Both govern AML"],a:1,e:"✅정정 핵심: 12/POJK.01/2017 = AML(APU-PPT, 23/2019 개정→8/2023 대체). F&P 재평가 = 34/2018. 번호 혼동 최다 함정."},
{uid:"W1-083",set:"W1",tp:"POJK",d:"Medium",q:"When OJK files a lawsuit for consumer protection under POJK 38/2025, the legal nature is best described as:",o:["A criminal prosecution","A class action by individual consumers","OJK's own institutional legal standing to sue on behalf of consumers","An arbitration at SIAC"],a:2,e:"POJK 38/2025: OJK 기관 자체의 legal standing(소송 당사자 자격). 소비자 class action과 구별."},
{uid:"W1-084",set:"W1",tp:"EquityP",d:"Medium",q:"A Finance Company makes a single direct equity participation equal to 30% of its equity. Is this within limit?",o:["No, 30% exceeds the single-participation cap","Equity participation is prohibited for Finance Companies","Yes, there is no limit","Yes, single participation cap is 25% of equity → this breaches it"],a:0,e:"Equity Participation 단일 직접참여 한도 초과. 교재 한도 대비 30% 위반. Investment Financing과 성격 구별(지분 vs 채권)."},
{uid:"W1-085",set:"W1",tp:"Lease",d:"Hard",q:"A customer sells its machine to the Finance Company and immediately leases it back to keep using it while raising cash. This is:",o:["Operating Lease","Channeling","Factoring","Sale and Leaseback (SLB)"],a:3,e:"자산 매각 후 재리스 = Sale and Leaseback. 자금조달 목적. Finance Lease 변형."},
{uid:"W1-086",set:"W1",tp:"Lease",d:"Medium",q:"Which feature best identifies a Finance Lease (vs Operating Lease)?",o:["Short cancellable term","Lease transfers substantially all risks and rewards; bargain purchase option at end","Lessor bears residual/obsolescence risk","No amortization of the asset cost"],a:1,e:"Finance Lease = 위험·보상 실질 이전 + 염가매수선택권. Operating Lease는 lessor가 잔존위험 보유."},
{uid:"W1-087",set:"W1",tp:"자금조달",d:"Medium",q:"For a private placement (non-public) bond, which requirement differs from a public offering?",o:["Higher coupon is mandatory","No prospectus/registration with OJK capital-market rules in the same way; limited investors","Must be guaranteed by the government","Cannot exceed Rp 1 billion"],a:1,e:"사모(private placement)는 공모와 달리 등록·투자자 수 제한 차이. 자금조달 구조 변별."},
{uid:"W1-088",set:"W1",tp:"산업사",d:"Medium",q:"The 2018 Double Pledge Cases most directly led to which infrastructure response?",o:["Creation of OJK itself","COVID-19 loan restructuring","Introduction of the four core business areas","Strengthening of SLIK and the Asset (Fiduciary) Registry"],a:3,e:"2018 이중담보 사기 → SLIK·자산등록부 인프라 강화. 사건↔대응 매핑."},
{uid:"W1-089",set:"W1",tp:"산업사",d:"Hard",q:"Which pairing of crisis-and-regulatory-response is INCORRECT?",o:["Asian Financial Crisis 1997-98 → creation of the four core areas in 1974","COVID-19 → acceleration of face-to-face-less financing","Double Pledge 2018 → SLIK/Asset Registry strengthening","COVID-19 2020 → loan restructuring relaxation (POJK 14/2020)"],a:0,e:"1974 SKB(4대영역 도입)는 1997-98 위기보다 앞섬 — 인과 역전 오류. 나머지는 정확. NOT 유형."},
{uid:"W1-090",set:"W1",tp:"법적정의",d:"Hard",q:"An individual borrows to buy a personal car for commuting (not business). Under Indonesia's use-based classification, this is:",o:["Productive financing","Investment financing","Working capital financing","Consumer financing"],a:3,e:"인니는 사용목적 기준. 개인 통근용 차량 = Consumer. 영업용이면 Productive. 사용목적 함정(주체 아님)."},
{uid:"W1-091",set:"W1",tp:"POJK",d:"Hard",q:"'Risk arising from a counterparty's failure to meet obligations' maps to which of the 8 risk types?",o:["Market Risk","Credit Risk","Strategic Risk","Operational Risk"],a:1,e:"상대방 채무불이행 = Credit Risk(신용위험). 8대 리스크 정의 매핑."},
{uid:"W1-092",set:"W1",tp:"POJK",d:"Medium",q:"Fraud risk, under the 8 risk-type framework, is treated as:",o:["A standalone 9th risk type","Identical to Credit Risk","A parameter within Operational Risk","Not a risk under OJK rules"],a:2,e:"Fraud는 별도 9번째가 아니라 Operational Risk의 parameter. 함정 — 독립 유형 아님."},
{uid:"W1-093",set:"W1",tp:"POJK",d:"Medium",q:"Which POJK pair is correctly matched to its subject?",o:["POJK 42/2024 = GCG; POJK 48/2024 = Risk Management","POJK 48/2024 = GCG; POJK 42/2024 = Risk Management","POJK 46/2024 = GCG; POJK 43/2025 = Risk Management","POJK 43/2025 = GCG; POJK 46/2024 = Risk Management"],a:1,e:"2024 4종 번호 매핑: 48=GCG, 42=Risk Management, 46=비대면, 43/2025=HR인증. 번호 교차 함정."},
{uid:"W1-094",set:"W1",tp:"POJK",d:"Medium",q:"Which POJK defines Risk Management and the 8 risk types?",o:["POJK 48/2024","POJK 46/2024","POJK 42/2024","POJK 43/2025"],a:2,e:"Risk Management·8대 리스크 = POJK 42/2024. 2024 4종(48 GCG·42 RM·46 비대면·43HR→실제 43/2025) 번호 구별."},
{uid:"W1-095",set:"W1",tp:"거버넌스",d:"Hard",q:"In Indonesia's two-tier board, the BOC discovers Directors pursuing a strategy beyond approved risk appetite. The BOC's proper role is to:",o:["Dissolve the Board of Directors unilaterally","Report directly to PPATK","Take over day-to-day management","Supervise and advise; require correction, not execute operations"],a:3,e:"이원적 이사회: BOC = 감독·자문(집행 아님). 경영권 직접 행사 불가. BOD 집행과 역할 분리."},
{uid:"W1-096",set:"W1",tp:"거버넌스",d:"Medium",q:"Risk Appetite differs from Risk Tolerance in that appetite is:",o:["Always lower than tolerance","The aggregate level of risk the company is willing to take to pursue objectives; tolerance = acceptable variation around it","Set by OJK, not the board","The hard regulatory ceiling"],a:1,e:"Appetite = 목표 달성 위해 감수하려는 총 위험수준. Tolerance = 그 주변 허용 변동폭. Capacity(최대능력)와 3계층."},
{uid:"W1-097",set:"W1",tp:"Roadmap",d:"Easy",q:"The KBBF acquisition in 2026 falls within which phase of the IKNB Roadmap 2024-2028?",o:["A phase that already ended in 2023","Outside any roadmap","Foundation/strengthening phase of the 2024-2028 roadmap","The 2014 fuel-subsidy phase"],a:2,e:"2026 = Roadmap 2024-2028 기간 내 강화 단계. KBBF 인수 타이밍 컨텍스트."},
{uid:"W1-098",set:"W1",tp:"HealthLevel",d:"Medium",q:"In the KPMR (risk management quality) rating, which rating reflects the MOST effective risk management?",o:["Rating 5","Rating 4","Rating 1","Rating 3"],a:2,e:"KPMR Rating 1 = 가장 효과적인 위험관리. Health Level 척도와 동일하게 1=최상. 한국 직관 반대 함정."},
{uid:"W1-099",set:"W1",tp:"비율",d:"Hard",q:"A Finance Company reports MSMD of 320%. Which interpretation is CORRECT?",o:["It is undercapitalized and faces Special Supervision","It breaches the 50% minimum","Core capital is 3.2x paid-in capital — strong capital position","MSMD above 100% is illegal"],a:2,e:"MSMD = Modal Sendiri/Modal Disetor(자기자본/납입자본). 320% = 자기자본이 납입자본 3.2배, 양호. 최소 50% 대비 충분. 산업평균 수준."},
{uid:"W1-100",set:"W1",tp:"사업영역",d:"Medium",q:"Working Capital Financing is intended to cover short-term needs within a period of:",o:["No time limit","Up to 5 years","Up to 10 years","Up to 1 year"],a:3,e:"Working Capital Financing = 1년 이내 단기 운전자금. Investment Financing(중장기)과 구별."},
{uid:"W2-064",set:"W2",tp:"BP구성",d:"Hard",q:"KBBF's new BOD drafts a Business Plan but omits any assumptions about GDP growth and interest rates. Under POJK 24/2019, what is the deficiency?",o:["The plan lacks the required economic assumptions underpinning projections","Assumptions belong only in the Realization Report","Assumptions are the BOC's responsibility, not the plan's","None; macroeconomic assumptions are optional"],a:0,e:"POJK 24/2019: Business Plan은 거시경제 가정(GDP·금리 등)에 기반한 projection 포함 필수. 누락은 결함."},
{uid:"W2-065",set:"W2",tp:"BP구성",d:"Medium",q:"A plan to open 10 new branches and hire 200 staff over 3 years belongs in which Business Plan section?",o:["Vision & Mission","Risk Management only","Management Policies and Plans / organizational and network development","Other Information"],a:2,e:"지점·인력 확장 = 경영정책·계획(조직·네트워크 개발) 섹션. Vision은 방향성, 여기는 실행계획."},
{uid:"W2-066",set:"W2",tp:"BP보고",d:"Hard",q:"A Finance Company submits its Business Plan Supervision Report annually instead of semi-annually. Under POJK 24/2019 Art.15, is this compliant?",o:["No, the Supervision Report is semi-annual","Yes, only if OJK waives the requirement","No, it must be quarterly","Yes, annual is the standard"],a:0,e:"POJK 24/2019 Art.15: Business Plan Supervision Report = 반기(semi-annual). 연간 제출은 위반. BOC 작성."},
{uid:"W2-067",set:"W2",tp:"BP보고",d:"Medium",q:"Who prepares the Business Plan Supervision Report?",o:["Internal Audit","OJK","Board of Commissioners (BOC)","Board of Directors"],a:2,e:"Supervision Report = BOC 작성(감독 역할). Realization Report는 BOD. 작성주체 함정."},
{uid:"W2-068",set:"W2",tp:"전략분석",d:"Hard",q:"A Finance Company analyzes that BI's benchmark rate hike will raise its funding cost. Which framework element captures this?",o:["Porter — Threat of New Entrants","SWOT — internal Strength","PESTEL — Economic factor","Porter — Threat of Substitutes"],a:2,e:"금리(거시 외부요인) = PESTEL의 Economic. Porter는 산업구조 5요인, 금리는 PESTEL."},
{uid:"W2-069",set:"W2",tp:"전략분석",d:"Hard",q:"In Porter's Five Forces for a Finance Company, banks offering cheaper direct loans to the same customers represent:",o:["Threat of Substitutes","Bargaining Power of Suppliers","Threat of New Entrants","Bargaining Power of Buyers"],a:0,e:"은행 직접대출 = 대체재(Substitutes) 위협. Suppliers는 자금원, New Entrants는 신규 진입자."},
{uid:"W2-070",set:"W2",tp:"전략분석",d:"Medium",q:"'Bargaining Power of Suppliers' for a Finance Company primarily refers to:",o:["New fintech entrants","Funding providers (banks, bondholders) and their cost of funds","Government regulators","Customers negotiating lower rates"],a:1,e:"Finance Company의 Supplier = 자금 공급원(은행·채권투자자). 자금조달 비용 협상력. 핵심 변별."},
{uid:"W2-071",set:"W2",tp:"전략분석",d:"Medium",q:"Heavy capital requirements and OJK licensing make it hard for new players to enter. This MOST supports:",o:["Buyer power is high","Threat of New Entrants is high","Threat of New Entrants is moderate-to-low","Supplier power is low"],a:2,e:"높은 자본·라이선스 장벽 → 신규 진입 위협 낮음(moderate-to-low). 진입장벽↔위협 역관계."},
{uid:"W2-072",set:"W2",tp:"Vision",d:"Medium",q:"Which is the BETTER-formulated Vision statement under SEOJK 23/2019 criteria?",o:["'To be Indonesia's most trusted multifinance partner for SME growth'","'To process 100 loans next quarter'","'To comply with all POJK by December'","'To reduce VAT filing delays'"],a:0,e:"Vision = 장기 지향점·열망(미래상). 분기 처리건수·컴플라이언스 기한은 운영목표. B가 비전."},
{uid:"W2-073",set:"W2",tp:"BP목표",d:"Hard",q:"A digital onboarding initiative targeting 30% cost cut and 15-minute approval is BEST classified as which objective type?",o:["Financial objective","Compliance objective","Governance objective","Operational/technology efficiency objective"],a:3,e:"디지털 효율화(비용·처리시간) = 운영·기술 효율 목표. 재무목표(수익·자본)와 구별."},
{uid:"W2-074",set:"W2",tp:"BP보고",d:"Hard",q:"The Business Plan Realization Report shows 60% achievement of the lending target. What MUST it also contain?",o:["Only the achievement percentage","Realization data, deviation analysis, and explanations/corrective measures","Just the next year's plan","BOC signatures only"],a:1,e:"Realization Report = 실현 데이터 + 편차분석 + 사유·시정조치. 달성률만으로는 불충분."},
{uid:"W2-075",set:"W2",tp:"BP구성",d:"Medium",q:"A plan to convert into a Sharia Finance Company should be disclosed in which section?",o:["Vision & Mission","Management Policies/Plans (or Other Information, as a corporate plan)","Risk Profile","Compliance Report"],a:1,e:"Sharia 전환 계획 = 경영정책·계획(또는 기타정보)의 corporate plan. 구조 변경 계획 위치."},
{uid:"W2-076",set:"W2",tp:"Compliance",d:"Hard",q:"KBBF's compliance unit detects that a key Director lacks the certification required under POJK 43/2025. The immediate action is:",o:["Initiate certification / remediation and report; the role requires certified competence","Ignore until the next audit cycle","Report to PPATK","Terminate the Director immediately"],a:0,e:"POJK 43/2025 인증 미충족 핵심직 → 즉시 인증·시정 착수 및 보고. F&P·역량요건 직결. (참조: 레퍼런스상 HR인증 근거는 43/2025)"},
{uid:"W2-077",set:"W2",tp:"Compliance",d:"Hard",q:"A Finance Company files its VAT return late. Whose requirements are breached, and is this a 'compliance' matter?",o:["OJK only","No one; VAT is voluntary","Only the tax office; not a compliance issue","The tax authority (DJP); yes — compliance covers all applicable laws, not only OJK"],a:3,e:"VAT 지연 = 국세청(DJP) 요건 위반. 컴플라이언스는 OJK뿐 아니라 모든 적용 법규 포함. 범위 함정."},
{uid:"W2-078",set:"W2",tp:"Compliance",d:"Medium",q:"A Suspicious Transaction Report (STR) is received and analyzed by which body?",o:["PPATK","OJK","Bappebti","Bank Indonesia"],a:0,e:"STR 접수·분석 = PPATK(FIU). OJK 아님. W1 081과 동일 논점 — 반복 노출 의도."},
{uid:"W2-079",set:"W2",tp:"Compliance",d:"Hard",q:"When a Finance Company receives a brand-new POJK, what is the CORRECT first step?",o:["Wait for OJK inspection","Immediately change all SOPs","File a compliance report to OJK","Identify and analyze applicability/gap to the company before drafting changes"],a:3,e:"신규 POJK 수령 → 1단계: 적용가능성·gap 분석(식별). 이후 SOP 개정·FGD. 순서 함정."},
{uid:"W2-080",set:"W2",tp:"Compliance",d:"Medium",q:"A cross-functional FGD with Legal, Risk, IT, HRD, and Internal Audit corresponds to which compliance step?",o:["Analyzing impact and coordinating implementation across units","Initial identification of the regulation","Final reporting to OJK","Archiving the regulation"],a:0,e:"부서 합동 FGD = 영향분석·부서간 이행 조율 단계. 식별 다음, 보고 이전."},
{uid:"W2-081",set:"W2",tp:"Compliance",d:"Medium",q:"The annual GCG Report deadline is:",o:["January 31","June 30","December 31","April 30"],a:3,e:"연간 GCG Report 기한 = 4월 30일. (검증항목: POJK 48/2024 기준 변동 여부 원문 확인 권고 — 교재 기준 4/30)"},
{uid:"W2-082",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance evaluation finds most obligations met but several material gaps uncovered. This is classified as:",o:["Comply","Largely Comply","Less Comply","Non-Comply"],a:2,e:"중대 gap 다수·대부분 충족 = 'Less Comply' 등급. 4단계 평가(Comply/Largely/Less/Non) 매핑."},
{uid:"W2-083",set:"W2",tp:"Compliance",d:"Medium",q:"A compliance report to OJK must be signed by:",o:["An external auditor","The PPATK officer","The Director in charge of compliance (and as regulated)","Any staff member"],a:2,e:"OJK 제출 컴플라이언스 보고서 = 컴플라이언스 담당 Director 서명. 권한·책임 소재."},
{uid:"W2-084",set:"W2",tp:"Compliance",d:"Hard",q:"'Validity' vs 'Relevance' of compliance data: a report that is accurate but uses last year's outdated regulation fails on:",o:["Validity","Relevance","Both equally","Neither"],a:1,e:"정확하지만 구버전 규정 사용 = Relevance(적시·해당성) 결여. Validity는 정확성. 두 개념 분리."},
{uid:"W2-085",set:"W2",tp:"감독기관",d:"Medium",q:"Which body monitors foreign exchange transactions and macro-level financial stability?",o:["Bank Indonesia","PPATK","DJP (Tax)","OJK"],a:0,e:"외환·거시 금융안정 = Bank Indonesia. OJK는 미시 건전성·시장행위 감독. 6대 감독기관 매핑."},
{uid:"W2-086",set:"W2",tp:"감독기관",d:"Medium",q:"POJK 46/2024 PSE (electronic system) registration is supervised in coordination with:",o:["Bappebti","PPATK","Kominfo / electronic-system authority","SIAC"],a:2,e:"PSE(전자시스템) 등록 = Kominfo 등 전자시스템 당국 연계. 비대면 financing 인프라 감독."},
{uid:"W2-087",set:"W2",tp:"Q6평가",d:"Hard",q:"Under Q6 'Evaluating a Business Plan', the FIRST step in measuring plan success is to:",o:["Terminate underperforming staff","Draft next year's plan","Submit to OJK","Gather realization data and compare against targets"],a:3,e:"Q6 CE1 1단계 = 실현 데이터 수집·목표 대비 비교(측정). Q7 개발 관점과 짝 — 평가 우선 측정."},
{uid:"W2-088",set:"W2",tp:"Q6평가",d:"Hard",q:"Which set correctly lists Business Plan Evaluation Objects under Q6?",o:["Vision and Mission only","Only financial targets","The six evaluation objects incl. realization vs plan, deviation causes, supporting/inhibiting factors, corrective actions","Staff headcount only"],a:2,e:"Q6 BP 평가대상 6종: 실현 대 계획, 편차원인, 지원·저해 요인, 시정조치 등. 단일 재무지표가 아님."},
{uid:"W2-089",set:"W2",tp:"Q6평가",d:"Medium",q:"In Q6 CE2 (Determining Corrective Actions), which technique identifies root problems before adjusting the plan?",o:["PESTEL","SWOT","Porter's Five Forces","Root Cause Analysis (e.g., 5 Whys)"],a:3,e:"시정조치 결정 전 근본원인 = RCA(5 Whys 등). 전략분석 도구(SWOT·Porter)와 구별."},
{uid:"W2-090",set:"W2",tp:"Q6평가",d:"Medium",q:"Which is a SUPPORTING (not inhibiting) factor for Business Plan success?",o:["High staff turnover","Strong digital infrastructure and skilled workforce","Adverse macroeconomic shock","Regulatory non-compliance"],a:1,e:"지원요인 = 강한 디지털 인프라·숙련 인력. 이직·악재·위반은 저해요인. 지원↔저해 분류."},
{uid:"W2-091",set:"W2",tp:"Q6컴플",d:"Hard",q:"Compliance culture parameters (Q6 CE1) are classified into which three levels?",o:["Strategic, Operational, Technical","Past, Present, Future","Federal, State, Local","Board/Strategic, Managerial, Operational"],a:3,e:"컴플라이언스 문화 3계층 = 이사회·전략 / 관리 / 운영 레벨. 각 계층별 통제 책임."},
{uid:"W2-092",set:"W2",tp:"Q6컴플",d:"Hard",q:"At the Managerial Level of compliance culture, the key responsibility is to:",o:["Personally approve every transaction","Translate board policy into procedures and supervise unit-level compliance","Only attend annual training","Report directly to PPATK"],a:1,e:"관리 레벨 = 이사회 정책을 절차로 전환하고 부서 준법을 감독. 운영레벨(4-Eyes 실행)·전략레벨(tone)과 구별."},
{uid:"W2-093",set:"W2",tp:"Q6컴플",d:"Medium",q:"An annual compliance-culture assessment scores the firm as weak at the operational level. The proper Q6 response is to:",o:["Ignore it; culture is intangible","Use the result to target corrective actions at that level","Replace the entire board","Stop all financing"],a:1,e:"Q6 평가 결과 = 약한 계층에 시정조치 타겟팅. 측정→개선 연결. 무형이라 방치는 오답."},
{uid:"W2-094",set:"W2",tp:"역량",d:"Medium",q:"Which is NOT one of the five Competency Dimensions in the Day 2 module?",o:["Skills","Profitability","Knowledge","Attitude/Responsibility"],a:1,e:"역량 5차원에 'Profitability'는 없음. Knowledge·Skills·Attitude 등 역량 구성요소와 무관. NOT 유형."},
{uid:"W2-095",set:"W2",tp:"역량",d:"Hard",q:"'Skill in solving problems in new, unfamiliar contexts' corresponds to which Competency Dimension?",o:["Physical endurance","Routine task execution","Transfer skill (applying competence to new situations)","Seniority"],a:2,e:"새 맥락 문제해결 = Transfer Skill(역량 전이). 정형 업무수행과 구별. SKKNI 역량 정의."},
{uid:"W2-096",set:"W2",tp:"역량",d:"Medium",q:"Which is one of the eight Employability Skills cited in the module?",o:["Stock ownership","Communication / teamwork / problem-solving","Foreign citizenship","Personal car ownership"],a:1,e:"Employability Skill 8종 = 의사소통·팀워크·문제해결 등 직무 일반역량. 자산·국적과 무관."},
{uid:"W2-097",set:"W2",tp:"ThreeLines",d:"Hard",q:"In the Three Lines of Defense, the Compliance Function belongs to which line, and why?",o:["Third line — it audits independently","First line — it owns the risk","Outside the model","Second line — it provides oversight/monitoring independent of the business"],a:3,e:"Compliance = 2nd Line(독립 감독·모니터링). 1st = 사업부(위험보유), 3rd = Internal Audit. 계층 함정."},
{uid:"W2-098",set:"W2",tp:"ThreeLines",d:"Medium",q:"Which statement about the Three Lines of Defense is CORRECT?",o:["Compliance is the first line","All three lines report to the same manager","The first line is Internal Audit","The third line (Internal Audit) provides independent assurance to the board"],a:3,e:"3rd Line(Internal Audit)는 이사회에 독립적 assurance 제공. 독립성이 핵심. 보고라인 분리."},
{uid:"W2-099",set:"W2",tp:"BP보고",d:"Hard",q:"A Finance Company fails to submit its Business Plan by the POJK 24/2019 deadline. The likely consequence is:",o:["No consequence","Administrative sanction / supervisory action by OJK","Automatic license upgrade","A dividend bonus"],a:1,e:"Business Plan 기한 미제출 = OJK 행정제재·감독조치 대상. 보고의무 위반 결과."},
{uid:"W2-100",set:"W2",tp:"BP보고",d:"Hard",q:"A self-assessment matrix with a corrective action plan, due April 30, is which report?",o:["Business Plan Realization Report (monthly/quarterly)","Annual GCG Report","Business Plan Supervision Report","Suspicious Transaction Report"],a:1,e:"자가평가 매트릭스+시정계획, 4/30 기한 = 연간 GCG Report. 기한·구성으로 식별. Realization과 구별."},
{uid:"W3-066",set:"W3",tp:"TARIF",d:"Hard",q:"A Director makes a decision and is the one who must answer to the board and OJK for its outcome, while a manager carries out the task. The Director's position reflects which TARIF principle?",o:["Accountability","Responsibility","Independence","Transparency"],a:0,e:"결과에 대해 답할 의무 = Accountability(설명책임). Responsibility는 업무 수행 의무. 둘 변별 함정."},
{uid:"W3-067",set:"W3",tp:"TARIF",d:"Medium",q:"Disclosing financial condition and risk exposures clearly to stakeholders reflects which TARIF principle?",o:["Transparency","Independence","Responsibility","Fairness"],a:0,e:"명확한 정보 공개 = Transparency. TARIF = Transparency·Accountability·Responsibility·Independence·Fairness."},
{uid:"W3-068",set:"W3",tp:"ISO31000",d:"Hard",q:"According to ISO 31000:2018, the ultimate purpose of risk management is:",o:["The creation and protection of value","Eliminating all risk","Maximizing short-term profit","Avoiding all regulatory penalties"],a:0,e:"ISO 31000:2018 궁극 목적 = 가치의 창출·보호(creation and protection of value). 위험 완전제거가 아님."},
{uid:"W3-069",set:"W3",tp:"ISO31000",d:"Medium",q:"Which is NOT one of the ISO 31000:2018 risk management principles?",o:["Integrated","Profit-maximizing","Structured and comprehensive","Dynamic"],a:1,e:"'Profit-maximizing'은 ISO 31000 원칙 아님. Integrated·Structured·Customized·Inclusive·Dynamic 등. NOT 유형."},
{uid:"W3-070",set:"W3",tp:"4층구조",d:"Hard",q:"In the Governance–Risk Mgmt–Internal Control–Internal Audit four-layer structure, which layer provides independent assurance that the other three function effectively?",o:["Governance","Internal Audit","Internal Control","Risk Management"],a:1,e:"독립적 assurance = Internal Audit(최종 검증층). Governance가 최상위 방향, IC는 일상통제."},
{uid:"W3-071",set:"W3",tp:"전략",d:"Hard",q:"KBBF launches a Digital Onboarding strategy. Which pair of risks is the KEY risk scope to manage?",o:["No new risks arise","Operational Risk (system/process) and Cyber/IT Security Risk","Strategic Risk and Reputation Risk only","Liquidity Risk and Market Risk"],a:1,e:"디지털 온보딩 핵심 위험 = 운영(시스템·프로세스) + 사이버/IT보안. 전략 실행에 따른 위험 scope 식별."},
{uid:"W3-072",set:"W3",tp:"전략",d:"Medium",q:"The four stages of developing a corporate strategy, in order, begin with:",o:["Risk acceptance first","Company Diagnosis → strategy formulation → implementation → evaluation","Evaluation first","Implementation, then diagnosis"],a:1,e:"전략 4단계: 진단(Diagnosis) → 수립 → 실행 → 평가. 진단이 시작. 순서 함정."},
{uid:"W3-073",set:"W3",tp:"전략",d:"Medium",q:"'Company Diagnosis' in strategy development includes:",o:["Only competitor pricing","Only the OJK report","Internal capabilities and external environment analysis (SWOT/PESTEL inputs)","Only the share price"],a:2,e:"기업진단 = 내부역량 + 외부환경 분석(SWOT·PESTEL 투입). 단일 요소가 아님."},
{uid:"W3-074",set:"W3",tp:"Matrix",d:"Hard",q:"An operational event causes a financial loss of IDR 1.5 billion. On the 5x5 matrix, the Impact score is most likely:",o:["Score 3 (Moderate)","Score 2 (Minor)","Score 1 (Insignificant)","Score 5 (Catastrophic/Severe — above IDR 1 billion)"],a:3,e:"IDR 1 billion 초과 손실 = 최고 Impact 등급(Score 5). 5x5 재무 경계값 매핑. 계산형."},
{uid:"W3-075",set:"W3",tp:"Matrix",d:"Hard",q:"A risk event has Impact Score 4 and Likelihood Score 4. The risk level (Impact × Likelihood) on a 5x5 matrix is:",o:["High / Extreme (16 → upper band)","Moderate","Cannot be computed","Low"],a:0,e:"4×4=16 → 5x5 매트릭스 상단(High/Extreme) 구간. Risk = Impact × Likelihood. 계산형 변별."},
{uid:"W3-076",set:"W3",tp:"Matrix",d:"Medium",q:"A likelihood rating of Score 1 ('Very Rare') corresponds to an event occurring:",o:["Daily","Almost certainly, multiple times a year","Monthly","Very rarely (e.g., once in many years / very low probability)"],a:3,e:"Likelihood Score 1 = Very Rare(다년 1회 수준 극저빈도). 5는 거의 확실. 척도 방향."},
{uid:"W3-077",set:"W3",tp:"Matrix",d:"Hard",q:"An event triggering license revocation or a serious data-confidentiality breach maps to which non-financial Impact score?",o:["Score 5 (Catastrophic) — license revocation/major breach","Score 1 (Insignificant)","Not on the matrix","Score 2 (Minor)"],a:0,e:"라이선스 취소·중대 정보유출 = 비재무 Impact Score 5(최악). 비재무 축(평판·규정준수·고객·서비스) 포함."},
{uid:"W3-078",set:"W3",tp:"Treatment",d:"Hard",q:"KBBF decides to cancel its planned expansion into a high-risk overseas market. This is which risk treatment?",o:["Risk Acceptance","Risk Transfer","Risk Avoidance","Risk Reduction"],a:2,e:"고위험 진출 취소 = Risk Avoidance(회피). 활동 자체를 안 함. 4유형 매핑."},
{uid:"W3-079",set:"W3",tp:"Treatment",d:"Medium",q:"Buying cyber insurance and outsourcing a risky function is an example of:",o:["Risk Reduction","Risk Avoidance","Risk Transfer","Risk Acceptance"],a:2,e:"보험·아웃소싱 = Risk Transfer(전가). 제3자에 위험 이전."},
{uid:"W3-080",set:"W3",tp:"Treatment",d:"Medium",q:"Implementing end-to-end encryption as a proactive control is which treatment?",o:["Risk Acceptance","Risk Avoidance","Risk Reduction (mitigation)","Risk Transfer"],a:2,e:"암호화 등 사전통제 = Risk Reduction(완화). 위험 발생가능성·영향 축소."},
{uid:"W3-081",set:"W3",tp:"Treatment",d:"Medium",q:"A minor operational risk below IDR 100 million is left as-is with no action. This is:",o:["Risk Reduction","Risk Transfer","Risk Avoidance","Risk Acceptance"],a:3,e:"소액·경미 위험 무조치 수용 = Risk Acceptance(수용). 비용 대비 효익으로 감내."},
{uid:"W3-082",set:"W3",tp:"Treatment",d:"Hard",q:"Under the dual-KPI integration, if the strategic KPI is 'ROE 3%', the paired risk KPI is best framed as:",o:["Eliminate the ROE target","A risk limit/threshold (e.g., NPF ceiling) bounding how the ROE is pursued","Ignore risk entirely","Maximize all lending regardless of risk"],a:1,e:"전략 KPI(ROE 3%)와 짝지은 리스크 KPI = 그 추구를 제약하는 위험한도(예: NPF 상한). Dual-KPI 통합."},
{uid:"W3-083",set:"W3",tp:"Treatment",d:"Medium",q:"In the 4P framework (People-Policy-Process-Performance), 'establishing risk policies and limits' falls under:",o:["People","Performance","Process","Policy"],a:3,e:"위험정책·한도 수립 = Policy. People(인력·문화), Process(절차), Performance(성과측정)와 구별."},
{uid:"W3-084",set:"W3",tp:"RiskLimit",d:"Hard",q:"Order the risk limit hierarchy from the broadest outer bound to the operating target:",o:["Risk Capacity > Risk Appetite > Risk Tolerance","Appetite > Capacity > Tolerance","Tolerance > Appetite > Capacity","They are all equal"],a:0,e:"3계층 위계: Capacity(최대 감내능력) > Appetite(감수 의향) > Tolerance(허용 변동). Capacity가 외곽 한계. 순서 함정."},
{uid:"W3-085",set:"W3",tp:"RiskLimit",d:"Hard",q:"A company stipulates 'NPF must not exceed 5%'. This statement is an example of:",o:["Vision statement","Risk Avoidance","A risk limit / risk tolerance threshold","Risk Capacity"],a:2,e:"구체적 상한(NPF ≤5%) = 위험한도/Tolerance 임계. Capacity는 최대 감내능력(더 넓음)."},
{uid:"W3-086",set:"W3",tp:"RiskLimit",d:"Medium",q:"Risk appetite is BEST defined as:",o:["The maximum risk the firm can survive","A regulatory penalty","The aggregate risk level the firm is willing to take to pursue its objectives","The audit frequency"],a:2,e:"Appetite = 목표 추구 위해 감수하려는 총 위험수준. Capacity(생존 한계)와 구별."},
{uid:"W3-087",set:"W3",tp:"RiskLimit",d:"Hard",q:"Which method of determining risk limits relies on mathematical models based on empirical data (e.g., VaR)?",o:["Benchmarking only","Random allocation","Statistical/quantitative modeling method","Judgmental / expert method"],a:2,e:"실증데이터 기반 수리모델(VaR 등) = 통계·정량 모델링 방법. 전문가 판단법과 구별."},
{uid:"W3-088",set:"W3",tp:"GCG",d:"Medium",q:"In POJK 48/2024, 'PVML' refers to:",o:["Finance/multifinance companies (Perusahaan Pembiayaan/Modal Ventura/LKM) within scope","A capital ratio","A reporting deadline","A type of risk"],a:0,e:"PVML = POJK 48/2024 적용대상 금융사군(Pembiayaan·Modal Ventura·LKM 등). 적용범위 약어."},
{uid:"W3-089",set:"W3",tp:"GCG",d:"Hard",q:"Which is NOT among the stated purposes of implementing GCG under POJK 48/2024?",o:["Improving long-term company value","Guaranteeing a fixed annual dividend","Enhancing compliance and ethical conduct","Protecting stakeholder interests"],a:1,e:"'고정 배당 보장'은 GCG 목적 아님. 이해관계자 보호·준법·기업가치 제고 등이 목적. NOT 유형."},
{uid:"W3-090",set:"W3",tp:"GCG",d:"Medium",q:"POJK 48/2024 in relation to earlier GCG rules (30/2014, 29/2020) is best described as:",o:["Unrelated","A subordinate circular","Applicable only to banks","A consolidating/replacing regulation integrating prior GCG rules"],a:3,e:"48/2024 = 기존 GCG(30/2014·29/2020) 통합·대체. (검증항목: 경과규정 원문 확인 권고)"},
{uid:"W3-091",set:"W3",tp:"3Lines",d:"Hard",q:"In the Three Lines model, which line directly provides products/services to clients and owns/manages the risk?",o:["Governing body","First line (business/operating units)","Third line (internal audit)","Second line (risk & compliance)"],a:1,e:"고객 대면·위험 직접 보유·관리 = 1st Line(사업·운영부서). 2nd 감독, 3rd 검증."},
{uid:"W3-092",set:"W3",tp:"3Lines",d:"Medium",q:"A requirement for third-line (Internal Audit) independence is that it:",o:["Shares staff with the first line","Reports to the business head it audits","Sets the risk appetite","Reports functionally to the board/audit committee, independent of management"],a:3,e:"IA 독립성 = 이사회·감사위 직접 보고, 경영진 독립. 피감부서 보고는 독립성 훼손."},
{uid:"W3-093",set:"W3",tp:"위원회",d:"Hard",q:"The Risk Monitoring Committee, which supports the BOC, is typically chaired by and composed of:",o:["The President Director","An independent Commissioner, with independent/external members","Junior risk staff","External auditors only"],a:1,e:"Risk Monitoring Committee(BOC 지원) = 독립 Commissioner 위원장 + 독립·외부 위원 중심. Risk Management Committee(BOD·실행)와 소속·구성 구별."},
{uid:"W3-094",set:"W3",tp:"위원회",d:"Hard",q:"The Risk Management Function must report directly to, and be independent of, which?",o:["It reports to OJK only","It reports to Internal Audit","It reports to the Director in charge of risk and is independent of risk-taking (business) functions","It reports to the head of lending; no independence needed"],a:2,e:"Risk Mgmt Function = 리스크 담당 Director 직보, 위험인수(사업)기능과 독립. 견제 구조."},
{uid:"W3-095",set:"W3",tp:"위원회",d:"Medium",q:"The minimum composition of the Risk Management Committee includes:",o:["A majority/half-or-more of the Directors plus relevant risk officers","Only one staff member","The external auditor","Only external consultants"],a:0,e:"Risk Management Committee 최소 구성 = Director 절반 이상 + 관련 리스크 담당. (검증: Pasal 원문 확인 권고)"},
{uid:"W3-096",set:"W3",tp:"위원회",d:"Hard",q:"In the risk governance structure example, which committee handles Liquidity Risk, Interest Rate Risk, and funding (ALM)?",o:["Nomination Committee","ALCO (Asset-Liability Committee)","Audit Committee","Risk Management & Credit Policy Committee"],a:1,e:"유동성·금리·ALM = ALCO. Credit/Market/Operational은 Risk Mgmt & Credit Policy Committee. 위원회 관할 변별."},
{uid:"W3-097",set:"W3",tp:"Culture",d:"Hard",q:"A Director personally chairs Risk Management Committee meetings to signal commitment. This corresponds to which risk-culture element?",o:["No-blame culture","Whistleblowing","Annual survey","Tone at the top / leadership commitment"],a:3,e:"리더의 직접 참여·의지 표명 = Tone at the top(리더십 commitment). 문화 정착 최상위 동인."},
{uid:"W3-098",set:"W3",tp:"Culture",d:"Medium",q:"Conducting an annual risk-culture survey to measure employee awareness corresponds to which step?",o:["Avoiding risk","Measuring/monitoring the risk culture","Setting the risk appetite","Designing the culture"],a:1,e:"연례 문화 서베이 = 측정·모니터링 단계. 설계·실행 이후 효과성 점검."},
{uid:"W3-099",set:"W3",tp:"Infra",d:"Medium",q:"Which is one of the six components of risk management infrastructure (PC 3.3)?",o:["Dividend policy","Marketing budget","Risk management information system (RMIS) / data & systems","Share buyback plan"],a:2,e:"인프라 6요소 중 하나 = 위험관리정보시스템(데이터·시스템). 배당·마케팅과 무관."},
{uid:"W3-100",set:"W3",tp:"RiskLimit",d:"Hard",q:"A company sets 'all operational risks must remain at Level 2 (low-to-moderate)'. This statement functions as a:",o:["Risk appetite/limit expressed as a target risk level","Audit finding","Vision statement","Marketing slogan"],a:0,e:"'운영위험 Level 2 이내 유지' = 목표 위험수준으로 표현된 risk appetite/limit. 정성적 한도 설정."},
{uid:"W4-061",set:"W4",tp:"Triangle",d:"Hard",q:"An employee with gambling debts (pressure), weak segregation of duties (opportunity), and a belief that 'the company owes me' (rationalization) commits fraud. Which element can KBBF MOST directly control?",o:["Opportunity","Rationalization","None of them","Pressure"],a:0,e:"Fraud Triangle 3요소 중 조직이 가장 직접 통제 가능한 것 = Opportunity(통제·직무분리 강화). Pressure·Rationalization은 개인 영역."},
{uid:"W4-062",set:"W4",tp:"Triangle",d:"Medium",q:"The training module's fraud model is the Triangle (3 elements). Which element is ADDED in the Fraud Diamond (a different model)?",o:["Capability","Pressure","Rationalization","Opportunity"],a:0,e:"Diamond은 Triangle에 Capability(실행능력) 추가. 단 교재는 Triangle 기준 — 함정. 시험은 Triangle로 대비."},
{uid:"W4-063",set:"W4",tp:"Fraud유형",d:"Hard",q:"A procurement officer accepts a kickback from a vendor in exchange for awarding a contract. This is classified as:",o:["Financial Reporting Fraud","Asset Misappropriation","Corruption","Not fraud"],a:2,e:"리베이트·이해상충 = Corruption 유형. 자산횡령(Asset Misappropriation)·재무보고부정과 구별."},
{uid:"W4-064",set:"W4",tp:"Fraud유형",d:"Medium",q:"Overstating revenue to meet a profit target is which fraud type?",o:["Corruption","Asset Misappropriation","Bribery","Financial Reporting Fraud"],a:3,e:"수익 과대계상 = Financial Reporting Fraud(재무보고부정). 재무제표 왜곡."},
{uid:"W4-065",set:"W4",tp:"4Aspects",d:"Hard",q:"The 'four-eyes principle' in loan approval is an example of which Fraud Control aspect?",o:["Tone at the top","Whistleblowing","Control structure / dual-control mechanism","Sanctions"],a:2,e:"4-Eyes(이중확인) = 통제구조(control structure) aspect. Fraud Control 4 Aspects 중 통제장치."},
{uid:"W4-066",set:"W4",tp:"4Aspects",d:"Medium",q:"Signing an integrity pact and 'tone at the top' fall primarily under which Fraud Control aspect?",o:["External audit","Control environment / leadership commitment","Detection technology","Sanctions enforcement"],a:1,e:"청렴서약·tone at the top = 통제환경(리더십 commitment) aspect. 문화·환경 차원."},
{uid:"W4-067",set:"W4",tp:"4Pillars",d:"Hard",q:"KBBF establishes whistleblowing channels and runs surprise inspections. These belong to which anti-fraud pillar?",o:["Monitoring/Evaluation","Detection","Investigation/Reporting & Sanction","Prevention"],a:1,e:"내부고발·불시점검 = Detection(적발) pillar. Prevention(예방)과 혼동 함정 — 발견 목적."},

const KEY="A B C D".split(" ");
function wkey(set){return "sppi_wrong_"+set}
function getW(set){try{return JSON.parse(localStorage.getItem(wkey(set)))||[]}catch(e){return[]}}
function setW(set,a){try{localStorage.setItem(wkey(set),JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrongUid(uid){const [set,id]=uid.split("-");const w=getW(set);if(!w.includes(id)){w.push(id);setW(set,w)}}
function rmWrongUid(uid){const [set,id]=uid.split("-");setW(set,getW(set).filter(x=>x!==id))}
function allWrongUids(){let r=[];for(const set of ["W1","W2","W3","W4"]){r=r.concat(getW(set).map(id=>set+"-"+id))}return r}
function byUid(uid){return BANK.find(q=>q.uid===uid)}
function clearAllWrong(){for(const set of ["W1","W2","W3","W4"])setW(set,[])}
// 실전 비중 가중: W3(거버넌스·리스크) 최대, W4·W1·W2 순
const WEIGHTS={W1:8, W2:8, W3:14, W4:10}; // 합 40
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function buildExam(){
  let picked=[];
  for(const set of ["W1","W2","W3","W4"]){
    const pool=BANK.filter(q=>q.set===set);
    picked=picked.concat(shuffle(pool).slice(0, WEIGHTS[set]));
  }
  // 전체 순서도 섞고 보기도 셔플
  return shuffle(picked).map(shuffleOpts);
}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(allWrongUids().map(byUid).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp.map(shuffleOpts);cur=0;answers=[];render();return;
  }
  quiz=buildExam();
  cur=0; answers=[]; render();
}

function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span><span class="setbadge set${q.set}">${q.set}</span> &nbsp;${q.uid}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;

function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={uid:q.uid,set:q.set,correct:__c,picked:i};
  if(__c) rmWrongUid(q.uid); else addWrongUid(q.uid);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const bySet={};
  answers.forEach(a=>{bySet[a.set]=bySet[a.set]||{r:0,n:0};bySet[a.set].n++;if(a.correct)bySet[a.set].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  const order=["W1","W2","W3","W4"];
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${order.filter(s=>bySet[s]).map(s=>`<div class="row"><span><span class="setbadge set${s}">${s}</span></span><b>${bySet[s].r} / ${bySet[s].n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">${x.q.uid} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,68)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="start()">새 회차 응시</button>
        ${allWrongUids().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${allWrongUids().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
</html>
