<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--purple:#5b4a7a;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}

  .setW1{background:#eef2f6;color:var(--blue)}.setW2{background:#e7f1ea;color:var(--green)}.setW3{background:#f0ecf5;color:var(--purple)}.setW4{background:#f6e9e6;color:var(--red)}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.topic{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .mix{display:flex;gap:6px;justify-content:center;margin:10px 0 4px;flex-wrap:wrap}
  .mix span{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>

const BANK = [
{uid:"W1-001",set:"W1",tp:"산업사",d:"Hard",q:"Which event directly triggered the strengthening of the SLIK system and the introduction of the Asset Registry in Indonesia?",o:["The 1997-98 Asian Financial Crisis","The 2018 Double Pledge Cases","The 2008-09 Global Financial Crisis","The 2020 COVID-19 Pandemic"],a:1,e:"Double Pledge Cases(동일 자산 중복 담보 사기 대량 발견) → 차주·자산 정보 인프라(SLIK·Asset Registry·Pefindo) 강화 trigger."},
{uid:"W1-002",set:"W1",tp:"산업사",d:"Hard",q:"POJK 46/2024 formalized face-to-face-less financing for Micro/Ultra Micro enterprises. Which event most directly accelerated this need?",o:["The 2020 COVID-19 Pandemic","The 2014 Fuel Price Increase","The 2018 Double Pledge Cases","The 2022 Fuel Subsidy adjustment"],a:0,e:"COVID-19 봉쇄로 대면 financing 불가 → 비대면 채널 수요 폭증 → POJK 46/2024로 공식화."},
{uid:"W1-003",set:"W1",tp:"산업사",d:"Medium",q:"A sharp NPF spike to approximately 4% occurred in which year/event?",o:["Global Financial Crisis 2008","COVID-19 Pandemic 2020","Fuel Price Increase 2014","Double Pledge Cases 2018"],a:1,e:"NPF 4% spike = COVID-19(2020). OJK POJK 14/2020 등 loan restructuring 완화 발동. 2008 GFC는 인니 영향 상대적 적음."},
{uid:"W1-004",set:"W1",tp:"산업사",d:"Medium",q:"Which legislative milestone first established the four core business areas (leasing, factoring, credit card, consumer financing)?",o:["SKB of 3 Ministers (1974)","KMK 448/2000","KMK 1169 (1991)","POJK 35/2018"],a:1,e:"KMK 448/2000 = 4대 사업영역. SKB 1974는 최초 leasing 도입, POJK 35/2018은 Working Capital·Investment 추가."},
{uid:"W1-005",set:"W1",tp:"산업사",d:"Easy",q:"Which regulation added Working Capital and Investment financing to the industry's scope?",o:["KMK 448/2000","POJK 46/2024","POJK 48/2024","POJK 35/2018"],a:3,e:"POJK 35/2018 = Working Capital + Investment Financing 추가. 46/2024는 비대면, 48/2024는 GCG."},
{uid:"W1-006",set:"W1",tp:"법적정의",d:"Medium",q:"Under POJK 35/2018, a Finance Company carries out financing for goods/services for which purposes?",o:["Only consumer purposes","Only productive (business) purposes","Both productive and consumer purposes","Only government-subsidized purposes"],a:2,e:"Finance Company 정의 = productive(사업투자·운전자본) + consumer(소비) 양쪽."},
{uid:"W1-007",set:"W1",tp:"법적정의",d:"Medium",q:"A self-employed person finances a truck used for delivery business. Under Indonesia's classification, this is:",o:["Consumer financing, because the borrower is an individual","Multipurpose financing, regardless of use","Cannot be financed by a Finance Company","Productive financing, because the use purpose is business/income generation"],a:3,e:"인니는 사용 목적 기준 — 영업용이면 Productive(Investment). 한국의 주체(사업자등록) 기준과 다름."},
{uid:"W1-008",set:"W1",tp:"법적정의",d:"Hard",q:"In Sharia financing, which Akad line must be conducted face-to-face (physically) under POJK 46/2025?",o:["Investment Financing","Buy & Sell Financing","Service Financing","All Akad lines can be online"],a:0,e:"Sharia Investment financing은 반드시 대면. Buy&Sell·Service는 대면/온라인 가능. Conventional(POJK 46/2024) 비대면 허용과 구별."},
{uid:"W1-009",set:"W1",tp:"OJK구조",d:"Easy",q:"Finance Companies belong to which OJK sector?",o:["Sector 4 — IKNB (Non-Bank Financial Institutions)","Sector 1 — Banking","Sector 3 — Insurance/Guarantee/Pension","Sector 5 — Fintech/Digital Assets"],a:0,e:"Finance Company = Sector 4 (IKNB = Industri Keuangan Non-Bank)."},
{uid:"W1-010",set:"W1",tp:"HealthLevel",d:"Hard",q:"Which is the CORRECT set of four Health Level assessment factors (POJK 28/2020)?",o:["Capital, Profitability, GCG, Risk Profile","Capital, Liquidity, Earnings, Sensitivity","Solvency, Profitability, Governance, Compliance","Capital, Asset Quality, Management, Earnings"],a:0,e:"4 Factor = Capital · Profitability · GCG · Risk Profile."},
{uid:"W1-011",set:"W1",tp:"HealthLevel",d:"Hard",q:"Under the Composite Rating scale (POJK 28/2020), which rating represents the BEST condition?",o:["Rating 5 — Unhealthy","Rating 3 — Fairly Healthy","Rating 1 — Very Healthy","Rating 4 — Less Healthy"],a:2,e:"1=Very Healthy(최고), 5=Unhealthy(최악). 한국 신용등급 직관과 반대 — 함정."},
{uid:"W1-012",set:"W1",tp:"HealthLevel",d:"Hard",q:"In the Risk Profile factor, Net Risk is determined by:",o:["Inherent Risk + KPMR","Inherent Risk × KPMR","KPMR ÷ Inherent Risk","Inherent Risk − Loan Loss Provisions"],a:1,e:"Net Risk = Inherent Risk × KPMR (매트릭스로 결정). Net Risk·Profile Risk·Residual Risk는 동의어."},
{uid:"W1-013",set:"W1",tp:"HealthLevel",d:"Medium",q:"For KPMR Rating, which represents the most effective risk management?",o:["Rating 3 — Adequate","Rating 1 — Strong","Rating 5 — Weak","Rating 4 — Fairly Weak"],a:1,e:"KPMR 1=Strong(최우수). Inherent Risk·KPMR·Composite 모두 1이 우수, 5가 미흡."},

{uid:"W1-016",set:"W1",tp:"HealthLevel",d:"Medium",q:"How many items are assessed under the GCG factor's 'Outcomes' sub-factor?",o:["8 items","11 items","5 items","4 items"],a:1,e:"GCG Outcomes = 11항목 (BOD·BOC·Committees·Conflict of Interest·Compliance·Internal Audit·External Audit·Risk Mgmt·Remuneration·Transparency·Business Plan)."},
{uid:"W1-017",set:"W1",tp:"HealthLevel",d:"Medium",q:"By when must the year-end Health Level self-assessment be submitted to OJK?",o:["February 15","January 31","April 30","March 31"],a:0,e:"Health Level 자가평가(연말 기준) 제출 = 2월 15일. (GCG·Annual = 4/30)."},
{uid:"W1-018",set:"W1",tp:"감독상태",d:"Hard",q:"Under POJK 49/2024, the Intensive Supervision status is triggered when (among others):",o:["Composite Rank 5, or core-capital/paid-in below 0%","Composite Rank 1, regardless of capital","Only when net NPF exceeds 25%","Composite Rank 4, or core-capital/paid-in ratio 0–50%, or net NPF 5–25%"],a:3,e:"Intensive = Rank 4 / MSMD 0~50% / net NPF 5~25%. Special = Rank 5 / MSMD<0% / net NPF>25%."},
{uid:"W1-019",set:"W1",tp:"감독상태",d:"Hard",q:"KBBF's core-capital-to-paid-in-capital ratio (MSMD) falling below which threshold would trigger Intensive Supervision?",o:["100%","25%","50%","120%"],a:2,e:"MSMD < 50% → Intensive Supervision 진입(POJK 49/2024). 50%는 §4.4.1 MSMD 최저 기준과 동일선."},
{uid:"W1-020",set:"W1",tp:"비율",d:"Hard",q:"What does MSMD measure for a Finance Company?",o:["Modal Sendiri / Modal Disetor = Core Capital / Paid-Up Capital ratio","Minimum Solvency Margin like insurance RBC","Total Debt / Equity leverage","Non-performing financing ratio"],a:0,e:"MSMD = Core Capital/Paid-Up Capital. 보험사 RBC/MMBR(120%)과 다른 개념 — 함정. 최저 ≥50%."},
{uid:"W1-021",set:"W1",tp:"비율",d:"Medium",q:"The legal maximum Gearing Ratio (GR) for a Finance Company is:",o:["5x","15x","No limit","10x"],a:3,e:"GR = Total Debt/Equity, 법정 max 10x. 산업 평균 2.18x."},
{uid:"W1-022",set:"W1",tp:"비율",d:"Medium",q:"Which ratio is calculated as Financing Receivables / Total Assets?",o:["BOPO","FAR","GR","MSMD"],a:1,e:"FAR = Financing Receivables/Total Assets (자산 중 핵심사업 비중). 산업 평균 86.01%."},
{uid:"W1-023",set:"W1",tp:"비율",d:"Medium",q:"BOPO measures which of the following, where lower is better?",o:["Operating Expense / Operating Revenue","Return on Assets","Gearing leverage","Core capital adequacy"],a:0,e:"BOPO = Operating Expense/Operating Revenue (영업비용률, 낮을수록 우수). 산업 평균 82.86%."},
{uid:"W1-024",set:"W1",tp:"비율",d:"Hard",q:"An MSMD of 320% (industry average) means:",o:["The company is in capital deficit","Debt is 3.2x equity","Core capital is 3.2x the paid-up capital — retained earnings accumulated thickly","The company breached the 120% insurance RBC floor"],a:2,e:"MSMD 320% = 자기자본이 납입자본의 3.2배 = 이익잉여금 두텁게 누적. ROA와 직결."},
{uid:"W1-025",set:"W1",tp:"사업영역",d:"Hard",q:"To start an 'Other Financing Business Activity', all five conditions must be met. Which is one of them?",o:["Minimum Core Capital of Rp 100 billion","Foreign ownership below 20%","Health Level Composite Rating of at least 2 (Healthy)","Listing on the Indonesia Stock Exchange"],a:2,e:"5조건: Business plan 포함 · Health Composite ≥2 · Gearing 충족 · Core Capital ≥Rp 200bn · 행정처분 없을 것."},
{uid:"W1-026",set:"W1",tp:"사업영역",d:"Hard",q:"The minimum Core Capital required to undertake Other Financing Business Activities is:",o:["Rp 100 billion","Rp 500 billion","Rp 200 billion","Rp 10 billion"],a:2,e:"Core Capital ≥ Rp 200 billion (5조건 중 하나). Rp 100bn은 Roadmap Pilar 1 최저 자기자본 목표."},
{uid:"W1-027",set:"W1",tp:"사업영역",d:"Medium",q:"Working Capital Financing covers short-term needs within:",o:["3 years","5 years","No time limit","One business cycle"],a:3,e:"Working Capital = 1 business cycle 이내 단기 지출. Investment = 자본재·중장기."},
{uid:"W1-028",set:"W1",tp:"사업영역",d:"Hard",q:"Under POJK 46/2024, non-physical (face-to-face-less) Investment Financing is limited to:",o:["Any debtor, up to Rp 500 million","Micro/Ultra Micro enterprises, max Rp 10 billion/debtor, ≤5% of receivables","Large corporates only, no limit","Consumer borrowers, max Rp 100 million"],a:1,e:"비대면 Investment: Micro/Ultra Micro 대상, Rp 10bn/debtor, 비대면 receivables 최대 5%."},
{uid:"W1-029",set:"W1",tp:"사업영역",d:"Hard",q:"Which statement about per-debtor limits is CORRECT?",o:["Business Capital Facility = Rp 500 million; Fund Facility = Rp 10 billion","Business Capital Facility = Rp 10 billion; Fund Facility = Rp 500 million","Both facilities are capped at Rp 100 million","General (face-to-face) Investment Financing is capped at Rp 10 billion"],a:1,e:"Business Capital Facility Rp 10bn/debtor, Fund Facility Rp 500M/debtor. 일반 대면 Investment Financing은 차주당 한도 없음."},
{uid:"W1-030",set:"W1",tp:"사업영역",d:"Medium",q:"Collateral is exempt for a Business Capital Facility when the amount per debtor is:",o:["≤ Rp 10 billion","≤ Rp 100 million","≤ Rp 500 million","Never exempt"],a:1,e:"Business Capital Facility ≤ Rp 100 million/debtor → 담보 면제."},
{uid:"W1-031",set:"W1",tp:"Lease",d:"Medium",q:"Which is a core rule of a Finance Lease?",o:["The debtor owns the goods during the lease term","No collateral or registration is required","It is always treated as an operating expense","Ownership remains with the Finance Company; debtor cannot re-lease to third parties; plate/label attached"],a:3,e:"Finance Lease: 소유권은 Finance Company 귀속, 제3자 re-lease 금지, plate/label 부착 의무."},
{uid:"W1-032",set:"W1",tp:"Lease",d:"Medium",q:"In a Sale and Leaseback (SLB), the debtor:",o:["Buys an asset from the Finance Company and leases it out","Sells its own asset to the Finance Company and simultaneously leases it back","Transfers ownership permanently with no lease","Pledges the asset to a third party"],a:1,e:"SLB = 본인 자산을 Finance Company에 매도 + 동시에 다시 lease. 효과: 자산 유동화·운전자본 확보."},
{uid:"W1-033",set:"W1",tp:"Lease",d:"Hard",q:"The key distinction between Finance Lease and Operating Lease is:",o:["Finance Lease transfers substantial benefit + risk (lessee capitalizes under IFRS 16); Operating Lease does not","Finance Lease has no interest; Operating Lease does","Operating Lease always lasts longer","Only Operating Lease requires OJK approval"],a:0,e:"Finance Lease = benefit+risk 이전, IFRS 16 lessee 자산화. Operating Lease = 이전 안 됨, 비용 처리."},
{uid:"W1-034",set:"W1",tp:"자금조달",d:"Medium",q:"Which funding source showed strong YoY growth (+9.92%) in 2025, aligning with Roadmap Pilar 2?",o:["Bonds Issuance","Domestic Loans","Foreign Loans","Subordinated Loans"],a:0,e:"Bonds Issuance +9.92% (국내·해외 차입은 감소). Funding 다각화(Pilar 2)와 일치."},
{uid:"W1-035",set:"W1",tp:"자금조달",d:"Hard",q:"For a Non-Public (Private Placement) securities offering, which requirement differs from a Public Offering?",o:["Risk level mid-low (relaxed) + Equity ≥ Rp 200bn + report 6 months prior","Gearing ratio max 10x","Must be included in the business plan","Financial soundness healthy or above"],a:0,e:"Non-Public: Risk level mid-low(완화) + Equity ≥Rp 200bn + 6개월 전 보고. Public: Risk low + 3개월 전. Gearing 10x·business plan·soundness는 공통."},
{uid:"W1-036",set:"W1",tp:"자금조달",d:"Medium",q:"Which is a mandatory requirement for a Finance Company bond issuance?",o:["Listing on a foreign exchange","KSEI registration + OJK-registered trustee + at least investment rating + quarterly reporting","Minimum 50% foreign ownership","Sharia compliance certification"],a:1,e:"채권 발행: KSEI 등록 · OJK 등록 trustee · 최소 investment rating · 1년 1회+ 평가 · 분기별 실적 보고."},
{uid:"W1-037",set:"W1",tp:"EquityP",d:"Hard",q:"The Equity Participation limit for a single direct participation is:",o:["Max 10% of Equity","Max 50% of Equity","No limit","Max 20% of the Finance Company's Equity"],a:3,e:"직접 참여 개별 최대 20% of Equity. 1개 그룹 내 entities 직접 참여 총합 최대 10%."},
{uid:"W1-038",set:"W1",tp:"EquityP",d:"Medium",q:"Equity Participation differs from Investment Financing in that:",o:["Investment Financing = financing to a debtor (business area); Equity Participation = own-capital investment in another company's shares","They are identical concepts","Equity Participation is a type of consumer loan","Investment Financing requires DSN-MUI approval"],a:0,e:"Investment Financing = debtor에게 financing(사업영역). Equity Participation = 자기자본으로 타사 지분 보유. 혼동 금지."},
