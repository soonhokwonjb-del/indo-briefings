{uid:"W3-019",set:"W3",tp:"Treatment",d:"Hard",q:"If residual risk still exceeds the risk appetite after treatment, the company should:",o:["Ignore it","Apply additional treatment or escalate for a risk acceptance decision by appropriate authority","Hide it","Increase the appetite arbitrarily"],a:1,e:"잔여위험 > appetite = 추가처리 또는 적정권한자 수용결정 에스컬레이션. 함정: 무시·은폐·자의적 상향은 부적절."},
{uid:"W3-020",set:"W3",tp:"RiskLimit",d:"Hard",q:"Risk limits serve primarily to:",o:["Maximize risk-taking","Operationalize risk appetite by setting concrete boundaries (e.g., exposure caps)","Eliminate all risk","Replace the BOD"],a:1,e:"Risk limit = appetite를 구체 경계(노출한도 등)로 운영화. 함정: 위험극대화·완전제거는 양극단."},
{uid:"W3-021",set:"W3",tp:"RiskLimit",d:"Hard",q:"The BMPP (single 20% / group 50% of equity) is an example of a:",o:["Marketing target","Regulatory concentration risk limit","Gearing ratio","Dividend cap"],a:1,e:"BMPP = 규제상 집중위험 한도. 함정: gearing·배당과 혼동."},
{uid:"W3-022",set:"W3",tp:"RiskLimit",d:"Hard",q:"The maximum gearing ratio of 10x functions as a:",o:["Profit target","Leverage/solvency risk limit","Liquidity ratio","Marketing KPI"],a:1,e:"Gearing 10배 = 레버리지·지급여력 위험 한도. 함정: 이익목표·유동성비율과 혼동."},
{uid:"W3-023",set:"W3",tp:"RiskLimit",d:"Medium",q:"A breach of an established risk limit should trigger:",o:["No action","Escalation, review, and corrective action per the risk framework","A celebration","Immediate dividend payment"],a:1,e:"한도 위반 = 에스컬레이션·검토·시정. 함정: 무조치·무관행동은 부적절."},
{uid:"W3-024",set:"W3",tp:"RiskLimit",d:"Hard",q:"Risk limits should be reviewed:",o:["Never once set","Periodically and when business strategy or conditions materially change","Only when OJK forces it","Daily without exception"],a:1,e:"한도 검토 = 정기 + 전략·상황 중대변화 시. 함정: 불변·강제시한정·매일은 비현실."},
{uid:"W3-025",set:"W3",tp:"RiskLimit",d:"Hard",q:"Setting risk limits too HIGH relative to capacity risks:",o:["Better compliance","Excessive exposure and potential breaches of prudential requirements","Lower returns guaranteed","No effect"],a:1,e:"역량 대비 과도한 한도 = 과잉노출·건전성요건 위반 위험. 함정: '준법개선'은 오답."},
{uid:"W3-026",set:"W3",tp:"RiskLimit",d:"Hard",q:"The relationship between risk appetite, tolerance, and limits is BEST expressed as:",o:["They are unrelated","Appetite (strategic willingness) → Tolerance (acceptable variation) → Limits (operational caps)","Limits set appetite","Tolerance overrides limits"],a:1,e:"Appetite(전략적 의향)→Tolerance(허용편차)→Limit(운영 한도) 위계. 함정: 인과 역전."},
{uid:"W3-027",set:"W3",tp:"RiskLimit",d:"Medium",q:"Exposure limits to a single counterparty primarily control:",o:["Market risk","Concentration/credit risk","Operational risk","Liquidity risk"],a:1,e:"단일 거래상대 노출한도 = 집중·신용위험 통제. 함정: 시장·운영·유동성과 혼동."},
{uid:"W3-028",set:"W3",tp:"RiskLimit",d:"Hard",q:"Which limit type would address the risk of funding long-term assets with short-term liabilities?",o:["Credit concentration limit","Liquidity/maturity-mismatch limit","Foreign director limit","Dividend limit"],a:1,e:"장단기 불일치 = 유동성·만기불일치 한도. 함정: 신용·인사·배당 한도와 혼동."},
{uid:"W3-029",set:"W3",tp:"RiskLimit",d:"Hard",q:"A company sets a risk limit but never monitors compliance with it. This represents:",o:["Effective risk management","A control gap — limits without monitoring are ineffective","Best practice","Regulatory excellence"],a:1,e:"한도 설정 후 미모니터링 = 통제공백(한도만으로는 무의미). 함정: '효과적'으로 오인."},
{uid:"W3-030",set:"W3",tp:"RiskLimit",d:"Hard",q:"The 17.5% financing acquisition cost cap (per contract income) functions as a:",o:["Concentration limit","Cost/efficiency-related prudential limit","Gearing limit","Capital limit"],a:1,e:"17.5% acquisition cap = 비용·효율 관련 건전성 한도(계약수입 기준). 함정: BMPP(집중)·gearing과 혼동 — 기준·목적 다름."},
{uid:"W3-031",set:"W3",tp:"Culture",d:"Hard",q:"The Risk Culture Diagnostic uses how many pillars in the framework referenced?",o:["3 pillars","5 pillars","7 pillars","10 pillars"],a:1,e:"Risk Culture Diagnostic = 5 Pillars. 함정: 인접 숫자 혼동."},
{uid:"W3-032",set:"W3",tp:"Culture",d:"Hard",q:"Risk culture is best described as:",o:["A written policy only","The shared values, attitudes, and behaviors regarding risk throughout the organization","The risk department's headcount","A software system"],a:1,e:"위험문화 = 조직 전반의 위험 관련 공유 가치·태도·행동. 함정: 정책·인원·시스템으로 환원 오류."},
{uid:"W3-033",set:"W3",tp:"Culture",d:"Medium",q:"A strong risk culture is indicated by:",o:["Concealing risk information","Open escalation of risks and accountability at all levels","Punishing those who report risks","Ignoring near-misses"],a:1,e:"강한 위험문화 = 위험 공개 에스컬레이션·전 계층 답책. 함정: 은폐·보복·무시는 약한 문화."},
{uid:"W3-034",set:"W3",tp:"Culture",d:"Hard",q:"The 'tone from the top' in risk culture means leadership:",o:["Delegates all risk decisions downward","Visibly champions risk management and sets the example","Ignores risk for growth","Hides risk appetite"],a:1,e:"Tone from the top = 경영진이 위험관리를 가시적으로 옹호·모범. 함정: 위임·무시·은폐는 약화."},
{uid:"W3-035",set:"W3",tp:"Culture",d:"Hard",q:"Which is a pillar/dimension assessed in a risk culture diagnostic?",o:["Office aesthetics","Leadership & tone, accountability, communication, incentives, and risk awareness","Competitor logos","Lunch quality"],a:1,e:"위험문화 진단 차원: 리더십·답책·소통·인센티브·위험인식 등. 함정: 무관항목으로 오도."},
{uid:"W3-036",set:"W3",tp:"Culture",d:"Medium",q:"Misaligned incentives (e.g., rewarding volume regardless of risk) typically:",o:["Strengthen risk culture","Encourage excessive risk-taking and undermine risk culture","Have no effect","Improve compliance"],a:1,e:"위험 무시한 물량보상 = 과도위험 조장, 위험문화 훼손. 함정: '강화'·'무효과'는 오답."},
{uid:"W3-037",set:"W3",tp:"Culture",d:"Hard",q:"A risk-aware employee who identifies a potential risk should:",o:["Stay silent to avoid trouble","Escalate it through proper channels","Hide it from management","Wait for the annual review"],a:1,e:"위험인식 직원 = 정상채널 에스컬레이션. 함정: 침묵·은폐·지연은 약한 문화 징후."},
{uid:"W3-038",set:"W3",tp:"Culture",d:"Hard",q:"Embedding risk culture across the organization requires:",o:["Only a one-time memo","Consistent leadership messaging, training, aligned incentives, and accountability","Outsourcing culture","Ignoring middle management"],a:1,e:"위험문화 내재 = 일관 리더십·교육·정렬 인센티브·답책. 함정: 일회·외주·중간관리 배제는 실패."},
{uid:"W3-039",set:"W3",tp:"Culture",d:"Medium",q:"The risk culture diagnostic's purpose is to:",o:["Set salaries","Assess strengths and weaknesses of the risk culture to guide improvement","Approve loans","Replace internal audit"],a:1,e:"위험문화 진단 목적 = 강·약점 평가 → 개선 지침. 함정: 급여·여신·감사대체는 무관."},
{uid:"W3-040",set:"W3",tp:"GCG",d:"Hard",q:"Good Corporate Governance for risk oversight requires the BOC to:",o:["Manage daily risk operations","Provide independent supervision of the risk management framework and BOD's risk decisions","Take maximum risk","Avoid all risk discussions"],a:1,e:"GCG 위험감독 = BOC의 위험관리 체계·BOD 위험결정 독립감독. 함정: 일상운영·위험극대화·회피는 오답."},
{uid:"W3-041",set:"W3",tp:"GCG",d:"Hard",q:"The Risk Management Committee typically:",o:["Executes trades","Assists the BOC/BOD in overseeing the risk management framework and policies","Does the marketing","Handles payroll"],a:1,e:"위험관리위원회 = BOC/BOD의 위험체계·정책 감독 보조. 함정: 매매·마케팅·급여는 무관."},
{uid:"W3-042",set:"W3",tp:"GCG",d:"Hard",q:"GCG's five principles (TARIF) applied to risk management mean, for 'Transparency':",o:["Hiding risk exposures","Clear, timely disclosure of material risks to stakeholders","Secret risk policies","Verbal-only risk reports"],a:1,e:"Transparency = 중대위험의 명확·적시 공시. 함정: 은폐·비밀·구두는 위배."},
{uid:"W3-043",set:"W3",tp:"GCG",d:"Medium",q:"Segregation of duties is a governance control that:",o:["Concentrates all power in one person","Separates incompatible functions to prevent fraud and error","Slows everything unnecessarily","Eliminates the need for audit"],a:1,e:"직무분리 = 양립불가 기능 분리 → 부정·오류 방지. 함정: 권한집중·감사불요는 오답."},
{uid:"W3-044",set:"W3",tp:"GCG",d:"Hard",q:"The independence of the Risk Management function from risk-taking units is important because:",o:["It allows the function to take risks","It enables objective risk assessment free from business-line bias","It removes accountability","It is merely formal"],a:1,e:"위험관리 독립성 = 영업라인 편향 없는 객관적 위험평가. 함정: 위험감수·책임제거는 오답."},
{uid:"W3-045",set:"W3",tp:"GCG",d:"Hard",q:"Which governance organ has ULTIMATE responsibility for the company's risk management?",o:["The marketing team","The Board of Directors (with BOC oversight)","External auditors","Individual customers"],a:1,e:"위험관리 최종책임 = 이사회(BOD), BOC 감독. 함정: 마케팅·외부감사·고객은 오답."},
{uid:"W3-046",set:"W3",tp:"GCG",d:"Hard",q:"A conflict of interest in risk decisions should be:",o:["Encouraged for efficiency","Disclosed and managed (e.g., recusal) to preserve objectivity","Hidden","Rewarded"],a:1,e:"이해상충 = 공개·관리(회피 등)로 객관성 유지. 함정: 장려·은폐·보상은 위배."},
{uid:"W3-047",set:"W3",tp:"GCG",d:"Medium",q:"Effective risk governance requires reporting lines that:",o:["Keep risk info from the board","Ensure risk information flows to the BOD/BOC for informed oversight","Stop at middle management","Bypass governance"],a:1,e:"위험 거버넌스 = 위험정보가 BOD/BOC로 흐르도록. 함정: 차단·중간정지·우회는 오답."},
{uid:"W3-048",set:"W3",tp:"위원회",d:"Hard",q:"The Audit Committee primarily assists the BOC in overseeing:",o:["Marketing campaigns","Financial reporting integrity, internal control, and the internal/external audit function","Product pricing","Office leases"],a:1,e:"감사위원회 = 재무보고 무결성·내부통제·감사기능 감독 보조. 함정: 마케팅·가격·임차는 무관."},
{uid:"W3-049",set:"W3",tp:"위원회",d:"Hard",q:"The Risk Monitoring Committee differs from the Risk Management function in that the committee:",o:["Executes day-to-day risk controls","Provides board-level oversight, while the function performs operational risk management","Is part of the first line","Does the marketing"],a:1,e:"위험감시위원회 = 이사회급 감독, 위험관리기능 = 운영적 위험관리. 함정: 위원회를 1선·실무로 오인."},
{uid:"W3-050",set:"W3",tp:"위원회",d:"Medium",q:"Committees under the BOC strengthen governance by:",o:["Duplicating the BOD","Providing focused, expert oversight of specific areas (audit, risk, nomination/remuneration)","Replacing the OJK","Taking over operations"],a:1,e:"BOC 산하 위원회 = 특정 영역(감사·위험·지명보수) 전문 감독. 함정: BOD 중복·OJK 대체는 오답."},
{uid:"W3-051",set:"W3",tp:"위원회",d:"Hard",q:"The Nomination and Remuneration Committee's role in risk governance includes:",o:["Setting interest rates","Ensuring remuneration structures do not incentivize excessive risk-taking","Approving loans","Conducting audits"],a:1,e:"지명보수위원회 = 보상구조가 과도위험을 조장하지 않도록 보장. 함정: 금리·여신·감사는 타 기능."},
{uid:"W3-052",set:"W3",tp:"위원회",d:"Hard",q:"Members of the Audit Committee should ideally be:",o:["All from the marketing team","Independent and possessing relevant financial/accounting expertise","Chosen randomly","The CEO's relatives"],a:1,e:"감사위원 = 독립적 + 재무·회계 전문성. 함정: 마케팅·무작위·연고는 독립성·전문성 훼손."},
{uid:"W3-053",set:"W3",tp:"위원회",d:"Medium",q:"Committee meeting minutes serve to:",o:["Hide decisions","Document discussions, decisions, and follow-up for accountability and audit trail","Replace the BOD","Market the company"],a:1,e:"위원회 회의록 = 논의·결정·후속 문서화(답책·감사추적). 함정: 은폐·대체·마케팅은 오답."},
{uid:"W3-054",set:"W3",tp:"위원회",d:"Hard",q:"If the Risk Committee identifies a control weakness, the appropriate response is to:",o:["Conceal it","Report to the BOC/BOD and ensure remediation is tracked to completion","Reward the responsible unit","Ignore until next year"],a:1,e:"통제약점 발견 = BOC/BOD 보고 + 시정 완료까지 추적. 함정: 은폐·보상·지연은 부적절."},
{uid:"W3-055",set:"W3",tp:"3Lines",d:"Hard",q:"In the Three Lines Model applied to risk, the SECOND line (risk management & compliance) primarily:",o:["Owns and takes the risk","Provides frameworks, oversight, and challenge to the first line","Performs independent audit","Sets the dividend"],a:1,e:"2선 = 체계·감독·1선에 대한 challenge 제공. 함정: 위험소유(1선)·감사(3선)와 혼동."},
{uid:"W3-056",set:"W3",tp:"3Lines",d:"Hard",q:"The internal audit (3rd line) provides assurance on:",o:["Only the marketing budget","The effectiveness of governance, risk management, and internal controls","Only profits","Competitor strategy"],a:1,e:"3선 내부감사 = 거버넌스·위험관리·내부통제 효과성 보증. 함정: 단일항목 한정은 협소."},
{uid:"W3-057",set:"W3",tp:"3Lines",d:"Medium",q:"A common failure is when the second line:",o:["Maintains challenge and independence","Becomes a 'rubber stamp' that approves first-line decisions without real challenge","Reports to the BOC","Provides oversight"],a:1,e:"2선 실패 = 실질 challenge 없이 1선 결정을 '고무도장' 승인. 함정: 나머지는 정상."},
{uid:"W3-058",set:"W3",tp:"3Lines",d:"Hard",q:"Internal audit's independence is compromised if it:",o:["Reports functionally to the audit committee","Audits a process it designed or operated","Is objective","Follows a risk-based audit plan"],a:1,e:"내부감사 독립성 훼손 = 자신이 설계·운영한 프로세스를 감사(self-review). 함정: 나머지는 독립성 보장 요소."},
{uid:"W3-059",set:"W3",tp:"3Lines",d:"Hard",q:"The governing body (BOD/BOC) in the Three Lines Model is responsible for:",o:["Executing controls daily","Overall accountability, setting objectives, and ensuring the framework's adequacy","Doing fieldwork audits","Selling products"],a:1,e:"지배기구 = 전체 답책·목표설정·체계 적정성 보장. 함정: 일상통제·감사실무·영업은 타 역할."},
{uid:"W3-060",set:"W3",tp:"Matrix",d:"Hard",q:"A risk matrix (heat map) plots risks by:",o:["Color preference","Likelihood (probability) against Impact (severity)","Employee names","Alphabetical order"],a:1,e:"위험 매트릭스 = 발생가능성 × 영향(심각도). 함정: 무관 기준으로 오도."},
{uid:"W3-061",set:"W3",tp:"Matrix",d:"Hard",q:"A risk in the HIGH likelihood / HIGH impact quadrant should be:",o:["Accepted with no action","Prioritized for immediate treatment/mitigation","Ignored","Rewarded"],a:1,e:"고가능성·고영향 = 즉시 처리·완화 최우선. 함정: 수용·무시는 위험."},
{uid:"W3-062",set:"W3",tp:"Matrix",d:"Medium",q:"A risk with LOW likelihood and LOW impact is typically:",o:["Escalated to the BOD urgently","Accepted or monitored with minimal resources","Treated as the top priority","Transferred at high cost"],a:1,e:"저가능성·저영향 = 수용·최소 모니터링. 함정: 긴급에스컬레이션·최우선은 자원낭비."},
{uid:"W3-063",set:"W3",tp:"Matrix",d:"Hard",q:"The risk matrix supports decision-making by:",o:["Replacing judgment entirely","Providing a structured, visual prioritization of risks for resource allocation","Hiding risks","Eliminating the need for treatment"],a:1,e:"위험 매트릭스 = 구조화·시각적 우선순위화 → 자원배분. 함정: 판단대체·은폐·처리불요는 오답."},
{uid:"W3-064",set:"W3",tp:"Matrix",d:"Hard",q:"A residual risk plotted on the matrix that remains in the HIGH/HIGH zone after treatment indicates:",o:["Treatment was fully effective","Treatment was insufficient; further action or acceptance decision is needed","No further attention required","The matrix is wrong"],a:1,e:"처리 후에도 고/고 잔존 = 처리 불충분, 추가조치·수용결정 필요. 함정: '효과적'·'무관심'은 오답."},
{uid:"W3-065",set:"W3",tp:"평가",d:"Hard",q:"Evaluating the risk management framework (Q6 perspective) involves assessing whether:",o:["Profits increased only","The framework is adequately designed AND operating effectively","Marketing improved","The logo is modern"],a:1,e:"위험체계 평가(Q6) = 설계 적정성 + 운영 효과성. 함정: 이익·마케팅·외형은 무관."},
{uid:"W3-066",set:"W3",tp:"평가",d:"Hard",q:"The internal control evaluation per POJK 42/2024 uses how many key checkpoints in the referenced checklist?",o:["3-point","8-point","12-point","20-point"],a:1,e:"POJK 42/2024 내부통제 점검 = 8-point checklist. 함정: 인접 숫자 혼동."},
{uid:"W3-067",set:"W3",tp:"평가",d:"Hard",q:"The RM (Risk Management) Process evaluation referenced uses how many stages?",o:["2-stage","4-stage","6-stage","8-stage"],a:1,e:"RM Process 평가 = 4-stage. 함정: 6 evaluation steps(별개)와 혼동."},
{uid:"W3-068",set:"W3",tp:"평가",d:"Hard",q:"The risk/compliance evaluation framework referenced uses how many evaluation steps?",o:["Three steps","Six steps","Ten steps","Two steps"],a:1,e:"평가 = six evaluation steps. 함정: 4-stage RM Process와 숫자 혼동 유도."},
{uid:"W3-069",set:"W3",tp:"평가",d:"Medium",q:"An effective evaluation of risk management should be:",o:["Subjective and undocumented","Objective, evidence-based, and documented","Based on hearsay","Hidden from governance"],a:1,e:"위험관리 평가 = 객관·증거기반·문서화. 함정: 주관·소문·비공개는 부실."},
{uid:"W3-070",set:"W3",tp:"평가",d:"Hard",q:"If the evaluation finds that risk limits exist but are routinely breached without consequence, this indicates:",o:["Strong risk governance","Weak enforcement and accountability gaps","Optimal flexibility","Excellent culture"],a:1,e:"한도 존재하나 무처벌 상시위반 = 집행 취약·답책 공백. 함정: '유연성'·'우수'는 오답."},
{uid:"W3-071",set:"W3",tp:"전략",d:"Hard",q:"Risk appetite should be expressed in a way that is:",o:["Vague and qualitative only","Both qualitative (statements) and quantitative (measurable metrics/limits) where possible","Secret from staff","Changed daily"],a:1,e:"Risk appetite = 정성(서술) + 정량(측정지표·한도) 병행. 함정: 모호·비밀·일변동은 부적절."},
{uid:"W3-072",set:"W3",tp:"전략",d:"Hard",q:"Stress testing within risk management is used to:",o:["Test employee fitness","Assess the company's resilience under severe but plausible adverse scenarios","Market products","Calculate dividends"],a:1,e:"스트레스 테스트 = 심각하나 개연적 역경 시나리오 하 회복력 평가. 함정: 직원·마케팅·배당은 무관."},
{uid:"W3-073",set:"W3",tp:"Culture",d:"Hard",q:"The five pillars of the risk culture diagnostic collectively aim to assess:",o:["Only leadership","The holistic state of risk culture across leadership, accountability, communication, awareness, and behavior dimensions","Only IT systems","Profit margins"],a:1,e:"5 Pillars = 리더십·답책·소통·인식·행동 전반의 위험문화 총체 평가. 함정: 단일 차원·재무로 환원 오류."},
{uid:"W3-074",set:"W3",tp:"GCG",d:"Hard",q:"The 'four eyes principle' in risk governance means:",o:["Hiring people with good eyesight","Requiring at least two persons to approve significant decisions/transactions","Doubling the audit fee","Monitoring CCTV"],a:1,e:"Four-eyes = 중요 결정·거래에 최소 2인 승인 요구. 함정: 동음이의·CCTV 함정."},
{uid:"W3-075",set:"W3",tp:"Treatment",d:"Hard",q:"A company facing a high regulatory-compliance risk on a non-core activity might best choose to:",o:["Accept the risk and continue","Avoid (exit the activity) if the risk outweighs the benefit","Transfer it to customers","Ignore it"],a:1,e:"비핵심 활동의 고규제위험 = 편익 대비 위험 크면 Avoid(철수). 함정: accept·전가·무시는 부적절 — 처리선택 적용 판단."},
{uid:"W3-076",set:"W3",tp:"RiskLimit",d:"Hard",q:"Which sequence correctly links the concepts from broad to specific?",o:["Risk limit → Risk tolerance → Risk appetite","Risk appetite → Risk tolerance → Risk limit","Risk tolerance → Risk limit → Risk appetite","All are the same level"],a:1,e:"Appetite(넓음)→Tolerance→Limit(구체). 함정: 순서 역전 — 위계 식별 핵심."},
{uid:"W3-077",set:"W3",tp:"전략",d:"Hard",q:"A finance company's risk strategy should be APPROVED by:",o:["The marketing manager","The Board (BOD) with BOC oversight","An external vendor","Individual loan officers"],a:1,e:"위험전략 승인 = BOD(BOC 감독). 함정: 실무·외부·개인은 권한 밖."},
{uid:"W3-078",set:"W3",tp:"평가",d:"Hard",q:"When evaluating internal control per the 8-point checklist, a key dimension is:",o:["Office decoration","Control environment, risk assessment, control activities, information & communication, and monitoring","Marketing reach","Number of branches only"],a:1,e:"내부통제 평가 = 통제환경·위험평가·통제활동·정보소통·모니터링(COSO형). 함정: 외형·마케팅·지점수는 무관."},
{uid:"W3-079",set:"W3",tp:"평가",d:"Hard",q:"The four stages of the RM Process evaluation would logically cover:",o:["Only identification","Identification, assessment, treatment, and monitoring & review stages","Only reporting","Only marketing"],a:1,e:"RM Process 4단계 = 식별·평가·처리·모니터링·검토. 함정: 단일단계 한정은 불완전."},
{uid:"W3-080",set:"W3",tp:"Matrix",d:"Hard",q:"In a 5x5 risk matrix, a risk rated likelihood 4 / impact 5 would be classified as:",o:["Low risk","High/extreme risk requiring priority treatment","Negligible","Already resolved"],a:1,e:"가능성4·영향5 = 고/극단 위험, 우선처리. 함정: 'low'·'negligible'은 명백 오답."},
{uid:"W3-081",set:"W3",tp:"GCG",d:"Hard",q:"The principle of 'Fairness' (TARIF) in risk governance requires:",o:["Favoring controlling shareholders","Equitable treatment of all stakeholders including minority shareholders","Ignoring minority interests","Secret related-party deals"],a:1,e:"Fairness = 소수주주 포함 모든 이해관계자 공정대우. 함정: 지배주주 편향·비밀거래는 위배."},
{uid:"W3-082",set:"W3",tp:"위원회",d:"Hard",q:"The frequency of risk/audit committee meetings should be:",o:["Once every five years","Regular and sufficient to discharge oversight duties (e.g., periodically per charter)","Never","Only when a crisis occurs"],a:1,e:"위원회 회의 빈도 = 감독의무 수행에 충분한 정기성(헌장 기준). 함정: 5년주기·위기시만은 감독 공백."},
{uid:"W3-083",set:"W3",tp:"Culture",d:"Hard",q:"Which scenario best demonstrates a WEAK risk culture?",o:["Staff escalate concerns and are heard","A near-miss is concealed to avoid blame, and no lessons are captured","Incentives align with prudent risk-taking","Leadership models risk awareness"],a:1,e:"약한 위험문화 = 비난회피 위해 near-miss 은폐, 교훈 미포착. 함정: 나머지는 강한 문화."},
{uid:"W3-084",set:"W3",tp:"Treatment",d:"Hard",q:"Why is 'Accept' an appropriate treatment for some risks?",o:["All risks must be eliminated","When the cost of treatment exceeds the benefit and the risk is within appetite","Acceptance is never appropriate","Only the OJK can accept risk"],a:1,e:"Accept 적절 = 처리비용>편익 + 위험이 appetite 내일 때. 함정: 전부제거·수용불가는 비현실."},
{uid:"W3-085",set:"W3",tp:"3Lines",d:"Hard",q:"Coordination among the three lines should aim to:",o:["Blur all responsibilities","Avoid gaps and unnecessary duplication while preserving independence","Merge all into one line","Eliminate the second line"],a:1,e:"3선 조정 = 공백·중복 회피(독립성 유지). 함정: 책임모호·병합·제거는 모델 훼손."},
{uid:"W3-086",set:"W3",tp:"평가",d:"Hard",q:"An evaluation concluding that the risk framework is 'well-designed but poorly operated' means:",o:["No action needed","Design is adequate but implementation/effectiveness is deficient — operational remediation required","The design must be scrapped","Everything is fine"],a:1,e:"설계 양호·운영 부실 = 이행·효과성 결함, 운영 시정 필요. 함정: '무조치'·'폐기'는 양극단 오답."},
{uid:"W3-087",set:"W3",tp:"전략",d:"Hard",q:"Risk appetite statements should be reviewed and reaffirmed:",o:["Never","Periodically (e.g., annually) and upon significant strategic/environmental change","Only by the OJK","Daily"],a:1,e:"Risk appetite = 정기(연간 등) + 중대 전략·환경 변화 시 재확인. 함정: 불변·OJK한정·매일은 부적절."},
{uid:"W3-088",set:"W3",tp:"GCG",d:"Hard",q:"The CISO/risk function reporting directly to the BOC (not just the CEO) strengthens:",o:["Marketing","Independence and the ability to escalate without operational interference","Sales","Cost-cutting"],a:1,e:"위험기능의 BOC 직접보고 = 독립성·운영간섭 없는 에스컬레이션 강화. 함정: 마케팅·영업·비용은 무관."},
{uid:"W3-089",set:"W3",tp:"위원회",d:"Medium",q:"An effective committee charter should define:",o:["The lunch menu","Purpose, authority, composition, responsibilities, and reporting","Only the chairperson's name","Marketing slogans"],a:1,e:"위원회 헌장 = 목적·권한·구성·책임·보고. 함정: 무관·단편 정보."},
{uid:"W3-090",set:"W3",tp:"Matrix",d:"Hard",q:"Mapping inherent risk vs residual risk on the matrix helps visualize:",o:["Nothing useful","The effectiveness of controls/treatment (the reduction from inherent to residual)","Employee satisfaction","Market share"],a:1,e:"inherent vs residual 매핑 = 통제·처리 효과성(감소폭) 시각화. 함정: 무관·만족도·점유율은 오답."},
{uid:"W3-091",set:"W3",tp:"전략",d:"Hard",q:"A key indicator that risk appetite is too AGGRESSIVE relative to capacity is:",o:["Comfortable capital buffers","Frequent breaches of prudential limits and capital strain","Stable NPF","Low gearing"],a:1,e:"과도한 risk appetite 징후 = 건전성한도 빈번 위반·자본 압박. 함정: 나머지는 건전 징후."},
{uid:"W3-092",set:"W3",tp:"Culture",d:"Hard",q:"Linking risk culture to incentive structures means:",o:["Rewarding only short-term volume","Designing incentives that reward prudent, risk-adjusted performance","Ignoring risk in bonuses","Punishing all risk-taking"],a:1,e:"위험문화-인센티브 연계 = 위험조정 성과 보상. 함정: 단기물량·위험무시·전면처벌은 부적절."},
{uid:"W3-093",set:"W3",tp:"3Lines",d:"Hard",q:"Which is the CORRECT mapping in the Three Lines Model?",o:["1st=audit, 2nd=operations, 3rd=risk","1st=operational management/risk owners, 2nd=risk & compliance oversight, 3rd=internal audit","1st=risk, 2nd=audit, 3rd=operations","All three are internal audit"],a:1,e:"정답: 1선=영업·위험소유, 2선=위험·준법감독, 3선=내부감사. 함정: 선 배치 뒤섞기 — 빈출."},
{uid:"W3-094",set:"W3",tp:"평가",d:"Hard",q:"The six evaluation steps and the four-stage RM process differ in that:",o:["They are identical","The six steps describe the evaluation methodology; the four stages describe the RM process being evaluated","Both have ten steps","Neither exists"],a:1,e:"6 evaluation steps = 평가 방법론, 4-stage = 평가 대상인 RM 프로세스. 함정: 두 숫자·개념 혼동 — 구분 핵심."},
{uid:"W3-095",set:"W3",tp:"GCG",d:"Hard",q:"Related-party transactions in a finance company must be:",o:["Hidden from the BOC","Conducted at arm's length, disclosed, and subject to governance approval","Always prohibited","Approved only by the related party"],a:1,e:"특수관계자 거래 = arm's length·공시·거버넌스 승인. 함정: 은폐·당사자승인은 이해상충."},
{uid:"W3-096",set:"W3",tp:"RiskLimit",d:"Hard",q:"BMPP for parties in a CONTROLLING relationship is set at:",o:["20% of equity","50% of equity","17.5% of income","No limit"],a:1,e:"지배관계 당사자 BMPP = 50% of equity. 함정: single 20%·acquisition 17.5%와 혼동."},
{uid:"W3-097",set:"W3",tp:"전략",d:"Hard",q:"A risk-aware strategic decision integrates:",o:["Only expected returns","Both the potential return AND the associated risk (risk-adjusted view)","Only the downside","Neither"],a:1,e:"위험인식 전략결정 = 기대수익 + 수반위험(위험조정 관점). 함정: 수익만·하방만은 편향."},
{uid:"W3-098",set:"W3",tp:"위원회",d:"Hard",q:"If a committee consistently lacks quorum and fails to meet, the governance impact is:",o:["Improved oversight","Weakened oversight and a governance deficiency requiring remediation","No impact","Better efficiency"],a:1,e:"위원회 정족수 미달·미개최 = 감독 약화, 거버넌스 결함 시정 필요. 함정: '개선'·'무영향'은 오답."},
{uid:"W3-099",set:"W3",tp:"평가",d:"Hard",q:"The ultimate purpose of evaluating risk management and internal control is to:",o:["Assign blame to staff","Provide assurance and drive improvement so the company operates within its risk appetite","Increase complexity","Satisfy curiosity"],a:1,e:"위험관리·내부통제 평가 목적 = 보증 제공 + 개선 → appetite 내 운영. 함정: 비난·복잡화는 목적 아님."},
{uid:"W3-100",set:"W3",tp:"전략",d:"Hard",q:"A candidate must integrate the concepts. Which statement is CORRECT?",o:["Risk appetite is set by limits; treatment options are Buy/Sell/Hold","Risk appetite → tolerance → limits; treatment = Avoid/Transfer/Mitigate/Accept; minor risk <IDR 100m is Accepted; controlling-party BMPP is 50% of equity","Inherent risk is the risk after controls; the 3rd line owns risk","Risk culture is just a written policy and the 1st line is internal audit"],a:1,e:"정답: appetite→tolerance→limit 위계, 처리 4선택(Avoid/Transfer/Mitigate/Accept), 경미위험(<IDR100m) Accept, 지배관계 BMPP 50% equity. 함정: 위계역전·매매용어·inherent/residual swap·1선 오배치를 한 문항에 집약 — 빈출 종합."},
{uid:"W4-001",set:"W4",tp:"POJK",d:"Hard",q:"The principal regulation governing the anti-fraud strategy for finance companies is:",o:["POJK 46/2024","POJK 12/2024","POJK 35/2018","POJK 43/2024"],a:1,e:"Anti-fraud strategy = POJK 12/2024. 함정: 46/2024(사업운영)·35/2018(시설)·43/2024(HR)는 별개."},
{uid:"W4-002",set:"W4",tp:"POJK",d:"Hard",q:"SIPELAKU, referenced in the anti-fraud framework, is associated with which regulation?",o:["POJK 28/2024","POJK 12/2017","POJK 34/2018","POJK 19/2025"],a:0,e:"SIPELAKU = POJK 28/2024. 함정: 12/2017(AML)·34/2018(F&P)·19/2025(MSME)와 혼동."},
{uid:"W4-003",set:"W4",tp:"POJK",d:"Hard",q:"SIPELAKU primarily functions as:",o:["A loan origination system","A system/registry related to reporting perpetrators/fraud actors in the financial sector","A marketing tool","A payroll system"],a:1,e:"SIPELAKU = 금융권 부정행위자 신고·등록 관련 시스템. 함정: 여신·마케팅·급여 시스템과 혼동."},
{uid:"W4-004",set:"W4",tp:"POJK",d:"Hard",q:"Under the anti-fraud regulation, the 'Primary Party' prohibition (Art. 9(4)) refers to:",o:["A reward for whistleblowers","A restriction barring a party who committed fraud from key roles/positions","A new product type","A marketing rule"],a:1,e:"Primary Party 금지(Art.9(4)) = 부정행위자가 핵심 직위에 오르는 것 제한. 함정: 보상·상품·마케팅은 무관."},
{uid:"W4-005",set:"W4",tp:"POJK",d:"Hard",q:"The anti-fraud regulation requires a correction/follow-up deadline of:",o:["5 working days","15 working days (Art. 18)","30 working days","60 calendar days"],a:1,e:"시정·후속 기한 = 15 working days(Art.18). 함정: 인접 일수 혼동."},
{uid:"W4-006",set:"W4",tp:"POJK",d:"Medium",q:"The Implementation Report under the anti-fraud framework follows a structure of how many fields?",o:["5 fields","13 fields","20 fields","8 fields"],a:1,e:"Implementation Report = 13-field 구조. 함정: 인접 숫자 혼동."},
{uid:"W4-007",set:"W4",tp:"POJK",d:"Hard",q:"The anti-fraud strategy philosophy emphasized in the textbook is:",o:["'Cure is better than prevention'","'Prevention is better than cure'","'Ignore minor fraud'","'Punishment only'"],a:1,e:"Anti-fraud 철학 = 'prevention is better than cure'(예방 우선). 함정: 역전·무시·처벌일변도는 오답."},
{uid:"W4-008",set:"W4",tp:"POJK",d:"Hard",q:"Which institution issues and supervises the anti-fraud regulation (POJK 12/2024)?",o:["Bank Indonesia","OJK","The police alone","APPI"],a:1,e:"Anti-fraud POJK 발행·감독 = OJK. 함정: BI·경찰단독·협회는 오답."},
{uid:"W4-009",set:"W4",tp:"POJK",d:"Medium",q:"A documented internal control system and an integrated anti-fraud strategy are:",o:["Optional for finance companies","Required (mandatory) for finance companies","Only for banks","Only for sharia companies"],a:1,e:"문서화 내부통제 + 통합 anti-fraud 전략 = finance company 의무. 함정: 선택·은행한정·샤리아한정은 오답."},
{uid:"W4-010",set:"W4",tp:"POJK",d:"Hard",q:"The compliance with the anti-fraud sanctions framework matrix is intended to:",o:["Reward fraudsters","Map violations to proportionate sanctions for consistent enforcement","Hide violations","Increase fraud"],a:1,e:"제재 매트릭스 = 위반-비례제재 매핑으로 일관 집행. 함정: 보상·은폐는 정반대."},
{uid:"W4-011",set:"W4",tp:"4Pillars",d:"Hard",q:"The anti-fraud strategy is built on FOUR pillars. Which set is correct?",o:["Prevention, Detection, Investigation/Reporting & Sanction, Monitoring/Evaluation & Follow-up","Buy, Sell, Hold, Trade","Plan, Do, Check, Act","Hire, Train, Promote, Fire"],a:0,e:"Anti-fraud 4기둥: 예방·탐지·조사/보고·제재·모니터링/평가·후속. 함정: PDCA·매매용어와 혼동."},
{uid:"W4-012",set:"W4",tp:"4Pillars",d:"Hard",q:"The FIRST pillar (Prevention/Deterrence) includes measures such as:",o:["Post-fraud lawsuits only","Anti-fraud awareness, KYC, dual control, and a strong control environment","Ignoring red flags","Paying ransoms"],a:1,e:"예방 기둥 = anti-fraud 인식·KYC·dual control·강한 통제환경. 함정: 사후소송·무시는 예방 아님."},
{uid:"W4-013",set:"W4",tp:"4Pillars",d:"Hard",q:"The DETECTION pillar relies primarily on:",o:["Hoping fraud is reported voluntarily","Whistleblowing systems, surprise audits, data analytics, and red-flag monitoring","Marketing campaigns","Annual parties"],a:1,e:"탐지 기둥 = 내부고발·불시감사·데이터분석·red-flag 모니터링. 함정: 자발신고 기대·무관활동은 부실."},
{uid:"W4-014",set:"W4",tp:"4Pillars",d:"Hard",q:"The INVESTIGATION & Reporting pillar requires that, upon suspected fraud, the company:",o:["Conceals it","Conducts a structured investigation and reports per regulatory requirements (incl. OJK where applicable)","Ignores it","Rewards the perpetrator"],a:1,e:"조사·보고 기둥 = 구조화 조사 + 규제 보고(필요시 OJK). 함정: 은폐·무시·보상은 위반."},
{uid:"W4-015",set:"W4",tp:"4Pillars",d:"Hard",q:"The MONITORING & Evaluation pillar ensures that:",o:["Fraud cases are forgotten","Lessons learned drive control improvements and the strategy is continuously evaluated","No follow-up occurs","Only profits are tracked"],a:1,e:"모니터링·평가 기둥 = 교훈 → 통제개선 + 전략 지속평가. 함정: 망각·무후속은 정반대."},
{uid:"W4-016",set:"W4",tp:"4Pillars",d:"Medium",q:"'Dual control' as a fraud prevention measure means:",o:["One person does everything","Two persons jointly perform/verify a sensitive task to reduce fraud risk","Doubling the workload pointlessly","Controlling two companies"],a:1,e:"Dual control = 민감업무를 2인 공동수행·검증 → 부정위험 감소. 함정: 단독·무의미 중복·동음이의 함정."},
{uid:"W4-017",set:"W4",tp:"4Pillars",d:"Hard",q:"The 'four-eye principle' in the financing process supports which pillar?",o:["Monitoring only","Prevention (requiring a second review/approval to deter fraud)","Investigation","None"],a:1,e:"Four-eye = 예방 기둥(2차 검토·승인으로 부정 억제). 함정: 모니터링·조사로 오분류."},
{uid:"W4-018",set:"W4",tp:"4Pillars",d:"Hard",q:"A red flag such as an employee refusing to take leave may indicate:",o:["Excellent dedication only","A possible fraud concealment risk warranting attention","Nothing relevant","A reward is due"],a:1,e:"휴가 거부 = 부정 은폐 가능성 red flag(탐지). 함정: '헌신'으로만 해석하면 탐지 실패."},
{uid:"W4-019",set:"W4",tp:"4Pillars",d:"Hard",q:"KYC (Know Your Customer) in fraud prevention primarily reduces:",o:["IT costs","The risk of fraudulent/fictitious customers and identity-based fraud","Marketing spend","Office rent"],a:1,e:"KYC = 허위·가공 고객·신원기반 부정 위험 감소. 함정: IT·마케팅·임차 비용과 무관."},
{uid:"W4-020",set:"W4",tp:"4Pillars",d:"Medium",q:"The anti-fraud strategy should be communicated to:",o:["Only the BOD","All employees, with role-appropriate training and awareness","Only the audit team","No one"],a:1,e:"Anti-fraud 전략 = 전 직원에 직무별 교육·인식. 함정: BOD·감사 한정은 부실."},
{uid:"W4-021",set:"W4",tp:"RBA",d:"Hard",q:"A Risk-Based Approach (RBA) to fraud means:",o:["Treating all areas identically","Allocating anti-fraud resources proportionate to assessed fraud risk in each area","Ignoring high-risk areas","Random checks only"],a:1,e:"RBA = 영역별 평가된 부정위험에 비례해 자원 배분. 함정: 동일처리·고위험무시는 RBA 반대."},
{uid:"W4-022",set:"W4",tp:"RBA",d:"Hard",q:"Under RBA, areas with HIGHER fraud risk (e.g., cash handling, lending approvals) should receive:",o:["Less scrutiny","More intensive controls and monitoring","No controls","Only annual review"],a:1,e:"고위험 영역(현금·여신승인) = 강화 통제·모니터링. 함정: 완화·무통제는 RBA 위배."},
{uid:"W4-023",set:"W4",tp:"RBA",d:"Hard",q:"A fraud risk assessment should be:",o:["Done once and never updated","Periodic and updated as the business, processes, and threats change","Based on guesswork","Hidden from management"],a:1,e:"부정위험 평가 = 정기 + 사업·프로세스·위협 변화 시 갱신. 함정: 일회·추측·비공개는 부실."},
{uid:"W4-024",set:"W4",tp:"RBA",d:"Medium",q:"The fraud triangle identifies three conditions enabling fraud:",o:["Cash, Credit, Capital","Pressure/Incentive, Opportunity, Rationalization","Plan, Do, Check","Buy, Sell, Hold"],a:1,e:"Fraud triangle = 압력/동기·기회·합리화. 함정: 재무용어·PDCA와 혼동."},
{uid:"W4-025",set:"W4",tp:"RBA",d:"Hard",q:"Strong internal controls primarily attack which leg of the fraud triangle?",o:["Pressure","Opportunity (by removing the chance to commit and conceal fraud)","Rationalization","None"],a:1,e:"강한 내부통제 = 'Opportunity(기회)' 제거. 함정: 압력·합리화는 통제로 직접 제거 어려움."},
{uid:"W4-026",set:"W4",tp:"RBA",d:"Hard",q:"A code of conduct and ethics training primarily addresses which leg of the fraud triangle?",o:["Opportunity","Rationalization (by reinforcing ethical norms)","Cash flow","Gearing"],a:1,e:"행동강령·윤리교육 = 'Rationalization(합리화)' 차단. 함정: 기회·재무지표와 혼동."},
{uid:"W4-027",set:"W4",tp:"RBA",d:"Hard",q:"Data analytics in fraud detection enables:",o:["Slower detection","Identification of anomalies and patterns across large datasets that manual review would miss","Hiding fraud","Marketing only"],a:1,e:"데이터분석 = 대량데이터 이상·패턴 식별(수작업 한계 보완). 함정: 지연·은폐는 정반대."},
{uid:"W4-028",set:"W4",tp:"RBA",d:"Hard",q:"A fraud that recurs in the same process despite prior controls indicates:",o:["Controls are perfect","Control design or operating effectiveness is deficient and needs strengthening","No action needed","The fraud is acceptable"],a:1,e:"동일 프로세스 부정 재발 = 통제 설계·운영 효과성 결함, 강화 필요. 함정: '완벽'·'무조치'는 오답."},
{uid:"W4-029",set:"W4",tp:"RBA",d:"Medium",q:"Segregation of duties reduces fraud by:",o:["Concentrating power","Ensuring no single person controls all stages of a transaction","Removing oversight","Increasing opportunity"],a:1,e:"직무분리 = 단일인이 거래 전 단계 통제 못하게 → 부정기회 감소. 함정: 권한집중·기회증가는 반대."},
{uid:"W4-030",set:"W4",tp:"RBA",d:"Hard",q:"The 'tone at the top' in anti-fraud means:",o:["Leaders tolerate small frauds","Leadership demonstrates zero tolerance and models ethical behavior","Only juniors must be honest","Fraud is a low priority"],a:1,e:"Anti-fraud tone at the top = 경영진의 무관용·윤리 모범. 함정: 관용·하급한정·저우선은 약화."},
{uid:"W4-031",set:"W4",tp:"InternalAudit",d:"Hard",q:"In the Three Lines Model, Internal Audit functions as the:",o:["First Line","Second Line","Third Line (independent assurance)","Outside the model"],a:2,e:"내부감사 = 3선(독립 보증). 함정: 1선(영업)·2선(위험·준법)과 혼동 — 빈출."},
{uid:"W4-032",set:"W4",tp:"InternalAudit",d:"Hard",q:"The PRIMARY purpose of internal audit is to:",o:["Manage day-to-day operations","Provide independent, objective assurance and consulting to add value and improve operations","Approve loans","Do the marketing"],a:1,e:"내부감사 목적 = 독립·객관 보증·컨설팅으로 가치부가·운영개선. 함정: 운영·여신·마케팅은 타 기능."},
{uid:"W4-033",set:"W4",tp:"InternalAudit",d:"Hard",q:"Internal audit independence is best preserved when it reports functionally to:",o:["The CEO only","The Audit Committee / Board of Commissioners","The sales manager","The marketing head"],a:1,e:"내부감사 독립성 = 감사위원회·BOC에 기능보고. 함정: CEO단독·영업·마케팅 보고는 독립성 훼손."},
{uid:"W4-034",set:"W4",tp:"InternalAudit",d:"Hard",q:"An internal auditor who previously designed the process being audited faces:",o:["No issue","A self-review threat to objectivity/independence","Improved efficiency","A reward"],a:1,e:"이전에 설계한 프로세스 감사 = self-review 위협(객관성·독립성). 함정: '무문제'·'효율'은 오답."},
{uid:"W4-035",set:"W4",tp:"InternalAudit",d:"Medium",q:"The internal audit charter establishes:",o:["The marketing budget","The purpose, authority, scope, and responsibility of the internal audit function","Salaries","The dividend"],a:1,e:"내부감사 헌장 = 목적·권한·범위·책임. 함정: 예산·급여·배당은 타 문서."},
{uid:"W4-036",set:"W4",tp:"InternalAudit",d:"Hard",q:"A risk-based internal audit plan prioritizes:",o:["The easiest areas","Auditing the highest-risk areas first to allocate resources effectively","Random areas","Only the smallest units"],a:1,e:"위험기반 감사계획 = 고위험 영역 우선 감사. 함정: 쉬운·무작위·소규모 우선은 비효율."},
{uid:"W4-037",set:"W4",tp:"InternalAudit",d:"Hard",q:"Internal audit provides assurance over which of the following?",o:["Only financial statements","Governance, risk management, and internal control processes","Only marketing","Only IT"],a:1,e:"내부감사 보증 = 거버넌스·위험관리·내부통제 전반. 함정: 단일 영역 한정은 협소."},
{uid:"W4-038",set:"W4",tp:"InternalAudit",d:"Medium",q:"The difference between internal audit and external audit is that internal audit:",o:["Only certifies financial statements for the public","Is an ongoing internal function focused on governance/risk/control improvement","Reports to shareholders only","Sets accounting standards"],a:1,e:"내부감사 = 거버넌스·위험·통제 개선 중심 상시 내부기능. 외부감사 = 재무제표 의견. 함정: 역할 혼동."},
{uid:"W4-039",set:"W4",tp:"InternalAudit",d:"Hard",q:"Upon completing an audit, internal audit should:",o:["Keep findings secret","Report findings and recommendations and track management's corrective actions to completion","Implement the fixes itself (taking ownership)","Ignore management responses"],a:1,e:"감사 후 = 지적·권고 보고 + 시정 완료까지 추적(실행은 경영진). 함정: 비밀·직접실행(독립성 훼손)·무시는 오답."},
{uid:"W4-040",set:"W4",tp:"InternalAudit",d:"Hard",q:"Internal audit's relationship with the anti-fraud strategy is that it:",o:["Owns and operates all anti-fraud controls","Independently evaluates the design and effectiveness of anti-fraud controls","Commits the fraud","Has no role"],a:1,e:"내부감사 = anti-fraud 통제의 설계·효과성을 독립 평가(3선). 함정: 통제 소유(1선)·무관은 오답."},
{uid:"W4-041",set:"W4",tp:"QAIP",d:"Hard",q:"QAIP (Quality Assurance and Improvement Program) for internal audit requires:",o:["No evaluation ever","Both internal and external assessments of the audit function's quality","Only self-praise","Marketing reviews"],a:1,e:"QAIP = 감사기능 품질의 내부 + 외부 평가. 함정: 무평가·자화자찬·마케팅은 오답."},
{uid:"W4-042",set:"W4",tp:"QAIP",d:"Hard",q:"An EXTERNAL quality assessment of internal audit should be conducted:",o:["Never","Periodically (e.g., at least once every five years) by a qualified independent assessor","Daily","By the audited unit"],a:1,e:"외부 품질평가 = 최소 5년마다 자격 있는 독립 평가자. 함정: 무·매일·피감부서는 오답."},
{uid:"W4-043",set:"W4",tp:"QAIP",d:"Medium",q:"The purpose of QAIP is to:",o:["Punish auditors","Ensure internal audit conforms to standards and continuously improves","Increase audit fees","Eliminate audits"],a:1,e:"QAIP 목적 = 감사 표준 부합 + 지속개선 보장. 함정: 처벌·비용·폐지는 오답."},
{uid:"W4-044",set:"W4",tp:"QAIP",d:"Hard",q:"Internal (ongoing) monitoring under QAIP includes:",o:["A one-time check","Continuous supervision of engagements and periodic self-assessments","No monitoring","Only external review"],a:1,e:"QAIP 내부 모니터링 = 업무 상시 감독 + 정기 자체평가. 함정: 일회·무·외부만은 부족."},
{uid:"W4-045",set:"W4",tp:"QAIP",d:"Hard",q:"A QAIP finding that internal audit lacks independence would require:",o:["No action","Remediation of reporting lines/structure to restore independence","Disbanding the company","Ignoring it"],a:1,e:"독립성 결여 QAIP 지적 = 보고선·구조 시정으로 독립성 회복. 함정: 무조치·해산·무시는 오답."},
{uid:"W4-046",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"The Kirkpatrick model is used to evaluate the effectiveness of:",o:["Loan portfolios","Training programs (e.g., anti-fraud/compliance training)","Marketing campaigns","Dividends"],a:1,e:"Kirkpatrick = 교육프로그램(예: anti-fraud·준법 교육) 효과 평가. 함정: 여신·마케팅·배당은 무관."},
{uid:"W4-047",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"The four levels of the Kirkpatrick model are:",o:["Plan, Do, Check, Act","Reaction, Learning, Behavior, Results","Avoid, Transfer, Mitigate, Accept","Bronze, Silver, Gold, Platinum"],a:1,e:"Kirkpatrick 4단계: 반응·학습·행동·결과. 함정: PDCA·위험처리·등급과 혼동."},
{uid:"W4-048",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"Kirkpatrick Level 3 (Behavior) measures:",o:["Whether participants enjoyed the training","Whether participants APPLY what they learned on the job","The training budget","Trainer satisfaction"],a:1,e:"Level 3 Behavior = 학습내용을 실무에 적용하는지. 함정: Level1(반응=만족)과 혼동."},
{uid:"W4-049",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"Kirkpatrick Level 4 (Results) for anti-fraud training would assess:",o:["Snack quality","Tangible outcomes such as reduced fraud incidents or improved control compliance","Trainer's tone","Room temperature"],a:1,e:"Level 4 Results = 부정 발생 감소·통제준수 개선 등 실질 성과. 함정: 무관항목으로 오도."},
{uid:"W4-050",set:"W4",tp:"Kirkpatrick",d:"Medium",q:"Kirkpatrick Level 1 (Reaction) measures:",o:["Long-term business results","Participants' immediate satisfaction and engagement with the training","On-the-job behavior change","Fraud reduction"],a:1,e:"Level 1 Reaction = 참가자 즉각 만족·몰입. 함정: Level3(행동)·Level4(결과)와 혼동."},
{uid:"W4-051",set:"W4",tp:"평가",d:"Hard",q:"'Monitoring the Implementation of Anti-Fraud Strategies' (K.64PBY91.022.1) belongs to which perspective?",o:["Q7 (Implementing)","Q6 (Monitoring/Evaluating)","Neither","Q5"],a:1,e:"Monitoring = Q6 관점. Implementing(K.64PBY91.020.1) = Q7. 함정: Q6/Q7 swap — 동일 anti-fraud 주제라도 분기."},
{uid:"W4-052",set:"W4",tp:"평가",d:"Hard",q:"'Implementing Anti-Fraud Strategies' (K.64PBY91.020.1) belongs to which perspective?",o:["Q6 Monitoring","Q7 Implementing","Q5","Both"],a:1,e:"Implementing = Q7. Monitoring = Q6. 함정: 짝 구분 핵심."},
{uid:"W4-053",set:"W4",tp:"평가",d:"Hard",q:"From the Q6 perspective, monitoring anti-fraud strategy implementation assesses whether:",o:["Profits rose","The anti-fraud strategy is actually being implemented effectively across the four pillars","Marketing improved","The logo changed"],a:1,e:"Q6 anti-fraud 모니터링 = 4기둥 전반 실제 효과적 이행 여부. 함정: 이익·마케팅은 무관."},
{uid:"W4-054",set:"W4",tp:"평가",d:"Hard",q:"'Monitoring the Follow-up Results of Internal Audit Findings' (K.64PBY91.026.1) is a Q7 unit; the complementary Q6 unit 'Monitoring the Compliance of Follow-up Actions on Internal Audit results' assesses:",o:["Marketing reach","Whether agreed corrective actions are implemented and compliant on time","Dividend payments","Office expansion"],a:1,e:"감사 후속 준수 모니터링(Q6) = 합의 시정조치 적시 이행·준수 여부. 함정: 무관항목으로 오도."},
{uid:"W4-055",set:"W4",tp:"평가",d:"Hard",q:"When follow-up on internal audit findings reaches only 65% (vs 100% target), the rating is:",o:["Fully Comply","Less Comply (a shortfall requiring attention)","Excellent","Exempt"],a:1,e:"감사후속 65%(목표100%) = Less Comply. 함정: 'Fully'·'Excellent'은 오답 — textbook 사례 수치."},
{uid:"W4-056",set:"W4",tp:"평가",d:"Medium",q:"Effective monitoring of anti-fraud implementation requires:",o:["A one-time check at year-end","Ongoing tracking with metrics, periodic reporting, and corrective action","No metrics","Concealment of issues"],a:1,e:"Anti-fraud 이행 모니터링 = 지표·정기보고·시정 동반 지속 추적. 함정: 일회·무지표·은폐는 부실."},
{uid:"W4-057",set:"W4",tp:"평가",d:"Hard",q:"A monitoring finding that fraud incidents are RISING despite an existing strategy suggests:",o:["The strategy is perfect","The strategy's design or execution is deficient and needs strengthening","No concern","Reporting should stop"],a:1,e:"전략 존재에도 부정 증가 = 설계·실행 결함, 강화 필요. 함정: '완벽'·'무관심'은 오답."},
{uid:"W4-058",set:"W4",tp:"평가",d:"Hard",q:"Validation of the anti-fraud/compliance report content is appropriately performed by:",o:["The reported unit itself","The internal audit unit or compliance function (independent validation)","Customers","Competitors"],a:1,e:"보고내용 검증 = 내부감사·준법기능의 독립 검증. 함정: 피보고부서 자체·외부는 부적절."},
{uid:"W4-059",set:"W4",tp:"평가",d:"Hard",q:"The work units involved in anti-fraud follow-up typically include:",o:["Only marketing","Compliance, Risk Management, IT, HRD, Legal, Internal Audit","Only the CEO","Only external vendors"],a:1,e:"Anti-fraud 후속 관련부서 = 준법·위험관리·IT·HRD·법무·내부감사. 함정: 단일·외부 한정은 오답 — textbook 명시."},
{uid:"W4-060",set:"W4",tp:"평가",d:"Medium",q:"Monitoring and evaluation data for compliance includes:",o:["Only profits","Number of internal violations detected, sanctions, and compliance risk trends","Only marketing spend","Only headcount"],a:1,e:"모니터링·평가 데이터 = 내부위반 건수·제재·준법위험 추세. 함정: 이익·마케팅·인원만은 불완전 — textbook."},
{uid:"W4-061",set:"W4",tp:"4Aspects",d:"Hard",q:"Reliable data for anti-fraud monitoring should be obtained from:",o:["Rumors","Reliable systems: financial reporting systems, ERP, CRM, and internal reporting systems","Social media gossip","Competitor leaks"],a:1,e:"신뢰 데이터원 = 재무보고시스템·ERP·CRM·내부보고시스템. 함정: 소문·SNS·유출은 비신뢰 — textbook 명시."},
{uid:"W4-062",set:"W4",tp:"4Aspects",d:"Hard",q:"The variables for prevention-focused control assessment include:",o:["Office decor","Operational SOPs, credit policies, governance, and reporting","Lunch menus","Parking spaces"],a:1,e:"예방 통제 변수 = 운영 SOP·여신정책·거버넌스·보고. 함정: 무관 외형요소 — textbook 변수 목록."},
{uid:"W4-063",set:"W4",tp:"4Aspects",d:"Hard",q:"The variables for detection-focused control assessment include:",o:["Building height","Electronic reporting system, audit trail, credit scoring, and data security","Color scheme","Staff count only"],a:1,e:"탐지 통제 변수 = 전자보고시스템·audit trail·credit scoring·데이터보안. 함정: 무관 외형 — textbook."},
{uid:"W4-064",set:"W4",tp:"4Aspects",d:"Medium",q:"An 'audit trail' supports fraud detection by:",o:["Hiding transactions","Providing a traceable, time-stamped record of activities for reconstruction and accountability","Deleting records","Slowing the system"],a:1,e:"Audit trail = 추적가능·타임스탬프 기록으로 재구성·답책. 함정: 은폐·삭제는 정반대."},
{uid:"W4-065",set:"W4",tp:"4Aspects",d:"Hard",q:"Data security as an anti-fraud variable matters because:",o:["It is unrelated to fraud","Weak data security enables data manipulation, unauthorized access, and concealment of fraud","It only affects marketing","It reduces profits"],a:1,e:"데이터보안 = 취약 시 데이터조작·무단접근·부정은폐 가능. 함정: '무관'은 오답."},
{uid:"W4-066",set:"W4",tp:"POJK",d:"Hard",q:"Which pairing is CORRECT?",o:["POJK 12/2024 = AML; POJK 28/2024 = HR","POJK 12/2024 = anti-fraud strategy; POJK 28/2024 = SIPELAKU","POJK 12/2024 = F&P; POJK 28/2024 = capital","POJK 12/2024 = consumer protection; POJK 28/2024 = leasing"],a:1,e:"정답: 12/2024=anti-fraud, 28/2024=SIPELAKU. 함정: 주제 교차배치 — 12/2017(AML)과 12/2024 혼동 주의."},
{uid:"W4-067",set:"W4",tp:"POJK",d:"Hard",q:"The anti-fraud Implementation Report's 13-field structure is designed to:",o:["Add bureaucracy","Standardize comprehensive reporting of anti-fraud strategy implementation","Hide information","Replace audits"],a:1,e:"13-field 구조 = anti-fraud 이행의 포괄·표준 보고. 함정: 관료화·은폐·대체는 오답."},
{uid:"W4-068",set:"W4",tp:"POJK",d:"Medium",q:"The 15-working-day correction deadline (Art. 18) applies to:",o:["Marketing approvals","Correcting/addressing identified deficiencies within the regulatory timeframe","Loan disbursement","Dividend payment"],a:1,e:"15영업일(Art.18) = 식별된 결함의 규정시한 내 시정. 함정: 마케팅·여신·배당은 무관."},
{uid:"W4-069",set:"W4",tp:"POJK",d:"Hard",q:"The Primary Party prohibition (Art. 9(4)) ultimately protects:",o:["Fraudsters","The integrity of the financial institution by barring fraud actors from key positions","Competitors","Marketing budgets"],a:1,e:"Primary Party 금지 = 부정행위자 핵심직위 배제로 기관 무결성 보호. 함정: 가해자 보호는 정반대."},
{uid:"W4-070",set:"W4",tp:"InternalAudit",d:"Hard",q:"The Three Lines Model places internal audit (3rd line) in a position to:",o:["Own operational risk","Provide independent assurance over the work of both the first and second lines","Replace the second line","Approve transactions"],a:1,e:"3선 내부감사 = 1·2선 작업에 독립 보증. 함정: 위험소유(1선)·2선대체·거래승인은 오답."},
{uid:"W4-071",set:"W4",tp:"InternalAudit",d:"Hard",q:"BOC supervision of internal audit and anti-fraud is documented through a framework involving how many documents (per the referenced structure)?",o:["1 document","3 documents","7 documents","13 documents"],a:1,e:"BOC 감독 = 3-document framework. 함정: anti-fraud 13-field와 숫자 혼동 유도."},
{uid:"W4-072",set:"W4",tp:"InternalAudit",d:"Hard",q:"Meeting minutes for anti-fraud/audit committees should be dispatched within:",o:["1 week","24-48 hours (per the referenced standard)","1 month","Never"],a:1,e:"회의록 발송 = 24-48시간 내. 함정: 인접 기간 혼동 — 메모리상 표준."},
{uid:"W4-073",set:"W4",tp:"InternalAudit",d:"Medium",q:"The Communication sub-structure in the anti-fraud framework emphasizes:",o:["Secrecy","Timely, documented communication (e.g., meeting minutes) to ensure follow-up","No records","Verbal only"],a:1,e:"소통 구조 = 적시·문서화 소통(회의록 등)으로 후속 보장. 함정: 비밀·무기록·구두만은 부실."},

const KEY="A B C D".split(" ");
function wkey(set){return "sppi_wrong_"+set+"_v2"}
function getW(set){try{return JSON.parse(localStorage.getItem(wkey(set)))||[]}catch(e){return[]}}
function setW(set,a){try{localStorage.setItem(wkey(set),JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrongUid(uid){const [set,id]=uid.split("-");const w=getW(set);if(!w.includes(id)){w.push(id);setW(set,w)}}
function rmWrongUid(uid){const [set,id]=uid.split("-");setW(set,getW(set).filter(x=>x!==id))}
function allWrongUids(){let r=[];for(const set of ["W1","W2","W3","W4"]){r=r.concat(getW(set).map(id=>set+"-"+id))}return r}
function byUid(uid){return BANK.find(q=>q.uid===uid)}
function clearAllWrong(){for(const set of ["W1","W2","W3","W4"])setW(set,[])}
// 실전 비중 가중: W3(거버넌스·리스크) 최대, W4·W1·W2 순
const WEIGHTS={W1:8, W2:8, W3:14, W4:10}; // 합 40
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function buildExam(){
  let picked=[];
  for(const set of ["W1","W2","W3","W4"]){
    const pool=BANK.filter(q=>q.set===set);
    picked=picked.concat(shuffle(pool).slice(0, WEIGHTS[set]));
  }
  // 전체 순서도 섞고 보기도 셔플
  return shuffle(picked).map(shuffleOpts);
}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(allWrongUids().map(byUid).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp.map(shuffleOpts);cur=0;answers=[];render();return;
  }
  quiz=buildExam();
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">종합 모의고사</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:4px">전 범위 400문항 풀에서 <b>40문항</b> 랜덤 출제</p>
      <div class="mix">
        <span class="setbadge setW1">W1 · 8</span>
        <span class="setbadge setW2">W2 · 8</span>
        <span class="setbadge setW3">W3 · 14</span>
        <span class="setbadge setW4">W4 · 10</span>
      </div>
      <p style="font-size:12px;color:#9a9788;margin:8px 0 16px">실전 비중 가중(거버넌스·리스크 최대) · 매회 새 문항 · 보기 셔플</p>
      <div class="start-opts">
        <button onclick="start()">모의고사 시작 (40문항) <span class="desc">실전과 동일하게 한 회차 응시 → 종료 후 주차별 점수 분석</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${allWrongUids().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${allWrongUids().length}</span><span class="desc">W1~W4 전 범위 누적 오답 통합 재시험 — 맞히면 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${allWrongUids().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에 (Set별)</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=allWrongUids().map(byUid).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트 (통합)</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항 · W1~W4 통합</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid"><span class="setbadge set${q.set}">${q.set}</span> &nbsp;${q.uid} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrongUid('${q.uid}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('W1~W4 통합 오답노트를 전부 비웁니다. 계속?')){clearAllWrong();notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span><span class="setbadge set${q.set}">${q.set}</span> &nbsp;${q.uid}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={uid:q.uid,set:q.set,correct:__c,picked:i};
  if(__c) rmWrongUid(q.uid); else addWrongUid(q.uid);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const bySet={};
  answers.forEach(a=>{bySet[a.set]=bySet[a.set]||{r:0,n:0};bySet[a.set].n++;if(a.correct)bySet[a.set].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  const order=["W1","W2","W3","W4"];
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${order.filter(s=>bySet[s]).map(s=>`<div class="row"><span><span class="setbadge set${s}">${s}</span></span><b>${bySet[s].r} / ${bySet[s].n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">${x.q.uid} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,68)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="start()">새 회차 응시</button>
        ${allWrongUids().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${allWrongUids().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
