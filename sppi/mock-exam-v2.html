<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPPI Level 7 — 종합 모의고사 V2 (W1~W4)</title>
<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--purple:#5b4a7a;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .setbadge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:99px;letter-spacing:.04em}
  .setW1{background:#eef2f6;color:var(--blue)}.setW2{background:#e7f1ea;color:var(--green)}.setW3{background:#f0ecf5;color:var(--purple)}.setW4{background:#f6e9e6;color:var(--red)}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.topic{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  .mix{display:flex;gap:6px;justify-content:center;margin:10px 0 4px;flex-wrap:wrap}
  .mix span{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">SPPI Level 7 · Financing Management</div>
    <h1>종합 모의고사 V2 — W1~W4 통합</h1>
    <div class="sub">전 범위 400문항 풀에서 매회 40문항 랜덤 출제 · 실전 비중 가중 · 보기 셔플</div>
  </header>
  <div class="panel" id="app"></div>
  <footer>출처: A to Z in Finance Company Business (Day 1) / Training Module Qualification Level 6·7 (Day 2)</footer>
</div>

<script>
const BANK = [
{uid:"W1-001",set:"W1",tp:"산업사",d:"Hard",q:"The Indonesian finance company industry operates under a layered legal hierarchy. Which sequence correctly orders these from highest to lowest legal authority?",o:["POJK → Law (UU) → SEOJK → KMK","Law (UU) → POJK → SEOJK","SEOJK → POJK → Law (UU)","KMK → POJK → Law (UU)"],a:1,e:"법령 위계: Law(UU/PP) > POJK > SEOJK. KMK(재무장관령)은 OJK 이관 전 구체제 규정. 함정: POJK가 최상위가 아님 — 상위법 위임 하에 OJK가 제정."},
{uid:"W1-002",set:"W1",tp:"산업사",d:"Medium",q:"Before OJK was established, which institution supervised finance companies in Indonesia?",o:["Bank Indonesia","The Ministry of Finance (Kemenkeu)","Bapepam-LK","APPI"],a:1,e:"OJK 출범(2013) 이전 multifinance 감독은 재무부(Kemenkeu) 소관. KMK(재무장관령) 체제가 그 흔적. 함정: 은행은 BI였으나 finance company는 재무부였다."},
{uid:"W1-003",set:"W1",tp:"산업사",d:"Hard",q:"The 'Double Pledge' fraud cases had a structural consequence beyond data infrastructure. Which regulatory response is MOST directly attributable to them?",o:["Introduction of the 10x gearing ratio cap","Strengthening of fiduciary registration and SLIK debtor verification","Reduction of minimum paid-in capital","Removal of the foreign ownership cap"],a:1,e:"Double Pledge(동일자산 중복담보) 사건 → fiduciary 등록 의무 강화 + SLIK 차주 검증 인프라 강화. 함정: gearing cap·자본 요건은 별개 prudential 조치로, 이 사건의 직접 결과 아님."},
{uid:"W1-004",set:"W1",tp:"산업사",d:"Medium",q:"KMK 1169/1991 is historically significant because it:",o:["First permitted consumer financing as a standalone activity","Established the legal basis for leasing operations","Consolidated four financing activities under one license","Created the OJK"],a:1,e:"KMK 1169/1991 = leasing 법적 기반. 1974 SKB 3장관령이 leasing 최초 도입, 2000 KMK 448이 4종 통합. 함정: 4종 통합은 2000년."},
{uid:"W1-005",set:"W1",tp:"통계",d:"Hard",q:"As of the latest industry figures, the number of conventional finance companies operating in Indonesia is closest to:",o:["88","144","203","250"],a:1,e:"144개사(최신 기준). 함정: 산업 통폐합으로 수가 감소 추세 — 과거 200개 이상에서 줄었다. 정확한 수치 암기 요구."},
{uid:"W1-006",set:"W1",tp:"통계",d:"Hard",q:"The industry Financing Asset Ratio (FAR) sits in which band, and what does a HIGH FAR primarily indicate?",o:["~50%; high liquidity buffer","~86.70%; productive assets dominate the balance sheet","~95%; regulatory non-compliance","~30%; under-utilization of capital"],a:1,e:"FAR ≈ 86.70%. FAR = 생산적 자산(financing receivables)이 총자산에서 차지하는 비중 → 높을수록 본업 집중. 함정: 유동성 buffer와 무관."},
{uid:"W1-007",set:"W1",tp:"통계",d:"Hard",q:"MSMD (Modal Sendiri/Modal Disetor) at the industry level is approximately 328.37%. The regulatory MINIMUM for the related Core Capital to Paid-in Capital ratio is:",o:["At least 100%","At least 50%","At least 150%","At least 328%"],a:1,e:"Core Capital/Paid-in Capital 최소 ≥50% (POJK 35/2018·46/2024 불변). 산업 평균 MSMD 328.37%는 평균치일 뿐 요건과 다름. 함정: 150% threshold는 존재하지 않음 — 과거 오류."},
{uid:"W1-008",set:"W1",tp:"통계",d:"Medium",q:"Industry Gross NPF (Non-Performing Financing) is approximately:",o:["0.89%","2.89%","5.89%","8.89%"],a:1,e:"Gross NPF ≈ 2.89%. 함정: 5% 미만 = 건전. 5% 초과 시 감독 우려 수준."},
{uid:"W1-009",set:"W1",tp:"통계",d:"Medium",q:"BOPO ratio measures operational efficiency. A BOPO trending UPWARD signals:",o:["Improving efficiency","Deteriorating efficiency (costs rising relative to operating income)","Higher profitability","Lower NPF"],a:1,e:"BOPO = Operating Expense/Operating Income. 상승 = 비효율 악화. 함정: 낮을수록 좋다 — 직관과 반대 방향."},
{uid:"W1-010",set:"W1",tp:"규제프레임",d:"Hard",q:"POJK 46/2024 replaced POJK 35/2018 as the principal regulation on finance company business operations. Which of the following was NEWLY introduced by POJK 46/2024?",o:["The 10x maximum gearing ratio","Financing without face-to-face interaction (non-face-to-face)","The 50% core capital ratio","The fiduciary registration requirement"],a:1,e:"POJK 46/2024 신규: 비대면(non-face-to-face) financing 허용 + BMPP 명문화. 함정: gearing·core capital은 기존 POJK 35/2018부터 존재."},
{uid:"W1-011",set:"W1",tp:"규제프레임",d:"Medium",q:"Which regulation governs MSME-focused financing provisions introduced in 2025?",o:["POJK 19/2025","POJK 43/2024","POJK 12/2017","POJK 34/2018"],a:0,e:"POJK 19/2025 = MSME 관련. 함정: 43/2024는 HR 인증, 34/2018은 F&P 재평가, 12/2017은 APU-PPT(AML)."},
{uid:"W1-012",set:"W1",tp:"규제프레임",d:"Hard",q:"A candidate confuses POJK 12/POJK.01/2017 with Fit & Proper rules. POJK 12/2017 actually governs:",o:["Fit and Proper reassessment","AML/CFT (APU-PPT)","Minimum paid-in capital","Consumer protection"],a:1,e:"POJK 12/2017 = APU-PPT(AML/CFT). 23/2019로 개정, 8/2023으로 대체. F&P 재평가는 POJK 34/2018. 함정: 번호만 보고 F&P로 오인."},
{uid:"W1-013",set:"W1",tp:"규제프레임",d:"Hard",q:"The HR competency certification obligation for finance companies is established under:",o:["POJK 43/2025","POJK 43/2024","POJK 35/2018","POJK 34/2018"],a:1,e:"POJK 43/2024 = HR 인증 의무. 함정: 43/2025는 존재하지 않는 규정 — 과거 다수 위치에서 오기록됨."},
{uid:"W1-014",set:"W1",tp:"규제프레임",d:"Medium",q:"Under the HR development obligation, the minimum training budget is calculated as a percentage of:",o:["2.5% of net income","2.5% of Personnel/Employee Expenses","5% of total assets","2.5% of paid-in capital"],a:1,e:"인력교육 예산 = 인건비(Personnel/Employee Expenses)의 2.5%. 함정: 순이익(net income) 기준 아님 — 반복 오류 지점."},
{uid:"W1-015",set:"W1",tp:"규제프레임",d:"Medium",q:"The Indonesian Finance Company Industry Roadmap covers which period?",o:["2020-2024","2024-2028","2023-2027","2025-2030"],a:1,e:"Roadmap 2024-2028. 함정: 인접 연도 혼동 유도."},
{uid:"W1-016",set:"W1",tp:"사업영역",d:"Hard",q:"Which combination represents the FOUR core conventional financing activities a finance company may conduct?",o:["Leasing, Factoring, Credit Card, Consumer Financing","Leasing, Deposits, Insurance, Factoring","Banking, Leasing, Factoring, Underwriting","Consumer Financing, Deposit-taking, Leasing, Brokerage"],a:0,e:"4대 본업: Leasing·Factoring·Credit Card·Consumer Financing. 함정: deposit-taking(예금수취)·insurance·banking은 finance company 영역 아님 — 면허 위반."},
{uid:"W1-017",set:"W1",tp:"사업영역",d:"Hard",q:"A finance company wishes to add 'working capital financing' and 'investment financing' facilities. These were enabled by:",o:["KMK 448/2000","POJK 35/2018","POJK 46/2024","POJK 19/2025"],a:1,e:"운전자본·투자 financing facility = POJK 35/2018 도입. 함정: 46/2024로 갱신되었으나 최초 도입은 35/2018."},
{uid:"W1-018",set:"W1",tp:"사업영역",d:"Medium",q:"Sharia financing receivables in the industry have shown which trend relative to conventional?",o:["Declining steadily","Growing (double-digit growth observed)","Flat / stagnant","Banned since 2024"],a:1,e:"Sharia financing 두자릿수 성장세. 함정: 규제 금지·정체는 사실 아님."},
{uid:"W1-019",set:"W1",tp:"사업영역",d:"Hard",q:"Which is NOT a permitted source of funding for a finance company?",o:["Issuance of bonds (obligasi)","Bank loans","Taking demand/savings deposits from the public","Issuance of sukuk (sharia)"],a:2,e:"공중 예금수취(deposit-taking)는 금지 — 은행 고유 업무. 함정: 채권·차입·sukuk은 모두 허용 자금원."},
{uid:"W1-020",set:"W1",tp:"금융기법",d:"Hard",q:"In a finance lease (financial leasing), at the end of the lease term the lessee typically:",o:["Must return the asset with no option","Has an option to purchase the asset at a pre-agreed residual value","Automatically receives ownership for free","Pays a penalty equal to the asset value"],a:1,e:"Finance lease = 잔존가치(residual value) 매수선택권 부여 + 위험·보상 이전. 함정: operating lease가 반환형 — 둘 구분이 핵심."},
{uid:"W1-021",set:"W1",tp:"금융기법",d:"Hard",q:"The key distinction between an OPERATING lease and a FINANCE lease lies primarily in:",o:["The currency used","The transfer of risks and rewards of ownership","The lessor's nationality","The length of the contract only"],a:1,e:"핵심 구분 = 소유에 따른 위험·보상의 이전 여부. finance=이전, operating=미이전. 함정: 계약 기간 '만'으로 구분하는 것은 부정확."},
{uid:"W1-022",set:"W1",tp:"금융기법",d:"Medium",q:"In factoring (anjak piutang), the finance company:",o:["Lends against real estate collateral","Purchases or manages a client's account receivables","Issues credit cards to consumers","Leases heavy equipment"],a:1,e:"Factoring = 매출채권(receivables) 매입·관리. 함정: 부동산담보대출·리스와 혼동."},
{uid:"W1-023",set:"W1",tp:"금융기법",d:"Hard",q:"Under 'channeling' arrangements, the credit risk is borne by:",o:["The finance company entirely","The channeling partner / source of funds (risk does not transfer to the finance company's book)","Shared 50/50 by regulation","The OJK"],a:1,e:"Channeling = 자금원(partner)이 신용위험 부담, finance company 장부에 위험 미이전. 함정: joint financing(공동금융)은 위험 분담 — 둘 구분 필수."},
{uid:"W1-024",set:"W1",tp:"금융기법",d:"Hard",q:"In 'joint financing', how is risk typically structured compared to channeling?",o:["Identical to channeling","Risk and funding are SHARED between the finance company and partner per agreed proportion","No risk to either party","Entirely on the borrower"],a:1,e:"Joint financing = 약정 비율로 위험·자금 분담. channeling(위험 미이전)과 대조. 함정: 두 기법을 동일시."},
{uid:"W1-025",set:"W1",tp:"비율",d:"Hard",q:"The maximum gearing ratio permitted for a finance company is:",o:["5 times","10 times","15 times","No limit"],a:1,e:"Gearing ratio 최대 10배. 최저 0배. 함정: 인접 배수 혼동 유도."},
{uid:"W1-026",set:"W1",tp:"비율",d:"Hard",q:"Gearing ratio is most accurately described as the ratio of:",o:["Equity to total assets","Total borrowings (interest-bearing debt) to equity","Net income to revenue","Financing receivables to total assets"],a:1,e:"Gearing = 이자부 차입(borrowings)/자기자본(equity). 함정: FAR(receivables/assets)와 혼동."},
{uid:"W1-027",set:"W1",tp:"비율",d:"Medium",q:"A finance company with a gearing ratio exceeding 10x would be:",o:["Operating efficiently","In breach of the prudential gearing provision","Eligible for a license upgrade","Exempt from BMPP"],a:1,e:"10배 초과 = 건전성 규정 위반. 함정: 고gearing을 효율로 오인."},
{uid:"W1-028",set:"W1",tp:"리스크",d:"Hard",q:"BMPP (Maximum Financing Limit) under POJK 46/2024 sets the SINGLE obligor limit at:",o:["10% of equity","20% of equity","50% of equity","17.5% of equity"],a:1,e:"단일 차주(single obligor) 최대 20% of equity. group 50%, controlling-relationship 50% of equity. 함정: 17.5%는 acquisition cost cap — 다른 항목."},
{uid:"W1-029",set:"W1",tp:"리스크",d:"Hard",q:"Under BMPP, the limit for ONE GROUP of obligors is:",o:["20%","50%","17.5%","100%"],a:1,e:"한 group of obligor = 최대 50%. single 20%와 구분. 함정: single과 group 수치 swap 유도."},
{uid:"W1-030",set:"W1",tp:"리스크",d:"Hard",q:"The financing acquisition cost is capped at 17.5% of:",o:["Equity","The total income of each financing contract","Paid-in capital","Total assets"],a:1,e:"Acquisition cost = 계약별 총수입(total income of each contract)의 17.5%. 함정: equity 기준 BMPP와 혼동 — 기준 자체가 다름."},
{uid:"W1-031",set:"W1",tp:"리스크",d:"Hard",q:"Which item is EXCLUDED from BMPP calculation under POJK 46/2024?",o:["Financing to a single private individual","Financing guaranteed/secured by certain government or specified instruments","Financing to a large corporate group","Consumer financing above Rp 1 billion"],a:1,e:"정부보증 등 특정 안전자산은 BMPP 산정에서 제외. 함정: 일반 차주 financing은 모두 포함."},
{uid:"W1-032",set:"W1",tp:"리스크",d:"Medium",q:"The primary purpose of BMPP (Maximum Financing Limit) is to:",o:["Maximize the company's market share","Limit concentration risk to any single party or group","Increase the gearing ratio","Reduce paid-in capital requirements"],a:1,e:"BMPP 목적 = 단일 차주·group 집중위험(concentration risk) 제한. 함정: 시장점유·gearing과 무관."},
{uid:"W1-033",set:"W1",tp:"리스크",d:"Hard",q:"A finance company applies risk mitigation by requiring 'provision of collateral from the receivable seller' in a factoring deal. This addresses primarily:",o:["Liquidity risk","Credit/default risk on the purchased receivables","Operational risk","Currency risk"],a:1,e:"매출채권 매도인의 담보 제공 = 매입채권 부도(credit) 위험 완화. 함정: 유동성·운영위험으로 오인."},
{uid:"W1-034",set:"W1",tp:"리스크",d:"Hard",q:"In assessing the soundness of a finance company, which financial ratio set is typically reviewed by OJK?",o:["P/E ratio, dividend yield, beta","ROA, NPF, Gearing Ratio, A/R quality","CPI, GDP growth, exchange rate","Only the gearing ratio"],a:1,e:"OJK 건전성 평가 지표: ROA·NPF·Gearing·A/R 품질 등. 함정: 주식시장 지표(P/E·beta)는 무관."},
{uid:"W1-035",set:"W1",tp:"리스크",d:"Medium",q:"A core capital to paid-in capital ratio BELOW 0% would indicate:",o:["A healthy capital position","Capital impairment / serious distress","Compliance with the 50% minimum","Excess capital"],a:1,e:"core/paid-in <0% = 자본잠식·중대 부실. 함정: 음수를 정상으로 오인. 0%~50% 구간도 미달."},
{uid:"W1-036",set:"W1",tp:"GCG",d:"Hard",q:"GCG (Good Corporate Governance) for finance companies rests on five core principles. Which set is correct?",o:["Transparency, Accountability, Responsibility, Independency, Fairness","Profit, Growth, Scale, Speed, Risk","Liquidity, Solvency, Efficiency, Equity, Return","Compliance, Audit, Reporting, Control, Sanction"],a:0,e:"GCG 5원칙 = TARIF: Transparency·Accountability·Responsibility·Independency·Fairness. 함정: 재무지표·통제용어 묶음으로 위장."},
{uid:"W1-037",set:"W1",tp:"GCG",d:"Hard",q:"The minimum paid-in capital required to establish a finance company is:",o:["Rp 100 billion","Rp 250 billion","Rp 50 billion","Rp 500 billion"],a:1,e:"최소 납입자본 = Rp 250 billion. 함정: 인접 금액 혼동."},
{uid:"W1-038",set:"W1",tp:"GCG",d:"Hard",q:"Foreign ownership in a finance company is capped, directly or indirectly, at:",o:["49% of paid-in capital","85% of paid-in capital","100% (no cap)","50% of paid-in capital"],a:1,e:"외국인 지분 최대 85% of paid-in capital. 함정: 49%(타 업종 일반)·100%와 혼동."},
{uid:"W1-039",set:"W1",tp:"GCG",d:"Hard",q:"The cap on foreign directors AND foreign commissioners (each) is:",o:["50% each","85% each","100% each","No limit"],a:0,e:"외국인 이사·감사 각각 최대 50%. 지분 cap(85%)과 다른 수치. 함정: 85%로 통일 오인."},
{uid:"W1-040",set:"W1",tp:"GCG",d:"Medium",q:"A finance company's Board of Commissioners (BOC) function is best described as:",o:["Day-to-day operational management","Supervision and oversight of the Board of Directors","Sales and marketing leadership","External audit"],a:1,e:"BOC = 이사회(BOD) 감독·감시. 일상경영은 BOD. 함정: BOD/BOC 역할 swap."},
{uid:"W1-041",set:"W1",tp:"GCG",d:"Hard",q:"Which statement about the relationship between paid-in capital and core capital is CORRECT?",o:["Core capital may be any amount regardless of paid-in capital","Core capital must be at least 50% of paid-in capital","Paid-in capital must be at least 50% of core capital","They must always be equal"],a:1,e:"Core capital ≥ 50% of paid-in capital. 함정: 비율 방향 역전(paid-in이 core의 50%) 유도."},
{uid:"W1-042",set:"W1",tp:"GCG",d:"Medium",q:"GCG implementation in finance companies is primarily intended to:",o:["Guarantee profit","Protect stakeholders and ensure sustainable, sound operations","Eliminate all business risk","Replace OJK supervision"],a:1,e:"GCG 목적 = 이해관계자 보호·지속가능 건전경영. 함정: 이익보장·위험제거는 과장."},
{uid:"W1-043",set:"W1",tp:"GCG",d:"Hard",q:"A finance company changes its provisions in response to 'change in provisions of laws and regulations'. This is an example of:",o:["Operational risk crystallizing","Compliance/regulatory risk management","Market risk","Reputational damage"],a:1,e:"법규 변경 대응 = 준법(compliance)·규제위험 관리. 함정: 운영·시장위험으로 오인."},
{uid:"W1-044",set:"W1",tp:"GCG",d:"Medium",q:"Which body within the finance company is primarily responsible for ensuring fit and proper standards of management are maintained internally?",o:["The marketing department","The Board of Commissioners with the nomination/remuneration function","External vendors","The OJK alone"],a:1,e:"내부 F&P 유지 = BOC + 지명·보수 기능. 함정: OJK '단독'은 외부 승인이며, 내부 유지 책임과 별개."},
{uid:"W1-045",set:"W1",tp:"GCG",d:"Hard",q:"Additional paid-in capital obtained NOT through a public offering of shares would be classified under which capital component consideration?",o:["Tier 2 supplementary only","A component relevant to core capital computation","Excluded entirely from capital","Gearing-eligible debt"],a:1,e:"비공모 추가 납입자본도 core capital 산정에 관련. 함정: 자본에서 전부 배제·부채로 오인."},
{uid:"W1-046",set:"W1",tp:"소비자보호",d:"Hard",q:"Indonesian financial consumer protection is anchored by which umbrella regulation among the following?",o:["POJK 22/2023","POJK 46/2024","POJK 35/2018","POJK 12/2017"],a:0,e:"POJK 22/2023 = 소비자보호 핵심. 함정: 46/2024(사업운영)·35/2018(시설)·12/2017(AML)은 별개 영역."},
{uid:"W1-047",set:"W1",tp:"소비자보호",d:"Hard",q:"Which is a CORE consumer protection principle that finance companies must observe?",o:["Maximize fees regardless of disclosure","Transparency, fair treatment, and effective complaint handling","Sell only to high-net-worth clients","Avoid all written contracts"],a:1,e:"소비자보호 원칙 = 투명성·공정대우·민원처리. 함정: 수수료 극대화·계약 회피는 위반."},
{uid:"W1-048",set:"W1",tp:"소비자보호",d:"Medium",q:"A consumer complaint mechanism failure most directly creates which risk for the finance company?",o:["Currency risk","Reputational and legal/compliance risk","Liquidity risk only","Gearing breach"],a:1,e:"민원처리 실패 = 평판·법률·준법 위험. 함정: 환·유동성위험과 무관."},
{uid:"W1-049",set:"W1",tp:"소비자보호",d:"Hard",q:"Which recent regulation is part of the consumer protection regulatory set referenced for finance companies?",o:["POJK 38/2025","POJK 19/2025","POJK 34/2018","POJK 8/2023"],a:0,e:"POJK 38/2025 = 소비자보호 set 포함. 함정: 19/2025(MSME)·34/2018(F&P)·8/2023(AML)은 다른 영역."},
{uid:"W1-050",set:"W1",tp:"소비자보호",d:"Medium",q:"Personal data protection in financial consumer relations primarily requires the finance company to:",o:["Sell data to maximize revenue","Obtain consent and safeguard confidentiality of consumer data","Publish all client data","Ignore data after contract ends"],a:1,e:"개인정보 = 동의 획득 + 기밀 보호. 함정: 판매·공개는 명백한 위반."},
{uid:"W1-051",set:"W1",tp:"Sharia",d:"Hard",q:"In Sharia financing, the prohibition of 'riba' refers to:",o:["Excessive risk-taking","Interest / usury","Speculation","Charity"],a:1,e:"Riba = 이자(usury) 금지. gharar(과도한 불확실성)·maysir(투기)는 별도 금지. 함정: gharar/maysir와 혼동."},
{uid:"W1-052",set:"W1",tp:"Sharia",d:"Hard",q:"A Sharia finance contract based on cost-plus sale of an asset to the customer is known as:",o:["Ijarah","Murabahah","Musharakah","Wadiah"],a:1,e:"Murabahah = 원가가산(cost-plus) 매매. Ijarah=리스, Musharakah=동업출자. 함정: Ijarah(임대)와 혼동."},
{uid:"W1-053",set:"W1",tp:"Sharia",d:"Hard",q:"The Sharia equivalent of a leasing arrangement is:",o:["Murabahah","Ijarah","Mudharabah","Qard"],a:1,e:"Ijarah = 샤리아 리스. 함정: Murabahah(매매)와 swap 유도."},
{uid:"W1-054",set:"W1",tp:"Sharia",d:"Medium",q:"Sharia financing instruments must be reviewed and certified for compliance by:",o:["The external auditor","The Sharia Supervisory Board (DPS)","The marketing team","Bank Indonesia"],a:1,e:"DPS(Dewan Pengawas Syariah) = 샤리아 준수 감독·인증. 함정: 외부감사·BI 소관 아님."},
{uid:"W1-055",set:"W1",tp:"Sharia",d:"Hard",q:"Issuance of 'sukuk' by a finance company is:",o:["Prohibited","A permitted sharia-compliant funding source","Equivalent to deposit-taking","Limited to banks only"],a:1,e:"Sukuk(샤리아 채권) = 허용 자금원. 함정: 예금수취와 혼동·은행 전용 오인."},
{uid:"W1-056",set:"W1",tp:"Sharia",d:"Medium",q:"'Multipurpose Sharia' financing differs from conventional multipurpose financing chiefly by:",o:["Charging higher interest","Adhering to sharia principles (no riba, contract-based structures)","Being available only to corporations","Requiring no documentation"],a:1,e:"Multipurpose Sharia = 샤리아 원칙(무이자·계약기반) 준수. 함정: '고이자'는 riba 금지에 정면 위배."},
{uid:"W1-057",set:"W1",tp:"OtherRegs",d:"Hard",q:"AML/CFT obligations (APU-PPT) for finance companies are CURRENTLY governed primarily by:",o:["POJK 12/2017 (unamended)","POJK 8/2023 (which replaced the 12/2017 line)","POJK 34/2018","POJK 46/2024"],a:1,e:"현행 APU-PPT = POJK 8/2023(12/2017→23/2019 개정→8/2023 대체). 함정: 12/2017을 현행으로 오인."},
{uid:"W1-058",set:"W1",tp:"OtherRegs",d:"Hard",q:"The Fit & Proper REASSESSMENT of management is governed by:",o:["POJK 34/2018","POJK 12/2017","POJK 43/2024","POJK 19/2025"],a:0,e:"F&P 재평가 = POJK 34/2018. 초기 NBFI F&P는 별도 NBFI 규정. 함정: 12/2017(AML)·43/2024(HR)와 혼동."},
{uid:"W1-059",set:"W1",tp:"OtherRegs",d:"Medium",q:"APU-PPT requires finance companies to apply a Risk-Based Approach (RBA). RBA means:",o:["Treating all customers identically","Allocating due-diligence intensity proportionate to assessed money-laundering risk","Ignoring low-value transactions","Outsourcing all KYC"],a:1,e:"RBA = 평가된 ML 위험에 비례해 실사 강도 배분. 함정: 모든 고객 동일 처리는 RBA의 반대 개념."},
{uid:"W1-060",set:"W1",tp:"OtherRegs",d:"Hard",q:"Under APU-PPT, Customer Due Diligence (CDD) must be escalated to Enhanced Due Diligence (EDD) primarily for:",o:["All retail customers","Higher-risk customers such as PEPs (Politically Exposed Persons)","Only domestic customers","Customers under Rp 1 million"],a:1,e:"EDD = 고위험(PEP 등) 대상 강화실사. 함정: 전체·소액에 EDD 적용은 비효율·오해."},
{uid:"W1-061",set:"W1",tp:"OtherRegs",d:"Medium",q:"SLIK (Sistem Layanan Informasi Keuangan) is used by finance companies primarily to:",o:["Process payroll","Check a prospective debtor's credit history","File tax returns","Register fiduciary collateral"],a:1,e:"SLIK = 차주 신용이력 조회 시스템(舊 BI Checking). 함정: 담보등록(fiducia)·세무와 혼동."},
{uid:"W1-062",set:"W1",tp:"OtherRegs",d:"Hard",q:"Fiduciary registration (jaminan fidusia) gives the finance company:",o:["Ownership transfer of the debtor's company","A registered security interest enabling execution upon default","An equity stake","A tax exemption"],a:1,e:"Fiducia 등록 = 부도 시 집행 가능한 담보권. 함정: 소유권 이전·지분으로 오인."},
{uid:"W1-063",set:"W1",tp:"OtherRegs",d:"Medium",q:"Which institution issues POJK regulations?",o:["Bank Indonesia","Otoritas Jasa Keuangan (OJK)","Ministry of Finance","APPI"],a:1,e:"POJK = OJK 규정. SEOJK도 OJK. 함정: BI(PBI)·재무부(KMK)와 발행기관 구분."},
{uid:"W1-064",set:"W1",tp:"OtherRegs",d:"Medium",q:"APPI's role in the finance company industry is best described as:",o:["The financial regulator","The industry association representing finance companies","A state-owned lender","The deposit insurer"],a:1,e:"APPI = 업계 협회(SPPI 인증·세미나 주관). 함정: 규제기관(OJK)과 혼동."},
{uid:"W1-065",set:"W1",tp:"기타조항",d:"Hard",q:"When a finance company's core capital to paid-in capital ratio falls between 0% and 50%, the company is:",o:["Fully compliant","Below the minimum threshold (50%) and subject to supervisory action","Exceeding requirements","Exempt from gearing limits"],a:1,e:"0~50% 구간 = 최소요건(50%) 미달 → 감독조치 대상. 함정: 양수라서 '준수'로 오인."},
{uid:"W1-066",set:"W1",tp:"기타조항",d:"Medium",q:"A finance company must comply with the gearing ratio provision at the lowest of:",o:["1 time","0 (zero) times","5 times","Negative gearing"],a:1,e:"Gearing 최저 0배, 최고 10배. 함정: 최저 1배 오인."},
{uid:"W1-067",set:"W1",tp:"기타조항",d:"Hard",q:"Which of the following income types is specifically referenced in computing the acquisition cost ceiling context?",o:["Only interest income","Administration income and Provision income (among contract income)","Dividend income only","Foreign exchange gains only"],a:1,e:"계약수입에 administration·provision income 포함 → acquisition cost 17.5% 산정 맥락. 함정: 이자수입만으로 한정 오인."},
{uid:"W1-068",set:"W1",tp:"기타조항",d:"Medium",q:"A finance company seeking to issue securities (bonds) as a funding source must:",o:["Obtain depositor approval","Comply with the applicable securities/capital market provisions","Reduce its paid-in capital","Cancel its license"],a:1,e:"채권 발행 = 자본시장 관련 규정 준수. 함정: 예금자 승인은 finance company에 비해당(예금 없음)."},
{uid:"W1-069",set:"W1",tp:"기타조항",d:"Hard",q:"If a finance company wants to conduct activities WITHOUT face-to-face interaction with customers, it must satisfy which precondition set newly enabled in 2024?",o:["Reduce gearing to zero","Meet the digital/non-face-to-face provisions under POJK 46/2024 including identity verification safeguards","Convert to a bank","Abandon fiduciary registration"],a:1,e:"비대면 영업 = POJK 46/2024의 비대면 요건(신원확인 안전장치 등) 충족. 함정: 은행 전환·gearing 0은 무관."},
{uid:"W1-070",set:"W1",tp:"기타조항",d:"Medium",q:"Change in business activities of a finance company generally requires:",o:["No notification","Approval from / reporting to OJK as applicable","Approval from competitors","A public referendum"],a:1,e:"사업활동 변경 = OJK 승인·보고. 함정: 무신고·경쟁사 승인은 비현실."},
{uid:"W1-071",set:"W1",tp:"통계",d:"Hard",q:"Total industry assets have shown which recent pattern according to the latest data?",o:["Explosive 50% annual growth","Roughly flat / marginal change (near 0% YoY at the latest reading)","Halved in one year","Continuous double-digit decline"],a:1,e:"총자산 최근 거의 보합(약 0% YoY). 함정: 급증·급감 극단 선택지로 오도."},
{uid:"W1-072",set:"W1",tp:"통계",d:"Medium",q:"A FAR aggregate band of 89%-90% would typically be interpreted as:",o:["Severe under-utilization","Very high productive-asset concentration","Capital impairment","Regulatory breach by itself"],a:1,e:"FAR 89~90% = 생산자산 집중도 매우 높음. 함정: 그 자체로 위반은 아님 — 집중도 해석."},
{uid:"W1-073",set:"W1",tp:"통계",d:"Hard",q:"Which interpretation of a rising MSMD (Modal Sendiri/Modal Disetor) ratio is MOST accurate?",o:["Capital base shrinking relative to paid-in capital","Core/own capital strengthening relative to paid-in capital","NPF deteriorating","Gearing breaching the cap"],a:1,e:"MSMD 상승 = 자기자본이 납입자본 대비 강화. 함정: NPF·gearing과 혼동, 방향 역전 유도."},
{uid:"W1-074",set:"W1",tp:"산업사",d:"Hard",q:"The transition of finance company supervision to OJK was significant because it:",o:["Removed all prudential rules","Unified supervision of the financial services sector under one integrated authority","Banned foreign ownership","Eliminated the gearing ratio"],a:1,e:"OJK 이관 = 금융서비스 통합감독. 함정: 규제 제거·외인금지는 사실 아님."},
{uid:"W1-075",set:"W1",tp:"산업사",d:"Medium",q:"SKB 3 Menteri (1974) is historically credited with:",o:["Creating consumer credit cards","Introducing leasing into Indonesia","Establishing the OJK","Setting the 10x gearing cap"],a:1,e:"1974 SKB 3장관령 = 인니 leasing 도입. 함정: 후대 제도(OJK·gearing)와 혼동."},
{uid:"W1-076",set:"W1",tp:"금융기법",d:"Hard",q:"A 'sale and leaseback' transaction allows a company to:",o:["Avoid all taxes permanently","Sell an owned asset to the finance company and lease it back, freeing up capital","Take public deposits","Eliminate the asset from existence"],a:1,e:"Sale & leaseback = 보유자산 매각 후 재임차 → 자본 유동화. 함정: 탈세·예금수취와 무관."},
{uid:"W1-077",set:"W1",tp:"금융기법",d:"Hard",q:"Consumer financing (pembiayaan konsumen) is distinguished from a bank loan primarily by:",o:["Taking deposits to fund it","Financing the purchase of specific consumer goods with installment repayment, by a finance company","Offering checking accounts","Issuing currency"],a:1,e:"Consumer financing = 특정 소비재 구매를 할부로 지원(finance company). 함정: 예금·당좌계좌는 은행 기능."},
{uid:"W1-078",set:"W1",tp:"금융기법",d:"Medium",q:"In credit card business by a finance company, the principal income source is typically:",o:["Deposit spreads","Interest, fees, and merchant commissions","Government subsidies","Equity dividends"],a:1,e:"신용카드 수입 = 이자·수수료·가맹점 commission. 함정: 예금스프레드는 은행형 모델."},
{uid:"W1-079",set:"W1",tp:"금융기법",d:"Hard",q:"When a finance company performs 'channeling' for a bank, the financing typically appears:",o:["On the finance company's balance sheet as its own asset","Off the finance company's balance sheet (risk/funding remain with the source)","As deposits","As equity"],a:1,e:"Channeling = finance company 장부 외(off-balance), 위험·자금은 자금원 보유. 함정: 자체 자산 계상은 joint financing/own-book."},
{uid:"W1-080",set:"W1",tp:"리스크",d:"Hard",q:"Which risk is MOST directly mitigated by the BMPP single-obligor and group limits?",o:["Interest rate risk","Concentration (credit) risk","Foreign exchange risk","Operational risk"],a:1,e:"BMPP = 집중(신용) 위험 완화. 함정: 금리·환·운영위험은 다른 도구로 관리."},
{uid:"W1-081",set:"W1",tp:"리스크",d:"Hard",q:"A finance company funding long-term leases with short-term borrowings is exposed primarily to:",o:["Liquidity / maturity-mismatch risk","Sharia non-compliance","Consumer protection breach","Gearing exemption"],a:0,e:"장기자산-단기부채 = 유동성·만기불일치 위험. 함정: 샤리아·소비자보호와 무관."},
{uid:"W1-082",set:"W1",tp:"리스크",d:"Medium",q:"Provisioning (allowance for impairment) on financing receivables primarily reflects:",o:["Expected/incurred credit losses","Marketing budget","Tax payable","Dividend reserve"],a:0,e:"대손충당금 = 예상·발생 신용손실 반영. 함정: 마케팅·세금·배당과 무관."},
{uid:"W1-083",set:"W1",tp:"리스크",d:"Hard",q:"Which is the correct hierarchy of BMPP limits from the controlling-relationship/group perspective?",o:["Single 20% < Group 50% = Controlling-related 50% of equity","Single 50% < Group 20%","All capped at 17.5%","No limits apply to groups"],a:0,e:"단일 20% < group 50% = 지배관계 당사자 50% of equity. 함정: single/group 수치 swap, 17.5%(acquisition) 혼입."},
{uid:"W1-084",set:"W1",tp:"GCG",d:"Hard",q:"Independency (one of the GCG principles) in a finance company specifically requires:",o:["Total secrecy from regulators","Management acting free from undue influence or conflicts of interest","Refusing all external audits","Centralizing all power in the CEO"],a:1,e:"Independency = 부당영향·이해상충 배제. 함정: 비밀주의·권력집중은 GCG 위배."},
{uid:"W1-085",set:"W1",tp:"GCG",d:"Hard",q:"Accountability under GCG primarily means:",o:["Maximizing leverage","Clear functions, responsibilities, and answerability of organs (BOD/BOC)","Avoiding documentation","Outsourcing governance"],a:1,e:"Accountability = 기관(BOD/BOC) 기능·책임·답책성 명확화. 함정: 레버리지·문서회피는 무관."},
{uid:"W1-086",set:"W1",tp:"GCG",d:"Medium",q:"The Board of Directors (BOD) of a finance company is primarily responsible for:",o:["Supervising itself","Managing the company's day-to-day operations and strategy execution","Replacing the OJK","Auditing the BOC"],a:1,e:"BOD = 일상경영·전략실행. 감독은 BOC. 함정: BOD/BOC 역할 혼동 반복 출제."},
{uid:"W1-087",set:"W1",tp:"GCG",d:"Hard",q:"A finance company with foreign shareholding of 90% would be:",o:["Compliant","In breach of the 85% foreign ownership cap","Eligible for tax breaks","Subject to higher gearing"],a:1,e:"외인 90% = 85% cap 위반. 함정: 인접 수치 차이 식별 요구."},
{uid:"W1-088",set:"W1",tp:"GCG",d:"Medium",q:"Responsibility (GCG principle) primarily concerns:",o:["Compliance with laws, regulations, and sound corporate principles","Maximizing short-term profit only","Avoiding all risk","Concealing related-party transactions"],a:0,e:"Responsibility = 법규·건전경영원칙 준수. 함정: 단기이익·은폐는 위배."},
{uid:"W1-089",set:"W1",tp:"소비자보호",d:"Hard",q:"A 'cooling-off' or transparency requirement in consumer protection ensures that:",o:["The company can change terms unilaterally anytime","Consumers receive clear information before binding commitment","Contracts are kept secret from consumers","Fees can be hidden"],a:1,e:"투명성 요건 = 구속 전 명확정보 제공. 함정: 일방변경·은폐는 정반대."},
{uid:"W1-090",set:"W1",tp:"소비자보호",d:"Medium",q:"Which SEOJK/POJK area governs consumer complaint and dispute resolution mechanisms?",o:["The consumer protection regulatory set (e.g., POJK 22/2023 and related SEOJK)","POJK 46/2024 only","POJK 35/2018 only","KMK 448/2000"],a:0,e:"민원·분쟁해결 = 소비자보호 규정군(POJK 22/2023 등). 함정: 사업운영·시설 규정은 별개."},
{uid:"W1-091",set:"W1",tp:"OtherRegs",d:"Hard",q:"The replacement chain for the AML/CFT (APU-PPT) regulation is correctly stated as:",o:["12/2017 → 23/2019 (amendment) → 8/2023 (replacement)","8/2023 → 12/2017 → 34/2018","34/2018 → 12/2017","46/2024 → 12/2017"],a:0,e:"APU-PPT 계보: 12/2017 → 23/2019 개정 → 8/2023 대체. 함정: 순서 역전·타 규정 혼입."},
{uid:"W1-092",set:"W1",tp:"OtherRegs",d:"Hard",q:"A finance company's HR certification obligation (POJK 43/2024) most directly supports which industry goal?",o:["Reducing paid-in capital","Raising professional competency and standardized certification of personnel","Eliminating the BOC","Removing consumer protection"],a:1,e:"POJK 43/2024 = 인력 전문역량·표준 인증 제고(SPPI 등). 함정: 자본·기관 축소와 무관."},
{uid:"W1-093",set:"W1",tp:"OtherRegs",d:"Medium",q:"PEP (Politically Exposed Person) screening under APU-PPT is required because PEPs present:",o:["No special risk","Higher corruption/money-laundering risk warranting enhanced scrutiny","Lower credit risk automatically","Tax exemptions"],a:1,e:"PEP = 부패·ML 고위험 → EDD. 함정: 위험 없음·자동 저위험은 오해."},
{uid:"W1-094",set:"W1",tp:"규제프레임",d:"Hard",q:"Which pair correctly matches regulation to subject?",o:["POJK 46/2024 = business operations; POJK 43/2024 = HR certification","POJK 46/2024 = AML; POJK 43/2024 = consumer protection","POJK 46/2024 = F&P; POJK 43/2024 = gearing","POJK 46/2024 = MSME; POJK 43/2024 = capital"],a:0,e:"46/2024=사업운영, 43/2024=HR 인증. 함정: 주제 교차배치로 오답 유도."},
{uid:"W1-095",set:"W1",tp:"규제프레임",d:"Medium",q:"POJK 19/2025 reflects the policy emphasis on:",o:["Reducing MSME access","Expanding/structuring MSME financing","Banning sharia products","Lowering consumer protection"],a:1,e:"POJK 19/2025 = MSME financing 확대·구조화. 함정: 축소·금지는 정책방향과 반대."},
{uid:"W1-096",set:"W1",tp:"Vision",d:"Medium",q:"The overarching vision for the Indonesian finance company industry under the Roadmap emphasizes being:",o:["Smaller and less regulated","Resilient, competitive, and contributing to inclusive economic growth","Deposit-taking institutions","Free from supervision"],a:1,e:"Roadmap 비전 = 회복력·경쟁력·포용성장 기여. 함정: 예금기관화·무감독은 본질과 배치."},
{uid:"W1-097",set:"W1",tp:"Roadmap",d:"Hard",q:"Which is a recognized PILLAR/theme area of the finance company industry roadmap?",o:["Eliminating all foreign capital","Strengthening resilience, governance, digitalization and consumer protection","Abolishing the OJK","Banning sharia finance"],a:1,e:"Roadmap 축 = 회복력·거버넌스·디지털화·소비자보호 강화. 함정: 폐지·금지형 선택지는 오답."},
{uid:"W1-098",set:"W1",tp:"산업사",d:"Hard",q:"Why has the NUMBER of finance companies declined over recent years despite roughly stable total assets?",o:["Mass bankruptcies only","Industry consolidation, mergers, and license revocations of weak players","A ban on new licenses forever","Conversion of all to banks"],a:1,e:"사수 감소 = 통폐합·합병·부실사 면허취소 → 자산은 보합. 함정: '대량파산만'·'은행 전환'은 단순화 오류."},
{uid:"W1-099",set:"W1",tp:"비율",d:"Hard",q:"A finance company reports gearing of 0 times. This means:",o:["It is in breach","It operates with no interest-bearing borrowings relative to equity (within the allowed floor)","It exceeds the cap","It has negative equity"],a:1,e:"Gearing 0배 = 이자부 차입 없음(허용 최저). 위반 아님. 함정: 0을 위반·음수자본으로 오인."},
{uid:"W1-100",set:"W1",tp:"규제프레임",d:"Hard",q:"A candidate must NOT confuse the following. Which statement is CORRECT?",o:["The 2.5% HR training budget is based on net income","The 17.5% acquisition cost cap is based on equity","The 2.5% HR training budget is based on personnel expenses; the 17.5% acquisition cap is based on each contract's total income","Foreign ownership cap and foreign director cap are both 85%"],a:2,e:"정답: 2.5% HR예산=인건비 기준, 17.5% acquisition cap=계약별 총수입 기준. 함정: 순이익·equity 기준 오인, 외인 director cap은 50%(지분 85%와 다름) — 모든 빈출 함정을 한 문항에 집약."},
{uid:"W2-001",set:"W2",tp:"BP구성",d:"Hard",q:"The Business Plan (RBB) of a finance company must be prepared in accordance with which primary regulation?",o:["POJK 46/2024","POJK 24/POJK.05/2019 (Business Plans for NBFIs)","POJK 12/2017","POJK 43/2024"],a:1,e:"BP(RBB) = POJK 24/2019(NBFI 사업계획) + SEOJK 23/2019. 함정: 46/2024(사업운영)·12/2017(AML)·43/2024(HR)는 별개."},
{uid:"W2-002",set:"W2",tp:"BP구성",d:"Hard",q:"Which Circular Letter supplements the Business Plan regulation for finance companies and sharia finance companies?",o:["SEOJK 23/SEOJK.05/2019","SEOJK 20/2025","SEOJK 1/2014","SEOJK 13/2014"],a:0,e:"SEOJK 23/2019 = BP 보완 회람. 함정: 소비자보호 계열 SEOJK들과 혼동."},
{uid:"W2-003",set:"W2",tp:"BP구성",d:"Medium",q:"The Business Plan primarily serves to:",o:["Replace the annual financial statements","Harmonize business needs with regulatory compliance and create long-term value","Eliminate the need for risk management","Satisfy tax authorities only"],a:1,e:"BP 목적 = 사업수요와 규제준수 조화 + 장기가치 창출. 함정: 재무제표 대체·세무목적은 오해."},
{uid:"W2-004",set:"W2",tp:"BP구성",d:"Hard",q:"A competency unit code such as 'K.64PBY91.001.1 — Developing a Business Plan' corresponds to which qualification perspective?",o:["Q6 (Evaluating/Monitoring)","Q7 (Developing/Implementing)","Neither","Both equally"],a:1,e:"Developing(개발·실행) = Q7. Evaluating/Monitoring(평가·감시) = Q6. 함정: Q6/Q7 perspective swap — 빈출."},
{uid:"W2-005",set:"W2",tp:"BP구성",d:"Hard",q:"'Evaluating a Finance Company's Business Plan' (K.64PBY91.003.1) belongs to which perspective?",o:["Q7 Developing","Q6 Evaluating","Q5","Implementation only"],a:1,e:"Evaluating = Q6 관점. develop(Q7)과 짝. 함정: 동일 BP 주제라도 develop/evaluate로 Q7/Q6 분기."},
{uid:"W2-006",set:"W2",tp:"BP구성",d:"Medium",q:"Knowledge, Skills & Work Attitudes (KSA) in a competency unit refers to:",o:["Only academic degrees","The required knowledge, practical skills, and professional attitudes for the task","Salary grades","Company assets"],a:1,e:"KSA = 지식·기술·업무태도. 함정: 학위·급여로 오인."},
{uid:"W2-007",set:"W2",tp:"BP구성",d:"Hard",q:"'Transfer Skills' as listed in the competency framework specifically means:",o:["Transferring money between accounts","Skills in solving problems in NEW contexts","Transferring employees","Risk transfer to insurers"],a:1,e:"Transfer Skills = 새로운 맥락에서 문제해결 능력. 함정: 자금이체·리스크 transfer와 동음이의 함정."},
{uid:"W2-008",set:"W2",tp:"BP보고",d:"Hard",q:"Which of the following is a recognized BENEFIT of evaluating a Business Plan?",o:["Guaranteeing zero losses","Early identification of deviations and corrective action; better resource alignment","Avoiding OJK reporting","Eliminating competition"],a:1,e:"BP 평가 편익: 편차 조기식별·시정, 자원정렬 개선 등. 함정: 무손실 보장·보고회피는 비현실."},
{uid:"W2-009",set:"W2",tp:"BP보고",d:"Medium",q:"The Business Plan is typically subject to which OJK interaction?",o:["No interaction required","Submission to and supervisory review by OJK","Approval by competitors","Publication in newspapers"],a:1,e:"BP = OJK 제출·감독검토 대상. 함정: 무제출·경쟁사 승인은 오답."},
{uid:"W2-010",set:"W2",tp:"BP보고",d:"Hard",q:"When actual performance deviates materially from the Business Plan, the company should FIRST:",o:["Ignore it until year-end","Analyze the deviation and prepare corrective/follow-up actions","Cancel the plan entirely","Replace all management"],a:1,e:"중대 편차 = 원인분석 + 시정·후속조치. 함정: 무시·전면취소는 부적절 대응."},
{uid:"W2-011",set:"W2",tp:"BP보고",d:"Medium",q:"A realistic Business Plan should be grounded in:",o:["Optimistic assumptions only","Reasonable assumptions consistent with market conditions and company capacity","Competitor secrets","Random projections"],a:1,e:"현실적 BP = 시장상황·회사역량에 부합하는 합리적 가정. 함정: 낙관일변도는 신뢰성 훼손."},
{uid:"W2-012",set:"W2",tp:"전략분석",d:"Hard",q:"In strategic analysis for the Business Plan, a SWOT analysis examines:",o:["Only external factors","Strengths, Weaknesses (internal) and Opportunities, Threats (external)","Only financial ratios","Only competitors"],a:1,e:"SWOT = 내부(S/W) + 외부(O/T). 함정: 외부만·내부만으로 한정 오인."},
{uid:"W2-013",set:"W2",tp:"전략분석",d:"Hard",q:"Aligning the company's risk appetite with its Business Plan ensures that:",o:["The company takes maximum possible risk","Growth targets remain within the company's risk-bearing capacity","Risk is entirely eliminated","The plan needs no review"],a:1,e:"위험선호-BP 정렬 = 성장목표가 위험감내력 내 유지. 함정: 최대위험·위험제거는 양극단 오답."},
{uid:"W2-014",set:"W2",tp:"전략분석",d:"Medium",q:"A key external factor to analyze when preparing a Business Plan is:",o:["The CEO's personal preferences","Macroeconomic conditions, regulation, and competition","Employee lunch menus","Office decor"],a:1,e:"외부요인 = 거시경제·규제·경쟁. 함정: 개인선호 등 무관항목."},
{uid:"W2-015",set:"W2",tp:"전략분석",d:"Hard",q:"Stakeholder collaboration in business plan execution is emphasized because:",o:["It slows decisions","Cross-functional input improves feasibility and shared ownership of targets","It removes accountability","It is legally banned"],a:1,e:"이해관계자 협업 = 실행가능성·목표 공동책임 제고. 함정: 책임제거·금지는 오답."},
{uid:"W2-016",set:"W2",tp:"Compliance",d:"Hard",q:"'Ensuring Compliance With Regulations Related to Finance Companies' (K.64PBY91.014.1) is a Q7 unit. The COMPLEMENTARY Q6 unit involves:",o:["Developing a business plan","Evaluating/Monitoring the implementation of compliance culture","Issuing loans","Marketing products"],a:1,e:"Ensure compliance(Q7) ↔ Evaluate compliance culture(Q6). 함정: Q6/Q7 짝 식별."},
{uid:"W2-017",set:"W2",tp:"Compliance",d:"Hard",q:"Compliance culture in a finance company is best described as:",o:["A one-time training event","An embedded set of values and behaviors where compliance is part of everyday decision-making","Solely the compliance officer's job","Optional for senior management"],a:1,e:"준법문화 = 일상 의사결정에 내재된 가치·행동. 함정: 일회성·담당자 단독·임원 면제는 모두 오해."},
{uid:"W2-018",set:"W2",tp:"Compliance",d:"Hard",q:"Which is NOT one of the implementation factors for building a compliance culture?",o:["Tone at the top / leadership commitment","Clear policies and procedures","Maximizing fines on staff as the primary tool","Training, communication, and monitoring"],a:2,e:"준법문화 구현요인: 최고경영진 의지·정책·교육·소통·감시 등. 함정: '벌금극대화'는 구현요인이 아닌 처벌일변도 오류."},
{uid:"W2-019",set:"W2",tp:"Compliance",d:"Medium",q:"The 'tone at the top' principle in compliance means:",o:["Only junior staff must comply","Senior leadership sets the ethical/compliance example for the whole organization","Compliance applies only to the finance team","Tone refers to audio quality"],a:1,e:"Tone at the top = 최고경영진이 윤리·준법 모범 설정. 함정: 하급직 한정·동음이의 함정."},
{uid:"W2-020",set:"W2",tp:"Compliance",d:"Hard",q:"The compliance function operates across a 3-layer scope. Which describes it best?",o:["Board only","Strategic (board/policy), managerial (implementation), and operational (day-to-day) layers","Marketing only","External auditors only"],a:1,e:"준법 3계층: 전략(이사회·정책)·관리(이행)·운영(일상). 함정: 단일 계층 한정 오답."},
{uid:"W2-021",set:"W2",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the COMPLIANCE function typically operates as part of:",o:["The First Line (operational management)","The Second Line (risk & compliance oversight)","The Third Line (internal audit)","Outside the model"],a:1,e:"준법 = 2선(위험·준법 감독). 1선=영업·운영, 3선=내부감사. 함정: 준법을 1선·3선으로 오배치."},
{uid:"W2-022",set:"W2",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, who constitutes the FIRST line?",o:["Internal audit","Operational management that owns and manages risk directly","The compliance department","The external regulator"],a:1,e:"1선 = 위험을 직접 소유·관리하는 영업·운영 관리. 함정: 준법(2선)·감사(3선)와 혼동."},
{uid:"W2-023",set:"W2",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the THIRD line provides:",o:["Day-to-day risk taking","Independent assurance through internal audit","Marketing strategy","Funding"],a:1,e:"3선 = 내부감사의 독립적 보증(assurance). 함정: 1선(위험감수)·2선(감독)과 혼동."},
{uid:"W2-024",set:"W2",tp:"Compliance",d:"Medium",q:"The independence of the Second Line (compliance/risk) from the First Line is important because:",o:["It allows them to take operational risks","It enables objective oversight free from operational pressure","It removes their responsibility","It is a legal formality only"],a:1,e:"2선 독립성 = 운영압력 배제한 객관적 감독. 함정: 위험감수·책임제거는 오답."},
{uid:"W2-025",set:"W2",tp:"Compliance",d:"Hard",q:"Which document set is used to EVALUATE the implementation of compliance culture?",o:["Only the annual report","Compliance reports & analysis to BOD/BOC, compliance audit results, and related committee materials","Marketing brochures","Tax filings only"],a:1,e:"준법문화 평가 자료: BOD/BOC 준법보고·분석, 준법감사 결과, 위원회 자료 등. 함정: 마케팅·세무는 무관."},
{uid:"W2-026",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance audit can be conducted by:",o:["Only the OJK","Internal Audit and/or relevant regulators (OJK)","Only external marketing firms","Only the CEO"],a:1,e:"준법감사 주체 = 내부감사 및/또는 규제기관(OJK). 함정: OJK 단독·CEO 단독은 오답."},
{uid:"W2-027",set:"W2",tp:"Compliance",d:"Medium",q:"Cross-functional discussion forums in compliance culture implementation are used to:",o:["Avoid all decisions","Agree on implementation steps across departments","Replace the BOD","Exclude the risk function"],a:1,e:"교차기능 포럼 = 부서 간 이행단계 합의. 함정: 의사결정 회피·기관 배제는 오답."},
{uid:"W2-028",set:"W2",tp:"Compliance",d:"Hard",q:"The Knowledge-Skills-Attitude (KSA) requirement for the compliance culture evaluator emphasizes the attitude of:",o:["Indifference to violations","Integrity, objectivity, and commitment to ethical standards","Maximizing personal gain","Avoiding documentation"],a:1,e:"준법평가자 태도 = 청렴·객관성·윤리기준 헌신. 함정: 무관심·사익은 정반대."},
{uid:"W2-029",set:"W2",tp:"Compliance",d:"Hard",q:"A finance company that treats compliance solely as 'the compliance officer's problem' demonstrates:",o:["Mature compliance culture","A weak/immature compliance culture lacking shared ownership","Optimal efficiency","Regulatory excellence"],a:1,e:"준법을 담당자 문제로 한정 = 공동책임 결여, 미성숙 문화. 함정: '효율'로 미화하는 오답."},
{uid:"W2-030",set:"W2",tp:"Compliance",d:"Medium",q:"The PRIMARY objective of the compliance function is to:",o:["Generate revenue","Ensure the company adheres to laws, regulations, and internal policies, managing compliance risk","Replace internal audit","Approve all loans"],a:1,e:"준법기능 목적 = 법규·내규 준수 + 준법위험 관리. 함정: 수익창출·감사대체·여신승인은 타 기능."},
{uid:"W2-031",set:"W2",tp:"Compliance",d:"Hard",q:"Compliance risk is best defined as the risk arising from:",o:["Currency fluctuations","Failure to comply with laws, regulations, and standards, leading to sanctions, losses, or reputational damage","Stock market movements","Equipment breakdown"],a:1,e:"준법위험 = 법규·기준 미준수로 인한 제재·손실·평판훼손. 함정: 환·시장·운영위험과 구분."},
{uid:"W2-032",set:"W2",tp:"Compliance",d:"Medium",q:"Effective communication of compliance policies requires that they be:",o:["Kept secret from staff","Clearly documented and disseminated to all relevant employees","Communicated only to the BOD","Verbal only"],a:1,e:"준법정책 = 명문화 + 전 관련직원 전파. 함정: 비밀·BOD한정·구두만은 실패요인."},
{uid:"W2-033",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance MONITORING system within a finance company should:",o:["Operate once every five years","Continuously track adherence and flag potential breaches for timely action","Monitor only after OJK requests","Focus only on profits"],a:1,e:"준법 모니터링 = 지속 추적 + 잠재위반 적시 경보. 함정: 5년 주기·사후·이익 한정은 부적절."},
{uid:"W2-034",set:"W2",tp:"Compliance",d:"Hard",q:"Which is a CORRECT statement about the relationship between the compliance function and internal audit?",o:["They are identical","Compliance (2nd line) manages compliance risk; internal audit (3rd line) independently assures it","Internal audit reports to compliance","Compliance replaces internal audit"],a:1,e:"준법(2선)=준법위험 관리, 내부감사(3선)=독립 보증. 함정: 동일시·상하관계로 오인."},
{uid:"W2-035",set:"W2",tp:"Compliance",d:"Medium",q:"When evaluating compliance culture, a high rate of UNRESOLVED audit findings indicates:",o:["Strong compliance culture","Weakness in follow-up and accountability","Excellent governance","No issue at all"],a:1,e:"미해결 감사지적 다수 = 후속조치·답책성 취약. 함정: '강한 문화'로 오인."},
{uid:"W2-036",set:"W2",tp:"Compliance",d:"Hard",q:"The compliance function's reporting line should ideally provide:",o:["Reporting only to the sales head","Direct access/reporting to the BOD and BOC to preserve independence","No reporting at all","Reporting to external competitors"],a:1,e:"준법 보고선 = BOD·BOC 직접 접근으로 독립성 확보. 함정: 영업총괄 보고는 독립성 훼손."},
{uid:"W2-037",set:"W2",tp:"Compliance",d:"Hard",q:"'Ensuring compliance with regulations' under the Q7 unit requires the practitioner to:",o:["Memorize all laws verbatim","Identify applicable regulations, embed them in processes, and verify adherence","Avoid documentation","Delegate entirely to OJK"],a:1,e:"준법 보장(Q7) = 적용법규 식별·프로세스 내재화·준수 검증. 함정: 암기·위임·문서회피는 핵심 아님."},
{uid:"W2-038",set:"W2",tp:"Compliance",d:"Medium",q:"A 'compliance report' submitted to the Directors should include:",o:["Only good news","Compliance status, identified breaches, analysis, and follow-up actions","Marketing results only","Competitor data"],a:1,e:"준법보고 = 준법현황·위반·분석·후속조치. 함정: 호재만·마케팅은 보고 본질 아님."},
{uid:"W2-039",set:"W2",tp:"Compliance",d:"Hard",q:"Which factor MOST undermines a compliance culture?",o:["Strong tone at the top","Leadership that bypasses controls for short-term gains","Regular training","Clear escalation channels"],a:1,e:"준법문화 최대 저해 = 경영진이 단기이익 위해 통제 우회. 함정: 나머지는 강화요인."},
{uid:"W2-040",set:"W2",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the GOVERNING BODY (BOD/BOC) primarily:",o:["Executes daily operations","Provides oversight, sets direction, and holds management accountable","Conducts the internal audit fieldwork","Sells products"],a:1,e:"지배기구(BOD/BOC) = 감독·방향설정·경영진 답책. 함정: 일상실행·감사실무·영업은 타 역할."},
{uid:"W2-041",set:"W2",tp:"Q6평가",d:"Hard",q:"From the Q6 (Evaluating) perspective, the FIRST step in evaluating business plan implementation is typically to:",o:["Approve next year's plan","Establish evaluation criteria/objectives and gather actual performance data","Fire underperformers","Increase the budget"],a:1,e:"Q6 평가 1단계 = 평가기준·목표 설정 + 실적자료 수집. 함정: 승인·인사·예산은 후속·무관."},
{uid:"W2-042",set:"W2",tp:"Q6평가",d:"Hard",q:"When evaluating, comparing ACTUAL vs PLANNED figures is used primarily to:",o:["Punish staff","Identify variances and their root causes for corrective action","Hide deviations","Satisfy curiosity"],a:1,e:"실적 vs 계획 = 편차·근본원인 식별 → 시정. 함정: 처벌·은폐는 평가 목적 아님."},
{uid:"W2-043",set:"W2",tp:"Q6평가",d:"Medium",q:"A key OUTPUT of the business plan evaluation process is:",o:["A marketing campaign","Recommendations and corrective actions to improve future performance","A new logo","Staff bonuses only"],a:1,e:"BP 평가 산출 = 권고·시정조치 → 향후 개선. 함정: 마케팅·인사보상은 부산물."},
{uid:"W2-044",set:"W2",tp:"Q6평가",d:"Hard",q:"Evaluating compliance culture (Q6) differs from ensuring compliance (Q7) in that Q6 focuses on:",o:["Building the rules from scratch","Measuring and assessing how effectively compliance is embedded and functioning","Marketing the rules","Replacing the rules annually"],a:1,e:"Q6 = 준법 내재화·작동 효과 측정·평가. Q7 = 준법 구축·보장. 함정: Q6/Q7 역할 혼동 반복."},
{uid:"W2-045",set:"W2",tp:"Q6평가",d:"Hard",q:"In monitoring compliance of follow-up actions on internal audit results (a Q6 unit), the key data sources include:",o:["Only press releases","Internal audit findings, follow-up status, and OJK monitoring recommendations","Competitor financials","Customer birthdays"],a:1,e:"감사 후속조치 모니터링 자료: 감사지적·후속현황·OJK 권고. 함정: 보도자료·경쟁사는 무관."},
{uid:"W2-046",set:"W2",tp:"Q6컴플",d:"Hard",q:"The evaluation of compliance culture should assess whether compliance is:",o:["A separate silo isolated from the business","Integrated into business processes and decision-making at all levels","Only on paper","Limited to year-end"],a:1,e:"준법문화 평가 = 전 계층 업무·의사결정 통합 여부. 함정: 사일로·서류상·연말한정은 미성숙 징후."},
{uid:"W2-047",set:"W2",tp:"Q6컴플",d:"Medium",q:"A maturity indicator of compliance culture is:",o:["Employees concealing violations","Employees proactively raising compliance concerns without fear of retaliation","Ignoring whistleblowers","No compliance training"],a:1,e:"성숙 지표 = 보복 두려움 없이 자발적 준법 우려 제기. 함정: 은폐·무시·무교육은 미성숙."},
{uid:"W2-048",set:"W2",tp:"Q6컴플",d:"Hard",q:"Which is a valid METRIC for evaluating compliance culture effectiveness?",o:["Number of office plants","Rate of timely resolution of compliance/audit findings and incidence of repeat violations","Color of the logo","CEO's golf handicap"],a:1,e:"준법문화 지표 = 적시 해결률·반복위반 빈도. 함정: 무관항목으로 오도."},
{uid:"W2-049",set:"W2",tp:"Q6컴플",d:"Hard",q:"If repeat violations of the same type keep occurring, the compliance culture evaluation should conclude:",o:["The culture is excellent","Root-cause remediation is failing; systemic weakness exists","No action needed","The violations are acceptable"],a:1,e:"동종 위반 반복 = 근본원인 시정 실패, 시스템적 취약. 함정: '우수'·'무조치'는 오답."},
{uid:"W2-050",set:"W2",tp:"Q6컴플",d:"Medium",q:"The ultimate goal of evaluating compliance culture is to:",o:["Assign blame","Drive continuous improvement and strengthen the embedding of compliance","Reduce staff","Increase fines"],a:1,e:"준법문화 평가 목표 = 지속개선 + 준법 내재화 강화. 함정: 비난·감원·벌금은 목적 아님."},
{uid:"W2-051",set:"W2",tp:"BP구성",d:"Hard",q:"A complete Business Plan for a finance company should typically contain which combination?",o:["Only a profit target","Executive summary, strategy, financial projections, risk assessment, and action plans","A single marketing slide","Only competitor logos"],a:1,e:"BP 구성 = 요약·전략·재무전망·위험평가·실행계획. 함정: 단일 항목 한정은 불완전."},
{uid:"W2-052",set:"W2",tp:"BP구성",d:"Medium",q:"Financial projections in a Business Plan should cover:",o:["Only the current month","Multi-period forward-looking projections (e.g., income, balance sheet, key ratios)","Only past actuals","No numbers at all"],a:1,e:"재무전망 = 다기간 전향적 추정(손익·BS·핵심비율). 함정: 과거만·당월만은 계획 아님."},
{uid:"W2-053",set:"W2",tp:"BP구성",d:"Hard",q:"The Business Plan must remain consistent with which higher-level document?",o:["A competitor's plan","The company's vision, mission, and approved strategy","An employee's resume","A press release"],a:1,e:"BP = 회사 비전·미션·승인전략과 정합. 함정: 경쟁사·무관문서는 오답."},
{uid:"W2-054",set:"W2",tp:"BP구성",d:"Hard",q:"Why must the Business Plan incorporate regulatory requirements explicitly?",o:["To impress competitors","Because regulatory compliance is a precondition for sustainable operation and OJK approval","To increase page count","It is optional"],a:1,e:"BP에 규제요건 명시 = 지속경영·OJK 승인의 전제. 함정: 임의·분량용은 오답."},
{uid:"W2-055",set:"W2",tp:"BP보고",d:"Hard",q:"Periodic Business Plan realization reports to OJK serve to:",o:["Advertise the company","Demonstrate progress against the plan and explain material deviations","Replace audited statements","List employee names"],a:1,e:"BP 실현 보고 = 계획 대비 진척 입증 + 중대 편차 설명. 함정: 광고·재무제표 대체는 오답."},
{uid:"W2-056",set:"W2",tp:"BP보고",d:"Medium",q:"A material adverse deviation from the plan should be reported:",o:["Never","Promptly, with analysis and corrective measures","Only after five years","Only if profits rise"],a:1,e:"중대 부정적 편차 = 적시 보고 + 분석·시정. 함정: 미보고·지연은 위반."},
{uid:"W2-057",set:"W2",tp:"BP보고",d:"Hard",q:"The revision of a Business Plan during the year is generally:",o:["Strictly forbidden","Permitted under defined conditions/timelines per OJK provisions when circumstances materially change","Done weekly without limit","Decided by competitors"],a:1,e:"BP 중간 수정 = OJK 규정상 일정 요건·시한 내 허용(중대 변화 시). 함정: 절대금지·무제한은 양극단 오답."},
{uid:"W2-058",set:"W2",tp:"전략분석",d:"Hard",q:"A PESTEL-type analysis in strategic planning examines:",o:["Only the company's profit","Political, Economic, Social, Technological, Environmental, Legal external factors","Only internal staff","Office supplies"],a:1,e:"PESTEL = 정치·경제·사회·기술·환경·법률 외부요인. 함정: 내부·이익 한정은 오답."},
{uid:"W2-059",set:"W2",tp:"전략분석",d:"Hard",q:"In setting Business Plan targets, the targets should ideally be:",o:["Vague and unmeasurable","Specific, Measurable, Achievable, Relevant, Time-bound (SMART)","Impossible to track","Secret"],a:1,e:"목표 = SMART(구체·측정가능·달성가능·관련·기한). 함정: 모호·비추적은 평가 불가."},
{uid:"W2-060",set:"W2",tp:"전략분석",d:"Medium",q:"Competitive analysis in a Business Plan helps the company to:",o:["Copy competitors illegally","Position itself and identify differentiation and market opportunities","Ignore the market","Fix prices with rivals"],a:1,e:"경쟁분석 = 포지셔닝·차별화·기회 식별. 함정: 불법모방·담합은 위법."},
{uid:"W2-061",set:"W2",tp:"전략분석",d:"Hard",q:"Linking the Business Plan to Key Performance Indicators (KPIs) enables:",o:["Avoiding measurement","Objective tracking of plan execution and accountability","Hiding results","Random management"],a:1,e:"BP-KPI 연계 = 실행 객관 추적·답책성. 함정: 측정회피·은폐는 정반대."},
{uid:"W2-062",set:"W2",tp:"ThreeLines",d:"Hard",q:"The Three Lines Model's MAIN purpose is to:",o:["Increase bureaucracy","Clarify roles and responsibilities for risk management and control across the organization","Eliminate the BOD","Centralize all risk in audit"],a:1,e:"3선 모델 목적 = 위험관리·통제 역할·책임 명확화. 함정: 관료화·기관제거는 오답."},
{uid:"W2-063",set:"W2",tp:"ThreeLines",d:"Hard",q:"A common ERROR is to place the risk management function in the:",o:["Second line (correct placement)","First line as a risk-owner (incorrect — it is a 2nd line oversight function)","Governing body","External regulator"],a:1,e:"위험관리 = 2선(감독). 1선(위험소유)로 두는 것이 흔한 오류. 함정: 정답은 '오배치' 식별."},
{uid:"W2-064",set:"W2",tp:"ThreeLines",d:"Medium",q:"Internal audit's independence in the Three Lines Model means it should:",o:["Report to operational management","Report functionally to the governing body/audit committee, separate from line management","Conduct daily operations","Set the company's strategy"],a:1,e:"내부감사 독립성 = 기능상 지배기구·감사위원회 보고, 라인경영과 분리. 함정: 운영보고·전략수립은 독립성 훼손."},
{uid:"W2-065",set:"W2",tp:"ThreeLines",d:"Hard",q:"Which statement about overlap between lines is CORRECT?",o:["Lines must never communicate","Coordination and information-sharing across lines strengthen overall governance while preserving independence","One line should do everything","Audit should approve all transactions"],a:1,e:"선 간 조정·정보공유 = 거버넌스 강화(독립성 유지하며). 함정: 단절·통합·승인은 오답."},
{uid:"W2-066",set:"W2",tp:"감독기관",d:"Hard",q:"Which body issues the Business Plan regulation (POJK 24/2019) and supervises its implementation?",o:["Bank Indonesia","OJK","Ministry of Trade","APPI"],a:1,e:"BP 규정·감독 = OJK. 함정: BI·무역부·협회는 발행·감독 주체 아님."},
{uid:"W2-067",set:"W2",tp:"감독기관",d:"Medium",q:"APPI/LSPPI's relevance to the compliance/competency framework is that it:",o:["Issues POJK","Provides industry certification (e.g., SPPI levels) for competency standards","Supervises banks","Sets monetary policy"],a:1,e:"APPI/LSPPI = 역량표준 산업인증(SPPI) 제공. 함정: POJK 발행·은행감독·통화정책은 무관."},
{uid:"W2-068",set:"W2",tp:"감독기관",d:"Hard",q:"The legal basis hierarchy for compliance obligations places POJK:",o:["Above the governing law (UU)","Below the law (UU) but as binding implementing regulation","As non-binding guidance","Equal to internal company policy"],a:1,e:"POJK = 상위법(UU) 하위지만 구속력 있는 시행규정. 함정: 상위·비구속·내규동급은 오답."},
{uid:"W2-069",set:"W2",tp:"Compliance",d:"Hard",q:"A 'compliance charter' typically establishes:",o:["The marketing budget","The mandate, authority, scope, and reporting lines of the compliance function","Employee salaries","The dividend policy"],a:1,e:"준법헌장 = 준법기능 권한·범위·보고선 규정. 함정: 예산·급여·배당은 타 문서."},
{uid:"W2-070",set:"W2",tp:"Compliance",d:"Hard",q:"When OJK issues a new regulation, the compliance function should FIRST:",o:["Ignore it until audited","Conduct a gap analysis to assess impact and required changes","Immediately terminate operations","Wait for competitors to act"],a:1,e:"신규 POJK 대응 = 영향·필요변경 gap analysis 우선. 함정: 무시·중단·관망은 부적절."},
{uid:"W2-071",set:"W2",tp:"Compliance",d:"Medium",q:"Embedding compliance into product approval processes is an example of:",o:["After-the-fact compliance","Proactive/preventive compliance ('compliance by design')","Avoiding compliance","Compliance theater"],a:1,e:"상품승인에 준법 내재 = 예방적 'compliance by design'. 함정: 사후·회피·형식주의와 대조."},
{uid:"W2-072",set:"W2",tp:"Compliance",d:"Hard",q:"The compliance function's effectiveness ultimately depends MOST on:",o:["The size of the fines it imposes","Genuine support from senior leadership and integration into culture","The number of policies written","Its physical office location"],a:1,e:"준법 실효성 = 경영진 진정한 지원 + 문화 통합. 함정: 벌금·문서량·위치는 본질 아님."},
{uid:"W2-073",set:"W2",tp:"Compliance",d:"Hard",q:"Which scenario best illustrates a FAILURE of compliance culture despite good policies?",o:["Policies are followed consistently","Detailed policies exist but are routinely bypassed under business pressure","Staff escalate concerns","Audits are resolved promptly"],a:1,e:"정책은 있으나 사업압력에 상시 우회 = 문화 실패. 함정: 나머지는 건전 징후."},
{uid:"W2-074",set:"W2",tp:"BP구성",d:"Hard",q:"The Business Plan should be APPROVED by:",o:["The compliance officer alone","The Board of Directors and Board of Commissioners (per governance requirements)","An external vendor","The marketing team"],a:1,e:"BP 승인 = BOD·BOC(거버넌스 요건). 함정: 담당자·외부·마케팅 단독은 오답."},
{uid:"W2-075",set:"W2",tp:"Q6평가",d:"Hard",q:"A robust evaluation framework for the Business Plan should be:",o:["One-off and informal","Systematic, periodic, criteria-based, and documented","Based on rumor","Hidden from the BOD"],a:1,e:"BP 평가 = 체계적·정기적·기준기반·문서화. 함정: 일회·비공식·비공개는 부실."},
{uid:"W2-076",set:"W2",tp:"Q6컴플",d:"Hard",q:"A '3-layer + implementation steps + KSA' framework for compliance culture scope is used to:",o:["Confuse staff","Comprehensively define WHERE, HOW, and WITH WHAT CAPABILITY compliance culture is implemented","Avoid responsibility","Reduce training"],a:1,e:"3계층+이행단계+KSA = 어디서·어떻게·어떤 역량으로 준법문화 구현하는지 포괄 정의. 함정: 혼란·회피는 오답."},
{uid:"W2-077",set:"W2",tp:"Compliance",d:"Hard",q:"Which is the CORRECT order of escalation for a detected compliance breach?",o:["Conceal → forget","Identify → report internally → analyze → remediate → report to BOD/BOC (and OJK if required)","Report to media first","Punish first, investigate never"],a:1,e:"준법위반 처리 = 식별→내부보고→분석→시정→BOD/BOC(필요시 OJK) 보고. 함정: 은폐·언론·선처벌은 오답."},
{uid:"W2-078",set:"W2",tp:"Compliance",d:"Medium",q:"A whistleblowing channel supports compliance culture by:",o:["Punishing reporters","Allowing safe, confidential reporting of misconduct to enable early detection","Publicizing all reports","Replacing internal audit"],a:1,e:"내부고발 채널 = 안전·기밀 신고 → 조기탐지. 함정: 보복·공개·감사대체는 오답."},
{uid:"W2-079",set:"W2",tp:"Compliance",d:"Hard",q:"The 'second line of defense' would FAIL in its purpose if it:",o:["Maintains independence from the first line","Becomes operationally involved in revenue-generating decisions it is meant to oversee","Reports to the BOC","Performs risk oversight"],a:1,e:"2선 실패 = 감독대상인 수익결정에 운영적으로 개입(독립성 상실). 함정: 나머지는 정상 기능."},
{uid:"W2-080",set:"W2",tp:"Compliance",d:"Hard",q:"Regulatory change management as a compliance sub-process requires:",o:["Ignoring SEOJK circulars","Tracking new POJK/SEOJK, assessing impact, updating policies/processes, and training staff","Acting only on penalties","Outsourcing all decisions"],a:1,e:"규제변경 관리 = 신규 POJK/SEOJK 추적·영향평가·정책갱신·교육. 함정: 무시·사후·전면위임은 부실."},
{uid:"W2-081",set:"W2",tp:"전략분석",d:"Hard",q:"Scenario analysis in business planning is valuable because it:",o:["Guarantees one outcome","Tests plan resilience under different (base/optimistic/pessimistic) assumptions","Eliminates uncertainty","Replaces the BOD's judgment"],a:1,e:"시나리오 분석 = 기본·낙관·비관 가정 하 계획 강건성 시험. 함정: 단일보장·불확실성 제거는 과장."},
{uid:"W2-082",set:"W2",tp:"전략분석",d:"Medium",q:"A Business Plan that sets unrealistically high growth targets risks:",o:["Guaranteed success","Excessive risk-taking, breaches of prudential limits, and credibility loss","Lower compliance burden","Automatic OJK approval"],a:1,e:"비현실적 고성장 목표 = 과도위험·건전성한도 위반·신뢰상실. 함정: 보장성공·승인은 오답."},
{uid:"W2-083",set:"W2",tp:"BP보고",d:"Hard",q:"In evaluating BP implementation, a finding that targets were met but through EXCESSIVE risk-taking should be:",o:["Praised unconditionally","Flagged — outcome quality must consider the risk taken to achieve it","Ignored","Rewarded with no review"],a:1,e:"목표달성이나 과도위험 동반 = 위험감안한 성과질 평가 필요(경고). 함정: 무조건 칭찬·무시는 부적절."},
{uid:"W2-084",set:"W2",tp:"ThreeLines",d:"Hard",q:"The compliance function and risk management function, both in the 2nd line, differ in that:",o:["They are identical","Compliance focuses on legal/regulatory adherence; risk management on the full spectrum of risks","Compliance does fieldwork audits","Risk management approves loans"],a:1,e:"준법(법규준수 초점) vs 위험관리(전 위험 스펙트럼). 둘 다 2선이나 초점 다름. 함정: 동일시·역할혼동."},
{uid:"W2-085",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance program's training component should be:",o:["One-time at hiring only","Ongoing, role-specific, and refreshed as regulations change","Optional for managers","Limited to the compliance team"],a:1,e:"준법교육 = 지속·직무특화·규제변경 시 갱신. 함정: 일회·임원면제·팀한정은 부실."},
{uid:"W2-086",set:"W2",tp:"Compliance",d:"Medium",q:"Documentation of compliance activities is important primarily for:",o:["Increasing paperwork","Evidencing compliance, enabling audit/review, and demonstrating accountability to OJK","Hiding decisions","Marketing"],a:1,e:"준법 문서화 = 준수 입증·감사가능·OJK 답책성. 함정: 단순 서류·은폐는 오답."},
{uid:"W2-087",set:"W2",tp:"Q6평가",d:"Hard",q:"Monitoring the compliance of follow-up actions on internal audit results assesses whether:",o:["Audits are never done","Agreed corrective actions from audit findings are actually implemented on time","Marketing improved","The logo changed"],a:1,e:"감사 후속 준수 모니터링 = 합의된 시정조치 적시 이행 여부. 함정: 무관항목으로 오도."},
{uid:"W2-088",set:"W2",tp:"Q6평가",d:"Hard",q:"If follow-up on internal audit findings is only 65% complete (vs 100% target), the evaluation rating would be:",o:["Fully Comply","Less Comply / partially compliant — a shortfall requiring attention","Excellent","Not applicable"],a:1,e:"감사후속 65%(목표 100%) = Less Comply(부분준수), 시정필요. 함정: 'Fully'·'Excellent'은 오답 — textbook 사례 수치."},
{uid:"W2-089",set:"W2",tp:"Compliance",d:"Hard",q:"The relationship between compliance reports and the BOC's supervisory role is that:",o:["The BOC ignores them","Compliance reports inform the BOC's oversight and enable it to hold the BOD accountable","Only the BOD sees them","They are confidential from governance"],a:1,e:"준법보고 = BOC 감독 정보 제공 → BOD 답책. 함정: BOC 배제·BOD 한정은 거버넌스 훼손."},
{uid:"W2-090",set:"W2",tp:"BP구성",d:"Hard",q:"Integrating risk assessment into the Business Plan ensures that:",o:["Risks are ignored","Growth strategies are stress-tested against identifiable risks before commitment","Only profits are planned","The plan is shorter"],a:1,e:"BP에 위험평가 통합 = 약속 전 성장전략 stress-test. 함정: 위험무시·이익만은 부실계획."},
{uid:"W2-091",set:"W2",tp:"Compliance",d:"Hard",q:"A finance company's compliance with POJK obligations is BEST evidenced by:",o:["Verbal assurances","Documented policies, monitoring records, reports, and remediation tracking","A single annual meeting","Competitor benchmarks"],a:1,e:"준법 입증 = 문서화 정책·모니터링 기록·보고·시정추적. 함정: 구두·단발·경쟁사는 불충분."},
{uid:"W2-092",set:"W2",tp:"전략분석",d:"Medium",q:"Aligning the Business Plan with the Industry Roadmap (2024-2028) signals that the company:",o:["Ignores industry direction","Positions itself consistently with national/industry strategic priorities","Operates illegally","Avoids all regulation"],a:1,e:"BP-Roadmap 정렬 = 산업 전략우선순위와 정합 포지셔닝. 함정: 무시·위법은 오답."},
{uid:"W2-093",set:"W2",tp:"Compliance",d:"Hard",q:"Which best characterizes a 'mature' compliance culture across the 3 layers?",o:["Compliance only at operational layer","Consistent compliance values and behaviors embedded at strategic, managerial, AND operational layers","Compliance only at board level","No layered structure"],a:1,e:"성숙 준법문화 = 전략·관리·운영 전 계층 일관 내재. 함정: 단일 계층 한정은 미성숙."},
{uid:"W2-094",set:"W2",tp:"ThreeLines",d:"Hard",q:"The PRIMARY accountability for managing risk and compliance in daily operations rests with:",o:["Internal audit","The first line (operational management that owns the risk)","External auditors","The OJK"],a:1,e:"일상 위험·준법 1차 책임 = 1선(위험소유 영업·운영). 함정: 감사·OJK에 1차책임 전가는 오해."},
{uid:"W2-095",set:"W2",tp:"Q6컴플",d:"Medium",q:"A compliance culture survey of employees is a tool to:",o:["Replace audits","Gauge perceptions, awareness, and the lived reality of compliance values","Set salaries","Approve loans"],a:1,e:"준법문화 설문 = 인식·인지·실제 준법가치 측정. 함정: 감사대체·급여·여신은 무관."},
{uid:"W2-096",set:"W2",tp:"BP보고",d:"Hard",q:"The frequency of Business Plan realization reporting to OJK is determined by:",o:["The company at random","The applicable OJK provisions (periodic, e.g., per defined schedule)","Competitors","The marketing calendar"],a:1,e:"BP 실현보고 주기 = OJK 규정(정기 일정). 함정: 임의·경쟁사·마케팅은 오답."},
{uid:"W2-097",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance officer who identifies a regulatory breach but faces pressure to conceal it should:",o:["Conceal it to protect revenue","Escalate through proper channels to BOD/BOC, upholding independence and integrity","Resign immediately without reporting","Inform competitors"],a:1,e:"위반 발견 + 은폐압력 = 정상채널로 BOD/BOC 에스컬레이션(독립성·청렴 유지). 함정: 은폐·무보고 사퇴는 부적절."},
{uid:"W2-098",set:"W2",tp:"전략분석",d:"Hard",q:"A Business Plan's assumptions about funding sources must be consistent with:",o:["Deposit-taking (not permitted)","Permitted funding sources (bonds, bank loans, sukuk) and the gearing ratio limit","Unlimited leverage","Government grants only"],a:1,e:"BP 자금가정 = 허용자금원(채권·차입·sukuk) + gearing 10배 한도 정합. 함정: 예금수취 불가·무제한 레버리지는 위반."},
{uid:"W2-099",set:"W2",tp:"Q6평가",d:"Hard",q:"The 'Plan-Do-Check-Act' (PDCA) cycle relates to business plan management by:",o:["Skipping the Check phase","Providing a continuous improvement loop: plan, execute, evaluate, and act on findings","Doing only the Plan phase","Eliminating evaluation"],a:1,e:"PDCA = 계획·실행·평가·조치의 지속개선 루프(Q6 평가는 Check-Act). 함정: 평가 생략은 PDCA 위배."},
{uid:"W2-100",set:"W2",tp:"Compliance",d:"Hard",q:"A candidate must distinguish Q6 vs Q7 and the Three Lines. Which statement is CORRECT?",o:["Ensuring compliance is Q6; evaluating compliance culture is Q7","Developing a BP is Q7; evaluating a BP is Q6; compliance is the 2nd line; internal audit is the 3rd line","Compliance is the 1st line; audit is the 2nd line","All units are Q6 and there are only two lines"],a:1,e:"정답: BP개발=Q7, BP평가=Q6, 준법=2선, 내부감사=3선. 함정: Q6/Q7 swap, 1선/2선/3선 오배치를 한 문항에 집약 — 빈출 종합."},
{uid:"W3-001",set:"W3",tp:"전략",d:"Hard",q:"A risk management strategy is best defined as:",o:["A marketing plan","A systematic approach to identify, manage, and mitigate potential risks","A profit-maximization scheme","An HR policy"],a:1,e:"위험관리 전략 = 잠재위험 식별·관리·완화의 체계적 접근. 함정: 마케팅·이익·HR과 혼동."},
{uid:"W3-002",set:"W3",tp:"전략",d:"Hard",q:"The risk management process typically begins with:",o:["Risk treatment","Risk identification","Risk reporting","Risk acceptance"],a:1,e:"위험관리 시작 = 위험 식별(identification). 이후 평가·처리·모니터링. 함정: treatment·reporting을 시작으로 오인."},
{uid:"W3-003",set:"W3",tp:"전략",d:"Hard",q:"Risk APPETITE is determined based on:",o:["The CEO's mood","The company's business strategy","Competitor behavior","Random selection"],a:1,e:"Risk appetite = 회사 사업전략 기반 결정. 함정: 감정·경쟁사·무작위는 오답."},
{uid:"W3-004",set:"W3",tp:"전략",d:"Hard",q:"Risk LIMITS are established based on:",o:["Risk appetite and risk tolerance","Marketing budget","Number of employees","Office size"],a:1,e:"Risk limit = risk appetite + risk tolerance 기반. 함정: 예산·인원·규모와 무관."},
{uid:"W3-005",set:"W3",tp:"전략",d:"Medium",q:"The distinction between risk appetite and risk tolerance is that:",o:["They are identical","Appetite is the amount of risk willing to pursue; tolerance is the acceptable deviation/boundary","Tolerance is always larger by law","Appetite is set by OJK"],a:1,e:"Appetite = 추구할 위험량, tolerance = 수용가능 편차·경계. 함정: 동일시·법정수치 오인."},
{uid:"W3-006",set:"W3",tp:"전략",d:"Hard",q:"Risk culture is developed in accordance with:",o:["The marketing calendar","Applicable procedures and the company's values","Competitor practices only","No procedures"],a:1,e:"위험문화 = 적용 절차·회사 가치에 따라 개발. 함정: 마케팅·경쟁사만은 오답."},
{uid:"W3-007",set:"W3",tp:"전략",d:"Hard",q:"Establishing risk appetite is a responsibility primarily of:",o:["Junior staff","The Board (BOD/BOC) and senior management","External vendors","The marketing team"],a:1,e:"Risk appetite 설정 = 이사회·고위경영진 책임. 함정: 하급직·외부·마케팅은 오답."},
{uid:"W3-008",set:"W3",tp:"전략",d:"Medium",q:"A risk strategy that is misaligned with the business strategy would likely cause:",o:["Improved performance","Either excessive risk-taking or missed opportunities","Automatic compliance","Lower costs always"],a:1,e:"위험전략-사업전략 불일치 = 과도위험 또는 기회상실. 함정: '개선'·'자동준수'는 오답."},
{uid:"W3-009",set:"W3",tp:"전략",d:"Hard",q:"The Risk Strategy Score Card is used to:",o:["Score employees' attendance","Translate risk strategy into measurable indicators for monitoring","Calculate dividends","Rank competitors"],a:1,e:"Risk Strategy Score Card = 위험전략을 측정가능 지표로 전환·모니터링. 함정: 출석·배당·경쟁사는 무관."},
{uid:"W3-010",set:"W3",tp:"전략",d:"Hard",q:"Which is the CORRECT sequence of the risk management process?",o:["Treat → Identify → Monitor → Assess","Identify → Assess/Measure → Treat → Monitor & Review","Monitor → Treat → Identify","Report → Identify → Accept"],a:1,e:"위험관리 순서: 식별→평가/측정→처리→모니터링·검토. 함정: 순서 뒤섞기."},
{uid:"W3-011",set:"W3",tp:"Treatment",d:"Hard",q:"In risk treatment, 'Avoid' means:",o:["Accepting the risk fully","Eliminating the activity that generates the risk","Buying insurance","Doing nothing"],a:1,e:"Avoid = 위험 발생 활동 자체 제거·중단. 함정: accept(수용)·transfer(이전)와 혼동."},
{uid:"W3-012",set:"W3",tp:"Treatment",d:"Hard",q:"Risk 'Transfer' is typically achieved by:",o:["Ignoring the risk","Shifting the financial consequence to a third party (e.g., insurance)","Stopping the business","Accepting it internally"],a:1,e:"Transfer = 재무결과를 제3자로 이전(예: 보험). 함정: avoid·accept와 혼동."},
{uid:"W3-013",set:"W3",tp:"Treatment",d:"Hard",q:"For a minor operational risk below IDR 100 million, the textbook example treatment is:",o:["Avoid the activity","Transfer to insurer","Accept (no action) given immateriality","Escalate to OJK"],a:2,e:"경미 운영위험(<IDR 100백만) = Accept(무조치). 함정: 사소한 위험에 avoid·transfer는 비용비효율 — textbook 사례."},
{uid:"W3-014",set:"W3",tp:"Treatment",d:"Hard",q:"The four primary risk treatment options are:",o:["Avoid, Transfer, Mitigate/Reduce, Accept","Buy, Sell, Hold, Trade","Plan, Do, Check, Act","Hire, Fire, Train, Promote"],a:0,e:"위험처리 4선택: Avoid·Transfer·Mitigate(Reduce)·Accept. 함정: PDCA·매매용어와 혼동."},
{uid:"W3-015",set:"W3",tp:"Treatment",d:"Medium",q:"'Mitigate/Reduce' as a treatment means:",o:["Eliminating the activity","Implementing controls to lower the likelihood or impact of the risk","Transferring to insurer","Accepting with no action"],a:1,e:"Mitigate = 통제로 발생가능성·영향 축소. 함정: avoid(제거)·transfer(이전)·accept(무조치)와 구분."},
{uid:"W3-016",set:"W3",tp:"Treatment",d:"Hard",q:"Choosing a risk treatment should be based on:",o:["The cheapest option always","A cost-benefit analysis weighing the treatment cost against risk reduction","The CEO's preference","Random choice"],a:1,e:"처리 선택 = 처리비용 vs 위험감소의 비용편익 분석. 함정: 최저가·선호·무작위는 부적절."},
{uid:"W3-017",set:"W3",tp:"Treatment",d:"Hard",q:"After applying a treatment, the remaining risk is called:",o:["Inherent risk","Residual risk","Transferred risk","Avoided risk"],a:1,e:"처리 후 잔여 = residual risk. 처리 전 = inherent risk. 함정: inherent/residual 혼동."},
{uid:"W3-018",set:"W3",tp:"Treatment",d:"Medium",q:"Inherent risk differs from residual risk in that inherent risk is:",o:["The risk after controls","The risk BEFORE any controls/treatment is applied","Always zero","Only operational"],a:1,e:"Inherent = 통제 적용 전 위험. residual = 후. 함정: 정의 역전."},
