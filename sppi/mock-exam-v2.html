<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPPI Level 7 — 종합 모의고사 V2 (W1~W4)</title>
<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--purple:#5b4a7a;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .setbadge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:99px;letter-spacing:.04em}
  .setW1{background:#eef2f6;color:var(--blue)}.setW2{background:#e7f1ea;color:var(--green)}.setW3{background:#f0ecf5;color:var(--purple)}.setW4{background:#f6e9e6;color:var(--red)}.setGAP{background:#e9f3ed;color:var(--green)}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.topic{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  .mix{display:flex;gap:6px;justify-content:center;margin:10px 0 4px;flex-wrap:wrap}
  .mix span{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:700}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>
</head>

<div class="wrap">
  <header>
    <div class="eyebrow">SPPI Level 7 · Financing Management</div>
    <h1>종합 모의고사 V2 — W1~W4 통합</h1>
    <div class="sub">전 범위 500문항 풀에서 매회 40문항 랜덤 출제 · 실전 비중 가중 · 보기 셔플</div>
  </header>
  <div class="panel" id="app"></div>
  <footer>출처: A to Z in Finance Company Business (Day 1) / Training Module Qualification Level 6·7 (Day 2)</footer>

<script>
const BANK = [
{uid:"W1-001",set:"W1",tp:"산업사",d:"Hard",q:"In Indonesia's legal hierarchy for finance companies, which instrument ranks HIGHEST?",o:["A POJK issued by OJK","A Law (UU), e.g. the P2SK Law","A Circular Letter (SEOJK)","A Ministerial Decree (KMK)"],a:1,e:"위계 최상위 = Law(UU). POJK·SEOJK는 위임입법, KMK는 구체제 규정. 함정: POJK를 최상위로 오인."},
{uid:"W1-002",set:"W1",tp:"산업사",d:"Medium",q:"Before OJK was formed, which institution supervised finance companies?",o:["Bank Indonesia","The Ministry of Finance","Bapepam-LK","The Deposit Insurance Agency"],a:1,e:"OJK 이전 multifinance 감독 = 재무부(Kemenkeu). 은행은 BI였으나 finance company는 재무부. 함정: BI로 오인."},
{uid:"W1-003",set:"W1",tp:"산업사",d:"Hard",q:"The 'Double Pledge' fraud cases most directly drove the strengthening of:",o:["The 10x gearing ceiling rule","Fiduciary registration and SLIK checks","Minimum paid-in capital provisions","The 85% foreign ownership cap"],a:1,e:"Double Pledge(중복담보) = fiducia 등록·SLIK 차주검증 강화의 직접 원인. 함정: gearing·자본요건은 별개 조치."},
{uid:"W1-004",set:"W1",tp:"산업사",d:"Medium",q:"KMK 1169/1991 is historically credited with establishing the legal basis for:",o:["Consumer credit cards","Leasing operations","The creation of OJK","The gearing ratio cap"],a:1,e:"KMK 1169/1991 = leasing 법적 기반. 1974 SKB가 최초 도입, 2000 KMK 448이 4종 통합. 함정: 4종 통합·OJK와 혼동."},
{uid:"W1-005",set:"W1",tp:"통계",d:"Hard",q:"The number of conventional finance companies operating in Indonesia is closest to:",o:["88","144","203","265"],a:1,e:"144개사. 통폐합으로 과거 200개+에서 감소. 함정: 인접 수치·과거치 혼동."},
{uid:"W1-006",set:"W1",tp:"통계",d:"Hard",q:"A high industry FAR (around 86.70%) primarily indicates that:",o:["Large liquidity buffers are held","Productive assets dominate the sheet","The industry breaches regulation","Capital is being under-utilized"],a:1,e:"FAR ≈ 86.70% = 생산자산이 총자산에서 큰 비중(본업 집중). 함정: 유동성·위반·미활용으로 오인."},
{uid:"W1-007",set:"W1",tp:"통계",d:"Hard",q:"MSMD at industry level is ~328.37%, but the regulatory MINIMUM for core capital to paid-in capital is:",o:["At least 100%","At least 50%","At least 150%","At least 328%"],a:1,e:"Core/Paid-in 최소 ≥50%. 산업 평균 328.37%는 평균치일 뿐. 함정: 150% threshold·평균치를 요건으로 오인."},
{uid:"W1-008",set:"W1",tp:"통계",d:"Medium",q:"Industry Gross NPF is approximately:",o:["0.89%","2.89%","5.89%","8.89%"],a:1,e:"Gross NPF ≈ 2.89%(5% 미만 = 건전). 함정: 5%·8%대는 부실 신호 수준."},
{uid:"W1-009",set:"W1",tp:"통계",d:"Hard",q:"An UPWARD-trending BOPO ratio signals:",o:["Improving efficiency","Deteriorating efficiency","Higher profitability","Lower NPF"],a:1,e:"BOPO 상승 = 비효율 악화(비용/영업수익). 낮을수록 좋음. 함정: 직관과 반대 — 상승을 개선으로 오인."},
{uid:"W1-010",set:"W1",tp:"규제프레임",d:"Hard",q:"Which feature was NEWLY introduced by POJK 46/2024 (replacing POJK 35/2018)?",o:["The 10x gearing ceiling","Non-face-to-face financing","The 50% core capital rule","Fiduciary registration"],a:1,e:"POJK 46/2024 신규 = 비대면 financing 허용. gearing·core capital은 기존부터 존재. 함정: 기존 항목을 신규로 오인."},
{uid:"W1-011",set:"W1",tp:"규제프레임",d:"Medium",q:"Which regulation governs MSME-focused financing introduced in 2025?",o:["POJK 19/2025","POJK 43/2024","POJK 12/2017","POJK 34/2018"],a:0,e:"POJK 19/2025 = MSME. 43/2024=HR, 12/2017=AML, 34/2018=F&P 재평가. 함정: 인접 번호 혼동."},
{uid:"W1-012",set:"W1",tp:"규제프레임",d:"Hard",q:"POJK 12/POJK.01/2017 actually governs which subject?",o:["Fit and Proper reassessment","AML/CFT (APU-PPT)","Minimum paid-in capital","Consumer protection"],a:1,e:"POJK 12/2017 = APU-PPT(AML/CFT). F&P 재평가는 34/2018. 함정: 번호만 보고 F&P로 오인."},
{uid:"W1-013",set:"W1",tp:"규제프레임",d:"Hard",q:"The HR competency certification obligation is established under:",o:["POJK 43/2025","POJK 43/2024","POJK 35/2018","POJK 34/2018"],a:1,e:"POJK 43/2024 = HR 인증. 함정: 43/2025는 존재하지 않는 규정 — 과거 오기록."},
{uid:"W1-014",set:"W1",tp:"규제프레임",d:"Hard",q:"The minimum HR training budget is calculated as 2.5% of:",o:["Net income for the year","Personnel/employee expenses","Total consolidated assets","Paid-in share capital"],a:1,e:"교육예산 = 인건비(personnel expenses)의 2.5%. 함정: 순이익·자산·자본 기준으로 오인 — 반복 오류점."},
{uid:"W1-015",set:"W1",tp:"규제프레임",d:"Medium",q:"The Indonesian finance company industry Roadmap covers which period?",o:["2020-2024","2024-2028","2023-2027","2025-2030"],a:1,e:"Roadmap 2024-2028. 함정: 인접 연도 혼동."},
{uid:"W1-016",set:"W1",tp:"사업영역",d:"Hard",q:"Which set lists the FOUR core conventional financing activities?",o:["Leasing, deposits, insurance, factoring","Leasing, factoring, credit card, consumer financing","Banking, leasing, factoring, underwriting","Consumer financing, deposits, leasing, brokerage"],a:1,e:"4대 본업 = leasing·factoring·credit card·consumer financing. 함정: deposit·insurance·banking은 면허 외."},
{uid:"W1-017",set:"W1",tp:"사업영역",d:"Hard",q:"Working capital and investment financing facilities were first enabled by:",o:["KMK 448/2000","POJK 35/2018","POJK 46/2024","POJK 19/2025"],a:1,e:"운전자본·투자 facility = POJK 35/2018 도입(46/2024로 갱신). 함정: 최신 번호·구번호 혼동."},
{uid:"W1-018",set:"W1",tp:"사업영역",d:"Medium",q:"Sharia financing receivables in the industry have recently shown which trend?",o:["Steady decline","Double-digit growth","Flat stagnation","A regulatory ban"],a:1,e:"Sharia financing 두자릿수 성장. 함정: 감소·정체·금지는 사실 아님."},
{uid:"W1-019",set:"W1",tp:"사업영역",d:"Hard",q:"Which is NOT a permitted funding source for a finance company?",o:["Issuance of corporate bonds","Bank and syndicated loans","Public demand/savings deposits","Issuance of sharia sukuk"],a:2,e:"공중 예금수취 = 은행 고유, finance company 금지. 함정: 채권·차입·sukuk은 허용."},
{uid:"W1-020",set:"W1",tp:"금융기법",d:"Hard",q:"At the end of a FINANCE lease, the lessee typically:",o:["Returns the asset, no option","Holds an option at residual value","Receives ownership for free","Pays a penalty equal to value"],a:1,e:"Finance lease = 잔존가치 매수선택권. operating lease가 반환형. 함정: operating과 혼동."},
{uid:"W1-021",set:"W1",tp:"금융기법",d:"Hard",q:"The key distinction between an operating lease and a finance lease is:",o:["The currency of the contract","Transfer of ownership risk/reward","The nationality of the lessor","The contract length on its own"],a:1,e:"핵심 = 소유 위험·보상 이전 여부(finance=이전). 함정: 기간 '만'으로 구분은 부정확."},
{uid:"W1-022",set:"W1",tp:"금융기법",d:"Medium",q:"In factoring (anjak piutang), the finance company:",o:["Lends against real estate","Purchases or manages receivables","Issues consumer credit cards","Leases heavy equipment"],a:1,e:"Factoring = 매출채권 매입·관리. 함정: 담보대출·카드·리스와 혼동."},
{uid:"W1-023",set:"W1",tp:"금융기법",d:"Hard",q:"Under a 'channeling' arrangement, credit risk is borne by:",o:["The finance company on its own","The channeling partner/fund source","Both parties equally by law","The OJK as the regulator"],a:1,e:"Channeling = 자금원(partner)이 신용위험 부담, 장부 미이전. joint financing은 분담. 함정: 둘 혼동."},
{uid:"W1-024",set:"W1",tp:"금융기법",d:"Hard",q:"In 'joint financing', risk and funding are typically:",o:["Identical to channeling","Shared by agreed proportion","Borne by neither party","Carried fully by the borrower"],a:1,e:"Joint financing = 약정 비율 분담. channeling(미이전)과 대조. 함정: 두 기법 동일시."},
{uid:"W1-025",set:"W1",tp:"비율",d:"Hard",q:"The maximum gearing ratio permitted is:",o:["5 times","10 times","15 times","Unlimited"],a:1,e:"Gearing 최대 10배, 최저 0배. 함정: 인접 배수."},
{uid:"W1-026",set:"W1",tp:"비율",d:"Hard",q:"The gearing ratio is the ratio of:",o:["Equity to total assets","Interest-bearing debt to equity","Net income to revenue","Receivables to total assets"],a:1,e:"Gearing = 이자부 차입/자기자본. 함정: FAR(receivables/assets)와 혼동 — 동일 구조 distractor."},
{uid:"W1-027",set:"W1",tp:"비율",d:"Medium",q:"A finance company with gearing above 10x is:",o:["Operating very efficiently","In breach of the prudential limit","Eligible for a license upgrade","Fully exempt from the BMPP"],a:1,e:"10배 초과 = 건전성 위반. 함정: 고gearing을 효율로 오인."},
{uid:"W1-028",set:"W1",tp:"리스크",d:"Hard",q:"Under BMPP, the SINGLE obligor limit is:",o:["10% of equity","20% of equity","50% of equity","17.5% of equity"],a:1,e:"단일 차주 20% of equity. group 50%, acquisition cost 17.5%(of income). 함정: 수치 swap."},
{uid:"W1-029",set:"W1",tp:"리스크",d:"Hard",q:"Under BMPP, the limit for ONE GROUP of obligors is:",o:["20% of equity","50% of equity","17.5% of equity","100% of equity"],a:1,e:"Group 50%, single 20%. 함정: single/group swap, 17.5% 혼입."},
{uid:"W1-030",set:"W1",tp:"리스크",d:"Hard",q:"The financing acquisition cost cap of 17.5% is measured against:",o:["Equity of the company","Each contract's total income","Total paid-in capital","Total consolidated assets"],a:1,e:"Acquisition cost = 계약별 총수입의 17.5%. 함정: equity 기준 BMPP와 혼동 — 기준 자체가 다름."},
{uid:"W1-031",set:"W1",tp:"리스크",d:"Hard",q:"Which item is EXCLUDED from the BMPP calculation?",o:["Financing to a single individual","Financing secured by government","Financing to a corporate group","Consumer financing above Rp 1bn"],a:1,e:"정부보증 등 안전자산은 BMPP 산정 제외. 함정: 일반 차주 financing은 모두 포함."},
{uid:"W1-032",set:"W1",tp:"리스크",d:"Medium",q:"The primary purpose of BMPP is to:",o:["Maximize market share","Limit concentration risk","Raise the gearing ratio","Reduce capital requirements"],a:1,e:"BMPP 목적 = 집중위험 제한. 함정: 시장점유·gearing과 무관."},
{uid:"W1-033",set:"W1",tp:"리스크",d:"Hard",q:"Requiring collateral from a receivable seller in factoring mainly addresses:",o:["Liquidity risk","Credit/default risk","Operational risk","Currency risk"],a:1,e:"매도인 담보 = 매입채권 부도(credit) 위험 완화. 함정: 유동성·운영위험으로 오인."},
{uid:"W1-034",set:"W1",tp:"리스크",d:"Hard",q:"Which ratio set does OJK typically review for soundness?",o:["P/E, dividend yield, beta","ROA, NPF, gearing, A/R quality","CPI, GDP growth, FX rate","Brand value and market cap"],a:1,e:"건전성 지표 = ROA·NPF·gearing·A/R 품질. 함정: 주식·거시지표는 무관."},
{uid:"W1-035",set:"W1",tp:"리스크",d:"Medium",q:"A core-capital-to-paid-in-capital ratio below 0% indicates:",o:["A healthy position","Capital impairment","Compliance with the minimum","Excess capital"],a:1,e:"core/paid-in <0% = 자본잠식. 함정: 음수를 정상으로 오인."},
{uid:"W1-036",set:"W1",tp:"GCG",d:"Hard",q:"Which set correctly lists the five GCG principles?",o:["Profit, growth, scale, speed, risk","Transparency, accountability, responsibility, independency, fairness","Liquidity, solvency, efficiency, equity, return","Compliance, audit, reporting, control, sanction"],a:1,e:"GCG = TARIF(투명·책임·responsibility·독립·공정). 함정: 재무·통제 용어 묶음으로 위장."},
{uid:"W1-037",set:"W1",tp:"GCG",d:"Hard",q:"The minimum paid-in capital to establish a finance company is:",o:["Rp 100 billion","Rp 250 billion","Rp 50 billion","Rp 500 billion"],a:1,e:"최소 납입자본 Rp 250 billion. 함정: 인접 금액."},
{uid:"W1-038",set:"W1",tp:"GCG",d:"Hard",q:"Foreign ownership of a finance company is capped at:",o:["49% of paid-in capital","85% of paid-in capital","100% of paid-in capital","50% of paid-in capital"],a:1,e:"외국인 지분 최대 85%. 함정: 49%·50%·100%와 혼동."},
{uid:"W1-039",set:"W1",tp:"GCG",d:"Hard",q:"The cap on foreign directors (and foreign commissioners) each is:",o:["50% each","85% each","100% each","No cap"],a:0,e:"외국인 이사·감사 각 50%. 지분 cap(85%)과 다름. 함정: 85%로 통일 오인."},
{uid:"W1-040",set:"W1",tp:"GCG",d:"Medium",q:"The Board of Commissioners (BOC) is responsible for:",o:["Running daily operations","Supervising the Board of Directors","Leading the sales function","Performing the external audit"],a:1,e:"BOC = BOD 감독. 일상경영은 BOD. 함정: BOD/BOC swap."},
{uid:"W1-041",set:"W1",tp:"GCG",d:"Hard",q:"Which statement about core and paid-in capital is correct?",o:["Core may be any amount","Core must be ≥50% of paid-in","Paid-in must be ≥50% of core","They must be equal"],a:1,e:"Core ≥ 50% of paid-in. 함정: 비율 방향 역전."},
{uid:"W1-042",set:"W1",tp:"GCG",d:"Medium",q:"GCG implementation primarily aims to:",o:["Guarantee a fixed annual profit","Protect stakeholders, sound operations","Eliminate every conceivable risk","Replace OJK external supervision"],a:1,e:"GCG 목적 = 이해관계자 보호·건전경영. 함정: 이익보장·위험제거는 과장."},
{uid:"W1-043",set:"W1",tp:"GCG",d:"Hard",q:"Adjusting provisions due to a change in laws/regulations is an example of:",o:["An operational risk crystallizing","Compliance/regulatory risk management","A market price risk exposure","Reputational brand-image damage"],a:1,e:"법규 변경 대응 = 준법·규제위험 관리. 함정: 운영·시장위험으로 오인."},
{uid:"W1-044",set:"W1",tp:"GCG",d:"Medium",q:"Internally, fit-and-proper standards of management are maintained primarily by:",o:["The marketing department","The BOC with nomination function","External consulting vendors","The OJK acting on its own"],a:1,e:"내부 F&P 유지 = BOC + 지명기능. 함정: OJK '단독'은 외부 승인 — 내부 유지와 별개."},
{uid:"W1-045",set:"W1",tp:"GCG",d:"Hard",q:"Additional paid-in capital obtained NOT via public offering is treated as:",o:["Tier 2 supplementary capital","Relevant to core capital computation","Excluded entirely from capital","Counted as gearing-eligible debt"],a:1,e:"비공모 추가 납입자본도 core capital 산정 관련. 함정: 자본 배제·부채로 오인."},
{uid:"W1-046",set:"W1",tp:"소비자보호",d:"Hard",q:"Which regulation anchors Indonesian financial consumer protection?",o:["POJK 22/2023","POJK 46/2024","POJK 35/2018","POJK 12/2017"],a:0,e:"POJK 22/2023 = 소비자보호. 함정: 46(사업운영)·35(시설)·12(AML)은 별개."},
{uid:"W1-047",set:"W1",tp:"소비자보호",d:"Hard",q:"Which is a CORE consumer protection principle?",o:["Maximizing fees without disclosure","Transparency and fair treatment","Selling only to wealthy clients","Avoiding written contracts"],a:1,e:"소비자보호 = 투명성·공정대우·민원처리. 함정: 수수료 극대화·계약 회피는 위반."},
{uid:"W1-048",set:"W1",tp:"소비자보호",d:"Medium",q:"A failure in the complaint mechanism most directly creates:",o:["Foreign currency exposure","Reputational and compliance risk","Liquidity shortfall risk only","A breach of the gearing cap"],a:1,e:"민원처리 실패 = 평판·준법 위험. 함정: 환·유동성과 무관."},
{uid:"W1-049",set:"W1",tp:"소비자보호",d:"Hard",q:"Which recent regulation belongs to the consumer protection set?",o:["POJK 38/2025","POJK 19/2025","POJK 34/2018","POJK 8/2023"],a:0,e:"POJK 38/2025 = 소비자보호 set. 함정: 19(MSME)·34(F&P)·8(AML)은 다른 영역."},
{uid:"W1-050",set:"W1",tp:"소비자보호",d:"Medium",q:"Personal data protection requires the finance company to:",o:["Sell data to maximize revenue","Obtain consent; safeguard data","Publish all client data openly","Discard data after each contract"],a:1,e:"개인정보 = 동의 + 기밀 보호. 함정: 판매·공개는 위반."},
{uid:"W1-051",set:"W1",tp:"Sharia",d:"Hard",q:"In Sharia financing, the prohibition of 'riba' refers to:",o:["Excessive risk-taking","Interest / usury","Speculation","Charity"],a:1,e:"Riba = 이자 금지. gharar(불확실성)·maysir(투기)는 별도. 함정: gharar/maysir와 혼동."},
{uid:"W1-052",set:"W1",tp:"Sharia",d:"Hard",q:"A cost-plus sale of an asset to the customer is which Sharia contract?",o:["Ijarah","Murabahah","Musharakah","Wadiah"],a:1,e:"Murabahah = 원가가산 매매. Ijarah=리스, Musharakah=동업. 함정: Ijarah와 혼동."},
{uid:"W1-053",set:"W1",tp:"Sharia",d:"Hard",q:"The Sharia equivalent of a leasing arrangement is:",o:["Murabahah","Ijarah","Mudharabah","Qard"],a:1,e:"Ijarah = 샤리아 리스. 함정: Murabahah(매매)와 swap."},
{uid:"W1-054",set:"W1",tp:"Sharia",d:"Medium",q:"Sharia financing instruments are certified for compliance by:",o:["The external statutory auditor","The Sharia Supervisory Board (DPS)","The internal marketing team","Bank Indonesia as regulator"],a:1,e:"DPS = 샤리아 준수 인증. 함정: 외부감사·BI 소관 아님."},
{uid:"W1-055",set:"W1",tp:"Sharia",d:"Hard",q:"Issuance of 'sukuk' by a finance company is:",o:["Prohibited","A permitted funding source","Equivalent to deposit-taking","Limited to banks only"],a:1,e:"Sukuk = 허용 자금원. 함정: 예금수취·은행 전용 오인."},
{uid:"W1-056",set:"W1",tp:"Sharia",d:"Medium",q:"'Multipurpose Sharia' financing differs from conventional chiefly by:",o:["Charging higher interest","Adhering to sharia principles","Serving only corporations","Requiring no documentation"],a:1,e:"Multipurpose Sharia = 샤리아 원칙 준수. 함정: '고이자'는 riba 금지 위배."},
{uid:"W1-057",set:"W1",tp:"OtherRegs",d:"Hard",q:"AML/CFT (APU-PPT) for finance companies is CURRENTLY governed primarily by:",o:["POJK 12/2017","POJK 8/2023","POJK 34/2018","POJK 46/2024"],a:1,e:"현행 APU-PPT = POJK 8/2023(12/2017→23/2019→8/2023). 함정: 12/2017을 현행으로 오인."},
{uid:"W1-058",set:"W1",tp:"OtherRegs",d:"Hard",q:"The Fit & Proper REASSESSMENT of management is governed by:",o:["POJK 34/2018","POJK 12/2017","POJK 43/2024","POJK 19/2025"],a:0,e:"F&P 재평가 = POJK 34/2018. 함정: 12(AML)·43(HR)과 혼동."},
{uid:"W1-059",set:"W1",tp:"OtherRegs",d:"Medium",q:"A Risk-Based Approach (RBA) under APU-PPT means:",o:["Treating every customer alike","Matching diligence intensity to risk","Ignoring low-value transactions","Outsourcing all KYC checks"],a:1,e:"RBA = 위험에 비례한 실사 강도. 함정: 동일 처리는 RBA 반대."},
{uid:"W1-060",set:"W1",tp:"OtherRegs",d:"Hard",q:"Enhanced Due Diligence (EDD) is escalated primarily for:",o:["All ordinary retail customers","Higher-risk customers such as PEPs","Only domestic resident clients","Customers under Rp 1 million"],a:1,e:"EDD = 고위험(PEP) 대상. 함정: 전체·소액 적용은 오해."},
{uid:"W1-061",set:"W1",tp:"OtherRegs",d:"Medium",q:"SLIK is used by finance companies primarily to:",o:["Process payroll","Check a debtor's credit history","File tax returns","Register fiduciary collateral"],a:1,e:"SLIK = 차주 신용이력 조회. 함정: fiducia 등록·세무와 혼동."},
{uid:"W1-062",set:"W1",tp:"OtherRegs",d:"Hard",q:"Fiduciary registration (jaminan fidusia) gives the finance company:",o:["Ownership of the debtor's company","An enforceable security interest","An equity stake","A tax exemption"],a:1,e:"Fiducia = 부도 시 집행 가능한 담보권. 함정: 소유권·지분으로 오인."},
{uid:"W1-063",set:"W1",tp:"OtherRegs",d:"Medium",q:"Which institution issues POJK regulations?",o:["Bank Indonesia","Otoritas Jasa Keuangan","Ministry of Finance","APPI"],a:1,e:"POJK = OJK 규정. 함정: BI(PBI)·재무부(KMK)와 구분."},
{uid:"W1-064",set:"W1",tp:"OtherRegs",d:"Medium",q:"APPI's role in the industry is best described as:",o:["The financial regulator","The industry association","A state-owned lender","The deposit insurer"],a:1,e:"APPI = 업계 협회(SPPI 주관). 함정: 규제기관(OJK)과 혼동."},
{uid:"W1-065",set:"W1",tp:"기타조항",d:"Hard",q:"A core-to-paid-in ratio between 0% and 50% means the company is:",o:["Fully compliant","Below the 50% minimum","Exceeding requirements","Exempt from gearing"],a:1,e:"0~50% = 최소요건(50%) 미달. 함정: 양수라서 '준수'로 오인."},
{uid:"W1-066",set:"W1",tp:"기타조항",d:"Medium",q:"The gearing ratio provision floor is:",o:["1 time","0 (zero) times","5 times","Negative gearing"],a:1,e:"Gearing 최저 0배, 최고 10배. 함정: 최저 1배 오인."},
{uid:"W1-067",set:"W1",tp:"기타조항",d:"Hard",q:"Which income types are referenced in the acquisition cost ceiling context?",o:["Interest income from financing only","Administration & provision income","Dividend income from holdings only","Trading and FX gains only"],a:1,e:"계약수입에 administration·provision income 포함. 함정: 이자수입만으로 한정 오인."},
{uid:"W1-068",set:"W1",tp:"기타조항",d:"Medium",q:"To issue bonds as a funding source, a finance company must:",o:["Obtain prior depositor approval","Comply with capital-market rules","Reduce its paid-in capital","Cancel its existing license"],a:1,e:"채권 발행 = 자본시장 규정 준수. 함정: 예금자 승인은 비해당(예금 없음)."},
{uid:"W1-069",set:"W1",tp:"기타조항",d:"Hard",q:"Non-face-to-face financing requires the company to satisfy preconditions under:",o:["A zero gearing rule","POJK 46/2024 with identity safeguards","A conversion to a bank","Abandoning fiduciary registration"],a:1,e:"비대면 = POJK 46/2024 요건(신원확인 안전장치). 함정: 은행 전환·gearing 0은 무관."},
{uid:"W1-070",set:"W1",tp:"기타조항",d:"Medium",q:"A change in a finance company's business activities generally requires:",o:["No notification is required","Approval from or reporting to OJK","Approval from its competitors","A public shareholder referendum"],a:1,e:"사업변경 = OJK 승인·보고. 함정: 무신고·경쟁사 승인은 비현실."},
{uid:"W1-071",set:"W1",tp:"통계",d:"Hard",q:"Total industry assets have recently shown which pattern?",o:["Explosive 50% growth","Roughly flat (near 0% YoY)","Halved in one year","Continuous double-digit decline"],a:1,e:"총자산 거의 보합. 함정: 급증·급감 극단으로 오도."},
{uid:"W1-072",set:"W1",tp:"통계",d:"Medium",q:"A FAR band of 89%-90% would be interpreted as:",o:["Severe under-utilization","Very high productive-asset focus","A capital impairment signal","A regulatory breach by itself"],a:1,e:"FAR 89~90% = 생산자산 집중 매우 높음. 함정: 그 자체로 위반은 아님."},
{uid:"W1-073",set:"W1",tp:"통계",d:"Hard",q:"A rising MSMD ratio most accurately indicates:",o:["Capital shrinking against paid-in","Own capital strengthening vs paid-in","NPF asset quality deteriorating","Gearing breaching the 10x cap"],a:1,e:"MSMD 상승 = 자기자본이 납입자본 대비 강화. 함정: NPF·gearing 혼동, 방향 역전."},
{uid:"W1-074",set:"W1",tp:"산업사",d:"Hard",q:"The transition of supervision to OJK was significant because it:",o:["It removed all prudential rules","It unified sector supervision","It banned all foreign ownership","It eliminated the gearing ratio"],a:1,e:"OJK 이관 = 통합감독. 함정: 규제 제거·외인금지는 사실 아님."},
{uid:"W1-075",set:"W1",tp:"산업사",d:"Medium",q:"SKB 3 Menteri (1974) is credited with:",o:["Creating consumer credit cards","Introducing leasing to Indonesia","Establishing the modern OJK","Setting the 10x gearing cap"],a:1,e:"1974 SKB = leasing 도입. 함정: 후대 제도와 혼동."},
{uid:"W1-076",set:"W1",tp:"금융기법",d:"Hard",q:"A 'sale and leaseback' transaction allows a company to:",o:["Avoid all taxes permanently","Free up capital via sale-and-lease","Take public savings deposits","Remove the asset from existence"],a:1,e:"Sale & leaseback = 자산 매각 후 재임차로 자본 유동화. 함정: 탈세·예금수취와 무관."},
{uid:"W1-077",set:"W1",tp:"금융기법",d:"Hard",q:"Consumer financing differs from a bank loan chiefly because it:",o:["It is funded by deposits","It finances goods on installment","It offers checking accounts","It issues legal-tender currency"],a:1,e:"Consumer financing = 특정 소비재 할부 지원. 함정: 예금·당좌는 은행 기능."},

{uid:"W1-079",set:"W1",tp:"금융기법",d:"Hard",q:"In 'channeling' for a bank, the financing typically appears:",o:["On the company's own book","Off the company's balance sheet","As public customer deposits","As shareholder equity"],a:1,e:"Channeling = off-balance(위험·자금은 자금원). 함정: 자체 장부 계상은 own-book/joint."},

{uid:"W1-081",set:"W1",tp:"리스크",d:"Hard",q:"Funding long-term leases with short-term borrowings creates mainly:",o:["Liquidity/maturity-mismatch risk","A breach of sharia principles","A consumer-protection failure","An automatic gearing exemption"],a:0,e:"장기자산-단기부채 = 유동성·만기불일치 위험. 함정: 샤리아·소비자보호와 무관."},
{uid:"W1-082",set:"W1",tp:"리스크",d:"Medium",q:"Provisioning on financing receivables reflects:",o:["Marketing budget spend","Expected/incurred credit losses","Income tax payable","A declared dividend reserve"],a:1,e:"대손충당금 = 예상·발생 신용손실. 함정: 마케팅·세금·배당과 무관."},
{uid:"W1-083",set:"W1",tp:"리스크",d:"Hard",q:"Which correctly orders the BMPP limits?",o:["Single 50% then group 20%","Single 20%, group/controlling 50%","All three capped at 17.5%","No limits apply to any group"],a:1,e:"단일 20% < group 50% = 지배관계 50% of equity. 함정: swap, 17.5% 혼입."},

{uid:"W1-085",set:"W1",tp:"GCG",d:"Hard",q:"Accountability under GCG primarily means:",o:["Maximizing financial leverage","Clear functions and answerability","Avoiding all documentation","Outsourcing governance fully"],a:1,e:"Accountability = 기관 기능·책임·답책성 명확화. 함정: 레버리지·문서회피와 무관."},
{uid:"W1-086",set:"W1",tp:"GCG",d:"Medium",q:"The Board of Directors (BOD) is responsible for:",o:["Supervising its own work","Managing day-to-day operations","Taking over the OJK's role","Auditing the Commissioners"],a:1,e:"BOD = 일상경영·전략실행. 감독은 BOC. 함정: BOD/BOC 혼동."},
{uid:"W1-087",set:"W1",tp:"GCG",d:"Hard",q:"A finance company with 90% foreign shareholding is:",o:["Compliant","In breach of the 85% cap","Eligible for tax breaks","Subject to higher gearing"],a:1,e:"외인 90% = 85% cap 위반. 함정: 인접 수치 식별."},
{uid:"W1-088",set:"W1",tp:"GCG",d:"Medium",q:"Responsibility (GCG) primarily concerns:",o:["Maximizing short-term reported profit","Compliance with laws and principles","Avoiding every possible business risk","Concealing related-party transactions"],a:1,e:"Responsibility = 법규·건전경영원칙 준수. 함정: 단기이익·은폐는 위배."},
{uid:"W1-089",set:"W1",tp:"소비자보호",d:"Hard",q:"A transparency requirement in consumer protection ensures that:",o:["Terms may change unilaterally anytime","Consumers get clear pre-commitment info","Contracts kept secret from clients","Fees may be hidden in the contract"],a:1,e:"투명성 = 구속 전 명확정보 제공. 함정: 일방변경·은폐는 정반대."},
{uid:"W1-090",set:"W1",tp:"소비자보호",d:"Medium",q:"Consumer complaint and dispute resolution is governed by:",o:["POJK 22/2023 (consumer protection)","POJK 46/2024 (business operations)","POJK 35/2018 (business facilities)","KMK 448/2000 (legacy decree)"],a:0,e:"민원·분쟁해결 = 소비자보호 규정군. 함정: 사업운영·시설 규정은 별개."},
{uid:"W1-091",set:"W1",tp:"OtherRegs",d:"Hard",q:"The correct replacement chain for the AML/CFT regulation is:",o:["12/2017 → 23/2019 → 8/2023","8/2023 → 12/2017 → 34/2018","34/2018 → 12/2017","46/2024 → 12/2017"],a:0,e:"APU-PPT: 12/2017→23/2019 개정→8/2023 대체. 함정: 순서 역전·타 규정 혼입."},

{uid:"W1-095",set:"W1",tp:"규제프레임",d:"Medium",q:"POJK 19/2025 reflects a policy emphasis on:",o:["Reducing MSME access","Expanding MSME financing","Banning sharia products","Lowering consumer protection"],a:1,e:"POJK 19/2025 = MSME 확대. 함정: 축소·금지는 반대."},
{uid:"W1-096",set:"W1",tp:"Vision",d:"Medium",q:"The Roadmap vision for the industry emphasizes being:",o:["Smaller and less regulated","Resilient and competitive","Deposit-taking institutions","Free from supervision"],a:1,e:"비전 = 회복력·경쟁력·포용성장. 함정: 예금기관화·무감독은 배치."},
{uid:"W1-097",set:"W1",tp:"Roadmap",d:"Hard",q:"Which is a recognized theme of the industry roadmap?",o:["Eliminating all foreign capital","Strengthening resilience/governance","Abolishing the OJK entirely","Banning all sharia finance"],a:1,e:"Roadmap 축 = 회복력·거버넌스·디지털·소비자보호. 함정: 폐지·금지형은 오답."},
{uid:"W1-098",set:"W1",tp:"산업사",d:"Hard",q:"Why has the NUMBER of finance companies declined while assets stayed roughly stable?",o:["Mass simultaneous company bankruptcies","Consolidation and license revocations","A permanent ban on new licenses","Conversion of all firms into banks"],a:1,e:"사수 감소 = 통폐합·합병·면허취소(자산 보합). 함정: '파산만'·'은행 전환'은 단순화."},
{uid:"W1-099",set:"W1",tp:"비율",d:"Hard",q:"A finance company reporting gearing of 0 times means it:",o:["It is in breach of rules","It has no interest-bearing debt","It exceeds the 10x ceiling","It reports negative equity"],a:1,e:"Gearing 0배 = 이자부 차입 없음(허용 최저). 함정: 위반·음수자본으로 오인."},
{uid:"W1-100",set:"W1",tp:"규제프레임",d:"Hard",q:"Which statement is CORRECT (avoiding common confusions)?",o:["Base: net income / total equity","Base: personnel expenses / contract income","Base: total assets / paid-in capital","Base: paid-in capital / book equity"],a:1,e:"정답: HR 2.5%=인건비, acquisition 17.5%=계약 총수입. 함정: 순이익·equity 기준 오인, director cap 50%(지분 85%와 다름)."},
{uid:"W2-001",set:"W2",tp:"BP구성",d:"Hard",q:"The Business Plan (RBB) of a finance company is prepared in accordance with:",o:["POJK 46/2024 and SEOJK 20/2025","POJK 24/2019 and SEOJK 23/2019","POJK 12/2017 and SEOJK 8/2023","POJK 43/2024 and SEOJK 19/2025"],a:1,e:"BP = POJK 24/2019 + SEOJK 23/2019. 함정: 46(사업운영)·12(AML)·43(HR)은 별개."},
{uid:"W2-002",set:"W2",tp:"BP구성",d:"Hard",q:"Which Circular Letter supplements the Business Plan regulation?",o:["SEOJK 23/SEOJK.05/2019","SEOJK 20/SEOJK.07/2025","SEOJK 1/SEOJK.07/2014","SEOJK 13/SEOJK.07/2014"],a:0,e:"SEOJK 23/2019 = BP 보완. 함정: 소비자보호 계열 SEOJK와 혼동."},
{uid:"W2-003",set:"W2",tp:"BP구성",d:"Medium",q:"The primary purpose of the Business Plan is to:",o:["Replace the annual financial statements","Harmonize business needs with compliance","Eliminate the risk management function","Satisfy only the tax authorities"],a:1,e:"BP = 사업수요-규제준수 조화·장기가치. 함정: 재무제표 대체·세무목적은 오해."},
{uid:"W2-004",set:"W2",tp:"BP구성",d:"Hard",q:"'Developing a Business Plan' (K.64PBY91.001.1) reflects which perspective?",o:["Q6 Evaluating","Q7 Developing","Q5 Reporting","Neither Q6 nor Q7"],a:1,e:"Developing = Q7. Evaluating = Q6. 함정: Q6/Q7 swap 빈출."},
{uid:"W2-005",set:"W2",tp:"BP구성",d:"Hard",q:"'Evaluating a Business Plan' (K.64PBY91.003.1) reflects which perspective?",o:["Q7 Developing","Q6 Evaluating","Q5 Reporting","Both equally"],a:1,e:"Evaluating = Q6. 함정: 동일 BP 주제라도 develop(Q7)/evaluate(Q6) 분기."},
{uid:"W2-006",set:"W2",tp:"BP구성",d:"Medium",q:"In a competency unit, 'KSA' stands for:",o:["Knowledge, skills, attitudes","Key strategic assets","Knowledge, scale, audit","Key safety actions"],a:0,e:"KSA = 지식·기술·업무태도. 함정: 유사 약어로 오인."},
{uid:"W2-007",set:"W2",tp:"BP구성",d:"Hard",q:"'Transfer Skills' in the competency framework means:",o:["Transferring funds between accounts","Solving problems in new contexts","Transferring employees between units","Transferring risk to insurers"],a:1,e:"Transfer Skills = 새 맥락 문제해결. 함정: 자금이체·리스크 transfer 동음이의."},
{uid:"W2-008",set:"W2",tp:"BP보고",d:"Hard",q:"A recognized BENEFIT of evaluating a Business Plan is:",o:["Guaranteeing zero future losses","Early detection of deviations","Avoiding all OJK reporting","Eliminating market competition"],a:1,e:"BP 평가 편익 = 편차 조기식별·시정. 함정: 무손실 보장·보고회피는 비현실."},
{uid:"W2-009",set:"W2",tp:"BP보고",d:"Medium",q:"The Business Plan is subject to which OJK interaction?",o:["No interaction is required","Submission and supervisory review","Approval by industry competitors","Publication in newspapers"],a:1,e:"BP = OJK 제출·감독검토. 함정: 무제출·경쟁사 승인은 오답."},
{uid:"W2-010",set:"W2",tp:"BP보고",d:"Hard",q:"When actual performance deviates materially from the plan, the company should first:",o:["Ignore it entirely until year-end","Analyze and prepare corrective action","Cancel and discard the whole plan","Replace the entire senior management"],a:1,e:"중대 편차 = 원인분석·시정. 함정: 무시·전면취소는 부적절."},
{uid:"W2-011",set:"W2",tp:"BP보고",d:"Medium",q:"A realistic Business Plan should be grounded in:",o:["Purely optimistic best-case assumptions","Reasonable, market-consistent assumptions","Confidential leaked competitor secrets","Randomly chosen arbitrary projections"],a:1,e:"현실적 BP = 시장부합 합리적 가정. 함정: 낙관일변도는 신뢰성 훼손."},
{uid:"W2-012",set:"W2",tp:"전략분석",d:"Hard",q:"A SWOT analysis examines:",o:["Only external market factors","Internal S/W and external O/T","Only internal financial ratios","Only direct competitors"],a:1,e:"SWOT = 내부(S/W)+외부(O/T). 함정: 한쪽만으로 한정 오인."},
{uid:"W2-013",set:"W2",tp:"전략분석",d:"Hard",q:"Aligning risk appetite with the Business Plan ensures that:",o:["The company takes maximum risk","Targets stay within risk capacity","Risk is entirely eliminated","The plan needs no review"],a:1,e:"위험선호-BP 정렬 = 목표가 위험감내력 내. 함정: 최대위험·위험제거는 양극단."},
{uid:"W2-014",set:"W2",tp:"전략분석",d:"Medium",q:"A key EXTERNAL factor when preparing a Business Plan is:",o:["The CEO's own personal preferences","Macroeconomic and regulatory conditions","The daily employee lunch menu options","Office interior decoration choices"],a:1,e:"외부요인 = 거시경제·규제·경쟁. 함정: 개인선호 등 무관항목."},
{uid:"W2-015",set:"W2",tp:"전략분석",d:"Hard",q:"Stakeholder collaboration in plan execution is emphasized because it:",o:["It deliberately slows down decisions","Improves feasibility and shared ownership","It removes all management accountability","It is strictly prohibited by law"],a:1,e:"이해관계자 협업 = 실행가능성·공동책임. 함정: 책임제거·금지는 오답."},
{uid:"W2-016",set:"W2",tp:"Compliance",d:"Hard",q:"'Ensuring Compliance' is a Q7 unit; the complementary Q6 unit is:",o:["Developing a business plan","Evaluating compliance culture","Issuing consumer loans","Marketing financial products"],a:1,e:"Ensure compliance(Q7) ↔ Evaluate compliance culture(Q6). 함정: Q6/Q7 짝."},
{uid:"W2-017",set:"W2",tp:"Compliance",d:"Hard",q:"Compliance culture is best described as:",o:["A single one-time training event","Embedded values in daily decisions","Solely the compliance officer's job","Optional for senior management"],a:1,e:"준법문화 = 일상 의사결정 내재 가치·행동. 함정: 일회·담당자한정·임원면제는 오해."},
{uid:"W2-018",set:"W2",tp:"Compliance",d:"Hard",q:"Which is NOT a factor in building a compliance culture?",o:["Tone at the top and leadership","Clear policies and procedures","Maximizing fines as the main tool","Training, communication, monitoring"],a:2,e:"준법문화 요인 = 경영진 의지·정책·교육·소통·감시. 함정: '벌금극대화'는 처벌일변도 오류."},
{uid:"W2-019",set:"W2",tp:"Compliance",d:"Medium",q:"The 'tone at the top' principle means:",o:["Only junior staff must comply","Leaders set the compliance example","Compliance binds only the finance team","Tone refers to audio quality"],a:1,e:"Tone at the top = 최고경영진이 준법 모범. 함정: 하급직 한정·동음이의."},
{uid:"W2-020",set:"W2",tp:"Compliance",d:"Hard",q:"The compliance function operates across which scope?",o:["The board governance level only","Strategic, managerial, operational layers","The marketing and sales function only","The external statutory auditors only"],a:1,e:"준법 3계층 = 전략·관리·운영. 함정: 단일 계층 한정 오답."},
{uid:"W2-021",set:"W2",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the compliance function sits in the:",o:["First Line (operations)","Second Line (oversight)","Third Line (internal audit)","Outside the model"],a:1,e:"준법 = 2선. 1선=영업, 3선=감사. 함정: 준법을 1·3선으로 오배치."},
{uid:"W2-022",set:"W2",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the FIRST line consists of:",o:["The internal audit assurance team","Operational management owning the risk","The central compliance department","The external financial regulator"],a:1,e:"1선 = 위험 소유 영업·운영 관리. 함정: 준법(2선)·감사(3선)와 혼동."},
{uid:"W2-023",set:"W2",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the THIRD line provides:",o:["Day-to-day risk taking","Independent assurance via audit","Marketing strategy direction","Operational funding support"],a:1,e:"3선 = 내부감사 독립 보증. 함정: 1선(위험감수)·2선(감독)과 혼동."},
{uid:"W2-024",set:"W2",tp:"Compliance",d:"Medium",q:"The independence of the Second Line from the First Line enables:",o:["Taking operational risks freely","Objective oversight without pressure","Removal of all responsibility","A purely legal formality"],a:1,e:"2선 독립성 = 운영압력 배제 객관 감독. 함정: 위험감수·책임제거는 오답."},
{uid:"W2-025",set:"W2",tp:"Compliance",d:"Hard",q:"Which document set is used to evaluate compliance culture?",o:["Only the published annual report","Compliance reports and audit results","Customer-facing marketing brochures","Annual corporate tax filings only"],a:1,e:"준법문화 평가 자료 = 준법보고·분석·감사결과·위원회 자료. 함정: 마케팅·세무는 무관."},
{uid:"W2-026",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance audit may be conducted by:",o:["Only the OJK regulator","Internal Audit and/or the OJK","Only external marketing firms","Only the company's CEO"],a:1,e:"준법감사 주체 = 내부감사 및/또는 OJK. 함정: OJK 단독·CEO 단독은 오답."},
{uid:"W2-027",set:"W2",tp:"Compliance",d:"Medium",q:"Cross-functional discussion forums are used to:",o:["Avoid making any decisions","Agree on implementation steps","Replace the Board of Directors","Exclude the risk function"],a:1,e:"교차기능 포럼 = 부서 간 이행단계 합의. 함정: 의사결정 회피·기관 배제는 오답."},
{uid:"W2-028",set:"W2",tp:"Compliance",d:"Hard",q:"The KSA attitude required of a compliance evaluator emphasizes:",o:["Indifference to violations","Integrity and objectivity","Maximizing personal gain","Avoiding documentation"],a:1,e:"준법평가자 태도 = 청렴·객관성·윤리. 함정: 무관심·사익은 정반대."},
{uid:"W2-029",set:"W2",tp:"Compliance",d:"Hard",q:"Treating compliance solely as 'the compliance officer's problem' demonstrates:",o:["A mature compliance culture","A weak, immature culture","Optimal operating efficiency","Regulatory excellence"],a:1,e:"준법을 담당자 문제로 한정 = 미성숙 문화. 함정: '효율'로 미화."},
{uid:"W2-030",set:"W2",tp:"Compliance",d:"Medium",q:"The primary objective of the compliance function is to:",o:["Generate company revenue","Ensure adherence and manage risk","Replace the internal audit","Approve all loan applications"],a:1,e:"준법기능 = 법규·내규 준수·준법위험 관리. 함정: 수익·감사대체·여신은 타 기능."},
{uid:"W2-031",set:"W2",tp:"Compliance",d:"Hard",q:"Compliance risk is the risk arising from:",o:["Currency exchange fluctuations","Failure to comply with rules","Stock market price movements","Physical equipment breakdown"],a:1,e:"준법위험 = 법규·기준 미준수로 인한 제재·손실·평판. 함정: 환·시장·운영위험과 구분."},
{uid:"W2-032",set:"W2",tp:"Compliance",d:"Medium",q:"Compliance policies should be:",o:["Kept secret from operating staff","Documented and disseminated widely","Communicated only to the BOD","Conveyed verbally without records"],a:1,e:"준법정책 = 명문화·전파. 함정: 비밀·BOD한정·구두만은 실패."},
{uid:"W2-033",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance monitoring system should:",o:["Operate once every five years","Continuously track and flag breaches","Run only after an OJK request","Focus only on company profitability"],a:1,e:"준법 모니터링 = 지속 추적·잠재위반 경보. 함정: 5년주기·사후·이익한정은 부적절."},
{uid:"W2-034",set:"W2",tp:"Compliance",d:"Hard",q:"How do the compliance function and internal audit relate?",o:["They are entirely identical","Compliance manages, audit assures","Internal audit reports to compliance","Compliance replaces internal audit"],a:1,e:"준법(2선) 관리 / 내부감사(3선) 독립 보증. 함정: 동일시·상하관계 오인."},
{uid:"W2-035",set:"W2",tp:"Compliance",d:"Medium",q:"A high rate of unresolved audit findings indicates:",o:["A strong compliance culture","Weak follow-up and accountability","Excellent governance practice","No issue whatsoever"],a:1,e:"미해결 감사지적 다수 = 후속·답책 취약. 함정: '강한 문화'로 오인."},
{uid:"W2-036",set:"W2",tp:"Compliance",d:"Hard",q:"The compliance function's reporting line should provide:",o:["Reporting only to sales head","Direct access to BOD and BOC","No reporting line at all","Reporting to competitors"],a:1,e:"준법 보고선 = BOD·BOC 직접 접근(독립성). 함정: 영업총괄 보고는 독립성 훼손."},
{uid:"W2-037",set:"W2",tp:"Compliance",d:"Hard",q:"'Ensuring compliance' (Q7) primarily requires the practitioner to:",o:["Memorize every single law verbatim","Embed rules in processes and verify","Avoid creating any documentation","Delegate everything entirely to OJK"],a:1,e:"준법 보장(Q7) = 법규 식별·프로세스 내재화·준수 검증. 함정: 암기·위임·문서회피는 핵심 아님."},
{uid:"W2-038",set:"W2",tp:"Compliance",d:"Medium",q:"A compliance report to the Directors should include:",o:["Only positive good news","Status, breaches, and follow-up","Marketing campaign results","Competitor financial data"],a:1,e:"준법보고 = 현황·위반·분석·후속. 함정: 호재만·마케팅은 본질 아님."},
{uid:"W2-039",set:"W2",tp:"Compliance",d:"Hard",q:"Which factor MOST undermines a compliance culture?",o:["A strong tone at the top","Leadership bypassing controls","Regular ongoing training","Clear escalation channels"],a:1,e:"최대 저해 = 경영진의 통제 우회. 함정: 나머지는 강화요인."},
{uid:"W2-040",set:"W2",tp:"Compliance",d:"Hard",q:"In the Three Lines Model, the governing body (BOD/BOC) primarily:",o:["Executes the daily operations itself","Provides oversight and sets direction","Conducts the audit fieldwork directly","Sells the financial products directly"],a:1,e:"지배기구 = 감독·방향설정·답책. 함정: 실행·감사실무·영업은 타 역할."},
{uid:"W2-041",set:"W2",tp:"Q6평가",d:"Hard",q:"The FIRST step in evaluating business plan implementation is to:",o:["Approve next year's plan","Set criteria and gather data","Dismiss underperforming staff","Increase the overall budget"],a:1,e:"평가 1단계 = 기준·목표 설정·실적 수집. 함정: 승인·인사·예산은 후속."},
{uid:"W2-042",set:"W2",tp:"Q6평가",d:"Hard",q:"Comparing actual vs planned figures is used to:",o:["Punish individual staff","Identify variances and causes","Hide the deviations found","Satisfy mere curiosity"],a:1,e:"실적 vs 계획 = 편차·원인 식별·시정. 함정: 처벌·은폐는 목적 아님."},
{uid:"W2-043",set:"W2",tp:"Q6평가",d:"Medium",q:"A key OUTPUT of business plan evaluation is:",o:["A new marketing campaign","Corrective recommendations","A redesigned company logo","Staff bonuses only"],a:1,e:"평가 산출 = 권고·시정조치. 함정: 마케팅·인사보상은 부산물."},
{uid:"W2-044",set:"W2",tp:"Q6평가",d:"Hard",q:"Evaluating compliance culture (Q6) focuses on:",o:["Building the rules entirely from scratch","Measuring how compliance functions","Marketing the existing internal rules","Replacing all the rules every year"],a:1,e:"Q6 = 준법 내재화·작동 효과 측정. Q7 = 구축. 함정: Q6/Q7 역할 혼동."},
{uid:"W2-045",set:"W2",tp:"Q6평가",d:"Hard",q:"Monitoring follow-up on audit results uses data such as:",o:["Only company press releases","Audit findings and follow-up status","Competitor financial statements","Customer birthday records"],a:1,e:"감사 후속 모니터링 = 감사지적·후속현황·OJK 권고. 함정: 보도자료·경쟁사는 무관."},
{uid:"W2-046",set:"W2",tp:"Q6컴플",d:"Hard",q:"Evaluation of compliance culture should assess whether compliance is:",o:["An isolated separate silo","Integrated into all decisions","Only on paper documents","Limited to year-end review"],a:1,e:"준법문화 평가 = 전 계층 의사결정 통합 여부. 함정: 사일로·서류상·연말한정은 미성숙."},
{uid:"W2-047",set:"W2",tp:"Q6컴플",d:"Medium",q:"A maturity indicator of compliance culture is:",o:["Employees concealing violations","Staff proactively raising concerns","Whistleblowers being ignored","No compliance training given"],a:1,e:"성숙 지표 = 자발적 우려 제기(무보복). 함정: 은폐·무시·무교육은 미성숙."},
{uid:"W2-048",set:"W2",tp:"Q6컴플",d:"Hard",q:"A valid METRIC for compliance culture effectiveness is:",o:["The number of office plants","Timely resolution and repeat rate","The color of the company logo","The CEO's golf handicap"],a:1,e:"지표 = 적시 해결률·반복위반 빈도. 함정: 무관항목으로 오도."},
{uid:"W2-049",set:"W2",tp:"Q6컴플",d:"Hard",q:"If the same violations keep recurring, the evaluation should conclude:",o:["The culture is genuinely excellent","Systemic root-cause weakness exists","No further corrective action needed","The recurring violations are acceptable"],a:1,e:"동종 위반 반복 = 근본원인 시정 실패. 함정: '우수'·'무조치'는 오답."},
{uid:"W2-050",set:"W2",tp:"Q6컴플",d:"Medium",q:"The ultimate goal of evaluating compliance culture is to:",o:["Assign blame to staff","Drive continuous improvement","Reduce the headcount","Increase regulatory fines"],a:1,e:"평가 목표 = 지속개선·준법 내재화. 함정: 비난·감원·벌금은 목적 아님."},
{uid:"W2-051",set:"W2",tp:"BP구성",d:"Hard",q:"A complete Business Plan should contain:",o:["Only a single headline profit target","Strategy, projections, risk, actions","A single product marketing slide","Only a list of competitor logos"],a:1,e:"BP 구성 = 요약·전략·재무전망·위험평가·실행계획. 함정: 단일 항목 한정은 불완전."},
{uid:"W2-052",set:"W2",tp:"BP구성",d:"Medium",q:"Financial projections in a Business Plan should cover:",o:["Only the current calendar month","Multi-period forward projections","Only the past actual reported figures","No quantitative numbers at all"],a:1,e:"재무전망 = 다기간 전향적 추정. 함정: 과거만·당월만은 계획 아님."},
{uid:"W2-053",set:"W2",tp:"BP구성",d:"Hard",q:"The Business Plan must remain consistent with:",o:["A competitor's strategic plan","The company's vision and strategy","An individual employee resume","A company press release"],a:1,e:"BP = 비전·미션·승인전략과 정합. 함정: 경쟁사·무관문서는 오답."},
{uid:"W2-054",set:"W2",tp:"BP구성",d:"Hard",q:"Why must the Business Plan incorporate regulatory requirements?",o:["Merely to impress the competitors","It is a precondition for approval","To pad out the document page count","It is entirely optional in practice"],a:1,e:"규제요건 명시 = 지속경영·OJK 승인 전제. 함정: 임의·분량용은 오답."},
{uid:"W2-055",set:"W2",tp:"BP보고",d:"Hard",q:"Periodic plan-realization reports to OJK serve to:",o:["Advertise the company to the public","Show progress and explain deviations","Replace the audited statements","List all current employee names"],a:1,e:"BP 실현보고 = 진척 입증·편차 설명. 함정: 광고·재무제표 대체는 오답."},
{uid:"W2-056",set:"W2",tp:"BP보고",d:"Medium",q:"A material adverse deviation should be reported:",o:["Never reported under any condition","Promptly, with corrective measures","Only after five full years pass","Only when reported profits increase"],a:1,e:"중대 부정적 편차 = 적시 보고·시정. 함정: 미보고·지연은 위반."},
{uid:"W2-057",set:"W2",tp:"BP보고",d:"Hard",q:"Mid-year revision of a Business Plan is:",o:["Strictly forbidden always","Permitted under defined conditions","Done weekly without any limit","Decided by the competitors"],a:1,e:"BP 중간 수정 = OJK 규정상 요건·시한 내 허용. 함정: 절대금지·무제한은 양극단."},
{uid:"W2-058",set:"W2",tp:"전략분석",d:"Hard",q:"A PESTEL analysis examines:",o:["Only the company's internal profit","Political-economic-social-tech factors","Only internal staffing arrangements","Routine office supply inventory"],a:1,e:"PESTEL = 정치·경제·사회·기술·환경·법률 외부요인. 함정: 내부·이익 한정은 오답."},
{uid:"W2-059",set:"W2",tp:"전략분석",d:"Hard",q:"Business Plan targets should ideally be:",o:["Vague and effectively unmeasurable","Specific and measurable (SMART)","Practically impossible to track","Deliberately kept secret from all"],a:1,e:"목표 = SMART(구체·측정·달성·관련·기한). 함정: 모호·비추적은 평가불가."},
{uid:"W2-060",set:"W2",tp:"전략분석",d:"Medium",q:"Competitive analysis in a Business Plan helps the company to:",o:["Copy competitors' products illegally","Identify differentiation and gaps","Ignore the surrounding market","Fix prices jointly with rivals"],a:1,e:"경쟁분석 = 포지셔닝·차별화·기회 식별. 함정: 불법모방·담합은 위법."},
{uid:"W2-061",set:"W2",tp:"전략분석",d:"Hard",q:"Linking the Business Plan to KPIs enables:",o:["Avoiding measurement altogether","Objective tracking of execution","Hiding the actual reported results","Random ad-hoc reactive management"],a:1,e:"BP-KPI 연계 = 객관 추적·답책성. 함정: 측정회피·은폐는 정반대."},
{uid:"W2-062",set:"W2",tp:"ThreeLines",d:"Hard",q:"The Three Lines Model's main purpose is to:",o:["Increase internal bureaucracy layers","Clarify risk roles and responsibilities","Eliminate the governing board entirely","Centralize all risk inside the audit"],a:1,e:"3선 목적 = 위험관리·통제 역할 명확화. 함정: 관료화·기관제거는 오답."},
{uid:"W2-063",set:"W2",tp:"ThreeLines",d:"Hard",q:"A common error is to place risk management in the:",o:["Second line (correct place)","First line as a risk owner","Governing body level","External regulator role"],a:1,e:"위험관리 = 2선. 1선(위험소유)로 두는 것이 흔한 오류. 함정: 정답은 '오배치' 식별."},
{uid:"W2-064",set:"W2",tp:"ThreeLines",d:"Medium",q:"Internal audit's independence means it should report to:",o:["Operational line management","The audit committee / board","Daily operational managers","The company's strategy team"],a:1,e:"내부감사 독립성 = 감사위원회·기구 보고. 함정: 운영보고·전략수립은 독립성 훼손."},
{uid:"W2-065",set:"W2",tp:"ThreeLines",d:"Hard",q:"Which statement about coordination between lines is correct?",o:["Lines must never communicate","Sharing strengthens governance","One line should do everything","Audit approves all transactions"],a:1,e:"선 간 조정·정보공유 = 거버넌스 강화(독립성 유지). 함정: 단절·통합·승인은 오답."},
{uid:"W2-066",set:"W2",tp:"감독기관",d:"Hard",q:"Which body issues and supervises POJK 24/2019 (Business Plan)?",o:["Bank Indonesia (BI)","Otoritas Jasa Keuangan","The Ministry of Trade","The industry association"],a:1,e:"BP 규정·감독 = OJK. 함정: BI·무역부·협회는 주체 아님."},
{uid:"W2-067",set:"W2",tp:"감독기관",d:"Medium",q:"APPI/LSPPI's relevance to the framework is that it:",o:["Issues the POJK rules","Provides industry certification","Supervises commercial banks","Sets national monetary policy"],a:1,e:"APPI/LSPPI = 역량 인증(SPPI). 함정: POJK 발행·은행감독·통화정책은 무관."},
{uid:"W2-068",set:"W2",tp:"감독기관",d:"Hard",q:"In the legal hierarchy, a POJK sits:",o:["Above the governing law (UU)","Below the law but binding","As non-binding guidance only","Equal to internal company policy"],a:1,e:"POJK = 상위법(UU) 하위, 구속력 있는 시행규정. 함정: 상위·비구속·내규동급은 오답."},
{uid:"W2-069",set:"W2",tp:"Compliance",d:"Hard",q:"A 'compliance charter' establishes the function's:",o:["Annual marketing budget","Mandate, authority, scope","Employee salary grades","Dividend distribution policy"],a:1,e:"준법헌장 = 권한·범위·보고선. 함정: 예산·급여·배당은 타 문서."},
{uid:"W2-070",set:"W2",tp:"Compliance",d:"Hard",q:"When OJK issues a new regulation, the compliance function should first:",o:["Ignore it until audited","Conduct a gap analysis","Immediately halt operations","Wait for competitors to act"],a:1,e:"신규 POJK = 영향·필요변경 gap analysis 우선. 함정: 무시·중단·관망은 부적절."},
{uid:"W2-071",set:"W2",tp:"Compliance",d:"Medium",q:"Embedding compliance into product approval is an example of:",o:["After-the-fact compliance","Compliance by design","Active compliance avoidance","Mere compliance theater"],a:1,e:"상품승인 내재 = 예방적 compliance by design. 함정: 사후·회피·형식주의와 대조."},
{uid:"W2-072",set:"W2",tp:"Compliance",d:"Hard",q:"The compliance function's effectiveness depends MOST on:",o:["The size of imposed fines","Genuine senior leadership support","The number of written policies","The physical office location"],a:1,e:"준법 실효성 = 경영진 지원·문화 통합. 함정: 벌금·문서량·위치는 본질 아님."},
{uid:"W2-073",set:"W2",tp:"Compliance",d:"Hard",q:"Which illustrates a FAILURE of compliance culture despite good policies?",o:["Policies are followed daily","Detailed rules routinely bypassed","Staff escalate their concerns","Audits resolved promptly"],a:1,e:"정책 있으나 상시 우회 = 문화 실패. 함정: 나머지는 건전 징후."},
{uid:"W2-074",set:"W2",tp:"BP구성",d:"Hard",q:"The Business Plan must be approved by:",o:["The compliance officer alone","The BOD and BOC","An external service vendor","The marketing department"],a:1,e:"BP 승인 = BOD·BOC. 함정: 담당자·외부·마케팅 단독은 오답."},
{uid:"W2-075",set:"W2",tp:"Q6평가",d:"Hard",q:"A robust Business Plan evaluation framework should be:",o:["One-off and entirely informal","Systematic, periodic, documented","Based purely on rumor and hearsay","Kept fully hidden from the Board"],a:1,e:"BP 평가 = 체계적·정기·기준기반·문서화. 함정: 일회·비공식·비공개는 부실."},
{uid:"W2-076",set:"W2",tp:"Q6컴플",d:"Hard",q:"The '3-layer + steps + KSA' framework for compliance culture defines:",o:["Deliberately confusing the staff","Where, how, and with what capability","How to avoid responsibility entirely","How to reduce all required training"],a:1,e:"3계층+이행단계+KSA = 어디서·어떻게·어떤 역량으로 구현하는지. 함정: 혼란·회피는 오답."},
{uid:"W2-077",set:"W2",tp:"Compliance",d:"Hard",q:"The correct escalation order for a detected breach is:",o:["Conceal then quietly forget","Identify, report, analyze, remediate","Report to the media first","Punish first, never investigate"],a:1,e:"위반 처리 = 식별→보고→분석→시정→BOD/BOC. 함정: 은폐·언론·선처벌은 오답."},
{uid:"W2-078",set:"W2",tp:"Compliance",d:"Medium",q:"A whistleblowing channel supports compliance culture by:",o:["Punishing those who report issues","Enabling safe confidential reporting","Publicizing every report openly","Replacing the internal audit function"],a:1,e:"내부고발 = 안전·기밀 신고로 조기탐지. 함정: 보복·공개·감사대체는 오답."},
{uid:"W2-079",set:"W2",tp:"Compliance",d:"Hard",q:"The second line FAILS its purpose if it:",o:["Stays fully independent of the first","Becomes involved in revenue decisions","Reports properly to the BOC","Performs proper risk oversight"],a:1,e:"2선 실패 = 감독대상 수익결정 개입(독립성 상실). 함정: 나머지는 정상."},
{uid:"W2-080",set:"W2",tp:"Compliance",d:"Hard",q:"Regulatory change management requires the compliance function to:",o:["Ignore all the SEOJK circulars","Track, assess, update, and train","Act only when actually penalized","Outsource every decision externally"],a:1,e:"규제변경 관리 = 추적·영향평가·정책갱신·교육. 함정: 무시·사후·전면위임은 부실."},
{uid:"W2-081",set:"W2",tp:"전략분석",d:"Hard",q:"Scenario analysis in planning is valuable because it:",o:["Guarantees one single outcome","Tests resilience under varied cases","Eliminates all future uncertainty","Replaces the Board's own judgment"],a:1,e:"시나리오 분석 = 기본·낙관·비관 하 강건성 시험. 함정: 단일보장·불확실성 제거는 과장."},
{uid:"W2-082",set:"W2",tp:"전략분석",d:"Medium",q:"Setting unrealistically high growth targets risks:",o:["Practically guaranteed success","Excessive risk and prudential breaches","A genuinely lower compliance burden","Automatic and assured OJK approval"],a:1,e:"비현실적 고성장 = 과도위험·건전성 위반·신뢰상실. 함정: 보장성공·승인은 오답."},
{uid:"W2-083",set:"W2",tp:"BP보고",d:"Hard",q:"If targets were met through EXCESSIVE risk-taking, the result should be:",o:["Praised without any conditions","Flagged for risk-adjusted review","Completely ignored by management","Rewarded with no further review"],a:1,e:"목표달성이나 과도위험 = 위험감안 성과질 평가 필요. 함정: 무조건 칭찬·무시는 부적절."},
{uid:"W2-084",set:"W2",tp:"ThreeLines",d:"Hard",q:"Compliance and risk management (both 2nd line) differ in that:",o:["They are wholly identical roles","Compliance covers legal; risk all risks","Compliance performs the field audits","Risk management approves the loans"],a:1,e:"준법(법규준수) vs 위험관리(전 위험). 둘 다 2선이나 초점 다름. 함정: 동일시·역할혼동."},
{uid:"W2-085",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance training program should be:",o:["One-time only at hiring","Ongoing and role-specific","Optional for all managers","Limited to compliance staff"],a:1,e:"준법교육 = 지속·직무특화·규제변경 시 갱신. 함정: 일회·임원면제·팀한정은 부실."},
{uid:"W2-086",set:"W2",tp:"Compliance",d:"Medium",q:"Documentation of compliance activities is important for:",o:["Increasing the paperwork","Evidencing compliance to OJK","Hiding internal decisions","Marketing the company"],a:1,e:"준법 문서화 = 준수 입증·감사가능·답책성. 함정: 단순 서류·은폐는 오답."},
{uid:"W2-087",set:"W2",tp:"Q6평가",d:"Hard",q:"Monitoring follow-up on audit results assesses whether:",o:["Audits are simply never performed","Corrective actions are implemented","The product marketing has improved","The company logo has been changed"],a:1,e:"감사 후속 모니터링 = 시정조치 적시 이행 여부. 함정: 무관항목으로 오도."},
{uid:"W2-088",set:"W2",tp:"Q6평가",d:"Hard",q:"If follow-up on audit findings is only 65% (target 100%), the rating is:",o:["Fully Comply","Less Comply","Excellent rating","Not applicable"],a:1,e:"감사후속 65%(목표100%) = Less Comply. 함정: 'Fully'·'Excellent'은 오답 — textbook 사례."},
{uid:"W2-089",set:"W2",tp:"Compliance",d:"Hard",q:"Compliance reports relate to the BOC's role in that they:",o:["Are ignored by the BOC","Inform the BOC's oversight","Are seen only by the BOD","Stay hidden from governance"],a:1,e:"준법보고 = BOC 감독 정보 → BOD 답책. 함정: BOC 배제·BOD 한정은 거버넌스 훼손."},
{uid:"W2-090",set:"W2",tp:"BP구성",d:"Hard",q:"Integrating risk assessment into the Business Plan ensures that:",o:["Risks are simply ignored","Strategies are stress-tested first","Only profits are ever planned","The plan becomes shorter"],a:1,e:"BP에 위험평가 통합 = 약속 전 stress-test. 함정: 위험무시·이익만은 부실계획."},
{uid:"W2-091",set:"W2",tp:"Compliance",d:"Hard",q:"Compliance with POJK obligations is BEST evidenced by:",o:["Verbal assurances only","Documented records and reports","A single annual meeting","Competitor benchmark data"],a:1,e:"준법 입증 = 문서·모니터링·보고·시정추적. 함정: 구두·단발·경쟁사는 불충분."},
{uid:"W2-092",set:"W2",tp:"전략분석",d:"Medium",q:"Aligning the plan with the Roadmap (2024-2028) signals the company:",o:["It ignores the industry direction","Positions with strategic priorities","It operates entirely illegally","It avoids all forms of regulation"],a:1,e:"BP-Roadmap 정렬 = 산업 우선순위 정합. 함정: 무시·위법은 오답."},
