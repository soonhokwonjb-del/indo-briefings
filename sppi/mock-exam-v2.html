{uid:"W2-094",set:"W2",tp:"ThreeLines",d:"Hard",q:"The PRIMARY accountability for daily risk/compliance rests with:",o:["The internal audit assurance team","First-line operational management","The external statutory auditors","The OJK financial regulator"],a:1,e:"일상 1차 책임 = 1선(위험소유 영업·운영). 함정: 감사·OJK 전가는 오해."},
{uid:"W2-095",set:"W2",tp:"Q6컴플",d:"Medium",q:"An employee compliance culture survey is a tool to:",o:["Replace the internal audit function","Gauge awareness and lived values","Set the employee salary grades","Approve incoming loan applications"],a:1,e:"준법문화 설문 = 인식·실제 가치 측정. 함정: 감사대체·급여·여신은 무관."},
{uid:"W2-096",set:"W2",tp:"BP보고",d:"Hard",q:"The frequency of plan-realization reporting to OJK is set by:",o:["The company at random","The applicable OJK provisions","The industry competitors","The marketing calendar"],a:1,e:"BP 실현보고 주기 = OJK 규정(정기). 함정: 임의·경쟁사·마케팅은 오답."},
{uid:"W2-097",set:"W2",tp:"Compliance",d:"Hard",q:"A compliance officer pressured to conceal a breach should:",o:["Conceal it for revenue","Escalate to BOD/BOC properly","Resign without reporting","Inform the competitors"],a:1,e:"위반+은폐압력 = 정상채널 BOD/BOC 에스컬레이션. 함정: 은폐·무보고 사퇴는 부적절."},
{uid:"W2-098",set:"W2",tp:"전략분석",d:"Hard",q:"Business Plan funding assumptions must be consistent with:",o:["Public deposit-taking plans","Permitted sources and gearing cap","Unlimited financial leverage","Only government grants"],a:1,e:"BP 자금가정 = 허용자금원(채권·차입·sukuk)+gearing 한도. 함정: 예금수취 불가·무제한은 위반."},
{uid:"W2-099",set:"W2",tp:"Q6평가",d:"Hard",q:"The PDCA cycle relates to plan management by:",o:["Skipping the Check phase","Providing a continuous loop","Doing only the Plan phase","Eliminating all evaluation"],a:1,e:"PDCA = 계획·실행·평가·조치 지속루프(Q6=Check-Act). 함정: 평가 생략은 PDCA 위배."},
{uid:"W2-100",set:"W2",tp:"Compliance",d:"Hard",q:"Which statement is CORRECT (Q6/Q7 and Three Lines)?",o:["Ensuring compliance is a Q6 unit","Develop BP=Q7, compliance=2nd line","Compliance is the 1st line","All units are Q6, only two lines"],a:1,e:"정답: BP개발=Q7, BP평가=Q6, 준법=2선, 내부감사=3선. 함정: Q6/Q7 swap, 선 오배치 집약."},
{uid:"W3-001",set:"W3",tp:"전략",d:"Hard",q:"A risk management strategy is best defined as:",o:["A daily checklist of routine office tasks","The plan to identify, assess, treat risk","A product marketing growth plan","An external statutory audit report"],a:1,e:"위험관리 전략 = 식별·평가·대응·모니터링의 방향성. 함정: 일상업무·마케팅·감사와 혼동."},
{uid:"W3-002",set:"W3",tp:"전략",d:"Hard",q:"The risk management process typically BEGINS with:",o:["Risk treatment selection","Risk identification","Final risk reporting","Capital allocation"],a:1,e:"RM 프로세스 시작 = 위험 식별(이후 측정·대응·모니터링). 함정: 후행 단계를 시작으로 오인."},
{uid:"W3-003",set:"W3",tp:"전략",d:"Hard",q:"Risk APPETITE is determined primarily based on:",o:["Matching competitor risk levels","Strategy and capacity to bear risk","The annual marketing budget size","The total staff headcount figure"],a:1,e:"위험선호 = 전략·자본·위험감내 역량 기반. 함정: 경쟁사·예산·인원은 결정요인 아님."},
{uid:"W3-004",set:"W3",tp:"전략",d:"Hard",q:"Risk LIMITS are established mainly to:",o:["Maximize total exposure","Operationalize the risk appetite","Replace the audit function","Eliminate every business risk"],a:1,e:"위험한도 = 위험선호의 운영 구체화. 함정: 노출극대화·위험제거는 정반대."},
{uid:"W3-005",set:"W3",tp:"전략",d:"Hard",q:"Risk appetite differs from risk tolerance in that appetite is:",o:["A narrow per-transaction cap","The broad level willingly accepted","A daily operational risk metric","An external audit materiality line"],a:1,e:"위험선호=수용의향의 광범위 수준, 위험감내=허용 변동폭. 함정: 두 개념 혼동."},
{uid:"W3-006",set:"W3",tp:"전략",d:"Medium",q:"A risk register is primarily used to:",o:["Record daily staff attendance","Document and track identified risks","List the company product range","Schedule the board meeting dates"],a:1,e:"위험등록부 = 식별위험·평가·대응 기록·추적. 함정: 무관 항목으로 오도."},
{uid:"W3-007",set:"W3",tp:"전략",d:"Hard",q:"Inherent risk refers to risk:",o:["After controls are applied","Before any controls are applied","That can never be measured","Only relevant to auditors"],a:1,e:"고유위험 = 통제 적용 전. 잔여위험 = 통제 후. 함정: inherent/residual swap."},
{uid:"W3-008",set:"W3",tp:"전략",d:"Hard",q:"Residual risk is the risk that remains:",o:["Before any treatment is applied","After controls and treatment","Only in a theoretical model","Entirely outside the company"],a:1,e:"잔여위험 = 통제·대응 후 남은 위험. 함정: 고유위험과 혼동."},
{uid:"W3-009",set:"W3",tp:"전략",d:"Medium",q:"Key Risk Indicators (KRIs) are designed to:",o:["Measure only past realized profit","Give early warning of rising risk","Replace the financial audit work","Set the overall marketing strategy"],a:1,e:"KRI = 위험 증가 조기경보 지표. 함정: 이익측정·감사대체와 혼동."},
{uid:"W3-010",set:"W3",tp:"전략",d:"Hard",q:"Aligning risk strategy with the business plan ensures:",o:["Maximum unchecked rapid growth","Risk-taking within set capacity","Removal of all internal controls","No ongoing monitoring needed"],a:1,e:"위험전략-BP 정렬 = 감내력 내 위험감수. 함정: 무제한·통제제거는 오답."},
{uid:"W3-011",set:"W3",tp:"Treatment",d:"Hard",q:"The four standard risk treatment options are:",o:["Buy, sell, hold, and trade","Avoid, transfer, mitigate, accept","Audit, report, fine, and close","Plan, do, check, and act"],a:1,e:"위험대응 4 = 회피·전가·완화·수용. 함정: PDCA·재무용어와 혼동."},
{uid:"W3-012",set:"W3",tp:"Treatment",d:"Hard",q:"Buying insurance against a risk is an example of risk:",o:["Avoidance","Transfer","Mitigation","Acceptance"],a:1,e:"보험 = 위험 전가(transfer). 함정: mitigation(완화)과 혼동."},
{uid:"W3-013",set:"W3",tp:"Treatment",d:"Hard",q:"Exiting a business line entirely to remove its risk is risk:",o:["Acceptance","Avoidance","Transfer","Mitigation"],a:1,e:"사업철수 = 위험 회피(avoid). 함정: transfer·mitigate와 혼동."},
{uid:"W3-014",set:"W3",tp:"Treatment",d:"Hard",q:"Strengthening internal controls to reduce risk is risk:",o:["Transfer","Mitigation","Avoidance","Acceptance"],a:1,e:"통제강화 = 위험 완화(mitigate). 함정: transfer(전가)와 혼동."},
{uid:"W3-015",set:"W3",tp:"Treatment",d:"Hard",q:"A minor risk below IDR 100 million is typically treated by:",o:["Avoidance","Acceptance","Transfer","Full mitigation"],a:1,e:"경미위험(<IDR100m) = 수용(accept). 함정: 과잉대응으로 회피·전가 선택."},
{uid:"W3-016",set:"W3",tp:"Treatment",d:"Medium",q:"The choice of treatment option depends mainly on:",o:["The CEO's mood that day","Cost-benefit and risk level","The office location","Competitor decisions"],a:1,e:"대응선택 = 위험수준·비용편익. 함정: 무관 요인으로 오도."},
{uid:"W3-017",set:"W3",tp:"Treatment",d:"Hard",q:"Accepting a risk WITHOUT any controls is appropriate when:",o:["When the risk is catastrophic","The risk is minor and tolerable","When controls would be cheap","When the risk is fully unknown"],a:1,e:"무통제 수용 = 경미·감내가능 위험만. 함정: 치명적 위험 수용은 부적절."},
{uid:"W3-018",set:"W3",tp:"Treatment",d:"Hard",q:"After treatment, the next process step is to:",o:["Forget the risk entirely","Monitor and review residual risk","Cancel the entire risk register","Stop all further risk reporting"],a:1,e:"대응 후 = 잔여위험 모니터링·검토. 함정: 종료·무시는 프로세스 위배."},
{uid:"W3-019",set:"W3",tp:"Treatment",d:"Medium",q:"A risk treatment plan should specify:",o:["Only the name of the risk","Actions, owners, and timelines","Just a single risk score number","The competitors' own strategies"],a:1,e:"대응계획 = 조치·책임자·일정·자원. 함정: 단편 정보만은 불완전."},
{uid:"W3-020",set:"W3",tp:"Treatment",d:"Hard",q:"Hedging foreign-exchange exposure is a form of risk:",o:["Avoidance","Transfer/mitigation","Acceptance","Identification"],a:1,e:"환헤지 = 전가·완화 성격. 함정: 수용·식별 단계와 혼동."},
{uid:"W3-021",set:"W3",tp:"Treatment",d:"Hard",q:"Diversifying the financing portfolio primarily achieves risk:",o:["Transfer fully to the insurers","Mitigation of concentration","Total avoidance of all lending","Pure acceptance with no action"],a:1,e:"포트폴리오 분산 = 집중위험 완화. 함정: transfer·avoid와 혼동."},
{uid:"W3-022",set:"W3",tp:"RiskLimit",d:"Hard",q:"BMPP limits are an example of which control type?",o:["A detective control type","Preventive limit control","A corrective control type","A marketing control measure"],a:1,e:"BMPP = 사전 예방적 한도통제. 함정: 탐지·시정통제와 혼동."},
{uid:"W3-023",set:"W3",tp:"RiskLimit",d:"Hard",q:"The single-obligor BMPP limit is set at:",o:["10% of equity","20% of equity","50% of equity","17.5% of equity"],a:1,e:"단일차주 20% of equity. 함정: group 50%·acquisition 17.5% 혼입."},
{uid:"W3-024",set:"W3",tp:"RiskLimit",d:"Hard",q:"The group-obligor BMPP limit is set at:",o:["20% of equity","50% of equity","17.5% of equity","100% of equity"],a:1,e:"Group 50% of equity. 함정: single 20%와 swap."},
{uid:"W3-025",set:"W3",tp:"RiskLimit",d:"Hard",q:"Breaching a risk limit should trigger:",o:["Immediate quiet concealment","Escalation and corrective action","Automatic staff dismissal","No response or action at all"],a:1,e:"한도위반 = 에스컬레이션·시정. 함정: 은폐·무대응은 위배."},
{uid:"W3-026",set:"W3",tp:"RiskLimit",d:"Medium",q:"The maximum gearing ratio acts as a limit on:",o:["The annual marketing spend","Leverage relative to equity","The total staff headcount","The office floor space used"],a:1,e:"Gearing 한도 = 자기자본 대비 레버리지(최대 10배). 함정: 무관 항목."},
{uid:"W3-027",set:"W3",tp:"RiskLimit",d:"Hard",q:"Risk limits should be reviewed:",o:["Never once they are initially set","Periodically and on material change","Only by the external competitors","Only after a major crisis has hit"],a:1,e:"한도 검토 = 정기·중대변화 시. 함정: 고정·사후만은 부적절."},
{uid:"W3-028",set:"W3",tp:"RiskLimit",d:"Hard",q:"The acquisition cost cap of 17.5% is measured against:",o:["The total company equity","Each contract's total income","The total paid-in capital","The total consolidated assets"],a:1,e:"취득원가 17.5% = 계약별 총수입 기준. 함정: equity 기준 BMPP와 혼동."},
{uid:"W3-029",set:"W3",tp:"RiskLimit",d:"Medium",q:"Setting limits per product line helps to:",o:["Increase total concentration","Control segment-level exposure","Avoid all reporting","Remove diversification"],a:1,e:"상품별 한도 = 세그먼트 노출 통제. 함정: 집중증가·분산제거는 정반대."},
{uid:"W3-030",set:"W3",tp:"RiskLimit",d:"Hard",q:"A 'hard limit' differs from a 'soft limit' in that a hard limit:",o:["Can be freely exceeded","Must not be breached","Is only advisory","Applies to marketing"],a:1,e:"Hard limit = 위반 불가, soft limit = 경고선. 함정: 둘 혼동."},
{uid:"W3-031",set:"W3",tp:"Culture",d:"Hard",q:"A strong risk culture is best evidenced by:",o:["Hiding risks from managers","Open escalation of risk concerns","Punishing all risk reporters","Ignoring near-miss events"],a:1,e:"건전 위험문화 = 위험 공개·자발적 에스컬레이션. 함정: 은폐·보복·무시는 취약 신호."},
{uid:"W3-032",set:"W3",tp:"Culture",d:"Hard",q:"The Risk Culture Diagnostic typically assesses how many pillars?",o:["Three pillars","Five pillars","Seven pillars","Ten pillars"],a:1,e:"Risk Culture Diagnostic = 5 Pillars. 함정: 인접 숫자 혼동."},
{uid:"W3-033",set:"W3",tp:"Culture",d:"Hard",q:"'Tone from the top' in risk culture means leaders:",o:["Avoid all the risk topics entirely","Set the example for risk behavior","Delegate the risk entirely away","Focus only on the quarterly profit"],a:1,e:"Tone from the top = 경영진이 위험행동 모범. 함정: 회피·전면위임은 정반대."},
{uid:"W3-034",set:"W3",tp:"Culture",d:"Medium",q:"A 'no-blame' reporting environment encourages staff to:",o:["Conceal their mistakes","Report risks and errors early","Avoid all responsibility","Stop using controls"],a:1,e:"무비난 환경 = 조기 위험·오류 보고 촉진. 함정: 은폐·책임회피는 반대 효과."},
{uid:"W3-035",set:"W3",tp:"Culture",d:"Hard",q:"Incentive structures affect risk culture because they:",o:["Have no behavioral effect","Can reward excessive risk-taking","Only concern the marketing","Simply replace the risk limits"],a:1,e:"인센티브 = 위험행동 유인(과도위험 보상 위험). 함정: 무영향·무관은 오해."},
{uid:"W3-036",set:"W3",tp:"Culture",d:"Hard",q:"A weak risk culture is indicated when:",o:["Risks are openly debated","Bad news is suppressed upward","Controls are respected","Limits are monitored"],a:1,e:"취약 문화 = 악재 상향 억제. 함정: 나머지는 건전 신호."},
{uid:"W3-037",set:"W3",tp:"Culture",d:"Medium",q:"Risk awareness training across staff supports culture by:",o:["Confuse the employees more","Building shared risk understanding","Reduce overall accountability","Replace the entire risk team"],a:1,e:"위험인식 교육 = 공통 이해 형성. 함정: 혼란·책임감소는 오답."},
{uid:"W3-038",set:"W3",tp:"Culture",d:"Hard",q:"The Risk Strategy Score Card is primarily used to:",o:["Pay out the staff bonuses","Translate strategy into measures","Replace the Board of Directors","Set the marketing campaign goals"],a:1,e:"Risk Strategy Score Card = 전략을 측정지표로 전환·추적. 함정: 보상·마케팅과 혼동."},
{uid:"W3-039",set:"W3",tp:"Culture",d:"Hard",q:"Embedding risk into performance appraisal helps to:",o:["Ignore poor risk behavior","Reinforce accountable conduct","Remove all risk ownership","Hide poor past decisions"],a:1,e:"성과평가에 위험 반영 = 책임 있는 행동 강화. 함정: 무시·책임제거는 반대."},
{uid:"W3-040",set:"W3",tp:"Culture",d:"Medium",q:"Psychological safety in a team enables members to:",o:["Stay silent about risks","Speak up about concerns","Avoid all decisions","Bypass the controls"],a:1,e:"심리적 안전 = 우려 발언 가능. 함정: 침묵·우회는 반대."},
{uid:"W3-041",set:"W3",tp:"GCG",d:"Hard",q:"The BOD's role in risk management is to:",o:["Audit and review its own work directly","Set and oversee the risk framework","Sell the financial products directly","Replace the OJK as the regulator"],a:1,e:"BOD = 위험 프레임워크 수립·실행 감독. 함정: 자기감사·영업·규제대체는 오답."},
{uid:"W3-042",set:"W3",tp:"GCG",d:"Hard",q:"The BOC's role regarding risk is primarily to:",o:["Run the daily risk operations itself","Supervise the BOD's risk management","Approve each and every transaction","Conduct the audit fieldwork directly"],a:1,e:"BOC = BOD 위험관리 감독. 함정: 일상운영·거래승인·실무감사는 타 역할."},
{uid:"W3-043",set:"W3",tp:"GCG",d:"Hard",q:"The Risk Management Committee primarily:",o:["Markets and sells the new products","Advises on risk policy and appetite","Audits the financial statements","Sets all the staff salary grades"],a:1,e:"위험관리위원회 = 위험정책·선호 자문·검토. 함정: 마케팅·감사·급여와 혼동."},
{uid:"W3-044",set:"W3",tp:"GCG",d:"Medium",q:"Risk governance documentation should be:",o:["Kept verbal and informal","Formal, approved, and reviewed","Hidden away from the BOC","Optional for the full BOD"],a:1,e:"위험 거버넌스 문서 = 명문화·승인·정기검토. 함정: 구두·비공개·임의는 부실."},
{uid:"W3-045",set:"W3",tp:"GCG",d:"Hard",q:"Segregation of duties in risk management prevents:",o:["Efficient daily operations","Conflicts of interest and fraud","Any form of risk reporting","All staff team collaboration"],a:1,e:"직무분리 = 이해상충·부정 방지. 함정: 효율저해·협업금지로 오인."},
{uid:"W3-046",set:"W3",tp:"GCG",d:"Hard",q:"Internal control under POJK 42/2024 uses how many checkpoints?",o:["Five points","Eight points","Ten points","Twelve points"],a:1,e:"내부통제 = 8-point checklist(POJK 42/2024). 함정: 인접 숫자 혼동."},
{uid:"W3-047",set:"W3",tp:"GCG",d:"Medium",q:"The risk management function should report to:",o:["The sales department head","The BOD with BOC oversight","External competitors","The marketing team"],a:1,e:"위험관리 보고선 = BOD·BOC(독립성). 함정: 영업·마케팅 보고는 독립성 훼손."},
{uid:"W3-048",set:"W3",tp:"GCG",d:"Hard",q:"Good risk governance requires the BOD and BOC to be:",o:["Identical in membership","Independent with clear roles","Free of any responsibility","Subordinate to sales"],a:1,e:"건전 거버넌스 = 독립성·명확한 역할분담. 함정: 동일구성·무책임은 오답."},
{uid:"W3-049",set:"W3",tp:"위원회",d:"Hard",q:"An Audit Committee differs from a Risk Committee in that it focuses on:",o:["Setting the risk appetite","Oversight of audit and controls","Daily risk treatment work","Marketing campaign approval"],a:1,e:"감사위원회 = 감사·내부통제·재무보고 감독. 위험위원회 = 위험정책. 함정: 두 위원회 혼동."},
{uid:"W3-050",set:"W3",tp:"위원회",d:"Medium",q:"Committee effectiveness depends MOST on:",o:["The total number of members","Competence and independence","The meeting room dimensions","The length of the minutes"],a:1,e:"위원회 실효성 = 역량·독립성·정보접근. 함정: 형식 요소로 오도."},
{uid:"W3-051",set:"W3",tp:"위원회",d:"Hard",q:"A committee charter should define:",o:["The daily lunch schedule","Mandate, authority, composition","The marketing slogans used","The list of competitor names"],a:1,e:"위원회 헌장 = 권한·구성·책임·보고선. 함정: 무관 항목."},
{uid:"W3-052",set:"W3",tp:"위원회",d:"Hard",q:"Committee meeting minutes serve primarily to:",o:["Advertise decisions publicly","Evidence decisions and follow-up","Replace the audit report","Set the share price"],a:1,e:"회의록 = 의사결정·후속조치 증빙. 함정: 광고·감사대체와 혼동."},
{uid:"W3-053",set:"W3",tp:"위원회",d:"Medium",q:"Independent members on a committee help to:",o:["Increase internal bias","Provide objective challenge","Slow every decision","Avoid all oversight"],a:1,e:"독립위원 = 객관적 견제·도전. 함정: 편향증가·감독회피는 반대."},
{uid:"W3-054",set:"W3",tp:"위원회",d:"Hard",q:"The frequency of risk committee meetings should be:",o:["Once a decade only","Regular and as-needed","Never scheduled","Random and untracked"],a:1,e:"위험위 회의 = 정기+필요시. 함정: 극단적 빈도는 부적절."},
{uid:"W3-055",set:"W3",tp:"3Lines",d:"Hard",q:"In the Three Lines Model, the risk management function is the:",o:["First line","Second line","Third line","Outside the model"],a:1,e:"위험관리 = 2선. 함정: 1선(영업)·3선(감사)으로 오배치."},
{uid:"W3-056",set:"W3",tp:"3Lines",d:"Hard",q:"The first line of defense consists of:",o:["The internal auditors","Operational risk owners","The external regulator","The audit committee"],a:1,e:"1선 = 위험소유 영업·운영. 함정: 감사·규제와 혼동."},
{uid:"W3-057",set:"W3",tp:"3Lines",d:"Hard",q:"Independent assurance in the Three Lines Model is provided by the:",o:["First line operations","Second line risk function","Third line internal audit","External marketing firm"],a:2,e:"독립보증 = 3선 내부감사. 함정: 1·2선과 혼동."},
{uid:"W3-058",set:"W3",tp:"3Lines",d:"Medium",q:"A common Three Lines error is placing risk management in the:",o:["Second line (correct)","First line as owner","Governing body","Regulator role"],a:1,e:"흔한 오류 = 위험관리를 1선 배치. 정답은 오배치 식별. 함정: 정위치(2선) 혼동."},
{uid:"W3-059",set:"W3",tp:"3Lines",d:"Hard",q:"The governing body in the Three Lines Model is responsible for:",o:["The daily transactions","Oversight and accountability","The audit fieldwork itself","The direct product sales"],a:1,e:"지배기구 = 감독·방향·답책. 함정: 실무 역할과 혼동."},
{uid:"W3-060",set:"W3",tp:"3Lines",d:"Hard",q:"Coordination among the three lines should:",o:["Be strictly forbidden","Strengthen overall governance","Merge them all into one","Eliminate their independence"],a:1,e:"선 간 조정 = 거버넌스 강화(독립성 유지). 함정: 단절·통합은 오답."},
{uid:"W3-061",set:"W3",tp:"3Lines",d:"Medium",q:"The second line's independence from the first ensures:",o:["Free risk-taking","Objective risk oversight","Removal of controls","Merged reporting lines"],a:1,e:"2선 독립 = 객관적 위험감독. 함정: 위험감수·통제제거는 반대."},
{uid:"W3-062",set:"W3",tp:"Matrix",d:"Hard",q:"A risk matrix typically plots likelihood against:",o:["Staff seniority","Impact/consequence","Office location","Marketing spend"],a:1,e:"위험 매트릭스 = 발생가능성 × 영향. 함정: 무관 축으로 오도."},
{uid:"W3-063",set:"W3",tp:"Matrix",d:"Hard",q:"A risk scored 'high likelihood, high impact' should be:",o:["Accepted with no action","Prioritized for treatment","Ignored entirely","Marketed externally"],a:1,e:"고가능성·고영향 = 최우선 대응. 함정: 수용·무시는 부적절."},
{uid:"W3-064",set:"W3",tp:"Matrix",d:"Medium",q:"A 'low likelihood, low impact' risk is usually:",o:["The top priority","Accepted or monitored","Always avoided","Always transferred"],a:1,e:"저가능성·저영향 = 수용·모니터링. 함정: 과잉대응으로 회피·전가."},
{uid:"W3-065",set:"W3",tp:"Matrix",d:"Hard",q:"A heat map uses color coding to:",o:["Decorate the final report","Show relative risk severity","Hide the actual key risks","List the staff member names"],a:1,e:"히트맵 = 색상으로 위험 심각도 가시화. 함정: 장식·은폐로 오인."},
{uid:"W3-066",set:"W3",tp:"Matrix",d:"Hard",q:"Quantitative risk assessment differs from qualitative by using:",o:["Only subjective opinions","Numerical data and probability","No supporting data at all","Color labels and nothing more"],a:1,e:"정량평가 = 수치·확률, 정성평가 = 서술등급. 함정: 두 방식 혼동."},
{uid:"W3-067",set:"W3",tp:"Matrix",d:"Medium",q:"A risk matrix helps management to:",o:["Avoid any prioritization","Prioritize limited resources","Ignore all the risks found","Increase the total exposure"],a:1,e:"매트릭스 = 우선순위·자원배분. 함정: 무시·노출증가는 반대."},
{uid:"W3-068",set:"W3",tp:"Matrix",d:"Hard",q:"Mapping inherent vs residual risk on a matrix shows:",o:["The marketing reach","Control effectiveness","The staff count","The share price"],a:1,e:"고유 vs 잔여 매핑 = 통제 효과 가시화. 함정: 무관 항목."},
{uid:"W3-069",set:"W3",tp:"평가",d:"Hard",q:"Evaluating the risk management framework is a Q6 ('Evaluating') activity that examines:",o:["How to build new rules","Whether RM works effectively","The marketing results","Daily transaction volume"],a:1,e:"Q6 = RM 작동·효과 평가. Q7 = 구축. 함정: Q6/Q7 혼동."},
{uid:"W3-070",set:"W3",tp:"평가",d:"Hard",q:"The RM Process evaluation typically covers how many stages?",o:["Two stages","Four stages","Six stages","Eight stages"],a:1,e:"RM Process 평가 = 4단계(식별·측정·대응·모니터링 검토). 함정: 인접 숫자."},
{uid:"W3-071",set:"W3",tp:"평가",d:"Hard",q:"Internal control evaluation under POJK 42/2024 checks:",o:["A 3-point list","An 8-point checklist","A 12-point list","A 20-point list"],a:1,e:"내부통제 평가 = 8-point checklist. 함정: 인접 숫자 혼동."},
{uid:"W3-072",set:"W3",tp:"평가",d:"Medium",q:"A key output of RM framework evaluation is:",o:["A new marketing plan","Improvement recommendations","A redesigned company logo","Staff performance bonuses only"],a:1,e:"RM 평가 산출 = 개선 권고. 함정: 무관 항목."},
{uid:"W3-073",set:"W3",tp:"평가",d:"Hard",q:"Evaluating risk culture maturity assesses whether risk thinking is:",o:["Limited to the risk team","Embedded across the organization","Only on the paper documents","Reviewed once every decade"],a:1,e:"위험문화 성숙도 = 전사 내재화 여부. 함정: 팀한정·서류상·희소검토는 미성숙."},
{uid:"W3-074",set:"W3",tp:"평가",d:"Hard",q:"If risk limits are routinely breached without action, the evaluation should find:",o:["A strong control system","Weak limit enforcement","Excellent governance","No issue at all"],a:1,e:"한도 상시위반·무대응 = 한도집행 취약. 함정: '강함'·'무이슈'는 오답."},
{uid:"W3-075",set:"W3",tp:"평가",d:"Medium",q:"The purpose of evaluating the RM framework is to:",o:["Assign blame to the staff","Drive continuous improvement","Cut the overall headcount","Increase regulatory fines"],a:1,e:"RM 평가 목적 = 지속 개선. 함정: 비난·감원·벌금은 목적 아님."},
{uid:"W3-076",set:"W3",tp:"전략",d:"Hard",q:"Operational risk arises mainly from:",o:["Interest rate movements","Failed processes, people, systems","Currency exchange fluctuations","Stock market price changes"],a:1,e:"운영위험 = 프로세스·인력·시스템·외부사건 실패. 함정: 시장·환위험과 혼동."},
{uid:"W3-077",set:"W3",tp:"전략",d:"Hard",q:"Credit risk in a finance company is the risk that:",o:["FX exchange rates will move","A borrower fails to repay","Internal systems will crash","Key staff members will resign"],a:1,e:"신용위험 = 차주 채무불이행. 함정: 시장·운영위험과 혼동."},
{uid:"W3-078",set:"W3",tp:"전략",d:"Hard",q:"Liquidity risk for a finance company is the risk of:",o:["A borrower defaulting on debt","Inability to meet obligations due","A serious data breach occurring","A reputational scandal arising"],a:1,e:"유동성위험 = 만기 채무 이행 자금부족. 함정: 신용·운영위험과 혼동."},
{uid:"W3-079",set:"W3",tp:"전략",d:"Medium",q:"Market risk relates to losses from:",o:["A borrower's loan default","Movements in market prices/rates","Internal process failures","Legal non-compliance events"],a:1,e:"시장위험 = 금리·환·가격 변동 손실. 함정: 신용·운영위험과 혼동."},
{uid:"W3-080",set:"W3",tp:"전략",d:"Hard",q:"Strategic risk arises from:",o:["A single system outage","Poor business decisions/changes","A minor data entry error","Routine staff turnover events"],a:1,e:"전략위험 = 잘못된 의사결정·환경변화 미대응. 함정: 운영적 사건과 혼동."},
{uid:"W3-081",set:"W3",tp:"전략",d:"Hard",q:"Reputational risk can be triggered by:",o:["A favorable audit result","Misconduct or service failures","Strong annual profit growth","A successful product launch"],a:1,e:"평판위험 = 부정행위·서비스 실패·규제위반. 함정: 긍정 사건은 트리거 아님."},
{uid:"W3-082",set:"W3",tp:"전략",d:"Medium",q:"Concentration risk increases when financing is:",o:["Spread across many sectors","Heavily focused on few obligors","Fully hedged","Backed by collateral"],a:1,e:"집중위험 = 소수 차주·섹터 편중. 함정: 분산·헤지는 반대."},
{uid:"W3-083",set:"W3",tp:"Treatment",d:"Hard",q:"Setting up a loan-loss provision is a response to:",o:["Market risk only","Expected credit losses","Operational outages","Reputational damage"],a:1,e:"대손충당 = 예상 신용손실 대응. 함정: 시장·운영위험과 혼동."},
{uid:"W3-084",set:"W3",tp:"Treatment",d:"Hard",q:"Requiring collateral on financing primarily mitigates:",o:["Liquidity risk","Credit/default risk","Currency risk","Operational risk"],a:1,e:"담보 = 신용·부도위험 완화. 함정: 유동성·환위험과 혼동."},
{uid:"W3-085",set:"W3",tp:"Treatment",d:"Medium",q:"A business continuity plan mainly addresses:",o:["Credit default risk events","Operational disruption risk","Market price movement risk","Tax compliance breach risk"],a:1,e:"BCP = 운영 중단 위험 대응. 함정: 신용·시장위험과 혼동."},
{uid:"W3-086",set:"W3",tp:"RiskLimit",d:"Hard",q:"A stop-loss limit is designed to:",o:["Maximize the exposure","Cap potential losses","Remove all controls","Increase leverage"],a:1,e:"Stop-loss = 잠재손실 상한. 함정: 노출극대화·레버리지증가는 반대."},
{uid:"W3-087",set:"W3",tp:"RiskLimit",d:"Medium",q:"Concentration limits per sector are intended to:",o:["Increase sector focus","Cap single-sector exposure","Remove diversification","Avoid all lending"],a:1,e:"섹터 한도 = 단일섹터 노출 상한. 함정: 집중강화·분산제거는 반대."},
{uid:"W3-088",set:"W3",tp:"Culture",d:"Hard",q:"The 'five pillars' Risk Culture Diagnostic assesses dimensions such as:",o:["Only the profit metrics","Leadership, accountability, communication","Only the audit findings","Only the company share price"],a:1,e:"5 Pillars = 리더십·책임·소통·인식·강화 등 문화 차원. 함정: 재무지표 한정은 오해."},
{uid:"W3-089",set:"W3",tp:"GCG",d:"Hard",q:"The risk appetite statement should be approved by:",o:["The marketing team","The BOD and BOC","An external vendor","Individual staff"],a:1,e:"위험선호 선언 = BOD·BOC 승인. 함정: 실무·외부 승인은 거버넌스 위배."},
{uid:"W3-090",set:"W3",tp:"평가",d:"Hard",q:"A mature RM framework evaluation should be:",o:["One-off and informal","Systematic and periodic","Based on rumor","Hidden from the BOC"],a:1,e:"RM 평가 = 체계적·정기·문서화. 함정: 일회·비공식·비공개는 부실."},
{uid:"W3-091",set:"W3",tp:"전략",d:"Hard",q:"The risk management process AFTER measurement proceeds to:",o:["Identification again","Treatment/response","Final closure","Marketing review"],a:1,e:"측정 후 = 대응(treatment). 식별→측정→대응→모니터링. 함정: 순서 혼동."},
{uid:"W3-092",set:"W3",tp:"Treatment",d:"Hard",q:"When treatment cost exceeds the potential loss, the rational choice is to:",o:["Over-mitigate anyway","Accept the residual risk","Always transfer it","Always avoid it"],a:1,e:"대응비용 > 손실 = 합리적 수용. 함정: 과잉대응은 비효율."},
{uid:"W3-093",set:"W3",tp:"RiskLimit",d:"Hard",q:"Exceeding the gearing limit of 10x indicates:",o:["Strong efficiency","A prudential breach","An upgrade trigger","A BMPP exemption"],a:1,e:"Gearing 10배 초과 = 건전성 위반. 함정: 효율·면제로 오인."},
{uid:"W3-094",set:"W3",tp:"3Lines",d:"Hard",q:"The internal audit function should NOT:",o:["Provide independent assurance","Design the controls it audits","Report to the audit committee","Assess control effectiveness"],a:1,e:"내부감사(3선)는 자신이 감사할 통제를 설계하면 독립성 훼손. 함정: 나머지는 정상 역할."},
{uid:"W3-095",set:"W3",tp:"Culture",d:"Hard",q:"Linking risk outcomes to remuneration aims to:",o:["Reward reckless risk-taking behavior","Align incentives with prudent risk","Ignore the risk outcomes entirely","Remove individual accountability"],a:1,e:"위험-보상 연계 = 신중한 위험행동 유도. 함정: 무모함 보상은 반대 설계."},
{uid:"W3-096",set:"W3",tp:"GCG",d:"Hard",q:"An effective risk reporting line provides the BOD/BOC with:",o:["Only the favorable positive news","Timely, accurate risk information","Only the latest marketing updates","Competitor market rumor and gossip"],a:1,e:"위험보고 = 적시·정확 정보. 함정: 호재만·무관정보는 부실 보고."},
{uid:"W3-097",set:"W3",tp:"평가",d:"Hard",q:"Evaluating control effectiveness compares controls against:",o:["The competitor company brand logos","The risks they are meant to mitigate","The total annual marketing budget","The individual staff birthdays"],a:1,e:"통제 효과 평가 = 대상 위험 대비 적정성. 함정: 무관 기준으로 오도."},
{uid:"W3-098",set:"W3",tp:"Treatment",d:"Hard",q:"The MOST appropriate treatment for a catastrophic, high-likelihood risk is usually:",o:["Simple unconditional acceptance","Avoidance or strong mitigation","No action taken at all","Marketing the risk away"],a:1,e:"치명적·고가능성 = 회피 또는 강력 완화. 함정: 단순수용·무대응은 부적절."},
{uid:"W3-099",set:"W3",tp:"전략",d:"Hard",q:"Enterprise Risk Management (ERM) differs from siloed risk handling by:",o:["Ignoring most of the known risks","Taking an integrated portfolio view","Removing the risk function entirely","Focusing on just one risk type"],a:1,e:"ERM = 전사 통합 포트폴리오 관점. 함정: 사일로·단일위험과 대조."},
{uid:"W3-100",set:"W3",tp:"평가",d:"Hard",q:"Which statement is CORRECT (treatment and Three Lines)?",o:["Insurance is risk avoidance","Insurance is transfer; RM is 2nd line","Mitigation means exiting the business","Internal audit is the first line"],a:1,e:"정답: 보험=전가, 위험관리=2선. 함정: 보험을 회피로, 완화를 철수로, 감사를 1선으로 오인."},
{uid:"W4-001",set:"W4",tp:"POJK",d:"Hard",q:"The principal regulation governing the anti-fraud strategy is:",o:["POJK 28/2024","POJK 12/2024","POJK 43/2024","POJK 22/2023"],a:1,e:"Anti-fraud 전략 = POJK 12/2024. 함정: 28/2024(SIPELAKU)·43(HR)·22(소비자)와 혼동."},
{uid:"W4-002",set:"W4",tp:"POJK",d:"Hard",q:"SIPELAKU is established under which regulation?",o:["POJK 12/2024","POJK 28/2024","POJK 42/2024","POJK 46/2024"],a:1,e:"SIPELAKU = POJK 28/2024. 함정: 12(anti-fraud)·42(내부통제)와 혼동."},
{uid:"W4-003",set:"W4",tp:"POJK",d:"Hard",q:"SIPELAKU primarily functions as:",o:["A consumer loan approval platform","A perpetrator/fraud reporting system","A product marketing database tool","An internal staff payroll system"],a:1,e:"SIPELAKU = 부정행위자 보고·정보 시스템. 함정: 여신·마케팅·급여 시스템으로 오인."},
{uid:"W4-004",set:"W4",tp:"POJK",d:"Hard",q:"Under the anti-fraud regulation, the 'Primary Party' prohibition is set out in:",o:["Article 5","Article 9(4)","Article 13","Article 18"],a:1,e:"Primary Party 금지 = Art.9(4). 함정: 인접 조항 혼동."},
{uid:"W4-005",set:"W4",tp:"POJK",d:"Hard",q:"The anti-fraud regulation sets a correction/follow-up deadline of:",o:["5 working days","15 working days","30 working days","60 working days"],a:1,e:"시정·후속 = 15영업일(Art.18). 함정: 인접 기간 혼동."},
{uid:"W4-006",set:"W4",tp:"POJK",d:"Hard",q:"The Implementation Report under the anti-fraud framework contains:",o:["3 fields","13 fields","23 fields","30 fields"],a:1,e:"Implementation Report = 13개 항목 구조. 함정: 인접 숫자."},
{uid:"W4-007",set:"W4",tp:"POJK",d:"Medium",q:"The anti-fraud regulation applies to:",o:["Only the finance department staff","All employees and management","Only the external service vendors","Only the board-level members"],a:1,e:"적용범위 = 전 임직원·경영진. 함정: 일부 한정은 오해."},
{uid:"W4-008",set:"W4",tp:"POJK",d:"Hard",q:"A finance company must submit its anti-fraud strategy to:",o:["Its competitors","OJK","The tax office","The stock exchange"],a:1,e:"Anti-fraud 전략 제출 = OJK. 함정: 무관 기관."},
{uid:"W4-009",set:"W4",tp:"POJK",d:"Medium",q:"The compliance matrix in the anti-fraud framework maps:",o:["Sales figures to the regions","Requirements to sanctions","Staff members to their salaries","Products to their listed prices"],a:1,e:"Compliance Matrix = 요건-제재 매핑. 함정: 무관 매핑으로 오도."},
{uid:"W4-010",set:"W4",tp:"POJK",d:"Hard",q:"Failure to implement the anti-fraud strategy may result in:",o:["A bonus payment","Administrative sanctions","An automatic upgrade","Tax exemption"],a:1,e:"미이행 = 행정제재(경고·벌금 등). 함정: 보상·면제는 정반대."},
{uid:"W4-011",set:"W4",tp:"4Pillars",d:"Hard",q:"The four pillars of the anti-fraud strategy are:",o:["Plan, do, check, act","Prevention, detection, investigation, monitoring","Avoid, transfer, mitigate, accept","Identify, assess, treat, report"],a:1,e:"Anti-fraud 4기둥 = 예방·탐지·조사보고·모니터링평가시정. 함정: PDCA·위험대응과 혼동."},
{uid:"W4-012",set:"W4",tp:"4Pillars",d:"Hard",q:"An anti-fraud awareness program belongs to which pillar?",o:["Detection","Prevention","Investigation","Monitoring"],a:1,e:"인식제고 프로그램 = 예방(prevention) 기둥. 함정: 탐지와 혼동."},
{uid:"W4-013",set:"W4",tp:"4Pillars",d:"Hard",q:"A whistleblowing system belongs primarily to which pillar?",o:["Prevention","Detection","Investigation","Monitoring"],a:1,e:"내부고발 = 탐지(detection) 기둥. 함정: 예방과 혼동."},
{uid:"W4-014",set:"W4",tp:"4Pillars",d:"Hard",q:"Conducting an investigation after a fraud signal is which pillar?",o:["The prevention pillar","Investigation/reporting","The detection pillar","The monitoring pillar"],a:1,e:"조사 = 조사·보고·제재(investigation) 기둥. 함정: 탐지와 혼동."},
{uid:"W4-015",set:"W4",tp:"4Pillars",d:"Hard",q:"Evaluating and correcting the anti-fraud system is which pillar?",o:["The prevention pillar","Monitoring/evaluation","The detection pillar","The investigation pillar"],a:1,e:"평가·시정 = 모니터링·평가·후속 기둥. 함정: 조사와 혼동."},
{uid:"W4-016",set:"W4",tp:"4Pillars",d:"Medium",q:"A 'know your employee' policy supports which pillar?",o:["Prevention","Detection","Investigation","Reporting"],a:0,e:"KYE = 예방 기둥(채용·보직 위험관리). 함정: 탐지와 혼동."},
{uid:"W4-017",set:"W4",tp:"4Pillars",d:"Hard",q:"Surprise audits and data analytics primarily serve:",o:["Prevention","Detection","Investigation","Sanctioning"],a:1,e:"불시감사·데이터분석 = 탐지 기둥. 함정: 예방과 혼동."},
{uid:"W4-018",set:"W4",tp:"4Pillars",d:"Hard",q:"Imposing sanctions on a proven fraudster belongs to which pillar?",o:["The prevention pillar","Investigation/sanction","The detection pillar","The monitoring pillar"],a:1,e:"제재 = 조사·보고·제재 기둥. 함정: 모니터링과 혼동."},
{uid:"W4-019",set:"W4",tp:"4Pillars",d:"Medium",q:"The four pillars are designed to work:",o:["In total isolation","As an integrated cycle","Only once a year","Independently of each other"],a:1,e:"4기둥 = 통합 순환 작동. 함정: 단절·연1회는 오해."},
{uid:"W4-020",set:"W4",tp:"4Pillars",d:"Hard",q:"Reporting fraud cases into SIPELAKU supports which pillar?",o:["The prevention pillar only","Investigation/reporting","Pure prevention activity","No pillar of the four"],a:1,e:"SIPELAKU 보고 = 조사·보고 기둥. 함정: 예방과 혼동."},
{uid:"W4-021",set:"W4",tp:"RBA",d:"Hard",q:"A Risk-Based Approach to fraud means resources are allocated to:",o:["Every area equally","The highest fraud-risk areas","Only the marketing team","Random areas by lottery"],a:1,e:"RBA = 고위험 영역 집중. 함정: 균등배분은 RBA 반대."},
{uid:"W4-022",set:"W4",tp:"RBA",d:"Hard",q:"A fraud risk assessment should be conducted:",o:["Once and never again","Periodically and on change","Only after a fraud occurs","Only by competitors"],a:1,e:"부정위험 평가 = 정기·변화 시. 함정: 일회·사후만은 부적절."},
{uid:"W4-023",set:"W4",tp:"RBA",d:"Medium",q:"Fraud risk is highest where there is:",o:["Strong segregation of duties","Weak controls and high pressure","Regular independent audits","Clear accountability"],a:1,e:"부정위험 高 = 약한 통제·높은 압력·기회. 함정: 나머지는 위험 저감 요인."},
{uid:"W4-024",set:"W4",tp:"RBA",d:"Hard",q:"The fraud triangle consists of:",o:["Plan, do, check","Pressure, opportunity, rationalization","Avoid, transfer, accept","People, process, systems"],a:1,e:"Fraud triangle = 압력·기회·합리화. 함정: PDCA·운영위험 요소와 혼동."},
{uid:"W4-025",set:"W4",tp:"RBA",d:"Hard",q:"'Opportunity' in the fraud triangle is best reduced by:",o:["Raising all the staff salaries","Strengthening internal controls","Increasing the staff workload","Reducing all the reporting"],a:1,e:"기회 축소 = 내부통제 강화. 함정: 급여·업무량은 압력·합리화 영역."},
{uid:"W4-026",set:"W4",tp:"RBA",d:"Hard",q:"'Pressure' in the fraud triangle typically arises from:",o:["Strong internal controls","Personal financial strain","Independent audits","Clear policies"],a:1,e:"압력 = 개인 재정난·실적압박. 함정: 통제·감사는 기회 영역."},
{uid:"W4-027",set:"W4",tp:"RBA",d:"Hard",q:"'Rationalization' in the fraud triangle refers to:",o:["An internal control weakness","Self-justification of the act","An internal audit procedure","A report submission deadline"],a:1,e:"합리화 = 행위 자기정당화. 함정: 통제·감사 절차와 혼동."},
{uid:"W4-028",set:"W4",tp:"RBA",d:"Medium",q:"A fraud risk register is used to:",o:["List all the staff birthdays","Record and rate fraud risks","Schedule the marketing plans","Track the office supplies"],a:1,e:"부정위험 등록부 = 부정위험 식별·평가·대응 기록. 함정: 무관 항목."},
{uid:"W4-029",set:"W4",tp:"RBA",d:"Hard",q:"High-risk fraud areas should receive:",o:["Less oversight and attention","Enhanced controls and monitoring","No special attention at all","Only an annual basic review"],a:1,e:"고위험 영역 = 강화 통제·모니터링. 함정: 완화·무관심은 RBA 위배."},
{uid:"W4-030",set:"W4",tp:"RBA",d:"Hard",q:"Combining KYE, segregation, and analytics reflects:",o:["A single-control approach","A layered RBA defense","An absence of controls","Marketing strategy"],a:1,e:"KYE+분리+분석 = 다층 RBA 방어. 함정: 단일통제·무통제는 오답."},
{uid:"W4-031",set:"W4",tp:"InternalAudit",d:"Hard",q:"In the Three Lines Model, internal audit is the:",o:["First line","Second line","Third line","Outside the model"],a:2,e:"내부감사 = 3선. 함정: 1선(영업)·2선(위험·준법)으로 오배치."},
{uid:"W4-032",set:"W4",tp:"InternalAudit",d:"Hard",q:"The primary purpose of internal audit is to provide:",o:["Daily risk operations","Independent assurance","Marketing strategy","Loan approvals"],a:1,e:"내부감사 목적 = 독립적 보증·자문. 함정: 실무·영업 기능과 혼동."},
{uid:"W4-033",set:"W4",tp:"InternalAudit",d:"Hard",q:"To preserve independence, internal audit should report to:",o:["The sales manager","The audit committee/board","Daily operations head","The marketing team"],a:1,e:"독립성 = 감사위원회·이사회 보고. 함정: 영업·운영 보고는 독립성 훼손."},
{uid:"W4-034",set:"W4",tp:"InternalAudit",d:"Hard",q:"Internal audit's independence is compromised if it:",o:["Reports directly to the board","Audits processes it designed","Assesses any control gaps","Follows its formal charter"],a:1,e:"독립성 훼손 = 자신이 설계한 통제 감사. 함정: 나머지는 정상 역할."},
{uid:"W4-035",set:"W4",tp:"InternalAudit",d:"Medium",q:"An internal audit charter defines the function's:",o:["The annual marketing budget","Authority, scope, responsibility","The staff salary grade bands","The dividend payout policy"],a:1,e:"감사헌장 = 권한·범위·책임·보고선. 함정: 무관 문서."},
{uid:"W4-036",set:"W4",tp:"InternalAudit",d:"Hard",q:"A risk-based audit plan prioritizes:",o:["Every unit equally","Higher-risk areas first","Only the smallest units","Random selections"],a:1,e:"위험기반 감사계획 = 고위험 영역 우선. 함정: 균등·무작위는 비효율."},
{uid:"W4-037",set:"W4",tp:"InternalAudit",d:"Hard",q:"The typical internal audit process sequence is:",o:["Report, plan, execute","Plan, fieldwork, report, follow-up","Follow-up, plan, report","Execute, plan, ignore"],a:1,e:"감사 절차 = 계획→실사→보고→후속. 함정: 순서 교란."},
{uid:"W4-038",set:"W4",tp:"InternalAudit",d:"Medium",q:"Audit working papers serve to:",o:["Advertise the audit findings","Document evidence and conclusions","Replace the full audit report","Set the company share price"],a:1,e:"감사조서 = 증거·결론 문서화. 함정: 광고·보고서 대체와 혼동."},
{uid:"W4-039",set:"W4",tp:"InternalAudit",d:"Hard",q:"An audit finding should always include:",o:["Only a final conclusion","Condition, cause, and recommendation","Just the auditor's name","A marketing slogan line"],a:1,e:"감사지적 = 현황·기준·원인·영향·권고. 함정: 단편만은 불완전."},
{uid:"W4-040",set:"W4",tp:"InternalAudit",d:"Hard",q:"Follow-up on audit recommendations is important to:",o:["Close the audit very quickly","Ensure corrective action is taken","Avoid reporting the findings","Reduce the overall audit scope"],a:1,e:"감사 후속 = 시정조치 이행 확인. 함정: 조기종료·미보고는 부적절."},
{uid:"W4-041",set:"W4",tp:"InternalAudit",d:"Hard",q:"Internal audit differs from external audit in that internal audit:",o:["Only checks the financials","Covers operations and controls broadly","Is hired by the shareholders","Issues the annual statutory accounts"],a:1,e:"내부감사 = 운영·통제·거버넌스 광범위(상시). 외부감사 = 재무제표 의견. 함정: 둘 혼동."},
{uid:"W4-042",set:"W4",tp:"InternalAudit",d:"Medium",q:"An internal auditor must maintain:",o:["Bias toward management","Objectivity and integrity","Loyalty to sales targets","Secrecy from the board"],a:1,e:"감사인 = 객관성·청렴·독립. 함정: 편향·영업충성은 윤리 위배."},
{uid:"W4-043",set:"W4",tp:"InternalAudit",d:"Hard",q:"The audit committee's role regarding internal audit is to:",o:["Run the audit fieldwork itself","Oversee its independence and work","Sell the financial products","Approve all the loan files"],a:1,e:"감사위원회 = 내부감사 독립성·업무 감독. 함정: 실무·영업과 혼동."},
{uid:"W4-044",set:"W4",tp:"InternalAudit",d:"Hard",q:"Audit evidence should be:",o:["Based on rumor","Sufficient and reliable","Purely verbal","Hidden from review"],a:1,e:"감사증거 = 충분·신뢰·관련성. 함정: 소문·구두만은 불충분."},
{uid:"W4-045",set:"W4",tp:"InternalAudit",d:"Hard",q:"A material control weakness should be:",o:["Concealed quietly from all","Reported with recommendations","Ignored if seen as minor","Left over for the next year"],a:1,e:"중대 통제취약 = 보고·권고. 함정: 은폐·방치는 부적절."},
{uid:"W4-046",set:"W4",tp:"InternalAudit",d:"Medium",q:"Internal audit adds value primarily by:",o:["Increasing internal bureaucracy","Improving controls and governance","Boosting the marketing reach","Setting the product prices"],a:1,e:"내부감사 가치 = 통제·거버넌스·프로세스 개선. 함정: 관료화·마케팅과 혼동."},
{uid:"W4-047",set:"W4",tp:"InternalAudit",d:"Hard",q:"The frequency of internal audits should be:",o:["Once per decade","Risk-based and periodic","Never scheduled","Random and untracked"],a:1,e:"감사 주기 = 위험기반·정기. 함정: 극단 빈도는 부적절."},
{uid:"W4-048",set:"W4",tp:"InternalAudit",d:"Hard",q:"Audit recommendations should be:",o:["Vague and general","Specific and actionable","Impossible to implement","Kept confidential forever"],a:1,e:"권고 = 구체·실행가능. 함정: 모호·비실행은 무의미."},
{uid:"W4-049",set:"W4",tp:"InternalAudit",d:"Medium",q:"An internal audit report should be communicated to:",o:["Only the audited department itself","Management and the audit committee","The external market competitors","The general investing public"],a:1,e:"감사보고 = 경영진·감사위원회. 함정: 피감사부서 한정·외부공개는 오답."},
{uid:"W4-050",set:"W4",tp:"InternalAudit",d:"Hard",q:"A high rate of unimplemented audit recommendations signals:",o:["Strong corporate governance","Weak follow-up and accountability","Excellent internal control systems","No issue whatsoever being found"],a:1,e:"미이행 권고 다수 = 후속·답책 취약. 함정: '강함'으로 오인."},
{uid:"W4-051",set:"W4",tp:"QAIP",d:"Hard",q:"QAIP stands for:",o:["Quick Audit Internal Plan","Quality Assurance and Improvement Program","Quarterly Audit Income Plan","Quality Assessment of Internal Profit"],a:1,e:"QAIP = Quality Assurance and Improvement Program. 함정: 유사 약어 오인."},
{uid:"W4-052",set:"W4",tp:"QAIP",d:"Hard",q:"The QAIP is designed to ensure internal audit:",o:["Maximizes the total audit fees","Conforms to standards and improves","Avoids any kind of external review","Replaces the whole audit committee"],a:1,e:"QAIP = 기준 부합·지속개선 보증. 함정: 수수료·외부검토 회피와 혼동."},
{uid:"W4-053",set:"W4",tp:"QAIP",d:"Hard",q:"QAIP includes which types of assessment?",o:["Only the external assessments","Internal and external assessments","Only the internal marketing reviews","Only the basic annual ones"],a:1,e:"QAIP = 내부평가 + 외부평가. 함정: 한쪽만으로 한정 오인."},
{uid:"W4-054",set:"W4",tp:"QAIP",d:"Medium",q:"An external QAIP assessment is typically performed:",o:["Once every single week","At least every five years","Never performed at all","Only by the competitors"],a:1,e:"외부 QAIP = 최소 5년 1회. 함정: 극단 빈도·미실시는 오답."},
{uid:"W4-055",set:"W4",tp:"QAIP",d:"Hard",q:"The QAIP results should be reported to:",o:["Only the audit team itself","Senior management and the board","External market competitors","The internal marketing team"],a:1,e:"QAIP 결과 = 고위경영진·이사회 보고. 함정: 내부한정·외부공개는 오답."},
{uid:"W4-056",set:"W4",tp:"QAIP",d:"Hard",q:"A QAIP helps identify internal audit's:",o:["Its marketing potential","Strengths and improvement areas","Its annual sales targets","Its dividend payout capacity"],a:1,e:"QAIP = 감사기능 강점·개선영역 식별. 함정: 무관 항목."},
{uid:"W4-057",set:"W4",tp:"QAIP",d:"Medium",q:"Conformance with audit standards is verified through:",o:["Marketing surveys","The QAIP process","Competitor reviews","Tax filings"],a:1,e:"기준 부합 검증 = QAIP. 함정: 무관 수단."},
{uid:"W4-058",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"The Kirkpatrick model evaluates training across how many levels?",o:["Two levels","Four levels","Six levels","Eight levels"],a:1,e:"Kirkpatrick = 4단계. 함정: 인접 숫자."},
{uid:"W4-059",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"The four Kirkpatrick levels are:",o:["Plan, do, check, act","Reaction, learning, behavior, results","Avoid, transfer, mitigate, accept","Input, process, output, outcome"],a:1,e:"Kirkpatrick = 반응·학습·행동·결과. 함정: PDCA·위험대응과 혼동."},
{uid:"W4-060",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"Measuring whether trainees enjoyed a course is which level?",o:["Reaction","Learning","Behavior","Results"],a:0,e:"만족도·반응 = Level 1(Reaction). 함정: 학습과 혼동."},
{uid:"W4-061",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"A post-course test of knowledge gained measures which level?",o:["Reaction","Learning","Behavior","Results"],a:1,e:"지식습득 시험 = Level 2(Learning). 함정: 반응과 혼동."},
{uid:"W4-062",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"Observing on-the-job application of skills measures which level?",o:["Reaction","Learning","Behavior","Results"],a:2,e:"현업 적용·행동변화 = Level 3(Behavior). 함정: 학습과 혼동."},
{uid:"W4-063",set:"W4",tp:"Kirkpatrick",d:"Hard",q:"Measuring business impact such as lower fraud rates is which level?",o:["Reaction","Learning","Behavior","Results"],a:3,e:"사업성과·결과 = Level 4(Results). 함정: 행동과 혼동."},
{uid:"W4-064",set:"W4",tp:"Kirkpatrick",d:"Medium",q:"The Kirkpatrick model is most often applied to evaluate:",o:["Loan portfolios","Training effectiveness","Marketing campaigns","Share prices"],a:1,e:"Kirkpatrick = 교육 효과성 평가. 함정: 무관 대상."},
{uid:"W4-065",set:"W4",tp:"평가",d:"Hard",q:"Evaluating the anti-fraud system is a Q6 activity that assesses:",o:["How to build new rules","Whether the system works","The marketing reach","Daily loan volume"],a:1,e:"Q6 = anti-fraud 작동·효과 평가. Q7 = 구축. 함정: Q6/Q7 혼동."},
{uid:"W4-066",set:"W4",tp:"평가",d:"Hard",q:"The BOC supervision of anti-fraud uses how many key documents?",o:["A 2-document set","A 3-document framework","A 5-document set","A 10-document set"],a:1,e:"BOC 감독 = 3-document framework. 함정: 인접 숫자."},
{uid:"W4-067",set:"W4",tp:"평가",d:"Hard",q:"Meeting minutes in the communication structure should be dispatched within:",o:["1 week","24-48 hours","30 days","1 hour"],a:1,e:"회의록 발송 = 24~48시간. 함정: 인접 기간 혼동."},
{uid:"W4-068",set:"W4",tp:"평가",d:"Medium",q:"Evaluating internal audit effectiveness examines:",o:["Marketing campaign results","Quality, independence, impact","Sales revenue growth only","Daily share price movements"],a:1,e:"내부감사 효과 평가 = 품질·독립성·영향. 함정: 무관 지표."},
{uid:"W4-069",set:"W4",tp:"평가",d:"Hard",q:"If audit follow-up is only 65% (target 100%), the rating is:",o:["Fully Comply","Less Comply","Excellent","Not applicable"],a:1,e:"감사후속 65%(목표100%) = Less Comply. 함정: 'Fully'·'Excellent'은 오답 — textbook 사례."},
{uid:"W4-070",set:"W4",tp:"평가",d:"Hard",q:"A key metric for anti-fraud effectiveness is:",o:["The number of office plants kept","Fraud detection and resolution rate","The company logo color scheme","The CEO's personal golf handicap"],a:1,e:"지표 = 탐지·해결률·반복발생 빈도. 함정: 무관 항목으로 오도."},
{uid:"W4-071",set:"W4",tp:"평가",d:"Hard",q:"Recurring fraud of the same type indicates:",o:["An excellent system","Unaddressed root causes","No issue at all","Strong controls"],a:1,e:"동종 부정 반복 = 근본원인 미시정. 함정: '우수'·'강함'은 오답."},
{uid:"W4-072",set:"W4",tp:"평가",d:"Medium",q:"The ultimate goal of evaluating the anti-fraud system is to:",o:["Assign all blame to staff","Drive continuous improvement","Cut the overall headcount","Increase the regulatory fines"],a:1,e:"평가 목표 = 지속 개선. 함정: 비난·감원·벌금은 목적 아님."},
{uid:"W4-073",set:"W4",tp:"평가",d:"Hard",q:"The communication sub-structure for anti-fraud should ensure information is:",o:["Withheld from the board","Timely and well-documented","Shared with competitors","Kept entirely verbal"],a:1,e:"소통 구조 = 적시·문서화·적절 보고. 함정: 차단·구두만은 부실."},
{uid:"W4-074",set:"W4",tp:"평가",d:"Hard",q:"A BOD/BOC anti-fraud oversight report should include:",o:["Only the positive results","Cases, actions, and follow-up","Marketing campaign metrics","Competitor financial figures"],a:1,e:"감독 보고 = 사례·조치·후속·추세. 함정: 호재만·무관정보는 부실."},
{uid:"W4-075",set:"W4",tp:"4Aspects",d:"Hard",q:"The internal control system rests on how many core aspects?",o:["Two aspects","Four aspects","Six aspects","Eight aspects"],a:1,e:"내부통제 = 4개 핵심 측면(통제환경·위험평가·통제활동·모니터링 계열). 함정: 인접 숫자."},
{uid:"W4-076",set:"W4",tp:"4Aspects",d:"Hard",q:"The 'control environment' aspect refers to:",o:["The physical office building","The tone and integrity culture","The annual marketing plan","The full product catalog"],a:1,e:"통제환경 = 조직의 톤·청렴·구조. 함정: 물리적 환경으로 오인."},
{uid:"W4-077",set:"W4",tp:"4Aspects",d:"Hard",q:"'Control activities' include:",o:["Marketing campaigns","Approvals, reconciliations, segregation","Product launches","Salary reviews"],a:1,e:"통제활동 = 승인·대사·직무분리·검증. 함정: 무관 활동과 혼동."},
{uid:"W4-078",set:"W4",tp:"4Aspects",d:"Medium",q:"The 'monitoring' aspect ensures controls are:",o:["Ignored over time","Continuously assessed","Removed after a year","Hidden from audit"],a:1,e:"모니터링 = 통제 지속 평가·개선. 함정: 무시·제거는 반대."},
{uid:"W4-079",set:"W4",tp:"4Aspects",d:"Hard",q:"'Risk assessment' as a control aspect involves:",o:["Counting the total staff","Identifying and analyzing risks","Setting the product prices","Designing the company logos"],a:1,e:"위험평가 = 목표 대비 위험 식별·분석. 함정: 무관 작업."},
{uid:"W4-080",set:"W4",tp:"4Aspects",d:"Hard",q:"Information and communication as a control aspect ensures:",o:["Key data is kept hidden","Relevant info flows to users","All reports are destroyed","Staff are kept uninformed"],a:1,e:"정보·소통 = 관련정보 적시 전달. 함정: 은폐·미전달은 반대."},
{uid:"W4-081",set:"W4",tp:"POJK",d:"Hard",q:"The anti-fraud regulation requires the strategy to be approved by:",o:["The marketing head","The BOD and BOC","An external vendor","Individual staff"],a:1,e:"Anti-fraud 전략 승인 = BOD·BOC. 함정: 실무·외부 승인은 오답."},
{uid:"W4-082",set:"W4",tp:"POJK",d:"Hard",q:"The Primary Party prohibition (Art.9(4)) is intended to prevent:",o:["Excessive product marketing","Conflicts in fraud handling","Low overall profit margins","Slow loan approval times"],a:1,e:"Primary Party 금지 = 부정처리 이해상충 방지. 함정: 무관 목적."},
{uid:"W4-083",set:"W4",tp:"POJK",d:"Medium",q:"The 15-working-day deadline (Art.18) applies to:",o:["Loan fund disbursement","Correction/follow-up actions","Marketing plan approval","Monthly salary payment"],a:1,e:"15영업일 = 시정·후속 조치 기한. 함정: 무관 절차."},
{uid:"W4-084",set:"W4",tp:"POJK",d:"Hard",q:"Administrative sanctions under the anti-fraud regulation may include:",o:["A staff bonus increase","Written warnings and fines","An automatic license upgrade","Corporate tax relief grants"],a:1,e:"행정제재 = 서면경고·벌금·활동제한 등. 함정: 보상·면제는 정반대."},
{uid:"W4-085",set:"W4",tp:"4Pillars",d:"Hard",q:"Pre-employment screening of candidates supports which pillar?",o:["Detection","Prevention","Investigation","Sanctioning"],a:1,e:"채용 전 심사 = 예방 기둥(KYE). 함정: 탐지와 혼동."},
{uid:"W4-086",set:"W4",tp:"4Pillars",d:"Hard",q:"Analyzing transaction anomalies to spot fraud is which pillar?",o:["Prevention","Detection","Investigation","Monitoring"],a:1,e:"이상거래 분석 = 탐지 기둥. 함정: 예방·조사와 혼동."},
{uid:"W4-087",set:"W4",tp:"RBA",d:"Hard",q:"All three elements of the fraud triangle being present means:",o:["Fraud is impossible","Fraud risk is elevated","Controls are perfect","Audit is unnecessary"],a:1,e:"3요소 동시 존재 = 부정위험 고조. 함정: 위험 부재로 오인."},
{uid:"W4-088",set:"W4",tp:"RBA",d:"Medium",q:"Reducing 'rationalization' is supported by:",o:["Weaker internal controls","A strong ethics culture","Higher financial pressure","Less compliance training"],a:1,e:"합리화 억제 = 윤리문화·tone at the top. 함정: 나머지는 부정 조장."},
{uid:"W4-089",set:"W4",tp:"InternalAudit",d:"Hard",q:"Internal audit's relationship to the anti-fraud function is to:",o:["Run the fraud investigations itself","Independently assure its effectiveness","Replace the entire internal fraud team","Market the internal control system"],a:1,e:"내부감사 = anti-fraud 효과 독립 보증(3선). 함정: 실무수행·대체는 오답."},
{uid:"W4-090",set:"W4",tp:"InternalAudit",d:"Hard",q:"When internal audit detects fraud, it should:",o:["Conceal it for the image","Report through proper channels","Handle it entirely alone","Inform the rival competitors"],a:1,e:"감사 부정탐지 = 정상채널 보고·에스컬레이션. 함정: 은폐·단독처리는 부적절."},

const KEY="A B C D".split(" ");
function wkey(set){return "sppi_wrong_"+set+"_v2"}
function getW(set){try{return JSON.parse(localStorage.getItem(wkey(set)))||[]}catch(e){return[]}}
function setW(set,a){try{localStorage.setItem(wkey(set),JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrongUid(uid){const [set,id]=uid.split("-");const w=getW(set);if(!w.includes(id)){w.push(id);setW(set,w)}}
function rmWrongUid(uid){const [set,id]=uid.split("-");setW(set,getW(set).filter(x=>x!==id))}
function allWrongUids(){let r=[];for(const set of ["W1","W2","W3","W4","GAP"]){r=r.concat(getW(set).map(id=>set+"-"+id))}return r}
function byUid(uid){return BANK.find(q=>q.uid===uid)}
function clearAllWrong(){for(const set of ["W1","W2","W3","W4","GAP"])setW(set,[])}
// 실전 비중 가중: W3(거버넌스·리스크) 최대, W4·W1·W2 순
const WEIGHTS={W1:7, W2:7, W3:12, W4:9, GAP:5}; // 합 40 (GAP=교재대조 보강분)
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function buildExam(){
  let picked=[];
  for(const set of ["W1","W2","W3","W4","GAP"]){
    const pool=BANK.filter(q=>q.set===set);
    picked=picked.concat(shuffle(pool).slice(0, WEIGHTS[set]));
  }
  // 전체 순서도 섞고 보기도 셔플
  return shuffle(picked).map(shuffleOpts);
}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(allWrongUids().map(byUid).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp.map(shuffleOpts);cur=0;answers=[];render();return;
  }
  quiz=buildExam();
  cur=0; answers=[]; render();
}

  app.innerHTML=`

function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span><span class="setbadge set${q.set}">${q.set}</span> &nbsp;${q.uid}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={uid:q.uid,set:q.set,correct:__c,picked:i};
  if(__c) rmWrongUid(q.uid); else addWrongUid(q.uid);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const bySet={};
  answers.forEach(a=>{bySet[a.set]=bySet[a.set]||{r:0,n:0};bySet[a.set].n++;if(a.correct)bySet[a.set].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  const order=["W1","W2","W3","W4","GAP"];
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${order.filter(s=>bySet[s]).map(s=>`<div class="row"><span><span class="setbadge set${s}">${s}</span></span><b>${bySet[s].r} / ${bySet[s].n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">${x.q.uid} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,68)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="start()">새 회차 응시</button>
        ${allWrongUids().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${allWrongUids().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
