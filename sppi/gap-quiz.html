<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}

  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}

  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}

  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}

  .opt.wrong{background:#f7e9e6;border-color:var(--red)}

  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}

  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts button.primary{border-color:var(--green);background:#f0f6f2}
  .start-opts button.primary:hover{border-color:var(--green)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  .backlink{display:inline-block;margin-bottom:14px;font-size:13px;color:#5d6075;text-decoration:none}
  .backlink:hover{color:var(--ink)}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>
</head>

<script>
const BANK = [
{id:"001",tp:"W2·장기전략",d:"Hard",q:"Which of the following is a LONG-TERM business strategy, not a short-term one?",o:["Green and sustainable finance hub development","Strengthening collectibility with AI scoring","Digital onboarding with e-KYC and OCR","Funding efficiency via retail bond issuance"],a:0,e:"장기 4종 = Financial Super App·Green & Sustainable Finance Hub·Underbanked Expansion·Strategic Partnerships. 나머지는 단기."},
{id:"002",tp:"W2·장기전략",d:"Hard",q:"Integrating loans, investment, micro-insurance and payments with AI personalization is the strategy:",o:["Operational excellence drive","Financial super app platform","Customer intimacy program","Digital onboarding rollout"],a:1,e:"통합 플랫폼+AI 개인화 = Financial Super App. Operational Excellence·Customer Intimacy는 §4 단기 Objective 유형."},
{id:"003",tp:"W2·장기전략",d:"Hard",q:"Sustainability-Linked Loans and green crowdfunding belong to which long-term strategy?",o:["Financial super app platform","Strategic partnerships and alliances","Green and sustainable finance hub","Underbanked segment expansion"],a:2,e:"SLL·green 크라우드펀딩·ESG financing = Green & Sustainable Finance Hub. 목표는 green 포트폴리오 30%."},
{id:"004",tp:"W2·장기전략",d:"Medium",q:"Agent-based kiosks, warung partnerships and gamified financial education describe:",o:["Green finance hub development","Financial super app platform","Strategic partnerships and alliances","Underbanked segment expansion"],a:3,e:"agent 기반(kiosk·warung)+gamification 교육 = Underbanked Segment 확장. 목표 tier-3·4 신규 500만명."},
{id:"005",tp:"W2·장기전략",d:"Hard",q:"A telco joint venture and B2B2C MSME SaaS aiming to cut acquisition cost map to:",o:["Digital onboarding rollout","Strategic partnerships and alliances","Green sustainable finance hub","Financial super app platform"],a:1,e:"통신사 JV·MSME SaaS·regtech 제휴로 CAC 40%↓ = Strategic Partnerships & Alliances."},
{id:"006",tp:"W2·장기전략",d:"Hard",q:"Among the four long-term business strategies in the Day 2 module, the target 'green portfolio reaching 30% of total assets' is set under which strategy?",o:["Underbanked segment expansion","Strategic partnerships alliances","Green and sustainable finance hub","Funding efficiency program"],a:2,e:"green 포트폴리오 총자산 30% = Green & Sustainable Finance Hub의 목표."},
{id:"007",tp:"W2·장기전략",d:"Medium",q:"Which list contains ONLY long-term strategies?",o:["Value, product, customer, operational excellence","PESTEL, SWOT, Porter, benchmarking analysis","Onboarding, micro product, funding, collectibility","Super app, green hub, underbanked, partnerships"],a:3,e:"장기 4종만 묶인 것은 B. A는 단기, C는 §4 Objective 유형, D는 분석 도구."},
{id:"008",tp:"W2·Validity",d:"Hard",q:"Which is NOT one of the three types of Validity in the compliance-data module?",o:["Relevance validity of the data","Content validity of the tool","Construct validity of the tool","Criterion-related validity of results"],a:0,e:"Validity 3종 = Content·Construct·Criterion-related. 'Relevance'는 별개 축이라 'Relevance Validity'는 함정."},
{id:"009",tp:"W2·Validity",d:"Hard",q:"In the three types of Validity used to assess a compliance-data tool, the property that a tool's content represents all aspects it intends to measure is:",o:["Criterion-related validity check","Reliability of the instrument","Content validity assessment","Construct validity assessment"],a:2,e:"내용이 측정 대상의 모든 측면 대표 = Content Validity."},
{id:"010",tp:"W2·Validity",d:"Hard",q:"In the three types of Validity used to assess a compliance-data tool, the property that a tool actually measures the intended concept or variable is:",o:["Criterion-related validity check","Relevance of the data set","Content validity assessment","Construct validity assessment"],a:3,e:"의도한 개념·변수를 실제 측정 = Construct Validity."},
{id:"011",tp:"W2·Validity",d:"Hard",q:"In the three types of Validity used to assess a compliance-data tool, the property shown when a tool's results correlate with results from another accepted tool is:",o:["Criterion-related validity","Comprehensiveness of coverage","Content validity of items","Construct validity of design"],a:0,e:"타당 인정된 다른 도구 결과와 상관 = Criterion-related Validity."},
{id:"012",tp:"W2·Validity",d:"Medium",q:"When evaluating compliance data, attendance rates and pre/post-test results are examples used to demonstrate which data property?",o:["Validity of the instrument","Relevance to the objective","Reliability across time","Materiality to the audit"],a:1,e:"출석률·pre/post-test·위반 감소 = Relevance 예시. Validity와 별개 축."},
{id:"013",tp:"W2·ComplData",d:"Hard",q:"Evidence of 'Know Your Employee (KYE)' belongs to which compliance-data category?",o:["Tax compliance filing data","Business plan realization data","Consumer protection complaint data","AML, CFT and PPPSPM data"],a:3,e:"KYE는 KYC·CDD·STR·CTR·FIR과 함께 AML/CFT/PPPSPM. KYC=고객, KYE=직원."},
{id:"014",tp:"W2·ComplData",d:"Hard",q:"The 'Financial Integrity Rating (FIR)' referenced in compliance data is issued by:",o:["PPATK integrity team","DJP taxation office","Bank Indonesia macro unit","OJK supervisory team"],a:0,e:"FIR by PPATK — PPATK팀의 무결성 등급. AML/CFT 데이터에 포함."},
{id:"015",tp:"W2·ComplData",d:"Medium",q:"Complaint counts, handling time and complaint channels form part of which data?",o:["AML and CFT screening data","Consumer protection data","Taxation compliance data","Capital adequacy data"],a:1,e:"민원 건수·처리시간·채널 = Consumer Protection 데이터."},
{id:"016",tp:"W2·ComplData",d:"Hard",q:"Among the compliance-data categories, internal violations detected and regulatory sanctions imposed are tracked as which type of indicator?",o:["Capital and gearing ratios","Funding diversification metrics","Compliance risk indicators","Business plan realization KPIs"],a:2,e:"내부 위반·제재 건수·리스크 트렌드 = Compliance Risk Indicators."},
{id:"017",tp:"W2·ComplData",d:"Hard",q:"How do KYC and KYE differ?",o:["KYC targets customers, KYE employees","Both apply only to customers","Both apply only to employees","KYC targets employees, KYE customers"],a:0,e:"KYC = Know Your Customer(고객), KYE = Know Your Employee(직원). 둘 다 AML/CFT."},
{id:"018",tp:"W2·Followup",d:"Hard",q:"When the compliance function plans follow-up actions for a newly issued regulation, which of the following is one of the four key variables to consider?",o:["Dividend payout ratio target","Form of the recommendation","Branch parking capacity plan","Annual marketing calendar"],a:1,e:"4대 변수 = 규제유형·관련 부서·권고 형태(Form)·권고 목적."},
{id:"019",tp:"W2·Followup",d:"Hard",q:"Among the four key variables for regulatory follow-up, identifying which clauses directly affect HR, IT or governance corresponds to which variable?",o:["Form of the recommendation","Purpose of the recommendation","Types of regulations and impact","Relevant work units involved"],a:2,e:"영향 받는 조항 식별 = Types of Regulations & Their Impact."},
{id:"020",tp:"W2·Followup",d:"Medium",q:"Among the four key variables for regulatory follow-up, a cross-functional FGD with attached risk analysis and timeline reflects which variable?",o:["Purpose of the recommendation","Types of regulations and impact","Relevant work units involved","Form of the recommendation"],a:3,e:"메모·FGD + 리스크분석·비용·타임라인 첨부 = Form of Recommendation."},
{id:"021",tp:"W2·Followup",d:"Hard",q:"When assigning a new regulation to the responsible departments, which is NOT among the listed relevant work units for regulatory follow-up?",o:["Risk management division","Marketing and branding team","Internal audit function","Legal and compliance unit"],a:1,e:"관련 부서 = Legal&Compliance·Risk·IT·HRD·Internal Audit·Operations. Marketing&Branding 미포함."},
{id:"022",tp:"W2·Analysis",d:"Hard",q:"In compliance-level analysis, which is an 'Analysis Output' rather than an objective?",o:["Identifying the non-comply areas","Providing a basis for decisions","Producing a digital dashboard","Producing timely compliance reports"],a:2,e:"Output 4종 = Compliance matrix·Audit reports·Digital dashboard·Risk plans. 나머지는 Objectives."},
{id:"023",tp:"W2·Analysis",d:"Hard",q:"Which is one of the four 'Analysis Objectives' in compliance-level analysis?",o:["An audit dashboard product","A risk follow-up plan","A compliance matrix output","Identifying non-comply areas"],a:3,e:"Objectives 4종 = non-comply 식별·정책 개선 권고·의사결정 근거·정시 보고. 나머지는 Output."},
{id:"024",tp:"W2·Analysis",d:"Medium",q:"In compliance-level analysis (Unit 2), audit reports and risk follow-up plans are classified as which of the two categories (objectives vs outputs)?",o:["Analysis outputs produced","Validity types listed","Compliance principles held","Analysis objectives set"],a:0,e:"Audit reports·Risk follow-up plans = Analysis Output 4종."},
{id:"025",tp:"W2·Analysis",d:"Hard",q:"In compliance-level analysis (Unit 2), providing a basis for management decision-making is classified as which of the two categories?",o:["Validity criterion applied","Analysis output delivered","Analysis objective pursued","Compliance report area"],a:2,e:"의사결정 근거 제공 = Analysis Objective. Output과 혼동 주의."},
{id:"026",tp:"W2·Analysis",d:"Hard",q:"In compliance-level analysis (Unit 2), which pair correctly separates an analysis objective from an analysis output?",o:["Both items are objectives","Both items are outputs","Objective dashboard / output non-comply","Objective non-comply / output dashboard"],a:3,e:"목적=non-comply 식별, 산출물=dashboard. B가 올바른 구분."},
{id:"027",tp:"W2·Report8",d:"Hard",q:"Which is explicitly a component of the Finance Company Compliance Report?",o:["Personal data protection area","Each director's stock portfolio","Next quarter dividend plan","Ten-year historical financials"],a:0,e:"8영역 = Compliance Function·GCG·AML/CFT·Consumer Protection·Personal Data Protection·Taxation·Development&Strengthening·Other."},
{id:"028",tp:"W2·Report8",d:"Hard",q:"Which is NOT one of the eight Compliance Report areas?",o:["Taxation compliance status","Marketing performance review","Consumer protection status","Implementation of good governance"],a:1,e:"Marketing performance는 8영역에 없음. GCG·Taxation·Consumer Protection은 포함."},
{id:"029",tp:"W2·Report8",d:"Medium",q:"Within the eight areas of the Finance Company Compliance Report, Personal Data Protection is treated as:",o:["Not reported at all","Reported only by Sharia firms","Merged into the GCG area","A separate standalone area"],a:3,e:"Personal Data Protection은 8영역 중 별도 항목."},
{id:"030",tp:"W2·Report8",d:"Hard",q:"Which area covers AML, CFT and PPPSPM in the Compliance Report?",o:["The AML, CFT, PPPSPM area","The corporate governance area","The consumer protection area","The taxation reporting area"],a:0,e:"AML·CFT·PPPSPM은 8영역 중 독립 항목."},
{id:"031",tp:"W2·Report8",d:"Hard",q:"'Development and Strengthening of the Financial Services Sector' in the report is:",o:["A marketing growth target","A mandated report area","A dividend distribution rule","An external audit opinion"],a:1,e:"Development & Strengthening = 8영역 중 하나(시험 단골 distractor)."},
{id:"032",tp:"W2·Philosophy",d:"Hard",q:"Among the six philosophies of compliance culture, which one holds that leaders must model rule-abiding and ethical behavior themselves?",o:["Compliance as an internal value","Continuous improvement evaluation","Leadership leading by example","Driver of organizational performance"],a:2,e:"Leading by Example = tone at the top. 6 Philosophy 중 하나."},
{id:"033",tp:"W2·Philosophy",d:"Hard",q:"Among the six philosophies of compliance culture, treating compliance as a voluntarily internalized value reflects which philosophy?",o:["Compliance as an internal value","Education and awareness building","Pillar of trust and reputation","Driver of organizational performance"],a:0,e:"자발적·내면화된 가치 = Compliance as an Internal Value."},
{id:"034",tp:"W2·Philosophy",d:"Medium",q:"Among the six philosophies of compliance culture, the view that evaluation is an endless process spotting improvement opportunities is:",o:["Compliance as internal value","Continuous improvement evaluation","Leadership leading by example","Pillar of trust and reputation"],a:1,e:"평가는 끝없는 과정·개선 기회 = Continuous Improvement Through Evaluation."},
{id:"035",tp:"W2·Philosophy",d:"Hard",q:"Which statement is FALSE about evaluating compliance culture?",o:["Leadership example is essential here","Tone at the top genuinely matters","Full report submission proves strong culture","Voluntary reporting signals internalization"],a:2,e:"보고 제출율 100%만으로 문화 우수 = 오답. tone at the top·자발적 보고까지 봐야 함."},
{id:"036",tp:"W3·RMReports",d:"Hard",q:"Which is one of the four report types relevant for risk management in the Q6 unit?",o:["Annual dividend statement","Monthly marketing report","Quarterly VAT return filing","Risk profile report document"],a:3,e:"RM 보고서 4종 = Key Risk·Risk Profile·Company Health Level·Risk Governance Report."},
{id:"037",tp:"W3·RMReports",d:"Hard",q:"Among the four risk-management report types, the report describing the 5–10 risks of top concern to Directors is the:",o:["Risk governance overview report","Key risk report summary","Risk profile rating report","Company health level report"],a:1,e:"Directors 최우선 관심 5~10개 핵심 리스크 = Key Risk Report."},
{id:"038",tp:"W3·RMReports",d:"Medium",q:"Among the four risk-management report types, the report profiling all risk types and deriving NET RISK is the:",o:["Risk governance overview report","Key risk report summary","Risk profile rating report","Company health level report"],a:2,e:"전 리스크 유형 프로파일·NET RISK 산출 = Risk Profile Report."},
{id:"039",tp:"W3·RMReports",d:"Hard",q:"The Company Health Level Report is built on which four factors?",o:["Plan, do, check and act","People, process, system and data","Sales, cost, profit and growth","Governance, profile, profitability, capital"],a:3,e:"Health Level 4 factor = Governance·Risk Profile·Profitability·Capital."},
{id:"040",tp:"W3·RMReports",d:"Hard",q:"Among the four risk-management report types, which one describes the firm's risk governance implementation?",o:["Risk governance overview report","Company health level report","Key risk report summary","Risk profile rating report"],a:0,e:"기업 리스크 거버넌스 이행 기술 = Risk Governance Report."},
{id:"041",tp:"W3·NetRisk",d:"Hard",q:"In a Risk Profile Report, NET RISK is derived from:",o:["Inherent risk times gearing ratio","Inherent risk minus capital base","Inherent risk times control quality","Impact summed with likelihood"],a:2,e:"NET RISK = Inherent Risk × KPMR(Risk Control = Residual)."},
{id:"042",tp:"W3·NetRisk",d:"Hard",q:"As KPMR (quality of risk-control implementation) improves, NET RISK:",o:["Stays fixed regardless of it","Converts into inherent risk","Increases proportionally with it","Decreases as control improves"],a:3,e:"KPMR(통제 품질) 高 → NET RISK 하락. Inherent만으로 판정은 오답."},
{id:"043",tp:"W3·NetRisk",d:"Hard",q:"In a Risk Profile Report, Inherent Risk, KPMR and Risk Profile ratings are each measured on a scale of:",o:["From level 1 to 5","From 0 up to 100","From grade A to F","From level 1 to 3"],a:0,e:"각 등급 1~5 scale."},
{id:"044",tp:"W3·NetRisk",d:"Hard",q:"Which is one of the four KPMR (risk-control) components?",o:["Marketing reach expansion","BOD and BOC active oversight","Dividend distribution policy","Branch network headcount"],a:1,e:"KPMR 4요소 = BOD/BOC 감독·Policy&Procedure·RM Process(+MIS)·Internal Control System."},
{id:"045",tp:"W3·NetRisk",d:"Medium",q:"In a Risk Profile Report, the Inherent Risk rating reflects each risk's:",o:["Marketing spend amount","Branch geographic location","Staff seniority profile","Frequency and impact level"],a:3,e:"Inherent Risk = 8대 Risk의 Frequency & Impact, 1~5 등급."},
{id:"046",tp:"W3·NetRisk",d:"Hard",q:"Judging NET RISK from Inherent Risk alone, ignoring KPMR, is:",o:["Incorrect, KPMR is required","Required under POJK rules","Applied only to capital","Correct standard practice"],a:0,e:"NET RISK = Inherent × KPMR. KPMR 무시는 오답."},

{id:"048",tp:"W3·GovReport",d:"Hard",q:"Within the Risk Governance Report's five contents, an independent-party assessment of risk governance is part of the:",o:["Quarterly taxation report","Key risk report summary","Risk governance overview report","Company health level report"],a:2,e:"독립 평가는 Risk Governance Report 5내용 중 하나."},

{id:"052",tp:"W3·IntControl",d:"Hard",q:"Under POJK 42/2024, the internal-control evaluation now has ten checkpoints; which is one of the two checkpoints ADDED beyond the original eight?",o:["Reporting accuracy and timeliness","Compliance procedure adequacy review","The organizational structure check","Documentation of audit-based procedures"],a:3,e:"⑨ 감사결과 기반 운영절차 문서화, ⑩ 정기 검증·시정이 추가분. 나머지는 기존 8개."},
{id:"053",tp:"W3·IntControl",d:"Medium",q:"Among the ten internal-control evaluation checkpoints under POJK 42/2024, periodic verification plus corrective action for deviations is:",o:["Not on the checklist at all","The tenth control checkpoint","A taxation reporting rule","A marketing control measure"],a:1,e:"정기 검증·review + 편차 시정 = 10번째 항목(추가분)."},

{id:"056",tp:"W3·DataQual",d:"Hard",q:"In identifying supporting data for governance/RM evaluation, which is EXTERNAL data?",o:["OJK and macroeconomic developments","HR and infrastructure information","The internal audit report","Past risk-incident operations data"],a:0,e:"External = 시장·산업·OJK 규제동향·거시경제. 나머지는 Internal."},
{id:"057",tp:"W3·DataQual",d:"Hard",q:"When assessing the supporting data for a governance/RM evaluation, which is one of the three Data Quality criteria?",o:["Leverage of the data","Profitability of the data","Accuracy of the data","Liquidity of the data"],a:2,e:"Data Quality 3기준 = Accuracy·Relevance·Comprehensiveness."},
{id:"058",tp:"W3·DataQual",d:"Medium",q:"Financial reports, operational ERP data and internal audit reports are classified as:",o:["Macro analysis data","Regulatory trend data","External market data","Internal company data"],a:3,e:"재무보고·운영데이터·내부감사·HR 정보 = Internal Data."},

{id:"082",tp:"W4·Monitor4",d:"Hard",q:"The FIRST main step in monitoring IA findings follow-up is:",o:["Escalating the open issues","Developing a follow-up plan","Evaluating the final results","Closing the audit file"],a:1,e:"4단계 = Follow-up Plan 개발 → Regular Monitoring → Issue Escalation → Evaluating Final Results."},
{id:"083",tp:"W4·Monitor4",d:"Hard",q:"Among the four steps of monitoring internal-audit findings follow-up, using dashboards and status reports for periodic progress review corresponds to:",o:["Evaluating the final results","Developing the follow-up plan","Conducting regular monitoring","Escalating the open issues"],a:2,e:"정기 진척 review·dashboard = Regular Monitoring."},

{id:"086",tp:"W4·Monitor4",d:"Hard",q:"Which is the correct order of the four monitoring steps?",o:["Results, monitoring, plan, escalation","Monitoring, plan, escalation, results","Plan, monitoring, escalation, results","Escalation, plan, monitoring, results"],a:2,e:"순서 = Follow-up Plan → Regular Monitoring → Issue Escalation → Evaluating Final Results."},
{id:"087",tp:"W4·Report7",d:"Hard",q:"Which is a mandatory element of the audit follow-up monitoring report?",o:["The company's marketing plan","The annual dividend schedule","The auditor's personal salary","Effectiveness analysis of actions"],a:3,e:"7요소 = Findings·Follow-Up Status·Recommendations·Actions Taken·Effectiveness Analysis·Implementation Barriers·Conclusion."},
{id:"088",tp:"W4·Report7",d:"Hard",q:"Among the seven elements of the audit follow-up monitoring report, describing management's documented steps with supporting evidence is which element?",o:["The actions-taken element","The recommendations element","The conclusion element","The findings summary element"],a:0,e:"경영진·부서 조치 + 증빙 = Actions Taken."},

{id:"090",tp:"W4·Report7",d:"Hard",q:"Among the audit follow-up monitoring report's five quality principles, the principles are objective, timely, accurate, comprehensive and:",o:["Confidential to the board","Marketable to clients","Profitable for the firm","Concise in its wording"],a:3,e:"품질 5원칙 = objective·timely·accurate·comprehensive·concise."},
{id:"091",tp:"W4·Report7",d:"Hard",q:"Among the seven elements of the audit follow-up monitoring report, classifying findings by impact and risk grade (high/medium/low) appears under:",o:["The findings summary element","The actions-taken element","The conclusion element","The effectiveness analysis"],a:0,e:"findings 요약·영향·리스크 등급 = Findings 요소."},
{id:"092",tp:"W4·SigImpact",d:"Hard",q:"In the three-step significant-impact analysis for audit findings, measuring impact magnitude in monetary or descriptive terms is:",o:["The impact identification step","The impact quantification step","The probability assessment step","The risk scoring routine"],a:1,e:"분석 3단계 = Impact Identification → Impact Quantification → Probability Assessment."},
{id:"093",tp:"W4·SigImpact",d:"Hard",q:"In the three-step significant-impact analysis for audit findings, identifying whether impact is financial, operational, reputational or compliance is:",o:["The impact quantification step","The probability assessment step","The escalation routine step","The impact identification step"],a:3,e:"영향 영역(Financial·Operational·Reputational·Compliance) 식별 = Impact Identification."},
{id:"094",tp:"W4·SigImpact",d:"Medium",q:"In the three-step significant-impact analysis for audit findings, assessing likelihood as High/Medium/Low via history and interviews is:",o:["The probability assessment step","The documentation routine step","The impact identification step","The impact quantification step"],a:0,e:"발생가능성(High/Med/Low) = Probability Assessment."},

{id:"096",tp:"W4·Comm",d:"Hard",q:"The four-stage communication strategy with the auditee is:",o:["Identify, measure, control, report","Prevention, detection, investigation, monitoring","Planning, implementation, closing, monitoring","Reaction, learning, behavior, results"],a:2,e:"소통 4단계 = Planning·Implementation·Closing·Monitoring. A는 4 Pillars, C는 Kirkpatrick."},
{id:"097",tp:"W4·Comm",d:"Hard",q:"Which is one of the five core principles of auditee communication?",o:["Solution-oriented dialogue","Ambiguity in the message","Rigidity in the approach","Secrecy from the auditee"],a:0,e:"5원칙 = Clarity&Transparency·Openness&Collaboration·Consistency·Solution-Oriented·Flexibility."},
{id:"098",tp:"W4·Comm",d:"Medium",q:"In the four-stage auditee communication strategy, using interim reports during regular meetings to resolve issues early is which stage?",o:["The planning stage","The implementation stage","The closing stage","The monitoring stage"],a:1,e:"정기 회의 + interim report로 조기 해결 = Implementation 단계."},

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_GAP";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp.map(shuffleOpts);
    cur=0;answers=[];render();return;
  }
  let pool=(mode==='all')?shuffle(BANK):shuffle(BANK).slice(0,30);
  quiz=pool.map(shuffleOpts);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">교재 대조 보강분 100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button class="primary" onclick="start('all')">전체 100문항 (권장) <span class="desc">미학습 보강 전 범위 완주 — W2·W3·W4 신규 항목</span></button>
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">전 범위에서 무작위 30개 빠른 점검</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">GAP-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID GAP-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp.split('·')[0];byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">GAP-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
