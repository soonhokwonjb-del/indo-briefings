<style>
  :root{

    --shadow:0 8px 24px rgba(15,27,45,.09); --shadow-lg:0 18px 44px rgba(15,27,45,.20);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    line-height:1.5;overscroll-behavior:none}
  body{max-width:560px;margin:0 auto;min-height:100vh;padding:0 0 40px;position:relative}

  header{padding:20px 20px 10px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-top:3px}
  h1 .sub{display:block;font-size:12px;font-weight:500;color:var(--ink-2);letter-spacing:0;margin-top:4px}

  .qtabs{display:flex;gap:4px;padding:10px 20px;position:sticky;top:0;z-index:20;flex-wrap:wrap;
    background:linear-gradient(var(--paper) 82%,rgba(247,244,236,0))}
  .qtab{flex:1 1 15%;min-width:52px;border:1.5px solid var(--line);background:var(--card);border-radius:11px;
    padding:8px 2px;cursor:pointer;transition:.16s;text-align:center}
  .qtab .qn{font-size:14px;font-weight:800;color:var(--ink);line-height:1}
  .qtab .ql{font-size:8.5px;font-weight:700;color:var(--ink-2);letter-spacing:.02em;margin-top:3px}
  .qtab[aria-selected="true"]{border-color:var(--ink);background:var(--ink)}
  .qtab[aria-selected="true"] .qn{color:#fff}
  .qtab[aria-selected="true"] .ql{color:#e8b9ac}

  .panel{padding:6px 20px 0;display:none}
  .panel.on{display:block;animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  .qhead{background:var(--ink);color:#fff;border-radius:16px;padding:15px 16px;margin:8px 0 6px;box-shadow:var(--shadow-lg)}
  .qhead .en{font-size:11px;letter-spacing:.04em;color:#e8b9ac;font-weight:700}
  .qhead .kr{font-size:16px;font-weight:800;margin-top:4px;line-height:1.35}

  .flow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin:10px 0 6px;box-shadow:var(--shadow)}
  .flow .tag{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:800}
  .flow ul{list-style:none;display:flex;flex-direction:column;gap:7px;margin-top:8px}
  .flow li{font-size:13px;color:var(--ink-2);padding-left:18px;position:relative;line-height:1.5}
  .flow li::before{content:"\203A";position:absolute;left:2px;top:-1px;color:var(--accent);font-weight:800;font-size:15px}
  .flow li b{color:var(--ink)}
  .flow .reg{display:inline-block;background:#eee7d7;color:var(--gold);font-weight:700;padding:1px 7px;border-radius:6px;font-size:11px}
  .risk{background:#faf1ee;border:1px solid #e8cfc8;border-radius:12px;padding:11px 13px;margin:8px 0}
  .risk .rt{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);font-weight:800;margin-bottom:5px}
  .risk ul{list-style:none;display:flex;flex-direction:column;gap:4px}
  .risk li{font-size:12px;color:var(--ink-2);padding-left:14px;position:relative;line-height:1.45}
  .risk li::before{content:"\26A0";position:absolute;left:0;top:0;font-size:9px}

  .fu-wrap{margin:10px 0 4px;display:flex;flex-direction:column;gap:7px}
  .fu{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden}
  .fu summary{list-style:none;cursor:pointer;padding:11px 14px;font-size:13px;font-weight:700;color:var(--ink);display:flex;gap:8px;align-items:flex-start;transition:.15s}
  .fu summary::-webkit-details-marker{display:none}
  .fu[open] summary{border-bottom:1px solid var(--line);background:#faf7f0}
  .fu-q{background:var(--accent);color:#fff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:6px;flex:0 0 auto;margin-top:1px}
  .fu-a{padding:11px 14px 13px;font-size:12.5px;color:var(--ink-2);line-height:1.55}
  .fu-a b{color:var(--ink)}

  .memlabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:800;margin:16px 2px 8px;display:flex;align-items:center;gap:7px}
  .memlabel::after{content:"";flex:1;height:1px;background:var(--line)}

  /* CV background panel */
  .cv{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;box-shadow:var(--shadow);margin:8px 0}
  .cv h3{font-size:14px;font-weight:800;color:var(--ink);margin:14px 0 6px}
  .cv h3:first-child{margin-top:0}
  .cv p{font-size:13px;color:var(--ink-2);line-height:1.6;margin-bottom:6px}
  .cv .num{background:var(--accent-soft);color:var(--accent);font-weight:800;padding:1px 6px;border-radius:5px}
  .cv .warn{background:#fff6e8;border-left:3px solid var(--gold);padding:9px 11px;border-radius:8px;font-size:12px;color:var(--ink-2);margin-top:8px}
  .cv .warn b{color:var(--gold)}

  footer{text-align:center;font-size:11px;color:var(--ink-2);padding:18px 20px 0;opacity:.72;line-height:1.7}
  footer b{color:var(--accent)}
</style>
</head>

      {q:"QAIP가 뭔가?", a:"감사기능 품질개선 프로그램(Quality Assurance & Improvement Program). 감사 <b>기능 자체</b>의 효율성·효과성·준수성을 KPI로 정기 평가. Gap Analysis·Self-Assessment·External/Peer Review 3기법."}

  }
];

const panels=document.getElementById("panels");
const qtabs=document.getElementById("qtabs");

TABS.forEach((T,ti)=>{

    qtabs.querySelectorAll(".qtab").forEach(x=>x.setAttribute("aria-selected","false"));

    panels.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));

    window.scrollTo({top:0,behavior:"smooth"});

  const p=document.createElement("section");
  p.className="panel"+(ti===0?" on":""); p.id="p-"+T.id;

  if(T.cv){
    p.innerHTML=`
      <div class="qhead"><div class="en">${T.en}</div><div class="kr">${T.kr}</div></div>
      <div class="cv">
        <h3>경력 골격</h3>
        <p>한국 캐피탈(여신전문금융) <span class="num">19년</span> — 전략기획·사업운영·M&A/PMI·여신관리·조직운영. 경영 전 주기 경험.</p>

        <div class="warn">⚠️ <b>주의</b> — 23조·1.7조·28%·1위는 모두 <b>한국 실적</b>. KBBF(인니) 지표 아님. 인터뷰에서 KBBF 현황으로 오인 발언 금지. 한국 성과는 "니치 리더를 만든 역량 증명"으로만 사용.</p>

        <p>조직 재설계·채권관리·NPF 전략 담당, 인수 후 안정화·흑자전환 주도. 학습: 인수 직후 핵심은 거버넌스 정립·내부통제 이식·리스크관리 제도화·신뢰 기반 연결. → KBBF 인수 후 안정화와 직결.</p>
        <h3>성장·건전성 균형</h3>
        <p>성장은 건전성·수익성 규율과 함께 작동할 때만 지속 가능. 고객·채권 데이터 분석·Collection 전략·자산건전성 규제 대응·전사 Collection 시스템 구축 경험 → 인니 NPF 관리·사후 모니터링·포트폴리오 관리와 직결.</p>
        <h3>디지털 역량</h3>
        <p>사내 신규사업(스타트업) 조직 리드·디지털 서비스 기획·출범, 그룹 대형 IT 통합 주도, 모바일 금융 서비스 추진. → KBBF 모바일 신용평가·실행·E-Mobility 플랫폼 연계 뒷받침.</p>
        <h3>현지 준비</h3>
        <p><span class="num">2025/7~ 약 10개월</span> 자카르타 상주. OJK 프레임워크·멀티파이낸스 산업·현지 자금조달·비즈니스 문화 학습, KBBF 사업현황·포트폴리오 직접 점검. 외부 관찰이 아닌 현지 거주 기반 이해.</p>

        <details class="fu"><summary><span class="fu-q">Q</span> 19년 경력을 한 문장으로?</summary><div class="fu-a">한국 캐피탈 산업에서 전략기획·사업운영·M&A/PMI·여신관리·조직운영에 걸쳐 경영 전 주기를 책임진 금융회사 경영자.</div></details>

        <details class="fu"><summary><span class="fu-q">Q</span> 왜 당신이 KBBF PD 적임자인가?</summary><div class="fu-a">① 니치 리더를 만든 성장 역량(한국 1위) ② 인수 후 안정화·흑자전환 PMI 경험 ③ 성장·건전성 균형 원칙 ④ 디지털 전환 실행력 ⑤ 10개월 현지 상주로 축적한 인니 시장·규제 이해.</div></details>

  }
  panels.appendChild(p);
});
</script>
