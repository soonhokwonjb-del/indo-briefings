<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPPI Level 7 — W1 Quiz (Industry & POJK Framework)</title>
<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}
  .sub{font-size:13px;color:#5d6075;margin-top:6px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:10px;padding:22px;box-shadow:var(--shadow)}
  .meta{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:#5d6075;margin-bottom:16px;flex-wrap:wrap;gap:8px}
  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.topic{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;padding:13px 15px;border:1px solid var(--line);border-radius:8px;cursor:pointer;background:#fff;transition:border-color .15s,background .15s;font-size:15px;text-align:left;width:100%;font-family:inherit;color:var(--ink)}
  .opt:hover{border-color:var(--gold)}
  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">SPPI Level 7 · Financing Management</div>
    <h1>W1 모의문제 — Industry & POJK Framework</h1>
    <div class="sub">산업 개관 · Health Level · 8 Risks · 사업영역 한도 · 핵심 POJK · 50문항 풀 · Day 1 교재 기반</div>
  </header>
  <div class="panel" id="app"></div>
  <footer>출처: A to Z in Finance Company Business (Day 1)</footer>
</div>

<script>
const BANK = [
{id:"001",tp:"산업사",d:"Hard",q:"Which event directly triggered the strengthening of the SLIK system and the introduction of the Asset Registry in Indonesia?",o:["The 1997-98 Asian Financial Crisis","The 2018 Double Pledge Cases","The 2008-09 Global Financial Crisis","The 2020 COVID-19 Pandemic"],a:1,e:"Double Pledge Cases(동일 자산 중복 담보 사기 대량 발견) → 차주·자산 정보 인프라(SLIK·Asset Registry·Pefindo) 강화 trigger."},
{id:"002",tp:"산업사",d:"Hard",q:"POJK 46/2024 formalized face-to-face-less financing for Micro/Ultra Micro enterprises. Which event most directly accelerated this need?",o:["The 2020 COVID-19 Pandemic","The 2014 Fuel Price Increase","The 2018 Double Pledge Cases","The 2022 Fuel Subsidy adjustment"],a:0,e:"COVID-19 봉쇄로 대면 financing 불가 → 비대면 채널 수요 폭증 → POJK 46/2024로 공식화."},
{id:"003",tp:"산업사",d:"Medium",q:"A sharp NPF spike to approximately 4% occurred in which year/event?",o:["Global Financial Crisis 2008","COVID-19 Pandemic 2020","Fuel Price Increase 2014","Double Pledge Cases 2018"],a:1,e:"NPF 4% spike = COVID-19(2020). OJK POJK 14/2020 등 loan restructuring 완화 발동. 2008 GFC는 인니 영향 상대적 적음."},
{id:"004",tp:"산업사",d:"Medium",q:"Which legislative milestone first established the four core business areas (leasing, factoring, credit card, consumer financing)?",o:["SKB of 3 Ministers (1974)","KMK 448/2000","KMK 1169 (1991)","POJK 35/2018"],a:1,e:"KMK 448/2000 = 4대 사업영역. SKB 1974는 최초 leasing 도입, POJK 35/2018은 Working Capital·Investment 추가."},
{id:"005",tp:"산업사",d:"Easy",q:"Which regulation added Working Capital and Investment financing to the industry's scope?",o:["KMK 448/2000","POJK 46/2024","POJK 48/2024","POJK 35/2018"],a:3,e:"POJK 35/2018 = Working Capital + Investment Financing 추가. 46/2024는 비대면, 48/2024는 GCG."},
{id:"006",tp:"법적정의",d:"Medium",q:"Under POJK 35/2018, a Finance Company carries out financing for goods/services for which purposes?",o:["Only consumer purposes","Only productive (business) purposes","Both productive and consumer purposes","Only government-subsidized purposes"],a:2,e:"Finance Company 정의 = productive(사업투자·운전자본) + consumer(소비) 양쪽."},
{id:"007",tp:"법적정의",d:"Medium",q:"A self-employed person finances a truck used for delivery business. Under Indonesia's classification, this is:",o:["Consumer financing, because the borrower is an individual","Multipurpose financing, regardless of use","Cannot be financed by a Finance Company","Productive financing, because the use purpose is business/income generation"],a:3,e:"인니는 사용 목적 기준 — 영업용이면 Productive(Investment). 한국의 주체(사업자등록) 기준과 다름."},
{id:"008",tp:"법적정의",d:"Hard",q:"In Sharia financing, which Akad line must be conducted face-to-face (physically) under POJK 46/2025?",o:["Investment Financing","Buy & Sell Financing","Service Financing","All Akad lines can be online"],a:0,e:"Sharia Investment financing은 반드시 대면. Buy&Sell·Service는 대면/온라인 가능. Conventional(POJK 46/2024) 비대면 허용과 구별."},
{id:"009",tp:"OJK구조",d:"Easy",q:"Finance Companies belong to which OJK sector?",o:["Sector 4 — IKNB (Non-Bank Financial Institutions)","Sector 1 — Banking","Sector 3 — Insurance/Guarantee/Pension","Sector 5 — Fintech/Digital Assets"],a:0,e:"Finance Company = Sector 4 (IKNB = Industri Keuangan Non-Bank)."},
{id:"010",tp:"HealthLevel",d:"Hard",q:"Which is the CORRECT set of four Health Level assessment factors (POJK 28/2020)?",o:["Capital, Profitability, GCG, Risk Profile","Capital, Liquidity, Earnings, Sensitivity","Solvency, Profitability, Governance, Compliance","Capital, Asset Quality, Management, Earnings"],a:0,e:"4 Factor = Capital · Profitability · GCG · Risk Profile."},
{id:"011",tp:"HealthLevel",d:"Hard",q:"Under the Composite Rating scale (POJK 28/2020), which rating represents the BEST condition?",o:["Rating 5 — Unhealthy","Rating 3 — Fairly Healthy","Rating 1 — Very Healthy","Rating 4 — Less Healthy"],a:2,e:"1=Very Healthy(최고), 5=Unhealthy(최악). 한국 신용등급 직관과 반대 — 함정."},
{id:"012",tp:"HealthLevel",d:"Hard",q:"In the Risk Profile factor, Net Risk is determined by:",o:["Inherent Risk + KPMR","Inherent Risk × KPMR","KPMR ÷ Inherent Risk","Inherent Risk − Loan Loss Provisions"],a:1,e:"Net Risk = Inherent Risk × KPMR (매트릭스로 결정). Net Risk·Profile Risk·Residual Risk는 동의어."},
{id:"013",tp:"HealthLevel",d:"Medium",q:"For KPMR Rating, which represents the most effective risk management?",o:["Rating 3 — Adequate","Rating 1 — Strong","Rating 5 — Weak","Rating 4 — Fairly Weak"],a:1,e:"KPMR 1=Strong(최우수). Inherent Risk·KPMR·Composite 모두 1이 우수, 5가 미흡."},
{id:"014",tp:"HealthLevel",d:"Hard",q:"Which condition triggers a mandatory Action Plan submission to OJK?",o:["Composite Rating 2 with no problems","Any Factor rated 4 or 5, or Composite Rating 4/5, or Rating 3 with significant problems","Composite Rating 1 only","Only when OJK conducts a special examination"],a:1,e:"Action Plan trigger = Factor 4·5, Composite 4·5, 또는 Composite 3+significant problems."},
{id:"015",tp:"HealthLevel",d:"Medium",q:"The KPMR has four components. Which is one of them?",o:["External Audit Independence","Shareholder Voting Rights","Dividend Policy","BOC/BOD Active Supervision"],a:3,e:"KPMR 4 Component: BOC/BOD Active Supervision · Policies & Procedures · Risk Management Process · Internal Control System."},
{id:"016",tp:"HealthLevel",d:"Medium",q:"How many items are assessed under the GCG factor's 'Outcomes' sub-factor?",o:["8 items","11 items","5 items","4 items"],a:1,e:"GCG Outcomes = 11항목 (BOD·BOC·Committees·Conflict of Interest·Compliance·Internal Audit·External Audit·Risk Mgmt·Remuneration·Transparency·Business Plan)."},
{id:"017",tp:"HealthLevel",d:"Medium",q:"By when must the year-end Health Level self-assessment be submitted to OJK?",o:["February 15","January 31","April 30","March 31"],a:0,e:"Health Level 자가평가(연말 기준) 제출 = 2월 15일. (GCG·Annual = 4/30)."},
{id:"018",tp:"감독상태",d:"Hard",q:"Under POJK 49/2024, the Intensive Supervision status is triggered when (among others):",o:["Composite Rank 5, or core-capital/paid-in below 0%","Composite Rank 1, regardless of capital","Only when net NPF exceeds 25%","Composite Rank 4, or core-capital/paid-in ratio 0–50%, or net NPF 5–25%"],a:3,e:"Intensive = Rank 4 / MSMD 0~50% / net NPF 5~25%. Special = Rank 5 / MSMD<0% / net NPF>25%."},
{id:"019",tp:"감독상태",d:"Hard",q:"KBBF's core-capital-to-paid-in-capital ratio (MSMD) falling below which threshold would trigger Intensive Supervision?",o:["100%","25%","50%","120%"],a:2,e:"MSMD < 50% → Intensive Supervision 진입(POJK 49/2024). 50%는 §4.4.1 MSMD 최저 기준과 동일선."},
{id:"020",tp:"비율",d:"Hard",q:"What does MSMD measure for a Finance Company?",o:["Modal Sendiri / Modal Disetor = Core Capital / Paid-Up Capital ratio","Minimum Solvency Margin like insurance RBC","Total Debt / Equity leverage","Non-performing financing ratio"],a:0,e:"MSMD = Core Capital/Paid-Up Capital. 보험사 RBC/MMBR(120%)과 다른 개념 — 함정. 최저 ≥50%."},
{id:"021",tp:"비율",d:"Medium",q:"The legal maximum Gearing Ratio (GR) for a Finance Company is:",o:["5x","15x","No limit","10x"],a:3,e:"GR = Total Debt/Equity, 법정 max 10x. 산업 평균 2.18x."},
{id:"022",tp:"비율",d:"Medium",q:"Which ratio is calculated as Financing Receivables / Total Assets?",o:["BOPO","FAR","GR","MSMD"],a:1,e:"FAR = Financing Receivables/Total Assets (자산 중 핵심사업 비중). 산업 평균 86.01%."},
{id:"023",tp:"비율",d:"Medium",q:"BOPO measures which of the following, where lower is better?",o:["Operating Expense / Operating Revenue","Return on Assets","Gearing leverage","Core capital adequacy"],a:0,e:"BOPO = Operating Expense/Operating Revenue (영업비용률, 낮을수록 우수). 산업 평균 82.86%."},
{id:"024",tp:"비율",d:"Hard",q:"An MSMD of 320% (industry average) means:",o:["The company is in capital deficit","Debt is 3.2x equity","Core capital is 3.2x the paid-up capital — retained earnings accumulated thickly","The company breached the 120% insurance RBC floor"],a:2,e:"MSMD 320% = 자기자본이 납입자본의 3.2배 = 이익잉여금 두텁게 누적. ROA와 직결."},
{id:"025",tp:"사업영역",d:"Hard",q:"To start an 'Other Financing Business Activity', all five conditions must be met. Which is one of them?",o:["Minimum Core Capital of Rp 100 billion","Foreign ownership below 20%","Health Level Composite Rating of at least 2 (Healthy)","Listing on the Indonesia Stock Exchange"],a:2,e:"5조건: Business plan 포함 · Health Composite ≥2 · Gearing 충족 · Core Capital ≥Rp 200bn · 행정처분 없을 것."},
{id:"026",tp:"사업영역",d:"Hard",q:"The minimum Core Capital required to undertake Other Financing Business Activities is:",o:["Rp 100 billion","Rp 500 billion","Rp 200 billion","Rp 10 billion"],a:2,e:"Core Capital ≥ Rp 200 billion (5조건 중 하나). Rp 100bn은 Roadmap Pilar 1 최저 자기자본 목표."},
{id:"027",tp:"사업영역",d:"Medium",q:"Working Capital Financing covers short-term needs within:",o:["3 years","5 years","No time limit","One business cycle"],a:3,e:"Working Capital = 1 business cycle 이내 단기 지출. Investment = 자본재·중장기."},
{id:"028",tp:"사업영역",d:"Hard",q:"Under POJK 46/2024, non-physical (face-to-face-less) Investment Financing is limited to:",o:["Any debtor, up to Rp 500 million","Micro/Ultra Micro enterprises, max Rp 10 billion/debtor, ≤5% of receivables","Large corporates only, no limit","Consumer borrowers, max Rp 100 million"],a:1,e:"비대면 Investment: Micro/Ultra Micro 대상, Rp 10bn/debtor, 비대면 receivables 최대 5%."},
{id:"029",tp:"사업영역",d:"Hard",q:"Which statement about per-debtor limits is CORRECT?",o:["Business Capital Facility = Rp 500 million; Fund Facility = Rp 10 billion","Business Capital Facility = Rp 10 billion; Fund Facility = Rp 500 million","Both facilities are capped at Rp 100 million","General (face-to-face) Investment Financing is capped at Rp 10 billion"],a:1,e:"Business Capital Facility Rp 10bn/debtor, Fund Facility Rp 500M/debtor. 일반 대면 Investment Financing은 차주당 한도 없음."},
{id:"030",tp:"사업영역",d:"Medium",q:"Collateral is exempt for a Business Capital Facility when the amount per debtor is:",o:["≤ Rp 10 billion","≤ Rp 100 million","≤ Rp 500 million","Never exempt"],a:1,e:"Business Capital Facility ≤ Rp 100 million/debtor → 담보 면제."},
{id:"031",tp:"Lease",d:"Medium",q:"Which is a core rule of a Finance Lease?",o:["The debtor owns the goods during the lease term","No collateral or registration is required","It is always treated as an operating expense","Ownership remains with the Finance Company; debtor cannot re-lease to third parties; plate/label attached"],a:3,e:"Finance Lease: 소유권은 Finance Company 귀속, 제3자 re-lease 금지, plate/label 부착 의무."},
{id:"032",tp:"Lease",d:"Medium",q:"In a Sale and Leaseback (SLB), the debtor:",o:["Buys an asset from the Finance Company and leases it out","Sells its own asset to the Finance Company and simultaneously leases it back","Transfers ownership permanently with no lease","Pledges the asset to a third party"],a:1,e:"SLB = 본인 자산을 Finance Company에 매도 + 동시에 다시 lease. 효과: 자산 유동화·운전자본 확보."},
{id:"033",tp:"Lease",d:"Hard",q:"The key distinction between Finance Lease and Operating Lease is:",o:["Finance Lease transfers substantial benefit + risk (lessee capitalizes under IFRS 16); Operating Lease does not","Finance Lease has no interest; Operating Lease does","Operating Lease always lasts longer","Only Operating Lease requires OJK approval"],a:0,e:"Finance Lease = benefit+risk 이전, IFRS 16 lessee 자산화. Operating Lease = 이전 안 됨, 비용 처리."},
{id:"034",tp:"자금조달",d:"Medium",q:"Which funding source showed strong YoY growth (+9.92%) in 2025, aligning with Roadmap Pilar 2?",o:["Bonds Issuance","Domestic Loans","Foreign Loans","Subordinated Loans"],a:0,e:"Bonds Issuance +9.92% (국내·해외 차입은 감소). Funding 다각화(Pilar 2)와 일치."},
{id:"035",tp:"자금조달",d:"Hard",q:"For a Non-Public (Private Placement) securities offering, which requirement differs from a Public Offering?",o:["Risk level mid-low (relaxed) + Equity ≥ Rp 200bn + report 6 months prior","Gearing ratio max 10x","Must be included in the business plan","Financial soundness healthy or above"],a:0,e:"Non-Public: Risk level mid-low(완화) + Equity ≥Rp 200bn + 6개월 전 보고. Public: Risk low + 3개월 전. Gearing 10x·business plan·soundness는 공통."},
{id:"036",tp:"자금조달",d:"Medium",q:"Which is a mandatory requirement for a Finance Company bond issuance?",o:["Listing on a foreign exchange","KSEI registration + OJK-registered trustee + at least investment rating + quarterly reporting","Minimum 50% foreign ownership","Sharia compliance certification"],a:1,e:"채권 발행: KSEI 등록 · OJK 등록 trustee · 최소 investment rating · 1년 1회+ 평가 · 분기별 실적 보고."},
{id:"037",tp:"EquityP",d:"Hard",q:"The Equity Participation limit for a single direct participation is:",o:["Max 10% of Equity","Max 50% of Equity","No limit","Max 20% of the Finance Company's Equity"],a:3,e:"직접 참여 개별 최대 20% of Equity. 1개 그룹 내 entities 직접 참여 총합 최대 10%."},
{id:"038",tp:"EquityP",d:"Medium",q:"Equity Participation differs from Investment Financing in that:",o:["Investment Financing = financing to a debtor (business area); Equity Participation = own-capital investment in another company's shares","They are identical concepts","Equity Participation is a type of consumer loan","Investment Financing requires DSN-MUI approval"],a:0,e:"Investment Financing = debtor에게 financing(사업영역). Equity Participation = 자기자본으로 타사 지분 보유. 혼동 금지."},
{id:"039",tp:"POJK",d:"Hard",q:"Which POJK is the current, consolidated Good Corporate Governance regulation?",o:["POJK 30/2014","POJK 29/2020","POJK 42/2024","POJK 48/2024"],a:3,e:"GCG 변천: 30/2014(원본)→29/2020(개정)→48/2024(신 통합, 현행). 42/2024는 Risk Management."},
{id:"040",tp:"POJK",d:"Hard",q:"Which POJK governs Risk Management and defines the 8 risk types?",o:["POJK 35/2018","POJK 48/2024","POJK 28/2020","POJK 42/2024"],a:3,e:"POJK 42/2024 = Risk Management (8대 리스크 + KPMR 4 Component)."},
{id:"041",tp:"POJK",d:"Hard",q:"Which is the CORRECT list of the 8 Finance Company risk types?",o:["Credit, Market, Operational, Interest, Currency, Country, Settlement, Model","Strategic, Financial, Hazard, Compliance, Cyber, ESG, Legal, Conduct","Strategic, Credit, Operational, Market, Liquidity, Compliance, Legal, Reputation","Capital, Liquidity, Earnings, Sensitivity, Market, Credit, Legal, Strategic"],a:2,e:"8대: Strategic·Credit·Operational·Market·Liquidity·Compliance·Legal·Reputation."},
{id:"042",tp:"POJK",d:"Hard",q:"\"Risk arising from the failure of other parties to fulfill their obligations\" describes which risk?",o:["Market Risk","Operational Risk","Liquidity Risk","Credit Risk"],a:3,e:"Credit Risk = 거래상대방 의무 이행 실패. Market = 시장변동, Operational = 내부프로세스·인적오류·IT."},
{id:"043",tp:"POJK",d:"Hard",q:"Fraud risk is treated as a parameter under which of the 8 risk types?",o:["Operational Risk","Compliance Risk","Reputation Risk","Legal Risk"],a:0,e:"Fraud risk = Operational Risk 하위 파라미터. (Anti-Fraud 전략은 W4 Unit 4로 별도)."},
{id:"044",tp:"POJK",d:"Hard",q:"Under POJK 12/POJK.01/2017 (Fit & Proper), the assessment covers which three areas?",o:["Integrity, Competence, Financial Reputation","Capital, Liquidity, Solvency","Education, Experience, Nationality","Independence, Tenure, Shareholding"],a:0,e:"F&P 3영역: Integrity·Competence(=Fit) + Financial Reputation(=Proper)."},

{id:"046",tp:"거버넌스",d:"Medium",q:"In Indonesia's Dual Board system, the Board of Commissioners (BOC):",o:["Runs day-to-day operations and represents the company externally","Replaces the BOD in financing decisions","Supervises and advises the BOD but does not directly intervene in operations","Reports to the Compliance Director"],a:2,e:"BOC(Dewan Komisaris) = BOD 감독·자문, 운영 직접 개입 X. BOD(Direksi) = 일상 운영·전략 실행."},

const KEY="A B C D".split(" ");
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(mode){
  if(mode==='all') quiz=shuffle(BANK);
  else quiz=shuffle(BANK).slice(0,30);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">50문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 50문항 <span class="desc">산업·Health Level·Risk·사업영역·POJK 완주</span></button>
      </div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W1-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  answers[cur]={id:q.id,correct:i===q.a,picked:i};
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W1-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px"><button class="act" onclick="home()">다시 풀기</button></div>
    </div>`;
}
home();
</script>
