<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}

  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}
  h1{font-size:25px;font-weight:800;letter-spacing:-.01em;margin-top:4px}

  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}
  .bar > i{display:block;height:100%;background:var(--gold);width:0;transition:width .3s}
  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .tag{font-size:11px;padding:2px 9px;border-radius:99px;border:1px solid var(--line);color:#5d6075;font-weight:600}
  .tag.topic{background:#eef2f6;border-color:#cdd9e4;color:var(--blue)}
  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}
  .tag.easy{background:#e7f1ea;border-color:#aecdb9;color:var(--green)}
  .q{font-size:17px;font-weight:600;margin-bottom:18px;letter-spacing:-.005em}

  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}
  .opt:disabled{cursor:default}
  .opt.correct{background:#e9f3ed;border-color:var(--green)}
  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}
  .breakdown{text-align:left;margin:18px 0;font-size:14px}
  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>
</head>

<script>
const BANK = [
{id:"001",tp:"산업사",d:"Hard",q:"Which event directly triggered the strengthening of the SLIK system and debtor/asset data verification infrastructure (Dukcapil, Pefindo, Rapindo) in Indonesia's finance company industry?",o:["The 1997-98 Asian Financial Crisis","The Double Pledge Cases","The 2008-09 Global Financial Crisis","The COVID-19 Pandemic"],a:1,e:"Double Pledge Cases(동일 자산 중복 담보 사기)가 차주·자산 정보 인프라(SLIK·Pefindo·Dukcapil·Rapindo) 강화의 직접 trigger."},
{id:"002",tp:"산업사",d:"Medium",q:"In which year did KMK 448/2000 first allow finance companies to carry out leasing, factoring, credit card, AND consumer financing activities together?",o:["1974","1991","2000","2018"],a:2,e:"2000년 KMK 448/2000으로 leasing·factoring·credit card·consumer financing 4종 허용. 1974=SKB 3장관(leasing), 1991=KMK 1169."},
{id:"003",tp:"산업사",d:"Medium",q:"Under which regulation can a finance company carry out financing activities WITHOUT face-to-face interaction?",o:["POJK 35/2018","POJK 46/2024","KMK 448/2000","POJK 10/2019"],a:1,e:"2024년 POJK 46/2024로 비대면(without face-to-face) financing 허용. POJK 35/2018=working capital·investment facility 도입."},
{id:"004",tp:"산업사",d:"Easy",q:"Per the 6/26 material, which body provides licenses and supervises banking, capital markets, insurance, financing institutions, and crypto assets in Indonesia?",o:["Bank Indonesia (BI)","Otoritas Jasa Keuangan (OJK)","Ministry of Finance","PPATK"],a:1,e:"OJK가 금융 전 부문(은행·자본시장·보험·금융기관·핀테크·디지털자산·크립토)의 licensing·supervision 담당."},
{id:"005",tp:"통계",d:"Hard",q:"As of April 2026, what is the number of finance companies based on business activity focus shown in the material?",o:["154","147","145","144"],a:3,e:"Apr-2026 기준 144개사. 2013년 202개에서 지속 감소(consolidation). 직전판 대비 갱신된 수치."},
{id:"006",tp:"통계",d:"Hard",q:"In the April 2026 industry ratio table, what is the FAR (Financing to Asset Ratio)?",o:["85.48%","85.74%","86.01%","86.70%"],a:3,e:"Apr-26 FAR=86.70% (YoY +0.96%). Roadmap 목표 FAR 85~90% 구간 내. 직전판(85.48%)에서 상향."},
{id:"007",tp:"통계",d:"Hard",q:"In the April 2026 industry ratio table, what is the MSMD (Modal Sendiri/Modal Disetor, Core Capital to Paid-up Capital) ratio?",o:["319.77%","320.23%","328.37%","332.39%"],a:2,e:"Apr-26 MSMD=328.37% (YoY -4.03%). MSMD=Core Capital/Paid-up Capital이며 최소 ≥50% 규정. (320·332는 다른 기간치)"},
{id:"008",tp:"통계",d:"Medium",q:"In the April 2026 ratios, what is the industry NPF Gross?",o:["2.43%","2.51%","2.70%","2.89%"],a:3,e:"Apr-26 NPF Gross=2.89% (YoY +0.46%), NPF Netto=0.78%. 직전판 대비 소폭 상승."},
{id:"009",tp:"통계",d:"Medium",q:"In the composition of financing as of the 6/26 material, what share is Consumer Goods financing?",o:["25%","69%","42.1%","3.85%"],a:1,e:"Consumer Goods 69%, Productive Goods 25%, Services 3.85%, Accounts Receivable 2.43%, Infrastructure 0.30%."},
{id:"010",tp:"통계",d:"Medium",q:"Within PRODUCTIVE goods financing composition, which two categories are the largest?",o:["Machinery and Buildings","Transportation Vehicles and Heavy Equipment","Ships & Aircraft and Medical Equipment","Houses & Apartments and Office Equipment"],a:1,e:"Productive: Transportation Vehicles 42.1% + Heavy Equipment 34.8%가 압도적. (Consumer 측은 New 4-Wheels 39.3% 최대)"},
{id:"011",tp:"통계",d:"Easy",q:"According to GAIKINDO in the 6/26 material, car sales in 2026 are predicted to reach approximately how many units?",o:["650 thousand","850 thousand","1.05 million","6.4 million"],a:1,e:"GAIKINDO 2026 자동차 예측 850천 대. (6.4~6.7백만은 AISI 오토바이 예측치) May-26 실적 359,015대."},
{id:"012",tp:"통계",d:"Medium",q:"Per AISI in the 6/26 material, national motorcycle sales in 2026 are predicted to reach what range?",o:["2.8 – 3.0 million","4.3 – 5.0 million","6.4 – 6.7 million","7.8 – 8.0 million"],a:2,e:"AISI 2026 오토바이 예측 6.4~6.7백만 대. May-26 실적 2,881,203대."},
{id:"013",tp:"규제프레임",d:"Hard",q:"In the Finance Company Regulation Framework, which regulation governs Fit & Proper (Reassessment)?",o:["POJK 12/2017","POJK 8/2023","POJK 34/2018","POJK 43/2024"],a:2,e:"F&P Reassessment=POJK 34/2018. (POJK 12/2017=과거 자료에서 RBA/AML 맥락, 8/2023=AML 신규, 43/2024=HR)"},
{id:"014",tp:"규제프레임",d:"Hard",q:"Which regulation is the basis for AML/CFT (APU-PPT) in the current framework?",o:["POJK 12/2017","POJK 8/2023","POJK 23/2019","POJK 28/2024"],a:1,e:"현행 AML/CFT=POJK 8/2023 (12/2017→23/2019 개정→8/2023 대체). 8/2023이 RBA 기반 APU-PPT 규정."},
{id:"015",tp:"규제프레임",d:"Medium",q:"Which umbrella law (UU) sits at the center of the Finance Company Regulation Framework (P2SK Law)?",o:["UU No.4/2023","UU No.21/2011","UU No.40/2007","UU No.8/1995"],a:0,e:"UU No.4/2023 (P2SK, 금융부문 개발·강화법)이 finance company 규제 프레임의 중심 우산법."},
{id:"016",tp:"규제프레임",d:"Medium",q:"Per the Other Regulations slide, which POJK now governs Human Resources Development?",o:["POJK 43/2024","POJK 43/2025","POJK 47/2020","POJK 35/2018"],a:0,e:"HR Development=POJK 43/2024 (2024년 제정). 신규교재 전 슬라이드가 43/2024로 명시 — 43/2025는 오류."},
{id:"017",tp:"사업영역",d:"Hard",q:"Which financing type is MANDATORY face-to-face physically and cannot be done without it (except limited micro/ultra-micro cases)?",o:["Working Capital Financing","Multipurpose Financing","Investment Financing","Other Activities"],a:2,e:"Investment Financing은 mandatory face-to-face. 예외: Micro/Ultra Micro & max 10B & 비대면 receivable ≤5%. (Working/Multipurpose는 비대면 가능)"},
{id:"018",tp:"사업영역",d:"Hard",q:"Investment financing may be conducted WITHOUT face-to-face physically only if the debtor is Micro/Ultra Micro, financing is max Rp10 billion, AND the non-face-to-face receivables meet what cap?",o:["max 5% of total","max 10% of total","max 25% of total","max 50% of total"],a:0,e:"비대면 Investment financing 조건: Micro/Ultra Micro + max 10B + 비대면 receivable ≤ 5% of total."},
{id:"019",tp:"사업영역",d:"Hard",q:"To carry out OTHER Financing Business Activities, a finance company must have Core Capital of at least:",o:["Rp100 billion","Rp200 billion","Rp250 billion","Rp1 trillion"],a:1,e:"Other Financing Business: Core Capital ≥ Rp200B + Composite Rating ≥2 + gearing ratio 충족 + OJK 제재 없음 + 사업계획 포함. (Infrastructure는 1조)"},
{id:"020",tp:"사업영역",d:"Hard",q:"For the Business Capital Facility (FMU), what is the maximum financing value per debtor?",o:["Rp100 million","Rp500 million","Rp10 billion","Rp200 billion"],a:2,e:"FMU(Business Capital Facility) per debtor max Rp10B. Fund Facility(FD) per debtor max Rp500M. 무담보 예외 FMU max Rp100M."},
{id:"021",tp:"사업영역",d:"Hard",q:"For the Fund Facility (FD), what is the maximum financing value per debtor?",o:["Rp100 million","Rp500 million","Rp10 billion","Rp1 trillion"],a:1,e:"FD per debtor max Rp500M. 다목적 financing receivables through FD는 총 financing receivables의 max 25%."},
{id:"022",tp:"사업영역",d:"Medium",q:"For FMU/FD activities, the maximum NPF Net allowed is:",o:["1%","2.5%","5%","10%"],a:2,e:"FMU/FD 요건: Composite Rating 2 + 자본비율 충족 + gearing 충족 + NPF Net max 5% + Core/Paid-up ≥50%."},
{id:"023",tp:"사업영역",d:"Hard",q:"Under the collateral exemption for FMU/FD (UMKM debtors), it applies for a finance company whose Core Capital to Paid-up Capital ratio is:",o:["more than 50%","more than 100%","more than 150%","at least 25%"],a:1,e:"담보면제: Core/Paid-up > 100%인 회사가 UMKM 차주에 누적 max Rp100M/차주, 보험 위험전가, 담보사용 receivable ≤10% 조건."},
{id:"024",tp:"사업영역",d:"Medium",q:"Multipurpose financing receivables provided through Fund Facilities are capped at what share of total financing receivables?",o:["10%","25%","50%","5%"],a:1,e:"Fund Facility 통한 multipurpose financing receivables는 총 financing receivables의 max 25%."},
{id:"025",tp:"사업영역",d:"Medium",q:"For Digital Financing, the IT-function employees referred to must have experience and expertise of at least how many years in the IT field?",o:["1 year","2 years","3 years","5 years"],a:2,e:"Digital financing: IT 시스템 담당 직원은 IT 분야 경력·전문성 ≥3년. 또 IT 담당 1 Director + 1단계 하위 officer는 IT 역량인증 보유."},
{id:"026",tp:"사업영역",d:"Medium",q:"To conduct Digital Financing activities, a finance company must obtain what before starting, and have an information security management certificate within how long after?",o:["OJK approval; within 6 months","Bank Indonesia license; within 3 months","No approval; within 1 year","Ministry approval; within 12 months"],a:0,e:"디지털 financing은 OJK 승인 필요, OJK 승인 후 max 6개월 내 정보보안 관리 인증 취득(ps.19D)."},
{id:"027",tp:"금융기법",d:"Hard",q:"During a Finance Lease agreement, ownership of the leased goods belongs to whom, and the finance company is required to do what?",o:["The lessee; register it with KSEI","The finance company; attach a plate or label to the leased goods","The supplier; insure the goods","The lessee; obtain OJK approval"],a:1,e:"Finance Lease 기간 중 소유권은 Finance Company. 회사는 leased goods에 plate/label 부착 의무. 차주는 재임대 금지."},
{id:"028",tp:"금융기법",d:"Medium",q:"Sale and Leaseback (SLB) is used in which financing types?",o:["Investment & multipurpose financing","Investment & working capital financing","Working capital & multipurpose financing","Only investment financing"],a:1,e:"SLB=investment & working capital financing. (Finance Lease=investment & multipurpose financing)"},
{id:"029",tp:"금융기법",d:"Hard",q:"In Factoring WITHOUT recourse, who bears the risk of non-collection of the receivables?",o:["The receivable seller (client)","The customer","The Finance Company","Split proportionally"],a:2,e:"Without recourse=Finance Company가 미회수 위험 부담. With recourse=receivable seller가 위험 부담."},
{id:"030",tp:"금융기법",d:"Medium",q:"Factoring is used in which financing types?",o:["Investment & working capital financing","Investment & multipurpose financing","Multipurpose financing only","Working capital & multipurpose"],a:0,e:"Factoring=investment financing + working capital financing에 사용."},
{id:"031",tp:"금융기법",d:"Medium",q:"Purchase with Installment Payments (PPSA) is used in which financing types?",o:["Investment financing only","Investment & working capital","Investment, working capital, and multipurpose financing","Multipurpose only"],a:2,e:"PPSA=investment + working capital + multipurpose 3종 모두 사용. 소유권은 공급자→차주로 이전."},
{id:"032",tp:"금융기법",d:"Hard",q:"To conduct Infrastructure Financing, a finance company must have core capital of at least:",o:["Rp200 billion","Rp500 billion","Rp1 trillion","Rp250 billion"],a:2,e:"Infrastructure Financing: core capital ≥ IDR 1조 + Composite Rating ≥2 + SOP 보유 + 사업계획 포함 + 제재 없음. (Project/Infra는 investment financing에 사용)"},
{id:"033",tp:"금융기법",d:"Hard",q:"Under POJK 46/2024 receivable restructuring policy, restructuring is PROHIBITED if it is intended to:",o:["help a debtor in good business prospect","improve the quality of receivables or avoid impairment provisioning","reduce the principal amount","extend the tenor"],a:1,e:"Restructuring 금지 사유: receivable 품질 개선 목적 or 손상충당금(impairment) 증가 회피 목적. 정당 사유=차주 상환난+사업전망 양호."},
{id:"034",tp:"금융기법",d:"Medium",q:"Per the restructuring policy, the decision to restructure receivables must be made by:",o:["the same party that approved the original financing","a party higher in authority than the one who approved the original financing","the Board of Commissioners only","OJK"],a:1,e:"Restructuring 결정은 원 financing 승인자보다 상위 권한자가. 최고권한자가 원 승인했으면 → 이사회 결의로."},
{id:"035",tp:"금융기법",d:"Hard",q:"The maximum incentive (financing acquisition cost) to a third party is what percent of the total income of each financing agreement?",o:["10%","15%","17.5%","25%"],a:2,e:"3자 인센티브 max 17.5% of total income/agreement. Income=Interest income before Cost of Fund, Insurance discount, Admin income & Provision income."},
{id:"036",tp:"금융기법",d:"Hard",q:"Under BMPP (Maximum Financing Limit), the limit for one group of obligors who do NOT have a direct relationship is:",o:["max 20%","max 50%","max 10%","max 25%"],a:1,e:"BMPP: one obligor max 20%, one group of obligor max 50%. 지배관계 보유자 max 50% of equity."},
{id:"037",tp:"금융기법",d:"Medium",q:"If a BMPP breach occurs (e.g., capital decrease, FX/fair-value change, merger), the finance company must adjust and submit an action plan within:",o:["1 month","3 months","6 months","1 year"],a:0,e:"BMPP 초과 시 max 1개월 내 조정 + action plan 제출. BMPP 자본 기준=직전 월간보고 자본."},
{id:"038",tp:"금융기법",d:"Medium",q:"Under POJK 46/2024 Chapter VII (Financing Risk Mitigation), finance companies are prohibited from:",o:["using fiduciary mechanisms","insuring or guaranteeing problematic financing receivables","using credit insurance","transferring risk via insurance"],a:1,e:"문제성(problematic) financing receivable의 보험·보증 금지. 또 보험금을 보험료의 일정%로 제한하는 메커니즘도 금지."},
{id:"039",tp:"기타조항",d:"Hard",q:"Per POJK 35/2018 / 46/2024, the minimum Core Capital required for a finance company is:",o:["Rp100 billion","Rp200 billion","Rp250 billion","Rp1 trillion"],a:0,e:"Core Capital ≥ IDR 100B (Article 87). Tier2 보완자본은 Core Capital의 max 100%. Core/Paid-up ≥50%."},
{id:"040",tp:"기타조항",d:"Medium",q:"Capital for a finance company consists of Core Capital (Tier 1) and Supplementary Capital (Tier 2), where Tier 2 is calculated at a maximum of:",o:["50% of Core Capital","100% of Core Capital","25% of Core Capital","150% of Core Capital"],a:1,e:"Tier 2 보완자본=Core Capital의 max 100%. Core/Paid-up ratio ≥50% 별도 요건."},
{id:"041",tp:"기타조항",d:"Hard",q:"For securities issuance THROUGH a public offering, the finance company must report the plan no later than how long before the GMS approving it, and meet what gearing cap?",o:["3 months; gearing max 10x","6 months; gearing max 10x","1 month; gearing max 5x","6 months; gearing max 5x"],a:0,e:"공모 통한 증권발행: GMS 승인 ≥3개월 전 보고, gearing max 10x. (비공모는 발행 ≥6개월 전 보고, equity ≥200B)"},
{id:"042",tp:"기타조항",d:"Hard",q:"For securities issuance NOT through a public offering, the finance company must have equity of at least:",o:["Rp100 billion","Rp200 billion","Rp250 billion","Rp1 trillion"],a:1,e:"비공모 증권발행: equity ≥ Rp200B + 사업계획 포함 + 건전성 충족 + mid-low risk + gearing max 10x. 발행 ≥6개월 전 보고."},
{id:"043",tp:"기타조항",d:"Medium",q:"Under Equity Participation (POJK 7/2022), the maximum direct participation is what percent of the finance company's equity, and within one group?",o:["20% total; 10% per group","10% total; 20% per group","50% total; 20% per group","20% total; 5% per group"],a:0,e:"Equity participation: 총 max 20% of equity, 1개 그룹 내 직접 참여 max 10% of equity. 금융서비스/관련 회사에만."},
{id:"044",tp:"기타조항",d:"Hard",q:"In A/R collectability, the 'Doubtful' category corresponds to which overdue range, and what provision rate?",o:["O/D 91-120; 15%","O/D 121-180; 50%","O/D >180; 100%","O/D 11-90; 5%"],a:1,e:"Doubtful=O/D 121-180일, 충당 50%(of O/S minus collateral). Bad Debt >180=100%, Non-Current 91-120=15%, Special Mention 11-90=5%, Current ≤10=1%."},
{id:"045",tp:"기타조항",d:"Hard",q:"For debtors with A/R financing above what threshold can A/R quality be evaluated by considering capability to pay, financial performance, and business prospect?",o:["Rp1 billion","Rp5 billion","Rp10 billion","Rp500 million"],a:1,e:"A/R financing > Rp5B 차주는 상환능력·재무성과·사업전망 고려해 A/R 품질 평가 가능."},
{id:"046",tp:"비율",d:"Hard",q:"In the 'Other Terms' summary, the gearing ratio provision is set at the lowest 0 (zero) times and the highest:",o:["5 times","8 times","10 times","20 times"],a:2,e:"Gearing ratio: 최저 0배 ~ 최고 10배. FAR ≥50%, Core Capital ≥100B, Core/Paid-up ≥50%, Capital Ratio ≥10%."},
{id:"047",tp:"비율",d:"Medium",q:"The Finance to Asset Ratio (FAR) regulatory minimum and the minimum Capital Ratio are respectively:",o:["50% and 10%","10% and 50%","50% and 5%","25% and 10%"],a:0,e:"FAR 최소 50% (financing receivables net/total assets). Capital Ratio 최소 10% (capital adjusted/assets adjusted)."},
{id:"048",tp:"비율",d:"Medium",q:"The ratio of Investment + Working Capital financing receivables to total receivables (before allowance) must be at minimum:",o:["5%","10%","25%","50%"],a:1,e:"Investment+Working Capital receivables / 총 receivables(충당 전) ≥ 10%. Fiduciary 등록은 계약일로부터 1개월 내."},
{id:"049",tp:"기타조항",d:"Hard",q:"Among the listed PROHIBITIONS (POJK 35/2018; 46/2024), which is prohibited for a finance company?",o:["Issuing bonds through public offering","Collecting funds directly from the public (current accounts, savings, deposits)","Conducting finance leases","Charging interest on financing"],a:1,e:"금지: 공중으로부터 직접 자금수취(예금·적금 등), 타인 채무보증, 질권법 기반 담보대출, 불공정 receivable 매각, 불만처리 수수료 부과, promissory note 발행(채권은행 담보 예외) 등."},
{id:"050",tp:"기타조항",d:"Medium",q:"Per POJK 46/2024 enforcement, the types of administrative sanctions escalate as:",o:["Fine → Warning → License revocation","Warning Letter (3x) → Suspension of business → Revocation of business license","Suspension → Fine → Warning","Revocation → Warning → Suspension"],a:1,e:"제재 단계: 경고장(3회) → 영업정지 → 영업면허 취소. 유형: 서면경고, 활동동결/제한, risk등급 하향, 동의취소, 임원 금지, 과징금 등."},
{id:"051",tp:"Sharia",d:"Medium",q:"Under Sharia financing, which scheme belongs to 'Buy and Sell Financing'?",o:["Mudharabah","Murabahah","Ijarah","Musyarakah"],a:1,e:"Buy&Sell: Murabahah·Salam·Istishna'. Investment: Mudharabah·Musyarakah 등. Service: Ijarah·Qardh 등."},
{id:"052",tp:"Sharia",d:"Hard",q:"For a Sharia finance company, when must the company report to OJK after deciding to STOP using a business activities contract instructed by OJK?",o:["within 7 work days","within 15 work days","within 30 days","within 1 month"],a:1,e:"OJK 지시로 계약 사용 중단 시 max 15 work days 내 OJK 보고. 사유 소멸 시 재사용(re-enforcement) 신청 가능."},
{id:"053",tp:"Sharia",d:"Medium",q:"Which is one of the listed Sharia Principles a company must fulfill?",o:["Maximizing shareholder value","Fairness ('adl), Balance (tawazun), Benefit (maslahah), Universalism","Profit before all","Leverage optimization"],a:1,e:"Sharia 원칙: 'adl(공정)·tawazun(균형)·maslahah(편익)·universalism + gharar·maysir·riba·zhulm·risywah·haram 불포함."},
{id:"054",tp:"Sharia",d:"Medium",q:"For UUS (Sharia Business Unit) separation (spin-off), the trigger is: UUS capital reaches at least Rp100 billion AND UUS assets reach at least:",o:["25% of total assets","50% of total assets","Rp250 billion","75% of total assets"],a:1,e:"UUS 분리(separation): UUS 자본 ≥Rp100B AND UUS 자산 ≥50% of total assets. UUS 설립 시 운영자본 ≥Rp100B + UUS 담당 director."},
{id:"055",tp:"Sharia",d:"Medium",q:"The Sharia Supervisory Board (DPS) must consist of at least how many Sharia experts, elected by GMS and recommended by DSN MUI?",o:["1","2","3","at least 50% of board"],a:0,e:"DPS 최소 1인 Sharia 전문가, GMS 선임 + DSN MUI 추천. 인도네시아 거주 필수."},
{id:"056",tp:"Sharia",d:"Hard",q:"A Sharia Supervisory Board member is prohibited from holding the position of DPS in more than how many institutions (for finance companies other than LKM)?",o:["1","2","3","5"],a:2,e:"DPS는 LKM 외 finance company에서 max 3개 기관까지 DPS 겸직 가능(그 초과 금지). Director 겸직: BoC max 2개 기관."},
{id:"057",tp:"GCG",d:"Hard",q:"Per POJK 48/2024, the 5 Principles of GCG (T-A-R-I-F) are:",o:["Trust, Accuracy, Reliability, Integrity, Fairness","Transparency, Accountability, Responsibility, Independency, Fairness","Transparency, Audit, Risk, Internal control, Fairness","Truth, Accountability, Responsibility, Independence, Fidelity"],a:1,e:"T-A-R-I-F: Transparency·Accountability·Responsibility·Independency·Fairness (POJK 48/2024)."},
{id:"058",tp:"GCG",d:"Medium",q:"Per POJK 48/2024, which GCG principle means 'managed in a professional manner and free from conflict of interest and pressure from any party'?",o:["Transparency","Accountability","Independency","Responsibility"],a:2,e:"Independency=전문적 운영 + 이해상충·외부 압력으로부터 자유. Responsibility=법규·윤리 준수 및 건전 영업관행."},
{id:"059",tp:"GCG",d:"Hard",q:"A finance company with assets above Rp250 billion must have a minimum of how many Directors, with at least 50% being Indonesian?",o:["2 Directors","3 Directors","4 Directors","1 Director"],a:1,e:"자산 >Rp250B: Director 최소 3인 (min 50% 인도네시아 국적). 전원 인도네시아 거주."},
{id:"060",tp:"GCG",d:"Hard",q:"A finance company with assets above Rp250 billion must have a minimum of how many Commissioners, including an Independent Commissioner?",o:["1","2","3","4"],a:1,e:"자산 >Rp250B: Commissioner 최소 2인(독립 commissioner 포함). 최소 1인 인도네시아 거주, 과거 6개월 내 동사 Director 경력 없을 것."},
{id:"061",tp:"GCG",d:"Medium",q:"For a finance company above Rp250 billion, which committees must be established, headed by the Independent Commissioner?",o:["Only Audit Committee","Audit, Risk Monitoring, and Remuneration & Nomination Committees","Only Risk Monitoring Committee","Sharia Supervisory and Audit Committees"],a:1,e:"자산 >Rp250B: Audit + Risk Monitoring + Remuneration & Nomination 위원회 설치, 독립 commissioner가 위원장."},
{id:"062",tp:"GCG",d:"Medium",q:"Per the GCG meeting requirements, the BOC meeting frequency and minimum attendance are:",o:["1x/month, 50%","4x/year, 75%","2x/year, 50%","1x/year, 100%"],a:1,e:"BOC 회의 4회/년(출석 75%). Director 회의 1회/월(출석 50%). GMS 1회/년. MoM은 반대의견(dissenting) 포함 + 전 관계자 배포."},
{id:"063",tp:"GCG",d:"Hard",q:"Members of the Director are prohibited from holding a concurrent position as a member of the BOC in more than how many institutions?",o:["1","2","3","unlimited"],a:1,e:"Director는 타 기관 BoC를 max 2개 기관까지(초과 금지). 동사 DPS 겸직, 타 기관 director/EO 겸직 등도 금지."},
{id:"064",tp:"GCG",d:"Medium",q:"The Director in charge of the COMPLIANCE function cannot concurrently be in charge of which functions (except the President Director)?",o:["HR and IT functions","Financing/credit, marketing, and financial functions","Risk and audit functions","Legal and treasury functions"],a:1,e:"Compliance 담당 Director는 financing/credit·marketing·financial 기능 겸직 불가(President Director 예외)."},
{id:"065",tp:"GCG",d:"Medium",q:"Directors and Commissioners must disclose share ownership reaching what threshold, and financial/family relationships with others?",o:["1% or more","5% or more","10% or more","25% or more"],a:1,e:"임원 투명성: 5% 이상 지분 보유 + 타 Director/DPS/주주·사업그룹과의 재무·가족 관계 공시 의무."},
{id:"066",tp:"GCG",d:"Hard",q:"Which is a required qualification for an Independent Commissioner?",o:["Owns at least 5% shares","Has no affiliate relations with Directors/BOC/DPS/shareholders, is an Indonesian citizen, and resides in Indonesia","Must have been a Director of the same company","Must be a foreign expert"],a:1,e:"독립 commissioner: 동사 임원·주주와 무관계, 과거 6개월 내 동사/계열 임원 경력 없음, multi-finance 법규 이해, 인도네시아 국적·거주."},
{id:"067",tp:"GCG",d:"Medium",q:"The Audit Committee must have at least 1 independent member with expertise in which fields, and is headed by:",o:["IT or risk; the President Director","audit, finance or accounting; the Independent Commissioner","legal; the CEO","marketing; the BOC chair"],a:1,e:"Audit Committee: 독립위원장(Independent Commissioner) + 최소 1인 독립위원(audit/finance/accounting 전문성)."},
{id:"068",tp:"GCG",d:"Medium",q:"The GCG self-assessment report (part of institutional soundness self-assessment, POJK 28/2020) must be reported to OJK no later than:",o:["31 January","15 February of the next year","30 April","31 March"],a:1,e:"GCG 자가평가 보고서는 익년 2월 15일까지 OJK 제출(POJK 28/2020). (Sustainability report=4월 30일, SIPELAKU/AFS=1월 31일)"},
{id:"069",tp:"GCG",d:"Hard",q:"Per POJK 42/2025 (Integrity of Financial Report), the responsibility commitment of Directors must be stated in:",o:["a verbal declaration at GMS","a statement letter with stamp duty signed by the Directors","an OJK form","the annual report only"],a:1,e:"POJK 42/2025: 재무보고 무결성 책임은 인지세(stamp duty) 첨부 + Director 서명 진술서로 명시."},
{id:"070",tp:"GCG",d:"Medium",q:"Per POJK 47/2020, a finance company must budget and realize for HR development and training at least what percent of Personnel/Employee Expenses?",o:["1% of net income","2.5% of Personnel Expenses","5% of total assets","2.5% of net income"],a:1,e:"HR 교육·훈련 예산 ≥2.5% of Personnel Expenses(=employee expenses). 'net income' 아님 — 신규교재 확정. (POJK 43/2024도 동일 2.5% employee expenses)"},
{id:"071",tp:"GCG",d:"Hard",q:"Per POJK 47/2020, the maximum foreign ownership of a finance company (directly or indirectly) is:",o:["49% of paid-in capital","85% of paid-in capital","100% of paid-in capital","51% of paid-in capital"],a:1,e:"외국인 지분 max 85% of paid-in capital. 설립 시 paid-in capital ≥Rp250B, 지배주주 1인 이상 + beneficial owner 지정."},
{id:"072",tp:"GCG",d:"Medium",q:"A controlling shareholder in the form of a legal entity must have been operating for at least how long before investing in the company?",o:["1 year","2 years","3 years","5 years"],a:1,e:"법인 지배주주는 투자 전 최소 2년 영업 경력. 법인 주주 투자액은 그 주주 자기자본 한도 내."},
{id:"073",tp:"GCG",d:"Hard",q:"Per POJK 47/2020, a finance company where 25% or more shares are foreign-owned may employ foreign employees ONLY as:",o:["any position","Directors, BOC, experts, or consultants","Branch managers and tellers","Collection agents"],a:1,e:"외국인 직원은 Director·BoC·expert·consultant로만 고용 가능. expert/consultant는 IT·risk management·OJK 승인 기능에 한정. 고용기간 max 3년(1회 1년 연장)."},
{id:"074",tp:"리스크",d:"Hard",q:"How many risk types are assessed in the NBFI individual health assessment (POJK 28/2020), and in how many groups?",o:["6 risks in 2 groups","8 risks in 3 groups","10 risks in 4 groups","5 risks in 1 group"],a:1,e:"8대 리스크 / 3그룹: Business(Strategic) / Financial(Credit·Market·Operational·Liquidity) / Governance(Compliance·Legal·Reputation)."},
{id:"075",tp:"리스크",d:"Hard",q:"Per PADK 48/2025, which risk is defined as arising from 'the failure of other parties in fulfilling their obligations to the company'?",o:["Market Risk","Credit Risk","Liquidity Risk","Operational Risk"],a:1,e:"Credit Risk=상대방의 의무 불이행에서 발생(차주 부실, 신용집중, counterparty, settlement risk 포함)."},
{id:"076",tp:"리스크",d:"Medium",q:"Per PADK 48/2025, Strategy Risk is caused by:",o:["lawsuits and legal weakness","inaccuracy in making/implementing strategic decisions and failure to anticipate business environment changes","disobeying regulations","negative news exposure"],a:1,e:"Strategy Risk=전략적 의사결정 부정확 + 사업환경 변화 예측 실패. Legal Risk=소송·법적 약점, Compliance Risk=규제 미준수, Reputation Risk=부정적 평판."},
{id:"077",tp:"리스크",d:"Medium",q:"Per the NBFI health assessment, the four assessed factors are GCG, Risk Profile, Profitability, and:",o:["Liquidity","Capital","Marketing","Governance"],a:1,e:"4대 평가요인: GCG · Risk Profile · Profitability · Capital. (Risk Profile = inherent risk + KPMR 품질)"},
{id:"078",tp:"리스크",d:"Hard",q:"In the NBFI composite rating, which rating means 'HEALTHY — capable of withstanding significant negative impacts'?",o:["Composite Rating-1","Composite Rating-2","Composite Rating-3","Composite Rating-4"],a:1,e:"CR-1 Very Healthy, CR-2 Healthy, CR-3 Fairly Healthy, CR-4 Less Healthy, CR-5 Unhealthy."},
{id:"079",tp:"리스크",d:"Hard",q:"Per PADK 48/2025, a finance company with assets of more than Rp250 billion must form which risk management structure?",o:["Only a Risk Management Function","A Risk Management Committee AND a Risk Management Work Unit","Only a Risk Management Work Unit","An external risk consultant"],a:1,e:"자산 >Rp250B: Risk Management Committee(비구조적) + Risk Management Work Unit 둘 다. 자산 <Rp250B: Risk Management Function만."},
{id:"080",tp:"리스크",d:"Medium",q:"Per POJK 4/2021, an NBFI with total assets of more than what amount is required to have an Information Technology Steering Committee?",o:["Rp250 billion","Rp500 billion","Rp1 trillion","Rp5 trillion"],a:2,e:"IT Steering Committee: 총자산 >IDR 1조 NBFI. (MRTI=IT risk management 의무는 전체 NBFI)"},
{id:"081",tp:"리스크",d:"Hard",q:"Per POJK 4/2021, an NBFI with total assets of more than Rp1 trillion and/or majority IT-based operations must have:",o:["only a data center","a data center AND a disaster recovery center","only periodic data backup","an external cloud provider"],a:1,e:">Rp1조/IT 주력: data center + disaster recovery center 둘 다. 500B~1조: data center + 백업. ≤500B: 정기 백업."},
{id:"082",tp:"리스크",d:"Medium",q:"In Risk Management Policy, what is the definition of 'Risk Tolerance'?",o:["the level and type of risk that can be undertaken","the potential loss that can be absorbed by the capital of NBFI","the maximum financing per debtor","the inherent risk score"],a:1,e:"Risk Tolerance=NBFI 자본이 흡수 가능한 잠재손실. Risk Appetite=목표 달성 위해 감수 가능한 risk 수준·유형."},
{id:"083",tp:"리스크",d:"Medium",q:"The Risk Management Work Unit is authorized to monitor risk positions and conduct testing using:",o:["only historical data","scenario assumptions of abnormal conditions AND historical data","only normal conditions","external auditor data only"],a:1,e:"Risk Management Work Unit: 전체/유형별/기능별 risk position 모니터링 + 비정상조건 시나리오 가정 및 historical data 테스트."},
{id:"084",tp:"리스크",d:"Hard",q:"In the COSO internal control framework's '3 Lines of Defense', the 3rd line is:",o:["Management Controls","Risk Management & Compliance","Internal Audit","Internal Control Measures"],a:2,e:"1선=Management Controls/Internal Control Measures, 2선=Financial Control·Risk Mgmt·Compliance 등, 3선=Internal Audit."},
{id:"085",tp:"소비자보호",d:"Hard",q:"How many principles of consumer protection are listed under POJK 22/2023?",o:["5","6","7","8"],a:2,e:"7대 소비자보호 원칙(POJK 22/2023): 적절한 교육, 투명성, 공정대우·책임, 데이터 보호·프라이버시, 효과적 불만·분쟁해결, 준법집행, 건전경쟁."},
{id:"086",tp:"소비자보호",d:"Hard",q:"Per POJK 22/2023 Article 62, collection activities to consumers are allowed during which hours (Monday-Saturday, excluding national holidays)?",o:["07:00 – 19:00","08:00 – 20:00","09:00 – 21:00","06:00 – 18:00"],a:1,e:"추심 가능: 월~토(공휴일 제외) 08:00~20:00 현지시각, 차주 거소·도메사일에서. 시간·장소 외 추심은 사전 동의 필요. 위협·폭력·모욕 금지."},
{id:"087",tp:"소비자보호",d:"Medium",q:"Per POJK 22/2023 Article 64, repossession of collateral requires the consumer be proven in default, have received a warning letter, AND the finance company have:",o:["OJK approval","a fiduciary guarantee certificate / mortgage certificate","a court order only","a police report"],a:1,e:"담보 repossession 요건: 채무불이행 입증 + 경고장 발송 + fiduciary 보증서/저당권 증서 보유. 채무불이행 입증=서면 자발적 인도 합의/법원·LAPS 결정 등."},
{id:"088",tp:"소비자보호",d:"Medium",q:"Per POJK 22/2023 Article 51, the pause period (cooling-off) for products/services that are long-term and/or complex is at least:",o:["1 working day","2 working days","7 working days","14 working days"],a:1,e:"Pause period(숙려기간): 장기·복합 상품에 대해 합의 후 최소 2 working days."},
{id:"089",tp:"소비자보호",d:"Hard",q:"Per POJK 37/2025, RIPLAY (Summary of Product/Service Information) is delivered in which versions, and the Personal version is given when?",o:["Only General; at any time","General and Personal; Personal before the consumer signs the agreement","Only Personal; after signing","Standard and Premium; before marketing"],a:1,e:"RIPLAY: General(공식 매체로 결정 전 제공) + Personal(계약 서명 전 제공). 8개 정보 항목 포함."},
{id:"090",tp:"소비자보호",d:"Hard",q:"Per POJK 38/2025, OJK lawsuits for consumer protection are filed on what basis?",o:["class action lawsuits","on behalf of the institution (institutional legal standing), not class action","individual consumer petitions","arbitration only"],a:1,e:"POJK 38/2025: OJK는 기관 명의(institutional legal standing)로 제소, class action 아님. 소비자는 비용 부담 없음."},

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W1";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function start(mode){
  let pool;
  if(mode==='wrong'){
    pool=shuffle(getWrong().map(byId).filter(Boolean));
    if(!pool.length){home();return}
  } else {
    pool=(mode==='all')?shuffle(BANK):shuffle(BANK).slice(0,30);
  }
  quiz=pool.map(shuffleOpts);
  cur=0; answers=[]; render();
}
function home(){
  const wc=getWrong().length;
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">산업·Health Level·Risk·사업영역·POJK 완주</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${wc?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${wc}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${wc?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const ids=getWrong();
  const cards=ids.map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W1-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W1-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const correct=i===q.a;
  answers[cur]={id:q.id,correct,picked:i};
  if(correct) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W1-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
