<script>
const BANK = [
{id:"001",tp:"POJK",d:"Hard",q:"The principal regulation governing the anti-fraud strategy is:",o:["POJK 28/2024","POJK 12/2024","POJK 43/2024","POJK 22/2023"],a:1,e:"Anti-fraud 전략 = POJK 12/2024. 함정: 28/2024(SIPELAKU)·43(HR)·22(소비자)와 혼동."},
{id:"002",tp:"POJK",d:"Hard",q:"SIPELAKU is established under which regulation?",o:["POJK 12/2024","POJK 28/2024","POJK 42/2024","POJK 46/2024"],a:1,e:"SIPELAKU = POJK 28/2024. 함정: 12(anti-fraud)·42(내부통제)와 혼동."},
{id:"003",tp:"POJK",d:"Hard",q:"SIPELAKU primarily functions as:",o:["A consumer loan approval platform","A perpetrator/fraud reporting system","A product marketing database tool","An internal staff payroll system"],a:1,e:"SIPELAKU = 부정행위자 보고·정보 시스템. 함정: 여신·마케팅·급여 시스템으로 오인."},
{id:"004",tp:"POJK",d:"Hard",q:"Under the anti-fraud regulation, the 'Primary Party' prohibition is set out in:",o:["Article 5","Article 9(4)","Article 13","Article 18"],a:1,e:"Primary Party 금지 = Art.9(4). 함정: 인접 조항 혼동."},
{id:"005",tp:"POJK",d:"Hard",q:"The anti-fraud regulation sets a correction/follow-up deadline of:",o:["5 working days","15 working days","30 working days","60 working days"],a:1,e:"시정·후속 = 15영업일(Art.18). 함정: 인접 기간 혼동."},
{id:"006",tp:"POJK",d:"Hard",q:"The Implementation Report under the anti-fraud framework contains:",o:["3 fields","13 fields","23 fields","30 fields"],a:1,e:"Implementation Report = 13개 항목 구조. 함정: 인접 숫자."},
{id:"007",tp:"POJK",d:"Medium",q:"The anti-fraud regulation applies to:",o:["Only the finance department staff","All employees and management","Only the external service vendors","Only the board-level members"],a:1,e:"적용범위 = 전 임직원·경영진. 함정: 일부 한정은 오해."},
{id:"008",tp:"POJK",d:"Hard",q:"A finance company must submit its anti-fraud strategy to:",o:["Its competitors","OJK","The tax office","The stock exchange"],a:1,e:"Anti-fraud 전략 제출 = OJK. 함정: 무관 기관."},
{id:"009",tp:"POJK",d:"Medium",q:"The compliance matrix in the anti-fraud framework maps:",o:["Sales figures to the regions","Requirements to sanctions","Staff members to their salaries","Products to their listed prices"],a:1,e:"Compliance Matrix = 요건-제재 매핑. 함정: 무관 매핑으로 오도."},
{id:"010",tp:"POJK",d:"Hard",q:"Failure to implement the anti-fraud strategy may result in:",o:["A bonus payment","Administrative sanctions","An automatic upgrade","Tax exemption"],a:1,e:"미이행 = 행정제재(경고·벌금 등). 함정: 보상·면제는 정반대."},
{id:"011",tp:"4Pillars",d:"Hard",q:"The four pillars of the anti-fraud strategy are:",o:["Plan, do, check, act","Prevention, detection, investigation, monitoring","Avoid, transfer, mitigate, accept","Identify, assess, treat, report"],a:1,e:"Anti-fraud 4기둥 = 예방·탐지·조사보고·모니터링평가시정. 함정: PDCA·위험대응과 혼동."},
{id:"012",tp:"4Pillars",d:"Hard",q:"An anti-fraud awareness program belongs to which pillar?",o:["Detection","Prevention","Investigation","Monitoring"],a:1,e:"인식제고 프로그램 = 예방(prevention) 기둥. 함정: 탐지와 혼동."},
{id:"013",tp:"4Pillars",d:"Hard",q:"A whistleblowing system belongs primarily to which pillar?",o:["Prevention","Detection","Investigation","Monitoring"],a:1,e:"내부고발 = 탐지(detection) 기둥. 함정: 예방과 혼동."},
{id:"014",tp:"4Pillars",d:"Hard",q:"Conducting an investigation after a fraud signal is which pillar?",o:["The prevention pillar","Investigation/reporting","The detection pillar","The monitoring pillar"],a:1,e:"조사 = 조사·보고·제재(investigation) 기둥. 함정: 탐지와 혼동."},
{id:"015",tp:"4Pillars",d:"Hard",q:"Evaluating and correcting the anti-fraud system is which pillar?",o:["The prevention pillar","Monitoring/evaluation","The detection pillar","The investigation pillar"],a:1,e:"평가·시정 = 모니터링·평가·후속 기둥. 함정: 조사와 혼동."},
{id:"016",tp:"4Pillars",d:"Medium",q:"A 'know your employee' policy supports which pillar?",o:["Prevention","Detection","Investigation","Reporting"],a:0,e:"KYE = 예방 기둥(채용·보직 위험관리). 함정: 탐지와 혼동."},
{id:"017",tp:"4Pillars",d:"Hard",q:"Surprise audits and data analytics primarily serve:",o:["Prevention","Detection","Investigation","Sanctioning"],a:1,e:"불시감사·데이터분석 = 탐지 기둥. 함정: 예방과 혼동."},
{id:"018",tp:"4Pillars",d:"Hard",q:"Imposing sanctions on a proven fraudster belongs to which pillar?",o:["The prevention pillar","Investigation/sanction","The detection pillar","The monitoring pillar"],a:1,e:"제재 = 조사·보고·제재 기둥. 함정: 모니터링과 혼동."},
{id:"019",tp:"4Pillars",d:"Medium",q:"The four pillars are designed to work:",o:["In total isolation","As an integrated cycle","Only once a year","Independently of each other"],a:1,e:"4기둥 = 통합 순환 작동. 함정: 단절·연1회는 오해."},
{id:"020",tp:"4Pillars",d:"Hard",q:"Reporting fraud cases into SIPELAKU supports which pillar?",o:["The prevention pillar only","Investigation/reporting","Pure prevention activity","No pillar of the four"],a:1,e:"SIPELAKU 보고 = 조사·보고 기둥. 함정: 예방과 혼동."},
{id:"021",tp:"RBA",d:"Hard",q:"A Risk-Based Approach to fraud means resources are allocated to:",o:["Every area equally","The highest fraud-risk areas","Only the marketing team","Random areas by lottery"],a:1,e:"RBA = 고위험 영역 집중. 함정: 균등배분은 RBA 반대."},
{id:"022",tp:"RBA",d:"Hard",q:"A fraud risk assessment should be conducted:",o:["Once and never again","Periodically and on change","Only after a fraud occurs","Only by competitors"],a:1,e:"부정위험 평가 = 정기·변화 시. 함정: 일회·사후만은 부적절."},
{id:"023",tp:"RBA",d:"Medium",q:"Fraud risk is highest where there is:",o:["Strong segregation of duties","Weak controls and high pressure","Regular independent audits","Clear accountability"],a:1,e:"부정위험 高 = 약한 통제·높은 압력·기회. 함정: 나머지는 위험 저감 요인."},
{id:"024",tp:"RBA",d:"Hard",q:"The fraud triangle consists of:",o:["Plan, do, check","Pressure, opportunity, rationalization","Avoid, transfer, accept","People, process, systems"],a:1,e:"Fraud triangle = 압력·기회·합리화. 함정: PDCA·운영위험 요소와 혼동."},
{id:"025",tp:"RBA",d:"Hard",q:"'Opportunity' in the fraud triangle is best reduced by:",o:["Raising all the staff salaries","Strengthening internal controls","Increasing the staff workload","Reducing all the reporting"],a:1,e:"기회 축소 = 내부통제 강화. 함정: 급여·업무량은 압력·합리화 영역."},
{id:"026",tp:"RBA",d:"Hard",q:"'Pressure' in the fraud triangle typically arises from:",o:["Strong internal controls","Personal financial strain","Independent audits","Clear policies"],a:1,e:"압력 = 개인 재정난·실적압박. 함정: 통제·감사는 기회 영역."},
{id:"027",tp:"RBA",d:"Hard",q:"'Rationalization' in the fraud triangle refers to:",o:["An internal control weakness","Self-justification of the act","An internal audit procedure","A report submission deadline"],a:1,e:"합리화 = 행위 자기정당화. 함정: 통제·감사 절차와 혼동."},
{id:"028",tp:"RBA",d:"Medium",q:"A fraud risk register is used to:",o:["List all the staff birthdays","Record and rate fraud risks","Schedule the marketing plans","Track the office supplies"],a:1,e:"부정위험 등록부 = 부정위험 식별·평가·대응 기록. 함정: 무관 항목."},
{id:"029",tp:"RBA",d:"Hard",q:"High-risk fraud areas should receive:",o:["Less oversight and attention","Enhanced controls and monitoring","No special attention at all","Only an annual basic review"],a:1,e:"고위험 영역 = 강화 통제·모니터링. 함정: 완화·무관심은 RBA 위배."},
{id:"030",tp:"RBA",d:"Hard",q:"Combining KYE, segregation, and analytics reflects:",o:["A single-control approach","A layered RBA defense","An absence of controls","Marketing strategy"],a:1,e:"KYE+분리+분석 = 다층 RBA 방어. 함정: 단일통제·무통제는 오답."},
{id:"031",tp:"InternalAudit",d:"Hard",q:"In the Three Lines Model, internal audit is the:",o:["First line","Second line","Third line","Outside the model"],a:2,e:"내부감사 = 3선. 함정: 1선(영업)·2선(위험·준법)으로 오배치."},
{id:"032",tp:"InternalAudit",d:"Hard",q:"The primary purpose of internal audit is to provide:",o:["Daily risk operations","Independent assurance","Marketing strategy","Loan approvals"],a:1,e:"내부감사 목적 = 독립적 보증·자문. 함정: 실무·영업 기능과 혼동."},
{id:"033",tp:"InternalAudit",d:"Hard",q:"To preserve independence, internal audit should report to:",o:["The sales manager","The audit committee/board","Daily operations head","The marketing team"],a:1,e:"독립성 = 감사위원회·이사회 보고. 함정: 영업·운영 보고는 독립성 훼손."},
{id:"034",tp:"InternalAudit",d:"Hard",q:"Internal audit's independence is compromised if it:",o:["Reports directly to the board","Audits processes it designed","Assesses any control gaps","Follows its formal charter"],a:1,e:"독립성 훼손 = 자신이 설계한 통제 감사. 함정: 나머지는 정상 역할."},
{id:"035",tp:"InternalAudit",d:"Medium",q:"An internal audit charter defines the function's:",o:["The annual marketing budget","Authority, scope, responsibility","The staff salary grade bands","The dividend payout policy"],a:1,e:"감사헌장 = 권한·범위·책임·보고선. 함정: 무관 문서."},
{id:"036",tp:"InternalAudit",d:"Hard",q:"A risk-based audit plan prioritizes:",o:["Every unit equally","Higher-risk areas first","Only the smallest units","Random selections"],a:1,e:"위험기반 감사계획 = 고위험 영역 우선. 함정: 균등·무작위는 비효율."},
{id:"037",tp:"InternalAudit",d:"Hard",q:"The typical internal audit process sequence is:",o:["Report, plan, execute","Plan, fieldwork, report, follow-up","Follow-up, plan, report","Execute, plan, ignore"],a:1,e:"감사 절차 = 계획→실사→보고→후속. 함정: 순서 교란."},
{id:"038",tp:"InternalAudit",d:"Medium",q:"Audit working papers serve to:",o:["Advertise the audit findings","Document evidence and conclusions","Replace the full audit report","Set the company share price"],a:1,e:"감사조서 = 증거·결론 문서화. 함정: 광고·보고서 대체와 혼동."},
{id:"039",tp:"InternalAudit",d:"Hard",q:"An audit finding should always include:",o:["Only a final conclusion","Condition, cause, and recommendation","Just the auditor's name","A marketing slogan line"],a:1,e:"감사지적 = 현황·기준·원인·영향·권고. 함정: 단편만은 불완전."},
{id:"040",tp:"InternalAudit",d:"Hard",q:"Follow-up on audit recommendations is important to:",o:["Close the audit very quickly","Ensure corrective action is taken","Avoid reporting the findings","Reduce the overall audit scope"],a:1,e:"감사 후속 = 시정조치 이행 확인. 함정: 조기종료·미보고는 부적절."},
{id:"041",tp:"InternalAudit",d:"Hard",q:"Internal audit differs from external audit in that internal audit:",o:["Only checks the financials","Covers operations and controls broadly","Is hired by the shareholders","Issues the annual statutory accounts"],a:1,e:"내부감사 = 운영·통제·거버넌스 광범위(상시). 외부감사 = 재무제표 의견. 함정: 둘 혼동."},
{id:"042",tp:"InternalAudit",d:"Medium",q:"An internal auditor must maintain:",o:["Bias toward management","Objectivity and integrity","Loyalty to sales targets","Secrecy from the board"],a:1,e:"감사인 = 객관성·청렴·독립. 함정: 편향·영업충성은 윤리 위배."},
{id:"043",tp:"InternalAudit",d:"Hard",q:"The audit committee's role regarding internal audit is to:",o:["Run the audit fieldwork itself","Oversee its independence and work","Sell the financial products","Approve all the loan files"],a:1,e:"감사위원회 = 내부감사 독립성·업무 감독. 함정: 실무·영업과 혼동."},
{id:"044",tp:"InternalAudit",d:"Hard",q:"Audit evidence should be:",o:["Based on rumor","Sufficient and reliable","Purely verbal","Hidden from review"],a:1,e:"감사증거 = 충분·신뢰·관련성. 함정: 소문·구두만은 불충분."},
{id:"045",tp:"InternalAudit",d:"Hard",q:"A material control weakness should be:",o:["Concealed quietly from all","Reported with recommendations","Ignored if seen as minor","Left over for the next year"],a:1,e:"중대 통제취약 = 보고·권고. 함정: 은폐·방치는 부적절."},
{id:"046",tp:"InternalAudit",d:"Medium",q:"Internal audit adds value primarily by:",o:["Increasing internal bureaucracy","Improving controls and governance","Boosting the marketing reach","Setting the product prices"],a:1,e:"내부감사 가치 = 통제·거버넌스·프로세스 개선. 함정: 관료화·마케팅과 혼동."},
{id:"047",tp:"InternalAudit",d:"Hard",q:"The frequency of internal audits should be:",o:["Once per decade","Risk-based and periodic","Never scheduled","Random and untracked"],a:1,e:"감사 주기 = 위험기반·정기. 함정: 극단 빈도는 부적절."},
{id:"048",tp:"InternalAudit",d:"Hard",q:"Audit recommendations should be:",o:["Vague and general","Specific and actionable","Impossible to implement","Kept confidential forever"],a:1,e:"권고 = 구체·실행가능. 함정: 모호·비실행은 무의미."},

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W4_v2";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp.map(shuffleOpts);
    cur=0;answers=[];render();return;
  }
  let pool=(mode==='all')?shuffle(BANK):shuffle(BANK).slice(0,30);
  quiz=pool.map(shuffleOpts);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Anti-Fraud·Internal Audit 전 범위 완주</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W4-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W4-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W4-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
