<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;padding:24px 16px 80px}
  .wrap{max-width:760px;margin:0 auto}
  header{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:22px}
  .eyebrow{font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);font-weight:700}

  .bar{height:6px;background:var(--gold-soft);border-radius:99px;overflow:hidden;margin-bottom:18px}

  .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

  .tag.hard{background:#f6e9e6;border-color:#e3bdb5;color:var(--red)}
  .tag.medium{background:#fbf2dd;border-color:#e6cf9a;color:var(--gold)}

  .opt .k{font-weight:800;color:var(--gold);flex-shrink:0;width:18px}

  .opt.correct .k{color:var(--green)}
  .opt.wrong{background:#f7e9e6;border-color:var(--red)}
  .opt.wrong .k{color:var(--red)}
  .exp{margin-top:16px;padding:15px;background:var(--paper);border-left:3px solid var(--gold);border-radius:4px;font-size:14px;display:none}
  .exp.show{display:block}
  .exp b{color:var(--green)}
  .nav{display:flex;justify-content:space-between;margin-top:22px;gap:12px}
  button.act{background:var(--ink);color:#fff;border:none;padding:12px 26px;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button.act:disabled{opacity:.35;cursor:default}
  button.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .result{text-align:center;padding:10px 0}
  .score{font-size:54px;font-weight:800;color:var(--gold);letter-spacing:-.02em}
  .scoreline{font-size:15px;color:#5d6075;margin-bottom:20px}

  .breakdown .row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line)}
  .wronglist{text-align:left;margin-top:16px;font-size:13px;color:#5d6075}
  .wronglist .w{padding:8px 0;border-bottom:1px solid var(--line)}
  .start-opts{display:flex;flex-direction:column;gap:10px;margin:18px 0}
  .start-opts button{padding:14px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--ink);text-align:left;transition:border-color .15s}
  .start-opts button:hover{border-color:var(--gold)}
  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}
  .start-opts button.wrongbtn{border-color:#e3bdb5;background:#fdf4f2}
  .start-opts button.wrongbtn:hover{border-color:var(--red)}
  .wrongbadge{display:inline-block;min-width:20px;text-align:center;background:var(--red);color:#fff;font-size:12px;font-weight:700;border-radius:99px;padding:1px 7px;margin-left:6px}
  .notecard{text-align:left;border:1px solid var(--line);border-radius:8px;padding:14px;margin-bottom:12px;background:#fff}
  .notecard .qid{font-size:11px;letter-spacing:.08em;color:var(--gold);font-weight:700}
  .notecard .nq{font-size:15px;font-weight:600;margin:6px 0 10px}
  .notecard .no{font-size:14px;padding:6px 10px;border-radius:6px;margin-bottom:5px;border:1px solid var(--line)}
  .notecard .no.ok{background:#e9f3ed;border-color:var(--green);font-weight:600}
  .notecard .ne{font-size:13px;color:#5d6075;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line)}
  .notecard .del{font-size:12px;color:var(--red);background:none;border:none;cursor:pointer;font-family:inherit;margin-top:8px;padding:0}
  .noteclear{font-size:13px;color:#5d6075;background:none;border:1px solid var(--line);border-radius:6px;padding:7px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
  footer{text-align:center;font-size:12px;color:#9a9788;margin-top:30px}
</style>

<script>
const BANK = [
{id:"001",tp:"산업사",d:"Hard",q:"In Indonesia's legal hierarchy for finance companies, which instrument ranks HIGHEST?",o:["A POJK issued by OJK","A Law (UU), e.g. the P2SK Law","A Circular Letter (SEOJK)","A Ministerial Decree (KMK)"],a:1,e:"위계 최상위 = Law(UU). POJK·SEOJK는 위임입법, KMK는 구체제 규정. 함정: POJK를 최상위로 오인."},
{id:"002",tp:"산업사",d:"Medium",q:"Before OJK was formed, which institution supervised finance companies?",o:["Bank Indonesia","The Ministry of Finance","Bapepam-LK","The Deposit Insurance Agency"],a:1,e:"OJK 이전 multifinance 감독 = 재무부(Kemenkeu). 은행은 BI였으나 finance company는 재무부. 함정: BI로 오인."},
{id:"003",tp:"산업사",d:"Hard",q:"The 'Double Pledge' fraud cases most directly drove the strengthening of:",o:["The 10x gearing ceiling rule","Fiduciary registration and SLIK checks","Minimum paid-in capital provisions","The 85% foreign ownership cap"],a:1,e:"Double Pledge(중복담보) = fiducia 등록·SLIK 차주검증 강화의 직접 원인. 함정: gearing·자본요건은 별개 조치."},
{id:"004",tp:"산업사",d:"Medium",q:"KMK 1169/1991 is historically credited with establishing the legal basis for:",o:["Consumer credit cards","Leasing operations","The creation of OJK","The gearing ratio cap"],a:1,e:"KMK 1169/1991 = leasing 법적 기반. 1974 SKB가 최초 도입, 2000 KMK 448이 4종 통합. 함정: 4종 통합·OJK와 혼동."},
{id:"005",tp:"통계",d:"Hard",q:"The number of conventional finance companies operating in Indonesia is closest to:",o:["88","144","203","265"],a:1,e:"144개사. 통폐합으로 과거 200개+에서 감소. 함정: 인접 수치·과거치 혼동."},
{id:"006",tp:"통계",d:"Hard",q:"A high industry FAR (around 86.70%) primarily indicates that:",o:["Large liquidity buffers are held","Productive assets dominate the sheet","The industry breaches regulation","Capital is being under-utilized"],a:1,e:"FAR ≈ 86.70% = 생산자산이 총자산에서 큰 비중(본업 집중). 함정: 유동성·위반·미활용으로 오인."},
{id:"007",tp:"통계",d:"Hard",q:"MSMD at industry level is ~328.37%, but the regulatory MINIMUM for core capital to paid-in capital is:",o:["At least 100%","At least 50%","At least 150%","At least 328%"],a:1,e:"Core/Paid-in 최소 ≥50%. 산업 평균 328.37%는 평균치일 뿐. 함정: 150% threshold·평균치를 요건으로 오인."},
{id:"008",tp:"통계",d:"Medium",q:"Industry Gross NPF is approximately:",o:["0.89%","2.89%","5.89%","8.89%"],a:1,e:"Gross NPF ≈ 2.89%(5% 미만 = 건전). 함정: 5%·8%대는 부실 신호 수준."},
{id:"009",tp:"통계",d:"Hard",q:"An UPWARD-trending BOPO ratio signals:",o:["Improving efficiency","Deteriorating efficiency","Higher profitability","Lower NPF"],a:1,e:"BOPO 상승 = 비효율 악화(비용/영업수익). 낮을수록 좋음. 함정: 직관과 반대 — 상승을 개선으로 오인."},
{id:"010",tp:"규제프레임",d:"Hard",q:"Which feature was NEWLY introduced by POJK 46/2024 (replacing POJK 35/2018)?",o:["The 10x gearing ceiling","Non-face-to-face financing","The 50% core capital rule","Fiduciary registration"],a:1,e:"POJK 46/2024 신규 = 비대면 financing 허용. gearing·core capital은 기존부터 존재. 함정: 기존 항목을 신규로 오인."},
{id:"011",tp:"규제프레임",d:"Medium",q:"Which regulation governs MSME-focused financing introduced in 2025?",o:["POJK 19/2025","POJK 43/2024","POJK 12/2017","POJK 34/2018"],a:0,e:"POJK 19/2025 = MSME. 43/2024=HR, 12/2017=AML, 34/2018=F&P 재평가. 함정: 인접 번호 혼동."},
{id:"012",tp:"규제프레임",d:"Hard",q:"POJK 12/POJK.01/2017 actually governs which subject?",o:["Fit and Proper reassessment","AML/CFT (APU-PPT)","Minimum paid-in capital","Consumer protection"],a:1,e:"POJK 12/2017 = APU-PPT(AML/CFT). F&P 재평가는 34/2018. 함정: 번호만 보고 F&P로 오인."},
{id:"013",tp:"규제프레임",d:"Hard",q:"The HR competency certification obligation is established under:",o:["POJK 43/2025","POJK 43/2024","POJK 35/2018","POJK 34/2018"],a:1,e:"POJK 43/2024 = HR 인증. 함정: 43/2025는 존재하지 않는 규정 — 과거 오기록."},
{id:"014",tp:"규제프레임",d:"Hard",q:"The minimum HR training budget is calculated as 2.5% of:",o:["Net income for the year","Personnel/employee expenses","Total consolidated assets","Paid-in share capital"],a:1,e:"교육예산 = 인건비(personnel expenses)의 2.5%. 함정: 순이익·자산·자본 기준으로 오인 — 반복 오류점."},
{id:"015",tp:"규제프레임",d:"Medium",q:"The Indonesian finance company industry Roadmap covers which period?",o:["2020-2024","2024-2028","2023-2027","2025-2030"],a:1,e:"Roadmap 2024-2028. 함정: 인접 연도 혼동."},
{id:"016",tp:"사업영역",d:"Hard",q:"Which set lists the FOUR core conventional financing activities?",o:["Leasing, deposits, insurance, factoring","Leasing, factoring, credit card, consumer financing","Banking, leasing, factoring, underwriting","Consumer financing, deposits, leasing, brokerage"],a:1,e:"4대 본업 = leasing·factoring·credit card·consumer financing. 함정: deposit·insurance·banking은 면허 외."},
{id:"017",tp:"사업영역",d:"Hard",q:"Working capital and investment financing facilities were first enabled by:",o:["KMK 448/2000","POJK 35/2018","POJK 46/2024","POJK 19/2025"],a:1,e:"운전자본·투자 facility = POJK 35/2018 도입(46/2024로 갱신). 함정: 최신 번호·구번호 혼동."},
{id:"018",tp:"사업영역",d:"Medium",q:"Sharia financing receivables in the industry have recently shown which trend?",o:["Steady decline","Double-digit growth","Flat stagnation","A regulatory ban"],a:1,e:"Sharia financing 두자릿수 성장. 함정: 감소·정체·금지는 사실 아님."},
{id:"019",tp:"사업영역",d:"Hard",q:"Which is NOT a permitted funding source for a finance company?",o:["Issuance of corporate bonds","Bank and syndicated loans","Public demand/savings deposits","Issuance of sharia sukuk"],a:2,e:"공중 예금수취 = 은행 고유, finance company 금지. 함정: 채권·차입·sukuk은 허용."},
{id:"020",tp:"금융기법",d:"Hard",q:"At the end of a FINANCE lease, the lessee typically:",o:["Returns the asset, no option","Holds an option at residual value","Receives ownership for free","Pays a penalty equal to value"],a:1,e:"Finance lease = 잔존가치 매수선택권. operating lease가 반환형. 함정: operating과 혼동."},
{id:"021",tp:"금융기법",d:"Hard",q:"The key distinction between an operating lease and a finance lease is:",o:["The currency of the contract","Transfer of ownership risk/reward","The nationality of the lessor","The contract length on its own"],a:1,e:"핵심 = 소유 위험·보상 이전 여부(finance=이전). 함정: 기간 '만'으로 구분은 부정확."},
{id:"022",tp:"금융기법",d:"Medium",q:"In factoring (anjak piutang), the finance company:",o:["Lends against real estate","Purchases or manages receivables","Issues consumer credit cards","Leases heavy equipment"],a:1,e:"Factoring = 매출채권 매입·관리. 함정: 담보대출·카드·리스와 혼동."},
{id:"023",tp:"금융기법",d:"Hard",q:"Under a 'channeling' arrangement, credit risk is borne by:",o:["The finance company on its own","The channeling partner/fund source","Both parties equally by law","The OJK as the regulator"],a:1,e:"Channeling = 자금원(partner)이 신용위험 부담, 장부 미이전. joint financing은 분담. 함정: 둘 혼동."},
{id:"024",tp:"금융기법",d:"Hard",q:"In 'joint financing', risk and funding are typically:",o:["Identical to channeling","Shared by agreed proportion","Borne by neither party","Carried fully by the borrower"],a:1,e:"Joint financing = 약정 비율 분담. channeling(미이전)과 대조. 함정: 두 기법 동일시."},
{id:"025",tp:"비율",d:"Hard",q:"The maximum gearing ratio permitted is:",o:["5 times","10 times","15 times","Unlimited"],a:1,e:"Gearing 최대 10배, 최저 0배. 함정: 인접 배수."},
{id:"026",tp:"비율",d:"Hard",q:"The gearing ratio is the ratio of:",o:["Equity to total assets","Interest-bearing debt to equity","Net income to revenue","Receivables to total assets"],a:1,e:"Gearing = 이자부 차입/자기자본. 함정: FAR(receivables/assets)와 혼동 — 동일 구조 distractor."},
{id:"027",tp:"비율",d:"Medium",q:"A finance company with gearing above 10x is:",o:["Operating very efficiently","In breach of the prudential limit","Eligible for a license upgrade","Fully exempt from the BMPP"],a:1,e:"10배 초과 = 건전성 위반. 함정: 고gearing을 효율로 오인."},
{id:"028",tp:"리스크",d:"Hard",q:"Under BMPP, the SINGLE obligor limit is:",o:["10% of equity","20% of equity","50% of equity","17.5% of equity"],a:1,e:"단일 차주 20% of equity. group 50%, acquisition cost 17.5%(of income). 함정: 수치 swap."},
{id:"029",tp:"리스크",d:"Hard",q:"Under BMPP, the limit for ONE GROUP of obligors is:",o:["20% of equity","50% of equity","17.5% of equity","100% of equity"],a:1,e:"Group 50%, single 20%. 함정: single/group swap, 17.5% 혼입."},
{id:"030",tp:"리스크",d:"Hard",q:"The financing acquisition cost cap of 17.5% is measured against:",o:["Equity of the company","Each contract's total income","Total paid-in capital","Total consolidated assets"],a:1,e:"Acquisition cost = 계약별 총수입의 17.5%. 함정: equity 기준 BMPP와 혼동 — 기준 자체가 다름."},
{id:"031",tp:"리스크",d:"Hard",q:"Which item is EXCLUDED from the BMPP calculation?",o:["Financing to a single individual","Financing secured by government","Financing to a corporate group","Consumer financing above Rp 1bn"],a:1,e:"정부보증 등 안전자산은 BMPP 산정 제외. 함정: 일반 차주 financing은 모두 포함."},
{id:"032",tp:"리스크",d:"Medium",q:"The primary purpose of BMPP is to:",o:["Maximize market share","Limit concentration risk","Raise the gearing ratio","Reduce capital requirements"],a:1,e:"BMPP 목적 = 집중위험 제한. 함정: 시장점유·gearing과 무관."},
{id:"033",tp:"리스크",d:"Hard",q:"Requiring collateral from a receivable seller in factoring mainly addresses:",o:["Liquidity risk","Credit/default risk","Operational risk","Currency risk"],a:1,e:"매도인 담보 = 매입채권 부도(credit) 위험 완화. 함정: 유동성·운영위험으로 오인."},
{id:"034",tp:"리스크",d:"Hard",q:"Which ratio set does OJK typically review for soundness?",o:["P/E, dividend yield, beta","ROA, NPF, gearing, A/R quality","CPI, GDP growth, FX rate","Brand value and market cap"],a:1,e:"건전성 지표 = ROA·NPF·gearing·A/R 품질. 함정: 주식·거시지표는 무관."},
{id:"035",tp:"리스크",d:"Medium",q:"A core-capital-to-paid-in-capital ratio below 0% indicates:",o:["A healthy position","Capital impairment","Compliance with the minimum","Excess capital"],a:1,e:"core/paid-in <0% = 자본잠식. 함정: 음수를 정상으로 오인."},
{id:"036",tp:"GCG",d:"Hard",q:"Which set correctly lists the five GCG principles?",o:["Profit, growth, scale, speed, risk","Transparency, accountability, responsibility, independency, fairness","Liquidity, solvency, efficiency, equity, return","Compliance, audit, reporting, control, sanction"],a:1,e:"GCG = TARIF(투명·책임·responsibility·독립·공정). 함정: 재무·통제 용어 묶음으로 위장."},
{id:"037",tp:"GCG",d:"Hard",q:"The minimum paid-in capital to establish a finance company is:",o:["Rp 100 billion","Rp 250 billion","Rp 50 billion","Rp 500 billion"],a:1,e:"최소 납입자본 Rp 250 billion. 함정: 인접 금액."},
{id:"038",tp:"GCG",d:"Hard",q:"Foreign ownership of a finance company is capped at:",o:["49% of paid-in capital","85% of paid-in capital","100% of paid-in capital","50% of paid-in capital"],a:1,e:"외국인 지분 최대 85%. 함정: 49%·50%·100%와 혼동."},
{id:"039",tp:"GCG",d:"Hard",q:"The cap on foreign directors (and foreign commissioners) each is:",o:["50% each","85% each","100% each","No cap"],a:0,e:"외국인 이사·감사 각 50%. 지분 cap(85%)과 다름. 함정: 85%로 통일 오인."},
{id:"040",tp:"GCG",d:"Medium",q:"The Board of Commissioners (BOC) is responsible for:",o:["Running daily operations","Supervising the Board of Directors","Leading the sales function","Performing the external audit"],a:1,e:"BOC = BOD 감독. 일상경영은 BOD. 함정: BOD/BOC swap."},
{id:"041",tp:"GCG",d:"Hard",q:"Which statement about core and paid-in capital is correct?",o:["Core may be any amount","Core must be ≥50% of paid-in","Paid-in must be ≥50% of core","They must be equal"],a:1,e:"Core ≥ 50% of paid-in. 함정: 비율 방향 역전."},
{id:"042",tp:"GCG",d:"Medium",q:"GCG implementation primarily aims to:",o:["Guarantee a fixed annual profit","Protect stakeholders, sound operations","Eliminate every conceivable risk","Replace OJK external supervision"],a:1,e:"GCG 목적 = 이해관계자 보호·건전경영. 함정: 이익보장·위험제거는 과장."},
{id:"043",tp:"GCG",d:"Hard",q:"Adjusting provisions due to a change in laws/regulations is an example of:",o:["An operational risk crystallizing","Compliance/regulatory risk management","A market price risk exposure","Reputational brand-image damage"],a:1,e:"법규 변경 대응 = 준법·규제위험 관리. 함정: 운영·시장위험으로 오인."},
{id:"044",tp:"GCG",d:"Medium",q:"Internally, fit-and-proper standards of management are maintained primarily by:",o:["The marketing department","The BOC with nomination function","External consulting vendors","The OJK acting on its own"],a:1,e:"내부 F&P 유지 = BOC + 지명기능. 함정: OJK '단독'은 외부 승인 — 내부 유지와 별개."},
{id:"045",tp:"GCG",d:"Hard",q:"Additional paid-in capital obtained NOT via public offering is treated as:",o:["Tier 2 supplementary capital","Relevant to core capital computation","Excluded entirely from capital","Counted as gearing-eligible debt"],a:1,e:"비공모 추가 납입자본도 core capital 산정 관련. 함정: 자본 배제·부채로 오인."},
{id:"046",tp:"소비자보호",d:"Hard",q:"Which regulation anchors Indonesian financial consumer protection?",o:["POJK 22/2023","POJK 46/2024","POJK 35/2018","POJK 12/2017"],a:0,e:"POJK 22/2023 = 소비자보호. 함정: 46(사업운영)·35(시설)·12(AML)은 별개."},
{id:"047",tp:"소비자보호",d:"Hard",q:"Which is a CORE consumer protection principle?",o:["Maximizing fees without disclosure","Transparency and fair treatment","Selling only to wealthy clients","Avoiding written contracts"],a:1,e:"소비자보호 = 투명성·공정대우·민원처리. 함정: 수수료 극대화·계약 회피는 위반."},
{id:"048",tp:"소비자보호",d:"Medium",q:"A failure in the complaint mechanism most directly creates:",o:["Foreign currency exposure","Reputational and compliance risk","Liquidity shortfall risk only","A breach of the gearing cap"],a:1,e:"민원처리 실패 = 평판·준법 위험. 함정: 환·유동성과 무관."},
{id:"049",tp:"소비자보호",d:"Hard",q:"Which recent regulation belongs to the consumer protection set?",o:["POJK 38/2025","POJK 19/2025","POJK 34/2018","POJK 8/2023"],a:0,e:"POJK 38/2025 = 소비자보호 set. 함정: 19(MSME)·34(F&P)·8(AML)은 다른 영역."},
{id:"050",tp:"소비자보호",d:"Medium",q:"Personal data protection requires the finance company to:",o:["Sell data to maximize revenue","Obtain consent; safeguard data","Publish all client data openly","Discard data after each contract"],a:1,e:"개인정보 = 동의 + 기밀 보호. 함정: 판매·공개는 위반."},
{id:"051",tp:"Sharia",d:"Hard",q:"In Sharia financing, the prohibition of 'riba' refers to:",o:["Excessive risk-taking","Interest / usury","Speculation","Charity"],a:1,e:"Riba = 이자 금지. gharar(불확실성)·maysir(투기)는 별도. 함정: gharar/maysir와 혼동."},
{id:"052",tp:"Sharia",d:"Hard",q:"A cost-plus sale of an asset to the customer is which Sharia contract?",o:["Ijarah","Murabahah","Musharakah","Wadiah"],a:1,e:"Murabahah = 원가가산 매매. Ijarah=리스, Musharakah=동업. 함정: Ijarah와 혼동."},
{id:"053",tp:"Sharia",d:"Hard",q:"The Sharia equivalent of a leasing arrangement is:",o:["Murabahah","Ijarah","Mudharabah","Qard"],a:1,e:"Ijarah = 샤리아 리스. 함정: Murabahah(매매)와 swap."},
{id:"054",tp:"Sharia",d:"Medium",q:"Sharia financing instruments are certified for compliance by:",o:["The external statutory auditor","The Sharia Supervisory Board (DPS)","The internal marketing team","Bank Indonesia as regulator"],a:1,e:"DPS = 샤리아 준수 인증. 함정: 외부감사·BI 소관 아님."},
{id:"055",tp:"Sharia",d:"Hard",q:"Issuance of 'sukuk' by a finance company is:",o:["Prohibited","A permitted funding source","Equivalent to deposit-taking","Limited to banks only"],a:1,e:"Sukuk = 허용 자금원. 함정: 예금수취·은행 전용 오인."},
{id:"056",tp:"Sharia",d:"Medium",q:"'Multipurpose Sharia' financing differs from conventional chiefly by:",o:["Charging higher interest","Adhering to sharia principles","Serving only corporations","Requiring no documentation"],a:1,e:"Multipurpose Sharia = 샤리아 원칙 준수. 함정: '고이자'는 riba 금지 위배."},
{id:"057",tp:"OtherRegs",d:"Hard",q:"AML/CFT (APU-PPT) for finance companies is CURRENTLY governed primarily by:",o:["POJK 12/2017","POJK 8/2023","POJK 34/2018","POJK 46/2024"],a:1,e:"현행 APU-PPT = POJK 8/2023(12/2017→23/2019→8/2023). 함정: 12/2017을 현행으로 오인."},
{id:"058",tp:"OtherRegs",d:"Hard",q:"The Fit & Proper REASSESSMENT of management is governed by:",o:["POJK 34/2018","POJK 12/2017","POJK 43/2024","POJK 19/2025"],a:0,e:"F&P 재평가 = POJK 34/2018. 함정: 12(AML)·43(HR)과 혼동."},
{id:"059",tp:"OtherRegs",d:"Medium",q:"A Risk-Based Approach (RBA) under APU-PPT means:",o:["Treating every customer alike","Matching diligence intensity to risk","Ignoring low-value transactions","Outsourcing all KYC checks"],a:1,e:"RBA = 위험에 비례한 실사 강도. 함정: 동일 처리는 RBA 반대."},
{id:"060",tp:"OtherRegs",d:"Hard",q:"Enhanced Due Diligence (EDD) is escalated primarily for:",o:["All ordinary retail customers","Higher-risk customers such as PEPs","Only domestic resident clients","Customers under Rp 1 million"],a:1,e:"EDD = 고위험(PEP) 대상. 함정: 전체·소액 적용은 오해."},
{id:"061",tp:"OtherRegs",d:"Medium",q:"SLIK is used by finance companies primarily to:",o:["Process payroll","Check a debtor's credit history","File tax returns","Register fiduciary collateral"],a:1,e:"SLIK = 차주 신용이력 조회. 함정: fiducia 등록·세무와 혼동."},
{id:"062",tp:"OtherRegs",d:"Hard",q:"Fiduciary registration (jaminan fidusia) gives the finance company:",o:["Ownership of the debtor's company","An enforceable security interest","An equity stake","A tax exemption"],a:1,e:"Fiducia = 부도 시 집행 가능한 담보권. 함정: 소유권·지분으로 오인."},
{id:"063",tp:"OtherRegs",d:"Medium",q:"Which institution issues POJK regulations?",o:["Bank Indonesia","Otoritas Jasa Keuangan","Ministry of Finance","APPI"],a:1,e:"POJK = OJK 규정. 함정: BI(PBI)·재무부(KMK)와 구분."},
{id:"064",tp:"OtherRegs",d:"Medium",q:"APPI's role in the industry is best described as:",o:["The financial regulator","The industry association","A state-owned lender","The deposit insurer"],a:1,e:"APPI = 업계 협회(SPPI 주관). 함정: 규제기관(OJK)과 혼동."},
{id:"065",tp:"기타조항",d:"Hard",q:"A core-to-paid-in ratio between 0% and 50% means the company is:",o:["Fully compliant","Below the 50% minimum","Exceeding requirements","Exempt from gearing"],a:1,e:"0~50% = 최소요건(50%) 미달. 함정: 양수라서 '준수'로 오인."},
{id:"066",tp:"기타조항",d:"Medium",q:"The gearing ratio provision floor is:",o:["1 time","0 (zero) times","5 times","Negative gearing"],a:1,e:"Gearing 최저 0배, 최고 10배. 함정: 최저 1배 오인."},
{id:"067",tp:"기타조항",d:"Hard",q:"Which income types are referenced in the acquisition cost ceiling context?",o:["Interest income from financing only","Administration & provision income","Dividend income from holdings only","Trading and FX gains only"],a:1,e:"계약수입에 administration·provision income 포함. 함정: 이자수입만으로 한정 오인."},
{id:"068",tp:"기타조항",d:"Medium",q:"To issue bonds as a funding source, a finance company must:",o:["Obtain prior depositor approval","Comply with capital-market rules","Reduce its paid-in capital","Cancel its existing license"],a:1,e:"채권 발행 = 자본시장 규정 준수. 함정: 예금자 승인은 비해당(예금 없음)."},
{id:"069",tp:"기타조항",d:"Hard",q:"Non-face-to-face financing requires the company to satisfy preconditions under:",o:["A zero gearing rule","POJK 46/2024 with identity safeguards","A conversion to a bank","Abandoning fiduciary registration"],a:1,e:"비대면 = POJK 46/2024 요건(신원확인 안전장치). 함정: 은행 전환·gearing 0은 무관."},
{id:"070",tp:"기타조항",d:"Medium",q:"A change in a finance company's business activities generally requires:",o:["No notification is required","Approval from or reporting to OJK","Approval from its competitors","A public shareholder referendum"],a:1,e:"사업변경 = OJK 승인·보고. 함정: 무신고·경쟁사 승인은 비현실."},
{id:"071",tp:"통계",d:"Hard",q:"Total industry assets have recently shown which pattern?",o:["Explosive 50% growth","Roughly flat (near 0% YoY)","Halved in one year","Continuous double-digit decline"],a:1,e:"총자산 거의 보합. 함정: 급증·급감 극단으로 오도."},
{id:"072",tp:"통계",d:"Medium",q:"A FAR band of 89%-90% would be interpreted as:",o:["Severe under-utilization","Very high productive-asset focus","A capital impairment signal","A regulatory breach by itself"],a:1,e:"FAR 89~90% = 생산자산 집중 매우 높음. 함정: 그 자체로 위반은 아님."},
{id:"073",tp:"통계",d:"Hard",q:"A rising MSMD ratio most accurately indicates:",o:["Capital shrinking against paid-in","Own capital strengthening vs paid-in","NPF asset quality deteriorating","Gearing breaching the 10x cap"],a:1,e:"MSMD 상승 = 자기자본이 납입자본 대비 강화. 함정: NPF·gearing 혼동, 방향 역전."},
{id:"074",tp:"산업사",d:"Hard",q:"The transition of supervision to OJK was significant because it:",o:["It removed all prudential rules","It unified sector supervision","It banned all foreign ownership","It eliminated the gearing ratio"],a:1,e:"OJK 이관 = 통합감독. 함정: 규제 제거·외인금지는 사실 아님."},

{id:"076",tp:"금융기법",d:"Hard",q:"A 'sale and leaseback' transaction allows a company to:",o:["Avoid all taxes permanently","Free up capital via sale-and-lease","Take public savings deposits","Remove the asset from existence"],a:1,e:"Sale & leaseback = 자산 매각 후 재임차로 자본 유동화. 함정: 탈세·예금수취와 무관."},
{id:"077",tp:"금융기법",d:"Hard",q:"Consumer financing differs from a bank loan chiefly because it:",o:["It is funded by deposits","It finances goods on installment","It offers checking accounts","It issues legal-tender currency"],a:1,e:"Consumer financing = 특정 소비재 할부 지원. 함정: 예금·당좌는 은행 기능."},
{id:"078",tp:"금융기법",d:"Medium",q:"In credit card business, the principal income source is typically:",o:["Net deposit interest spreads","Interest, fees and commissions","Direct government subsidies","Equity investment dividends"],a:1,e:"신용카드 수입 = 이자·수수료·가맹점 commission. 함정: 예금스프레드는 은행형."},

{id:"081",tp:"리스크",d:"Hard",q:"Funding long-term leases with short-term borrowings creates mainly:",o:["Liquidity/maturity-mismatch risk","A breach of sharia principles","A consumer-protection failure","An automatic gearing exemption"],a:0,e:"장기자산-단기부채 = 유동성·만기불일치 위험. 함정: 샤리아·소비자보호와 무관."},

{id:"084",tp:"GCG",d:"Hard",q:"Independency under GCG specifically requires management to:",o:["Keep total secrecy from regulators","Act free from undue influence","Refuse all external audits","Centralize power in the CEO"],a:1,e:"Independency = 부당영향·이해상충 배제. 함정: 비밀주의·권력집중은 위배."},

{id:"086",tp:"GCG",d:"Medium",q:"The Board of Directors (BOD) is responsible for:",o:["Supervising its own work","Managing day-to-day operations","Taking over the OJK's role","Auditing the Commissioners"],a:1,e:"BOD = 일상경영·전략실행. 감독은 BOC. 함정: BOD/BOC 혼동."},
{id:"087",tp:"GCG",d:"Hard",q:"A finance company with 90% foreign shareholding is:",o:["Compliant","In breach of the 85% cap","Eligible for tax breaks","Subject to higher gearing"],a:1,e:"외인 90% = 85% cap 위반. 함정: 인접 수치 식별."},
{id:"088",tp:"GCG",d:"Medium",q:"Responsibility (GCG) primarily concerns:",o:["Maximizing short-term reported profit","Compliance with laws and principles","Avoiding every possible business risk","Concealing related-party transactions"],a:1,e:"Responsibility = 법규·건전경영원칙 준수. 함정: 단기이익·은폐는 위배."},
{id:"089",tp:"소비자보호",d:"Hard",q:"A transparency requirement in consumer protection ensures that:",o:["Terms may change unilaterally anytime","Consumers get clear pre-commitment info","Contracts kept secret from clients","Fees may be hidden in the contract"],a:1,e:"투명성 = 구속 전 명확정보 제공. 함정: 일방변경·은폐는 정반대."},
{id:"090",tp:"소비자보호",d:"Medium",q:"Consumer complaint and dispute resolution is governed by:",o:["POJK 22/2023 (consumer protection)","POJK 46/2024 (business operations)","POJK 35/2018 (business facilities)","KMK 448/2000 (legacy decree)"],a:0,e:"민원·분쟁해결 = 소비자보호 규정군. 함정: 사업운영·시설 규정은 별개."},
{id:"091",tp:"OtherRegs",d:"Hard",q:"The correct replacement chain for the AML/CFT regulation is:",o:["12/2017 → 23/2019 → 8/2023","8/2023 → 12/2017 → 34/2018","34/2018 → 12/2017","46/2024 → 12/2017"],a:0,e:"APU-PPT: 12/2017→23/2019 개정→8/2023 대체. 함정: 순서 역전·타 규정 혼입."},

{id:"093",tp:"OtherRegs",d:"Medium",q:"PEP screening under APU-PPT is required because PEPs present:",o:["No special risk","Higher corruption/ML risk","Lower credit risk automatically","Tax exemptions"],a:1,e:"PEP = 부패·ML 고위험 → EDD. 함정: 위험 없음·자동 저위험은 오해."},

{id:"098",tp:"산업사",d:"Hard",q:"Why has the NUMBER of finance companies declined while assets stayed roughly stable?",o:["Mass simultaneous company bankruptcies","Consolidation and license revocations","A permanent ban on new licenses","Conversion of all firms into banks"],a:1,e:"사수 감소 = 통폐합·합병·면허취소(자산 보합). 함정: '파산만'·'은행 전환'은 단순화."},

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W1_v2";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function start(mode){
  let pool;
  if(mode==='wrong'){
    pool=shuffle(getWrong().map(byId).filter(Boolean));
    if(!pool.length){home();return}
  } else {
    pool=(mode==='all')?shuffle(BANK):shuffle(BANK).slice(0,30);
  }
  quiz=pool.map(shuffleOpts);
  cur=0; answers=[]; render();
}
function home(){
  const wc=getWrong().length;
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">산업·Health Level·Risk·사업영역·POJK 완주</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${wc?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${wc}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${wc?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const ids=getWrong();
  const cards=ids.map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W1-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W1-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const correct=i===q.a;
  answers[cur]={id:q.id,correct,picked:i};
  if(correct) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W1-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
</html>
