<script>
const BANK = [
{id:"001",tp:"개요",d:"Medium",q:"The new K7 Anti-Fraud unit is based on the philosophy that:",o:["Punishment is the only deterrent","Detection alone is sufficient","Prevention is better than cure","Fraud is unavoidable"],a:2,e:"The anti-fraud strategy rests on the philosophy that prevention is better than cure."},
{id:"002",tp:"POJK",d:"Medium",q:"Which POJK governs the implementation of Anti-Fraud Strategies for financial services institutions?",o:["POJK 28/2024","POJK 12/2024","POJK 43/2024","POJK 48/2024"],a:1,e:"POJK 12/2024 governs anti-fraud strategy implementation; POJK 28/2024 governs SIPELAKU."},
{id:"003",tp:"POJK",d:"Hard",q:"POJK 12/2024 applies to finance companies starting:",o:["October 23, 2024","January 31, 2025","June 26, 2026","July 1, 2024"],a:0,e:"POJK 12/2024 applies to finance companies from October 23, 2024."},
{id:"004",tp:"POJK",d:"Hard",q:"The first Anti-Fraud Strategy implementation report under POJK 12/2024 was due:",o:["30 April 2025","31 January 2025","23 October 2024","15 February 2025"],a:1,e:"First AFS implementation report due 31 January 2025; subsequent annual reports each 31 January."},
{id:"005",tp:"POJK",d:"Medium",q:"Subsequent annual Anti-Fraud Strategy implementation reports are due each:",o:["31 January","15 February","30 April","31 December"],a:0,e:"After the first report, annual AFS reports are due each 31 January."},
{id:"006",tp:"POJK",d:"Hard",q:"Under POJK 12/2024, the anti-fraud working unit/function is:",o:["Responsible only to marketing","Outside the organization","Responsible to the Directors with direct reporting to the Board of Commissioners","Reporting only to customers"],a:2,e:"The anti-fraud unit/function reports to the Directors and has a direct communication/reporting line to the Board of Commissioners."},
{id:"007",tp:"POJK",d:"Hard",q:"The head of the anti-fraud working unit must have all EXCEPT:",o:["Adequate experience in related FSI fields","Experience in anti-fraud","A marketing diploma","A certificate of expertise in anti-fraud"],a:2,e:"The head must have an anti-fraud expertise certificate and/or relevant anti-fraud or FSI experience."},
{id:"008",tp:"POJK",d:"Hard",q:"Which POJK establishes the SIPELAKU track-record system for fraud actors?",o:["POJK 49/2024","POJK 34/2018","POJK 12/2024","POJK 28/2024"],a:3,e:"POJK 28/2024 establishes SIPELAKU; POJK 12/2024 is the Anti-Fraud Strategy regulation."},
{id:"009",tp:"POJK",d:"Hard",q:"Under POJK 28/2024 (SIPELAKU), users must conduct an internal audit of SIPELAKU use at least:",o:["Never","Once per month","Once per quarter","Once per year"],a:3,e:"SIPELAKU users must run an internal audit of its use at least once per year and protect track-record confidentiality."},
{id:"010",tp:"POJK",d:"Hard",q:"SIPELAKU users are PROHIBITED from:",o:["Reporting AFS implementation","Distributing obtained track records to parties outside the defined policies/procedures","Protecting confidentiality","Reporting access-rights changes"],a:1,e:"Users may not access/use track records beyond the consideration criteria, nor distribute them to unauthorized parties."},
{id:"011",tp:"Triangle",d:"Hard",q:"The three elements of the Fraud Triangle in POJK 12/2024 are:",o:["People, Process, Profit","Pressure, Rationalization, Opportunity","Plan, Do, Check","Risk, Reward, Return"],a:1,e:"The fraud triangle: pressure, rationalization and opportunity."},
{id:"012",tp:"Triangle",d:"Hard",q:"In the fraud triangle, 'Opportunity' typically arises from:",o:["High employee morale","Effective monitoring","Strong segregation of duties","Weak internal controls within the company"],a:3,e:"Opportunity arises from weak internal controls; pressure motivates and rationalization justifies the act."},
{id:"013",tp:"Triangle",d:"Medium",q:"'Rationalization' in the fraud triangle refers to:",o:["Seeking justification for one's fraudulent activities","A control weakness","An audit finding","External economic pressure"],a:0,e:"Rationalization is the perpetrator's self-justification for committing fraud."},
{id:"014",tp:"Triangle",d:"Medium",q:"'Pressure' in the fraud triangle drives a person to:",o:["Report wrongdoing","Seek opportunities to commit fraud","Strengthen controls","Resign immediately"],a:1,e:"Pressure leads a person to seek opportunities to commit fraud."},
{id:"015",tp:"Fraud유형",d:"Medium",q:"Per POJK 12/2024, 'Corruption' as a fraud type includes all EXCEPT:",o:["Bribery","Conflict of interest","Extortion","Honest financial reporting"],a:3,e:"Corruption includes conflict of interest, bribery, unauthorized receipt and extortion — not honest reporting."},
{id:"016",tp:"Fraud유형",d:"Medium",q:"Which is a recognized fraud type under POJK 12/2024?",o:["Misuse of assets (cash, supply, other assets)","Standard marketing","Routine audit","Timely tax filing"],a:0,e:"Fraud types: corruption, misuse of assets, financial statement fraud, leaking confidential information, and other equivalent acts."},
{id:"017",tp:"Fraud유형",d:"Hard",q:"Financial statement fraud under POJK 12/2024 involves:",o:["Filing taxes on time","Whistleblowing","Exaggerating or reducing reported figures","Conducting surprise audits"],a:2,e:"Financial statement fraud involves overstating (exaggerate) or understating (reduce) reported figures."},
{id:"018",tp:"Fraud유형",d:"Hard",q:"Which is listed among fraud actions in POJK 12/2024?",o:["Paying a dividend","Leaking confidential information","Holding a board meeting","Submitting an annual report"],a:1,e:"Leaking confidential information is an enumerated fraud action, alongside corruption, asset misuse and statement fraud."},
{id:"019",tp:"4Pillars",d:"Hard",q:"The Anti-Fraud Strategy consists of which four pillars?",o:["Prevention; Detection; Investigation/Reporting/Sanctions; Monitoring/Evaluation/Follow-Up","Identify; Measure; Monitor; Control","Avoid; Transfer; Accept; Mitigate","Plan; Do; Check; Act"],a:0,e:"Four pillars: Prevention; Detection; Investigation, Reporting & Sanctions; Monitoring, Evaluation & Follow-Up."},
{id:"020",tp:"4Pillars",d:"Hard",q:"The objective of the PREVENTION pillar is:",o:["Reducing the potential occurrence of fraud","Reporting to PPATK","Conducting investigations","Imposing sanctions"],a:0,e:"Prevention aims to reduce the potential occurrence of fraud (awareness, vulnerability ID, KYE policy)."},
{id:"021",tp:"4Pillars",d:"Hard",q:"The DETECTION pillar primarily aims to:",o:["Follow up on findings","Reduce potential fraud","Impose sanctions","Identify and discover fraud incidents"],a:3,e:"Detection identifies/discovers fraud via whistleblowing, surprise inspections and monitoring systems."},
{id:"022",tp:"4Pillars",d:"Hard",q:"Which tools belong to the PREVENTION pillar?",o:["Anti-Fraud Awareness, Vulnerability Identification, Employee Due Diligence (KYE) Policy","Whistleblowing, surprise audits, monitoring system","Investigation, reporting, sanctions","Monitoring, evaluation, follow-up"],a:0,e:"Prevention tools: anti-fraud awareness, vulnerability identification and Know-Your-Employee (employee due diligence) policy."},
{id:"023",tp:"4Pillars",d:"Hard",q:"Which tools belong to the DETECTION pillar?",o:["Whistleblowing, Surprise Inspections, Monitoring System","Anti-fraud awareness, KYE policy","Monitoring, evaluation, follow-up","Investigation, sanctions"],a:0,e:"Detection tools: whistleblowing, surprise inspections and a monitoring system."},
{id:"024",tp:"4Pillars",d:"Hard",q:"Which three components form the third pillar (Investigation, Reporting & Sanctions)?",o:["Monitoring, evaluation, follow-up","Investigation, Reporting, Imposition of Sanctions","Avoid, transfer, accept","Awareness, vulnerability, KYE"],a:1,e:"Pillar 3: investigation, reporting, and imposition of sanctions for fraud incidents."},
{id:"025",tp:"4Pillars",d:"Hard",q:"Which three components form the fourth pillar?",o:["Monitoring, Evaluation, Follow-Up","Investigation, reporting, sanctions","Awareness, vulnerability, KYE","Whistleblowing, surprise audit, monitoring"],a:0,e:"Pillar 4: monitoring, evaluation and follow-up of fraud incidents and required actions."},
{id:"026",tp:"4Pillars",d:"Medium",q:"A 'surprise audit' is an anti-fraud tool under which pillar?",o:["Investigation","Prevention","Monitoring","Detection"],a:3,e:"Surprise audits (secret testing/examination) fall under the Detection pillar to heighten alertness."},
{id:"027",tp:"4Pillars",d:"Hard",q:"Whistleblower protection under the Detection pillar requires:",o:["Protection for fraud reporters and a reporting system with follow-up mechanism","No follow-up","Punishing reporters","Public disclosure of reporter identity"],a:0,e:"Detection requires whistleblower protection, fraud-report regulations, and a reporting/follow-up mechanism."},
{id:"028",tp:"4Pillars",d:"Hard",q:"Know Your Employee (KYE) policy under Prevention involves:",o:["Setting interest rates","Marketing products","Choosing the auditor","Recognizing/monitoring employee character, integrity, relationships, behavior and lifestyle"],a:3,e:"KYE recognizes and monitors employee character, integrity, relationships, attitudes/behaviors and lifestyle, with sound recruitment."},
{id:"029",tp:"4Pillars",d:"Medium",q:"Vulnerability identification under Prevention includes spotting:",o:["Strong controls","Inadequate financial controls and unclear policies/procedures","High dividends","Effective monitoring"],a:1,e:"Vulnerabilities include lack of training, excessive risk-reward culture, unclear policies, inadequate financial controls and weak board direction."},
{id:"030",tp:"4Pillars",d:"Medium",q:"Anti-Fraud Awareness under Prevention includes:",o:["Running surprise audits","Filing STRs","Imposing sanctions","Preparing/disseminating an anti-fraud declaration and culture programs"],a:3,e:"Awareness includes an anti-fraud declaration, an employee anti-fraud culture program and consumer fraud-awareness programs."},
{id:"031",tp:"4Aspects",d:"Hard",q:"The Substance of Anti-Fraud Strategy (SAF) reporting under POJK 12/2024 covers which four aspects?",o:["Vision; Mission; Values; Ethics","Prevention; Detection; Investigation/Reporting/Sanctions; Monitoring/Evaluation/Follow-up","Identify; Assess; Treat; Report","Plan; Do; Check; Act"],a:1,e:"SAF reporting substance mirrors the four pillars: prevention; detection; investigation/reporting/sanctions; monitoring/evaluation/follow-up."},
{id:"032",tp:"4Aspects",d:"Hard",q:"Under SAF 'Prevention', minimum measures include all EXCEPT:",o:["Policy of getting to know the employee","Anti-fraud awareness","Identification of vulnerabilities","Imposition of sanctions"],a:3,e:"Prevention minimum: anti-fraud awareness, vulnerability identification, KYE policy; sanctions belong to the investigation pillar."},
{id:"033",tp:"4Aspects",d:"Hard",q:"Under SAF 'Detection', minimum measures include:",o:["Investigation and sanctions","Whistleblowing complaint handling, surprise audit, surveillance system","Monitoring and follow-up","Vision and mission"],a:1,e:"Detection minimum: whistleblowing/complaint mechanisms, surprise audit and surveillance system."},
{id:"034",tp:"4Aspects",d:"Medium",q:"Under SAF 'Investigation, reporting and sanctions', the minimum steps are:",o:["Awareness, vulnerability, KYE","Investigation, reporting, imposition of sanctions","Monitoring, evaluation, follow-up","Plan, do, check"],a:1,e:"This aspect's minimum steps: investigation, reporting and imposition of sanctions."},
{id:"035",tp:"4Aspects",d:"Medium",q:"Under SAF 'Monitoring, evaluation and follow-up', the minimum steps are:",o:["Investigation, reporting, sanctions","Surprise audit, whistleblowing","Monitoring, evaluation, follow-up","Awareness, vulnerability, KYE"],a:2,e:"This aspect's minimum steps: monitoring, evaluation and follow-up."},
{id:"036",tp:"4Aspects",d:"Hard",q:"An example of activity the anti-fraud strategy must help prevent (per POJK 12/2024) is:",o:["Filing timely reports","Paying salaries","Use of accounts for online gambling or fictitious online investment","Holding board meetings"],a:2,e:"Prevention covers misuse for criminal acts such as online gambling, online fraud/fictitious investment, online prostitution and other economic crimes."},
{id:"037",tp:"4Aspects",d:"Hard",q:"The anti-fraud strategy implementation must involve which parties?",o:["Only regulators","Only auditors","Customers, internal FSI parties, and other parties","Only the CEO"],a:2,e:"Implementation must involve customers, internal FSI parties and other related parties."},
{id:"038",tp:"평가",d:"Hard",q:"The Q6 anti-fraud unit (Monitoring the Implementation) requires the BOC to ensure:",o:["More marketing","Documented follow-up on anti-fraud recommendations","Lower interest rates","Higher dividends"],a:1,e:"Monitoring requires ensuring availability of periodic anti-fraud/internal-audit reports and documented follow-up on recommendations."},
{id:"039",tp:"평가",d:"Medium",q:"Monitoring the anti-fraud strategy includes ensuring availability of:",o:["Only marketing reports","Only tax returns","Only dividend records","Periodic reports from the anti-fraud unit and internal audit"],a:3,e:"Monitoring ensures periodic reports from the anti-fraud unit and internal audit are available and reviewed."},
{id:"040",tp:"평가",d:"Hard",q:"Effective monitoring of fraud handling tracks which data?",o:["Only the share price","Only office rent","Only the logo","Statistics on whistleblowing reports and their follow-up"],a:3,e:"Fraud-monitoring data includes whistleblowing-report statistics, follow-up status and loss amounts."},
{id:"041",tp:"평가",d:"Hard",q:"Operational review of the anti-fraud strategy is performed to:",o:["Reduce headcount","Increase the dividend","Change the logo","Verify the strategy is implemented and effective in practice"],a:3,e:"Operational review evaluates real-world implementation and effectiveness of the anti-fraud strategy."},
{id:"042",tp:"평가",d:"Medium",q:"Evaluating the anti-fraud PREVENTION strategy is based on:",o:["Dividend figures","Random guesses","Marketing data only","Monitoring results"],a:3,e:"The prevention strategy is evaluated based on periodic monitoring results."},
{id:"043",tp:"평가",d:"Hard",q:"Site visits in fraud-case monitoring are conducted to:",o:["Sell products","Recruit staff","Set dividends","Follow up on fraud cases when necessary"],a:3,e:"The monitoring mechanism may include site visits, when necessary, to follow up on fraud cases."},
{id:"044",tp:"평가",d:"Hard",q:"Evaluation of anti-fraud effectiveness should be supported by:",o:["Marketing surveys only","Customer star ratings only","Internal audit's evaluation of strategy effectiveness","Share-price charts"],a:2,e:"Effectiveness evaluation draws on internal audit's assessment and follow-up monitoring of prior fraud recommendations."},
{id:"045",tp:"InternalAudit",d:"Hard",q:"Internal Audit sits in which line of the Three Lines Model?",o:["3rd line (independent assurance)","2nd line","1st line","Outside all lines"],a:0,e:"Internal audit is the 3rd line, providing independent assurance over governance and risk management."},
{id:"046",tp:"InternalAudit",d:"Hard",q:"The internal-audit standard referenced in the new module is:",o:["COSO ERM only","Basel III","The International Professional Practices Framework (IPPF) from the IIA","ISO 9001"],a:2,e:"The module cites the IPPF of Internal Auditing from the Institute of Internal Auditors (IIA)."},
{id:"047",tp:"InternalAudit",d:"Hard",q:"The Q7 unit 'Monitoring the Follow-up Results of Internal Audit Findings' emphasizes that an effective audit:",o:["Ignores recommendations","Is only about sanctions","Does not end at identifying findings — following up ensures quality and added value","Ends once findings are listed"],a:2,e:"An effective internal-audit process does not end with findings; follow-up is a proactive step ensuring quality, efficiency and value."},
{id:"048",tp:"InternalAudit",d:"Medium",q:"A required internal-audit work attitude per the module is:",o:["Objectivity in evaluating follow-up to audit results","Bias toward management","Avoiding documentation","Prioritizing marketing"],a:0,e:"Work attitudes include integrity, objectivity in evaluating follow-up, and care/thoroughness in processing data."},
{id:"049",tp:"InternalAudit",d:"Hard",q:"The internal-audit follow-up unit must analyze the implementation of follow-up actions to assess:",o:["The marketing budget","The adequacy of the follow-up plan and its realization","The dividend ratio","The office layout"],a:1,e:"PC 1.1 requires analyzing follow-up implementation to assess adequacy of the follow-up plan."},
{id:"050",tp:"InternalAudit",d:"Medium",q:"Audit findings, conclusions and recommendations should be prepared to support:",o:["Dividend decisions","Pricing changes","Follow-up plans based on audit results","Marketing campaigns"],a:2,e:"A core skill is preparing findings, conclusions and recommendations for follow-up plans from audit results."},
{id:"051",tp:"InternalAudit",d:"Hard",q:"Results of follow-up implementation analysis are communicated to the auditee to:",o:["Obtain corrective solutions and adjust the follow-up plan","Avoid corrections","Hide problems","End the relationship"],a:0,e:"Findings are communicated to the auditee to obtain corrective solutions and adjust the follow-up plan."},
{id:"052",tp:"RBA",d:"Hard",q:"Risk-Based Auditing (RBA) is an approach that focuses on:",o:["Auditing every transaction equally","Identifying, analyzing and mitigating the most significant risks","Marketing the audit function","Avoiding all risk"],a:1,e:"RBA focuses audit effort on the most significant organizational risks."},
{id:"053",tp:"RBA",d:"Medium",q:"Which is a basic principle of Risk-Based Auditing?",o:["Avoid collaboration","Focus on significant risks and use a data-driven approach","Audit randomly","Ignore risk data"],a:1,e:"RBA principles: focus on significant risks, data-driven approach, collaboration with risk management, continuous improvement."},
{id:"054",tp:"RBA",d:"Hard",q:"Per the module's RBA success indicators, the target for 'percentage of risk-based audits' is:",o:["≤30% of audits","≥60% of audits","≥90% of all audits","exactly 50%"],a:2,e:"Industry-standard target: ≥90% of all audits are risk-based (example org result 85% → improvement needed)."},
{id:"055",tp:"RBA",d:"Hard",q:"Per the RBA success indicators, the target for 'findings related to high risk' is:",o:["≤30% of findings","exactly 50%","≥60% of total findings","≥90% of findings"],a:2,e:"Target: ≥60% of findings relate to high risk (example result 50% → greater focus on key risks required)."},
{id:"056",tp:"RBA",d:"Hard",q:"Per the RBA success indicators, the target completion time for risk-based audits is:",o:["≤90 days","≤180 days","≤30 days","≤7 days"],a:2,e:"Target completion time ≤30 days (example result 35 days → greater efficiency required)."},
{id:"057",tp:"RBA",d:"Hard",q:"Per the RBA success indicators, the target audit-recommendation implementation rate is:",o:["≥90%","≥50%","≥60%","≥30%"],a:0,e:"Target recommendation implementation rate ≥90% (example result 88% → nearly meeting target)."},
{id:"058",tp:"RBA",d:"Hard",q:"Which aspects are evaluated when assessing RBA implementation?",o:["Capital; liquidity; FX","Vision; mission; values","Marketing; sales; pricing","Risk-based audit planning; audit execution; reporting and follow-up"],a:3,e:"RBA evaluation assesses planning, execution, and reporting & follow-up of risk-based audits."},
{id:"059",tp:"RBA",d:"Hard",q:"Evaluation techniques for RBA implementation include all EXCEPT:",o:["Comparison with IPPF-IIA standards/best practices","Simulated audits and observations","Risk data analysis and risk assessment","Setting the marketing budget"],a:3,e:"Techniques: risk-data analysis/assessment, comparison with IPPF-IIA standards, and simulated audits/observations."},
{id:"060",tp:"RBA",d:"Medium",q:"RBA success must be measured using:",o:["Share-price targets","Measurable key performance indicators (KPIs)","Subjective opinions only","Marketing metrics"],a:1,e:"RBA success indicators must use measurable KPIs benchmarked against industry-standard targets."},
{id:"061",tp:"RBA",d:"Hard",q:"A recommended RBA improvement is to align the audit plan with:",o:["The dividend schedule","The marketing calendar","The office lease","The organization's risk appetite"],a:3,e:"Integration with business/risk management means aligning the audit plan with the organization's risk appetite and building a risk-based culture."},

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W4";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp.map(shuffleOpts);
    cur=0;answers=[];render();return;
  }
  let pool=(mode==='all')?shuffle(BANK):shuffle(BANK).slice(0,30);
  quiz=pool.map(shuffleOpts);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Anti-Fraud·Internal Audit 전 범위 완주</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W4-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W4-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W4-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
