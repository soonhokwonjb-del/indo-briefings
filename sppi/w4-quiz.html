<script>

{id:"001",tp:"개요",d:"Easy",q:"What is the underlying philosophy of an anti-fraud strategy under POJK 12/2024?",o:["Punish all employees to create deterrence","Outsource all fraud detection to external auditors","Prevention is better than cure, building a culture of integrity, transparency, and accountability","Maximize short-term recovery of fraud losses"],a:2,e:"교재 Philosophy: 'Prevention is better than cure' — integrity·transparency·accountability 문화 구축이 핵심."},
{id:"002",tp:"POJK",d:"Easy",q:"Which OJK regulation is the primary legal basis for implementing anti-fraud strategies for financial services institutions?",o:["POJK 35 of 2018","POJK 48 of 2024","POJK 12 of 2024","POJK 42 of 2024"],a:2,e:"POJK 12/2024 = Implementation of Anti-Fraud Strategies for LJK. Finance Company 포함 1차 법적 근거."},
{id:"003",tp:"Triangle",d:"Medium",q:"According to the training module, the Fraud Triangle consists of which three elements?",o:["Pressure, Rationalization, Opportunity","Motivation, Rationalization, Capability","Pressure, Greed, Opportunity","Pressure, Capability, Opportunity"],a:0,e:"교재 Basic Principles: Pressure·Rationalization·Opportunity 3요소. Capability 추가 4요소(Fraud Diamond)는 교재 범위 아님."},
{id:"004",tp:"Triangle",d:"Hard",q:"Within the Fraud Triangle, which element can the organization MOST directly control through stronger internal controls?",o:["Opportunity","Pressure","Rationalization","All three equally"],a:0,e:"Opportunity는 내부통제 약화로 발생 — 통제 강화로 직접 차단 가능. Pressure·Rationalization은 개인 심리 영역."},
{id:"005",tp:"Fraud유형",d:"Medium",q:"Which of the following is classified as 'Corruption' type fraud in the training module?",o:["Overstatement of net income","Cash misappropriation","Bribery and extortion","Inventory misappropriation"],a:2,e:"교재 Corruption = 이해상충·뇌물(bribery)·불법수수·강요(extortion). Cash/inventory misappropriation은 Asset Misappropriation."},
{id:"006",tp:"Fraud유형",d:"Hard",q:"Which statement about Financial Reporting Fraud is CORRECT per the training module?",o:["Only overstatement of net worth/income qualifies","It is not considered fraud under POJK 12/2024","Only understatement of net worth/income qualifies","Both overstatement and understatement of net worth/income qualify"],a:3,e:"교재: Financial Reporting Fraud = overstatement 또는 understatement 둘 다. 과대계상만 fraud는 오답."},
{id:"007",tp:"4Aspects",d:"Medium",q:"How many aspects make up 'Fraud Control' according to the training module?",o:["Four aspects","Five aspects","Three aspects","Six aspects"],a:0,e:"교재 Fraud Control Aspects 4개: Active Supervision / Policies and Procedures / Organizational Structure / Control and Monitoring."},
{id:"008",tp:"4Aspects",d:"Hard",q:"The 'four eyes principle' is an example of which fraud control aspect?",o:["Control and Monitoring","Organizational Structure and Accountability","Policies and Procedures","Active Supervision of Directors & BOC"],a:0,e:"교재: four eyes principle(기능 분리)은 Control and Monitoring 측면 예시."},
{id:"009",tp:"4Pillars",d:"Medium",q:"How many pillars make up the Anti-Fraud Strategy under POJK 12/2024?",o:["Four pillars","Two pillars","Three pillars","Five pillars"],a:0,e:"4 Pillars: Prevention / Detection / Investigation, Reporting and Sanctions / Monitoring, Evaluation and Follow-up."},
{id:"010",tp:"4Pillars",d:"Medium",q:"The objective of the 'Prevention' pillar is:",o:["Monitoring and evaluating fraud incidents","Identifying and discovering fraud incidents","Reducing the potential occurrence of fraud","Gathering information and imposing sanctions"],a:2,e:"교재: Prevention 목적 = fraud 발생 가능성 감소."},
{id:"011",tp:"4Pillars",d:"Hard",q:"Whistleblowing and surprise inspections belong to which anti-fraud pillar?",o:["Detection","Prevention","Investigation, Reporting and Sanctions","Monitoring, Evaluation and Follow-up"],a:0,e:"교재: Whistleblowing·Surprise Inspections·Monitoring System = Detection pillar. 예방처럼 보이나 적발."},
{id:"012",tp:"4Pillars",d:"Medium",q:"The 'Know Your Employee Policy' belongs to which anti-fraud pillar?",o:["Investigation","Detection","Monitoring","Prevention"],a:3,e:"교재: Know Your Employee Policy = Prevention pillar."},
{id:"013",tp:"4Pillars",d:"Hard",q:"A company's sanctions policy must at minimum include which three elements?",o:["Whistleblower identity, perpetrator name, and loss amount","Fine amount, prison term, and public announcement","Pressure, rationalization, and opportunity","Type of sanction, mechanism for imposing it, and party authorized to impose it"],a:3,e:"교재: Sanctions policy 최소 3요소 = 제재 종류·부과 메커니즘·권한자."},
{id:"014",tp:"POJK",d:"Hard",q:"Under POJK 12/2024, the anti-fraud strategy must be submitted to OJK no later than:",o:["12 months from the enactment of POJK 12/2024","6 months from the enactment of POJK 12/2024","1 month from the enactment of POJK 12/2024","3 months from the enactment of POJK 12/2024"],a:1,e:"교재: 전략 최초 제출 = 시행일로부터 6개월 이내."},
{id:"015",tp:"POJK",d:"Hard",q:"Any change to the anti-fraud strategy must be submitted to OJK no later than:",o:["7 working days after the change is made","The end of the following month","6 months after the change","30 calendar days after the change"],a:0,e:"교재: 전략 변경 = 변경 후 7영업일 이내."},
{id:"016",tp:"POJK",d:"Hard",q:"A report of significant fraud incidents must be submitted to OJK no later than:",o:["7 working days after identification","6 working days after the significant fraud is identified","3 months after the incident","31 January of the following year"],a:1,e:"교재: significant fraud 보고 = 식별 후 6영업일 이내."},
{id:"017",tp:"POJK",d:"Medium",q:"The annual anti-fraud strategy implementation report (December position) must be submitted by:",o:["30 June of the following year","6 working days after year-end","7 working days after year-end","31 January of the following year"],a:3,e:"교재: 연간 이행보고(12월말 기준) = 익년 1월 31일까지."},
{id:"018",tp:"POJK",d:"Medium",q:"Under POJK 12/2024, anti-fraud education and socialization must be conducted at minimum:",o:["Once per month","Once per year","Once per quarter","Once every two years"],a:1,e:"교재: 교육·socialization = 최소 연 1회."},
{id:"019",tp:"POJK",d:"Medium",q:"Which of the following is one of the three criteria for a 'significant impact' fraud incident?",o:["Any fraud above IDR 1 million","Any fraud committed by a junior employee","Fraud incidents that could jeopardize the company's business continuity","Fraud detected by external auditors only"],a:2,e:"교재 3기준: 중대 법규위반 / 사업 연속성 위협 / 공중 주목·평판 손상 가능성."},
{id:"020",tp:"POJK",d:"Medium",q:"POJK 28/2024 concerns:",o:["Fit and proper testing","Good governance for finance companies","Risk management for finance companies","Management of Perpetrator Trace Information through the information system (SIPELAKU)"],a:3,e:"POJK 28/2024 = SIPELAKU 관리. integrity 제고·fraud 예방 목적."},
{id:"021",tp:"POJK",d:"Medium",q:"Under POJK 28/2024, the maximum administrative fine for SIPELAKU-related violations is:",o:["IDR 1 billion","IDR 3 billion","IDR 6 billion","IDR 10 billion"],a:2,e:"교재: SIPELAKU 행정제재 벌금 상한 = 최대 IDR 6 billion."},
{id:"022",tp:"POJK",d:"Medium",q:"What is the primary purpose of the SIPELAKU system under POJK 28/2024?",o:["To calculate finance company capital adequacy","To store fraud perpetrator trace records and prevent fraud across the financial services sector","To register board of directors candidates with OJK","To monitor consumer complaints"],a:1,e:"교재: SIPELAKU = fraud 가해자 trace record 저장 시스템."},
{id:"023",tp:"평가",d:"Hard",q:"Which evaluation models are explicitly referenced in the module for assessing the effectiveness of anti-fraud controls (CE2)?",o:["Root Cause Analysis (RCA) and the COSO/ERM model","Porter's Five Forces and PESTEL","5x5 Risk Matrix and TARIF","Kirkpatrick Model and SWOT only"],a:0,e:"교재 CE2 Evaluation: RCA + COSO/ERM + employee survey + SWOT/GAP."},
{id:"024",tp:"평가",d:"Medium",q:"In the CE2 monitoring methods, testing the early-detection and escalation systems corresponds to which method?",o:["Observation","Interview","Document Review","System Verification"],a:3,e:"교재 Monitoring 4방법 중 System Verification(조기탐지·escalation 시스템 테스트)."},

{id:"026",tp:"InternalAudit",d:"Medium",q:"Which framework is the international benchmark standard for internal auditing referenced in Unit 5?",o:["COSO ERM Framework","ISO 31000","IPPF of the IIA (Institute of Internal Auditors)","Basel III"],a:2,e:"교재 Unit 5 핵심 표준 = IPPF-IIA. 내부감사 국제 표준."},
{id:"027",tp:"InternalAudit",d:"Medium",q:"The two Competency Elements of Unit 5 (Monitoring Internal Audit Follow-up) are:",o:["Evaluating follow-up actions based on audit results; Evaluating the audit function's quality improvement program","Developing an audit plan; Executing the audit","Preventing fraud; Detecting fraud","Issuing sanctions; Reporting to OJK"],a:0,e:"교재 Unit 5 2 CE: CE1 follow-up 평가 / CE2 quality improvement program 평가."},

{id:"030",tp:"RBA",d:"Hard",q:"According to the module's RBA KPI example, the target completion time for a risk-based audit is:",o:["≤ 15 days","≤ 60 days","≤ 30 days","≤ 90 days"],a:2,e:"교재 KPI 예시: RBA 완료 목표 ≤ 30일(업계 35일)."},

{id:"033",tp:"RCA",d:"Medium",q:"Which of the following is one of the five techniques for analyzing the adequacy of follow-up realization?",o:["5 Whys","Fishbone Diagram","SWOT Analysis","Focus Group Discussion (FGD)"],a:3,e:"교재 Follow-up 분석 5기법: Checklist·Interview·Field Observation·Benchmarking·FGD."},

{id:"043",tp:"InternalAudit",d:"Hard",q:"Which is one of the four 'Basic Principles (Accountability)' underlying Unit 5?",o:["Risk-Based Continuous Improvement","Prevention is better than cure","Four eyes principle","Segregation of duties"],a:0,e:"교재 Unit 5 Basic Principles: Compliance·Risk-Based Continuous Improvement·Effectiveness & Efficiency·Collaboration."},
{id:"044",tp:"RBA",d:"Hard",q:"The three aspects evaluated in Risk-Based Auditing follow-up are:",o:["Prevention, Detection, Investigation","Reaction, Learning, Behavior","Pressure, Rationalization, Opportunity","Risk-Based Audit Planning, Audit Execution, Reporting and Follow-up"],a:3,e:"교재 RBA 평가 3 Aspects: Risk-Based Audit Planning / Audit Execution / Reporting and Follow-up."},

{id:"049",tp:"QAIP",d:"Medium",q:"The Auditor Development Plan classifies training needs into which three time horizons?",o:["Daily, Weekly, Monthly","Prevention, Detection, Correction","Reaction, Learning, Results","Short-Term, Medium-Term, Long-Term"],a:3,e:"교재: Short-Term·Medium-Term·Long-Term."},
{id:"050",tp:"InternalAudit",d:"Easy",q:"Which professional association is a recognized data source for internal audit best practices in the module?",o:["IIA / ACFE / ISACA","OJK / APPI / LSPPI","Basel Committee / IOSCO","IFRS Foundation / IASB"],a:0,e:"교재 Data Sources = 전문협회(IIA·ACFE·ISACA)."},
{id:"051",tp:"POJK",d:"Hard",q:"A junior employee commits asset misappropriation but it does not threaten business continuity or public reputation. Under POJK 12/2024, this is:",o:["Always a significant-impact fraud requiring 6-working-day reporting","Not automatically a significant-impact fraud, since the three criteria are not met","Exempt from any internal reporting","Reportable only to the whistleblowing committee"],a:1,e:"교재 significant fraud 3기준 미충족 → 6영업일 보고 대상 아님. 단 내부 처리 필요."},
{id:"052",tp:"4Aspects",d:"Medium",q:"The 'tone at the top' and signing of an integrity pact primarily fall under which Fraud Control aspect?",o:["Control and Monitoring","Policies and Procedures","Active Supervision of Directors & BOC","Organizational Structure and Accountability"],a:2,e:"교재: anti-fraud 문화·integrity pact·code of ethics = Active Supervision of Directors & BOC."},
{id:"053",tp:"4Pillars",d:"Medium",q:"Which pillar handles the imposition of sanctions on fraud perpetrators?",o:["Prevention","Detection","Monitoring, Evaluation and Follow-up","Investigation, Reporting and Sanctions"],a:3,e:"교재: 제3 Pillar = Investigation, Reporting and Sanctions."},
{id:"054",tp:"RCA",d:"Medium",q:"Which of the following is the BEST example of a 'Field Observation' technique in follow-up analysis?",o:["Physically verifying on-site that corrective actions are implemented as recommended","Asking 'why' five times to trace the root cause","Comparing results against industry best practices","Holding a group discussion with responsible parties"],a:0,e:"교재: Field Observation = 현장 확인. (B)5 Whys (C)Benchmarking (D)FGD."},
{id:"055",tp:"InternalAudit",d:"Hard",q:"Which report quality principle set is correct for the audit follow-up monitoring report (PC 2.3)?",o:["Profitable, scalable, marketable, repeatable","Objective, timely, accurate, comprehensive, concise","Specific, measurable, achievable, relevant, time-bound","Prevention, detection, investigation, monitoring"],a:1,e:"교재 Report 원칙: objective·timely·accurate·comprehensive·concise."},
{id:"056",tp:"InternalAudit",d:"Hard",q:"Which statement about the relationship between Unit 4 and the Three Lines of Defense (W3) is correct?",o:["Internal Audit is the first line of defense","The Anti-Fraud Unit replaces the Risk Management function","Internal Audit is the third line, providing independent assurance over anti-fraud controls","The Board of Commissioners is the second line of defense"],a:2,e:"W3 연결: Internal Audit = 3rd Line. 1st=영업현장, 2nd=Risk Mgmt·Compliance, 3rd=Internal Audit."},
{id:"057",tp:"4Aspects",d:"Medium",q:"Under POJK 12/2024, the obligation to supervise the implementation of the anti-fraud strategy rests primarily with:",o:["The Board of Directors and the Board of Commissioners","The external auditor","OJK inspectors","The whistleblowing committee"],a:0,e:"교재: 감독 의무 = Directors & BOC(active supervision)."},
{id:"058",tp:"Barrier",d:"Medium",q:"Which is a common barrier to implementing Risk-Based Auditing identified in the module?",o:["Excessive accuracy of risk data","Too many qualified auditors","Over-collaboration with risk management","Management resistance and lack of accurate risk data"],a:3,e:"교재 RBA 장벽: risk data 부족·이해 부족·Management Resistance·자원 제약."},
{id:"059",tp:"POJK",d:"Hard",q:"Which is TRUE regarding the legal basis for anti-fraud strategies in finance companies?",o:["POJK 12/POJK.01/2017 is the current anti-fraud basis","POJK 12/2024 is the current basis; POJK 12/POJK.01/2017 is a separate F&P Test regulation","Both regulation numbers refer to the same anti-fraud rule","Anti-fraud strategies are governed by POJK 48/2024 (GCG)"],a:1,e:"함정: POJK 12/2024 = Anti-Fraud. POJK 12/POJK.01/2017 = F&P Test. 번호 겹침이나 별개."},
{id:"060",tp:"Kirkpatrick",d:"Medium",q:"The Kirkpatrick Model's Level 3 (Behavior) is measured primarily through:",o:["Participant satisfaction surveys","Pre-test and post-test scores","Performance observation and audit reports (application on the job)","Organizational performance indicators"],a:2,e:"교재: Level 3 Behavior = 실무 적용, performance observation·audit reports."}

{id:"061",tp:"Triangle",d:"Hard",q:"An employee with gambling debts (pressure), weak segregation of duties (opportunity), and a belief that 'the company owes me' (rationalization) commits fraud. Which element can KBBF MOST directly control?",o:["Opportunity","Rationalization","None of them","Pressure"],a:0,e:"Fraud Triangle 3요소 중 조직이 가장 직접 통제 가능한 것 = Opportunity(통제·직무분리 강화). Pressure·Rationalization은 개인 영역."},
{id:"062",tp:"Triangle",d:"Medium",q:"The training module's fraud model is the Triangle (3 elements). Which element is ADDED in the Fraud Diamond (a different model)?",o:["Capability","Pressure","Rationalization","Opportunity"],a:0,e:"Diamond은 Triangle에 Capability(실행능력) 추가. 단 교재는 Triangle 기준 — 함정. 시험은 Triangle로 대비."},
{id:"063",tp:"Fraud유형",d:"Hard",q:"A procurement officer accepts a kickback from a vendor in exchange for awarding a contract. This is classified as:",o:["Financial Reporting Fraud","Asset Misappropriation","Corruption","Not fraud"],a:2,e:"리베이트·이해상충 = Corruption 유형. 자산횡령(Asset Misappropriation)·재무보고부정과 구별."},
{id:"064",tp:"Fraud유형",d:"Medium",q:"Overstating revenue to meet a profit target is which fraud type?",o:["Corruption","Asset Misappropriation","Bribery","Financial Reporting Fraud"],a:3,e:"수익 과대계상 = Financial Reporting Fraud(재무보고부정). 재무제표 왜곡."},
{id:"065",tp:"4Aspects",d:"Hard",q:"The 'four-eyes principle' in loan approval is an example of which Fraud Control aspect?",o:["Tone at the top","Whistleblowing","Control structure / dual-control mechanism","Sanctions"],a:2,e:"4-Eyes(이중확인) = 통제구조(control structure) aspect. Fraud Control 4 Aspects 중 통제장치."},
{id:"066",tp:"4Aspects",d:"Medium",q:"Signing an integrity pact and 'tone at the top' fall primarily under which Fraud Control aspect?",o:["External audit","Control environment / leadership commitment","Detection technology","Sanctions enforcement"],a:1,e:"청렴서약·tone at the top = 통제환경(리더십 commitment) aspect. 문화·환경 차원."},
{id:"067",tp:"4Pillars",d:"Hard",q:"KBBF establishes whistleblowing channels and runs surprise inspections. These belong to which anti-fraud pillar?",o:["Monitoring/Evaluation","Detection","Investigation/Reporting & Sanction","Prevention"],a:1,e:"내부고발·불시점검 = Detection(적발) pillar. Prevention(예방)과 혼동 함정 — 발견 목적."},
{id:"068",tp:"4Pillars",d:"Medium",q:"The 'Know Your Employee' policy belongs to which pillar?",o:["Prevention","Sanction","Reporting","Detection"],a:0,e:"Know Your Employee(채용·이력 검증) = Prevention(예방) pillar. 사전 차단."},
{id:"069",tp:"4Pillars",d:"Hard",q:"Imposing sanctions on a confirmed fraud perpetrator falls under which pillar?",o:["Detection","Investigation, Reporting & Sanction","Prevention","Monitoring & Evaluation"],a:1,e:"제재 부과 = 조사·보고·제재(Investigation/Reporting & Sanction) pillar. 4 Pillars 중 사후 대응."},
{id:"070",tp:"4Pillars",d:"Hard",q:"Which correctly distinguishes the '4 Aspects' from the '4 Pillars'?",o:["4 Aspects = control-structure components; 4 Pillars = the strategy's action stages (Prevention/Detection/Investigation-Sanction/Monitoring)","They are identical","4 Pillars are about staffing only","4 Aspects are POJK deadlines"],a:0,e:"★함정: 4 Aspects(통제구조 구성) vs 4 Pillars(전략 실행단계: 예방·적발·조사제재·모니터링). 개념층위 구별."},
{id:"071",tp:"POJK",d:"Hard",q:"A finance company adopts a new anti-fraud strategy. Under POJK 12/2024, the strategy must be submitted to OJK no later than:",o:["1 year","7 business days","30 days","6 months from the obligation taking effect"],a:3,e:"최초 anti-fraud 전략 제출 = 의무 발효일로부터 6개월 내. 변경은 7영업일. 기한 매핑."},
{id:"072",tp:"POJK",d:"Hard",q:"KBBF revises its anti-fraud strategy on June 1. The change must reach OJK no later than:",o:["Within 7 business days of the change","6 months later","31 January next year","6 business days"],a:0,e:"전략 변경 보고 = 변경 후 7영업일 내. 최초(6개월)·연간(1/31)·중대fraud(6영업일)와 구별."},
{id:"073",tp:"POJK",d:"Hard",q:"A significant fraud incident occurs. Under POJK 12/2024, KBBF must report it to OJK within:",o:["6 business days of becoming aware","7 business days","6 months","1 year"],a:0,e:"중대 fraud 보고 = 인지 후 6영업일 내. 전략변경 7영업일과 1일 차이 — 정밀 함정."},
{id:"074",tp:"POJK",d:"Medium",q:"The annual anti-fraud implementation report (December position) must be submitted by:",o:["April 30","January 31 of the following year","December 31","June 30"],a:1,e:"연간 anti-fraud 이행보고(12월 기준) = 익년 1월 31일. GCG Report(4/30)와 기한 구별."},
{id:"075",tp:"POJK",d:"Medium",q:"Which of these is one of the three criteria for a 'significant impact' fraud incident under POJK 12/2024?",o:["Any fraud regardless of size","Only frauds by Directors","Only frauds above a fixed Rupiah amount","Threatens business continuity / material financial loss / damages reputation (one of these)"],a:3,e:"중대 fraud 기준(3종 중 하나): 사업연속성 위협·중대 재무손실·평판 훼손. 금액 일률기준 아님."},
{id:"076",tp:"POJK",d:"Hard",q:"A junior teller misappropriates Rp 5 million; it does not threaten continuity, cause material loss, or harm reputation. Is this a 'significant' fraud requiring the 6-day report?",o:["Yes, because the perpetrator is an employee","Yes, all fraud is significant","No, it fails the significance criteria — handled internally/annually","No fraud reporting exists"],a:2,e:"중대성 3기준 미충족 → 6영업일 긴급보고 대상 아님(연간 이행보고에 포함). 중대성 판단 시나리오."},
{id:"077",tp:"POJK",d:"Medium",q:"Anti-fraud education and socialization must be conducted at minimum:",o:["Never required","Periodically/at least annually (regular socialization)","Once every 5 years","Only at hiring"],a:1,e:"anti-fraud 교육·전파 = 정기적(최소 연 단위) 실시 의무. 일회성 아님."},
{id:"078",tp:"POJK",d:"Medium",q:"POJK 28/2024 primarily concerns:",o:["Business Plans","Good Corporate Governance","Risk Management committees","SIPELAKU (perpetrator/blacklist reporting system) and related sanctions"],a:3,e:"POJK 28/2024 = SIPELAKU(가해자 보고·블랙리스트 시스템) 및 제재. Anti-fraud 인프라."},
{id:"079",tp:"POJK",d:"Hard",q:"Under POJK 28/2024, the maximum administrative fine for SIPELAKU-related violations is approximately:",o:["IDR 6 billion","IDR 60 million","IDR 6 million","No fine exists"],a:0,e:"SIPELAKU 위반 최대 행정벌금 = 약 IDR 6 billion. (검증: Pasal 원문 확인 권고)"},
{id:"080",tp:"POJK",d:"Medium",q:"The internal audit of SIPELAKU usage must be conducted at minimum:",o:["Every 5 years","At least annually","Only on OJK request","Never"],a:1,e:"SIPELAKU 사용에 대한 내부감사 = 최소 연 1회. 정기 검증 의무."},
{id:"081",tp:"RBA",d:"Hard",q:"An internal audit plan allocates the most audit hours to the highest-risk lending unit and minimal hours to a low-risk admin function. This reflects which principle?",o:["Equal allocation","Random sampling","Compliance-only auditing","Risk-Based Auditing (resources prioritized by risk)"],a:3,e:"위험순으로 감사자원 배분 = Risk-Based Auditing 핵심 원리. 고위험에 집중."},
{id:"082",tp:"RBA",d:"Medium",q:"Which is NOT one of the four basic principles of Risk-Based Auditing?",o:["Value-adding assurance","Risk focus / prioritization","Maximizing audit fee revenue","Independence & objectivity"],a:2,e:"'감사수수료 수익 극대화'는 RBA 원칙 아님. 위험초점·독립성·가치부가 등이 원칙. NOT 유형."},
{id:"083",tp:"평가",d:"Hard",q:"Audit follow-up findings remain unimplemented after repeated reminders. They should be escalated and reported to:",o:["Senior management and the board/audit committee","External media","The audited unit only","PPATK"],a:0,e:"미이행 follow-up = 고위경영진·이사회/감사위 에스컬레이션 보고. 거버넌스 상위 보고."},
{id:"084",tp:"평가",d:"Medium",q:"An Action Plan for an audit finding must include Findings, Risk, Action Plan, PIC, and:",o:["Stock price","Auditor's salary","Target completion date / timeline","The CEO's signature only"],a:2,e:"Action Plan 6요소 = Findings·Risk·Action·PIC·목표완료일(timeline) 등. 분기 follow-up 보고."},
{id:"085",tp:"RCA",d:"Hard",q:"To find why a control repeatedly failed, an auditor asks 'why' five times to trace the root cause. This technique is:",o:["Fishbone only","5 Whys","SWOT","Benchmarking"],a:1,e:"반복 'why' 질문 = 5 Whys. RCA 2대 기법(5 Whys·Fishbone) 중 하나. 근본원인 추적."},
{id:"086",tp:"RCA",d:"Medium",q:"When a problem has many possible contributing causes across different categories, which RCA tool is most suitable?",o:["5 Whys (single linear chain)","Ishikawa/Fishbone (categorized multi-cause mapping)","SMART","Benchmarking"],a:1,e:"다범주 복합원인 = Fishbone(범주별 다중원인 매핑). 5 Whys는 단일 인과사슬 심층 추적. 도구 선택 맥락."},
{id:"087",tp:"SMART",d:"Hard",q:"An audit recommendation says 'improve things soon'. Which SMART criteria does it FAIL?",o:["SMART does not apply to audit","It fully meets SMART","It fails Specific, Measurable, and Time-bound","It fails only Relevant"],a:2,e:"'improve things soon'은 Specific·Measurable·Time-bound 결여. SMART = Specific·Measurable·Achievable·Relevant·Time-bound."},
{id:"088",tp:"SMART",d:"Medium",q:"The 'A' in SMART for solution recommendations stands for:",o:["Automated","Annual","Aggressive","Achievable"],a:3,e:"SMART의 A = Achievable(달성가능). Aggressive·Annual은 함정 철자. Time-Bound의 T와 함께 빈출."},
{id:"089",tp:"Kirkpatrick",d:"Hard",q:"What is the correct order of the four Kirkpatrick evaluation levels?",o:["Behavior → Reaction → Results → Learning","Reaction → Learning → Behavior → Results","Learning → Reaction → Results → Behavior","Results → Behavior → Learning → Reaction"],a:1,e:"Kirkpatrick 4단계 순서: Reaction→Learning→Behavior→Results. Behavior↔Results 순서 함정."},
{id:"090",tp:"Kirkpatrick",d:"Medium",q:"In the Kirkpatrick Model, the 'Learning' level is typically measured by:",o:["Tests/assessments of knowledge or skill gained","Company ROE","Job performance 6 months later","Customer complaints"],a:0,e:"Learning = 습득 지식·기술 평가(시험·테스트). Behavior(현업 행동)·Results(성과)와 단계 구별."},
{id:"091",tp:"Kirkpatrick",d:"Hard",q:"The Kirkpatrick model has 4 levels. Which model ADDS a 5th level (ROI), and is a common trap answer?",o:["IPPF","ISO 31000","COSO","Phillips Model (5 levels, adds ROI)"],a:3,e:"Phillips는 Kirkpatrick 4단계에 ROI(5단계) 추가. 교재는 Kirkpatrick 4단계 — Phillips 혼동 함정."},
{id:"092",tp:"QAIP",d:"Medium",q:"QAIP stands for:",o:["Quality Audit Independence Principle","Quantitative Asset Investment Policy","Quality Assurance and Improvement Program","Quarterly Audit Inspection Plan"],a:2,e:"QAIP = Quality Assurance and Improvement Program(품질보증·개선 프로그램). 내부감사 품질체계."},
{id:"093",tp:"QAIP",d:"Hard",q:"Which BEST distinguishes QAIP from IPPF?",o:["They are the same","QAIP is a POJK","IPPF is a fine","IPPF = the global professional framework/standards; QAIP = the program ensuring conformance with those standards"],a:3,e:"IPPF = 국제 내부감사 직무수행 프레임워크(기준). QAIP = 그 기준 준수를 보증·개선하는 프로그램. 기준 vs 이행."},
{id:"094",tp:"InternalAudit",d:"Medium",q:"Which professional association is a recognized source of internal-audit best practices?",o:["IMF","The IIA (Institute of Internal Auditors)","OPEC","WTO"],a:1,e:"내부감사 모범사례 협회 = IIA(내부감사인협회). IPPF의 발행 주체. 국제 best practice 근거."},
{id:"095",tp:"InternalAudit",d:"Hard",q:"Which statement about the link between Unit 4/5 and the Three Lines of Defense (W3) is correct?",o:["Internal Audit is the third line, providing independent assurance over anti-fraud and controls","Anti-fraud is outside the model","Compliance is the third line","Internal Audit is the first line"],a:0,e:"Internal Audit = 3rd Line(독립 assurance), anti-fraud·통제 검증. W3 3 Lines와 연계. 계층 매핑."},
{id:"096",tp:"InternalAudit",d:"Medium",q:"The two Competency Elements of Unit 5 (Monitoring Internal Audit Follow-up) focus on:",o:["Capital raising","Marketing and sales","Hiring and firing","Monitoring follow-up implementation AND evaluating/improving its effectiveness"],a:3,e:"Unit 5 2 CE = follow-up 이행 모니터링 + 효과성 평가·개선. K.64PBY91.026.1 단위."},
{id:"097",tp:"Barrier",d:"Hard",q:"A unit ignores audit recommendations because 'we've always done it this way'. This barrier to follow-up is best categorized as:",o:["Legal barrier","Technical/system barrier","Financial barrier","Cultural/behavioral resistance barrier"],a:3,e:"관성·'늘 이렇게 해왔다' = 문화·행태적 저항 barrier. 4유형 중 행동저항. RCA로 근본원인 분석."},
{id:"098",tp:"평가",d:"Medium",q:"Testing the early-detection and escalation systems in CE2 monitoring corresponds to evaluating:",o:["Marketing reach","Dividend policy","Detection effectiveness / system responsiveness","The Prevention pillar only"],a:2,e:"조기적발·에스컬레이션 시스템 테스트 = Detection 효과성·시스템 대응성 평가. 모니터링 방법."},
{id:"099",tp:"4Aspects",d:"Hard",q:"Under POJK 12/2024, the obligation to actively supervise anti-fraud strategy implementation rests primarily with:",o:["External vendors","Customers","The Board of Directors and Board of Commissioners (active oversight)","Junior staff"],a:2,e:"anti-fraud 전략 이행 적극 감독 = BOD·BOC 책무. 통제환경 최상위 책임. BOD 후보 직결."},
{id:"100",tp:"POJK",d:"Hard",q:"An officer cites \"POJK 12\" as the anti-fraud basis. To avoid the common numbering trap, which full citation is correct for anti-fraud?",o:["POJK 12/POJK.01/2017","POJK 12/2024","POJK 34/2018","POJK 28/2024"],a:1,e:"Anti-fraud = POJK 12/2024. 12/POJK.01/2017은 AML(별개). 연도·번호 정밀 구별 — 최다 함정."},

const KEY="A B C D".split(" ");
const WKEY="sppi_wrong_W4";
function getWrong(){try{return JSON.parse(localStorage.getItem(WKEY))||[]}catch(e){return[]}}
function setWrong(a){try{localStorage.setItem(WKEY,JSON.stringify([...new Set(a)]))}catch(e){}}
function addWrong(id){const w=getWrong();if(!w.includes(id)){w.push(id);setWrong(w)}}
function rmWrong(id){setWrong(getWrong().filter(x=>x!==id))}
function byId(id){return BANK.find(q=>q.id===id)}
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function start(mode){
  if(mode==='wrong'){
    const wp=shuffle(getWrong().map(byId).filter(Boolean));
    if(!wp.length){home();return}
    quiz=wp.map(shuffleOpts);
    cur=0;answers=[];render();return;
  }
  let pool=(mode==='all')?shuffle(BANK):shuffle(BANK).slice(0,30);
  quiz=pool.map(shuffleOpts);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">100문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 100문항 <span class="desc">Anti-Fraud·Internal Audit 전 범위 완주</span></button>
        <button class="wrongbtn" onclick="start('wrong')" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>오답만 다시 풀기<span class="wrongbadge">${getWrong().length}</span><span class="desc">누적 오답만 모아서 재시험 — 맞히면 목록에서 제거</span></button>
        <button class="wrongbtn" onclick="notebook()" ${getWrong().length?'':'disabled style="opacity:.4;cursor:default"'}>📕 오답노트 보기<span class="desc">틀린 문제 · 정답 · 해설 한눈에</span></button>
      </div>
    </div>`;
}
function notebook(){
  const cards=getWrong().map(byId).filter(Boolean);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">오답노트</div>
      <div class="scoreline" style="margin:6px 0 16px">누적 오답 ${cards.length}문항</div>
      <div style="text-align:left">
        ${cards.length?cards.map(q=>`
          <div class="notecard">
            <div class="qid">W4-${q.id} · ${q.tp}</div>
            <div class="nq">${q.q}</div>
            ${q.o.map((t,i)=>`<div class="no ${i===q.a?'ok':''}">${KEY[i]}. ${t}</div>`).join('')}
            <div class="ne"><b>정답 ${KEY[q.a]}</b> — ${q.e}</div>
            <button class="del" onclick="rmWrong('${q.id}');notebook()">✕ 이 문제 오답 목록에서 제거</button>
          </div>`).join(''):'<p style="color:var(--green);font-weight:700">오답 없음</p>'}
      </div>
      ${cards.length?`<button class="noteclear" onclick="if(confirm('오답노트를 전부 비웁니다. 계속?')){setWrong([]);notebook()}">전체 비우기</button>`:''}
      <div class="nav" style="justify-content:center;margin-top:20px"><button class="act" onclick="home()">← 처음으로</button></div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W4-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  const __c=i===q.a;
  answers[cur]={id:q.id,correct:__c,picked:i};
  if(__c) rmWrong(q.id); else addWrong(q.id);
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W4-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px;gap:10px;flex-wrap:wrap">
        <button class="act" onclick="home()">다시 풀기</button>
        ${getWrong().length?`<button class="act ghost" onclick="notebook()">📕 오답노트 (${getWrong().length})</button>`:''}
      </div>
    </div>`;
}
// 허브에서 ?note=1 진입 시 오답노트 바로 열기
if(new URLSearchParams(location.search).get('note')==='1'){notebook()}else{home()}
</script>
</body>
</html>
