<style>
  :root{--ink:#1a2238;--paper:#f7f5ef;--line:#d8d3c4;--gold:#b8893a;--gold-soft:#e8dcc0;--green:#2f6b4f;--red:#a33a2e;--blue:#2f5170;--shadow:0 1px 0 rgba(26,34,56,.08)}
  *{box-sizing:border-box;margin:0;padding:0}

  .start-opts .desc{display:block;font-size:12px;color:#5d6075;font-weight:400;margin-top:3px}

<script>
const BANK = [
{id:"001",tp:"개요",d:"Easy",q:"What is the underlying philosophy of an anti-fraud strategy under POJK 12/2024?",o:["Punish all employees to create deterrence","Outsource all fraud detection to external auditors","Prevention is better than cure, building a culture of integrity, transparency, and accountability","Maximize short-term recovery of fraud losses"],a:2,e:"교재 Philosophy: 'Prevention is better than cure' — integrity·transparency·accountability 문화 구축이 핵심."},
{id:"002",tp:"POJK",d:"Easy",q:"Which OJK regulation is the primary legal basis for implementing anti-fraud strategies for financial services institutions?",o:["POJK 35 of 2018","POJK 48 of 2024","POJK 12 of 2024","POJK 42 of 2024"],a:2,e:"POJK 12/2024 = Implementation of Anti-Fraud Strategies for LJK. Finance Company 포함 1차 법적 근거."},
{id:"003",tp:"Triangle",d:"Medium",q:"According to the training module, the Fraud Triangle consists of which three elements?",o:["Pressure, Rationalization, Opportunity","Motivation, Rationalization, Capability","Pressure, Greed, Opportunity","Pressure, Capability, Opportunity"],a:0,e:"교재 Basic Principles: Pressure·Rationalization·Opportunity 3요소. Capability 추가 4요소(Fraud Diamond)는 교재 범위 아님."},
{id:"004",tp:"Triangle",d:"Hard",q:"Within the Fraud Triangle, which element can the organization MOST directly control through stronger internal controls?",o:["Opportunity","Pressure","Rationalization","All three equally"],a:0,e:"Opportunity는 내부통제 약화로 발생 — 통제 강화로 직접 차단 가능. Pressure·Rationalization은 개인 심리 영역."},
{id:"005",tp:"Fraud유형",d:"Medium",q:"Which of the following is classified as 'Corruption' type fraud in the training module?",o:["Overstatement of net income","Cash misappropriation","Bribery and extortion","Inventory misappropriation"],a:2,e:"교재 Corruption = 이해상충·뇌물(bribery)·불법수수·강요(extortion). Cash/inventory misappropriation은 Asset Misappropriation."},
{id:"006",tp:"Fraud유형",d:"Hard",q:"Which statement about Financial Reporting Fraud is CORRECT per the training module?",o:["Only overstatement of net worth/income qualifies","It is not considered fraud under POJK 12/2024","Only understatement of net worth/income qualifies","Both overstatement and understatement of net worth/income qualify"],a:3,e:"교재: Financial Reporting Fraud = overstatement 또는 understatement 둘 다. 과대계상만 fraud는 오답."},
{id:"007",tp:"4Aspects",d:"Medium",q:"How many aspects make up 'Fraud Control' according to the training module?",o:["Four aspects","Five aspects","Three aspects","Six aspects"],a:0,e:"교재 Fraud Control Aspects 4개: Active Supervision / Policies and Procedures / Organizational Structure / Control and Monitoring."},
{id:"008",tp:"4Aspects",d:"Hard",q:"The 'four eyes principle' is an example of which fraud control aspect?",o:["Control and Monitoring","Organizational Structure and Accountability","Policies and Procedures","Active Supervision of Directors & BOC"],a:0,e:"교재: four eyes principle(기능 분리)은 Control and Monitoring 측면 예시."},
{id:"009",tp:"4Pillars",d:"Medium",q:"How many pillars make up the Anti-Fraud Strategy under POJK 12/2024?",o:["Four pillars","Two pillars","Three pillars","Five pillars"],a:0,e:"4 Pillars: Prevention / Detection / Investigation, Reporting and Sanctions / Monitoring, Evaluation and Follow-up."},
{id:"010",tp:"4Pillars",d:"Medium",q:"The objective of the 'Prevention' pillar is:",o:["Monitoring and evaluating fraud incidents","Identifying and discovering fraud incidents","Reducing the potential occurrence of fraud","Gathering information and imposing sanctions"],a:2,e:"교재: Prevention 목적 = fraud 발생 가능성 감소."},
{id:"011",tp:"4Pillars",d:"Hard",q:"Whistleblowing and surprise inspections belong to which anti-fraud pillar?",o:["Detection","Prevention","Investigation, Reporting and Sanctions","Monitoring, Evaluation and Follow-up"],a:0,e:"교재: Whistleblowing·Surprise Inspections·Monitoring System = Detection pillar. 예방처럼 보이나 적발."},
{id:"012",tp:"4Pillars",d:"Medium",q:"The 'Know Your Employee Policy' belongs to which anti-fraud pillar?",o:["Investigation","Detection","Monitoring","Prevention"],a:3,e:"교재: Know Your Employee Policy = Prevention pillar."},
{id:"013",tp:"4Pillars",d:"Hard",q:"A company's sanctions policy must at minimum include which three elements?",o:["Whistleblower identity, perpetrator name, and loss amount","Fine amount, prison term, and public announcement","Pressure, rationalization, and opportunity","Type of sanction, mechanism for imposing it, and party authorized to impose it"],a:3,e:"교재: Sanctions policy 최소 3요소 = 제재 종류·부과 메커니즘·권한자."},
{id:"014",tp:"POJK",d:"Hard",q:"Under POJK 12/2024, the anti-fraud strategy must be submitted to OJK no later than:",o:["12 months from the enactment of POJK 12/2024","6 months from the enactment of POJK 12/2024","1 month from the enactment of POJK 12/2024","3 months from the enactment of POJK 12/2024"],a:1,e:"교재: 전략 최초 제출 = 시행일로부터 6개월 이내."},
{id:"015",tp:"POJK",d:"Hard",q:"Any change to the anti-fraud strategy must be submitted to OJK no later than:",o:["7 working days after the change is made","The end of the following month","6 months after the change","30 calendar days after the change"],a:0,e:"교재: 전략 변경 = 변경 후 7영업일 이내."},
{id:"016",tp:"POJK",d:"Hard",q:"A report of significant fraud incidents must be submitted to OJK no later than:",o:["7 working days after identification","6 working days after the significant fraud is identified","3 months after the incident","31 January of the following year"],a:1,e:"교재: significant fraud 보고 = 식별 후 6영업일 이내."},
{id:"017",tp:"POJK",d:"Medium",q:"The annual anti-fraud strategy implementation report (December position) must be submitted by:",o:["30 June of the following year","6 working days after year-end","7 working days after year-end","31 January of the following year"],a:3,e:"교재: 연간 이행보고(12월말 기준) = 익년 1월 31일까지."},
{id:"018",tp:"POJK",d:"Medium",q:"Under POJK 12/2024, anti-fraud education and socialization must be conducted at minimum:",o:["Once per month","Once per year","Once per quarter","Once every two years"],a:1,e:"교재: 교육·socialization = 최소 연 1회."},
{id:"019",tp:"POJK",d:"Medium",q:"Which of the following is one of the three criteria for a 'significant impact' fraud incident?",o:["Any fraud above IDR 1 million","Any fraud committed by a junior employee","Fraud incidents that could jeopardize the company's business continuity","Fraud detected by external auditors only"],a:2,e:"교재 3기준: 중대 법규위반 / 사업 연속성 위협 / 공중 주목·평판 손상 가능성."},
{id:"020",tp:"POJK",d:"Medium",q:"POJK 28/2024 concerns:",o:["Fit and proper testing","Good governance for finance companies","Risk management for finance companies","Management of Perpetrator Trace Information through the information system (SIPELAKU)"],a:3,e:"POJK 28/2024 = SIPELAKU 관리. integrity 제고·fraud 예방 목적."},
{id:"021",tp:"POJK",d:"Medium",q:"Under POJK 28/2024, the maximum administrative fine for SIPELAKU-related violations is:",o:["IDR 1 billion","IDR 3 billion","IDR 6 billion","IDR 10 billion"],a:2,e:"교재: SIPELAKU 행정제재 벌금 상한 = 최대 IDR 6 billion."},
{id:"022",tp:"POJK",d:"Medium",q:"What is the primary purpose of the SIPELAKU system under POJK 28/2024?",o:["To calculate finance company capital adequacy","To store fraud perpetrator trace records and prevent fraud across the financial services sector","To register board of directors candidates with OJK","To monitor consumer complaints"],a:1,e:"교재: SIPELAKU = fraud 가해자 trace record 저장 시스템."},
{id:"023",tp:"평가",d:"Hard",q:"Which evaluation models are explicitly referenced in the module for assessing the effectiveness of anti-fraud controls (CE2)?",o:["Root Cause Analysis (RCA) and the COSO/ERM model","Porter's Five Forces and PESTEL","5x5 Risk Matrix and TARIF","Kirkpatrick Model and SWOT only"],a:0,e:"교재 CE2 Evaluation: RCA + COSO/ERM + employee survey + SWOT/GAP."},
{id:"024",tp:"평가",d:"Medium",q:"In the CE2 monitoring methods, testing the early-detection and escalation systems corresponds to which method?",o:["Observation","Interview","Document Review","System Verification"],a:3,e:"교재 Monitoring 4방법 중 System Verification(조기탐지·escalation 시스템 테스트)."},
{id:"025",tp:"평가",d:"Hard",q:"Follow-up findings that remain unimplemented should be escalated and reported to:",o:["The external auditor only","The Risk Monitoring Committee or the Directors","The whistleblowing hotline","The OJK consumer protection unit"],a:1,e:"교재 CE2 Follow-up: 미이행 findings는 Risk Monitoring Committee 또는 Directors에 escalation."},
{id:"026",tp:"InternalAudit",d:"Medium",q:"Which framework is the international benchmark standard for internal auditing referenced in Unit 5?",o:["COSO ERM Framework","ISO 31000","IPPF of the IIA (Institute of Internal Auditors)","Basel III"],a:2,e:"교재 Unit 5 핵심 표준 = IPPF-IIA. 내부감사 국제 표준."},
{id:"027",tp:"InternalAudit",d:"Medium",q:"The two Competency Elements of Unit 5 (Monitoring Internal Audit Follow-up) are:",o:["Evaluating follow-up actions based on audit results; Evaluating the audit function's quality improvement program","Developing an audit plan; Executing the audit","Preventing fraud; Detecting fraud","Issuing sanctions; Reporting to OJK"],a:0,e:"교재 Unit 5 2 CE: CE1 follow-up 평가 / CE2 quality improvement program 평가."},
{id:"028",tp:"RBA",d:"Medium",q:"What is the defining principle of Risk-Based Auditing (RBA)?",o:["Auditing all areas with equal intensity","Identifying, analyzing, and mitigating the most significant risks of the organization","Focusing only on financial statement accuracy","Outsourcing all audits to external firms"],a:1,e:"교재: RBA = 가장 중대한 리스크 식별·분석·완화 집중."},
{id:"029",tp:"RBA",d:"Hard",q:"Which of the following is NOT one of the four basic principles of Risk-Based Auditing?",o:["Focus on Significant Risks","Data-Driven Approach","Collaboration with Risk Management","Maximizing the number of audits performed"],a:3,e:"교재 RBA 4원칙: Focus on Significant Risks·Data-Driven·Collaboration·Continuous Improvement."},
{id:"030",tp:"RBA",d:"Hard",q:"According to the module's RBA KPI example, the target completion time for a risk-based audit is:",o:["≤ 15 days","≤ 60 days","≤ 30 days","≤ 90 days"],a:2,e:"교재 KPI 예시: RBA 완료 목표 ≤ 30일(업계 35일)."},
{id:"031",tp:"RCA",d:"Medium",q:"The two core techniques of Root Cause Analysis (RCA) presented in the module are:",o:["5 Whys and the Ishikawa (Fishbone) Diagram","SWOT and PESTEL","Porter's Five Forces and Benchmarking","Checklist and Interview"],a:0,e:"교재 RCA 2대 기법: 5 Whys + Ishikawa/Fishbone Diagram."},
{id:"032",tp:"RCA",d:"Hard",q:"In the Ishikawa (Fishbone) Diagram, causal factors are typically grouped into which categories?",o:["Strengths, weaknesses, opportunities, threats","People, methods, materials, environment","Political, economic, social, technological","Prevention, detection, investigation, monitoring"],a:1,e:"교재 Fishbone 4M: people·methods·materials·environment."},
{id:"033",tp:"RCA",d:"Medium",q:"Which of the following is one of the five techniques for analyzing the adequacy of follow-up realization?",o:["5 Whys","Fishbone Diagram","SWOT Analysis","Focus Group Discussion (FGD)"],a:3,e:"교재 Follow-up 분석 5기법: Checklist·Interview·Field Observation·Benchmarking·FGD."},
{id:"034",tp:"SMART",d:"Easy",q:"What does the 'A' in the SMART principle for solution recommendations stand for?",o:["Accountable","Accurate","Achievable","Aligned"],a:2,e:"교재 SMART: Specific·Measurable·Achievable·Relevant·Time-Bound."},
{id:"035",tp:"Kirkpatrick",d:"Hard",q:"What is the correct order of the four levels of the Kirkpatrick Evaluation Model?",o:["Reaction → Learning → Behavior → Results","Learning → Reaction → Results → Behavior","Reaction → Behavior → Learning → Results","Results → Behavior → Learning → Reaction"],a:0,e:"교재 Kirkpatrick: Reaction→Learning→Behavior→Results."},
{id:"036",tp:"Kirkpatrick",d:"Medium",q:"In the Kirkpatrick Model, the 'Learning' level is typically measured by:",o:["Participant satisfaction survey","Pre-test and post-test","Performance indicators","Observation of behavior change"],a:1,e:"교재: Level 2 Learning = Pre/Post-test."},
{id:"037",tp:"QAIP",d:"Medium",q:"QAIP, as referenced in the audit quality improvement section, stands for:",o:["Quality Assurance and Improvement Program","Quarterly Audit Inspection Protocol","Quality Audit Implementation Plan","Quantitative Audit Index Program"],a:0,e:"교재: QAIP = Quality Assurance and Improvement Program."},
{id:"038",tp:"QAIP",d:"Hard",q:"Which statement BEST distinguishes QAIP from IPPF?",o:["QAIP is an OJK regulation; IPPF is a finance company policy","They are identical and interchangeable","QAIP is a quality assurance program; IPPF is the overarching professional practices framework","IPPF is for fraud control; QAIP is for risk management"],a:2,e:"교재: QAIP = 품질 보증·개선 프로그램. IPPF = 전체 프레임워크."},
{id:"039",tp:"POJK",d:"Medium",q:"Under POJK 28/2024, how frequently must the internal audit of SIPELAKU usage be conducted at minimum?",o:["Once per quarter","At least once per year","Once every two years","Only when a breach occurs"],a:1,e:"교재: SIPELAKU Internal Audit 주기 = 최소 연 1회."},
{id:"040",tp:"Barrier",d:"Hard",q:"Which of the following barrier categories is correctly matched in the follow-up analysis?",o:["Resource barriers relate to limitations in personnel, budget, and time","Technical barriers relate to regulatory complexity","Compliance barriers relate to management commitment","Managerial barriers relate to system failures"],a:0,e:"교재 장벽 4유형: Technical·Resource(인력·예산·시간)·Managerial·Compliance."},
{id:"041",tp:"4Pillars",d:"Medium",q:"The 'Surprise Audit' described in the Detection pillar is best defined as:",o:["A scheduled audit announced one month in advance","An inspection conducted confidentially without the auditee's prior knowledge","An audit performed only by external regulators","A self-assessment completed by the audited unit"],a:1,e:"교재: Surprise Audit = 피검자 인지 없이 비밀리 수행. Detection pillar."},
{id:"042",tp:"4Pillars",d:"Medium",q:"Which item is part of the 'Know Your Employee' policy under the Prevention pillar?",o:["Imposing fines on perpetrators","Reporting fraud to OJK within 6 working days","Recognizing and monitoring employee character, integrity, relationships, and lifestyle","Conducting forensic investigation of completed fraud"],a:2,e:"교재: Know Your Employee = 직원 character·integrity·lifestyle 모니터링. Prevention."},
{id:"043",tp:"InternalAudit",d:"Hard",q:"Which is one of the four 'Basic Principles (Accountability)' underlying Unit 5?",o:["Risk-Based Continuous Improvement","Prevention is better than cure","Four eyes principle","Segregation of duties"],a:0,e:"교재 Unit 5 Basic Principles: Compliance·Risk-Based Continuous Improvement·Effectiveness & Efficiency·Collaboration."},
{id:"044",tp:"RBA",d:"Hard",q:"The three aspects evaluated in Risk-Based Auditing follow-up are:",o:["Prevention, Detection, Investigation","Reaction, Learning, Behavior","Pressure, Rationalization, Opportunity","Risk-Based Audit Planning, Audit Execution, Reporting and Follow-up"],a:3,e:"교재 RBA 평가 3 Aspects: Risk-Based Audit Planning / Audit Execution / Reporting and Follow-up."},
{id:"045",tp:"평가",d:"Medium",q:"An audit finding's follow-up element list includes Findings, Risk, Action Plan, PIC, and which two others?",o:["Sanction and Whistleblower","Deadline and Indicator","Bribery and Extortion","Reaction and Results"],a:1,e:"교재 Follow-up 6요소: Findings / Risk / Action Plan / PIC / Deadline / Indicator."},
{id:"046",tp:"InternalAudit",d:"Medium",q:"Which communication step for audit findings emphasizes delivering information to those with authority to act?",o:["Identify the appropriate audience (senior management, audit committee, regulators)","Use only verbal communication","Delay reporting until year-end","Restrict findings to the audited unit only"],a:0,e:"교재 Communication 4단계: Identify Appropriate Audience·Clear Delivery·Appropriate Media·Active Communication."},
{id:"047",tp:"SMART",d:"Medium",q:"The Solution Recommendation Format in an audit report includes Obstacle, Root of the Problem, Recommended Solutions, Responsible Party, and:",o:["Sanction Type","Fraud Triangle element","Target Time","Composite Rating"],a:2,e:"교재 Format: Obstacle / Root of the Problem / Recommended Solutions / Responsible Party / Target Time."},
{id:"048",tp:"QAIP",d:"Hard",q:"Which evaluation technique is used in the Quality Improvement Program besides Gap Analysis and external audit?",o:["5x5 Risk Matrix","QAIP Self-Assessment / Peer Review","PESTEL Analysis","Porter's Five Forces"],a:1,e:"교재: Gap Analysis·QAIP Self-Assessment·External Audit/Peer Review."},
{id:"049",tp:"QAIP",d:"Medium",q:"The Auditor Development Plan classifies training needs into which three time horizons?",o:["Daily, Weekly, Monthly","Prevention, Detection, Correction","Reaction, Learning, Results","Short-Term, Medium-Term, Long-Term"],a:3,e:"교재: Short-Term·Medium-Term·Long-Term."},
{id:"050",tp:"InternalAudit",d:"Easy",q:"Which professional association is a recognized data source for internal audit best practices in the module?",o:["IIA / ACFE / ISACA","OJK / APPI / LSPPI","Basel Committee / IOSCO","IFRS Foundation / IASB"],a:0,e:"교재 Data Sources = 전문협회(IIA·ACFE·ISACA)."},
{id:"051",tp:"POJK",d:"Hard",q:"A junior employee commits asset misappropriation but it does not threaten business continuity or public reputation. Under POJK 12/2024, this is:",o:["Always a significant-impact fraud requiring 6-working-day reporting","Not automatically a significant-impact fraud, since the three criteria are not met","Exempt from any internal reporting","Reportable only to the whistleblowing committee"],a:1,e:"교재 significant fraud 3기준 미충족 → 6영업일 보고 대상 아님. 단 내부 처리 필요."},
{id:"052",tp:"4Aspects",d:"Medium",q:"The 'tone at the top' and signing of an integrity pact primarily fall under which Fraud Control aspect?",o:["Control and Monitoring","Policies and Procedures","Active Supervision of Directors & BOC","Organizational Structure and Accountability"],a:2,e:"교재: anti-fraud 문화·integrity pact·code of ethics = Active Supervision of Directors & BOC."},

const KEY="A B C D".split(" ");
let quiz=[], cur=0, answers=[], picked=false;
const app=document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function shuffleOpts(q){
  const idx=shuffle([0,1,2,3]);
  return {...q, o: idx.map(i=>q.o[i]), a: idx.indexOf(q.a)};
}
function start(mode){
  let pool=(mode==='all')?shuffle(BANK):shuffle(BANK).slice(0,30);
  quiz=pool.map(shuffleOpts);
  cur=0; answers=[]; render();
}
function home(){
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow" style="margin-bottom:10px">시작하기</div>
      <p style="font-size:14px;color:#5d6075;margin-bottom:6px">60문항 풀 · 실전 영어 4지선다</p>
      <div class="start-opts">
        <button onclick="start('rand30')">랜덤 30문항 <span class="desc">실전 모사 — 전 범위에서 무작위 30개</span></button>
        <button onclick="start('all')">전체 60문항 <span class="desc">Anti-Fraud·Internal Audit 전 범위 완주</span></button>
      </div>
    </div>`;
}
function render(){
  const q=quiz[cur]; picked=false;
  const dcls=q.d.toLowerCase();
  app.innerHTML=`
    <div class="meta"><span>문항 ${cur+1} / ${quiz.length}</span><span>QID W4-${q.id}</span></div>
    <div class="bar"><i style="width:${(cur)/quiz.length*100}%"></i></div>
    <div class="tags"><span class="tag topic">${q.tp}</span><span class="tag ${dcls}">${q.d}</span></div>
    <div class="q">${q.q}</div>
    <div class="opts" id="opts">
      ${q.o.map((t,i)=>`<button class="opt" onclick="pick(${i})"><span class="k">${KEY[i]}</span><span>${t}</span></button>`).join('')}
    </div>
    <div class="exp" id="exp"></div>
    <div class="nav">
      <button class="act ghost" onclick="home()">처음으로</button>
      <button class="act" id="next" onclick="next()" disabled>다음 →</button>
    </div>`;
}
function pick(i){
  if(picked) return; picked=true;
  const q=quiz[cur];
  answers[cur]={id:q.id,correct:i===q.a,picked:i};
  document.querySelectorAll('#opts .opt').forEach((b,idx)=>{
    b.disabled=true;
    if(idx===q.a) b.classList.add('correct');
    else if(idx===i) b.classList.add('wrong');
  });
  const exp=document.getElementById('exp');
  exp.innerHTML=`<b>정답: ${KEY[q.a]}</b> &nbsp;—&nbsp; ${q.e}`;
  exp.classList.add('show');
  document.getElementById('next').disabled=false;
  if(cur===quiz.length-1) document.getElementById('next').textContent='결과 보기';
}
function next(){if(cur<quiz.length-1){cur++;render()}else result()}
function result(){
  const right=answers.filter(a=>a.correct).length;
  const tot=quiz.length;
  const pct=Math.round(right/tot*100);
  const byTopic={};
  answers.forEach((a,i)=>{const t=quiz[i].tp;byTopic[t]=byTopic[t]||{r:0,n:0};byTopic[t].n++;if(a.correct)byTopic[t].r++});
  const wrongs=answers.map((a,i)=>({a,q:quiz[i]})).filter(x=>!x.a.correct);
  app.innerHTML=`
    <div class="result">
      <div class="eyebrow">결과</div>
      <div class="score">${pct}%</div>
      <div class="scoreline">${tot}문항 중 ${right}개 정답</div>
      <div class="breakdown">
        ${Object.entries(byTopic).map(([t,v])=>`<div class="row"><span>${t}</span><b>${v.r} / ${v.n}</b></div>`).join('')}
      </div>
      ${wrongs.length?`<div class="wronglist"><b style="color:var(--red)">오답 ${wrongs.length}문항</b>
        ${wrongs.map(x=>`<div class="w">W4-${x.q.id} · 정답 ${KEY[x.q.a]} — ${x.q.q.slice(0,70)}…</div>`).join('')}
      </div>`:'<p style="color:var(--green);font-weight:700">전 문항 정답</p>'}
      <div class="nav" style="justify-content:center;margin-top:24px"><button class="act" onclick="home()">다시 풀기</button></div>
    </div>`;
}
home();
</script>
</body>
</html>
