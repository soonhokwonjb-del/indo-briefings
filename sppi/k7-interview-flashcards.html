<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>K7 Interview Prep · Soonho Kwon</title>
<style>
  :root{
    --ink:#0f1b2d; --ink-2:#3a5169; --paper:#f7f4ec; --card:#fff; --line:#ddd6c7;
    --accent:#c0492e; --accent-soft:#f3e3de; --gold:#a67c2e; --ok:#2f6b4f; --ok-soft:#e3efe8;
    --shadow:0 8px 24px rgba(15,27,45,.09); --shadow-lg:0 18px 44px rgba(15,27,45,.20);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    line-height:1.5;overscroll-behavior:none}
  body{max-width:560px;margin:0 auto;min-height:100vh;padding:0 0 40px;position:relative}

  header{padding:20px 20px 10px}
  .eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:700}
  h1{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-top:3px}
  h1 .sub{display:block;font-size:12px;font-weight:500;color:var(--ink-2);letter-spacing:0;margin-top:4px}

  .qtabs{display:flex;gap:5px;padding:10px 20px;position:sticky;top:0;z-index:20;
    background:linear-gradient(var(--paper) 82%,rgba(247,244,236,0))}
  .qtab{flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:11px;
    padding:8px 2px;cursor:pointer;transition:.16s;text-align:center}
  .qtab .qn{font-size:15px;font-weight:800;color:var(--ink);line-height:1}
  .qtab .ql{font-size:9px;font-weight:700;color:var(--ink-2);letter-spacing:.04em;margin-top:3px;text-transform:uppercase}
  .qtab[aria-selected="true"]{border-color:var(--ink);background:var(--ink)}
  .qtab[aria-selected="true"] .qn{color:#fff}
  .qtab[aria-selected="true"] .ql{color:#e8b9ac}

  .panel{padding:6px 20px 0;display:none}
  .panel.on{display:block;animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

  .qhead{background:var(--ink);color:#fff;border-radius:16px;padding:15px 16px;margin:8px 0 6px;box-shadow:var(--shadow-lg)}
  .qhead .en{font-size:11px;letter-spacing:.04em;color:#e8b9ac;font-weight:700}
  .qhead .kr{font-size:16px;font-weight:800;margin-top:4px;line-height:1.35}

  .flow{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px;margin:10px 0 6px;box-shadow:var(--shadow)}
  .flow .tag{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:800}
  .flow .arc{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:8px 0 10px}
  .flow .arc .b{background:var(--accent-soft);color:var(--accent);font-weight:800;font-size:12px;padding:4px 9px;border-radius:8px}
  .flow .arc .ar{color:var(--ink-2);font-weight:700}
  .flow ul{list-style:none;display:flex;flex-direction:column;gap:7px}
  .flow li{font-size:13px;color:var(--ink-2);padding-left:18px;position:relative;line-height:1.5}
  .flow li::before{content:"\203A";position:absolute;left:2px;top:-1px;color:var(--accent);font-weight:800;font-size:15px}
  .flow li b{color:var(--ink)}
  .flow .reg{display:inline-block;background:#eee7d7;color:var(--gold);font-weight:700;padding:1px 7px;border-radius:6px;font-size:11px;margin-left:2px}
  .flow .me{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line);font-size:12px;color:var(--ink-2)}
  .flow .me b{color:var(--accent)}

  .memlabel{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:800;margin:16px 2px 8px;display:flex;align-items:center;gap:7px}
  .memlabel::after{content:"";flex:1;height:1px;background:var(--line)}
  .memlabel .cnt{background:var(--gold);color:#fff;font-size:10px;padding:1px 7px;border-radius:20px;letter-spacing:0}

  .deckbar{display:flex;align-items:center;justify-content:space-between;margin:0 2px 10px}
  .count{font-size:12px;color:var(--ink-2);font-weight:600}
  .count b{color:var(--ink);font-size:14px}
  .reset{border:none;background:none;color:var(--accent);font-size:11.5px;font-weight:700;cursor:pointer;padding:4px}

  .stage{margin-bottom:12px;position:relative}
  .flip{position:relative;width:100%;cursor:pointer;display:grid}
  .face{grid-area:1/1;width:100%;border-radius:20px;padding:22px 20px;display:flex;flex-direction:column;box-shadow:var(--shadow-lg);
    transition:opacity .28s ease}
  /* 두 면을 같은 셀에 겹치면 grid가 큰 쪽 높이를 자동 채택 → JS 측정 불필요 */
  .front{background:var(--card);border:1px solid var(--line)}
  .back{background:var(--ink);color:#fff}
  .flip .back{opacity:0;pointer-events:none}
  .flip .front{opacity:1}
  .flip.flipped .front{opacity:0;pointer-events:none}
  .flip.flipped .back{opacity:1;pointer-events:auto}
  /* 높이 측정용 숨은 사본: 실제 렌더와 동일 폭, 화면 밖 */
  .measure{position:absolute;left:-9999px;top:0;width:100%;padding:22px 20px;border:1px solid transparent;box-sizing:border-box}
  .cardtag{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;font-weight:800;flex:0 0 auto}
  .front .cardtag{color:var(--accent)}
  .back .cardtag{color:#e8b9ac}
  .prompt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;min-height:150px}
  .prompt .big{font-size:23px;font-weight:800;letter-spacing:-.01em;line-height:1.3}
  .prompt .qkr{font-size:12.5px;color:var(--ink-2);font-weight:600}
  .ans{flex:1;display:flex;flex-direction:column;justify-content:flex-start;gap:9px;margin-top:12px}
  .ans .main{font-size:18px;font-weight:800;line-height:1.35}
  .ans ol,.ans ul{padding-left:18px;display:flex;flex-direction:column;gap:5px}
  .ans li{font-size:13px;color:#d3dde8;line-height:1.5}
  .ans li b,.ans .main em{color:#f0c9bd;font-style:normal;font-weight:800}
  .ans .kr{font-size:12px;color:#9db0c4;margin-top:2px}
  .tapcue{text-align:center;font-size:10.5px;letter-spacing:.05em;margin-top:6px;opacity:.65}
  .front .tapcue{color:var(--ink-2)} .back .tapcue{color:#8ea3b8}

  .nav{display:flex;gap:9px}
  .nav button{flex:1;border:1.5px solid var(--line);background:var(--card);border-radius:12px;padding:12px;font-size:13.5px;font-weight:800;color:var(--ink);cursor:pointer;transition:.14s}
  .nav button:active{transform:scale(.97)}
  .nav .know{border-color:var(--ok);color:var(--ok)} .nav .know:active{background:var(--ok);color:#fff}
  .nav .again{border-color:var(--accent);color:var(--accent)} .nav .again:active{background:var(--accent);color:#fff}

  .dots{display:flex;gap:5px;justify-content:center;margin:12px 0 4px;flex-wrap:wrap}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  .dot.cur{background:var(--ink);transform:scale(1.3)} .dot.knew{background:var(--ok)}

  .done{text-align:center;padding:30px 16px;background:var(--card);border:1px dashed var(--line);border-radius:20px;margin-bottom:12px}
  .done .big{font-size:36px} .done h3{font-size:16px;margin:8px 0 4px} .done p{font-size:12.5px;color:var(--ink-2);margin-bottom:14px}
  .done button{border:1.5px solid var(--ink);background:var(--ink);color:#fff;border-radius:12px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer}

  footer{text-align:center;font-size:11px;color:var(--ink-2);padding:18px 20px 0;opacity:.72;line-height:1.7}
  footer b{color:var(--ok)} footer .r{color:var(--accent)}
  @media (prefers-reduced-motion:reduce){.face{transition:none}.panel.on{animation:none}}
</style>
</head>
<body>

<header>
  <div class="eyebrow">SPPI Level 7 · F&amp;P Interview</div>
  <h1>K7 인터뷰 암기<span class="sub">권순호 · KBBF President Director 후보 · 질문별 흐름 + 암기항목</span></h1>
</header>

<nav class="qtabs" id="qtabs"></nav>
<div id="panels"></div>

<footer>흐름 카드로 <b style="color:var(--ink)">답변 순서</b>를 잡고, 아래 암기카드로 <b style="color:var(--gold)">외울 항목</b>을 반복.<br>탭해서 뒤집기 · 아는 건 <b>알아</b> · 헷갈리면 <span class="r">다시</span> (다시한 것만 한 바퀴 더).</footer>

<script>
const QUESTIONS = [
  {
    id:"Q1", label:"준수", en:"Q1. How do you ensure the company remains compliant with applicable laws and regulations?",
    kr:"회사가 관련 법규를 준수하도록 어떻게 보장하겠는가?",
    flowTag:"흐름 · 3단계", arc:["파악","갭 분석","모니터링"],
    steps:[
      "<b>규제 정보 상시 파악</b> — 컴플라이언스 대시보드/규제 리스트로 적용 OJK 규제 관리 <span class='reg'>POJK 46·48·42/2024, 22·8/2023</span>",
      "<b>갭 분석·영향 평가</b> — Compliance Work Unit 보고로 신규·개정 규제 vs 현행 이행 간 갭 식별, 잠재 영향 평가",
      "<b>이행 모니터링·후속조치</b> — 핵심 규제비율(FAR·NPF·Gearing·CAR) 월간 점검, 내부 경보선 접근 시 선제 대응"
    ],
    me:"한국 자산건전성 규제 대응·감독당국 liaison 경험 → maker-checker-approver를 OJK에 현지화.",
    cards:[
      {q:"5 core POJK regulations", qkr:"KBBF 5대 규제군", main:"46·48·42 / 22·8", items:[
        "<b>POJK 46/2024</b> — Financing Companies (development & strengthening)",
        "<b>POJK 48/2024</b> — Good Governance (GCG)",
        "<b>POJK 42/2024</b> — Risk Management",
        "<b>POJK 22/2023</b> — Consumer & Public Protection",
        "<b>POJK 8/2023</b> — AML/CFT (APU-PPT)"], kr:"연도로 묶기: 2024 셋(46·48·42), 2023 둘(22·8)"}
    ]
  },
  {
    id:"Q2", label:"통제", en:"Q2. How do you design governance frameworks, strategies, and risk management policies?",
    kr:"거버넌스 프레임워크·전략·리스크관리 정책을 어떻게 설계하겠는가?",
    flowTag:"흐름 · 3단계", arc:["4 pillars","Appetite/Limit","거버넌스·문화"],
    steps:[
      "<b>리스크관리 실행 4 pillars 이식</b> — 감독·정책·프로세스·내부통제 (아래 카드)",
      "<b>정책 구조·한도 설정</b> — 8대 리스크 대상 Risk Appetite/Limit 명문화, 집중·차주·NPF·Gearing·CAR·자본 buffer 한도. ISO 31000 기반",
      "<b>견고한 거버넌스·리스크 문화</b> — GCG(TARIF) 위에서 감사위·리스크위 실효화, 3선 방어, 문화는 인사·교육 연계로 내재화"
    ],
    me:"한국 전사 중기계획·CSS·EWS·RORWA·월간 빈티지 분석 운영 → KBBF 조기경보로 이전.",
    cards:[
      {q:"Risk Management — 4 pillars", qkr:"리스크관리 실행 4요소", main:"Supervision · Policies · Process · Control", items:[
        "① <b>Active supervision</b> of BOD & BOC (감독·인사조직·여신)",
        "② <b>Policies & procedures</b> (strategy, risk appetite & tolerance)",
        "③ <b>Risk management process</b> — identify·measure·control·monitor + <b>MIS</b>",
        "④ <b>Internal control system</b>"], kr:"암기: 감독→정책→프로세스→내부통제"},
      {q:"8 risk types of a Finance Company", qkr:"금융회사 8대 리스크", main:"Strategic · Credit · Operational · Market · Liquidity · Compliance · Legal · Reputation", items:[
        "<b>SCOM</b> — Strategic · Credit · Operational · Market",
        "<b>LCLR</b> — Liquidity · Compliance · Legal · Reputation"], kr:"두 덩어리 4+4로. (전신운시 / 유준법평)"},
      {q:"GCG principles", qkr:"지배구조 5원칙", main:"T · A · R · I · F", items:[
        "<b>T</b>ransparency 투명성",
        "<b>A</b>ccountability 책임성",
        "<b>R</b>esponsibility 책무성",
        "<b>I</b>ndependency 독립성",
        "<b>F</b>airness 공정성"], kr:"발음 그대로 '타리프(TARIF)'"},
      {q:"Three Lines of Defense", qkr:"3선 방어체계", main:"Business · Risk · Audit", items:[
        "<b>1st line</b> — Business / operations (owns the risk)",
        "<b>2nd line</b> — Risk management & compliance (oversees)",
        "<b>3rd line</b> — Internal audit (independent assurance)"], kr:"1선 영업 · 2선 리스크 · 3선 감사"},
      {q:"Net Risk formula", qkr:"순리스크 산식", main:"Net Risk = Inherent Risk × KPMR", items:[
        "<b>Inherent Risk</b> — risk before controls (통제 전 고유리스크)",
        "<b>KPMR</b> — Quality of Risk Management Implementation (리스크통제 품질)",
        "Result = <b>Net / Residual Risk</b> (통제 후 잔여리스크)"], kr:"고유리스크를 통제품질로 눌러 잔여리스크"},
      {q:"Risk Appetite vs Risk Tolerance", qkr:"성향 vs 허용 구분", main:"Appetite = willing · Tolerance = maximum", items:[
        "<b>Risk Appetite</b> — level of risk a company is <b>willing to accept</b> for its objectives",
        "<b>Risk Tolerance</b> — the <b>maximum</b> risk acceptable in operations (e.g. NPF ≤ 5%)",
        "Bounded by <b>Risk Capacity</b> (financial/operational limit)"], kr:"성향=받아들일 의향 / 허용=최대 상한선"}
    ]
  },
  {
    id:"Q3", label:"계획", en:"Q3. How do you develop a business plan for a financing company?",
    kr:"파이낸싱회사의 사업계획을 어떻게 수립하겠는가?",
    flowTag:"흐름 · 3단계", arc:["미션·비전","거시·시장","목표·전략"],
    steps:[
      "<b>미션·비전 식별</b> — 존재 이유(미션)·지향점(비전). KBBF=안정화+지속성장 균형 <span class='reg'>POJK 24/2019 · SEOJK 23/2019</span>",
      "<b>거시·시장 트렌드 반영</b> — 금리·환율·GDP·차량/중장비 수요 + 산업 트렌드(타깃 세그먼트). KBBF=Fleet 안정+Retail 확대",
      "<b>차년도 목표·전략</b> — KPI 설정, 선제 증자(FY26–28)로 성장, NPF 5% 이내 보수 관리, Gearing 건전 유지"
    ],
    me:"JB우리캐피탈 중고차금융: 4년, 100명+·10지점, 자산 IDR 23조·월 1.7조·점유율 28%·시장 1위.",
    cards:[
      {q:"Business plan — 3-step flow", qkr:"사업계획 3단계", main:"Mission/Vision → Macro/Market → Objectives", items:[
        "① <b>Vision & Mission</b> — long-term aspiration + steps to get there",
        "② <b>Macroeconomic forecast & market trends</b> in target segment",
        "③ <b>Next-year objectives & strategies</b> to hit the targets"], kr:"슬라이드 3개 bullet 순서 그대로"},
      {q:"Market analysis frameworks", qkr:"시장 분석 도구", main:"PESTEL · SWOT · Porter's Five Forces", items:[
        "<b>PESTEL</b> — macro environment (Political·Economic·Social·Tech·Environmental·Legal)",
        "<b>SWOT</b> — internal S/W, external O/T",
        "<b>Porter's Five Forces</b> — industry competition"], kr:"거시=PESTEL, 자사=SWOT, 산업=Porter"}
    ]
  },
  {
    id:"Q4", label:"방지", en:"Q4. How will you implement an Anti-Fraud Strategy?",
    kr:"Anti-Fraud Strategy를 어떻게 실행하겠는가?",
    flowTag:"흐름 · 3단계", arc:["규제 근거","4 pillars","실행·순환"],
    steps:[
      "<b>규제 근거·철학 명시</b> — 가이드라인 구비 <span class='reg'>POJK 12/2024</span>. 철학: prevention is better than cure",
      "<b>4 pillars 식별</b> — P·D·I·M (아래 카드). 4번째가 지속가능성 보장",
      "<b>4 pillars 실행 리드·순환</b> — KYE·Whistleblowing(예방), red flag 대시보드(적발), 독립 조사, 시정 추적 → 평가·지속개선. AML 병행 <span class='reg'>POJK 8/2023</span>"
    ],
    me:"여신·Collection에서 이상징후·부정신호 식별 경험 → Fleet(허위서류·담보 부풀리기), Retail(신원·소득 위조·딜러 결탁) 통제.",
    cards:[
      {q:"Anti-Fraud Strategy — 4 pillars", qkr:"부정방지 4기둥", main:"Prevention · Detection · Investigation · Monitoring", items:[
        "① <b>Prevention</b> 예방",
        "② <b>Detection</b> 적발",
        "③ <b>Investigation</b>, reporting & sanctions 조사·보고·제재",
        "④ <b>Monitoring</b>, evaluation & follow-up 모니터링·평가·후속"], kr:"P·D·I·M. ④가 지속가능성의 축"},
      {q:"Anti-Fraud philosophy", qkr:"부정방지 근본 철학", main:"\u201cPrevention is better than cure\u201d", items:[
        "예방 중심 접근 — 사후 적발보다 사전 예방 우선",
        "4 pillars가 이 철학을 구조화한 것"], kr:"한 문장 그대로 인용 가능하게"},
      {q:"Know Your Employee (KYE)", qkr:"직원 신원관리 정책", main:"Recognize & monitor employee integrity", items:[
        "채용 적정성 (proper recruitment & qualification)",
        "생활방식 모니터링 (lifestyle monitoring)",
        "성향·관계·태도 관찰 + coaching",
        "Whistleblowing 보호와 함께 예방 pillar의 핵심"], kr:"KYC(고객)와 짝 — KYE는 '직원' 대상"}
    ]
  },
  {
    id:"Q5", label:"검증", en:"Q5. How will you monitor follow-up actions on Internal Audit findings?",
    kr:"내부감사 지적사항의 후속조치를 어떻게 모니터링하겠는가?",
    flowTag:"흐름 · 3단계", arc:["월간 보고","미이행 관리","품질 향상"],
    steps:[
      "<b>이사회 월간 보고</b> — 내부감사가 활동을 매월 이사회 보고. 3선 방어의 독립 보증 <span class='reg'>IPPF (IIA)</span>",
      "<b>미이행 원인·완료시점 관리</b> — agreed corrective measures 미이행 auditee 보고, 원인·완료 예정시점 식별. 지적별 책임부서·기한·증빙",

function initDeck(root, data){
  const mount=root.querySelector(".deck-live");
  const posEl=root.querySelector(".pos");
  const dotsEl=root.querySelector(".dots");
  let order=[...data.keys()], idx=0, flipped=false, knew=new Set();

  function paintDots(){
    dotsEl.innerHTML="";
    data.forEach((_,i)=>{const d=document.createElement("div");
      d.className="dot"+(order[idx]===i?" cur":"")+(knew.has(i)?" knew":"");dotsEl.appendChild(d);});
  }
  function render(c){
    return `<div class="stage"><div class="flip">
      <div class="face front">
        <div class="cardtag">암기 · What / Order?</div>
        <div class="prompt"><div class="big">${c.q}</div><div class="qkr">${c.qkr}</div></div>
        <div class="tapcue">탭하면 답 · Tap to flip</div>
      </div>
      <div class="face back">
        <div class="cardtag">Answer</div>
        <div class="ans"><div class="main">${c.main}</div>
          <ol>${c.items.map(x=>`<li>${x}</li>`).join("")}</ol>
          ${c.kr?`<div class="kr">💡 ${c.kr}</div>`:""}</div>
        <div class="tapcue">탭하면 앞면</div>
      </div></div></div>
      <div class="nav"><button class="again">↻ 다시</button><button class="know">✓ 알아</button></div>`;
  }
  function view(){
    if(idx>=order.length){done();return;}
    posEl.textContent=idx+1; flipped=false;
    mount.innerHTML=render(data[order[idx]]);
    const flip=mount.querySelector(".flip");
    flip.addEventListener("click",()=>{flipped=!flipped;flip.classList.toggle("flipped",flipped)});
    mount.querySelector(".know").addEventListener("click",e=>{e.stopPropagation();knew.add(order[idx]);idx++;view();});
    mount.querySelector(".again").addEventListener("click",e=>{e.stopPropagation();idx++;view();});
    paintDots();
  }
  function done(){
    const missed=order.filter(i=>!knew.has(i)); posEl.textContent=order.length; paintDots();
    if(missed.length){
      mount.innerHTML=`<div class="done"><div class="big">🔁</div>
        <h3>${data.length-missed.length}/${data.length} 확실</h3>
        <p>'다시' 넘긴 ${missed.length}개만 다시 돕니다.</p>
        <button>${missed.length}개 다시</button></div>`;
      mount.querySelector("button").onclick=()=>{order=missed;idx=0;view();};
    }else{
      mount.innerHTML=`<div class="done"><div class="big">✅</div><h3>이 질문 항목 전부 확실</h3>
        <p>다음 질문 탭으로.</p><button>다시 한 번</button></div>`;
      mount.querySelector("button").onclick=()=>{order=[...data.keys()];idx=0;knew.clear();view();};
    }
  }
  root.querySelector(".reset").onclick=()=>{order=[...data.keys()];idx=0;knew.clear();view();};
  view();
}

const qtabs=document.getElementById("qtabs"), panels=document.getElementById("panels");
QUESTIONS.forEach((Q,qi)=>{
  const t=document.createElement("button");
  t.className="qtab"; t.setAttribute("role","tab"); t.setAttribute("aria-selected", qi===0?"true":"false");
  t.innerHTML=`<div class="qn">${Q.id}</div><div class="ql">${Q.label}</div>`;
  t.onclick=()=>{
    qtabs.querySelectorAll(".qtab").forEach(x=>x.setAttribute("aria-selected","false"));
    t.setAttribute("aria-selected","true");
    panels.querySelectorAll(".panel").forEach(p=>p.classList.remove("on"));
    document.getElementById("p-"+Q.id).classList.add("on");
    window.scrollTo({top:0,behavior:"smooth"});
  };
  qtabs.appendChild(t);

  const p=document.createElement("section");
  p.className="panel"+(qi===0?" on":""); p.id="p-"+Q.id;
  p.innerHTML=`
    <div class="qhead"><div class="en">${Q.en}</div><div class="kr">${Q.kr}</div></div>
    <div class="flow">
      <div class="tag">${Q.flowTag}</div>
      <div class="arc">${Q.arc.map((a,i)=>`<span class="b">${a}</span>${i<Q.arc.length-1?'<span class="ar">→</span>':''}`).join("")}</div>
      <ul>${Q.steps.map(s=>`<li>${s}</li>`).join("")}</ul>
      <div class="me">💡 <b>본인 컨텍스트</b> — ${Q.me}</div>
    </div>
    <div class="memlabel">외울 항목 <span class="cnt">${Q.cards.length}</span></div>
    <div class="deckbar">
      <div class="count">암기카드 <b class="pos">1</b> / ${Q.cards.length}</div>
      <button class="reset">↺ 처음부터</button>
    </div>
    <div class="deck-live"></div>
    <div class="dots"></div>`;
  panels.appendChild(p);
  initDeck(p, Q.cards);
});
</script>
